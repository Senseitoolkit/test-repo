<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explanation</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #0F6E56; --green-text: #085041;
    --red-light: #FCEBEB; --red-border: #A32D2D; --red-text: #501313;
    --bg: #F7F5F0; --card: #FFFFFF; --text: #2C2A26; --muted: #6B6860;
    --border: #E2DDD4; --radius: 14px; --radius-sm: 8px;
  }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .app-header {
    background: var(--green); padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(15,110,86,0.18);
  }
  .app-title { font-size: 1.1rem; font-weight: 800; color: white; letter-spacing: -0.01em; }
  .score-chip { background: rgba(255,255,255,0.2); color: white; border-radius: 20px; padding: 4px 14px; font-size: 0.85rem; font-weight: 700; }

  /* Year selector */
  .year-bar {
    background: #0F6E56; display: flex; padding: 0 1.5rem; gap: 4px;
  }
  .year-btn {
    padding: 0.55rem 1.1rem; border: none; background: none;
    font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700;
    color: rgba(255,255,255,0.6); cursor: pointer; border-radius: 6px 6px 0 0;
    transition: all 0.15s; letter-spacing: 0.03em;
  }
  .year-btn.active { background: var(--bg); color: var(--green-dark); }
  .year-btn:hover:not(.active) { color: rgba(255,255,255,0.9); }

  /* Set tabs */
  .tabs-bar {
    background: white; border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; padding: 0 1.5rem;
  }
  .tab-btn {
    padding: 0.8rem 1.2rem; border: none; background: none;
    font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600;
    color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -1.5px; transition: all 0.18s;
  }
  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* Progress */
  .progress-wrap {
    background: white; padding: 0.8rem 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
  }
  .progress-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); white-space: nowrap; min-width: 110px; }
  .progress-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }

  .main { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* Passage */
  .passage-card {
    background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border);
    padding: 1.5rem; margin-bottom: 1.25rem;
  }
  .passage-label { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
  .passage-badge {
    background: var(--green-light); color: var(--green-text);
    font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.07em; padding: 3px 10px; border-radius: 20px;
  }
  .passage-title-text { font-family: 'Lora', serif; font-size: 1.15rem; font-weight: 600; color: var(--text); }
  .passage-body { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.85; color: #3A3830; }

  /* Questions */
  .question-card {
    background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border);
    padding: 1.25rem; margin-bottom: 1rem; transition: border-color 0.2s;
  }
  .question-card.answered { border-color: #C0E8D6; }
  .q-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .q-text { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 14px; line-height: 1.45; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-radius: var(--radius-sm); border: 1.5px solid var(--border);
    background: var(--bg); color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 500;
    cursor: pointer; text-align: left; transition: all 0.15s; width: 100%;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--green); background: var(--green-light); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { background: var(--green-light); border-color: var(--green); color: var(--green-text); font-weight: 700; }
  .opt-btn.wrong { background: var(--red-light); border-color: var(--red-border); color: var(--red-text); }
  .opt-letter {
    width: 26px; height: 26px; border-radius: 50%; background: white;
    border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 800; flex-shrink: 0; color: var(--muted); transition: all 0.15s;
  }
  .opt-btn.correct .opt-letter { background: var(--green); color: white; border-color: var(--green); }
  .opt-btn.wrong .opt-letter { background: var(--red-border); color: white; border-color: var(--red-border); }

  /* Feedback */
  .feedback { margin-top: 14px; border-radius: var(--radius-sm); overflow: hidden; display: none; }
  .feedback.show { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }
  .feedback-header {
    padding: 10px 14px; font-size: 0.9rem; font-weight: 800;
    display: flex; align-items: center; gap: 6px;
  }
  .feedback-header.correct-h { background: var(--green); color: white; }
  .feedback-header.wrong-h { background: var(--red-border); color: white; }
  .feedback-body {
    padding: 12px 14px; background: #F9F8F5;
    border: 1.5px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  }
  .fb-row { font-size: 0.88rem; color: var(--muted); margin-bottom: 7px; line-height: 1.55; }
  .fb-row:last-child { margin-bottom: 0; }
  .fb-label { font-weight: 800; color: var(--text); }
  .fb-quote {
    font-family: 'Lora', serif; font-style: italic;
    color: var(--green-dark); background: var(--green-light);
    border-radius: 4px; padding: 2px 6px; display: inline;
  }

  /* Nav */
  .nav-row { display: flex; align-items: center; justify-content: space-between; margin-top: 1.5rem; gap: 10px; }
  .nav-btn {
    display: flex; align-items: center; gap: 6px; padding: 10px 22px;
    border-radius: 30px; border: 1.5px solid var(--border);
    background: white; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) { background: var(--bg); border-color: #bbb; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: var(--green); color: white; border-color: var(--green); padding: 10px 28px; }
  .nav-btn.primary:hover:not(:disabled) { background: var(--green-dark); border-color: var(--green-dark); }

  /* Complete */
  .complete-screen { text-align: center; padding: 4rem 1rem; animation: fadeIn 0.4s ease; }
  .complete-emoji { font-size: 4rem; margin-bottom: 1rem; }
  .complete-score { font-size: 3.5rem; font-weight: 800; color: var(--green); line-height: 1; margin-bottom: 0.5rem; }
  .complete-label { font-size: 0.85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1.5rem; }
  .complete-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; }
  .complete-sub { font-size: 1rem; color: var(--muted); margin-bottom: 2rem; }

  @media (max-width: 500px) {
    .main { padding: 1rem 0.75rem 4rem; }
    .passage-body { font-size: 0.97rem; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Explanation</div>
  <div class="score-chip" id="scoreChip">Score: 0 / 0</div>
</header>

<div class="year-bar">
  <button class="year-btn active" id="year-btn-1" onclick="switchYear(1)">Year 1</button>
  <button class="year-btn" id="year-btn-2" onclick="switchYear(2)">Year 2</button>
  <button class="year-btn" id="year-btn-3" onclick="switchYear(3)">Year 3</button>
  <button class="year-btn" id="year-btn-4" onclick="switchYear(4)">Year 4</button>
  <button class="year-btn" id="year-btn-5" onclick="switchYear(5)">Year 5</button>
  <button class="year-btn" id="year-btn-6" onclick="switchYear(6)">Year 6</button>
</div>

<div class="tabs-bar">
  <button class="tab-btn active" id="tab-fiction" onclick="switchSet('fiction')">📖 Fiction</button>
  <button class="tab-btn" id="tab-nonfiction" onclick="switchSet('nonfiction')">🔬 Non-fiction</button>
</div>

<div class="progress-wrap">
  <div class="progress-label" id="progressLabel">Passage 1 of 20</div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<main class="main" id="mainContent"></main>

      { title:"The Empty Promise", passage:"Theo had promised to teach his little sister to ride her bike on Saturday. But when his friends invited him to a football match, he told her they would do it 'another time.' He saw her face fall and felt a heavy twist of guilt.", questions:[

      { title:"The Hidden Effort", passage:"Everyone thought Maya was just 'naturally clever' and that schoolwork came easily to her. They did not see the hours she spent each night, rereading and practising long after others had stopped. Her success was built on quiet, steady effort, not magic.", questions:[

      { title:"The Reluctant Apology", passage:"Omar knew he had spoken harshly to his friend and that the silence between them was his fault. His pride made the words 'I'm sorry' stick in his throat for days. Finally, valuing the friendship more than his pride, he apologised.", questions:[

      { title:"The Generous Loser", passage:"Sara had trained for months for the art prize, only to come second to a newcomer. Although disappointed, she noticed how nervous the winner looked. She crossed the room to congratulate her warmly and to praise her painting.", questions:[

      { title:"The Silent Signal", passage:"During the test, Lena saw her best friend glancing desperately at her answer sheet. She knew that letting her copy would be cheating and unfair to everyone. So she gently covered her work and shook her head, sad but firm.", questions:[

      { title:"The Patient Teacher", passage:"Mr Akram noticed that one pupil, Yusuf, kept getting the same sum wrong again and again. Rather than scold him, he sat down and worked out where Yusuf's thinking went astray. Once he explained that one step, Yusuf solved the rest with ease.", questions:[

      { title:"The Untaken Shortcut", passage:"Walking home, Marcus saw that cutting across old Mr Bell's flowerbed would save him five minutes. He thought of how lovingly Mr Bell tended those flowers each morning. Marcus took the long way round instead, leaving the flowers untouched.", questions:[

      { title:"The Shared Umbrella", passage:"Rain hammered down as Aisha waited at the bus stop under her umbrella. A classmate she barely knew arrived, soaked and shivering, with nothing to keep off the rain. Aisha shifted over and held the umbrella above them both.", questions:[

      { title:"The Truthful Witness", passage:"When the window was smashed, all the other children blamed a boy who was disliked but innocent. Daniel had actually seen who did it — and it was his own close friend. Taking a deep breath, Daniel told the teacher the truth.", questions:[

      { title:"The Forgotten Lines", passage:"In the school play, the lead actor suddenly froze, unable to remember his next words. Sara, playing a small role nearby, calmly whispered the line to him without the audience noticing. The play carried on smoothly, and few realised anything had gone wrong.", questions:[

      { title:"The Overheard Insult", passage:"Maya overheard two older girls mocking her new haircut behind her back. Her first urge was to shout something cruel back at them. Instead, she took a breath, decided their opinion did not define her, and walked on with her head high.", questions:[

      { title:"The Loyal Friend", passage:"When everyone started teasing Theo about his stammer, his friend Ravi could have joined in to fit in with the crowd. Instead, Ravi stood beside Theo and told the others to stop. He would rather lose their approval than abandon his friend.", questions:[

      { title:"Why Antibiotics Can Stop Working", passage:"Antibiotics are medicines that kill harmful bacteria. But a few bacteria may survive because they happen to resist the drug, and these survivors multiply. Over time, if antibiotics are overused, more and more bacteria become resistant and the medicine fails.", questions:[

      { title:"Why Coral Reefs Turn White", passage:"Coral reefs get their colour and much of their food from tiny algae that live inside them. When the sea grows too warm, the coral forces the algae out and turns a bleached white. Without the algae, the starving coral can die if the heat lasts too long.", questions:[
        { q:"Why do corals turn white in warm seas?", opts:["They expel the algae that give them colour","They are painted","They freeze"], correct:0, evidence:"When the sea grows too warm, the coral forces the algae out and turns a bleached white.", rationale:"Pushing out the colourful algae leaves the coral white." },
        { q:"Why do corals depend on the algae?", opts:["The algae give them colour and food","The algae hunt for them","The algae are decoration only"], correct:0, evidence:"Coral reefs get their colour and much of their food from tiny algae that live inside them.", rationale:"The algae supply both colour and much of the coral's food." },
        { q:"Why can bleached coral die?", opts:["It loses its food source if heat lasts","It runs out of water","It gets too cold"], correct:0, evidence:"Without the algae, the starving coral can die if the heat lasts too long.", rationale:"With no algae for food, lasting heat can starve the coral to death." }

      { title:"Why Vaccines Protect Us", passage:"A vaccine contains a harmless, weakened form of a germ. This trains the body's defences to recognise the germ and how to fight it. Later, if the real germ attacks, the body remembers and defeats it before it can cause illness.", questions:[
        { q:"Why does a vaccine protect us from a disease?", opts:["It trains the body to recognise and fight the germ","It coats us in armour","It removes all germs from the air"], correct:0, evidence:"This trains the body's defences to recognise the germ and how to fight it.", rationale:"The vaccine teaches the body to fight the germ before it strikes." },
        { q:"Why doesn't the vaccine itself make us very ill?", opts:["It uses a harmless, weakened germ","It is just water","It removes the germ"], correct:0, evidence:"A vaccine contains a harmless, weakened form of a germ.", rationale:"The weakened germ is harmless, so it trains without causing illness." },
        { q:"Why can the body beat the real germ quickly later?", opts:["It already remembers how to fight it","The germ is weak","It has no defences"], correct:0, evidence:"…the body remembers and defeats it before it can cause illness.", rationale:"Having been trained, the body remembers and defeats the germ fast." }

      { title:"Why Glaciers Carve Valleys", passage:"A glacier is a huge, slow-moving mass of ice that creeps downhill over centuries. As it moves, it drags rocks frozen into its base, which scrape and grind the ground beneath. Over a very long time, this carves out a wide, U-shaped valley.", questions:[
        { q:"Why does a glacier carve out a valley?", opts:["Rocks in its base grind the ground as it moves","It melts the rock","It floats over the land"], correct:0, evidence:"…it drags rocks frozen into its base, which scrape and grind the ground beneath.", rationale:"The dragged rocks scrape and grind the ground, carving the valley." },
        { q:"Why does carving a valley take so long?", opts:["The glacier moves very slowly","The rock grows back","Ice is gentle"], correct:0, evidence:"A glacier is a huge, slow-moving mass of ice that creeps downhill over centuries.", rationale:"Because the glacier creeps slowly over centuries, the carving is slow." },
        { q:"Why are the rocks able to scrape the ground?", opts:["They are frozen into the glacier's base","They float on top","They are thrown ahead"], correct:0, evidence:"…it drags rocks frozen into its base…", rationale:"Frozen into the base, the rocks press on the ground and scrape it." }

      { title:"Why Some Animals Are Camouflaged", passage:"Many animals have colours or patterns that match their surroundings. This makes them very hard for predators to spot, especially when they keep still. Animals that blend in are more likely to survive and have young.", questions:[
        { q:"Why does camouflage help an animal survive?", opts:["Predators struggle to spot it","It runs faster","It scares predators"], correct:0, evidence:"This makes them very hard for predators to spot…", rationale:"Being hard to spot helps it avoid predators and survive." },

      { title:"Why the Tides Rise and Fall", passage:"The Moon's gravity pulls gently on the Earth's oceans, dragging the water into a bulge. As the Earth spins, each coast moves through this bulge and back out of it. That is why the sea level rises and falls in a steady rhythm each day.", questions:[
        { q:"Why does the sea level rise and fall?", opts:["Coasts move through the Moon's tidal bulge","The sea boils","Rivers fill it up"], correct:0, evidence:"As the Earth spins, each coast moves through this bulge and back out of it.", rationale:"Coasts passing in and out of the bulge cause the rise and fall." },

      { title:"Why We Feel Dizzy When We Spin", passage:"Deep inside each ear is fluid that moves when we turn our head, telling the brain we are spinning. When we stop suddenly, the fluid keeps swirling for a moment. The brain is confused because it senses movement even though we have stopped.", questions:[

      { title:"Why Soap Bubbles Pop", passage:"A soap bubble is a thin film of soapy water wrapped around trapped air. The water in the film slowly dries out, or the film is touched and torn. Once the film is broken, the air rushes out and the bubble pops.", questions:[

      { title:"Why Rivers Bend and Wind", passage:"As a river flows, the water on the outside of a slight curve moves faster and wears the bank away. On the inside, the water moves slower and drops sand, building the bank up. Over time, these changes make the curves grow into great winding bends.", questions:[

        { q:"Why do we see lightning before hearing thunder?", opts:["Light travels faster than sound","Lightning happens first","Thunder is quiet"], correct:0, evidence:"…light travels almost instantly, while sound travels much more slowly through the air.", rationale:"Light is much faster, so the flash arrives before the sound." },
        { q:"Why does the thunder arrive seconds later?", opts:["Sound travels slowly through the air","It is created later","It bounces off clouds"], correct:0, evidence:"…sound travels much more slowly through the air.", rationale:"The slow-moving sound takes longer to reach us." },
        { q:"Why can a bigger gap mean the storm is far away?", opts:["The slow sound takes longer to arrive from far off","Far storms are louder","Light slows with distance"], correct:0, evidence:"…the thunder follows seconds later.", rationale:"The further the storm, the longer the slow sound takes, widening the gap." }

      { title:"Why Birds Migrate Such Long Distances", passage:"As winter approaches, the insects and plants that many birds feed on disappear in cold regions. Rather than starve, these birds make long journeys to warmer places where food remains plentiful. When spring brings food back home, they return.", questions:[
        { q:"Why do these birds fly so far each year?", opts:["To reach food that vanishes at home in winter","To see new places","To escape other birds"], correct:0, evidence:"…these birds make long journeys to warmer places where food remains plentiful.", rationale:"They travel far to find food that disappears at home in winter." },
        { q:"Why does their food disappear in winter?", opts:["Insects and plants die back in the cold","Other birds eat it all","It is buried in sand"], correct:0, evidence:"…the insects and plants that many birds feed on disappear in cold regions.", rationale:"Cold makes the insects and plants they eat vanish." },
        { q:"Why do the birds come back in spring?", opts:["Food becomes plentiful at home again","They miss the cold","They get lost"], correct:0, evidence:"When spring brings food back home, they return.", rationale:"They return once spring restores the food supply at home." }
      ]},
      { title:"Why Ice Is Slippery", passage:"The very top layer of ice is not quite solid; it behaves a little like a thin film of water. This slippery film means there is very little to grip between ice and a shoe. That is why people slide and slip so easily on icy paths.", questions:[
        { q:"Why is ice so slippery?", opts:["A thin watery film on top gives little grip","It is too cold to touch","It is perfectly smooth glass"], correct:0, evidence:"This slippery film means there is very little to grip between ice and a shoe.", rationale:"The watery film leaves little grip, making ice slippery." },
        { q:"Why is there little grip on ice?", opts:["The top layer acts like a film of water","The ice is sticky","Shoes are too soft"], correct:0, evidence:"…it behaves a little like a thin film of water.", rationale:"The water-like top layer offers almost nothing to grip." },
        { q:"Why do people slip on icy paths?", opts:["There is too little grip to hold them","The path tilts","Ice pushes them"], correct:0, evidence:"…why people slide and slip so easily on icy paths.", rationale:"With so little grip, people slide and slip on the ice." }
      ]},
      { title:"Why Deep Water Looks Blue", passage:"When sunlight shines into water, the water slowly absorbs the colours of light. Reds and yellows are soaked up first, within a few metres. Blue light travels deepest and is scattered back to our eyes, so deep water looks blue.", questions:[
        { q:"Why does deep water look blue?", opts:["Blue light travels deepest and scatters back","The sky paints it","Fish are blue"], correct:0, evidence:"Blue light travels deepest and is scattered back to our eyes, so deep water looks blue.", rationale:"Blue light reaches deepest and bounces back, so the water looks blue." },
        { q:"Why don't we see much red in deep water?", opts:["Red light is absorbed within a few metres","Red sinks to the bottom","Red turns into blue"], correct:0, evidence:"Reds and yellows are soaked up first, within a few metres.", rationale:"Red is absorbed quickly, so little of it returns to our eyes." },
        { q:"Why does water absorb different colours unevenly?", opts:["It soaks up some colours faster than others","All colours vanish equally","It only absorbs blue"], correct:0, evidence:"…the water slowly absorbs the colours of light.", rationale:"Water absorbs reds and yellows faster than blue, so they fade first." }
      ]},
      { title:"Why Yeast Makes Dough Rise", passage:"Yeast is a tiny living organism added to bread dough. As it feeds on the sugars in the dough, it gives off a gas in the form of countless small bubbles. Trapped in the stretchy dough, these bubbles make it swell and rise.", questions:[
        { q:"Why does the dough rise?", opts:["Trapped gas bubbles from the yeast make it swell","It soaks up water","It is pulled upward"], correct:0, evidence:"Trapped in the stretchy dough, these bubbles make it swell and rise.", rationale:"The yeast's gas bubbles, trapped in the dough, make it rise." },
        { q:"Why does the yeast give off gas?", opts:["It feeds on the sugars in the dough","It is heated","It is shaken"], correct:0, evidence:"As it feeds on the sugars in the dough, it gives off a gas…", rationale:"Feeding on the dough's sugars makes the yeast produce gas." },
        { q:"Why must the dough be stretchy?", opts:["So it can trap the gas and hold its shape","So it tastes nicer","So it stays cold"], correct:0, evidence:"Trapped in the stretchy dough, these bubbles make it swell…", rationale:"The stretchy dough traps the gas, letting the bubbles swell it up." }
      ]},
      { title:"Why Mountains Have Snow on Top", passage:"The higher up you go, the thinner the air becomes and the less heat it can hold. Even when valleys below are warm, the air on a high peak stays bitterly cold. At that freezing height, snow can settle and stay all year round.", questions:[
        { q:"Why is there snow on a mountain's peak even in summer?", opts:["The high, thin air stays freezing cold","It is closer to clouds","Snow is blown up there"], correct:0, evidence:"…the air on a high peak stays bitterly cold. At that freezing height, snow can settle and stay…", rationale:"The freezing high air lets snow stay even when below is warm." },
        { q:"Why is the air colder higher up?", opts:["Thinner air holds less heat","It is further from clouds","The sun avoids it"], correct:0, evidence:"…the thinner the air becomes and the less heat it can hold.", rationale:"Thin high air holds little heat, so it stays cold." },
        { q:"Why can warm valleys sit below snowy peaks?", opts:["The thicker low air holds more heat","Valleys make heat","Peaks are warmer"], correct:0, evidence:"Even when valleys below are warm…", rationale:"Lower down, the thicker air holds more heat, so valleys can be warm while peaks stay frozen." }
      ]},
      { title:"Why Wounds Heal Faster When Kept Clean", passage:"A wound is an opening where germs can enter and multiply, slowing healing. Keeping a wound clean and covered removes germs and stops new ones getting in. With fewer germs to fight, the body can repair the skin more quickly.", questions:[
        { q:"Why do clean wounds heal faster?", opts:["Fewer germs mean the body can repair quickly","Dirt feeds the skin","Cleaning adds new skin"], correct:0, evidence:"With fewer germs to fight, the body can repair the skin more quickly.", rationale:"Fewer germs let the body focus on repairing, so healing is faster." },
        { q:"Why do germs slow healing?", opts:["They enter the wound and multiply","They cool the skin","They feed the body"], correct:0, evidence:"A wound is an opening where germs can enter and multiply, slowing healing.", rationale:"Germs entering and multiplying slow the healing." },
        { q:"Why does covering a wound help?", opts:["It stops new germs getting in","It keeps the wound warm only","It hides the wound for looks"], correct:0, evidence:"Keeping a wound clean and covered removes germs and stops new ones getting in.", rationale:"A cover blocks new germs from reaching the wound." }
      ]},
      { title:"Why Hot Air Rises", passage:"When air is heated, its tiny particles spread further apart. This makes the warm air lighter for its size than the cooler air around it. Being lighter, the warm air floats upward, which is why hot air balloons climb into the sky.", questions:[
        { q:"Why does hot air rise?", opts:["It is lighter for its size than cool air","It is heavier","It is pushed by wind"], correct:0, evidence:"…the warm air floats upward…", rationale:"Being lighter for its size, the warm air floats up." },
        { q:"Why does heating make air lighter for its size?", opts:["Its particles spread further apart","It loses its particles","It turns to water"], correct:0, evidence:"When air is heated, its tiny particles spread further apart.", rationale:"Heated particles spread out, making the air lighter for its size." },
        { q:"Why does a hot air balloon climb?", opts:["The hot air inside rises and lifts it","It is filled with rocks","It is pulled up by string"], correct:0, evidence:"…which is why hot air balloons climb into the sky.", rationale:"The rising hot air inside lifts the balloon upward." }
      ]}
    ]
  },
  6: {
    fiction: [
      { title:"The Costly Truth", passage:"Reza could have stayed silent and let his rival take the blame for the broken equipment. But he knew the rival was innocent, and that staying quiet would let an unfair punishment fall on someone else. Though it meant admitting his own carelessness, Reza told the teacher exactly what had happened.", questions:[

        { q:"Why was telling the truth hard for Reza?", opts:["It meant admitting his own carelessness","He had done nothing","He disliked the teacher"], correct:0, evidence:"Though it meant admitting his own carelessness…", rationale:"Honesty forced him to confess his own fault, which was difficult." },
        { q:"Why does Reza's choice reveal his values?", opts:["He valued fairness over protecting himself","He valued winning","He feared the rival"], correct:0, evidence:"…he knew the rival was innocent…", rationale:"Choosing fairness at his own cost shows he prizes justice over self-interest." }

      { title:"The Withheld Applause", passage:"As the rival team scored the winning goal, the home crowd fell into a bitter silence. But one boy, Theo, began to clap — not for the result, but for the sheer skill of the strike. Around him, a few others slowly joined in, recognising something worth honouring.", questions:[

        { q:"Why did a few others slowly join Theo?", opts:["They too recognised something worth honouring","They were copying blindly","They wanted to leave"], correct:0, evidence:"…recognising something worth honouring.", rationale:"They joined because they too saw the skill was worth applauding." }

      { title:"The Unspoken Farewell", passage:"In the weeks before she moved abroad, Grandma began giving away her treasures one by one and telling old family stories late into the night. She laughed warmly, yet her eyes glistened, and she held each grandchild a moment longer than usual. She wanted them to carry a piece of her with them.", questions:[

        { q:"Why did her eyes glisten even as she laughed?", opts:["She was sad about leaving them","She had something in her eye","She was unwell"], correct:0, evidence:"In the weeks before she moved abroad…", rationale:"Her coming departure made her tearful beneath the warm laughter." },
        { q:"Why did she hold each grandchild longer than usual?", opts:["She was saying a quiet goodbye","She was tired","She wanted them to leave"], correct:0, evidence:"…she held each grandchild a moment longer than usual.", rationale:"The lingering hugs were her way of quietly saying farewell before moving away." }
      ]},
      { title:"The Refused Reward", passage:"When Priya returned the lost purse, the grateful owner pressed a large banknote into her hand. Priya gently folded the woman's fingers back over the money and shook her head. She had not returned it for a reward, and taking one would spoil the very kindness she had shown.", questions:[
        { q:"Why did Priya refuse the reward?", opts:["A reward would spoil the kindness of her act","The note was fake","She had not found the purse"], correct:0, evidence:"…taking one would spoil the very kindness she had shown.", rationale:"She felt a reward would undermine the kindness behind returning the purse." },
        { q:"Why had Priya returned the purse in the first place?", opts:["Out of kindness, not for a reward","To get money","Because she was seen"], correct:0, evidence:"She had not returned it for a reward…", rationale:"She acted from kindness, not in hope of a reward." },
        { q:"Why does folding the woman's fingers back matter?", opts:["It firmly but gently declines the money","It hides the note","It counts the money"], correct:0, evidence:"Priya gently folded the woman's fingers back over the money and shook her head.", rationale:"The gentle gesture firmly yet kindly refuses the reward." }
      ]},
      { title:"The Silent Stand", passage:"When the class began to mock a pupil for his unusual accent, Daniel felt the pressure to laugh along and fit in. Instead, he stood up and quietly said that mocking someone for how they spoke was wrong. He would rather lose the crowd's approval than betray what he believed was right.", questions:[
        { q:"Why did Daniel speak out against the mocking?", opts:["He believed mocking the pupil was wrong","He wanted to join in","He liked attention"], correct:0, evidence:"…mocking someone for how they spoke was wrong.", rationale:"He acted on his belief that the mockery was wrong." },
        { q:"Why was speaking out risky for Daniel?", opts:["He might lose the crowd's approval","He might win a prize","The pupil might be cross"], correct:0, evidence:"He would rather lose the crowd's approval than betray what he believed was right.", rationale:"Standing up risked the approval of the crowd he was defying." },
        { q:"Why did Daniel feel pressure to laugh along?", opts:["He wanted to fit in with the class","He found it funny","He had an accent too"], correct:0, evidence:"…Daniel felt the pressure to laugh along and fit in.", rationale:"The wish to fit in created the pressure to join the mockery." }

      { title:"The Quiet Genius", passage:"For years, everyone overlooked Liang because he never put his hand up or sought praise. Only when a difficult national puzzle appeared, and Liang solved it within minutes, did the school realise what they had missed. His brilliance had always been there, simply unannounced.", questions:[
        { q:"Why had the school overlooked Liang's brilliance?", opts:["He never sought praise or put his hand up","He was new","He had been absent"], correct:0, evidence:"…everyone overlooked Liang because he never put his hand up or sought praise.", rationale:"His quietness, not a lack of ability, kept his brilliance hidden." },
        { q:"Why did the school finally notice him?", opts:["He solved a hard national puzzle quickly","He shouted loudly","He won a race"], correct:0, evidence:"…Liang solved it within minutes, did the school realise what they had missed.", rationale:"His swift solving of the tough puzzle revealed his talent." },
        { q:"Why is it said his brilliance was 'unannounced'?", opts:["He had it all along but never showed it off","He invented it that day","Others gave it to him"], correct:0, evidence:"His brilliance had always been there, simply unannounced.", rationale:"He always had the ability; he simply never drew attention to it." }
      ]},
      { title:"The Misread Stranger", passage:"The shabby man who entered the grand hotel was almost turned away by a sneering doorman. Then the manager rushed forward, beaming, and shook his hand warmly — for this was the celebrated architect who had designed the very building, now retired and dressed plainly. The doorman's face burned red.", questions:[
        { q:"Why was the man almost turned away?", opts:["He was judged by his shabby clothes","He had no booking","He was rude"], correct:0, evidence:"The shabby man who entered the grand hotel was almost turned away by a sneering doorman.", rationale:"His shabby appearance alone led the doorman to nearly reject him." },
        { q:"Why did the manager greet him so warmly?", opts:["He was the famous architect of the building","He was a lost tourist","He was the doorman's friend"], correct:0, evidence:"…this was the celebrated architect who had designed the very building…", rationale:"The manager knew him as the building's celebrated architect." },
        { q:"Why did the doorman's face burn red?", opts:["He was ashamed of his hasty judgement","He was too hot","He was proud"], correct:0, evidence:"The doorman's face burned red.", rationale:"His blush shows shame at having misjudged the distinguished man." }
      ]},
      { title:"The Heavy Decision", passage:"Mara was the most talented singer and was certain to win the solo. But she noticed her friend, who had practised just as hard, would be crushed by another defeat after a difficult year. When the teacher asked who wanted the solo, Mara surprised everyone by suggesting her friend audition first.", questions:[
        { q:"Why did Mara step back from the solo?", opts:["She wanted to give her struggling friend a chance","She had lost her voice","She disliked singing"], correct:0, evidence:"…her friend… would be crushed by another defeat after a difficult year.", rationale:"Concern for her friend after a hard year led Mara to step aside." },
        { q:"Why was Mara likely to win the solo herself?", opts:["She was the most talented singer","She was the oldest","She knew the teacher"], correct:0, evidence:"Mara was the most talented singer and was certain to win the solo.", rationale:"As the most talented, she would probably have won." },
        { q:"Why did her suggestion surprise everyone?", opts:["She gave up an advantage she was expected to take","She refused to sing ever","She insulted her friend"], correct:0, evidence:"…Mara surprised everyone by suggesting her friend audition first.", rationale:"Giving up her near-certain win was unexpected, hence the surprise." }
      ]},
      { title:"The Buried Apology", passage:"Years after the falling-out, Omar still regretted the cruel words he had thrown at his oldest friend. Pride had kept him from reaching out, but as the years passed, the silence weighed heavier than the pride. At last he wrote a long letter, owning his mistake completely.", questions:[
        { q:"Why did Omar finally write the letter?", opts:["The weight of the silence grew heavier than his pride","He wanted money","His friend demanded it"], correct:0, evidence:"…the silence weighed heavier than the pride.", rationale:"When the silence outweighed his pride, he reached out at last." },
        { q:"Why had Omar not reached out sooner?", opts:["His pride held him back","He had forgotten","His friend moved away"], correct:0, evidence:"Pride had kept him from reaching out…", rationale:"Pride was what stopped him from apologising for years." },
        { q:"Why did Omar regret the falling-out?", opts:["He had thrown cruel words at his oldest friend","His friend lied","He lost a game"], correct:0, evidence:"…the cruel words he had thrown at his oldest friend.", rationale:"His regret came from the cruel words he'd said to his friend." }
      ]},
      { title:"The Returned Advantage", passage:"In the final round of the quiz, Sara saw that her opponent had been given a question already asked earlier, which she alone remembered. Rather than let him answer it unaware and lose, she quietly told the host about the repeat. A fresh question was set, and the contest stayed fair.", questions:[
        { q:"Why did Sara tell the host about the repeated question?", opts:["To keep the contest fair","To waste time","To help herself win"], correct:0, evidence:"…she quietly told the host about the repeat.", rationale:"She spoke up so the contest would remain fair." },
        { q:"Why could Sara have stayed silent to gain an edge?", opts:["She alone remembered the question was repeated","She wrote the quiz","She was the host"], correct:0, evidence:"…which she alone remembered.", rationale:"Only she knew of the repeat, so silence could have given her an advantage." },
        { q:"Why does her choice show integrity?", opts:["She protected fairness over her own gain","She wanted to lose","She disliked the quiz"], correct:0, evidence:"Rather than let him answer it unaware and lose…", rationale:"Choosing fairness over a possible win demonstrates her integrity." }
      ]},
      { title:"The Patient Forgiveness", passage:"When her little brother knocked over the model she had spent weeks building, Lila felt a flash of fury rise in her chest. Then she saw his trembling lip and genuine horror at what he had done. Instead of shouting, she knelt down and told him gently that it was only an accident.", questions:[
        { q:"Why did Lila choose not to shout at her brother?", opts:["She saw it was a genuine accident","She wasn't upset at all","She broke it herself"], correct:0, evidence:"Then she saw his trembling lip and genuine horror at what he had done.", rationale:"Seeing his real distress and that it was an accident, she held back." },
        { q:"Why did Lila first feel furious?", opts:["Her weeks of work were ruined","She disliked her brother","She was tired"], correct:0, evidence:"…the model she had spent weeks building…", rationale:"Her destroyed weeks of work sparked the flash of fury." },
        { q:"Why does Lila's response show maturity?", opts:["She controlled her anger and forgave him","She held a grudge","She shouted loudly"], correct:0, evidence:"…she knelt down and told him gently that it was only an accident.", rationale:"Mastering her anger to reassure him shows real maturity." }

      { title:"The Untaken Credit", passage:"The whole class praised Sam for the brilliant idea that won the science competition. But Sam knew the spark had really come from his quiet partner, Yusuf, who never spoke up. Sam raised his hand and told everyone the credit truly belonged to Yusuf.", questions:[
        { q:"Why did Sam give the credit to Yusuf?", opts:["The winning idea had really come from Yusuf","Yusuf paid him","He disliked the praise"], correct:0, evidence:"…the spark had really come from his quiet partner, Yusuf…", rationale:"Because the idea was truly Yusuf's, Sam gave him the credit." },
        { q:"Why had Yusuf not received credit at first?", opts:["He never spoke up","He was absent","He refused it"], correct:0, evidence:"…his quiet partner, Yusuf, who never spoke up.", rationale:"Yusuf's quietness meant his contribution went unnoticed." },
        { q:"Why does Sam's honesty stand out?", opts:["He gave away praise he could have kept","He wanted to lose","He disliked science"], correct:0, evidence:"Sam raised his hand and told everyone the credit truly belonged to Yusuf.", rationale:"Surrendering praise he could have enjoyed shows notable honesty." }
      ]},
      { title:"The Weight of Loyalty", passage:"Theo was offered a place in the popular group, but only if he stopped sitting with his old friend, who was often teased. He remembered all the times that friend had stood by him through hard days. Theo turned the offer down without hesitation.", questions:[
        { q:"Why did Theo turn down the popular group?", opts:["He would not abandon his loyal old friend","He disliked the group","He was already popular"], correct:0, evidence:"He remembered all the times that friend had stood by him through hard days.", rationale:"Loyalty to the friend who had stood by him led him to refuse." },

      ]},
      { title:"The Honest Scoreboard", passage:"At the end of the match, the scorer realised he had accidentally given Maya's team an extra point they had not earned. That point had made them the winners. Knowing it was wrong, the scorer corrected the total, even though it meant his own team had actually lost.", questions:[
        { q:"Why did the scorer correct the total?", opts:["The extra point had been given by mistake","He wanted to lose","The crowd told him to"], correct:0, evidence:"…he had accidentally given Maya's team an extra point they had not earned.", rationale:"He fixed the score because the extra point was an error." },
        { q:"Why was the correction hard for the scorer?", opts:["It meant his own team had actually lost","It took a long time","He liked Maya's team"], correct:0, evidence:"…even though it meant his own team had actually lost.", rationale:"Correcting it cost his own team the win, making it difficult." },
        { q:"Why does this show the scorer's fairness?", opts:["He chose the truth over his team's victory","He wanted attention","He hated his team"], correct:0, evidence:"Knowing it was wrong, the scorer corrected the total…", rationale:"Choosing accuracy over his own team's win shows his fairness." }
      ]},
      { title:"The Last Lifeboat", passage:"As the ferry tilted, the old captain guided the last frightened passengers toward the final lifeboat. There was just one seat left when he reached it, and a young mother with a baby stood behind him. The captain stepped back and waved her forward into his place.", questions:[
        { q:"Why did the captain give up the last seat?", opts:["To save the young mother and baby","He preferred to swim","The seat was broken"], correct:0, evidence:"…a young mother with a baby stood behind him. The captain stepped back and waved her forward…", rationale:"He gave his seat so the mother and baby could be saved." },
        { q:"Why was there such danger on the ferry?", opts:["It was tilting and sinking","It was on fire only","It had run aground safely"], correct:0, evidence:"As the ferry tilted…", rationale:"The tilting, failing ferry put everyone in danger." },

      ]},
      { title:"The Forgiven Debt", passage:"A neighbour had borrowed a large sum from Mr Adeyemi and, months later, still could not repay it. Mr Adeyemi learned the man had lost his job and was struggling to feed his children. Rather than demand the money, he quietly told the man to forget the debt.", questions:[
        { q:"Why did Mr Adeyemi forgive the debt?", opts:["The neighbour was struggling to feed his children","He had been repaid already","He forgot it was owed"], correct:0, evidence:"…the man had lost his job and was struggling to feed his children.", rationale:"The neighbour's hardship moved Mr Adeyemi to forgive the debt." },
        { q:"Why couldn't the neighbour repay the money?", opts:["He had lost his job","He had spent it on luxuries","He refused on purpose"], correct:0, evidence:"…the man had lost his job…", rationale:"Losing his job left him unable to repay." },
        { q:"Why does Mr Adeyemi's choice show compassion?", opts:["He put the family's need above his own money","He wanted thanks","He disliked the man"], correct:0, evidence:"Rather than demand the money, he quietly told the man to forget the debt.", rationale:"Releasing the debt for the family's sake shows real compassion." }
      ]},
      { title:"The Translator's Care", passage:"At the meeting between two angry sides, one speaker made a remark that, translated word for word, would have shattered the fragile peace. The interpreter understood both the words and the danger in them. She chose her phrasing carefully, conveying the true meaning without the insult, and the talks went on.", questions:[
        { q:"Why did the interpreter change her phrasing?", opts:["To keep the insult from shattering the peace","She misheard the speaker","She did not know the words"], correct:0, evidence:"She chose her phrasing carefully, conveying the true meaning without the insult…", rationale:"She reshaped the words to protect the fragile peace." },
        { q:"Why was the original remark so dangerous?", opts:["Word for word, it would have shattered the peace","It was a secret","It was too quiet"], correct:0, evidence:"…translated word for word, would have shattered the fragile peace.", rationale:"A literal translation would have broken the delicate peace." },
        { q:"Why did the talks continue afterward?", opts:["The meaning was passed on without the sting","Everyone left","A new speaker arrived"], correct:0, evidence:"…conveying the true meaning without the insult, and the talks went on.", rationale:"By removing the sting while keeping the meaning, she let the talks continue." }
      ]},
      { title:"The Last Diary Entry", passage:"The mountaineer's diary, recovered from the snow, grew fainter and shakier near the end as supplies ran out. Yet the final entries spoke only of his companions, urging them to go on without him to safety. The last line read: 'I have slowed them long enough. They must reach the camp.'", questions:[

        { q:"Why did the handwriting grow fainter and shakier?", opts:["He was weakening as supplies ran out","He wrote in the dark","The pen was old"], correct:0, evidence:"…grew fainter and shakier near the end as supplies ran out.", rationale:"Failing strength as supplies ran out made his writing falter." },
        { q:"Why does his focus on his companions reveal his character?", opts:["He cared more for their lives than his own","He was forgetful","He blamed them"], correct:0, evidence:"Yet the final entries spoke only of his companions…", rationale:"Thinking only of their safety shows he put them before himself." }
      ]},
      { title:"The Mended Feud", passage:"Two families had not spoken for three generations over a quarrel no one could now recall. When the river flooded, Aria saw the rival family's children stranded on a roof, frightened and cold. Without a second thought, she launched her boat to rescue them.", questions:[
        { q:"Why did Aria rescue the rival family's children?", opts:["They were stranded and in danger","She wanted their boat","She was paid to"], correct:0, evidence:"…the rival family's children stranded on a roof, frightened and cold.", rationale:"The children's danger moved her to rescue them at once." },
        { q:"Why is it striking that she helped this family?", opts:["The two families had feuded for generations","They were her cousins","She lived with them"], correct:0, evidence:"Two families had not spoken for three generations…", rationale:"Helping a family she'd feuded with for generations makes it striking." },
        { q:"Why does 'without a second thought' matter here?", opts:["She put saving lives above the old feud instantly","She hesitated for hours","She forgot the danger"], correct:0, evidence:"Without a second thought, she launched her boat to rescue them.", rationale:"Acting instantly shows she valued their lives above the ancient quarrel." }

      { title:"The Conductor's Mercy", passage:"Moments before the concert, the young soloist confessed that her hands were shaking too much to play the demanding piece. The hall was full and the programme already printed. The conductor simply smiled, rearranged the order so a gentler piece came first, and gave her time to settle.", questions:[

let currentYear = 1;
let currentSet = 'fiction';
let currentIdx = 0;
let answers = {};
let score = 0;
let answered = 0;
let activePassages = [];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildActivePassages() {
  const source = DATA[currentYear][currentSet];
  activePassages = shuffle(source).map(p => {
    const questions = p.questions.map(q => {
      const paired = q.opts.map((opt, i) => ({ opt, isCorrect: i === q.correct }));
      const shuffled = shuffle(paired);
      return {
        q: q.q,
        opts: shuffled.map(x => x.opt),
        correct: shuffled.findIndex(x => x.isCorrect),
        evidence: q.evidence,
        rationale: q.rationale
      };
    });
    return { title: p.title, passage: p.passage, questions };
  });
}

function getPassages() { return activePassages; }

function updateScoreChip() {
  document.getElementById('scoreChip').textContent = 'Score: ' + score + ' / ' + answered;
}

function updateProgress() {
  const passages = getPassages();
  const pct = Math.round((currentIdx / passages.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = 'Passage ' + (currentIdx + 1) + ' of ' + passages.length;
}

function switchYear(y) {
  currentYear = y;
  currentSet = 'fiction';
  currentIdx = 0;
  answers = {};
  score = 0;
  answered = 0;
  buildActivePassages();
  document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('year-btn-' + y).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-fiction').classList.add('active');
  updateScoreChip();
  render();
}

function switchSet(s) {
  currentSet = s;
  currentIdx = 0;
  answers = {};
  score = 0;
  answered = 0;
  buildActivePassages();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + s).classList.add('active');
  updateScoreChip();
  render();
}

function render() {
  const passages = getPassages();
  updateProgress();

  if (passages.length === 0) {
    document.getElementById('progressLabel').textContent = 'No passages yet';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('mainContent').innerHTML = `
      <div class="complete-screen">
        <div class="complete-emoji">📝</div>
        <h2 class="complete-title">Coming soon</h2>
        <p class="complete-sub">Year ${currentYear} ${currentSet} passages haven't been added yet.</p>
      </div>`;
    return;
  }

  if (currentIdx >= passages.length) { renderComplete(); return; }

  const p = passages[currentIdx];
  const key = currentYear + currentSet + currentIdx;
  const passageAnswers = answers[key] || {};
  const allDone = p.questions.every((_, i) => passageAnswers[i] !== undefined);

  const questionsHTML = p.questions.map((q, qi) => {
    const chosen = passageAnswers[qi];
    const isDone = chosen !== undefined;
    const isCorrect = isDone && chosen === q.correct;

    const optsHTML = q.opts.map((opt, oi) => {
      let cls = '';
      if (isDone) {
        if (oi === q.correct) cls = 'correct';
        else if (oi === chosen) cls = 'wrong';
      }
      return `<button class="opt-btn${cls ? ' ' + cls : ''}" ${isDone ? 'disabled' : ''} onclick="answer(${qi}, ${oi})">
        <span class="opt-letter">${['A','B','C'][oi]}</span>${opt}
      </button>`;
    }).join('');

    const feedbackHTML = isDone ? `
      <div class="feedback show">
        <div class="feedback-header ${isCorrect ? 'correct-h' : 'wrong-h'}">
          <span class="feedback-icon">${isCorrect ? '✓' : '✗'}</span>
          ${isCorrect ? 'Correct!' : 'The answer is: ' + q.opts[q.correct]}
        </div>
        <div class="feedback-body">
          <div class="fb-row"><span class="fb-label">Clue: </span><span class="fb-quote">"${q.evidence}"</span></div>
          <div class="fb-row"><span class="fb-label">Why: </span>${q.rationale}</div>
        </div>
      </div>` : '<div class="feedback"></div>';

    return `<div class="question-card${isDone ? ' answered' : ''}">
      <div class="q-label">Question ${qi + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      ${feedbackHTML}
    </div>`;
  }).join('');

  const isLast = currentIdx === passages.length - 1;
  const badgeLabel = currentSet === 'fiction' ? 'Fiction' : 'Non-fiction';

  document.getElementById('mainContent').innerHTML = `
    <div class="passage-card">
      <div class="passage-label">
        <span class="passage-badge">${badgeLabel}</span>
        <span class="passage-title-text">${p.title}</span>
      </div>
      <div class="passage-body">${p.passage}</div>
    </div>
    ${questionsHTML}
    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" ${currentIdx === 0 ? 'disabled' : ''}>← Back</button>
      <button class="nav-btn primary" onclick="next()" ${!allDone ? 'disabled' : ''}>
        ${isLast ? 'Finish ✓' : 'Next →'}
      </button>
    </div>`;
}

function answer(qi, oi) {
  const key = currentYear + currentSet + currentIdx;
  if (!answers[key]) answers[key] = {};
  if (answers[key][qi] !== undefined) return;
  answers[key][qi] = oi;
  answered++;
  if (oi === getPassages()[currentIdx].questions[qi].correct) score++;
  updateScoreChip();
  render();
}

function next() {
  const passages = getPassages();
  if (currentIdx < passages.length - 1) { currentIdx++; render(); }
  else { renderComplete(); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prev() {
  if (currentIdx > 0) { currentIdx--; render(); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderComplete() {
  const passages = getPassages();
  const total = passages.reduce((s, p) => s + p.questions.length, 0);
  const pct = Math.round((score / total) * 100);
  let emoji = '⭐';
  if (pct >= 90) emoji = '🏆';
  else if (pct >= 70) emoji = '🌟';
  else if (pct >= 50) emoji = '👍';

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'Complete!';

  document.getElementById('mainContent').innerHTML = `
    <div class="complete-screen">
      <div class="complete-emoji">${emoji}</div>
      <div class="complete-score">${score}/${total}</div>
      <div class="complete-label">${pct}% correct</div>
      <h2 class="complete-title">Well done!</h2>
      <p class="complete-sub">You finished all ${passages.length} Year ${currentYear} ${currentSet} passages.</p>
      <button class="nav-btn primary" onclick="restart()">Try again</button>
    </div>`;
}

function restart() {
  currentIdx = 0;
  answers = {};
  score = 0;
  answered = 0;
  buildActivePassages();
  updateScoreChip();
  render();
}

buildActivePassages();
render();
</script>
</body>
</html>
