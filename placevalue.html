<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Math Strand Review</title>
<style>
  :root{
    --bg:#f7f5ef; --surface:#ffffff; --surface2:#efece3; --tint:#fbfaf6;
    --text:#22211d; --text2:#6b6a63; --text3:#9a988e;
    --border:rgba(40,38,32,.10); --border2:rgba(40,38,32,.20);
    --accent:#c9622f; --accent-soft:#f7ece4; --accent-tx:#9c4a20;
    --info-bg:#e9f0f9; --info-tx:#1c4f86; --info-bd:#3f86d2;
    --ok-bg:#e9f3df; --ok-tx:#3a6411; --ok-bd:#6ba12a; --ok-soft:#f2f8ea;
    --bad-bg:#fbeae8; --bad-tx:#8d2a22; --bad-bd:#d9534a; --bad-soft:#fdf2f0;
    --rad:10px; --radlg:16px; --radpill:999px;
    --shadow:0 1px 2px rgba(40,38,32,.04), 0 4px 16px rgba(40,38,32,.05);
    --shadow-sm:0 1px 2px rgba(40,38,32,.05);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1d1c17; --surface:#28271f; --surface2:#34332a; --tint:#222119;
      --text:#efeee6; --text2:#b0aea4; --text3:#7d7c73;
      --border:rgba(255,255,255,.09); --border2:rgba(255,255,255,.18);
      --accent:#e0814f; --accent-soft:#3a2a1f; --accent-tx:#f0b48c;
      --info-bg:#16365c; --info-tx:#bcd8f7; --info-bd:#5fa0e0;
      --ok-bg:#2c4d12; --ok-tx:#cfe9ad; --ok-bd:#86b94a; --ok-soft:#26331a;
      --bad-bg:#5e211c; --bad-tx:#f3b9b3; --bad-bd:#e07a72; --bad-soft:#33201d;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.35);
      --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    }
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0;background:
      radial-gradient(120% 90% at 50% -10%, var(--tint), var(--bg) 60%) fixed;
    color:var(--text);font-family:var(--font);line-height:1.6;
    -webkit-font-smoothing:antialiased;padding:32px 16px 64px;}
  .wrap{max-width:680px;margin:0 auto;}

  .head{margin-bottom:22px;}
  .eyebrow{font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--accent-tx);font-weight:600;margin:0 0 6px;}
  h1{font-size:27px;font-weight:600;letter-spacing:-.02em;margin:0 0 4px;}
  .sub{font-size:15px;color:var(--text2);margin:0;}

  select,button,input{font-family:inherit;font-size:15px;color:var(--text);}

  /* selector bar */
  .selector{display:flex;flex-wrap:wrap;gap:14px;background:var(--surface);
    border:.5px solid var(--border);border-radius:var(--radlg);padding:16px 18px;
    box-shadow:var(--shadow);margin-bottom:18px;}
  .field{flex:1;min-width:170px;}
  .field label{display:block;font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--text3);font-weight:600;margin-bottom:7px;}
  .selwrap{position:relative;}
  .selwrap::after{content:"";position:absolute;right:14px;top:50%;width:8px;height:8px;
    border-right:2px solid var(--text3);border-bottom:2px solid var(--text3);
    transform:translateY(-65%) rotate(45deg);pointer-events:none;}
  select{appearance:none;-webkit-appearance:none;width:100%;height:44px;
    border:.5px solid var(--border2);border-radius:var(--rad);background:var(--tint);
    padding:0 36px 0 14px;font-weight:500;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
  select:hover{border-color:var(--border2);}
  select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}

  /* segmented tabs */
  .tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radpill);
    padding:4px;margin-bottom:20px;}
  .tab{flex:1;border:none;background:transparent;border-radius:var(--radpill);
    padding:9px 8px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:7px;
    transition:color .18s,background .18s,box-shadow .18s;}
  .tab svg{width:16px;height:16px;}
  .tab[aria-selected="true"]{background:var(--surface);color:var(--text);
    box-shadow:var(--shadow-sm);}
  .tab:hover:not([aria-selected="true"]){color:var(--text);}

  /* context pills */
  .ctx{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .pill{font-size:12px;font-weight:500;padding:5px 12px;border-radius:var(--radpill);
    display:inline-flex;align-items:center;gap:6px;}
  .pill.strand{background:var(--accent-soft);color:var(--accent-tx);}
  .pill.year{background:var(--surface2);color:var(--text2);}
  .pill.count{background:transparent;color:var(--text3);margin-left:auto;border:.5px solid var(--border);}

  /* cards */
  .card{background:var(--surface);border:.5px solid var(--border);
    border-radius:var(--radlg);box-shadow:var(--shadow);}

  /* guide */
  .obj{display:flex;gap:14px;padding:18px 20px;border:.5px solid var(--border);
    background:var(--surface);border-radius:var(--radlg);box-shadow:var(--shadow-sm);
    margin-bottom:12px;transition:transform .12s,box-shadow .15s;}
  .obj:hover{box-shadow:var(--shadow);}
  .obj .num{width:28px;height:28px;border-radius:50%;flex-shrink:0;
    background:var(--accent-soft);color:var(--accent-tx);font-size:13px;font-weight:600;
    display:flex;align-items:center;justify-content:center;}
  .obj h3{font-size:16px;font-weight:600;margin:2px 0 4px;}
  .obj p{font-size:14px;color:var(--text2);margin:0 0 12px;}
  .ex{display:flex;gap:8px;align-items:flex-start;background:var(--info-bg);
    color:var(--info-tx);border-radius:var(--rad);padding:9px 12px;font-size:14px;}
  .ex svg{width:15px;height:15px;flex-shrink:0;margin-top:3px;}
  .ex b{font-weight:600;margin-right:2px;}

  /* progress */
  .prog{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
  .bar{flex:1;height:8px;border-radius:var(--radpill);background:var(--surface2);overflow:hidden;}
  .bar>i{display:block;height:100%;border-radius:var(--radpill);
    background:linear-gradient(90deg,var(--accent),#e0894f);width:0;transition:width .35s cubic-bezier(.4,0,.2,1);}
  .count-txt{font-size:13px;color:var(--text2);white-space:nowrap;font-variant-numeric:tabular-nums;}
  .count-txt b{color:var(--text);font-weight:600;}

  /* question card */
  .qcard{padding:24px 26px;}
  .qtype{display:inline-block;font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--accent-tx);background:var(--accent-soft);font-weight:600;
    padding:4px 10px;border-radius:var(--radpill);margin-bottom:14px;}
  .qtext{font-size:19px;font-weight:600;line-height:1.45;margin:0 0 20px;letter-spacing:-.01em;}

  /* options */
  .opts{display:grid;gap:9px;}
  .opt{display:flex;align-items:center;gap:12px;text-align:left;width:100%;margin:0;
    padding:13px 15px;font-size:15px;background:var(--surface);
    border:1.5px solid var(--border2);border-radius:var(--rad);cursor:pointer;
    transition:border-color .14s,background .14s,transform .05s;}
  .opt:hover:not(:disabled){border-color:var(--accent);background:var(--tint);}
  .opt:active:not(:disabled){transform:scale(.99);}
  .opt:disabled{cursor:default;}
  .opt .badge{width:26px;height:26px;border-radius:7px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;
    background:var(--surface2);color:var(--text2);transition:background .14s,color .14s;}
  .opt .tick{width:20px;height:20px;border-radius:6px;flex-shrink:0;
    border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;
    font-size:13px;transition:border-color .14s,background .14s;}
  .opt.sel{border-color:var(--accent);background:var(--accent-soft);}
  .opt.sel .badge{background:var(--accent);color:#fff;}
  .opt.sel .tick{border-color:var(--accent);background:var(--accent);color:#fff;}
  .opt.ok{border-color:var(--ok-bd);background:var(--ok-soft);color:var(--ok-tx);}
  .opt.ok .badge,.opt.ok .tick{background:var(--ok-bd);color:#fff;border-color:var(--ok-bd);}
  .opt.no{border-color:var(--bad-bd);background:var(--bad-soft);color:var(--bad-tx);}
  .opt.no .badge,.opt.no .tick{background:var(--bad-bd);color:#fff;border-color:var(--bad-bd);}
  .opt .txt{flex:1;}

  input[type=text]{width:100%;height:48px;border:1.5px solid var(--border2);
    border-radius:var(--rad);background:var(--tint);padding:0 16px;font-size:16px;
    transition:border-color .14s,box-shadow .14s;}
  input[type=text]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}

  /* order chips */
  .order{display:flex;flex-direction:column;gap:9px;}
  .chip{display:flex;align-items:center;gap:12px;padding:11px 14px;
    border:1.5px solid var(--border2);background:var(--surface);border-radius:var(--rad);font-size:15px;}
  .chip .lbl{flex:1;font-weight:500;}
  .chip .grip{color:var(--text3);font-size:14px;}
  .mv{width:34px;height:32px;border-radius:8px;border:.5px solid var(--border2);
    background:var(--tint);display:flex;align-items:center;justify-content:center;
    padding:0;cursor:pointer;color:var(--text2);transition:background .14s;}
  .mv:hover:not(:disabled){background:var(--surface2);color:var(--text);}
  .mv:disabled{opacity:.4;cursor:default;}
  .mv svg{width:14px;height:14px;}
  .hint{font-size:12px;color:var(--text3);margin:10px 0 0;}

  /* feedback */
  .fb{display:none;margin-top:18px;padding:13px 15px;border-radius:var(--rad);
    font-size:14px;line-height:1.55;border-left:3px solid transparent;}
  .fb.ok{background:var(--ok-bg);color:var(--ok-tx);border-left-color:var(--ok-bd);}
  .fb.no{background:var(--bad-bg);color:var(--bad-tx);border-left-color:var(--bad-bd);}
  .fb b{font-weight:600;}

  /* action buttons */
  .actions{display:flex;gap:10px;margin-top:22px;}
  .btn{flex:1;border:none;border-radius:var(--rad);padding:13px 16px;font-size:15px;
    font-weight:600;cursor:pointer;transition:filter .14s,transform .05s,background .14s;}
  .btn:active:not(:disabled){transform:scale(.99);}
  .btn:disabled{opacity:.45;cursor:default;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover:not(:disabled){filter:brightness(1.06);}
  .btn-ghost{flex:0 0 auto;background:var(--surface2);color:var(--text2);width:48px;
    display:flex;align-items:center;justify-content:center;padding:0;}
  .btn-ghost:hover{color:var(--text);}
  .btn-ghost svg{width:18px;height:18px;}

  /* result */
  .result{padding:32px 26px;text-align:center;}
  .scorering{width:96px;height:96px;margin:0 auto 16px;position:relative;}
  .scorering svg{transform:rotate(-90deg);}
  .scorering .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:700;letter-spacing:-.02em;}
  .result h3{font-size:20px;font-weight:600;margin:0 0 6px;}
  .result p{font-size:14px;color:var(--text2);margin:0 0 22px;}

  .empty{text-align:center;padding:48px 20px;color:var(--text3);}
  .empty svg{width:34px;height:34px;opacity:.5;margin-bottom:10px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="head">
    <p class="eyebrow" id="strand-eyebrow">Maths mastery</p>
    <h1 id="strand-title">Strand review</h1>
    <p class="sub">Choose a year, then learn from the guide, test yourself, or work through a randomized practice set.</p>
  </header>

  <div class="selector">
    <div class="field">
      <label for="year">Year group</label>
      <div class="selwrap"><select id="year"></select></div>
    </div>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab" id="tab-guide" role="tab" aria-selected="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Guide
    </button>
    <button class="tab" id="tab-quiz" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      Quiz
    </button>
    <button class="tab" id="tab-practice" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Practice
    </button>
  </div>

  <div class="ctx">
    <span class="pill year" id="ctx-year"></span>
    <span class="pill count" id="ctx-count"></span>
  </div>

  <div id="guide-view"></div>

  <div id="quiz-view" style="display:none;">
    <div class="prog">
      <div class="bar"><i id="q-bar"></i></div>
      <span class="count-txt"><b id="q-num">1</b> / <span id="q-tot">5</span></span>
    </div>
    <div class="card qcard">
      <span id="q-type" class="qtype"></span>
      <p id="q-text" class="qtext"></p>
      <div id="q-body"></div>
      <div id="q-fb" class="fb"></div>
      <div class="actions">
        <button id="q-check" class="btn btn-primary">Check answer</button>
        <button id="q-next" class="btn btn-primary" style="display:none;">Next</button>
        <button id="q-reset" class="btn btn-ghost" aria-label="Restart quiz"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
      </div>
    </div>
    <div id="q-result" style="display:none;"></div>
  </div>

  <div id="practice-view" style="display:none;">
    <div class="prog">
      <div class="bar"><i id="p-bar"></i></div>
      <span class="count-txt"><b id="p-num">1</b> / <span id="p-tot">40</span></span>
    </div>
    <div class="card qcard">
      <span class="qtype">Practice</span>
      <p id="p-text" class="qtext"></p>
      <div id="p-opts" class="opts"></div>
      <div id="p-fb" class="fb"></div>
      <div class="actions">
        <button id="p-next" class="btn btn-primary" disabled>Next</button>
        <button id="p-reset" class="btn btn-ghost" aria-label="Restart practice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
      </div>
    </div>
    <div id="p-result" style="display:none;"></div>
  </div>
</div>

<script>
/* ============================================================
   MATH STRAND REVIEW — DATA
   Edit this object to add strands, years, guide objectives,
   quiz questions and practice problems.

   Strand: { label, years: { N: { objectives[], quiz[], practiceMC[] } } }
   Guide objective: { skill, explain, example }
   Quiz item types:
     mc    { type:"mc",   q, options[], answer:index, why }
     tf    { type:"tf",   q, answer:true|false, why }
     fill  { type:"fill", q, accept:[...], why }
     multi { type:"multi",q, options[], answer:[indices], why }
     order { type:"order",q, items:[correct order], why }
   Practice item (always multiple choice):
     { q, options[], answer:index, why }
   Question order AND answer-option order are randomized automatically.
   ============================================================ */
const DATA = {
  number: {
    label: "Number & place value",
    years: {
      1: {
        objectives: [
          { skill: "Recite numbers to 100", explain: "Recite numbers in order to 100, forwards and backwards, from 0, 1 or any given number.", example: "1, 2, 3 \u00b7 100, 99, 98 \u00b7 47, 48, 49 \u2026" },
          { skill: "Estimate and count to 50", explain: "Estimate a set of objects and count to check how many, up to 50.", example: "Guess, then count the counters to check." },
          { skill: "Represent numbers to 20", explain: "Represent numbers with objects, pictures, number lines, sounds and actions to 20, matching one-to-one.", example: "Five claps = the numeral 5." },
          { skill: "Read and write 1 to 20", explain: "Read and write numbers from 1 to 20 in numerals and words.", example: "1 one, 2 two, 3 three, 4 four" },
          { skill: "Zero as the empty set", explain: "Understand and use 0 to represent the empty set.", example: "An empty box holds 0 cubes." },
          { skill: "Compare and order to 20", explain: "Compare and order numbers up to 20, say a number between two, and begin ordinal numbers.", example: "14, 15, 16 \u00b7 5, 6, 7" },
          { skill: "Teen numbers are 10 and some 1s", explain: "Recognise teen numbers as one 10 and some 1s, and use this to compare.", example: "13 = 10 + 3 \u00b7 16 = 10 + 6" },
          { skill: "Locate numbers on a bead string", explain: "Locate 2-digit numbers on a bead string, a 1\u2013100 grid and a beaded line.", example: "Find 24 by counting in 10s then 1s." },
          { skill: "Language of comparison", explain: "Use equal to, more than, less than (fewer), most and least to compare.", example: "21 is more than 9. 15 is least, 41 is most." },
          { skill: "Count, read and write to 100", explain: "Count, read and write numbers to 100 in numerals.", example: "1, 2, 3, 4 \u2026" },
          { skill: "Estimate then count by grouping", explain: "Estimate a quantity within a range, then count by grouping in 10s and 5s.", example: "10, 20, 30, 8 \u2192 38 leaves." },
          { skill: "2-digit numbers as 10s and 1s", explain: "Begin to see two-digit numbers as some 10s and some 1s.", example: "52 = 50 + 2 \u00b7 64 = 60 + 4" },
          { skill: "One more, one less to 100", explain: "Identify one more and one less than any number up to 100.", example: "1 more than 56 is 57, 1 less is 55." },
          { skill: "Count in 2s, 5s and 10s", explain: "Count in 2s to 20, 5s to 50, and 10s to 100 and back.", example: "2,4,6\u2026 \u00b7 5,10,15\u2026 \u00b7 10,20,30\u2026" },
          { skill: "Count on/back in 10s from any number", explain: "Count on and back in 10s to and from any number up to 100.", example: "14, 24, 34 \u2026 \u00b7 75, 65, 55 \u2026" },
          { skill: "Compare and order 2-digit numbers", explain: "Compare and order two-digit numbers and say a number between two.", example: "89 is bigger than 78 \u2014 more 10s." },
          { skill: "1 or 10 more / 1 or 10 less", explain: "Say 1 or 10 more, or 1 or 10 less, than any number up to 100.", example: "10 more than 33 is 43, 10 less is 23." },
          { skill: "Patterns on a 100-square", explain: "Identify patterns on a 100-square.", example: "Each column goes up in 10s." },
          { skill: "Patterns in 2s and 5s", explain: "Count in 2s (end in 0,2,4,6,8) and 5s (end in 0 or 5), spotting patterns.", example: "\u202622,24,26\u2026 \u00b7 \u202645,50,55\u2026" },
          { skill: "How many 10s and 1s", explain: "Say how many 10s and 1s in a given two-digit number.", example: "58 = 50 + 8 \u2192 five 10s, eight 1s." }
        ],
        quiz: [
          { type:"mc", q:"An empty box has no cubes in it. How many cubes is that?", options:["0","1","10","none of these"], answer:0, why:"Zero (0) represents the empty set \u2014 nothing there." },
          { type:"fill", q:"Type the number that comes between 11 and 13.", accept:["12","twelve"], why:"12 sits between 11 and 13." },
          { type:"tf", q:"16 is the same as 10 + 6.", answer:true, why:"16 = 10 + 6: one 10 and six 1s." },
          { type:"order", q:"Put these in order, smallest to largest.", items:["15","28","37","41"], why:"In order: 15, 28, 37, 41." },
          { type:"mc", q:"52 is made of how many 10s and 1s?", options:["5 tens and 2 ones","2 tens and 5 ones","52 tens","5 ones and 2 tens"], answer:0, why:"52 = 50 + 2." },
          { type:"fill", q:"What is one more than 56?", accept:["57","fifty-seven","fifty seven"], why:"One more than 56 is 57." },
          { type:"fill", q:"Count in 2s: 12, 14, 16, __ ?", accept:["18","eighteen"], why:"Adding 2 to 16 gives 18." },
          { type:"tf", q:"The next number after 40 when counting in 5s is 44.", answer:false, why:"Counting in 5s, 40 is followed by 45." },
          { type:"multi", q:"Which of these are multiples of 10? (Pick all that apply.)", options:["30","45","70","58"], answer:[0,2], why:"30 and 70 end in 0." },
          { type:"fill", q:"What is 10 more than 33?", accept:["43","forty-three","forty three"], why:"10 more than 33 is 43." },
          { type:"tf", q:"89 is bigger than 78 because it has more 10s.", answer:true, why:"89 has 8 tens versus 7 tens." },
          { type:"multi", q:"A multiple of 5 can end in which digits? (Pick all that apply.)", options:["0","2","5","8"], answer:[0,2], why:"Multiples of 5 end in 0 or 5." },
          { type:"multi", q:"Which of these are even (multiples of 2)? (Pick all that apply.)", options:["6","9","14","21"], answer:[0,2], why:"Even numbers end in 0,2,4,6,8." },
          { type:"order", q:"Put these in counting order, starting from 10.", items:["10","20","30","40"], why:"Counting in 10s: 10, 20, 30, 40." },
          { type:"mc", q:"How many 10s and 1s are in 58?", options:["8 tens and 5 ones","5 tens and 8 ones","58 tens","5 ones and 8 tens"], answer:1, why:"58 = 50 + 8." }
        ],
        practiceMC: [

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function shuffledOptions(opts){const order=shuffle(opts.map((_,i)=>i));return {labels:order.map(i=>opts[i]),order};}
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function ring(pct){const c=2*Math.PI*42,off=c*(1-pct/100);return '<div class="scorering"><svg width="96" height="96" viewBox="0 0 96 96"><circle cx="48" cy="48" r="42" fill="none" stroke="var(--surface2)" stroke-width="8"/><circle cx="48" cy="48" r="42" fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'"/></svg><div class="pct">'+pct+'%</div></div>';}
const TICK='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
const REDO='<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>';

function initStrand(){curStrand=sKeys()[0];const s=DATA[curStrand];el('strand-title').textContent=s.label;el('strand-eyebrow').textContent='Maths mastery';}
function fillYears(){yearSel.innerHTML='';yKeys(curStrand).forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent='Year '+y;yearSel.appendChild(o);});if(!DATA[curStrand].years[curYear])curYear=yKeys(curStrand)[0];yearSel.value=curYear;}
function setTabs(){[[tabGuide,'guide'],[tabQuiz,'quiz'],[tabPractice,'practice']].forEach(([t,m])=>t.setAttribute('aria-selected',mode===m));guideView.style.display=mode==='guide'?'block':'none';quizView.style.display=mode==='quiz'?'block':'none';practiceView.style.display=mode==='practice'?'block':'none';}
function setContext(){el('ctx-year').textContent='Year '+curYear;const n=node();let c;if(mode==='guide')c=(n.objectives||[]).length+' objectives';else if(mode==='quiz')c=(n.quiz||[]).length+' questions';else c=(n.practiceMC||[]).length+' problems';el('ctx-count').textContent=c;}

function renderGuide(){const obj=node().objectives||[];guideView.innerHTML='';if(!obj.length){guideView.innerHTML='<div class="card empty">No objectives added for this year yet.</div>';return;}obj.forEach((it,i)=>{const c=document.createElement('div');c.className='obj';c.innerHTML='<div class="num">'+(i+1)+'</div><div style="flex:1;"><h3>'+esc(it.skill)+'</h3><p>'+esc(it.explain)+'</p><div class="ex"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2z"/></svg><span><b>Example:</b>'+esc(it.example)+'</span></div></div>';guideView.appendChild(c);});}

function startPractice(){const list=practiceMC();pOrder=shuffle(list.map((_,i)=>i));pIdx=0;pCorrect=0;renderPractice();setContext();}
function renderPractice(){const list=practiceMC();el('p-result').style.display='none';el('p-result').innerHTML='';const card=practiceView.querySelector('.qcard');card.style.display='block';practiceView.querySelector('.prog').style.display='flex';if(!list.length){card.style.display='none';return;}const item=list[pOrder[pIdx]];pAnswered=false;el('p-tot').textContent=list.length;el('p-num').textContent=pIdx+1;el('p-bar').style.width=Math.round(pIdx/list.length*100)+'%';el('p-text').textContent=item.q;const fb=el('p-fb');fb.style.display='none';fb.className='fb';const nb=el('p-next');nb.disabled=true;nb.textContent=(pIdx+1>=list.length)?'See result':'Next question';const opts=el('p-opts');opts.innerHTML='';const sh=shuffledOptions(item.options);pOptOrder=sh.order;sh.labels.forEach((opt,d)=>{const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="badge">'+LETTERS[d]+'</span><span class="txt">'+esc(opt)+'</span>';b.onclick=()=>pChoose(d,item,b);opts.appendChild(b);});}
function pChoose(d,item,btn){if(pAnswered)return;pAnswered=true;const opts=el('p-opts').children;const chosen=pOptOrder[d];if(chosen===item.answer)pCorrect++;for(let j=0;j<opts.length;j++){opts[j].onclick=null;opts[j].disabled=true;const o=pOptOrder[j];if(o===item.answer)opts[j].classList.add('ok');else if(j===d)opts[j].classList.add('no');}const fb=el('p-fb');const ok=chosen===item.answer;fb.className='fb '+(ok?'ok':'no');fb.style.display='block';fb.innerHTML='<b>'+(ok?'Correct. ':'Not quite. ')+'</b>'+esc(item.why);el('p-next').disabled=false;}
function pShowResult(){const list=practiceMC(),pct=Math.round(pCorrect/list.length*100);practiceView.querySelector('.qcard').style.display='none';practiceView.querySelector('.prog').style.display='none';const r=el('p-result');r.style.display='block';r.className='card result';r.innerHTML=ring(pct)+'<h3>Practice complete</h3><p>You scored '+pCorrect+' of '+list.length+' on '+esc(DATA[curStrand].label)+', Year '+curYear+'.</p><button id="p-again" class="btn btn-primary" style="width:100%;">'+REDO+'Shuffle &amp; try again</button>';el('p-again').onclick=startPractice;}

function startQuiz(){qIdx=0;correct=0;renderQuiz();setContext();}
function renderQuiz(){const quiz=quizList();el('q-result').style.display='none';el('q-result').innerHTML='';const card=quizView.querySelector('.qcard');card.style.display='block';quizView.querySelector('.prog').style.display='flex';if(!quiz.length){card.style.display='none';return;}const item=quiz[qIdx];answered=false;sel=[];el('q-tot').textContent=quiz.length;el('q-num').textContent=qIdx+1;el('q-bar').style.width=Math.round(qIdx/quiz.length*100)+'%';el('q-type').textContent=TYPE_LABEL[item.type]||'';el('q-text').textContent=item.q;const fb=el('q-fb');fb.style.display='none';fb.className='fb';el('q-check').style.display='block';el('q-check').disabled=false;el('q-next').style.display='none';el('q-next').textContent=(qIdx+1>=quiz.length)?'See result':'Next';buildBody(item);}
function buildBody(item){const body=el('q-body');body.innerHTML='';qOptOrder=null;
  if(item.type==='mc'||item.type==='multi'){const sh=shuffledOptions(item.options);qOptOrder=sh.order;const grid=document.createElement('div');grid.className='opts';sh.labels.forEach((opt,d)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=item.type==='multi'?'<span class="tick"></span><span class="txt">'+esc(opt)+'</span>':'<span class="badge">'+LETTERS[d]+'</span><span class="txt">'+esc(opt)+'</span>';b.onclick=()=>{if(item.type==='mc'){sel=[d];[...grid.children].forEach((c,j)=>c.classList.toggle('sel',j===d));}else{const k=sel.indexOf(d);if(k<0)sel.push(d);else sel.splice(k,1);const on=sel.includes(d);b.classList.toggle('sel',on);b.querySelector('.tick').innerHTML=on?TICK:'';}};grid.appendChild(b);});body.appendChild(grid);}
  else if(item.type==='tf'){const grid=document.createElement('div');grid.className='opts';['True','False'].forEach((opt,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="badge">'+(i===0?'T':'F')+'</span><span class="txt">'+opt+'</span>';b.onclick=()=>{sel=[i];[...grid.children].forEach((c,j)=>c.classList.toggle('sel',j===i));};grid.appendChild(b);});body.appendChild(grid);}
  else if(item.type==='fill'){const inp=document.createElement('input');inp.type='text';inp.id='q-input';inp.placeholder='Type your answer\u2026';inp.autocomplete='off';inp.onkeydown=e=>{if(e.key==='Enter')el('q-check').click();};body.appendChild(inp);setTimeout(()=>inp.focus(),50);}
  else if(item.type==='order'){const wrap=document.createElement('div');wrap.id='q-order';wrap.className='order';shuffle(item.items).forEach(t=>{const row=document.createElement('div');row.className='chip';row.dataset.t=t;row.innerHTML='<span class="grip">\u2630</span><span class="lbl">'+esc(t)+'</span>';const ctr=document.createElement('div');ctr.style.cssText='display:flex;gap:5px;';const up=document.createElement('button');up.className='mv';up.setAttribute('aria-label','Move up');up.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>';up.onclick=()=>{if(row.previousElementSibling)wrap.insertBefore(row,row.previousElementSibling);};const dn=document.createElement('button');dn.className='mv';dn.setAttribute('aria-label','Move down');dn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';dn.onclick=()=>{if(row.nextElementSibling)wrap.insertBefore(row.nextElementSibling,row);};ctr.appendChild(up);ctr.appendChild(dn);row.appendChild(ctr);wrap.appendChild(row);});body.appendChild(wrap);const hint=document.createElement('p');hint.className='hint';hint.textContent='Use the arrows to reorder.';body.appendChild(hint);}}
function check(){if(answered)return;const item=quizList()[qIdx];let ok=false;
  if(item.type==='mc'){if(!sel.length)return;ok=qOptOrder[sel[0]]===item.answer;markMapped(item.answer,sel[0]);}
  else if(item.type==='tf'){if(!sel.length)return;const ci=item.answer?0:1;ok=sel[0]===ci;markTF(ci,sel[0]);}
  else if(item.type==='multi'){if(!sel.length)return;const c=sel.map(d=>qOptOrder[d]);ok=[...c].sort().join(',')===[...item.answer].sort().join(',');markMultiMapped(item.answer);}
  else if(item.type==='fill'){const v=(el('q-input').value||'').trim().toLowerCase();if(!v)return;ok=item.accept.map(s=>s.toLowerCase()).includes(v);el('q-input').disabled=true;el('q-input').style.borderColor=ok?'var(--ok-bd)':'var(--bad-bd)';}
  else if(item.type==='order'){const cur=[...el('q-order').children].map(c=>c.dataset.t);ok=cur.join('|')===item.items.join('|');markOrder(item.items);}
  answered=true;if(ok)correct++;const fb=el('q-fb');fb.className='fb '+(ok?'ok':'no');fb.style.display='block';let extra=item.why;if(!ok&&item.type==='fill')extra='The answer is '+item.accept[0]+'. '+item.why;fb.innerHTML='<b>'+(ok?'Correct. ':'Not quite. ')+'</b>'+esc(extra);el('q-check').style.display='none';el('q-next').style.display='block';}
function markMapped(ans,ch){const g=el('q-body').firstChild.children;for(let j=0;j<g.length;j++){g[j].disabled=true;g[j].classList.remove('sel');if(qOptOrder[j]===ans)g[j].classList.add('ok');else if(j===ch)g[j].classList.add('no');}}
function markTF(ci,ch){const g=el('q-body').firstChild.children;for(let j=0;j<g.length;j++){g[j].disabled=true;g[j].classList.remove('sel');if(j===ci)g[j].classList.add('ok');else if(j===ch)g[j].classList.add('no');}}
function markMultiMapped(ans){const g=el('q-body').firstChild.children;for(let j=0;j<g.length;j++){g[j].disabled=true;g[j].classList.remove('sel');if(ans.includes(qOptOrder[j]))g[j].classList.add('ok');else if(sel.includes(j))g[j].classList.add('no');}}
function markOrder(arr){const w=el('q-order');[...w.children].forEach((c,i)=>{c.querySelectorAll('button').forEach(b=>b.disabled=true);c.style.borderColor=c.dataset.t===arr[i]?'var(--ok-bd)':'var(--bad-bd)';c.style.background=c.dataset.t===arr[i]?'var(--ok-soft)':'var(--bad-soft)';});}
function showResult(){const quiz=quizList(),pct=Math.round(correct/quiz.length*100);quizView.querySelector('.qcard').style.display='none';quizView.querySelector('.prog').style.display='none';const r=el('q-result');r.style.display='block';r.className='card result';r.innerHTML=ring(pct)+'<h3>Quiz complete</h3><p>You scored '+correct+' of '+quiz.length+' on '+esc(DATA[curStrand].label)+', Year '+curYear+'.</p><button id="q-again" class="btn btn-primary" style="width:100%;">'+REDO+'Try again</button>';el('q-again').onclick=startQuiz;}

function render(){fillYears();setTabs();setContext();if(mode==='guide')renderGuide();else if(mode==='quiz')renderQuiz();else renderPractice();}
el('q-check').onclick=check;
el('q-next').onclick=()=>{const quiz=quizList();if(qIdx+1>=quiz.length){el('q-bar').style.width='100%';showResult();return;}qIdx++;renderQuiz();};
el('q-reset').onclick=startQuiz;
el('p-next').onclick=()=>{const list=practiceMC();if(pIdx+1>=list.length){el('p-bar').style.width='100%';pShowResult();return;}pIdx++;renderPractice();};
el('p-reset').onclick=startPractice;
tabGuide.onclick=()=>{mode='guide';render();};
tabQuiz.onclick=()=>{mode='quiz';startQuiz();render();};
tabPractice.onclick=()=>{mode='practice';startPractice();render();};
yearSel.onchange=()=>{curYear=yearSel.value;render();};
initStrand();curYear=yKeys(curStrand)[0];render();
</script>
