<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Review — Years 1–6</title>
<style>
/* ============================================================
   THEME — editorial schoolbook aesthetic, warm paper + ink
   ============================================================ */
:root{
  --paper:#f4efe6;
  --paper-2:#ece4d5;
  --ink:#26221c;
  --ink-soft:#5d564a;
  --accent:#c0492f;     /* red pencil */
  --accent-2:#2f6b4f;   /* green tick */
  --line:#d8cdb8;
  --gold:#b8893b;
  --shadow:rgba(38,34,28,.12);
  --good:#2f6b4f;
  --bad:#c0492f;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  background:
    radial-gradient(circle at 20% 10%, #faf6ee 0, transparent 55%),
    repeating-linear-gradient(0deg, transparent 0 31px, rgba(192,73,47,.05) 31px 32px),
    var(--paper);
  color:var(--ink);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 80px}

/* ---------- Header ---------- */
header.masthead{
  border-bottom:3px double var(--ink);
  padding-bottom:14px;margin-bottom:22px;
  display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.masthead h1{
  font-size:clamp(28px,5vw,42px);
  letter-spacing:-.5px;font-weight:800;line-height:1;
}
.masthead h1 em{color:var(--accent);font-style:italic}
.masthead .sub{
  font-size:13px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink-soft);font-family:ui-monospace,"SF Mono",Menlo,monospace;
}
.scorebox{
  text-align:right;font-family:ui-monospace,Menlo,monospace;
  font-size:13px;color:var(--ink-soft);
}
.scorebox b{font-size:22px;color:var(--ink);display:block;font-family:inherit}
.hud{display:flex;align-items:flex-end;gap:18px}
.timer{text-align:right;font-family:ui-monospace,Menlo,monospace;font-size:13px;color:var(--ink-soft)}
.timer .clock{font-size:22px;color:var(--ink);display:block;font-weight:700;font-variant-numeric:tabular-nums}
.timer.warn .clock{color:var(--accent);animation:pulse 1s ease infinite}
.timer.danger .clock{color:#fff;background:var(--accent);padding:0 8px;border-radius:6px;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* ---------- Mode tabs ---------- */
.modes{display:flex;gap:8px;margin-bottom:20px}
.modes button{
  flex:1;padding:12px;border:2px solid var(--ink);background:transparent;
  font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;
  border-radius:var(--radius);transition:.15s;color:var(--ink);
}
.modes button[aria-selected="true"]{background:var(--ink);color:var(--paper)}
.modes button:hover{transform:translateY(-1px)}

/* ---------- Year selector ---------- */
.years{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.years .ylabel{
  width:100%;font-size:12px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-soft);margin-bottom:2px;
}
.years button{
  width:48px;height:48px;border-radius:50%;border:2px solid var(--line);
  background:var(--paper-2);font-family:inherit;font-size:17px;font-weight:700;
  cursor:pointer;transition:.15s;color:var(--ink-soft);position:relative;
}
.years button[aria-selected="true"]{
  border-color:var(--accent);color:var(--accent);background:#fff;
  box-shadow:0 3px 0 var(--accent);
}
.years button:hover{transform:translateY(-2px)}
.gp-count{font-size:12px;color:var(--ink-soft);margin:4px 0 18px;font-style:italic}

/* ---------- Card shared ---------- */
.card{
  background:#fffdf8;border:1px solid var(--line);border-radius:var(--radius);
  padding:26px;box-shadow:0 10px 30px -12px var(--shadow);position:relative;
}
.tag{
  display:inline-block;font-family:ui-monospace,Menlo,monospace;font-size:11px;
  letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:20px;
  background:var(--paper-2);color:var(--ink-soft);margin-bottom:14px;border:1px solid var(--line);
}
.tag .yr{color:var(--accent);font-weight:700}

/* ---------- Quiz ---------- */
.question{font-size:clamp(19px,3vw,24px);font-weight:600;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:10px}
.opt{
  text-align:left;padding:14px 16px;border:2px solid var(--line);background:var(--paper);
  border-radius:10px;font-family:inherit;font-size:17px;cursor:pointer;transition:.12s;
  color:var(--ink);display:flex;align-items:center;gap:12px;
}
.opt .key{
  font-family:ui-monospace,Menlo,monospace;font-size:13px;width:24px;height:24px;
  display:grid;place-items:center;border:1px solid var(--ink-soft);border-radius:6px;flex:none;
}
.opt:hover:not(:disabled){border-color:var(--ink);transform:translateX(3px)}
.opt.correct{border-color:var(--good);background:#eef6f0;color:var(--good)}
.opt.wrong{border-color:var(--bad);background:#fbeeeb;color:var(--bad)}
.opt:disabled{cursor:default}

.explain{
  margin-top:18px;padding:16px 18px;border-left:4px solid var(--accent);
  background:#fbf4ea;border-radius:0 10px 10px 0;font-size:16px;display:none;
}
.explain.show{display:block;animation:rise .25s ease}
.explain h4{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.explain .eg{display:block;margin-top:8px;font-style:italic;color:var(--ink-soft)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.qnav{display:flex;justify-content:space-between;align-items:center;margin-top:22px}
.qnav .prog{font-family:ui-monospace,Menlo,monospace;font-size:14px;color:var(--ink-soft)}
.btn{
  padding:11px 22px;border:2px solid var(--ink);background:var(--ink);color:var(--paper);
  font-family:inherit;font-size:16px;font-weight:700;border-radius:10px;cursor:pointer;transition:.15s;
}
.btn:hover{transform:translateY(-2px)}
.btn.ghost{background:transparent;color:var(--ink)}
.btn:disabled{opacity:.35;cursor:default;transform:none}

/* ---------- Flashcards ---------- */
.flash{perspective:1600px}
.flash-inner{
  position:relative;min-height:260px;transition:transform .55s cubic-bezier(.4,.2,.2,1);
  transform-style:preserve-3d;cursor:pointer;
}
.flash-inner.flipped{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);
  border:1px solid var(--line);background:#fffdf8;padding:28px;
  display:flex;flex-direction:column;justify-content:center;
  box-shadow:0 10px 30px -12px var(--shadow);
}
.face.back{transform:rotateY(180deg);background:#fbf4ea}
.face .point{font-size:clamp(24px,4vw,34px);font-weight:800;margin-bottom:6px}
.face .hint{color:var(--ink-soft);font-style:italic}
.face .defn{font-size:18px;margin-bottom:14px}
.face .eg{font-style:italic;color:var(--accent-2);border-top:1px dashed var(--line);padding-top:12px}
.flip-hint{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:12px;letter-spacing:.1em;text-transform:uppercase}

/* ---------- Results ---------- */
.results{text-align:center;padding:20px 0}
.results .big{font-size:clamp(46px,10vw,80px);font-weight:800;color:var(--accent);line-height:1}
.results p{font-size:18px;color:var(--ink-soft);margin:8px 0 22px}
/* results breakdown */
.donut{margin:0 auto 6px;display:block}
.split{display:flex;gap:10px;justify-content:center;margin:16px 0 8px;flex-wrap:wrap}
.split .chip{font-family:ui-monospace,Menlo,monospace;font-size:13px;padding:8px 14px;border-radius:24px;border:1px solid var(--line)}
.split .chip.ok{background:#eef6f0;color:var(--good);border-color:var(--good)}
.split .chip.no{background:#fbeeeb;color:var(--bad);border-color:var(--bad)}
.split .chip.skip{background:var(--paper-2);color:var(--ink-soft)}
.breakdown{text-align:left;margin:22px auto 0;max-width:520px}
.breakdown h3{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:12px;border-bottom:1px solid var(--line);padding-bottom:6px}
.brow{margin-bottom:12px}
.brow .top{display:flex;justify-content:space-between;font-size:15px;margin-bottom:4px}
.brow .top .frac{font-family:ui-monospace,Menlo,monospace;font-size:13px;color:var(--ink-soft)}
.bar{height:9px;border-radius:6px;background:var(--paper-2);overflow:hidden;display:flex}
.bar .seg-ok{background:var(--good)}
.bar .seg-no{background:var(--bad)}
.timeup{display:inline-block;background:var(--accent);color:#fff;font-family:ui-monospace,Menlo,monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:20px;margin-bottom:12px}
/* start screen */
.start{text-align:center}
.start-title{font-size:clamp(26px,4vw,36px);font-weight:800;margin:14px 0 18px}
.start-facts{list-style:none;max-width:430px;margin:0 auto 26px;text-align:left}
.start-facts li{padding:11px 0 11px 30px;border-bottom:1px dashed var(--line);position:relative;font-size:16px;color:var(--ink-soft)}
.start-facts li:last-child{border-bottom:none}
.start-facts li::before{content:"›";position:absolute;left:8px;top:10px;color:var(--accent);font-weight:800}
.start-facts li b{color:var(--ink)}
.start-btn{font-size:18px;padding:14px 34px}

.empty{text-align:center;color:var(--ink-soft);padding:50px 20px;font-style:italic}
footer{margin-top:30px;text-align:center;font-size:12px;color:var(--ink-soft);letter-spacing:.08em}
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div>
      <h1>The Grammar <em>Gazette</em></h1>
      <div class="sub">National Curriculum · Years 1–6</div>
    </div>
    <div class="hud">
      <div class="timer" id="timer" style="display:none"><span class="clock" id="clock">10:00</span><span class="tlabel">time left</span></div>
      <div class="scorebox" id="scorebox">
        <b id="scoreNum">0/0</b>
        session score
      </div>
    </div>
  </header>

       For flashcard review, each grammarPoint also reads from

  =================================================== -->
  <div class="modes" role="tablist">
    <button id="tabQuiz" role="tab" aria-selected="true" onclick="setMode('quiz')">✎ Quiz</button>
    <button id="tabReview" role="tab" aria-selected="false" onclick="setMode('review')">⚡ Fast Review</button>
  </div>

  <div class="years" id="years"><span class="ylabel">Choose a year group</span></div>
  <div class="gp-count" id="gpCount"></div>

  <div id="stage"></div>

  <footer>Timed 10-min assessment · questions &amp; answers reshuffle each attempt · wrong answers show why · works offline</footer>
</div>

  { year:2, grammarPoint:"Describing Words", question:"The girl stomped her feet.", options:["angry", "sleepy", "hungry", "quiet"], answer:"angry", explanation:"Stomping feet shows anger. Example: He was angry and frowned." },
  { year:2, grammarPoint:"Describing Words", question:"The boy smiled and clapped.", options:["sad", "bored", "happy", "tired"], answer:"happy", explanation:"Smiling and clapping show happiness. Example: He was happy on his birthday." },
  { year:2, grammarPoint:"Describing Words", question:"The girl yawned loudly.", options:["hungry", "sleepy", "angry", "shy"], answer:"sleepy", explanation:"Yawning shows tiredness. Example: She was sleepy at bedtime." },
  { year:2, grammarPoint:"Plurals", question:"One cat, two ___.", options:["cat", "cats", "cates", "catz"], answer:"cats", explanation:"To make most words plural, add -s. Example: one dog, two dogs." },
  { year:2, grammarPoint:"Plurals", question:"One bus, two ___.", options:["buss", "buses", "bus", "busies"], answer:"buses", explanation:"Words ending in 's' add -es. Example: one glass, two glasses." },
  { year:2, grammarPoint:"Plurals", question:"One fox, two ___.", options:["foxs", "foxes", "foxies", "foxz"], answer:"foxes", explanation:"Words ending in 'x' add -es. Example: one box, two boxes." },
  { year:2, grammarPoint:"Plurals", question:"One dish, two ___.", options:["dish", "dishs", "dishes", "dishies"], answer:"dishes", explanation:"Words ending in 'sh' add -es. Example: one brush, two brushes." },
  { year:2, grammarPoint:"Plurals", question:"One dog, two ___.", options:["dog", "dogs", "doges", "dogz"], answer:"dogs", explanation:"To make most words plural, add -s. Example: one cat, two cats." },
  { year:2, grammarPoint:"Plurals", question:"One box, two ___.", options:["boxs", "boxes", "boxies", "boxz"], answer:"boxes", explanation:"Words ending in 'x' add -es. Example: one fox, two foxes." },
  { year:2, grammarPoint:"Plurals", question:"One wish, two ___.", options:["wishs", "wishes", "wishies", "wishz"], answer:"wishes", explanation:"Words ending in 'sh' add -es. Example: one brush, two brushes." },
  { year:2, grammarPoint:"Capital Letters + Full Stops", question:"Choose the correct sentence.", options:["the dog ran home.", "The dog ran home", "The dog ran home.", "the Dog ran home."], answer:"The dog ran home.", explanation:"A sentence starts with a capital letter and ends with a full stop. Example: The dog ran home." },
  { year:2, grammarPoint:"Capital Letters + Full Stops", question:"Choose the correct sentence.", options:["i like apples.", "I like apples", "I like apples.", "i Like apples."], answer:"I like apples.", explanation:"The word 'I' is always a capital letter. Example: Today I am happy." },
  { year:2, grammarPoint:"Capital Letters + Full Stops", question:"Choose the correct sentence.", options:["the cat ran home.", "The cat ran home", "The cat ran home.", "the Cat ran home."], answer:"The cat ran home.", explanation:"A sentence starts with a capital letter and ends with a full stop. Example: The dog ran home." },
  { year:2, grammarPoint:"Capital Letters + Full Stops", question:"Choose the correct sentence.", options:["i like cake.", "I like cake", "I like cake.", "i Like cake."], answer:"I like cake.", explanation:"The word 'I' is always a capital letter. Example: Today I am happy." },
  { year:2, grammarPoint:"Sentence Structure", question:"Choose the best sentence.", options:["The cat sleep.", "The cat sleeping.", "The cat sleeps.", "The cat slepts."], answer:"The cat sleeps.", explanation:"One person or thing (singular) takes a verb ending in -s. Example: The cat sits." },
  { year:2, grammarPoint:"Sentence Structure", question:"Choose the best sentence.", options:["The dog run.", "The dog runs.", "The dog running.", "The dog runned."], answer:"The dog runs.", explanation:"One person or thing (singular) takes a verb ending in -s. Example: The cat sits." },
  { year:2, grammarPoint:"Sentence Structure", question:"Choose the best sentence.", options:["The boys runs fast.", "The boys run fast.", "The boys running fast.", "The boys runned fast."], answer:"The boys run fast.", explanation:"More than one (plural) takes a verb with no -s. Example: The cats sit." },
  { year:2, grammarPoint:"Choose the Word", question:"The girl ___ the ball.", options:["kick", "kicks", "kicking", "kicked"], answer:"kicks", explanation:"One person or thing (singular) takes a verb ending in -s. Example: The cat sits." },
  { year:2, grammarPoint:"Choose the Word", question:"The boys ___ in the pool.", options:["swim", "swims", "swimming", "swam"], answer:"swim", explanation:"More than one (plural) takes a verb with no -s. Example: The cats sit." },
  { year:2, grammarPoint:"Choose the Word", question:"The children ___ a story.", options:["read", "reads", "reading", "readed"], answer:"read", explanation:"More than one (plural) takes a verb with no -s. Example: The cats sit." },
  { year:2, grammarPoint:"Identifying Verbs", question:"Which word is a verb?", options:["jump", "happy", "tall", "pencil"], answer:"jump", explanation:"A verb is an action or doing word. Example: run, jump, eat." },
  { year:2, grammarPoint:"Identifying Verbs", question:"Which word is a verb?", options:["run", "red", "chair", "soft"], answer:"run", explanation:"A verb is an action or doing word. Example: run, jump, eat." },
  { year:2, grammarPoint:"Preposition Meaning", question:"The cat is under the table. 'Under' means:", options:["on top", "inside", "below", "behind"], answer:"below", explanation:"'Under' means below something. Example: The cat sat under the chair." },
  { year:2, grammarPoint:"Preposition Meaning", question:"The ball is behind the chair. 'Behind' means:", options:["in front", "at the back", "inside", "above"], answer:"at the back", explanation:"'Behind' means at the back of something. Example: He stood behind the door." },
  { year:2, grammarPoint:"Preposition Meaning", question:"The cat is on the table. 'On' means:", options:["inside", "below", "touching the top", "behind"], answer:"touching the top", explanation:"'On' means resting on top of something. Example: The cup is on the table." },
  { year:2, grammarPoint:"Preposition Meaning", question:"The ball is next to the box. 'Next to' means:", options:["far away", "behind", "beside", "under"], answer:"beside", explanation:"'Next to' means right beside something. Example: She sat next to me." },

  { year:3, grammarPoint:"Possessive Determiners", question:"She forgot ___ lunchbox at home.", options:["her", "hers", "she", "they"], answer:"her", explanation:"A possessive determiner goes before a noun to show who owns it. Example: her bag, his coat, their toys." },
  { year:3, grammarPoint:"Possessive Determiners", question:"We cleaned ___ classroom together.", options:["ours", "our", "us", "we"], answer:"our", explanation:"A possessive determiner goes before a noun to show who owns it. Example: her bag, his coat, their toys." },
  { year:3, grammarPoint:"Possessive Determiners", question:"The dog wagged ___ tail.", options:["it", "its", "it's", "it is"], answer:"its", explanation:"'Its' (no apostrophe) shows belonging. 'It's' means 'it is'. Example: The dog wagged its tail." },
  { year:3, grammarPoint:"Possessive Determiners", question:"Tom lost ___ pencil again.", options:["he", "his", "him", "her"], answer:"his", explanation:"A possessive determiner goes before a noun to show who owns it. Example: her bag, his coat, their toys." },
  { year:3, grammarPoint:"Possessive Determiners", question:"The children packed ___ bags for the trip.", options:["they", "their", "them", "theirs"], answer:"their", explanation:"A possessive determiner goes before a noun to show who owns it. Example: her bag, his coat, their toys." },
  { year:3, grammarPoint:"Possessive Determiners", question:"I can't find ___ shoes.", options:["my", "mine", "me", "I"], answer:"my", explanation:"A possessive determiner goes before a noun to show who owns it. Example: her bag, his coat, their toys." },
  { year:3, grammarPoint:"Possessive Determiners", question:"She brushed ___ hair before school.", options:["she", "her", "hers", "they"], answer:"her", explanation:"A possessive determiner goes before a noun to show who owns it. Example: her bag, his coat, their toys." },
  { year:3, grammarPoint:"Pronoun Case", question:"Dad took ___ to the zoo.", options:["I", "me", "my", "mine"], answer:"me", explanation:"An object pronoun comes after a verb or preposition. Example: She called me. Dad helped them." },
  { year:3, grammarPoint:"Pronoun Case", question:"___ and Sam played chess.", options:["Me", "I", "My", "Mine"], answer:"I", explanation:"Use 'I' as the subject doing the action, especially in 'X and I'. Example: Sam and I played." },
  { year:3, grammarPoint:"Pronoun Case", question:"Grandma hugged ___ tightly.", options:["she", "her", "hers", "he"], answer:"her", explanation:"An object pronoun comes after a verb or preposition. Example: She called me. Dad helped them." },
  { year:3, grammarPoint:"Pronoun Case", question:"The teacher asked ___ to read.", options:["they", "them", "their", "theirs"], answer:"them", explanation:"An object pronoun comes after a verb or preposition. Example: She called me. Dad helped them." },
  { year:3, grammarPoint:"Pronoun Case", question:"The teacher called ___ to the front.", options:["I", "me", "my", "mine"], answer:"me", explanation:"An object pronoun comes after a verb or preposition. Example: She called me. Dad helped them." },
  { year:3, grammarPoint:"Pronoun Case", question:"___ and Lily sang a song.", options:["Me", "I", "My", "Mine"], answer:"I", explanation:"Use 'I' as the subject doing the action, especially in 'X and I'. Example: Sam and I played." },
  { year:3, grammarPoint:"Pronoun Case", question:"Mom gave ___ a cookie.", options:["he", "him", "his", "he's"], answer:"him", explanation:"An object pronoun comes after a verb or preposition. Example: She called me. Dad helped them." },
  { year:3, grammarPoint:"Pronoun Case", question:"The coach spoke to ___ after practice.", options:["they", "them", "their", "theirs"], answer:"them", explanation:"An object pronoun comes after a verb or preposition. Example: She called me. Dad helped them." },
  { year:3, grammarPoint:"Possessive Pronouns", question:"This seat is ___.", options:["my", "mine", "me", "I"], answer:"mine", explanation:"A possessive pronoun stands alone, with no noun after it. Example: That book is mine. This is yours." },
  { year:3, grammarPoint:"Possessive Pronouns", question:"The blue shoes are ___.", options:["theirs", "their", "them", "they"], answer:"theirs", explanation:"A possessive pronoun stands alone, with no noun after it. Example: That book is mine. This is yours." },
  { year:3, grammarPoint:"Possessive Pronouns", question:"Is this pencil ___?", options:["you", "your", "yours", "you're"], answer:"yours", explanation:"A possessive pronoun stands alone, with no noun after it. Example: That book is mine. This is yours." },
  { year:3, grammarPoint:"Possessive Pronouns", question:"The cat is ___. It belongs to us.", options:["our", "ours", "we", "us"], answer:"ours", explanation:"A possessive pronoun stands alone, with no noun after it. Example: That book is mine. This is yours." },
  { year:3, grammarPoint:"Possessive Pronouns", question:"This jacket is ___. It belongs to me.", options:["my", "mine", "me", "I"], answer:"mine", explanation:"A possessive pronoun stands alone, with no noun after it. Example: That book is mine. This is yours." },
  { year:3, grammarPoint:"Possessive Pronouns", question:"The toys are ___. They belong to us.", options:["our", "ours", "we", "us"], answer:"ours", explanation:"A possessive pronoun stands alone, with no noun after it. Example: That book is mine. This is yours." },
  { year:3, grammarPoint:"Possessive Pronouns", question:"Is this notebook ___?", options:["your", "yours", "you", "you're"], answer:"yours", explanation:"A possessive pronoun stands alone, with no noun after it. Example: That book is mine. This is yours." },
  { year:3, grammarPoint:"Possessive Pronouns", question:"The cat is ___. It belongs to her.", options:["her", "hers", "she", "she's"], answer:"hers", explanation:"A possessive pronoun stands alone, with no noun after it. Example: That book is mine. This is yours." },
  { year:3, grammarPoint:"Subject-Verb Agreement", question:"The bird ___ in the tree.", options:["sing", "sings", "singing", "sang"], answer:"sings", explanation:"One person or thing (singular) takes a verb ending in -s. Example: The bird sings." },
  { year:3, grammarPoint:"Subject-Verb Agreement", question:"My friends ___ basketball.", options:["plays", "play", "playing", "played"], answer:"play", explanation:"More than one (plural) takes a verb with no -s. Example: The birds sing." },
  { year:3, grammarPoint:"Subject-Verb Agreement", question:"The baby ___ loudly.", options:["cry", "cries", "crying", "cried"], answer:"cries", explanation:"When a verb ends in a consonant + y, swap y for -ies for one person/thing. Example: The baby cries." },
  { year:3, grammarPoint:"Subject-Verb Agreement", question:"The boys ___ their homework.", options:["does", "do", "doing", "done"], answer:"do", explanation:"More than one (plural) takes a verb with no -s. Example: The birds sing." },
  { year:3, grammarPoint:"Subject-Verb Agreement", question:"The frog ___ into the pond.", options:["jump", "jumps", "jumping", "jumped"], answer:"jumps", explanation:"One person or thing (singular) takes a verb ending in -s. Example: The bird sings." },
  { year:3, grammarPoint:"Subject-Verb Agreement", question:"The students ___ quietly.", options:["works", "work", "working", "worked"], answer:"work", explanation:"More than one (plural) takes a verb with no -s. Example: The birds sing." },
  { year:3, grammarPoint:"Subject-Verb Agreement", question:"The baby ___ milk.", options:["drink", "drinks", "drinking", "drank"], answer:"drinks", explanation:"One person or thing (singular) takes a verb ending in -s. Example: The bird sings." },
  { year:3, grammarPoint:"Subject-Verb Agreement", question:"My cousins ___ in Canada.", options:["lives", "live", "living", "lived"], answer:"live", explanation:"More than one (plural) takes a verb with no -s. Example: The birds sing." },
  { year:3, grammarPoint:"Indefinite Pronoun Agreement", question:"Everyone ___ ready.", options:["are", "were", "is", "be"], answer:"is", explanation:"Words like everyone, someone, nobody and anybody are singular, so they take a singular verb. Example: Everyone is here." },
  { year:3, grammarPoint:"Indefinite Pronoun Agreement", question:"Somebody ___ left the door open.", options:["have", "has", "having", "had"], answer:"has", explanation:"Words like everyone, someone, nobody and anybody are singular, so they take a singular verb. Example: Everyone is here." },
  { year:3, grammarPoint:"Indefinite Pronoun Agreement", question:"Nobody ___ in the classroom.", options:["are", "is", "were", "be"], answer:"is", explanation:"Words like everyone, someone, nobody and anybody are singular, so they take a singular verb. Example: Everyone is here." },
  { year:3, grammarPoint:"Indefinite Pronoun Agreement", question:"Anyone ___ join the club.", options:["can", "cans", "is", "are"], answer:"can", explanation:"'Can' stays the same after any subject. Example: Anyone can join." },
  { year:3, grammarPoint:"Indefinite Pronoun Agreement", question:"Everyone ___ a ticket.", options:["need", "needs", "needing", "needed"], answer:"needs", explanation:"Words like everyone, someone, nobody and anybody are singular, so they take a singular verb. Example: Everyone is here." },
  { year:3, grammarPoint:"Indefinite Pronoun Agreement", question:"Someone ___ knocking at the door.", options:["are", "is", "were", "be"], answer:"is", explanation:"Words like everyone, someone, nobody and anybody are singular, so they take a singular verb. Example: Everyone is here." },
  { year:3, grammarPoint:"Indefinite Pronoun Agreement", question:"Nobody ___ the answer.", options:["know", "knows", "knowing", "knew"], answer:"knows", explanation:"Words like everyone, someone, nobody and anybody are singular, so they take a singular verb. Example: Everyone is here." },
  { year:3, grammarPoint:"Indefinite Pronoun Agreement", question:"Everyone ___ excited.", options:["are", "is", "were", "be"], answer:"is", explanation:"Words like everyone, someone, nobody and anybody are singular, so they take a singular verb. Example: Everyone is here." },
  { year:3, grammarPoint:"Comparative Adjectives", question:"My bag is ___ than yours.", options:["heavy", "heavier", "heaviest", "more heavy"], answer:"heavier", explanation:"To compare two things, add -er to a short adjective. Example: taller, faster, deeper." },
  { year:3, grammarPoint:"Comparative Adjectives", question:"This test is ___ than last week's.", options:["easy", "easier", "easiest", "more easiest"], answer:"easier", explanation:"For a short adjective ending in y, swap y for -ier. Example: easy \u2192 easier." },
  { year:3, grammarPoint:"Comparative Adjectives", question:"The river is ___ today.", options:["deep", "deeper", "deepest", "more deep"], answer:"deeper", explanation:"To compare two things, add -er to a short adjective. Example: taller, faster, deeper." },
  { year:3, grammarPoint:"Comparative Adjectives", question:"My sister is ___ than me.", options:["tall", "taller", "tallest", "more tall"], answer:"taller", explanation:"To compare two things, add -er to a short adjective. Example: taller, faster, deeper." },
  { year:3, grammarPoint:"Comparative Adjectives", question:"My room is ___ than yours.", options:["big", "bigger", "biggest", "more big"], answer:"bigger", explanation:"For short adjectives we double the last letter and add -er. Example: big \u2192 bigger." },
  { year:3, grammarPoint:"Comparative Adjectives", question:"This book is ___ than the last one.", options:["interesting", "more interesting", "most interesting", "interestinger"], answer:"more interesting", explanation:"For long adjectives, use 'more' instead of -er. Example: more interesting, more careful." },
  { year:3, grammarPoint:"Comparative Adjectives", question:"Her drawing is ___ than mine.", options:["neat", "neater", "neatest", "more neat"], answer:"neater", explanation:"To compare two things, add -er to a short adjective. Example: taller, faster, deeper." },
  { year:3, grammarPoint:"Comparative Adjectives", question:"The river is ___ today (compared to yesterday).", options:["wide", "wider", "widest", "more wide"], answer:"wider", explanation:"To compare two things, add -er to a short adjective. Example: taller, faster, deeper." },
  { year:3, grammarPoint:"Indefinite Pronoun Recognition", question:"___ ate the last cookie.", options:["Someone", "He", "They", "The"], answer:"Someone", explanation:"An indefinite pronoun does not name a particular person. Example: someone, anyone, everyone, nobody." },
  { year:3, grammarPoint:"Indefinite Pronoun Recognition", question:"___ can join the game.", options:["Anyone", "She", "We", "The"], answer:"Anyone", explanation:"An indefinite pronoun does not name a particular person. Example: someone, anyone, everyone, nobody." },
  { year:3, grammarPoint:"Indefinite Pronoun Recognition", question:"___ knows the answer.", options:["Everyone", "Him", "Her", "They"], answer:"Everyone", explanation:"An indefinite pronoun does not name a particular person. Example: someone, anyone, everyone, nobody." },
  { year:3, grammarPoint:"Indefinite Pronoun Recognition", question:"___ left their jacket.", options:["Somebody", "He", "She", "The"], answer:"Somebody", explanation:"An indefinite pronoun does not name a particular person. Example: someone, anyone, everyone, nobody." },
  { year:3, grammarPoint:"Indefinite Pronoun Recognition", question:"___ left the lights on.", options:["Someone", "He", "She", "They"], answer:"Someone", explanation:"An indefinite pronoun does not name a particular person. Example: someone, anyone, everyone, nobody." },
  { year:3, grammarPoint:"Indefinite Pronoun Recognition", question:"___ took my seat.", options:["Someone", "He", "She", "They"], answer:"Someone", explanation:"An indefinite pronoun does not name a particular person. Example: someone, anyone, everyone, nobody." },
  { year:3, grammarPoint:"Indefinite Pronoun Recognition", question:"___ left their book on the table.", options:["Somebody", "He", "She", "The"], answer:"Somebody", explanation:"An indefinite pronoun does not name a particular person. Example: someone, anyone, everyone, nobody." },
  { year:3, grammarPoint:"Phrasal Verbs / Prepositions", question:"Please turn ___ the lights.", options:["on", "in", "over", "up"], answer:"on", explanation:"'Turn on' means to start or switch on. Example: Turn on the TV." },
  { year:3, grammarPoint:"Phrasal Verbs / Prepositions", question:"The cat jumped ___ the box.", options:["under", "into", "beside", "between"], answer:"into", explanation:"'Into' shows movement to the inside. Example: She jumped into the pool." },
  { year:3, grammarPoint:"Phrasal Verbs / Prepositions", question:"Pick ___ your toys.", options:["on", "up", "in", "off"], answer:"up", explanation:"'Pick up' means to collect or lift. Example: Pick up your bag." },
  { year:3, grammarPoint:"Phrasal Verbs / Prepositions", question:"He looked ___ the window.", options:["at", "in", "on", "over"], answer:"at", explanation:"'Look at' means to direct your eyes to something. Example: Look at the board." },
  { year:3, grammarPoint:"Phrasal Verbs / Prepositions", question:"Turn ___ the TV.", options:["off", "in", "over", "up"], answer:"off", explanation:"'Turn off' means to stop or switch off. Example: Turn off the lights." },
  { year:3, grammarPoint:"Phrasal Verbs / Prepositions", question:"The cat climbed ___ the tree.", options:["under", "up", "beside", "between"], answer:"up", explanation:"'Up' shows movement to a higher place. Example: She climbed up the ladder." },
  { year:3, grammarPoint:"Phrasal Verbs / Prepositions", question:"She ran ___ the playground.", options:["across", "under", "beside", "between"], answer:"across", explanation:"'Across' means from one side to the other. Example: We walked across the road." },
  { year:3, grammarPoint:"Phrasal Verbs / Prepositions", question:"Turn ___ the radio.", options:["on", "in", "over", "up"], answer:"on", explanation:"'Turn on' means to start or switch on. Example: Turn on the TV." },
  { year:3, grammarPoint:"Who vs Whose", question:"The girl ___ won the race is happy.", options:["whose", "who", "who's", "whom"], answer:"who", explanation:"'Who' refers to a person doing something (the subject). Example: The girl who won smiled." },
  { year:3, grammarPoint:"Who vs Whose", question:"The boy ___ hat is red is my friend.", options:["who", "whose", "who's", "him"], answer:"whose", explanation:"'Whose' shows that something belongs to someone. Example: The boy whose hat is red." },
  { year:3, grammarPoint:"Who vs Whose", question:"The teacher ___ helped me is kind.", options:["who", "whose", "whom", "who's"], answer:"who", explanation:"'Who' refers to a person doing something (the subject). Example: The girl who won smiled." },
  { year:3, grammarPoint:"Who vs Whose", question:"The girl ___ bag was lost is crying.", options:["who", "whose", "who's", "her"], answer:"whose", explanation:"'Whose' shows that something belongs to someone. Example: The boy whose hat is red." },
  { year:3, grammarPoint:"Who vs Whose", question:"The boy ___ scored the goal is happy.", options:["whose", "who", "who's", "him"], answer:"who", explanation:"'Who' refers to a person doing something (the subject). Example: The girl who won smiled." },
  { year:3, grammarPoint:"Who vs Whose", question:"The girl ___ shoes are muddy is upset.", options:["who", "whose", "who's", "her"], answer:"whose", explanation:"'Whose' shows that something belongs to someone. Example: The boy whose hat is red." },
  { year:3, grammarPoint:"Who vs Whose", question:"The teacher ___ teaches us is kind.", options:["who", "whose", "whom", "who's"], answer:"who", explanation:"'Who' refers to a person doing something (the subject). Example: The girl who won smiled." },
  { year:3, grammarPoint:"Who vs Whose", question:"The boy ___ backpack is blue is my friend.", options:["who", "whose", "who's", "him"], answer:"whose", explanation:"'Whose' shows that something belongs to someone. Example: The boy whose hat is red." },
  { year:3, grammarPoint:"Cause and Effect", question:"It was cold, ___ we wore jackets.", options:["but", "so", "because", "or"], answer:"so", explanation:"'So' shows the result of something. Example: It rained, so we stayed in." },
  { year:3, grammarPoint:"Cause and Effect", question:"We were tired ___ we went to bed early.", options:["so", "but", "or", "because"], answer:"so", explanation:"'So' shows the result of something. Example: It rained, so we stayed in." },
  { year:3, grammarPoint:"Cause and Effect", question:"We stayed inside ___ it rained.", options:["so", "because", "but", "or"], answer:"because", explanation:"'Because' gives the reason why. Example: I smiled because I was happy." },
  { year:3, grammarPoint:"Cause and Effect", question:"She studied hard ___ she wanted to do well.", options:["so", "because", "but", "or"], answer:"because", explanation:"'Because' gives the reason why. Example: I smiled because I was happy." },
  { year:3, grammarPoint:"Cause and Effect", question:"It was late, ___ we went home.", options:["but", "so", "because", "or"], answer:"so", explanation:"'So' shows the result of something. Example: It rained, so we stayed in." },
  { year:3, grammarPoint:"Cause and Effect", question:"We stayed inside ___ it was snowing.", options:["because", "so", "but", "or"], answer:"because", explanation:"'Because' gives the reason why. Example: I smiled because I was happy." },
  { year:3, grammarPoint:"Cause and Effect", question:"She studied hard ___ she wanted to pass.", options:["so", "because", "but", "or"], answer:"because", explanation:"'Because' gives the reason why. Example: I smiled because I was happy." },
  { year:3, grammarPoint:"Cause and Effect", question:"He was hungry, ___ he ate a snack.", options:["because", "so", "but", "or"], answer:"so", explanation:"'So' shows the result of something. Example: It rained, so we stayed in." },
  { year:3, grammarPoint:"Verb Tense", question:"She ___ her homework yesterday.", options:["do", "does", "did", "doing"], answer:"did", explanation:"'Yesterday' means past time. Do becomes did. Example: She did her homework." },
  { year:3, grammarPoint:"Verb Tense", question:"They are ___ a snowman.", options:["build", "built", "building", "builds"], answer:"building", explanation:"Use 'is/are' + verb-ing for an action happening now. Example: She is drawing." },
  { year:3, grammarPoint:"Verb Tense", question:"He ___ the ball into the net.", options:["kick", "kicking", "kicked", "kicks"], answer:"kicked", explanation:"For past time, many verbs add -ed or change form. Example: yesterday she watched / did." },
  { year:3, grammarPoint:"Verb Tense", question:"The sun ___ in the east.", options:["rise", "rises", "rising", "rose"], answer:"rises", explanation:"One person or thing (singular) takes a verb ending in -s. Example: The bird sings." },
  { year:3, grammarPoint:"Verb Tense", question:"They ___ a movie last night.", options:["watch", "watches", "watched", "watching"], answer:"watched", explanation:"For past time, many verbs add -ed or change form. Example: yesterday she watched / did." },
  { year:3, grammarPoint:"Verb Tense", question:"She is ___ a picture.", options:["draw", "drawing", "drew", "drawn"], answer:"drawing", explanation:"Use 'is/are' + verb-ing for an action happening now. Example: She is drawing." },
  { year:3, grammarPoint:"Verb Tense", question:"He ___ the ball every day.", options:["kick", "kicks", "kicked", "kicking"], answer:"kicks", explanation:"Use the present tense for something done often (a habit). Example: He kicks the ball every day." },
  { year:3, grammarPoint:"Verb Tense", question:"The sun ___ yesterday (came up).", options:["rise", "rises", "rising", "rose"], answer:"rose", explanation:"'Yesterday' means past time. Rise becomes rose. Example: The sun rose early." },
  { year:3, grammarPoint:"Adjective / Noun", question:"Choose the adjective.", options:["teacher", "playground", "shiny", "pencil"], answer:"shiny", explanation:"An adjective is a describing word. Example: shiny, tall, colourful." },
  { year:3, grammarPoint:"Adjective / Noun", question:"Choose the noun.", options:["happy", "tall", "careful", "rabbit"], answer:"rabbit", explanation:"A noun names a person, place or thing. Example: rabbit, teacher, pencil." },
  { year:3, grammarPoint:"Adjective / Noun", question:"Choose the adjective.", options:["colourful", "colour", "colouring", "coloured"], answer:"colourful", explanation:"An adjective describes how something looks. Example: a colourful kite." },
  { year:3, grammarPoint:"Adjective / Noun", question:"Choose the adjective.", options:["rabbit", "colourful", "playground", "pencil"], answer:"colourful", explanation:"An adjective is a describing word. Example: shiny, tall, colourful." },
  { year:3, grammarPoint:"Adjective / Noun", question:"Choose the noun.", options:["bright", "careful", "teacher", "sleepy"], answer:"teacher", explanation:"A noun names a person, place or thing. Example: rabbit, teacher, pencil." },
  { year:3, grammarPoint:"Adjective / Noun", question:"Choose the adjective.", options:["running", "runner", "fast", "run"], answer:"fast", explanation:"An adjective can describe speed. Example: a fast car." },
  { year:3, grammarPoint:"Adjective / Noun", question:"Choose the adjective.", options:["teacher", "bright", "playground", "pencil"], answer:"bright", explanation:"An adjective is a describing word. Example: shiny, tall, colourful." },
  { year:3, grammarPoint:"Adjective / Noun", question:"Choose the noun.", options:["careful", "sleepy", "rabbit", "colourful"], answer:"rabbit", explanation:"A noun names a person, place or thing. Example: rabbit, teacher, pencil." },
  { year:3, grammarPoint:"Describing Words", question:"The boy yawned and rubbed his eyes.", options:["hungry", "sleepy", "brave", "loud"], answer:"sleepy", explanation:"Yawning and rubbing eyes show tiredness. Example: She was sleepy at bedtime." },
  { year:3, grammarPoint:"Describing Words", question:"The boy ran to the table and grabbed his sandwich.", options:["hungry", "angry", "shy", "bored"], answer:"hungry", explanation:"Rushing for food shows hunger. Example: He was hungry before lunch." },
  { year:3, grammarPoint:"Describing Words", question:"The boy hid behind his mother and whispered softly.", options:["brave", "shy", "angry", "loud"], answer:"shy", explanation:"Hiding and whispering show shyness. Example: The shy girl looked down." },
  { year:3, grammarPoint:"Describing Words", question:"The boy jumped up and down when he saw the cake.", options:["bored", "excited", "sleepy", "quiet"], answer:"excited", explanation:"Jumping with joy shows excitement. Example: She was excited about the trip." },
  { year:3, grammarPoint:"Describing Words", question:"The boy frowned and crossed his arms.", options:["excited", "angry", "sleepy", "shy"], answer:"angry", explanation:"Frowning and crossing arms show anger. Example: He was angry and stamped his foot." },
  { year:3, grammarPoint:"Describing Words", question:"The boy smiled and clapped his hands.", options:["sad", "bored", "happy", "tired"], answer:"happy", explanation:"Smiling and clapping show happiness. Example: He was happy on his birthday." },
  // ========== YEAR 4 (your bank) ==========
  { year:4, grammarPoint:"Pronoun Clarity & Case", question:"Lily and Ben were late, so ___ ran to school.", options:["he", "she", "they", "them"], answer:"they", explanation:"Use 'they' for two or more people. Example: Lily and Ben were late, so they ran." },
  { year:4, grammarPoint:"Pronoun Clarity & Case", question:"The teacher spoke to Mia and ___.", options:["I", "me", "my", "mine"], answer:"me", explanation:"After a verb or preposition, use 'me' (not 'I'). Example: The teacher spoke to Mia and me." },
  { year:4, grammarPoint:"Pronoun Clarity & Case", question:"Tom forgot his bag, so I gave ___ mine.", options:["he", "him", "his", "he's"], answer:"him", explanation:"'Him' is an object pronoun, used after a verb. Example: I gave him my pen." },
  { year:4, grammarPoint:"Pronoun Clarity & Case", question:"The dog chased the cat, but ___ escaped.", options:["it", "they", "he", "she"], answer:"it", explanation:"Use 'it' for one animal or thing. Example: The dog chased the cat, but it escaped." },
  { year:4, grammarPoint:"Pronoun Clarity & Case", question:"Mia and I were tired, so Dad drove ___ home.", options:["we", "us", "our", "ourselves"], answer:"us", explanation:"Use 'us' as the object after a verb. Example: Dad drove us home." },
  { year:4, grammarPoint:"Pronoun Clarity & Case", question:"The coach spoke to Sam and ___ after the match.", options:["I", "me", "my", "mine"], answer:"me", explanation:"After a verb or preposition, use 'me' (not 'I'). Example: The teacher spoke to Mia and me." },
  { year:4, grammarPoint:"Pronoun Clarity & Case", question:"The dog chased the birds, but ___ flew away.", options:["it", "they", "he", "she"], answer:"they", explanation:"Use 'they' for more than one. Example: The birds flew, so they escaped." },
  { year:4, grammarPoint:"Determiners", question:"I saw ___ elephant at the zoo.", options:["a", "an", "the", "those"], answer:"an", explanation:"Use 'an' before a word that starts with a vowel sound (a, e, i, o, u). Example: an apple, an elephant." },
  { year:4, grammarPoint:"Determiners", question:"___ books on the table belong to me.", options:["This", "These", "That", "A"], answer:"These", explanation:"'These' points to more than one thing that is near. Example: These books are mine." },
  { year:4, grammarPoint:"Determiners", question:"Please pass me ___ pencil.", options:["an", "the", "a", "those"], answer:"a", explanation:"Use 'a' before a general thing starting with a consonant sound. Example: a pencil, a ruler." },
  { year:4, grammarPoint:"Determiners", question:"___ mountain we climbed was very steep.", options:["A", "An", "The", "Those"], answer:"The", explanation:"Use 'the' for a specific thing both people know about. Example: the mountain we climbed." },
  { year:4, grammarPoint:"Determiners", question:"___ apple fell from the tree.", options:["A", "An", "The", "Those"], answer:"An", explanation:"Use 'an' before a word that starts with a vowel sound (a, e, i, o, u). Example: an apple, an elephant." },
  { year:4, grammarPoint:"Determiners", question:"___ shoes over there are mine.", options:["This", "These", "That", "Those"], answer:"Those", explanation:"'Those' points to more than one thing that is far away. Example: Those shoes over there." },
  { year:4, grammarPoint:"Determiners", question:"Please hand me ___ ruler.", options:["a", "an", "the", "those"], answer:"a", explanation:"Use 'a' before a general thing starting with a consonant sound. Example: a pencil, a ruler." },
  { year:4, grammarPoint:"Expanded Noun Phrases", question:"Choose the best expanded noun phrase (dog).", options:["the dog", "the big brown dog", "dog", "big dog"], answer:"the big brown dog", explanation:"An expanded noun phrase adds describing words for more detail. Example: the big brown dog." },
  { year:4, grammarPoint:"Expanded Noun Phrases", question:"Choose the expanded noun phrase (tree).", options:["a tall tree", "tree", "tall", "the tree"], answer:"a tall tree", explanation:"An expanded noun phrase has an adjective before the noun. Example: a tall tree." },
  { year:4, grammarPoint:"Expanded Noun Phrases", question:"Choose the expanded noun phrase (cat).", options:["the cat", "the small grey cat", "cat", "grey"], answer:"the small grey cat", explanation:"An expanded noun phrase adds describing words for more detail. Example: the big brown dog." },
  { year:4, grammarPoint:"Expanded Noun Phrases", question:"Choose the best expanded noun phrase (star).", options:["a bright star", "star", "bright", "the star"], answer:"a bright star", explanation:"An expanded noun phrase has an adjective before the noun. Example: a bright star." },
  { year:4, grammarPoint:"Expanded Noun Phrases", question:"Choose the expanded noun phrase (river).", options:["the river", "the long, winding river", "river", "long river"], answer:"the long, winding river", explanation:"An expanded noun phrase adds describing words for more detail. Example: the big brown dog." },
  { year:4, grammarPoint:"Expanded Noun Phrases", question:"Choose the expanded noun phrase (forest).", options:["the forest", "the dark, silent forest", "forest", "silent forest"], answer:"the dark, silent forest", explanation:"An expanded noun phrase adds describing words for more detail. Example: the big brown dog." },
  { year:4, grammarPoint:"Expanded Noun Phrases", question:"Choose the best expanded noun phrase (tower).", options:["a tall tower", "tower", "tall", "the tower"], answer:"a tall tower", explanation:"An expanded noun phrase has an adjective before the noun. Example: a tall tower." },
  { year:4, grammarPoint:"Fronted Adverbials", question:"___, the children lined up quietly.", options:["The children", "Lined up", "Quietly", "After the bell rang"], answer:"After the bell rang", explanation:"A fronted adverbial is a phrase at the start telling when, where or how. Example: After the bell rang, we lined up." },
  { year:4, grammarPoint:"Fronted Adverbials", question:"___, the fox crept through the forest.", options:["The fox", "Crept", "Slowly", "Forest"], answer:"Slowly", explanation:"An adverbial of manner tells us how something is done. Example: Slowly, the fox crept." },
  { year:4, grammarPoint:"Fronted Adverbials", question:"___, the children began their project.", options:["The children", "Began", "After lunch", "Project"], answer:"After lunch", explanation:"A fronted adverbial is a phrase at the start telling when, where or how. Example: After the bell rang, we lined up." },
  { year:4, grammarPoint:"Fronted Adverbials", question:"___, the fox hid behind a tree.", options:["Quickly", "The fox", "Hid", "Tree"], answer:"Quickly", explanation:"An adverbial of manner tells us how something is done. Example: Slowly, the fox crept." },
  { year:4, grammarPoint:"Fronted Adverbials", question:"___, the children began their art lesson.", options:["The children", "Began", "After break", "Lesson"], answer:"After break", explanation:"A fronted adverbial is a phrase at the start telling when, where or how. Example: After the bell rang, we lined up." },
  { year:4, grammarPoint:"Fronted Adverbials", question:"___, the fox darted into the bushes.", options:["Suddenly", "The fox", "Darted", "Bushes"], answer:"Suddenly", explanation:"An adverbial of manner tells us how something is done. Example: Slowly, the fox crept." },
  { year:4, grammarPoint:"Fronted Adverbials", question:"___, the children began their science experiment.", options:["The children", "Began", "After lunch", "Experiment"], answer:"After lunch", explanation:"A fronted adverbial is a phrase at the start telling when, where or how. Example: After the bell rang, we lined up." },
  { year:4, grammarPoint:"Conjunctions", question:"I wanted to play outside, ___ it was raining.", options:["because", "although", "unless", "so"], answer:"although", explanation:"'Although' shows a contrast between two ideas. Example: Although it rained, we played." },
  { year:4, grammarPoint:"Conjunctions", question:"It was late; ___, we went home.", options:["although", "however", "because", "unless"], answer:"however", explanation:"'However' joins two contrasting ideas, often after a semicolon. Example: It was late; however, we went home." },
  { year:4, grammarPoint:"Conjunctions", question:"___ it was cold, we still went swimming.", options:["Unless", "Since", "Although", "Because"], answer:"Although", explanation:"'Although' shows a contrast between two ideas. Example: Although it rained, we played." },
  { year:4, grammarPoint:"Conjunctions", question:"Take a coat ___ it might snow.", options:["unless", "although", "because", "however"], answer:"because", explanation:"'Because' gives the reason why. Example: Take a coat because it might snow." },
  { year:4, grammarPoint:"Conjunctions", question:"I wanted to join the club, ___ I missed the deadline.", options:["although", "because", "unless", "so"], answer:"although", explanation:"'Although' shows a contrast between two ideas. Example: Although it rained, we played." },
  { year:4, grammarPoint:"Conjunctions", question:"It was dark; ___, we used a torch.", options:["although", "however", "because", "unless"], answer:"however", explanation:"'However' joins two contrasting ideas, often after a semicolon. Example: It was late; however, we went home." },
  { year:4, grammarPoint:"Conjunctions", question:"___ it was raining, we still played football.", options:["Unless", "Although", "Because", "However"], answer:"Although", explanation:"'Although' shows a contrast between two ideas. Example: Although it rained, we played." },
  { year:4, grammarPoint:"Prepositions", question:"We stayed inside ___ the storm.", options:["beyond", "during", "within", "throughout"], answer:"during", explanation:"'During' means at the same time as something. Example: We stayed inside during the storm." },
  { year:4, grammarPoint:"Prepositions", question:"The treasure was hidden ___ the cave.", options:["within", "during", "although", "unless"], answer:"within", explanation:"'Within' means inside. Example: The treasure was hidden within the cave." },
  { year:4, grammarPoint:"Prepositions", question:"The festival lasted ___ the weekend.", options:["beyond", "throughout", "during", "within"], answer:"throughout", explanation:"'Throughout' means all the way through. Example: The festival lasted throughout the weekend." },
  { year:4, grammarPoint:"Prepositions", question:"The castle stood ___ the valley.", options:["beyond", "during", "within", "throughout"], answer:"beyond", explanation:"'Beyond' means past or further than. Example: The castle stood beyond the valley." },
  { year:4, grammarPoint:"Prepositions", question:"We stayed awake ___ the whole movie.", options:["beyond", "during", "within", "throughout"], answer:"throughout", explanation:"'Throughout' means all the way through. Example: The festival lasted throughout the weekend." },
  { year:4, grammarPoint:"Prepositions", question:"The treasure was hidden ___ the walls.", options:["within", "during", "beyond", "unless"], answer:"within", explanation:"'Within' means inside. Example: The treasure was hidden within the cave." },
  { year:4, grammarPoint:"Prepositions", question:"The storm lasted ___ the night.", options:["beyond", "throughout", "during", "within"], answer:"throughout", explanation:"'Throughout' means all the way through. Example: The festival lasted throughout the weekend." },
  { year:4, grammarPoint:"Perfect Tense", question:"She ___ finished her homework.", options:["have", "has", "having", "had"], answer:"has", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has finished. They have finished." },
  { year:4, grammarPoint:"Perfect Tense", question:"They ___ eaten already.", options:["have", "has", "having", "had"], answer:"have", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has finished. They have finished." },
  { year:4, grammarPoint:"Perfect Tense", question:"I ___ seen that film before.", options:["has", "have", "having", "had"], answer:"have", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has finished. They have finished." },
  { year:4, grammarPoint:"Perfect Tense", question:"We ___ walked this path many times.", options:["has", "have", "having", "had"], answer:"have", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has finished. They have finished." },
  { year:4, grammarPoint:"Perfect Tense", question:"She ___ finished her project.", options:["have", "has", "having", "had"], answer:"has", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has finished. They have finished." },
  { year:4, grammarPoint:"Perfect Tense", question:"They ___ eaten lunch already.", options:["have", "has", "having", "had"], answer:"have", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has finished. They have finished." },
  { year:4, grammarPoint:"Perfect Tense", question:"I ___ seen that show before.", options:["has", "have", "having", "had"], answer:"have", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has finished. They have finished." },
  { year:4, grammarPoint:"Apostrophes", question:"Choose the correct possessive form (cat).", options:["the cats tail", "the cat's tail", "the cats' tail", "the cat tail's"], answer:"the cat's tail", explanation:"For one owner, add an apostrophe + s. Example: the cat's tail (the tail of one cat)." },
  { year:4, grammarPoint:"Apostrophes", question:"Choose the correct contraction (do not).", options:["don't", "do'nt", "dont'", "do nt'"], answer:"don't", explanation:"An apostrophe replaces the missing letters in a contraction. Example: do not becomes don't." },
  { year:4, grammarPoint:"Apostrophes", question:"The ___ toys were everywhere.", options:["children", "childrens", "children's", "childrens'"], answer:"children's", explanation:"For an irregular plural (no s), add apostrophe + s. Example: the children's toys." },
  { year:4, grammarPoint:"Apostrophes", question:"The ___ wings were huge.", options:["birds", "bird's", "birds'", "bird"], answer:"birds'", explanation:"For a plural already ending in s, add just an apostrophe after the s. Example: the birds' wings." },
  { year:4, grammarPoint:"Apostrophes", question:"Choose the correct possessive form (girl).", options:["the girls coat", "the girl's coat", "the girls' coat", "the girl coat's"], answer:"the girl's coat", explanation:"For one owner, add an apostrophe + s. Example: the cat's tail (the tail of one cat)." },
  { year:4, grammarPoint:"Apostrophes", question:"Choose the correct contraction (cannot).", options:["can't", "cant'", "can't'", "ca'nt"], answer:"can't", explanation:"An apostrophe replaces the missing letters in a contraction. Example: do not becomes don't." },
  { year:4, grammarPoint:"Apostrophes", question:"The ___ homework was due today (more than one student).", options:["students", "student's", "students'", "student"], answer:"students'", explanation:"For a plural already ending in s, add just an apostrophe after the s. Example: the birds' wings." },
  { year:4, grammarPoint:"Apostrophes", question:"The ___ feathers were bright blue.", options:["bird", "bird's", "birds'", "birds"], answer:"birds'", explanation:"For a plural already ending in s, add just an apostrophe after the s. Example: the birds' wings." },
  { year:4, grammarPoint:"Relative Clauses", question:"The girl ___ won the race is my friend.", options:["which", "who", "that", "whom"], answer:"who", explanation:"Use 'who' for people. Example: The girl who won the race." },
  { year:4, grammarPoint:"Relative Clauses", question:"The book ___ I borrowed was exciting.", options:["who", "which", "whom", "he"], answer:"which", explanation:"Use 'which' for things or animals. Example: The book which I borrowed." },
  { year:4, grammarPoint:"Relative Clauses", question:"The dog ___ barked loudly ran away.", options:["who", "which", "that", "whom"], answer:"that", explanation:"'That' can be used for people or things in a clause that identifies them. Example: The dog that barked." },
  { year:4, grammarPoint:"Relative Clauses", question:"The tree ___ fell was very old.", options:["who", "which", "that", "whom"], answer:"which", explanation:"Use 'which' for things or animals. Example: The book which I borrowed." },
  { year:4, grammarPoint:"Relative Clauses", question:"The teacher ___ helped me was kind.", options:["who", "which", "that", "whom"], answer:"who", explanation:"Use 'who' for people. Example: The girl who won the race." },
  { year:4, grammarPoint:"Relative Clauses", question:"The book ___ I read was exciting.", options:["who", "which", "whom", "he"], answer:"which", explanation:"Use 'which' for things or animals. Example: The book which I borrowed." },
  { year:4, grammarPoint:"Homophones", question:"I left my bag over ___.", options:["their", "there", "they're", "these"], answer:"there", explanation:"'There' is a place. ('Their' shows belonging; 'they're' means they are.) Example: I left it over there." },
  { year:4, grammarPoint:"Homophones", question:"___ going to the park later.", options:["Their", "There", "They're", "They"], answer:"They're", explanation:"'They're' is short for 'they are'. Example: They're going to the park." },
  { year:4, grammarPoint:"Homophones", question:"I ate ___ much cake.", options:["to", "too", "two", "tow"], answer:"too", explanation:"'Too' means more than enough or also. ('Two' is the number; 'to' shows direction.) Example: I ate too much." },
  { year:4, grammarPoint:"Homophones", question:"She has ___ brothers.", options:["to", "too", "two", "tow"], answer:"two", explanation:"'Two' is the number 2. ('Too' means also; 'to' shows direction.) Example: She has two brothers." },
  { year:4, grammarPoint:"Homophones", question:"I left my coat over ___.", options:["their", "there", "they're", "these"], answer:"there", explanation:"'There' is a place. ('Their' shows belonging; 'they're' means they are.) Example: I left it over there." },
  { year:4, grammarPoint:"Homophones", question:"I ate ___ many sweets.", options:["to", "too", "two", "tow"], answer:"too", explanation:"'Too' means more than enough or also. ('Two' is the number; 'to' shows direction.) Example: I ate too much." },
  { year:4, grammarPoint:"Homophones", question:"She has ___ sisters.", options:["to", "too", "two", "tow"], answer:"two", explanation:"'Two' is the number 2. ('Too' means also; 'to' shows direction.) Example: She has two brothers." },
  { year:4, grammarPoint:"Homophones", question:"I ate ___ many biscuits.", options:["to", "too", "two", "tow"], answer:"too", explanation:"'Too' means more than enough or also. ('Two' is the number; 'to' shows direction.) Example: I ate too much." },
  { year:4, grammarPoint:"Subject-Verb Agreement", question:"The group of children ___ singing.", options:["are", "is", "were", "be"], answer:"is", explanation:"A group word like 'group', 'team' or 'each' is treated as singular, so it takes 'is' or '-s'. Example: The team is ready." },
  { year:4, grammarPoint:"Subject-Verb Agreement", question:"Neither of the answers ___ correct.", options:["are", "is", "were", "be"], answer:"is", explanation:"'Neither' is singular, so it takes 'is'. Example: Neither of the answers is correct." },
  { year:4, grammarPoint:"Subject-Verb Agreement", question:"The dogs in the yard ___ barking.", options:["is", "was", "are", "be"], answer:"are", explanation:"A plural subject takes 'are'. Example: The dogs in the yard are barking." },
  { year:4, grammarPoint:"Subject-Verb Agreement", question:"Each of the players ___ a medal.", options:["get", "gets", "getting", "got"], answer:"gets", explanation:"'Each' is singular, so the verb takes -s. Example: Each of the players gets a medal." },
  { year:4, grammarPoint:"Subject-Verb Agreement", question:"The team of players ___ ready.", options:["are", "is", "were", "be"], answer:"is", explanation:"A group word like 'group', 'team' or 'each' is treated as singular, so it takes 'is' or '-s'. Example: The team is ready." },
  { year:4, grammarPoint:"Subject-Verb Agreement", question:"Neither of the books ___ interesting.", options:["are", "is", "were", "be"], answer:"is", explanation:"'Neither' is singular, so it takes 'is'. Example: Neither of the answers is correct." },
  { year:4, grammarPoint:"Subject-Verb Agreement", question:"The birds in the tree ___ singing.", options:["is", "was", "are", "be"], answer:"are", explanation:"A plural subject takes 'are'. Example: The dogs in the yard are barking." },
  { year:4, grammarPoint:"Subject-Verb Agreement", question:"Each of the pupils ___ a worksheet.", options:["get", "gets", "getting", "got"], answer:"gets", explanation:"'Each' is singular, so the verb takes -s. Example: Each of the players gets a medal." },
  { year:4, grammarPoint:"Sentence Structure & Punctuation", question:"Choose the correctly punctuated sentence (Stop/Tom).", options:["“Stop” said Tom.", "“Stop,” said Tom.", "“Stop”, said Tom.", "“Stop.” said Tom."], answer:"“Stop,” said Tom.", explanation:"In direct speech, the comma goes inside the speech marks before the closing mark. Example: “Stop,” said Tom." },
  { year:4, grammarPoint:"Sentence Structure & Punctuation", question:"Choose the sentence with a fronted adverbial (dog).", options:["The dog barked loudly.", "Loudly, the dog barked.", "The dog loudly barked.", "Barked loudly the dog."], answer:"Loudly, the dog barked.", explanation:"A fronted adverbial at the start is followed by a comma. Example: Loudly, the dog barked." },
  { year:4, grammarPoint:"Sentence Structure & Punctuation", question:"Choose the correctly punctuated sentence (Wait/Tom).", options:["“Wait” shouted Tom.", "“Wait,” shouted Tom.", "“Wait”, shouted Tom.", "“Wait.” shouted Tom."], answer:"“Wait,” shouted Tom.", explanation:"In direct speech, the comma goes inside the speech marks before the closing mark. Example: “Stop,” said Tom." },
  { year:4, grammarPoint:"Sentence Structure & Punctuation", question:"Choose the sentence with a fronted adverbial (cat).", options:["The cat slept quietly.", "Quietly, the cat slept.", "The cat quietly slept.", "Slept quietly the cat."], answer:"Quietly, the cat slept.", explanation:"A fronted adverbial at the start is followed by a comma. Example: Loudly, the dog barked." },
  { year:4, grammarPoint:"Sentence Structure & Punctuation", question:"Choose the correctly punctuated sentence (Stop/Tom shouted).", options:["“Stop” shouted Tom.", "“Stop,” shouted Tom.", "“Stop”, shouted Tom.", "“Stop.” shouted Tom."], answer:"“Stop,” shouted Tom.", explanation:"In direct speech, the comma goes inside the speech marks before the closing mark. Example: “Stop,” said Tom." },
  { year:4, grammarPoint:"Vocabulary & Word Class", question:"Which word is an adverb? (quick)", options:["quickly", "quick", "quicker", "quickest"], answer:"quickly", explanation:"An adverb tells us how something is done and often ends in -ly. Example: She ran quickly." },
  { year:4, grammarPoint:"Vocabulary & Word Class", question:"Which word is a preposition? (under)", options:["under", "quickly", "bright", "shouted"], answer:"under", explanation:"A preposition shows position or direction. Example: under the table; beneath the sofa." },
  { year:4, grammarPoint:"Vocabulary & Word Class", question:"Which word is an adverb? (slow)", options:["slowly", "slow", "slower", "slowest"], answer:"slowly", explanation:"An adverb tells us how something is done and often ends in -ly. Example: She ran quickly." },
  { year:4, grammarPoint:"Vocabulary & Word Class", question:"Which word is a preposition? (beneath)", options:["beneath", "quickly", "bright", "shouted"], answer:"beneath", explanation:"A preposition shows position or direction. Example: under the table; beneath the sofa." },
  { year:4, grammarPoint:"Vocabulary & Word Class", question:"Which word is an adverb? (gentle)", options:["gently", "gentle", "gentler", "gentlest"], answer:"gently", explanation:"An adverb tells us how something is done and often ends in -ly. Example: She ran quickly." },
  { year:4, grammarPoint:"Completing Sentences", question:"The boy ran home ___ he was late.", options:["although", "because", "unless", "however"], answer:"because", explanation:"'Because' gives the reason why. Example: She smiled because she won." },
  { year:4, grammarPoint:"Completing Sentences", question:"___ the rain stopped, we went outside.", options:["Although", "Because", "When", "Unless"], answer:"When", explanation:"'When' shows the time something happens. Example: When the rain stopped, we went out." },
  { year:4, grammarPoint:"Completing Sentences", question:"The cake, ___ was huge, tasted amazing.", options:["who", "which", "that", "whom"], answer:"which", explanation:"Use 'which' for a thing in a clause set off by commas. Example: The cake, which was huge, was eaten." },
  { year:4, grammarPoint:"Completing Sentences", question:"We will be late ___ we hurry.", options:["unless", "although", "because", "however"], answer:"unless", explanation:"'Unless' means 'if not'. Example: We'll be late unless we hurry." },
  { year:4, grammarPoint:"Completing Sentences", question:"___ the sun set, we lit a fire.", options:["Although", "Because", "When", "Unless"], answer:"When", explanation:"'When' shows the time something happens. Example: When the rain stopped, we went out." },
  { year:4, grammarPoint:"Completing Sentences", question:"The cake, ___ was delicious, disappeared quickly.", options:["who", "which", "that", "whom"], answer:"which", explanation:"Use 'which' for a thing in a clause set off by commas. Example: The cake, which was tasty, vanished." },
  { year:4, grammarPoint:"Completing Sentences", question:"We won't start ___ everyone arrives.", options:["unless", "although", "because", "however"], answer:"unless", explanation:"'Unless' means 'if not'. Example: We won't start unless you come." },
  { year:4, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (barking dog).", options:["The dog who barked loudly run away.", "The dog, who barked loudly, ran away.", "The dog who barked loudly ran away.", "The dog barked loudly who ran away."], answer:"The dog, who barked loudly, ran away.", explanation:"A non-essential clause (extra information) is wrapped in a pair of commas. Example: The dog, who barked loudly, ran away." },
  { year:4, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (after lunch).", options:["After lunch we played outside.", "After lunch, we played outside.", "We played outside after lunch,", "After lunch we, played outside."], answer:"After lunch, we played outside.", explanation:"A fronted adverbial at the start is followed by a comma. Example: After lunch, we played outside." },
  { year:4, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (smiling girl).", options:["The girl who smiled waved.", "The girl, who smiled waved.", "The girl who smiled, waved.", "The girl who, smiled waved."], answer:"The girl who smiled waved.", explanation:"An essential clause (needed to identify the noun) takes no commas. Example: The girl who smiled waved." },
  { year:4, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (before school).", options:["Before school we ate breakfast.", "Before school, we ate breakfast.", "We ate breakfast, before school.", "Before, school we ate breakfast."], answer:"Before school, we ate breakfast.", explanation:"A fronted adverbial at the start is followed by a comma. Example: After lunch, we played outside." },
  // ========== YEAR 5 (your bank) ==========
  { year:5, grammarPoint:"Modal Verbs", question:"You ___ finish your homework before playing games.", options:["might", "should", "could", "would"], answer:"should", explanation:"'Should' gives advice or a recommendation. Example: You should drink water." },
  { year:5, grammarPoint:"Modal Verbs", question:"It ___ rain later, so take a coat.", options:["must", "might", "should", "would"], answer:"might", explanation:"'Might' shows something is possible but not certain. Example: It might rain." },
  { year:5, grammarPoint:"Modal Verbs", question:"You ___ not run in the corridor.", options:["must", "might", "could", "would"], answer:"must", explanation:"'Must' shows a strong rule or obligation. Example: You must wear a seatbelt." },
  { year:5, grammarPoint:"Modal Verbs", question:"We ___ finish early if we work quickly.", options:["must", "might", "should", "could"], answer:"could", explanation:"'Could' shows possibility or ability. Example: We could win if we try." },
  { year:5, grammarPoint:"Modal Verbs", question:"You ___ bring your PE kit tomorrow.", options:["might", "must", "could", "would"], answer:"must", explanation:"'Must' shows a strong rule or obligation. Example: You must wear a seatbelt." },
  { year:5, grammarPoint:"Modal Verbs", question:"We ___ finish the project today if we work fast.", options:["must", "might", "could", "would"], answer:"could", explanation:"'Could' shows possibility or ability. Example: We could win if we try." },
  { year:5, grammarPoint:"Modal Verbs", question:"You ___ try to be on time.", options:["should", "must", "might", "would"], answer:"should", explanation:"'Should' gives advice or a recommendation. Example: You should drink water." },
  { year:5, grammarPoint:"Modal Verbs", question:"It ___ snow later.", options:["must", "might", "should", "would"], answer:"might", explanation:"'Might' shows something is possible but not certain. Example: It might rain." },
  { year:5, grammarPoint:"Relative Clauses", question:"The girl ___ won the prize is in my class.", options:["which", "who", "that", "whom"], answer:"who", explanation:"Use 'who' for people. Example: The girl who won is here." },
  { year:5, grammarPoint:"Relative Clauses", question:"The book ___ you lent me was brilliant.", options:["who", "which", "whose", "whom"], answer:"which", explanation:"Use 'which' for things or animals. Example: The book which I read was good." },
  { year:5, grammarPoint:"Relative Clauses", question:"The boy ___ bike was stolen is upset.", options:["who", "which", "whose", "that"], answer:"whose", explanation:"Use 'whose' to show belonging. Example: The boy whose bag was lost." },
  { year:5, grammarPoint:"Relative Clauses", question:"The tree ___ fell in the storm blocked the road.", options:["who", "which", "whose", "whom"], answer:"which", explanation:"Use 'which' for things or animals. Example: The book which I read was good." },
  { year:5, grammarPoint:"Relative Clauses", question:"The girl ___ dog is missing is upset.", options:["who", "which", "whose", "that"], answer:"whose", explanation:"Use 'whose' to show belonging. Example: The boy whose bag was lost." },
  { year:5, grammarPoint:"Relative Clauses", question:"The film ___ we watched was exciting.", options:["who", "which", "whom", "whose"], answer:"which", explanation:"Use 'which' for things or animals. Example: The book which I read was good." },
  { year:5, grammarPoint:"Relative Clauses", question:"The man ___ fixed our roof was very kind.", options:["who", "which", "whose", "that"], answer:"who", explanation:"Use 'who' for people. Example: The girl who won is here." },
  { year:5, grammarPoint:"Relative Clauses", question:"The girl ___ artwork won first prize.", options:["who", "which", "whose", "that"], answer:"whose", explanation:"Use 'whose' to show belonging. Example: The boy whose bag was lost." },
  { year:5, grammarPoint:"Parenthesis", question:"Choose the correctly punctuated sentence.", options:["The dog (who was very old) slept all day.", "The dog who was very old slept all day.", "The dog—who was very old slept all day.", "The dog who was very old—slept all day."], answer:"The dog (who was very old) slept all day.", explanation:"Brackets hold extra information that could be removed. Example: My cat (a tabby) is lazy." },
  { year:5, grammarPoint:"Parenthesis", question:"Choose the correct use of dashes.", options:["The cake—which was huge—was delicious.", "The cake—which was huge was delicious.", "The cake which was huge—was delicious.", "The cake which—was huge—was delicious."], answer:"The cake—which was huge—was delicious.", explanation:"A pair of dashes can mark off extra information. Example: The cake – which was huge – was tasty." },
  { year:5, grammarPoint:"Parenthesis", question:"Choose the correctly punctuated sentence.", options:["The car—which was brand new—broke down.", "The car which was brand new—broke down.", "The car which—was brand new—broke down.", "The car which was brand new, broke down."], answer:"The car—which was brand new—broke down.", explanation:"A pair of dashes can mark off extra information. Example: The cake – which was huge – was tasty." },
  { year:5, grammarPoint:"Parenthesis", question:"Choose the correct use of commas for parenthesis.", options:["My brother who is ten, loves football.", "My brother, who is ten loves football.", "My brother, who is ten, loves football.", "My brother who, is ten, loves football."], answer:"My brother, who is ten, loves football.", explanation:"A non-essential clause is held inside a pair of commas. Example: My friend, who is kind, helped me." },
  { year:5, grammarPoint:"Parenthesis", question:"Choose the correctly punctuated sentence.", options:["The house—which was very old—creaked loudly.", "The house which was very old—creaked loudly.", "The house which—was very old—creaked loudly.", "The house which was very old, creaked loudly."], answer:"The house—which was very old—creaked loudly.", explanation:"A pair of dashes can mark off extra information. Example: The cake – which was huge – was tasty." },
  { year:5, grammarPoint:"Parenthesis", question:"Choose the correct use of brackets.", options:["The dog (who was very tired slept all day).", "The dog (who was very tired) slept all day.", "The dog who was very tired (slept all day).", "The dog who (was very tired) slept all day."], answer:"The dog (who was very tired) slept all day.", explanation:"Brackets hold extra information that could be removed. Example: My cat (a tabby) is lazy." },
  { year:5, grammarPoint:"Parenthesis", question:"Choose the correctly punctuated sentence.", options:["The river—which was very deep—flowed quickly.", "The river which was very deep—flowed quickly.", "The river which—was very deep—flowed quickly.", "The river which was very deep, flowed quickly."], answer:"The river—which was very deep—flowed quickly.", explanation:"A pair of dashes can mark off extra information. Example: The cake – which was huge – was tasty." },
  { year:5, grammarPoint:"Parenthesis", question:"Choose the correct use of brackets.", options:["The boy (who was exhausted ran home).", "The boy (who was exhausted) ran home.", "The boy who was exhausted (ran home).", "The boy who (was exhausted) ran home."], answer:"The boy (who was exhausted) ran home.", explanation:"Brackets hold extra information that could be removed. Example: My cat (a tabby) is lazy." },
  { year:5, grammarPoint:"Cohesion", question:"___, the team celebrated their victory.", options:["However", "Afterwards", "Although", "Unless"], answer:"Afterwards", explanation:"A cohesive adverbial links ideas in time order. Example: Afterwards, we went home." },
  { year:5, grammarPoint:"Cohesion", question:"The children practised for weeks. ___, they felt confident.", options:["Meanwhile", "Therefore", "Although", "Unless"], answer:"Therefore", explanation:"'Therefore' shows a result. Example: It rained; therefore, we stayed in." },
  { year:5, grammarPoint:"Cohesion", question:"The team trained hard. ___, they won the match.", options:["However", "Afterwards", "Therefore", "Although"], answer:"Therefore", explanation:"'Therefore' shows a result. Example: It rained; therefore, we stayed in." },
  { year:5, grammarPoint:"Cohesion", question:"We waited for an hour. ___, the bus finally arrived.", options:["Eventually", "Although", "Unless", "Meanwhile"], answer:"Eventually", explanation:"'Eventually' shows something happened after a long time. Example: Eventually, the rain stopped." },
  { year:5, grammarPoint:"Cohesion", question:"The class worked hard. ___, they achieved great results.", options:["However", "Afterwards", "Therefore", "Although"], answer:"Therefore", explanation:"'Therefore' shows a result. Example: It rained; therefore, we stayed in." },
  { year:5, grammarPoint:"Cohesion", question:"We waited for a long time. ___, the gates opened.", options:["Eventually", "Although", "Unless", "Meanwhile"], answer:"Eventually", explanation:"'Eventually' shows something happened after a long time. Example: Eventually, the rain stopped." },
  { year:5, grammarPoint:"Formal vs Informal", question:"Choose the formal sentence.", options:["Can you give me a hand?", "I would appreciate your assistance.", "Help me out, please.", "Give me a hand, yeah?"], answer:"I would appreciate your assistance.", explanation:"Formal language is polite and precise, for serious or official writing. Example: I would appreciate your assistance." },
