  { year:5, grammarPoint:"Formal vs Informal", question:"Choose the informal sentence.", options:["I regret to inform you…", "I would like to request…", "Sorry, I can't make it.", "I am unable to attend."], answer:"Sorry, I can't make it.", explanation:"Informal language is casual, for friends and family. Example: Can you give me a hand?" },
  { year:5, grammarPoint:"Formal vs Informal", question:"Choose the formal sentence.", options:["I can't come.", "Sorry, I'm busy.", "I regret that I am unable to attend.", "I'm not coming, okay?"], answer:"I regret that I am unable to attend.", explanation:"Formal language is polite and precise, for serious or official writing. Example: I would appreciate your assistance." },
  { year:5, grammarPoint:"Formal vs Informal", question:"Choose the informal sentence.", options:["I would like to request your help.", "I apologise for the delay.", "Can you help me out?", "I am unable to assist."], answer:"Can you help me out?", explanation:"Informal language is casual, for friends and family. Example: Can you give me a hand?" },
  { year:5, grammarPoint:"Perfect Tense", question:"She ___ finished her project already.", options:["have", "has", "having", "had"], answer:"has", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has gone. They have gone." },
  { year:5, grammarPoint:"Perfect Tense", question:"They ___ lived here for ten years.", options:["have", "has", "having", "had"], answer:"have", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has gone. They have gone." },
  { year:5, grammarPoint:"Perfect Tense", question:"By lunchtime, we ___ completed the task.", options:["have", "has", "having", "had"], answer:"had", explanation:"'Had' + past participle describes something completed before another past moment (past perfect). Example: By noon, we had finished." },
  { year:5, grammarPoint:"Perfect Tense", question:"I ___ never seen snow before.", options:["has", "have", "having", "had"], answer:"have", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has gone. They have gone." },
  { year:5, grammarPoint:"Perfect Tense", question:"She ___ already eaten.", options:["has", "have", "having", "had"], answer:"has", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has gone. They have gone." },
  { year:5, grammarPoint:"Perfect Tense", question:"By morning, the snow ___ melted.", options:["has", "have", "having", "had"], answer:"had", explanation:"'Had' + past participle describes something completed before another past moment (past perfect). Example: By noon, we had finished." },
  { year:5, grammarPoint:"Perfect Tense", question:"I ___ never tried sushi before.", options:["has", "have", "having", "had"], answer:"have", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has gone. They have gone." },
  { year:5, grammarPoint:"Perfect Tense", question:"By midnight, the rain ___ stopped.", options:["has", "have", "having", "had"], answer:"had", explanation:"'Had' + past participle describes something completed before another past moment (past perfect). Example: By noon, we had finished." },
  { year:5, grammarPoint:"Perfect Tense", question:"I ___ never visited Scotland.", options:["has", "have", "having", "had"], answer:"have", explanation:"Use 'has' for one person/thing and 'have' for more than one or 'I'. Example: She has gone. They have gone." },
  { year:5, grammarPoint:"Ambiguity", question:"Which sentence is clear?", options:["When Tom spoke to Jack, he was angry.", "Tom was angry when he spoke to Jack.", "He spoke to him and he was angry.", "When he spoke to him, he was angry."], answer:"Tom was angry when he spoke to Jack.", explanation:"A clear sentence names who is meant, so a pronoun can't be confused. Example: Tom was angry when he spoke to Jack." },
  { year:5, grammarPoint:"Ambiguity", question:"Which sentence is ambiguous?", options:["Sarah gave Emma her book.", "Sarah gave Emma the book she borrowed.", "Sarah gave Emma the red book.", "Sarah gave Emma the maths book."], answer:"Sarah gave Emma her book.", explanation:"A sentence is ambiguous when a pronoun could mean more than one person. Example: 'Sarah gave Emma her book' – whose book?" },
  { year:5, grammarPoint:"Ambiguity", question:"Which sentence is clear?", options:["When Sam spoke to Alex, he was upset.", "Sam was upset when he spoke to Alex.", "He spoke to him and he was upset.", "When he spoke to him, he was upset."], answer:"Sam was upset when he spoke to Alex.", explanation:"A clear sentence names who is meant, so a pronoun can't be confused. Example: Tom was angry when he spoke to Jack." },
  { year:5, grammarPoint:"Ambiguity", question:"Which sentence is ambiguous?", options:["Emma gave Lily her pencil.", "Emma gave Lily the blue pencil.", "Emma gave Lily the pencil she borrowed.", "Emma gave Lily the maths pencil."], answer:"Emma gave Lily her pencil.", explanation:"A sentence is ambiguous when a pronoun could mean more than one person. Example: 'Sarah gave Emma her book' – whose book?" },
  { year:5, grammarPoint:"Ambiguity", question:"Which sentence is clear?", options:["When Sam spoke to Alex, he was annoyed.", "Sam was annoyed when he spoke to Alex.", "He spoke to him and he was annoyed.", "When he spoke to him, he was annoyed."], answer:"Sam was annoyed when he spoke to Alex.", explanation:"A clear sentence names who is meant, so a pronoun can't be confused. Example: Tom was angry when he spoke to Jack." },
  { year:5, grammarPoint:"Ambiguity", question:"Which sentence is ambiguous?", options:["Emma gave Lily her notebook.", "Emma gave Lily the red notebook.", "Emma gave Lily the notebook she borrowed.", "Emma gave Lily the maths notebook."], answer:"Emma gave Lily her notebook.", explanation:"A sentence is ambiguous when a pronoun could mean more than one person. Example: 'Sarah gave Emma her book' – whose book?" },
  { year:5, grammarPoint:"Advanced Conjunctions", question:"___ he practised daily, he still struggled.", options:["Because", "Although", "Unless", "Therefore"], answer:"Although", explanation:"'Although' shows a contrast between two ideas. Example: Although it rained, we played." },
  { year:5, grammarPoint:"Advanced Conjunctions", question:"We will go for a walk ___ it stops raining.", options:["unless", "although", "if", "however"], answer:"if", explanation:"'If' introduces a condition. Example: If it stops raining, we will go out." },
  { year:5, grammarPoint:"Advanced Conjunctions", question:"She was tired; ___, she kept working.", options:["although", "however", "because", "unless"], answer:"however", explanation:"'However' joins two contrasting ideas, often after a semicolon. Example: She was tired; however, she carried on." },
  { year:5, grammarPoint:"Advanced Conjunctions", question:"He stayed home ___ he was ill.", options:["unless", "although", "because", "however"], answer:"because", explanation:"'Because' gives the reason why. Example: He stayed home because he was ill." },
  { year:5, grammarPoint:"Advanced Conjunctions", question:"___ he was tired, he kept working.", options:["Because", "Although", "Unless", "Therefore"], answer:"Although", explanation:"'Although' shows a contrast between two ideas. Example: Although it rained, we played." },
  { year:5, grammarPoint:"Advanced Conjunctions", question:"We will leave ___ the rain stops.", options:["unless", "although", "if", "however"], answer:"if", explanation:"'If' introduces a condition. Example: If it stops raining, we will go out." },
  { year:5, grammarPoint:"Advanced Conjunctions", question:"She was hungry; ___, she waited.", options:["although", "however", "because", "unless"], answer:"however", explanation:"'However' joins two contrasting ideas, often after a semicolon. Example: She was tired; however, she carried on." },
  { year:5, grammarPoint:"Advanced Conjunctions", question:"We will start ___ everyone arrives.", options:["unless", "although", "if", "however"], answer:"if", explanation:"'If' introduces a condition. Example: If it stops raining, we will go out." },
  { year:5, grammarPoint:"Advanced Conjunctions", question:"She was nervous; ___, she performed well.", options:["although", "however", "because", "unless"], answer:"however", explanation:"'However' joins two contrasting ideas, often after a semicolon. Example: She was tired; however, she carried on." },
  { year:5, grammarPoint:"Passive Voice", question:"The window ___ by the storm.", options:["broke", "was broken", "is breaking", "has broke"], answer:"was broken", explanation:"The passive uses 'was/were' + past participle; the action happens to the subject. Example: The window was broken." },
  { year:5, grammarPoint:"Passive Voice", question:"The cake ___ by the children.", options:["ate", "was eaten", "eating", "has ate"], answer:"was eaten", explanation:"The passive uses 'was/were' + past participle; the action happens to the subject. Example: The window was broken." },
  { year:5, grammarPoint:"Passive Voice", question:"The door ___ by the wind.", options:["opened", "was opened", "is opening", "has opened"], answer:"was opened", explanation:"The passive uses 'was/were' + past participle; the action happens to the subject. Example: The window was broken." },
  { year:5, grammarPoint:"Passive Voice", question:"The cake ___ by the guests.", options:["ate", "was eaten", "eating", "has ate"], answer:"was eaten", explanation:"The passive uses 'was/were' + past participle; the action happens to the subject. Example: The window was broken." },
  { year:5, grammarPoint:"Adverbials", question:"Choose the adverbial of time.", options:["in the garden", "yesterday", "quickly", "with excitement"], answer:"yesterday", explanation:"An adverbial of time tells us when. Example: yesterday, soon, after lunch." },
  { year:5, grammarPoint:"Adverbials", question:"Choose the adverbial of place.", options:["slowly", "after school", "under the table", "soon"], answer:"under the table", explanation:"An adverbial of place tells us where. Example: under the table, in the garden." },
  { year:5, grammarPoint:"Adverbials", question:"Choose the adverbial of manner.", options:["yesterday", "in the garden", "quickly", "after school"], answer:"quickly", explanation:"An adverbial of manner tells us how. Example: quickly, carefully, loudly." },
  { year:5, grammarPoint:"Adverbials", question:"Choose the adverbial of place (sofa example).", options:["under the table", "soon", "loudly", "yesterday"], answer:"under the table", explanation:"An adverbial of place tells us where. Example: under the table, in the garden." },
  { year:5, grammarPoint:"Adverbials", question:"Choose the adverbial of manner (careful example).", options:["yesterday", "in the garden", "carefully", "after school"], answer:"carefully", explanation:"An adverbial of manner tells us how. Example: quickly, carefully, loudly." },
  { year:5, grammarPoint:"Adverbials", question:"Choose the adverbial of place (bridge example).", options:["under the bridge", "soon", "loudly", "yesterday"], answer:"under the bridge", explanation:"An adverbial of place tells us where. Example: under the table, in the garden." },
  { year:5, grammarPoint:"Commas for Clarity", question:"Choose the correctly punctuated sentence.", options:["Before eating the family washed their hands.", "Before eating, the family washed their hands.", "Before, eating the family washed their hands.", "Before eating the family, washed their hands."], answer:"Before eating, the family washed their hands.", explanation:"A fronted adverbial at the start of a sentence is followed by a comma. Example: After lunch, we played." },
  { year:5, grammarPoint:"Commas for Clarity", question:"Choose the sentence where commas change the meaning (Grandma).", options:["Let's eat, Grandma.", "Let's eat Grandma.", "Both A and B", "Neither"], answer:"Both A and B", explanation:"A comma can change the meaning of a sentence completely. Example: 'Let's eat, Grandma' vs 'Let's eat Grandma'." },
  { year:5, grammarPoint:"Commas for Clarity", question:"Choose the sentence where commas change meaning (children).", options:["Let's eat, children.", "Let's eat children.", "Both A and B", "Neither"], answer:"Both A and B", explanation:"A comma can change the meaning of a sentence completely. Example: 'Let's eat, Grandma' vs 'Let's eat Grandma'." },
  { year:5, grammarPoint:"Commas for Clarity", question:"Choose the sentence where commas change meaning (kids).", options:["Let's eat, kids.", "Let's eat kids.", "Both A and B", "Neither"], answer:"Both A and B", explanation:"A comma can change the meaning of a sentence completely. Example: 'Let's eat, Grandma' vs 'Let's eat Grandma'." },
  { year:5, grammarPoint:"Synonyms & Precision", question:"Choose the most precise verb.", options:["walked", "strolled", "went", "moved"], answer:"strolled", explanation:"A precise verb gives a clearer picture than a general one. Example: 'strolled' tells us more than 'went'." },
  { year:5, grammarPoint:"Synonyms & Precision", question:"Choose the strongest adjective.", options:["big", "large", "enormous", "huge"], answer:"enormous", explanation:"A strong adjective has more force than a mild one. Example: 'enormous' is stronger than 'big'." },
  { year:5, grammarPoint:"Synonyms & Precision", question:"Choose the most precise verb (wander).", options:["walked", "wandered", "went", "moved"], answer:"wandered", explanation:"A precise verb gives a clearer picture than a general one. Example: 'strolled' tells us more than 'went'." },
  { year:5, grammarPoint:"Synonyms & Precision", question:"Choose the strongest adjective (cold).", options:["cold", "chilly", "freezing", "cool"], answer:"freezing", explanation:"A strong adjective has more force than a mild one. Example: 'enormous' is stronger than 'big'." },
  { year:5, grammarPoint:"Synonyms & Precision", question:"Choose the most precise verb (march).", options:["walked", "marched", "went", "moved"], answer:"marched", explanation:"A precise verb gives a clearer picture than a general one. Example: 'strolled' tells us more than 'went'." },
  { year:5, grammarPoint:"Synonyms & Precision", question:"Choose the strongest adjective (hot).", options:["hot", "warm", "boiling", "toasty"], answer:"boiling", explanation:"A strong adjective has more force than a mild one. Example: 'enormous' is stronger than 'big'." },
  { year:5, grammarPoint:"Sentence Types", question:"Which is a complex sentence?", options:["I ran.", "I ran because I was late.", "I ran and I jumped.", "I ran; I was late."], answer:"I ran because I was late.", explanation:"A complex sentence has a main clause and a subordinate clause. Example: I ran because I was late." },
  { year:5, grammarPoint:"Sentence Types", question:"Which is a compound sentence?", options:["I ran because I was late.", "I ran and I jumped.", "Running fast, I tripped.", "I ran."], answer:"I ran and I jumped.", explanation:"A compound sentence joins two main clauses with a word like 'and'. Example: I ran and I jumped." },
  { year:5, grammarPoint:"Verb Forms", question:"She ___ to the shop when it started raining.", options:["goes", "was going", "is going", "has gone"], answer:"was going", explanation:"The past progressive ('was/were' + -ing) shows an action in progress in the past. Example: She was going home." },
  { year:5, grammarPoint:"Verb Forms", question:"They ___ the film before.", options:["have seen", "has seen", "seeing", "seen"], answer:"have seen", explanation:"The present perfect ('have/has' + past participle) links the past to now. Example: They have seen the film." },
  { year:5, grammarPoint:"Advanced Prepositions", question:"The cat hid ___ the sofa.", options:["beneath", "between", "beyond", "beside"], answer:"beneath", explanation:"'Beneath' means under or below. Example: The toy was beneath the bed." },
  { year:5, grammarPoint:"Advanced Prepositions", question:"The treasure was buried ___ the old oak tree.", options:["throughout", "within", "beside", "during"], answer:"beside", explanation:"'Beside' means next to. Example: She sat beside her friend." },
  { year:5, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (tired boy).", options:["The boy who was tired, fell asleep.", "The boy, who was tired fell asleep.", "The boy, who was tired, fell asleep.", "The boy who, was tired, fell asleep."], answer:"The boy, who was tired, fell asleep.", explanation:"A non-essential clause is wrapped in a pair of commas. Example: The boy, who was tired, fell asleep." },
  { year:5, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (after school).", options:["After school we went home.", "After school, we went home.", "We went home, after school.", "After, school we went home."], answer:"After school, we went home.", explanation:"A fronted adverbial at the start of a sentence is followed by a comma. Example: After lunch, we played." },
  { year:5, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (excited dog).", options:["The dog barked loudly who was excited.", "The dog who was excited barked loudly.", "The dog, barked loudly who was excited.", "The dog who barked loudly, was excited."], answer:"The dog who was excited barked loudly.", explanation:"A relative clause must sit next to the noun it describes so the meaning is clear. Example: The dog who was excited barked." },
  { year:5, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (the show).", options:["Before the show we found our seats.", "Before the show, we found our seats.", "We found our seats, before the show.", "Before, the show we found our seats."], answer:"Before the show, we found our seats.", explanation:"A fronted adverbial at the start of a sentence is followed by a comma. Example: After lunch, we played." },
  { year:5, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (smiled boy).", options:["The boy who smiled, waved.", "The boy, who smiled waved.", "The boy who smiled waved.", "The boy who, smiled waved."], answer:"The boy who smiled waved.", explanation:"An essential clause (needed to identify the noun) takes no commas. Example: The boy who smiled waved." },
  { year:5, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (before lunch).", options:["Before lunch we played outside.", "Before lunch, we played outside.", "We played outside, before lunch.", "Before, lunch we played outside."], answer:"Before lunch, we played outside.", explanation:"A fronted adverbial at the start of a sentence is followed by a comma. Example: After lunch, we played." },
  { year:5, grammarPoint:"Homophones", question:"The knight rode his horse into the ___.", options:["night", "knight", "nite", "knite"], answer:"night", explanation:"'Night' is the time when it is dark. (A 'knight' wears armour.) Example: We slept all night." },
  { year:5, grammarPoint:"Homophones", question:"I will ___ the letter tomorrow.", options:["send", "sent", "scent", "cent"], answer:"send", explanation:"'Send' means to make something go somewhere. ('Scent' is a smell; 'cent' is money.) Example: I will send a card." },
  { year:5, grammarPoint:"Homophones", question:"I will ___ the parcel tomorrow.", options:["send", "sent", "scent", "cent"], answer:"send", explanation:"'Send' is the present action. ('Sent' is the past; 'scent' is a smell.) Example: Please send it today." },
  { year:5, grammarPoint:"Vocabulary Precision", question:"Choose the most formal verb.", options:["ask", "request", "beg", "tell"], answer:"request", explanation:"'Request' is the formal way to ask. Example: I would like to request a meeting." },
  { year:5, grammarPoint:"Vocabulary Precision", question:"Choose the most precise adverb.", options:["quickly", "rapidly", "fast", "soon"], answer:"rapidly", explanation:"'Rapidly' is a more precise, formal way to say quickly. Example: The fire spread rapidly." },
  { year:5, grammarPoint:"Completing Sentences", question:"The children were excited ___ they were going on a trip.", options:["although", "because", "unless", "however"], answer:"because", explanation:"'Because' gives the reason why. Example: She smiled because she won." },
  { year:5, grammarPoint:"Completing Sentences", question:"___ finishing the test, we handed it in.", options:["After", "Because", "Unless", "Although"], answer:"After", explanation:"'After' is a time conjunction showing the order of events. Example: After lunch, we read." },
  { year:5, grammarPoint:"Punctuation & Clarity", question:"Choose the correctly punctuated sentence (sister).", options:["My sister who is ten, loves football.", "My sister, who is ten loves football.", "My sister, who is ten, loves football.", "My sister who, is ten, loves football."], answer:"My sister, who is ten, loves football.", explanation:"A non-essential clause is wrapped in a pair of commas. Example: The boy, who was tired, fell asleep." },
  { year:5, grammarPoint:"Punctuation & Clarity", question:"Choose the sentence with correct parenthesis (mountain dashes).", options:["The mountain (which was very steep was hard to climb).", "The mountain—which was very steep—was hard to climb.", "The mountain which was very steep—was hard to climb.", "The mountain which—was very steep—was hard to climb."], answer:"The mountain—which was very steep—was hard to climb.", explanation:"A pair of dashes can mark off extra information. Example: The cake – which was huge – was tasty." },
  { year:5, grammarPoint:"Punctuation & Clarity", question:"Choose the correct use of brackets (mountain).", options:["The mountain (which was very steep was hard to climb).", "The mountain (which was very steep) was hard to climb.", "The mountain which was very steep (was hard to climb).", "The mountain which (was very steep) was hard to climb."], answer:"The mountain (which was very steep) was hard to climb.", explanation:"Brackets hold extra information that could be removed. Example: My cat (a tabby) is lazy." },
  // ========== YEAR 6 (your bank) ==========
  { year:6, grammarPoint:"Advanced Modal Verbs", question:"You ___ have finished by now; it's getting late.", options:["might", "should", "would", "could"], answer:"should", explanation:"'Should' shows an expectation or advice. Example: You should have finished by now." },
  { year:6, grammarPoint:"Advanced Modal Verbs", question:"We ___ need extra time if the task is difficult.", options:["must", "might", "would", "should"], answer:"might", explanation:"'Might' shows something is possible but not certain. Example: We might need more time." },
  { year:6, grammarPoint:"Advanced Modal Verbs", question:"You ___ not enter without permission.", options:["might", "must", "could", "would"], answer:"must", explanation:"'Must' shows a strong rule or obligation. Example: You must not enter." },
  { year:6, grammarPoint:"Advanced Modal Verbs", question:"If we hurry, we ___ catch the earlier train.", options:["must", "might", "could", "would"], answer:"could", explanation:"'Could' shows possibility or potential. Example: If we hurry, we could catch the train." },
  { year:6, grammarPoint:"Advanced Modal Verbs", question:"You ___ have remembered your homework; it was important.", options:["might", "should", "could", "would"], answer:"should", explanation:"'Should' shows an expectation or advice. Example: You should have finished by now." },
  { year:6, grammarPoint:"Advanced Passive Voice", question:"The results ___ announced tomorrow.", options:["will be", "will be announced", "are announcing", "have announced"], answer:"will be announced", explanation:"The future passive uses 'will be' + past participle. Example: The results will be announced." },
  { year:6, grammarPoint:"Advanced Passive Voice", question:"The cake ___ by the guests before we arrived.", options:["was eaten", "had been eaten", "is eaten", "has eaten"], answer:"had been eaten", explanation:"The past perfect passive uses 'had been' + past participle for something done before another past moment. Example: The cake had been eaten." },
  { year:6, grammarPoint:"Advanced Passive Voice", question:"The trophies ___ presented at the ceremony.", options:["will be", "will be presented", "are presenting", "have presented"], answer:"will be presented", explanation:"The future passive uses 'will be' + past participle. Example: The results will be announced." },
  { year:6, grammarPoint:"Advanced Passive Voice", question:"The letters ___ by the time we arrived.", options:["were delivered", "had been delivered", "are delivered", "have delivered"], answer:"had been delivered", explanation:"The past perfect passive uses 'had been' + past participle for something done before another past moment. Example: The cake had been eaten." },
  { year:6, grammarPoint:"Advanced Passive Voice", question:"The winners ___ announced next week.", options:["will be", "will be announced", "are announcing", "have announced"], answer:"will be announced", explanation:"The future passive uses 'will be' + past participle. Example: The results will be announced." },
  { year:6, grammarPoint:"Advanced Passive Voice", question:"The documents ___ by the time the meeting began.", options:["were checked", "had been checked", "are checked", "have checked"], answer:"had been checked", explanation:"The past perfect passive uses 'had been' + past participle for something done before another past moment. Example: The cake had been eaten." },
  { year:6, grammarPoint:"Subjunctive Form", question:"If I ___ in charge, I would change the rules.", options:["was", "were", "am", "be"], answer:"were", explanation:"The subjunctive uses 'were' (not 'was') after 'if' for something imagined. Example: If I were you, I'd apologise." },
  { year:6, grammarPoint:"Subjunctive Form", question:"It is essential that he ___ on time.", options:["is", "be", "was", "were"], answer:"be", explanation:"In a formal subjunctive after 'it is essential/vital that', use 'be'. Example: It is essential that he be on time." },
  { year:6, grammarPoint:"Subjunctive Form", question:"If she ___ to apologise, things might improve.", options:["was", "were", "is", "be"], answer:"were", explanation:"The subjunctive uses 'were' (not 'was') after 'if' for something imagined. Example: If I were you, I'd apologise." },
  { year:6, grammarPoint:"Subjunctive Form", question:"It is vital that everyone ___ quiet.", options:["is", "be", "was", "were"], answer:"be", explanation:"In a formal subjunctive after 'it is essential/vital that', use 'be'. Example: It is essential that he be on time." },
  { year:6, grammarPoint:"Subjunctive Form", question:"If he ___ to apologise, things might improve.", options:["was", "were", "is", "be"], answer:"were", explanation:"The subjunctive uses 'were' (not 'was') after 'if' for something imagined. Example: If I were you, I'd apologise." },
  { year:6, grammarPoint:"Subjunctive Form", question:"It is crucial that she ___ present.", options:["is", "be", "was", "were"], answer:"be", explanation:"In a formal subjunctive after 'it is essential/vital that', use 'be'. Example: It is essential that he be on time." },
  { year:6, grammarPoint:"Advanced Relative Clauses", question:"The teacher, ___ lessons are always fun, is leaving.", options:["who", "whose", "which", "that"], answer:"whose", explanation:"'Whose' shows belonging. Example: The teacher, whose lessons are fun, is leaving." },
  { year:6, grammarPoint:"Advanced Relative Clauses", question:"The book, ___ I borrowed last week, is excellent.", options:["who", "which", "whose", "that"], answer:"which", explanation:"A non-essential clause about a thing uses 'which', set off by commas. Example: The book, which I borrowed, is great." },
  { year:6, grammarPoint:"Advanced Relative Clauses", question:"The athlete, ___ determination inspired many, won the race.", options:["who", "whose", "which", "that"], answer:"whose", explanation:"'Whose' shows belonging. Example: The teacher, whose lessons are fun, is leaving." },
  { year:6, grammarPoint:"Advanced Relative Clauses", question:"The film, ___ we watched last night, was excellent.", options:["who", "which", "whose", "that"], answer:"which", explanation:"A non-essential clause about a thing uses 'which', set off by commas. Example: The book, which I borrowed, is great." },
  { year:6, grammarPoint:"Advanced Relative Clauses", question:"The scientist, ___ discovery changed everything, won an award.", options:["who", "whose", "which", "that"], answer:"whose", explanation:"'Whose' shows belonging. Example: The teacher, whose lessons are fun, is leaving." },
  { year:6, grammarPoint:"Advanced Relative Clauses", question:"The film, ___ we watched last night, was confusing.", options:["who", "which", "whose", "that"], answer:"which", explanation:"A non-essential clause about a thing uses 'which', set off by commas. Example: The book, which I borrowed, is great." },
  { year:6, grammarPoint:"Colons & Semicolons", question:"Choose the correct use of a colon (list).", options:["I need to buy: apples, bread, and milk.", "I need to buy apples: bread and milk.", "I need to buy apples, bread: and milk.", "I need: to buy apples, bread and milk."], answer:"I need to buy: apples, bread, and milk.", explanation:"A colon introduces a list. Example: I need: apples, bread and milk." },
  { year:6, grammarPoint:"Colons & Semicolons", question:"Choose the correct use of a semicolon (late).", options:["It was late; so we went home.", "It was late; we went home.", "It was late, we went home.", "It was late; and we went home."], answer:"It was late; we went home.", explanation:"A semi-colon joins two complete, related sentences (no joining word). Example: It was late; we went home." },
  { year:6, grammarPoint:"Colons & Semicolons", question:"Choose the correct use of a colon (succeed).", options:["He had one goal: to succeed.", "He had one goal to succeed:", "He had: one goal to succeed.", "He: had one goal to succeed."], answer:"He had one goal: to succeed.", explanation:"A colon can introduce an explanation. Example: He had one aim: to win." },
  { year:6, grammarPoint:"Colons & Semicolons", question:"Choose the correct use of a semicolon (raining).", options:["It was raining; we stayed inside.", "It was raining; and we stayed inside.", "It was raining, we stayed inside.", "It was raining; so we stayed inside."], answer:"It was raining; we stayed inside.", explanation:"A semi-colon joins two complete, related sentences (no joining word). Example: It was late; we went home." },
  { year:6, grammarPoint:"Colons & Semicolons", question:"Choose the correct use of a colon (aim succeed).", options:["She had one aim: to succeed.", "She had one aim to succeed:", "She had: one aim to succeed.", "She: had one aim to succeed."], answer:"She had one aim: to succeed.", explanation:"A colon can introduce an explanation. Example: He had one aim: to win." },
  { year:6, grammarPoint:"Colons & Semicolons", question:"Choose the correct use of a semicolon (cold).", options:["It was cold; we stayed inside.", "It was cold; and we stayed inside.", "It was cold, we stayed inside.", "It was cold; so we stayed inside."], answer:"It was cold; we stayed inside.", explanation:"A semi-colon joins two complete, related sentences (no joining word). Example: It was late; we went home." },
  { year:6, grammarPoint:"Hyphens & Dashes", question:"Choose the correctly hyphenated phrase (author).", options:["a well known author", "a well-known author", "a well, known author", "a well known-author"], answer:"a well-known author", explanation:"A hyphen joins two words into a compound adjective before a noun. Example: a well-known author." },
  { year:6, grammarPoint:"Hyphens & Dashes", question:"Choose the correct use of a dash (tricky).", options:["The answer—although tricky—was correct.", "The answer although tricky—was correct.", "The answer—although tricky was correct.", "The answer although—tricky—was correct."], answer:"The answer—although tricky—was correct.", explanation:"A pair of dashes can mark off extra information. Example: The answer – though tricky – was right." },
  { year:6, grammarPoint:"Hyphens & Dashes", question:"Choose the correctly hyphenated phrase (lit room).", options:["a brightly-lit room", "a brightly lit-room", "a brightly lit room", "a brightly-lit-room"], answer:"a brightly lit room", explanation:"We do not use a hyphen after an adverb ending in -ly. Example: a brightly lit room." },
  { year:6, grammarPoint:"Hyphens & Dashes", question:"Choose the correct use of a dash (unexpected).", options:["The answer—though unexpected—was correct.", "The answer though unexpected—was correct.", "The answer—though unexpected was correct.", "The answer though—unexpected—was correct."], answer:"The answer—though unexpected—was correct.", explanation:"A pair of dashes can mark off extra information. Example: The answer – though tricky – was right." },
  { year:6, grammarPoint:"Hyphens & Dashes", question:"Choose the correct use of a dash (surprising).", options:["The result—although surprising—was correct.", "The result although surprising—was correct.", "The result—although surprising was correct.", "The result although—surprising—was correct."], answer:"The result—although surprising—was correct.", explanation:"A pair of dashes can mark off extra information. Example: The answer – though tricky – was right." },
  { year:6, grammarPoint:"Formal vs Informal", question:"Choose the formal sentence.", options:["I can't come.", "Sorry, I'm busy.", "I regret that I am unable to attend.", "I'm not coming, okay?"], answer:"I regret that I am unable to attend.", explanation:"Formal language is polite and precise, for official writing. Example: I regret that I am unable to attend." },
  { year:6, grammarPoint:"Formal vs Informal", question:"Choose the informal sentence (hand).", options:["I would like to request your help.", "I apologise for the delay.", "Can you give me a hand?", "I am unable to assist."], answer:"Can you give me a hand?", explanation:"Informal language is casual, for friends and family. Example: Can you give me a hand?" },
  { year:6, grammarPoint:"Formal vs Informal", question:"Choose the informal sentence (lend).", options:["I would appreciate your assistance.", "I apologise for the delay.", "Could you lend a hand?", "I am unable to assist."], answer:"Could you lend a hand?", explanation:"Informal language is casual, for friends and family. Example: Can you give me a hand?" },
  { year:6, grammarPoint:"Formal vs Informal", question:"Choose the informal sentence (give a hand).", options:["I would appreciate your assistance.", "I apologise for the delay.", "Could you give me a hand?", "I am unable to assist."], answer:"Could you give me a hand?", explanation:"Informal language is casual, for friends and family. Example: Can you give me a hand?" },
  { year:6, grammarPoint:"Formal vs Informal", question:"Choose the informal sentence (help out).", options:["I would appreciate your assistance.", "I apologise for the delay.", "Can you help me out?", "I am unable to assist."], answer:"Can you help me out?", explanation:"Informal language is casual, for friends and family. Example: Can you give me a hand?" },
  { year:6, grammarPoint:"Cohesion & Linking", question:"The team trained hard. ___, they won easily.", options:["However", "Therefore", "Although", "Unless"], answer:"Therefore", explanation:"'Therefore' shows a result. Example: They trained hard; therefore, they won." },
  { year:6, grammarPoint:"Cohesion & Linking", question:"We waited for hours. ___, the doors opened.", options:["Eventually", "Although", "Unless", "Meanwhile"], answer:"Eventually", explanation:"'Eventually' shows something happened after a long wait. Example: Eventually, the doors opened." },
  { year:6, grammarPoint:"Cohesion & Linking", question:"The team worked hard. ___, they succeeded.", options:["However", "Therefore", "Although", "Unless"], answer:"Therefore", explanation:"'Therefore' shows a result. Example: They trained hard; therefore, they won." },
  { year:6, grammarPoint:"Cohesion & Linking", question:"The team practised daily. ___, they improved quickly.", options:["However", "Therefore", "Although", "Unless"], answer:"Therefore", explanation:"'Therefore' shows a result. Example: They trained hard; therefore, they won." },
  { year:6, grammarPoint:"Cohesion & Linking", question:"The team trained daily. ___, they improved quickly.", options:["However", "Therefore", "Although", "Unless"], answer:"Therefore", explanation:"'Therefore' shows a result. Example: They trained hard; therefore, they won." },
  { year:6, grammarPoint:"Cohesion & Linking", question:"We waited for ages. ___, the gates finally opened.", options:["Eventually", "Although", "Unless", "Meanwhile"], answer:"Eventually", explanation:"'Eventually' shows something happened after a long wait. Example: Eventually, the doors opened." },
  { year:6, grammarPoint:"Ambiguity & Clarity", question:"Which sentence is clear? (annoyed)", options:["When Sam spoke to Alex, he was annoyed.", "Sam was annoyed when he spoke to Alex.", "He spoke to him and he was annoyed.", "When he spoke to him, he was annoyed."], answer:"Sam was annoyed when he spoke to Alex.", explanation:"A clear sentence names who is meant so the pronoun can't be confused. Example: Sam was annoyed when he spoke to Alex." },
  { year:6, grammarPoint:"Ambiguity & Clarity", question:"Which sentence is ambiguous? (notebook)", options:["Emma gave Lily her notebook.", "Emma gave Lily the red notebook.", "Emma gave Lily the notebook she borrowed.", "Emma gave Lily the maths notebook."], answer:"Emma gave Lily her notebook.", explanation:"A sentence is ambiguous when a pronoun could mean more than one person. Example: 'Emma gave Lily her book' – whose book?" },
  { year:6, grammarPoint:"Ambiguity & Clarity", question:"Which sentence is clear? (upset)", options:["When Sam spoke to Alex, he was upset.", "Sam was upset when he spoke to Alex.", "He spoke to him and he was upset.", "When he spoke to him, he was upset."], answer:"Sam was upset when he spoke to Alex.", explanation:"A clear sentence names who is meant so the pronoun can't be confused. Example: Sam was annoyed when he spoke to Alex." },
  { year:6, grammarPoint:"Ambiguity & Clarity", question:"Which sentence is ambiguous? (book)", options:["Emma gave Lily her book.", "Emma gave Lily the blue book.", "Emma gave Lily the book she borrowed.", "Emma gave Lily the maths book."], answer:"Emma gave Lily her book.", explanation:"A sentence is ambiguous when a pronoun could mean more than one person. Example: 'Emma gave Lily her book' – whose book?" },
  { year:6, grammarPoint:"Ambiguity & Clarity", question:"Which sentence is clear? (Tom upset)", options:["When Tom spoke to Jack, he was upset.", "Tom was upset when he spoke to Jack.", "He spoke to him and he was upset.", "When he spoke to him, he was upset."], answer:"Tom was upset when he spoke to Jack.", explanation:"A clear sentence names who is meant so the pronoun can't be confused. Example: Sam was annoyed when he spoke to Alex." },
  { year:6, grammarPoint:"Ambiguity & Clarity", question:"Which sentence is ambiguous? (jacket)", options:["Sarah gave Emma her jacket.", "Sarah gave Emma the blue jacket.", "Sarah gave Emma the jacket she borrowed.", "Sarah gave Emma the winter jacket."], answer:"Sarah gave Emma her jacket.", explanation:"A sentence is ambiguous when a pronoun could mean more than one person. Example: 'Emma gave Lily her book' – whose book?" },
  { year:6, grammarPoint:"Advanced Conjunctions", question:"___ he was exhausted, he continued working.", options:["Because", "Although", "Unless", "Therefore"], answer:"Although", explanation:"'Although' shows a contrast. Example: Although he was tired, he kept going." },
  { year:6, grammarPoint:"Advanced Conjunctions", question:"We will begin ___ everyone is ready.", options:["unless", "although", "if", "however"], answer:"if", explanation:"'If' introduces a condition. Example: We will begin if everyone is ready." },
  { year:6, grammarPoint:"Advanced Conjunctions", question:"She was nervous; ___, she performed well.", options:["although", "however", "because", "unless"], answer:"however", explanation:"'However' joins two contrasting ideas. Example: She was nervous; however, she did well." },
  { year:6, grammarPoint:"Advanced Conjunctions", question:"He stayed home ___ he was unwell.", options:["unless", "although", "because", "however"], answer:"because", explanation:"'Because' gives the reason. Example: He stayed home because he was unwell." },
  { year:6, grammarPoint:"Advanced Conjunctions", question:"___ he was tired, he kept going.", options:["Because", "Although", "Unless", "Therefore"], answer:"Although", explanation:"'Although' shows a contrast. Example: Although he was tired, he kept going." },
  { year:6, grammarPoint:"Advanced Conjunctions", question:"We will start ___ everyone is ready.", options:["unless", "although", "if", "however"], answer:"if", explanation:"'If' introduces a condition. Example: We will begin if everyone is ready." },
  { year:6, grammarPoint:"Verb Forms & Tenses", question:"She ___ to the shop when it started raining.", options:["goes", "was going", "is going", "has gone"], answer:"was going", explanation:"The past progressive ('was/were' + -ing) shows an action in progress in the past. Example: She was going home." },
  { year:6, grammarPoint:"Verb Forms & Tenses", question:"They ___ the film before.", options:["have seen", "has seen", "seeing", "seen"], answer:"have seen", explanation:"The present perfect ('have/has' + past participle) links the past to now. Example: They have seen the film." },
  { year:6, grammarPoint:"Verb Forms & Tenses", question:"By the time we arrived, the show ___.", options:["started", "had started", "has started", "was starting"], answer:"had started", explanation:"The past perfect ('had' + past participle) shows something finished before another past event. Example: The show had started." },
  { year:6, grammarPoint:"Verb Forms & Tenses", question:"They ___ the book before.", options:["have read", "has read", "reading", "readed"], answer:"have read", explanation:"The present perfect ('have/has' + past participle) links the past to now. Example: They have seen the film." },
  { year:6, grammarPoint:"Verb Forms & Tenses", question:"By the time we arrived, the film ___.", options:["started", "had started", "has started", "was starting"], answer:"had started", explanation:"The past perfect ('had' + past participle) shows something finished before another past event. Example: The show had started." },
  { year:6, grammarPoint:"Verb Forms & Tenses", question:"By the time we arrived, the concert ___.", options:["started", "had started", "has started", "was starting"], answer:"had started", explanation:"The past perfect ('had' + past participle) shows something finished before another past event. Example: The show had started." },
  { year:6, grammarPoint:"Punctuation for Clarity", question:"Choose the correctly punctuated sentence (eating).", options:["Before eating the family washed their hands.", "Before eating, the family washed their hands.", "Before, eating the family washed their hands.", "Before eating the family, washed their hands."], answer:"Before eating, the family washed their hands.", explanation:"A fronted adverbial at the start of a sentence is followed by a comma. Example: Before eating, we washed our hands." },
  { year:6, grammarPoint:"Punctuation for Clarity", question:"Choose the sentence where commas change meaning (Grandma).", options:["Let's eat, Grandma.", "Let's eat Grandma.", "Both A and B", "Neither"], answer:"Both A and B", explanation:"A comma can change the meaning of a sentence. Example: 'Let's eat, Grandma' vs 'Let's eat Grandma'." },
  { year:6, grammarPoint:"Punctuation for Clarity", question:"Choose the sentence where commas change meaning (children).", options:["Let's eat, children.", "Let's eat children.", "Both A and B", "Neither"], answer:"Both A and B", explanation:"A comma can change the meaning of a sentence. Example: 'Let's eat, Grandma' vs 'Let's eat Grandma'." },
  { year:6, grammarPoint:"Synonyms & Precision", question:"Choose the most precise verb (trudged).", options:["walked", "trudged", "went", "moved"], answer:"trudged", explanation:"A precise verb paints a clearer picture than a general one. Example: 'trudged' tells us more than 'went'." },
  { year:6, grammarPoint:"Synonyms & Precision", question:"Choose the strongest adjective (furious).", options:["angry", "annoyed", "furious", "cross"], answer:"furious", explanation:"A strong adjective has more force than a mild one. Example: 'furious' is stronger than 'annoyed'." },
  { year:6, grammarPoint:"Synonyms & Precision", question:"Choose the most precise verb (staggered).", options:["walked", "staggered", "went", "moved"], answer:"staggered", explanation:"A precise verb paints a clearer picture than a general one. Example: 'trudged' tells us more than 'went'." },
  { year:6, grammarPoint:"Synonyms & Precision", question:"Choose the strongest adjective (exhausted).", options:["tired", "exhausted", "sleepy", "weary"], answer:"exhausted", explanation:"A strong adjective has more force than a mild one. Example: 'furious' is stronger than 'annoyed'." },
  { year:6, grammarPoint:"Synonyms & Precision", question:"Choose the most precise verb (tiptoed).", options:["walked", "tiptoed", "went", "moved"], answer:"tiptoed", explanation:"A precise verb paints a clearer picture than a general one. Example: 'trudged' tells us more than 'went'." },
  { year:6, grammarPoint:"Synonyms & Precision", question:"Choose the strongest adjective (terrified).", options:["scared", "terrified", "nervous", "uneasy"], answer:"terrified", explanation:"A strong adjective has more force than a mild one. Example: 'furious' is stronger than 'annoyed'." },
  { year:6, grammarPoint:"Sentence Types", question:"Which is a complex sentence?", options:["I ran.", "I ran because I was late.", "I ran and I jumped.", "I ran; I was late."], answer:"I ran because I was late.", explanation:"A complex sentence has a main clause and a subordinate clause. Example: I ran because I was late." },
  { year:6, grammarPoint:"Sentence Types", question:"Which is a compound sentence?", options:["I ran because I was late.", "I ran and I jumped.", "Running fast, I tripped.", "I ran."], answer:"I ran and I jumped.", explanation:"A compound sentence joins two main clauses with a word like 'and'. Example: I ran and I jumped." },
  { year:6, grammarPoint:"Advanced Prepositions", question:"The cat hid ___ the sofa.", options:["beneath", "between", "beyond", "beside"], answer:"beneath", explanation:"'Beneath' means under or below. Example: The toy was beneath the bed." },
  { year:6, grammarPoint:"Advanced Prepositions", question:"The treasure was buried ___ the old oak tree.", options:["throughout", "within", "beside", "during"], answer:"beside", explanation:"'Beside' means next to. Example: She sat beside her friend." },
  { year:6, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (excited dog).", options:["The dog barked loudly who was excited.", "The dog who was excited barked loudly.", "The dog, barked loudly who was excited.", "The dog who barked loudly, was excited."], answer:"The dog who was excited barked loudly.", explanation:"A relative clause must sit next to the noun it describes. Example: The dog who was excited barked." },
  { year:6, grammarPoint:"Best Sentence Choice", question:"Choose the best sentence (the show).", options:["Before the show we found our seats.", "Before the show, we found our seats.", "We found our seats, before the show.", "Before, the show we found our seats."], answer:"Before the show, we found our seats.", explanation:"A fronted adverbial at the start of a sentence is followed by a comma. Example: Before eating, we washed our hands." },
  { year:6, grammarPoint:"Homophones", question:"The principal gave a speech in the school ___.", options:["hall", "haul", "hale", "hail"], answer:"hall", explanation:"'Hall' is a large room or space. ('Haul' means to pull.) Example: We met in the hall." },
  { year:6, grammarPoint:"Homophones", question:"The weather will ___ the match.", options:["affect", "effect", "effact", "affekt"], answer:"affect", explanation:"'Affect' is the verb meaning to change something. ('Effect' is usually the noun.) Example: Rain will affect the game." },
  { year:6, grammarPoint:"Homophones", question:"The medicine had a strong ___.", options:["scent", "sent", "cent", "scente"], answer:"scent", explanation:"'Scent' means a smell. ('Sent' is the past of send; 'cent' is money.) Example: The flower had a sweet scent." },
  { year:6, grammarPoint:"Homophones", question:"The new rule will ___ everyone.", options:["affect", "effect", "effact", "affekt"], answer:"affect", explanation:"'Affect' is the verb meaning to change something. ('Effect' is usually the noun.) Example: The rule will affect us all." },
  { year:6, grammarPoint:"Homophones", question:"The medicine had a bitter ___.", options:["taste", "waist", "waste", "tast"], answer:"taste", explanation:"'Taste' is the flavour of something. ('Waist' is the body; 'waste' means rubbish.) Example: The lemon had a sour taste." },
  { year:6, grammarPoint:"Vocabulary Precision", question:"Choose the most formal verb.", options:["ask", "request", "beg", "tell"], answer:"request", explanation:"'Request' is the formal way to ask. Example: I would like to request a meeting." },
  { year:6, grammarPoint:"Vocabulary Precision", question:"Choose the most precise adverb (rapidly).", options:["quickly", "rapidly", "fast", "soon"], answer:"rapidly", explanation:"'Rapidly' is a more precise, formal way to say quickly. Example: The fire spread rapidly." },
  { year:6, grammarPoint:"Vocabulary Precision", question:"Choose the most precise adverb (cautiously).", options:["slowly", "cautiously", "soon", "fast"], answer:"cautiously", explanation:"'Cautiously' precisely means in a careful way. Example: She crossed the road cautiously." },

/* ---------- State ---------- */
let mode='quiz', year=1, qIndex=0, answered=false;
let score={right:0,total:0};
let runResults=[];   // per-question correctness for the current quiz run
let quizDeck=[];     // shuffled questions (with shuffled options) for the current attempt
let records=[];      // {q, chosen, correct} per answered question, for the breakdown
const QUIZ_SECONDS=600; // 10 minutes
let timerId=null, secondsLeft=QUIZ_SECONDS, timedOut=false;
let quizStarted=false;   // false = show start screen; true = assessment in progress
const stage=document.getElementById('stage');
const years=document.getElementById('years');
const KEYS=['A','B','C','D','E'];

/* ---------- Helpers ---------- */
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildDeck(){
  // randomize question order AND option order each attempt
  quizDeck = shuffle(QUESTIONS.filter(q=>q.year===year)).map(q=>({...q, options:shuffle(q.options)}));
  qIndex=0; answered=false; runResults=[]; records=[];
  quizStarted=false;   // require a Start press before the timer runs
}

/* ---------- Build year buttons ---------- */
const quizYears=new Set(QUESTIONS.map(q=>q.year));
const reviewYears=new Set(Object.keys(REVIEW_DECK).map(Number).filter(y=>REVIEW_DECK[y].length));
function yearAvailable(y){ return mode==='quiz' ? quizYears.has(y) : reviewYears.has(y); }
function refreshYearButtons(){
  [...years.querySelectorAll('button')].forEach(b=>{
    const y=Number(b.textContent);
    b.style.opacity = yearAvailable(y) ? 1 : .35;
    b.setAttribute('aria-selected', y===year);
  });
}
[1,2,3,4,5,6].forEach(y=>{
  const b=document.createElement('button');
  b.textContent=y; b.setAttribute('aria-selected', y===year);
  b.onclick=()=>{year=y;
    stopTimer(); resetTimerDisplay();
    if(mode==='quiz') buildDeck(); else {qIndex=0;answered=false;}
    refreshYearButtons();
    render();};
  years.appendChild(b);
});

function yearQuestions(){return quizDeck;}
function reviewCards(){
  return (REVIEW_DECK[year] || []).map(c => ({point:c.point, defn:c.defn, eg:c.eg}));
}

function setMode(m){
  mode=m;answered=false;
  stopTimer(); resetTimerDisplay();
  if(m==='quiz') buildDeck(); else qIndex=0;
  document.getElementById('tabQuiz').setAttribute('aria-selected',m==='quiz');
  document.getElementById('tabReview').setAttribute('aria-selected',m==='review');
  document.getElementById('scorebox').style.visibility = m==='quiz'?'visible':'hidden';
  document.getElementById('timer').style.display = m==='quiz'?'block':'none';
  refreshYearButtons();
  render();
}
function updateScore(){document.getElementById('scoreNum').textContent=`${score.right}/${score.total}`;}

/* ---------- Timer ---------- */
function fmt(s){const m=Math.floor(s/60),ss=s%60;return `${m}:${String(ss).padStart(2,'0')}`;}
function resetTimerDisplay(){
  secondsLeft=QUIZ_SECONDS; timedOut=false;
  const t=document.getElementById('timer'), c=document.getElementById('clock');
  if(c)c.textContent=fmt(secondsLeft);
  if(t)t.classList.remove('warn','danger');
}
function startTimer(){
  stopTimer();
  const t=document.getElementById('timer'), c=document.getElementById('clock');
  timerId=setInterval(()=>{
    secondsLeft--;
    if(c)c.textContent=fmt(Math.max(0,secondsLeft));
    if(t){t.classList.toggle('warn',secondsLeft<=60&&secondsLeft>15);t.classList.toggle('danger',secondsLeft<=15);}
    if(secondsLeft<=0){stopTimer();timedOut=true;renderResults(quizDeck);}
  },1000);
}
function stopTimer(){ if(timerId){clearInterval(timerId);timerId=null;} }

/* ---------- Render ---------- */
function render(){
  const qs=yearQuestions();
  document.getElementById('gpCount').textContent =
    mode==='quiz'
      ? (quizStarted
          ? `Timed assessment · ${quizDeck.length} questions · 10 minutes`
          : `Year ${year} assessment ready · press Start when you are`)
      : `${reviewCards().length} curriculum point${reviewCards().length!==1?'s':''} new in Year ${year} · earlier years carry forward`;

  if(mode==='quiz') renderQuiz(qs);
  else renderReview(reviewCards());
  updateScore();
}

function renderStart(qs){
  const cards = reviewCards().length;
  stage.innerHTML=`
    <div class="card start">
      <span class="tag"><span class="yr">Year ${year}</span> · Grammar Assessment</span>
      <h2 class="start-title">Ready to begin?</h2>
      <ul class="start-facts">
        <li><b>${qs.length}</b> questions, in a fresh random order</li>
        <li><b>10-minute</b> timer — it starts when you press Start</li>
        <li>Wrong answers explain the rule with an example</li>
        <li>You'll get a score breakdown by grammar point at the end</li>
      </ul>
      <button class="btn start-btn" onclick="startQuiz()">▶ Start assessment</button>
    </div>`;
}

function startQuiz(){
  quizStarted=true;
  qIndex=0; answered=false; runResults=[]; records=[]; timedOut=false;
  resetTimerDisplay();
  startTimer();
  render();
}

function renderQuiz(qs){
  if(qs.length===0){stage.innerHTML=`<div class="card"><p class="empty">No questions for Year ${year} yet.<br>Add some in the QUESTIONS list at the top of the file.</p></div>`;return;}
  if(!quizStarted){ return renderStart(qs); }
  if(qIndex>=qs.length){return renderResults(qs);}
  const q=qs[qIndex];
  const isLast = qIndex===qs.length-1;
  stage.innerHTML=`
    <div class="card">
      <span class="tag"><span class="yr">Year ${q.year}</span> · ${q.grammarPoint}</span>
      <div class="question">${q.question}</div>
      <div class="options" id="opts"></div>
      <div class="explain" id="explain"></div>
      <div class="qnav">
        <span class="prog">Q ${qIndex+1} / ${qs.length}</span>
        <button class="btn" id="nextBtn" disabled onclick="next()">${isLast?'Finish ✓':'Next →'}</button>
      </div>
    </div>`;
  const opts=document.getElementById('opts');
  q.options.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.dataset.val=opt;
    b.innerHTML=`<span class="key">${KEYS[i]}</span><span>${opt}</span>`;
    b.onclick=()=>choose(b,opt,q);
    opts.appendChild(b);
  });
}

function choose(btn,opt,q){
  if(answered)return; answered=true;
  score.total++;
  const correct = opt===q.answer;
  runResults[qIndex]=correct;
  records[qIndex]={grammarPoint:q.grammarPoint, question:q.question, chosen:opt, answer:q.answer, correct};
  const optBtns=[...document.querySelectorAll('.opt')];
  if(correct){score.right++;btn.classList.add('correct');}
  else{
    btn.classList.add('wrong');
    // reveal the correct option by matching the stored option text exactly
    optBtns.forEach(b=>{ if(b.dataset.val===q.answer)b.classList.add('correct'); });
    const ex=document.getElementById('explain');
    ex.innerHTML=`<h4>Why?</h4>${q.explanation.replace('Example:','<span class="eg">Example:')+(q.explanation.includes('Example:')?'</span>':'')}`;
    ex.classList.add('show');
  }
  optBtns.forEach(b=>b.disabled=true);
  document.getElementById('nextBtn').disabled=false;
  updateScore();
}

function next(){
  qIndex++; answered=false;
  if(qIndex>=quizDeck.length){ stopTimer(); }
  render();
}

function renderResults(qs){
  stopTimer();
  const total = qs.length;
  const answered = records.filter(Boolean).length;
  const right = records.filter(r=>r&&r.correct).length;
  const wrong = answered - right;
  const skipped = total - answered;
  const pctRight = answered ? Math.round((right/answered)*100) : 0;
  const pctWrong = answered ? 100 - pctRight : 0;

  // group by grammar point
  const byPoint={};
  records.forEach(r=>{
    if(!r)return;
    (byPoint[r.grammarPoint] ||= {right:0,total:0});
    byPoint[r.grammarPoint].total++;
    if(r.correct) byPoint[r.grammarPoint].right++;
  });
  const points = Object.entries(byPoint).sort((a,b)=>(b[1].right/b[1].total)-(a[1].right/a[1].total));

  // donut for % correct of answered
  const R=52, C=2*Math.PI*R, ok=C*(pctRight/100);
  const donut = `
    <svg class="donut" width="132" height="132" viewBox="0 0 132 132">
      <circle cx="66" cy="66" r="${R}" fill="none" stroke="var(--paper-2)" stroke-width="14"/>
      <circle cx="66" cy="66" r="${R}" fill="none" stroke="var(--good)" stroke-width="14"
        stroke-dasharray="${ok} ${C-ok}" stroke-dashoffset="${C*0.25}" stroke-linecap="round"
        transform="rotate(-90 66 66)"/>
      <text x="66" y="60" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)" font-family="ui-monospace,Menlo,monospace">${pctRight}%</text>
      <text x="66" y="82" text-anchor="middle" font-size="11" fill="var(--ink-soft)" letter-spacing="1">CORRECT</text>
    </svg>`;

  const rows = points.map(([p,s])=>{
    const pct=Math.round((s.right/s.total)*100);
    return `<div class="brow">
      <div class="top"><span>${p}</span><span class="frac">${s.right}/${s.total} · ${pct}%</span></div>
      <div class="bar"><span class="seg-ok" style="width:${(s.right/s.total)*100}%"></span><span class="seg-no" style="width:${((s.total-s.right)/s.total)*100}%"></span></div>
    </div>`;
  }).join('');

  stage.innerHTML=`
    <div class="card results">
      ${timedOut?'<span class="timeup">⏱ Time\u2019s up — auto-submitted</span><br>':''}
      ${donut}
      <p>Of the <b>${answered}</b> question${answered!==1?'s':''} you answered in Year ${year}, you got <b>${right}</b> right and <b>${wrong}</b> wrong.${skipped?` <br>${skipped} question${skipped!==1?'s':''} left unanswered.`:''}</p>
      <div class="split">
        <span class="chip ok">✓ Correct ${pctRight}%</span>
        <span class="chip no">✕ Incorrect ${pctWrong}%</span>
        ${skipped?`<span class="chip skip">— Skipped ${skipped}</span>`:''}
      </div>
      ${rows?`<div class="breakdown"><h3>By grammar point</h3>${rows}</div>`:''}
      <div style="margin-top:24px">
        <button class="btn" onclick="restartQuiz()">↺ New assessment</button>
      </div>
    </div>`;
}

function restartQuiz(){
  stopTimer(); resetTimerDisplay();
  buildDeck();
  render();
}

function renderReview(cards){
  if(cards.length===0){stage.innerHTML=`<div class="card"><p class="empty">No review cards for Year ${year} yet.</p></div>`;return;}
  const c=cards[qIndex%cards.length];
  stage.innerHTML=`
    <div class="card flash">
      <span class="tag"><span class="yr">Year ${year}</span> · card ${(qIndex%cards.length)+1} of ${cards.length}</span>
      <div class="flash-inner" id="fi" onclick="this.classList.toggle('flipped')">
        <div class="face front">
          <div class="point">${c.point}</div>
          <div class="hint">Tap to reveal the rule</div>
        </div>
        <div class="face back">
          <div class="defn">${c.defn}</div>
          <div class="eg">${c.eg}</div>
        </div>
      </div>
      <div class="flip-hint">tap card to flip</div>
      <div class="qnav">
        <button class="btn ghost" onclick="qIndex=(qIndex-1+${cards.length})%${cards.length};render()">← Prev</button>
        <span class="prog">${(qIndex%cards.length)+1} / ${cards.length}</span>
        <button class="btn" onclick="qIndex=(qIndex+1)%${cards.length};render()">Next →</button>
      </div>
    </div>`;
}

/* keyboard: A/B/C/D to answer, → for next */
document.addEventListener('keydown',e=>{
  if(mode!=='quiz')return;
  const opts=[...document.querySelectorAll('.opt')];
  const i=KEYS.indexOf(e.key.toUpperCase());
  if(i>=0&&opts[i]&&!answered)opts[i].click();
  if(e.key==='Enter'||e.key==='ArrowRight'){const n=document.getElementById('nextBtn');if(n&&!n.disabled)n.click();}
});

buildDeck();
resetTimerDisplay();
document.getElementById('timer').style.display = mode==='quiz'?'block':'none';
refreshYearButtons();
render();
</script>
</body>
</html>
