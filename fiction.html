<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Narrative Reading Check (Years 1–5)</title>
<style>
:root{
  --paper:#f6f4ef; --ink:#26282b; --muted:#6b6f76; --line:#e3ddd0;
  --accent:#2E75B6; --accent-deep:#1F3864; --card:#ffffff;
  --green:#2e7d32; --green-bg:#e8f4e9; --red:#c62828; --red-bg:#fbe9e9;
  --shadow:0 1px 2px rgba(0,0,0,.05),0 8px 24px rgba(31,56,100,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.55; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1120px;margin:0 auto;padding:24px 18px 80px}

header.app{padding:8px 0 4px}
header.app h1{font-size:1.55rem;margin:0 0 2px;color:var(--accent-deep);letter-spacing:-.01em}
header.app .tag{color:var(--muted);font-size:.92rem;margin-bottom:14px}

#gradebar{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 22px}
.gradebtn{
  border:1px solid var(--line);background:#fff;color:var(--accent-deep);
  padding:9px 16px;border-radius:999px;font-weight:600;font-size:.95rem;cursor:pointer;
  transition:all .15s ease;
}
.gradebtn:hover{border-color:var(--accent);}
.gradebtn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--shadow)}

#testarea{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 26px 22px;box-shadow:var(--shadow)}
.testhead{border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}
.kicker{text-transform:uppercase;letter-spacing:.08em;font-size:.72rem;font-weight:700;color:var(--accent)}
.title{font-size:1.5rem;margin:.25em 0 .1em;color:var(--accent-deep)}
.subtitle{color:var(--muted);font-style:italic;margin-bottom:.3em}
.instruction{color:var(--muted);font-size:.92rem;margin-top:6px}

.story p{font-family:Georgia,"Times New Roman",serif;font-size:1.06rem;line-height:1.72;margin:0 0 .85em;white-space:pre-wrap}

.qhead{margin:0 0 6px;font-weight:700;color:var(--accent-deep);font-size:1.1rem;border-top:1px solid var(--line);padding-top:14px}

.cols{display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:start;margin-top:6px}
.col-read{position:sticky;top:14px;max-height:calc(100vh - 40px);overflow:auto;padding-right:10px}
.col-q{min-width:0}
.col-read::-webkit-scrollbar{width:9px}
.col-read::-webkit-scrollbar-thumb{background:#d9d2c4;border-radius:9px}

.question{padding:16px 0;border-bottom:1px solid var(--line)}
.question:last-child{border-bottom:none}
.qtext{font-weight:600;margin-bottom:10px;display:flex;flex-wrap:wrap;align-items:flex-start;gap:6px}
.qnum{display:inline-flex;align-items:center;justify-content:center;min-width:1.7em;height:1.7em;padding:0 .35em;margin-right:6px;border-radius:8px;background:var(--accent);color:#fff;font-size:.8rem;font-weight:700;flex:none}

.options{display:flex;flex-direction:column;gap:8px;margin-left:2px}
.option{
  display:flex;align-items:flex-start;gap:10px;text-align:left;width:100%;
  border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 13px;
  font-size:1rem;color:var(--ink);cursor:pointer;font-family:inherit;line-height:1.45;
  transition:border-color .12s ease,background .12s ease;
}
.option:hover{border-color:var(--accent)}
.option .letter{flex:none;font-weight:700;color:var(--accent);border:1px solid var(--line);border-radius:7px;width:1.7em;height:1.7em;display:inline-flex;align-items:center;justify-content:center;font-size:.85rem}
.option.selected{border-color:var(--accent);background:#eef5fb}
.option.selected .letter{background:var(--accent);color:#fff;border-color:var(--accent)}
.option:disabled{cursor:default;opacity:1}
.option.correct{border-color:var(--green);background:var(--green-bg)}
.option.correct .letter{background:var(--green);color:#fff;border-color:var(--green)}
.option.chosen-wrong{border-color:var(--red);background:var(--red-bg)}
.option.chosen-wrong .letter{background:var(--red);color:#fff;border-color:var(--red)}

.qresult{margin-left:auto;font-size:.78rem;font-weight:700;padding:2px 10px;border-radius:999px}
.qresult.ok{background:var(--green-bg);color:var(--green)}
.qresult.no{background:var(--red-bg);color:var(--red)}

.controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
.btn{border:1px solid var(--line);background:#fff;color:var(--accent-deep);font-weight:600;padding:11px 18px;border-radius:12px;cursor:pointer;font-size:.98rem;font-family:inherit}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--shadow)}
.btn.primary:hover{background:#2a6aa6}
.btn:disabled{opacity:.5;cursor:default}

#results{display:none;margin-top:22px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:var(--shadow)}
.scorecard{text-align:center;padding:6px 0 16px;border-bottom:1px solid var(--line)}
.scorebig{font-size:2.6rem;font-weight:800;color:var(--accent-deep);line-height:1}
.scorepct{font-size:1.1rem;color:var(--accent);font-weight:700;margin-top:2px}
.scoremsg{color:var(--muted);margin-top:6px}
.bd-title{margin:18px 0 12px;font-size:1.05rem;color:var(--accent-deep)}
.breakdown{display:flex;flex-direction:column}
.bd-row{display:grid;grid-template-columns:1fr auto auto;gap:16px;align-items:baseline;padding:7px 0;border-bottom:1px dotted var(--line)}
.bd-row:last-child{border-bottom:none}
.bd-label{font-size:.96rem}
.bd-count{color:var(--muted);font-variant-numeric:tabular-nums;font-size:.85rem;white-space:nowrap}
.bd-pct{font-weight:800;font-variant-numeric:tabular-nums;min-width:52px;text-align:right;color:var(--accent-deep);font-size:1.05rem}
.bd-pct.full{color:var(--green)}
.bd-pct.zero{color:var(--red)}

footer.app{color:var(--muted);font-size:.82rem;text-align:center;margin-top:26px}

@media (max-width:820px){
  .cols{grid-template-columns:1fr;gap:6px}
  .col-read{position:static;max-height:none;overflow:visible;padding-right:0;margin-bottom:8px}
  .title{font-size:1.3rem}
}
@media print{
  #gradebar,.controls,#results{display:none!important}
  body{background:#fff}
  #testarea{box-shadow:none;border:none}
}

</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <h1>Narrative Reading Check</h1>
    <div class="tag">Pick a year group. You get one random story from ten, with the questions and answers shuffled each time.</div>
  </header>
  <div id="gradebar"></div>
  <div id="testarea"></div>
  <div id="results"></div>
  <footer class="app">50 stories &middot; 5 year groups &middot; works offline, no account needed.</footer>
</div>
<script>
var DATA = {"Year 1":[{"title":"Pip Finds a Safe Place","story":["Pip was a little squirrel. The leaves were turning red and gold. Soon it would be winter. Pip had lots of nuts, but she had nowhere safe to keep them.","Scritch, scratch, went Pip’s claws as she dug and looked.","First, Pip tried a hole in the open path. But everyone could see her nuts there. “Oh no!” said Pip. “This is too open.”","Next, Pip tried the long, wet grass. But the grass was cold and full of dew. “Brrr!” said Pip. “This is too wet.”","Then, Pip tried a thin, low branch. But the branch wobbled in the wind. “Wobble, wobble!” said Pip. “This is too shaky.”","Poor Pip felt sad and worried. She sat on a root and gave a little squeak.","Just then, she saw it. High in the old oak tree was a snug, round hole. It was dry. It was hidden. It was safe.","Pip popped her nuts inside. “This,” said Pip happily, “is just right.”","So Pip tucked away her nuts, gave her tail a flick, and got ready for winter."],"qs":[{"q":"Where did Pip try FIRST?","opts":["A hole in the open path","The long, wet grass","A thin, low branch","Under a pile of leaves"],"a":0,"type":"Literal recall"},{"q":"What kind of animal was Pip?","opts":["A mouse","A squirrel","A bird","A hedgehog"],"a":1,"type":"Literal recall"},{"q":"Why does the writer use the words “Scritch, scratch”?","opts":["To show that Pip was singing","To show the sound of Pip’s claws digging","To show that it was raining","To show that Pip was sleeping"],"a":1,"type":"Author's craft"},{"q":"Why did Pip need a safe place?","opts":["To take a swim in the stream","To meet a new friend","To keep her nuts safe for winter","To build a nest for spring"],"a":2,"type":"Inference"},{"q":"Why was the long grass no good for Pip?","opts":["It was too open","It was too shaky","It was cold and wet","It was full of nuts"],"a":2,"type":"Inference"},{"q":"What season was on its way?","opts":["Spring","Winter","Summer","Autumn"],"a":1,"type":"Literal recall"},{"q":"How did Pip feel when she could not find a place?","opts":["Happy and excited","Sad and worried","Cross and shouting","Calm and sleepy"],"a":1,"type":"Literal recall"},{"q":"Why was the open path no good for Pip?","opts":["It was too wet","It was too shaky","It was too open — everyone could see","It was too dark"],"a":2,"type":"Inference"},{"q":"Which would be a good title for this story?","opts":["“Pip Goes Swimming”","“Pip and the Wobbly Branch”","“Pip Finds a Safe Place for Her Nuts”","“Pip and the Cold Grass”"],"a":2,"type":"Main idea, title & genre"},{"q":"What was wrong with the thin, low branch?","opts":["It wobbled in the wind","It was full of cold dew","It was a dark hole","It was too high to reach"],"a":0,"type":"Literal recall"},{"q":"Where did Pip keep her nuts in the end?","opts":["In the open path","In a snug hole in the old oak tree","In the long grass","On the thin branch"],"a":1,"type":"Literal recall"},{"q":"At the end of the story, how did Pip feel?","opts":["Frightened","Hungry","Happy","Sad"],"a":2,"type":"Inference"}]},{"title":"Milo Finds a Cosy Bed","story":["Milo was a little kitten. It was a cold, grey day. Milo gave a big yawn. He wanted a warm, cosy place to take a nap.","Pitter-patter, pitter-patter, went Milo’s paws as he padded through the house.","First, Milo tried the kitchen floor. But the floor was hard and cold. “Brrr!” said Milo. “This is too cold.”","Next, Milo tried the big white bathtub. But the tub was smooth and slippery. “Whoops!” said Milo. “This is too slippery.”","Then, Milo tried the bristly doormat. But the mat was rough and scratchy. “Ouch!” said Milo. “This is too scratchy.”","Poor Milo felt sad and tired. He sat by the door and gave a little mew.","Just then, he saw it. By the warm fire was a soft, round basket with a fluffy blanket. It was warm. It was soft. It was cosy.","Milo climbed inside. “This,” said Milo happily, “is just right.”","So Milo curled up small, gave a happy purr, and had a lovely sleep."],"qs":[{"q":"What kind of animal was Milo?","opts":["A puppy","A kitten","A rabbit","A duckling"],"a":1,"type":"Literal recall"},{"q":"What was the day like?","opts":["Hot and sunny","Cold and grey","Wet and rainy","Warm and breezy"],"a":1,"type":"Literal recall"},{"q":"Why did Milo want a cosy place?","opts":["To take a nap","To find some food","To play a game","To hide from a dog"],"a":0,"type":"Inference"},{"q":"Where did Milo try FIRST?","opts":["The bathtub","The doormat","The kitchen floor","The windowsill"],"a":2,"type":"Literal recall"},{"q":"Why was the kitchen floor no good for Milo?","opts":["It was hard and cold","It was smooth and slippery","It was rough and scratchy","It was too soft"],"a":0,"type":"Inference"},{"q":"Why was the bathtub no good for Milo?","opts":["It was too cold","It was too slippery","It was too scratchy","It was too warm"],"a":1,"type":"Inference"},{"q":"Why does the writer use the words “Pitter-patter”?","opts":["To show that it was raining","To show the sound of Milo’s paws","To show that Milo was singing","To show Milo was eating"],"a":1,"type":"Author's craft"},{"q":"What was the doormat like?","opts":["Soft and warm","Rough and scratchy","Smooth and slippery","Wet and muddy"],"a":1,"type":"Literal recall"},{"q":"How did Milo feel when he could not find a spot?","opts":["Happy and excited","Cross and shouting","Sad and tired","Proud and bold"],"a":2,"type":"Literal recall"},{"q":"Where did Milo sleep in the end?","opts":["On the kitchen floor","In a soft basket by the fire","In the bathtub","On the doormat"],"a":1,"type":"Literal recall"},{"q":"At the end of the story, how did Milo feel?","opts":["Frightened","Happy and cosy","Hungry","Cold and wet"],"a":1,"type":"Inference"},{"q":"Which would be a good title for this story?","opts":["“Milo and the Cold Floor”","“Milo Goes Outside”","“Milo Finds a Cosy Bed”","“Milo and the Noisy Dog”"],"a":2,"type":"Main idea, title & genre"}]},{"title":"Hazel Finds Some Yummy Cheese","story":["Hazel was a little mouse. Her tummy gave a big rumble. Hazel was very hungry. She set off to find something nice to eat.","Nibble, nibble, went Hazel’s teeth as she tried each thing she found.","First, Hazel tried a shiny red berry. But the berry was very sour. “Pooh!” said Hazel. “This is too sour.”","Next, Hazel tried a curly brown leaf. But the leaf was old and dry. “Bleh!” said Hazel. “This is too dry.”","Then, Hazel tried a small grey pebble. But the pebble was hard as a stone. “Ow!” said Hazel. “This is too hard.”","Poor Hazel felt sad and hungry. She sat by the wall and gave a little squeak.","Just then, she saw it. On a little plate was a piece of soft yellow cheese. It smelled good. It was soft. It was yummy.","Hazel took a big bite. “This,” said Hazel happily, “is just right.”","So Hazel ate up every crumb, rubbed her full little tummy, and squeaked for joy."],"qs":[{"q":"Why did Hazel set off?","opts":["To find something to eat","To find a soft bed","To find a new friend","To play in the sun"],"a":0,"type":"Inference"},{"q":"Why does the writer use the words “Nibble, nibble”?","opts":["To show that it was raining","To show that Hazel was singing","To show the sound of Hazel’s teeth","To show that Hazel was sleeping"],"a":2,"type":"Author's craft"},{"q":"What kind of animal was Hazel?","opts":["A mouse","A bird","A frog","A rabbit"],"a":0,"type":"Literal recall"},{"q":"What did Hazel try FIRST?","opts":["A curly brown leaf","A shiny red berry","A small grey pebble","A green apple"],"a":1,"type":"Literal recall"},{"q":"What was the matter with Hazel at the start?","opts":["She was sleepy","She was hungry","She was cold","Frightened"],"a":1,"type":"Literal recall"},{"q":"Why was the red berry no good for Hazel?","opts":["It was too dry","It was too sour","It was too hard","It was too big"],"a":1,"type":"Inference"},{"q":"Why was the curly leaf no good for Hazel?","opts":["It was too sour","It was too hard","It was old and dry","It was too sweet"],"a":2,"type":"Inference"},{"q":"What was the small grey thing Hazel tried?","opts":["A pebble, hard as a stone","A soft little nut","A sweet seed","A lump of mud"],"a":0,"type":"Literal recall"},{"q":"How did Hazel feel when she could not find food?","opts":["Happy and excited","Sad and hungry","Cross and shouting","Calm and full"],"a":1,"type":"Literal recall"},{"q":"What did Hazel eat in the end?","opts":["The red berry","A piece of soft yellow cheese","The curly brown leaf","The grey pebble"],"a":1,"type":"Literal recall"},{"q":"At the end of the story, how did Hazel feel?","opts":["Frightened","Sleepy","Happy","Hungry"],"a":2,"type":"Inference"},{"q":"Which would be a good title for this story?","opts":["“Hazel Finds Some Yummy Cheese”","“Hazel Loses Her Way”","“Hazel Goes to Sleep”","“Hazel and the Sour Berry”"],"a":0,"type":"Main idea, title & genre"}]},{"title":"Fern Finds a Quiet Place","story":["Fern was a little rabbit. The meadow was full of noise. Fern was sleepy and wanted a quiet place to rest.","Thump, thump, went Fern’s foot as she hopped along.","First, Fern tried a spot by the beehive. But the bees went buzz all day. “Oh dear!” said Fern. “This is too buzzy.”","Next, Fern tried a spot by the pond. But the frogs went croak all day. “Oh no!” said Fern. “This is too croaky.”","Then, Fern tried the top of the hill. But the wind went whoosh all day. “Brrr!” said Fern. “This is too windy.”","Poor Fern felt sad and sleepy. She sat by a tree and gave a little sigh.","Just then, she saw it. Under the tree was a warm, dark burrow. It was quiet. It was still. It was peaceful.","Fern hopped inside. “This,” said Fern happily, “is just right.”","So Fern snuggled down in the soft earth, shut her eyes, and had a peaceful sleep."],"qs":[{"q":"Where did Fern try FIRST?","opts":["By the pond","By the beehive","On top of the hill","In the long grass"],"a":1,"type":"Literal recall"},{"q":"What kind of animal was Fern?","opts":["A rabbit","A mouse","A fox","A squirrel"],"a":0,"type":"Literal recall"},{"q":"What was the meadow full of?","opts":["Noise","Rain","Snow","Flowers"],"a":0,"type":"Literal recall"},{"q":"Why did Fern want a quiet place?","opts":["To find some food","To rest and sleep","To hop and play","To hide from a fox"],"a":1,"type":"Inference"},{"q":"Why was the pond no good for Fern?","opts":["The frogs were too croaky","The bees were too buzzy","The wind was too windy","The water was too cold"],"a":0,"type":"Inference"},{"q":"Why does the writer use the words “Thump, thump”?","opts":["To show that it was raining","To show the sound of Fern’s foot","To show that Fern was eating","To show that Fern was singing"],"a":1,"type":"Author's craft"},{"q":"Why was the beehive spot no good for Fern?","opts":["It was too windy","The bees were too buzzy","It was too wet","It was too sunny"],"a":1,"type":"Inference"},{"q":"How did Fern feel when every place was wrong?","opts":["Happy and excited","Cross and shouting","Sad and sleepy","Excited and lively"],"a":2,"type":"Literal recall"},{"q":"What was the top of the hill like?","opts":["The wind went whoosh all day","It was warm and still","It smelled sweet","Quiet and shady"],"a":0,"type":"Literal recall"},{"q":"Which would be a good title for this story?","opts":["“Fern and the Noisy Bees”","“Fern Finds a Quiet Place to Rest”","“Fern Goes Swimming”","“Fern and the Windy Hill”"],"a":1,"type":"Main idea, title & genre"},{"q":"Where did Fern rest in the end?","opts":["On top of the hill","By the pond","In a quiet burrow under the tree","By the beehive"],"a":2,"type":"Literal recall"},{"q":"At the end of the story, how did Fern feel?","opts":["Frightened","Happy and peaceful","Hungry","Cross"],"a":1,"type":"Inference"}]},{"title":"Ollie Finds the Best Branch","story":["Ollie was a little owl. The sky grew dark and the stars came out. Ollie was tired and wanted a good branch to rest on for the night.","Whoosh, whoosh, went Ollie’s wings as he flew from tree to tree.","First, Ollie tried a thin little twig. But the twig bent and swayed. “Wobble!” said Ollie. “This is too wobbly.”","Next, Ollie tried a branch by the rain. But the branch was wet and slippery. “Whoops!” said Ollie. “This is too slippery.”","Then, Ollie tried a low bush near the ground. But it was not safe down low. “Oh no!” said Ollie. “This is too low.”","Poor Ollie felt sad and tired. He sat for a moment and gave a little hoot.","Just then, he saw it. High in the tall tree was a strong, wide branch. It was steady. It was high. It was safe.","Ollie landed on it. “This,” said Ollie happily, “is just right.”","So Ollie fluffed up his feathers, closed his big round eyes, and rested all night long."],"qs":[{"q":"What kind of animal was Ollie?","opts":["An owl","A bat","A crow","A sparrow"],"a":0,"type":"Literal recall"},{"q":"What time of day was it?","opts":["Morning, with the sun up","Night, with the stars out","Midday, hot and bright","Afternoon, with clouds"],"a":1,"type":"Literal recall"},{"q":"Why does the writer use the words “Whoosh, whoosh”?","opts":["To show the sound of Ollie’s wings","To show that it was raining","To show that Ollie was singing","To show Ollie was eating"],"a":0,"type":"Author's craft"},{"q":"Why did Ollie want a good branch?","opts":["To eat his dinner","To rest for the night","To build a new nest","To hide from a cat"],"a":1,"type":"Inference"},{"q":"What did Ollie try FIRST?","opts":["A wet branch","A low bush","A thin little twig","A broken branch"],"a":2,"type":"Literal recall"},{"q":"Why was the thin twig no good for Ollie?","opts":["It was too wet","It bent and swayed","It was too low","It was too high"],"a":1,"type":"Inference"},{"q":"Why was the low bush no good for Ollie?","opts":["It was not safe down low","It was far too high","It was too wet","It was too sunny"],"a":0,"type":"Inference"},{"q":"Why was the wet branch no good for Ollie?","opts":["It was wobbly","It was wet and slippery","It was too low","It was too small"],"a":1,"type":"Inference"},{"q":"How did Ollie feel when he could not find a branch?","opts":["Happy and excited","Sad and tired","Cross and shouting","Calm and cosy"],"a":1,"type":"Literal recall"},{"q":"Where did Ollie rest in the end?","opts":["On a strong, high branch","In the low bush","On the thin twig","On the wet branch"],"a":0,"type":"Literal recall"},{"q":"At the end of the story, how did Ollie feel?","opts":["Frightened","Hungry","Happy and safe","Sad"],"a":2,"type":"Inference"},{"q":"Which would be a good title for this story?","opts":["“Ollie Loses a Feather”","“Ollie Finds the Best Branch”","“Ollie Goes Swimming”","“Ollie and the Wet Twig”"],"a":1,"type":"Main idea, title & genre"}]},{"title":"Frankie Finds the Perfect Spot","story":["Frankie was a little frog. The sun was warm and bright. Frankie wanted a good place to sit and warm up by the pond.","Splash, splash, went Frankie’s feet as he hopped about.","First, Frankie tried a grey rock. But the rock was sharp and pointy. “Ouch!” said Frankie. “This is too pointy.”","Next, Frankie tried a small floating leaf. But the leaf sank down with a glug. “Glug!” said Frankie. “This is too small.”","Then, Frankie tried the muddy bank. But the mud was thick and sticky. “Yuck!” said Frankie. “This is too sticky.”","Poor Frankie felt sad and grumpy. He sat in the water and gave a little ribbit.","Just then, he saw it. In the middle of the pond was a big, green lily pad. It was flat. It was dry. It was just right for a frog.","Frankie hopped on top. “This,” said Frankie happily, “is just right.”","So Frankie sat in the warm sun, gave a happy ribbit, and had a lovely day."],"qs":[{"q":"Why did Frankie want a good place?","opts":["To sit and warm up in the sun","To find his dinner","To hide from the rain","To go to sleep"],"a":0,"type":"Inference"},{"q":"What did Frankie try FIRST?","opts":["A small floating leaf","A grey rock","The muddy bank","A log in the water"],"a":1,"type":"Literal recall"},{"q":"What kind of animal was Frankie?","opts":["A fish","A frog","A snail","A duck"],"a":1,"type":"Literal recall"},{"q":"Why does the writer use the words “Splash, splash”?","opts":["To show that Frankie was singing","To show the sound of Frankie’s feet","To show that it was snowing","To show Frankie was eating"],"a":1,"type":"Author's craft"},{"q":"What was the weather like?","opts":["Warm and bright","Cold and snowy","Wet and rainy","Foggy and grey"],"a":0,"type":"Literal recall"},{"q":"Why was the floating leaf no good for Frankie?","opts":["It was too pointy","It was too sticky","It was too small and it sank","It was too hot"],"a":2,"type":"Inference"},{"q":"Why was the grey rock no good for Frankie?","opts":["It was sharp and pointy","It was too small","It was too sticky","It was too wet"],"a":0,"type":"Inference"},{"q":"What was the muddy bank like?","opts":["Thick and sticky","Soft and dry","Hard and pointy","Cool and shady"],"a":0,"type":"Literal recall"},{"q":"How did Frankie feel when nothing worked?","opts":["Happy and excited","Sad and grumpy","Sleepy and calm","Proud and pleased"],"a":1,"type":"Literal recall"},{"q":"Which would be a good title for this story?","opts":["“Frankie and the Big Storm”","“Frankie Finds the Perfect Spot in the Sun”","“Frankie Loses His Way”","“Frankie and the Sharp Rock”"],"a":1,"type":"Main idea, title & genre"},{"q":"Where did Frankie sit in the end?","opts":["On a big green lily pad","On the grey rock","On the floating leaf","On the muddy bank"],"a":0,"type":"Literal recall"},{"q":"At the end of the story, how did Frankie feel?","opts":["Frightened","Hungry","Happy","Cold"],"a":2,"type":"Inference"}]},{"title":"Bella Finds a Place to Sleep","story":["Bella was a little bear cub. The snow began to fall. Bella was very sleepy and needed a big, snug place to sleep all winter.","Sniff, snuff, went Bella’s nose as she searched and searched.","First, Bella tried a thick, bushy thicket. But the branches were full of prickles. “Ouch!” said Bella. “This is too prickly.”","Next, Bella tried a hollow log. But the log was far too small for a bear. “Oh dear!” said Bella. “This is too small.”","Then, Bella tried under a rock ledge. But cold water dripped down on her. “Brrr!” said Bella. “This is too drippy.”","Poor Bella felt sad and sleepy. She sat in the snow and gave a little grumble.","Just then, she saw it. In the side of the hill was a deep, dark cave. It was big. It was dry. It was snug.","Bella crawled inside. “This,” said Bella happily, “is just right.”","So Bella curled up into a big furry ball, closed her eyes, and slept all winter long."],"qs":[{"q":"What was the weather doing?","opts":["The snow began to fall","The sun was shining","It was raining hard","The wind was blowing leaves"],"a":0,"type":"Literal recall"},{"q":"What kind of animal was Bella?","opts":["A fox cub","A bear cub","A dog","A badger"],"a":1,"type":"Literal recall"},{"q":"What did Bella try FIRST?","opts":["A thick, bushy thicket","A hollow log","A rock ledge","A pile of leaves"],"a":0,"type":"Literal recall"},{"q":"Why did Bella need a snug place?","opts":["To eat some honey","To play in the snow","To sleep all winter","To watch the stars"],"a":2,"type":"Inference"},{"q":"Why does the writer use the words “Sniff, snuff”?","opts":["To show the sound of Bella’s nose","To show that it was raining","To show that Bella was singing","To show Bella was eating"],"a":0,"type":"Author's craft"},{"q":"Why was the thicket no good for Bella?","opts":["It was far too small","It was full of prickles","It was too drippy","It was too warm"],"a":1,"type":"Inference"},{"q":"Why was the hollow log no good for Bella?","opts":["It was too prickly","It was too cold","It was far too small for a bear","It was full of honey"],"a":2,"type":"Inference"},{"q":"What happened under the rock ledge?","opts":["It was warm and dry","Cold water dripped down on her","Bees buzzed around it","It was full of leaves"],"a":1,"type":"Literal recall"},{"q":"How did Bella feel when she could not find a place?","opts":["Happy and excited","Cross and shouting","Sad and sleepy","Warm and snug"],"a":2,"type":"Literal recall"},{"q":"Where did Bella sleep in the end?","opts":["In a deep, dry cave","In the hollow log","In the bushy thicket","Under the rock ledge"],"a":0,"type":"Literal recall"},{"q":"At the end of the story, how did Bella feel?","opts":["Frightened","Happy and snug","Hungry","Cold and wet"],"a":1,"type":"Inference"},{"q":"Which would be a good title for this story?","opts":["“Bella and the Buzzing Bees”","“Bella Goes Swimming”","“Bella Finds a Place to Sleep for Winter”","“Bella and the Prickly Thicket”"],"a":2,"type":"Main idea, title & genre"}]},{"title":"Rusty Finds a Warm, Sunny Spot","story":["Rusty was a little fox cub. The morning was frosty and cold. Rusty was shivering and wanted a sunny spot to warm up.","Pad, pad, went Rusty’s paws as he trotted around the farm.","First, Rusty tried a spot under a big tree. But the tree made too much shade. “Brrr!” said Rusty. “This is too shady.”","Next, Rusty tried behind the barn. But the wind blew cold and strong. “Whoosh!” said Rusty. “This is too windy.”","Then, Rusty tried the long green grass. But the grass was wet with frost. “Brrr!” said Rusty. “This is too wet.”","Poor Rusty felt sad and shivery. He sat down and gave a little yip.","Just then, he saw it. By the barn door was a pile of golden hay in the warm sun. It was soft. It was dry. It was sunny.","Rusty curled up on top. “This,” said Rusty happily, “is just right.”","So Rusty soaked up the warm sun, gave a happy yip, and stopped his shivering at last."],"qs":[{"q":"What kind of animal was Rusty?","opts":["A wolf","A fox cub","A dog","A cat"],"a":1,"type":"Literal recall"},{"q":"Why did Rusty want a sunny spot?","opts":["To warm up in the sun","To find some food","To take a swim","To take a nap in the shade"],"a":0,"type":"Inference"},{"q":"Why does the writer use the words “Pad, pad”?","opts":["To show that it was raining","To show the sound of Rusty’s paws","To show that Rusty was singing","To show Rusty was eating"],"a":1,"type":"Author's craft"},{"q":"What did Rusty try FIRST?","opts":["A spot under a big tree","Behind the barn","The long green grass","Down by the stream"],"a":0,"type":"Literal recall"},{"q":"What was the morning like?","opts":["Warm and sunny","Frosty and cold","Wet and rainy","Hot and dusty"],"a":1,"type":"Literal recall"},{"q":"Why was the spot under the tree no good for Rusty?","opts":["It was too windy","It was too wet","It made too much shade","It was too sunny"],"a":2,"type":"Inference"},{"q":"Why was it no good behind the barn?","opts":["The wind blew cold and strong","It was too shady","It was too sunny","It was too warm"],"a":0,"type":"Inference"},{"q":"What was the long grass like?","opts":["Dry and warm","Wet with frost","Full of prickles","Soft and sunny"],"a":1,"type":"Literal recall"},{"q":"How did Rusty feel when he could not get warm?","opts":["Happy and excited","Cross and shouting","Sad and shivery","Hot and bothered"],"a":2,"type":"Literal recall"},{"q":"Where did Rusty curl up in the end?","opts":["Under the big tree","Behind the barn","On a pile of warm hay in the sun","In the long grass"],"a":2,"type":"Literal recall"},{"q":"At the end of the story, how did Rusty feel?","opts":["Frightened","Hungry","Happy and warm","Cold"],"a":2,"type":"Inference"},{"q":"Which would be a good title for this story?","opts":["“Rusty Finds a Warm, Sunny Spot”","“Rusty Goes Swimming”","“Rusty and the Big Storm”","“Rusty and the Cold Barn”"],"a":0,"type":"Main idea, title & genre"}]},{"title":"Sammy Finds Shelter from the Rain","story":["Sammy was a little snail. Big rain clouds filled the sky. Sammy wanted a dry place to shelter from the rain.","Drip, drop, drip, drop, went the rain as Sammy crept along.","First, Sammy tried under a big floppy leaf. But the rain dripped right through it. “Splat!” said Sammy. “This is too leaky.”","Next, Sammy tried inside an open flower. But the petals let the rain in. “Oh no!” said Sammy. “This is too open.”","Then, Sammy tried a thin crack in the wall. But the crack was far too narrow. “Squeeze!” said Sammy. “This is too narrow.”","Poor Sammy felt sad and soggy. He stopped on a stone and gave a little sigh.","Just then, he saw it. Near the path was a big red mushroom, like a little roof. It was dry. It was snug. It kept the rain out.","Sammy crept underneath. “This,” said Sammy happily, “is just right.”","So Sammy waited out of the rain, dry and warm, until the sun came out again."],"qs":[{"q":"What did Sammy try FIRST?","opts":["An open flower","A big floppy leaf","A crack in the wall","Under a small stone"],"a":1,"type":"Literal recall"},{"q":"What kind of animal was Sammy?","opts":["A slug","A worm","A snail","A beetle"],"a":2,"type":"Literal recall"},{"q":"What was the weather like?","opts":["Big rain clouds and rain","Hot and sunny","Cold and snowy","Windy and dry"],"a":0,"type":"Literal recall"},{"q":"Why did Sammy want a dry place?","opts":["To shelter from the rain","To find some food","To take a nap","To play in the puddles"],"a":0,"type":"Inference"},{"q":"Why does the writer use the words “Drip, drop”?","opts":["To show that Sammy was singing","To show the sound of the rain","To show that Sammy was eating","To show Sammy was sleeping"],"a":1,"type":"Author's craft"},{"q":"Why was the big leaf no good for Sammy?","opts":["It was too narrow","It was too windy","The rain dripped right through","It was too sunny"],"a":2,"type":"Inference"},{"q":"Why was the open flower no good for Sammy?","opts":["It was too narrow","The petals let the rain in","It was too prickly","It was too high up"],"a":1,"type":"Inference"},{"q":"What was wrong with the crack in the wall?","opts":["It was far too narrow","It was too wet inside","It was too sunny","It was full of ants"],"a":0,"type":"Literal recall"},{"q":"How did Sammy feel when he stayed wet?","opts":["Happy and excited","Cross and shouting","Sad and soggy","Warm and dry"],"a":2,"type":"Literal recall"},{"q":"Where did Sammy shelter in the end?","opts":["Under a big red mushroom","Under the floppy leaf","In the crack in the wall","Inside the flower"],"a":0,"type":"Literal recall"},{"q":"At the end of the story, how did Sammy feel?","opts":["Frightened","Happy and dry","Hungry","Cold and wet"],"a":1,"type":"Inference"},{"q":"Which would be a good title for this story?","opts":["“Sammy and the Hot Sun”","“Sammy Goes for a Swim”","“Sammy Finds Shelter from the Rain”","“Sammy and the Floppy Leaf”"],"a":2,"type":"Main idea, title & genre"}]},{"title":"Bea Finds the Sweetest Flower","story":["Bea was a little bee. The garden was full of flowers. Bea was hungry and wanted a flower full of sweet nectar.","Buzz, buzz, went Bea’s wings as she flew from flower to flower.","First, Bea tried a small dry flower. But it had no nectar at all. “Oh no!” said Bea. “This one is empty.”","Next, Bea tried a flower up very high. But the wind blew her this way and that. “Whoosh!” said Bea. “This is too windy.”","Then, Bea tried a tight little bud. But the bud was shut up tight. “Oh dear!” said Bea. “This is too closed.”","Poor Bea felt sad and tired. She rested on a leaf and gave a little buzz.","Just then, she saw it. In the middle of the garden was a big, open sunflower. It was bright. It was wide open. It was full of sweet nectar.","Bea landed right in the middle. “This,” said Bea happily, “is just right.”","So Bea drank the sweet nectar, did a happy little dance, and buzzed home full and glad."],"qs":[{"q":"What kind of animal was Bea?","opts":["A fly","A bee","A wasp","A butterfly"],"a":1,"type":"Literal recall"},{"q":"What was the garden full of?","opts":["Flowers","Snow","Rain","Tall trees"],"a":0,"type":"Literal recall"},{"q":"Why did Bea fly from flower to flower?","opts":["To find sweet nectar","To find a bed","To hide from a cat","To get out of the rain"],"a":0,"type":"Inference"},{"q":"Why does the writer use the words “Buzz, buzz”?","opts":["To show that it was raining","To show the sound of Bea’s wings","To show that Bea was singing a song","To show Bea was sleeping"],"a":1,"type":"Author's craft"},{"q":"What did Bea try FIRST?","opts":["A small dry flower","A flower up very high","A tight little bud","A red rose"],"a":0,"type":"Literal recall"},{"q":"Why was the first flower no good for Bea?","opts":["It was too windy","It was shut tight","It had no nectar at all","It was too tall"],"a":2,"type":"Inference"},{"q":"Why was the high flower no good for Bea?","opts":["It had no nectar","It was shut tight","The wind blew her this way and that","It was too small"],"a":2,"type":"Inference"},{"q":"What was the tight little bud like?","opts":["Wide open","Shut up tight","Full of nectar","Covered in rain"],"a":1,"type":"Literal recall"},{"q":"How did Bea feel when she could not find nectar?","opts":["Happy and excited","Sad and tired","Cross and shouting","Calm and full"],"a":1,"type":"Literal recall"},{"q":"Where did Bea find nectar in the end?","opts":["In a big, open sunflower","In the tight little bud","In the small dry flower","In the high flower"],"a":0,"type":"Literal recall"},{"q":"At the end of the story, how did Bea feel?","opts":["Frightened","Hungry","Happy and full","Sad"],"a":2,"type":"Inference"},{"q":"Which would be a good title for this story?","opts":["“Bea and the Big Storm”","“Bea Goes to Sleep”","“Bea Finds the Sweetest Flower”","“Bea and the Shut Bud”"],"a":2,"type":"Main idea, title & genre"}]}],"Year 2":[{"title":"Marisol and the Little Lantern","story":["Marisol lived in a foggy seaside town called Mistport, where the nights were always dark and grey. She looked after three small grey kittens called Pip, Pim and Pom, and she loved them dearly. When she was not caring for her kittens, Marisol liked best of all to make paper lanterns.","The kittens’ favourite game was chasing a ball of bright string. Marisol would roll it across the floor, and the kittens would pounce and tumble eagerly, as quick as they could. But one evening the last candle in the house burned away to nothing. Until Marisol could buy more, the family had to make do with cold moonlight instead, and the kittens did not like it one bit.","Then Marisol had an idea. She had saved one small candle stub in a tin. “Perhaps,” she thought, “this one little candle might light a lantern bright enough to guide the boats home.” To make sure she did it right, she borrowed a book about making lanterns from the library.","Marisol built a lantern from paper and wire. She folded it, and folded it, and folded it, until it was just so. She waited all through the long afternoon for the sky to grow dark.","At last, as night fell, she lit the little candle inside. The lantern glowed warm and golden, as bright as a tiny moon. Marisol’s eyes shone at the sight of it. It was the most beautiful thing in all of Mistport.","When the lantern was ready, Marisol carried it very carefully up to the high cliff, so that not one gust of wind would blow the small flame out. But the sea breeze had other plans. It carried the warm glow far out across the water, where lost fishing boats could see it. At first, nobody noticed.","Then, one calm autumn night, it happened. All over Mistport, families hung up lanterns of their own — in windows, on doorsteps and along every dark lane. The harbour shone, the boats came safely home, and the sailors sang. The whole town was no longer dark, but full of light.","Everyone said that Marisol was a hero, because one small candle and one kind girl had turned their gloomy grey town into the brightest, safest place on all the coast."],"qs":[{"q":"Marisol said the candle “might” light a lantern. What does the word ‘might’ tell us?","opts":["The candle had already lit the lantern.","Marisol was not sure it would work — it was only a hope.","The lantern would definitely light.","The candle could never light at all."],"a":1,"type":"Vocabulary & word meaning"},{"q":"As well as caring for her kittens, what did Marisol like to do best?","opts":["Make paper lanterns","Sail little boats","Paint sea shells","Bake bread"],"a":0,"type":"Literal recall"},{"q":"Choose TWO words that describe how the kittens played with the string.","opts":["slept and snored","sat and stared","once a month","pounced and tumbled (eagerly)"],"a":3,"type":"Finding evidence"},{"q":"The writer says Marisol “folded it, and folded it, and folded it.” Why does the writer repeat the word ‘folded’?","opts":["To show that the lantern was cold.","To show that she folded it only once.","To show that she folded it again and again, for a long time.","To show that she forgot to fold it."],"a":2,"type":"Author's craft"},{"q":"What did the family have to make do with instead of candles?","opts":["A warm fire","Bright sunshine","Cold moonlight","More candles"],"a":2,"type":"Literal recall"},{"q":"“Marisol’s eyes shone at the sight of it.” What does this tell you about how Marisol felt?","opts":["She was feeling very sleepy.","She was delighted and thought it was wonderful.","She was frightened of the lantern.","She did not like the lantern at all."],"a":1,"type":"Inference"},{"q":"Where else might you find a kind, helpful character like Marisol?","opts":["In a shopping list.","In a maths book.","In other storybooks and fairy tales.","In a science report."],"a":2,"type":"Main idea, title & genre"},{"q":"Why did Marisol borrow a book from the library?","opts":["To read a bedtime story to her kittens.","Because she had lost her own book.","To learn how to cook fish.","To learn how to make the lantern properly."],"a":3,"type":"Inference"},{"q":"Which word in the story shows that the lantern was giving out light?","opts":["“glowed”","“foggy”","“dark”","“grey”"],"a":0,"type":"Finding evidence"},{"q":"“At first, nobody noticed.” Why did nobody notice the lantern at first?","opts":["Everyone in the town was asleep.","The glow was small and far out at sea, and people had not made lanterns yet.","The light was huge and easy to see.","Nobody lived in the town."],"a":1,"type":"Inference"},{"q":"Why did Marisol carry the lantern ‘very carefully’?","opts":["Because the lantern was far too heavy.","Because she was feeling tired.","So that the wind would not blow the small flame out.","Because the kittens were watching her."],"a":2,"type":"Inference"},{"q":"Which of these would also be a good title for this story?","opts":["“How to Fold Paper”","“How Marisol Lit Up the Town”","“The Lost Kitten”","“A Stormy Day at Sea”"],"a":1,"type":"Main idea, title & genre"},{"q":"Why did everyone say that Marisol was a hero?","opts":["Because she kept three kittens.","Because she won a swimming race.","Because she bought the most candles.","Because she turned the gloomy grey town into a bright, safe place."],"a":3,"type":"Inference"}]},{"title":"Olu and the Whistling Reed","story":["Olu lived in a still, silent valley called Hushwood, where no birds ever sang. He looked after three little brown goats called Nutmeg, Clove and Ginger, and he loved them dearly. When he was not minding his goats, Olu liked best of all to make music.","The goats’ favourite thing was to skip among the rocks. Olu would clap his hands, and the goats would leap and clatter merrily, as lively as they could. But one cold day Olu’s old wooden flute cracked and fell silent. Until he could mend it, Olu had to make do with humming under his breath instead, and it did not sound the same one bit.","Then Olu had an idea. He had found one tall, hollow reed by the river. “Perhaps,” he thought, “this one reed might make a pipe with a tune sweet enough to call the birds back.” To make sure he did it right, he borrowed a book about making pipes from the library.","Olu carved the reed into a little pipe. He shaped it, and shaped it, and shaped it, until it was smooth. He waited all through the quiet morning for the wind to drop.","At last he lifted the pipe and blew. A tune came out, clear and sweet, as bright as the dawn. Olu’s eyes shone at the sound of it. It was the loveliest thing in all of Hushwood.","When the tune was ready, Olu climbed very carefully to the top of the hill, so that not one note would be lost among the trees. But the breeze had other plans. It carried the music far across the valley, where birds in faraway woods could hear it. At first, nobody noticed.","Then, one warm spring morning, it happened. All across Hushwood, birds came flooding back — into hedges, onto rooftops and along every silent path. The children made pipes of their own, and the whole valley rang with song. Hushwood was no longer silent, but full of music.","Everyone said that Olu was a hero, because one hollow reed and one kind boy had turned their still, silent valley into the merriest, most musical place for miles around."],"qs":[{"q":"As well as minding his goats, what did Olu like to do best?","opts":["Climb tall trees","Make music","Catch fish","Paint pictures"],"a":1,"type":"Literal recall"},{"q":"What did Olu have to make do with instead of his flute?","opts":["A loud trumpet","A new drum","Humming under his breath","A ringing bell"],"a":2,"type":"Literal recall"},{"q":"Choose TWO words that describe how the goats moved among the rocks.","opts":["leaped and clattered (merrily)","sat and stared","slept and snored","once a year"],"a":0,"type":"Finding evidence"},{"q":"Why did Olu borrow a book from the library?","opts":["To learn how to make the pipe properly.","Because he had lost his own book.","To read a story to his goats.","To learn how to mend a fence."],"a":0,"type":"Inference"},{"q":"“Olu’s eyes shone at the sound of it.” What does this tell you about how Olu felt?","opts":["He was frightened of the sound.","He was feeling sleepy.","He was delighted and thought it was wonderful.","He did not like the sound at all."],"a":2,"type":"Inference"},{"q":"Which word in the story shows that the music was spreading across the valley?","opts":["“silent”","“cracked”","“still”","“carried”"],"a":3,"type":"Finding evidence"},{"q":"Olu said the reed “might” make a pipe. What does the word ‘might’ tell us?","opts":["The pipe was already made.","Olu was not sure it would work — it was only a hope.","The pipe would definitely work.","The reed could never make a pipe."],"a":1,"type":"Vocabulary & word meaning"},{"q":"Why did Olu climb ‘very carefully’ to the top of the hill?","opts":["Because the hill was far too steep.","Because he was feeling tired.","Because the goats were watching him.","So that not one note would be lost among the trees."],"a":3,"type":"Inference"},{"q":"Where else might you find a kind, helpful character like Olu?","opts":["In a shopping list.","In other storybooks and fairy tales.","In a maths book.","In a science report."],"a":1,"type":"Main idea, title & genre"},{"q":"The writer says Olu “shaped it, and shaped it, and shaped it.” Why does the writer repeat the word ‘shaped’?","opts":["To show that he shaped it again and again, for a long time.","To show that he shaped it only once.","To show that he forgot to shape it.","To show that the reed was cold."],"a":0,"type":"Author's craft"},{"q":"“At first, nobody noticed.” Why did nobody notice the music at first?","opts":["Everyone was asleep.","The music drifted far away and the birds had not yet come back.","The music was extremely loud.","Nobody lived in the valley."],"a":1,"type":"Inference"},{"q":"Why did everyone say that Olu was a hero?","opts":["Because he kept three goats.","Because he turned the still, silent valley into a musical place.","Because he won a singing prize.","Because he found the most reeds."],"a":1,"type":"Inference"},{"q":"Which of these would also be a good title for this story?","opts":["“How to Mend a Flute”","“The Lost Goat”","“How Olu Brought the Birds Back”","“A Rainy Day in Hushwood”"],"a":2,"type":"Main idea, title & genre"}]},{"title":"Hana and the One Red Apple","story":["Hana lived in a stony town called Stonleigh, where almost nothing would grow. She looked after three soft white rabbits called Hop, Skip and Thump, and she loved them dearly. When she was not caring for her rabbits, Hana liked best of all to grow things.","The rabbits’ favourite food was sweet green clover. Hana would lay a little pile before them, and the rabbits would nibble and thump happily, as fast as they could. But one day the clover patch was bare. Until it grew back, the rabbits had to make do with dry brown hay instead, and they did not like it one bit.","Then Hana had an idea. She had saved one shiny pip from a red apple. “Perhaps,” she thought, “this one little pip might grow into a tree full of apples.” To make sure she did it right, she borrowed a book about growing trees from the library.","Hana planted the pip in a pot. She tended it, and tended it, and tended it, all through the cold months. She waited a very long time.","At last a slender young tree stood in her garden, and one spring it broke into pink-and-white blossom. Hana’s eyes shone at the sight of it. It was the most beautiful thing in all of Stonleigh.","When the apples were ripe and full of pips, Hana picked them very carefully, so that not one precious pip would drop and be lost. But the birds had other plans. They carried the pips far across the town, dropping them in gardens, yards and cracks in the old stone walls. At first, nobody noticed.","Then, one bright autumn, it happened. All over Stonleigh, apple trees came poking up — in gardens, by doorways and along every stony lane. Blossom drifted, fruit grew sweet, and the bees hummed. The whole town was no longer bare, but green and full of fruit.","Everyone said that Hana was a hero, because one small pip and one kind girl had turned their hard, stony town into the greenest, sweetest place for miles around."],"qs":[{"q":"What did the rabbits have to make do with instead of clover?","opts":["Fresh carrots","Dry brown hay","More clover","Apple pips"],"a":1,"type":"Literal recall"},{"q":"Choose TWO words that describe how the rabbits ate the clover.","opts":["sat and yawned","once a week","nibbled and thumped (happily)","growled and snapped"],"a":2,"type":"Finding evidence"},{"q":"As well as caring for her rabbits, what did Hana like to do best?","opts":["Grow things","Ride her bike","Climb walls","Sing songs"],"a":0,"type":"Literal recall"},{"q":"Hana said the pip “might” grow into a tree. What does the word ‘might’ tell us?","opts":["The tree had already grown.","The pip would definitely grow.","Hana was not sure it would grow — it was only a hope.","The pip could never grow."],"a":2,"type":"Vocabulary & word meaning"},{"q":"“Hana’s eyes shone at the sight of it.” What does this tell you about how Hana felt?","opts":["She was very sleepy.","She was delighted and thought it was wonderful.","She was frightened of the tree.","She did not like the tree at all."],"a":1,"type":"Inference"},{"q":"Which word in the story shows that the apple trees were growing?","opts":["“stony”","“bare”","“poking up”","“dry”"],"a":2,"type":"Finding evidence"},{"q":"Why did Hana pick the apples ‘very carefully’?","opts":["Because the apples were far too heavy.","So that not one precious pip would drop and be lost.","Because the rabbits were watching her.","Because she was feeling tired."],"a":1,"type":"Inference"},{"q":"Why did Hana borrow a book from the library?","opts":["To learn how to grow the tree properly.","Because she had lost her own book.","To read a story to her rabbits.","To learn how to cook hay."],"a":0,"type":"Inference"},{"q":"The writer says Hana “tended it, and tended it, and tended it.” Why does the writer repeat the word ‘tended’?","opts":["To show that she tended it only once.","To show that she forgot to tend it.","To show that she tended it again and again, for a long time.","To show that the pot was cold."],"a":2,"type":"Author's craft"},{"q":"“At first, nobody noticed.” Why did nobody notice the pips at first?","opts":["Everyone in the town was asleep.","The pips were tiny and had not grown into trees yet.","The pips were big and easy to see.","Nobody lived in the town."],"a":1,"type":"Inference"},{"q":"Where else might you find a kind, helpful character like Hana?","opts":["In a maths book.","In a science report.","In a shopping list.","In other storybooks and fairy tales."],"a":3,"type":"Main idea, title & genre"},{"q":"Why did everyone say that Hana was a hero?","opts":["Because she kept three rabbits.","Because she ate the most apples.","Because she turned the hard, stony town into a green, fruitful place.","Because she won a running race."],"a":2,"type":"Inference"},{"q":"Which of these would also be a good title for this story?","opts":["“How to Cook Hay”","“The Lost Rabbit”","“A Rainy Day in Stonleigh”","“How Hana Grew an Orchard”"],"a":3,"type":"Main idea, title & genre"}]},{"title":"Ravi and the Paper Kite","story":["Ravi lived in a dull town called Greymoor, where people always looked down at their feet and the sky was always empty. He looked after a small brown dog called Biscuit, and he loved him dearly. When he was not playing with Biscuit, Ravi liked best of all to make things out of paper.","Biscuit’s favourite treat was a chewy bone. Ravi would hold one up, and Biscuit would wag and bounce excitedly, as fast as he could. But one day the last bone was gone. Until Ravi could buy more, Biscuit had to make do with a plain dry biscuit instead, and he did not like it one bit.","Then Ravi had an idea. He had one large sheet of bright red paper. “Perhaps,” he thought, “this one sheet might make a kite that flies high enough for the whole town to see.” To make sure he did it right, he borrowed a book about making kites from the library.","Ravi built a kite from paper and sticks. He smoothed it, and smoothed it, and smoothed it, until it was flat and neat. He waited all morning for a good strong wind.","At last he let it go, and the kite climbed high into the sky, as bright as a flame. Ravi’s eyes shone at the sight of it. It was the most beautiful thing in all of Greymoor.","With the kite flying, Ravi held the string very carefully, so that the kite would not tug free and be lost. But the wind had other plans. It lifted the kite higher still, until people in faraway streets looked up and saw the splash of red against the grey. At first, nobody noticed.","Then, one breezy weekend, it happened. All over Greymoor, children flew kites of their own — from gardens, from rooftops and along every dull street. The sky filled with red, blue and gold, and everybody laughed. The whole town was no longer grey, but bright with colour.","Everyone said that Ravi was a hero, because one sheet of paper and one kind boy had lifted the eyes of the whole town and turned their dull grey home into the most joyful place for miles around."],"qs":[{"q":"Choose TWO words that describe how Biscuit behaved when Ravi held up a bone.","opts":["wagged and bounced (excitedly)","sat and yawned","once a week","growled and hid"],"a":0,"type":"Finding evidence"},{"q":"As well as playing with Biscuit, what did Ravi like to do best?","opts":["Ride his bike","Make things out of paper","Cook dinner","Sing songs"],"a":1,"type":"Literal recall"},{"q":"Ravi said the sheet “might” make a kite that flies high. What does the word ‘might’ tell us?","opts":["The kite was already flying.","The kite would definitely fly high.","Ravi was not sure it would work — it was only a hope.","The paper could never make a kite."],"a":2,"type":"Vocabulary & word meaning"},{"q":"What did Biscuit have to make do with instead of a bone?","opts":["A bowl of milk","A plain dry biscuit","More bones","A piece of meat"],"a":1,"type":"Literal recall"},{"q":"Why did Ravi borrow a book from the library?","opts":["Because he had lost his own book.","To read a story to Biscuit.","To learn how to make the kite properly.","To learn how to bake bread."],"a":2,"type":"Inference"},{"q":"“Ravi’s eyes shone at the sight of it.” What does this tell you about how Ravi felt?","opts":["He was frightened of the kite.","He was feeling sleepy.","He did not like the kite at all.","He was delighted and thought it was wonderful."],"a":3,"type":"Inference"},{"q":"Why did Ravi hold the string ‘very carefully’?","opts":["So that the kite would not tug free and be lost.","Because the string was far too heavy.","Because Biscuit was watching him.","Because he was feeling tired."],"a":0,"type":"Inference"},{"q":"The writer says Ravi “smoothed it, and smoothed it, and smoothed it.” Why does the writer repeat the word ‘smoothed’?","opts":["To show that he smoothed it only once.","To show that he smoothed it again and again, until it was neat.","To show that he forgot to smooth it.","To show that the paper was cold."],"a":1,"type":"Author's craft"},{"q":"Which word in the story shows that the kite was rising into the sky?","opts":["“dull”","“empty”","“climbed”","“grey”"],"a":2,"type":"Finding evidence"},{"q":"“At first, nobody noticed.” Why did nobody notice the kite at first?","opts":["Everyone in the town was asleep.","Nobody lived in the town.","The townspeople always looked down and the kite was far up high.","The kite was huge and right next to them."],"a":2,"type":"Inference"},{"q":"Where else might you find a kind, helpful character like Ravi?","opts":["In other storybooks and fairy tales.","In a shopping list.","In a maths book.","In a science report."],"a":0,"type":"Main idea, title & genre"},{"q":"Which of these would also be a good title for this story?","opts":["“The Lost Dog”","“How to Bake Bread”","“A Rainy Day in Greymoor”","“How Ravi Filled the Sky”"],"a":3,"type":"Main idea, title & genre"},{"q":"Why did everyone say that Ravi was a hero?","opts":["Because he kept a little dog.","Because he lifted the whole town’s eyes and turned their dull home into a joyful place.","Because he flew the most kites.","Because he won a running race."],"a":1,"type":"Inference"}]},{"title":"Lin and the Little Spring","story":["Lin lived in a dry, dusty town called Dustbury, where the ground was hard and brown. She looked after three little white ducks called Splash, Puddle and Quack, and she loved them dearly. When she was not caring for her ducks, Lin liked best of all to dig and plant in the earth.","The ducks’ favourite place was the old pond. Lin would lead them down to it, and the ducks would dabble and splash gladly, as much as they could. But one summer the pond dried right up. Until the rains came, the ducks had to make do with a shallow muddy puddle instead, and they did not like it one bit.","Then Lin had an idea. High on the hill she had found one tiny spring, blocked by a heavy stone. “Perhaps,” she thought, “this one little spring might give enough water to fill the pond again.” To make sure she did it right, she borrowed a book about springs and ponds from the library.","Lin set to work moving the stone. She dug, and dug, and dug, all through the long hot day. She waited and hoped.","At last, with a gurgle, clear water came bubbling out of the ground, as bright as glass. Lin’s eyes shone at the sight of it. It was the most beautiful thing in all of Dustbury.","When the water began to flow, Lin guided it very carefully down a little channel, so that not one precious drop would soak away and be lost. But the water had other plans. It trickled far across the town, into gardens, ditches and dry flower beds. At first, nobody noticed.","Then, one cool morning, it happened. All over Dustbury, green shoots came pushing up — in gardens, by walls and along every dusty lane. The pond filled, frogs sang, and the ducks dived for joy. The whole town was no longer brown, but fresh and green.","Everyone said that Lin was a hero, because one little spring and one kind girl had turned their dry, dusty town into the greenest, freshest place for miles around."],"qs":[{"q":"Why did Lin borrow a book from the library?","opts":["To read a story to her ducks.","To learn how to make the pond properly.","Because she had lost her own book.","To learn how to bake bread."],"a":1,"type":"Inference"},{"q":"What did the ducks have to make do with instead of the pond?","opts":["A bowl of clean water","A shallow muddy puddle","More pond water","A bath of milk"],"a":1,"type":"Literal recall"},{"q":"As well as caring for her ducks, what did Lin like to do best?","opts":["Paint pictures","Sing songs","Dig and plant in the earth","Ride her bike"],"a":2,"type":"Literal recall"},{"q":"Choose TWO words that describe how the ducks behaved at the pond.","opts":["sat and stared","dabbled and splashed (gladly)","growled and snapped","once a month"],"a":1,"type":"Finding evidence"},{"q":"Lin said the spring “might” give enough water. What does the word ‘might’ tell us?","opts":["The pond was already full.","Lin was not sure it would work — it was only a hope.","The spring would definitely fill the pond.","The spring could never give water."],"a":1,"type":"Vocabulary & word meaning"},{"q":"“Lin’s eyes shone at the sight of it.” What does this tell you about how Lin felt?","opts":["She was feeling sleepy.","She was frightened of the water.","She was delighted and thought it was wonderful.","She did not like the water at all."],"a":2,"type":"Inference"},{"q":"The writer says Lin “dug, and dug, and dug.” Why does the writer repeat the word ‘dug’?","opts":["To show that she dug only once.","To show that the ground was cold.","To show that she forgot to dig.","To show that she dug again and again, for a long time."],"a":3,"type":"Author's craft"},{"q":"Why did Lin guide the water ‘very carefully’ down the channel?","opts":["Because the water was far too heavy.","So that not one precious drop would soak away and be lost.","Because the ducks were watching her.","Because she was feeling tired."],"a":1,"type":"Inference"},{"q":"Which word in the story shows that the spring water was coming up out of the ground?","opts":["“bubbling”","“dusty”","“brown”","“hard”"],"a":0,"type":"Finding evidence"},{"q":"“At first, nobody noticed.” Why did nobody notice the water at first?","opts":["Everyone in the town was asleep.","The water was only a small trickle that had not yet reached far.","The water was a huge flood right beside them.","Nobody lived in the town."],"a":1,"type":"Inference"},{"q":"Where else might you find a kind, helpful character like Lin?","opts":["In a maths book.","In a science report.","In other storybooks and fairy tales.","In a shopping list."],"a":2,"type":"Main idea, title & genre"},{"q":"Which of these would also be a good title for this story?","opts":["“How Lin Brought the Water Back”","“The Lost Duck”","“How to Bake Bread”","“A Snowy Day in Dustbury”"],"a":0,"type":"Main idea, title & genre"},{"q":"Why did everyone say that Lin was a hero?","opts":["Because she kept three ducks.","Because she swam the fastest.","Because she found the most stones.","Because she turned the dry, dusty town into a fresh, green place."],"a":3,"type":"Inference"}]},{"title":"Marek and the Blue Door","story":["Marek lived in a grey town called Ashgate, where every house was the same dull colour. He looked after a bright green parrot called Pippin, and he loved him dearly. When he was not chatting with Pippin, Marek liked best of all to paint.","Pippin’s favourite food was juicy yellow fruit. Marek would hold a piece up, and the parrot would chatter and bob cheerfully, as loudly as he could. But one week the fruit ran out. Until Marek could buy more, Pippin had to make do with plain dry seeds instead, and he did not like it one bit.","Then Marek had an idea. In the shed he had found one small tin of bright blue paint. “Perhaps,” he thought, “this one little tin might brighten the whole street.” To make sure he did it right, he borrowed a book about painting from the library.","Marek started with his own front door. He painted it, and painted it, and painted it, until the wood was a deep, glowing blue. He stepped back and waited for it to dry.","At last the door was finished, shining like a summer sky. Marek’s eyes shone at the sight of it. It was the most beautiful thing in all of Ashgate.","When the door was dry, Marek touched up the edges very carefully, so that not one drip or smudge would spoil it. He did not say a word to anyone. But the bright door had other plans. People walking by stopped to look at the splash of blue among the grey. At first, nobody noticed.","Then, one sunny week, it happened. All over Ashgate, neighbours painted doors of their own — red, green, yellow and gold. Window boxes appeared, flags fluttered, and everybody smiled. The whole town was no longer grey, but bursting with colour.","Everyone said that Marek was a hero, because one small tin of paint and one kind boy had turned their dull grey town into the brightest, most cheerful place for miles around."],"qs":[{"q":"As well as chatting with Pippin, what did Marek like to do best?","opts":["Paint","Cook","Dance","Fish"],"a":0,"type":"Literal recall"},{"q":"Marek said the tin of paint “might” brighten the street. What does the word ‘might’ tell us?","opts":["The street was already bright.","The paint would definitely brighten the street.","Marek was not sure it would work — it was only a hope.","The paint could never brighten anything."],"a":2,"type":"Vocabulary & word meaning"},{"q":"Choose TWO words that describe how Pippin behaved when Marek held up some fruit.","opts":["chattered and bobbed (cheerfully)","sat and stared","once a week","growled and hid"],"a":0,"type":"Finding evidence"},{"q":"What did Pippin have to make do with instead of fruit?","opts":["A bowl of water","Plain dry seeds","More fruit","A slice of bread"],"a":1,"type":"Literal recall"},{"q":"Why did Marek borrow a book from the library?","opts":["Because he had lost his own book.","To read a story to Pippin.","To learn how to paint properly.","To learn how to cook fruit."],"a":2,"type":"Inference"},{"q":"“Marek’s eyes shone at the sight of it.” What does this tell you about how Marek felt?","opts":["He was feeling sleepy.","He was delighted and thought it was wonderful.","He was frightened of the door.","He did not like the door at all."],"a":1,"type":"Inference"},{"q":"Why did Marek touch up the edges ‘very carefully’?","opts":["Because the door was far too heavy.","Because the parrot was watching him.","So that not one drip or smudge would spoil it.","Because he was feeling tired."],"a":2,"type":"Inference"},{"q":"The writer says Marek “painted it, and painted it, and painted it.” Why does the writer repeat the word ‘painted’?","opts":["To show that he painted it only once.","To show that he painted it again and again, until it glowed.","To show that he forgot to paint it.","To show that the paint was cold."],"a":1,"type":"Author's craft"},{"q":"Which word in the story shows the town becoming colourful again?","opts":["“grey”","“dull”","“bursting”","“plain”"],"a":2,"type":"Finding evidence"},{"q":"“At first, nobody noticed.” Why did nobody notice the door at first?","opts":["Everyone in the town was asleep.","It was only one small door among many grey ones.","The door was enormous and impossible to miss.","Nobody lived in the town."],"a":1,"type":"Inference"},{"q":"Where else might you find a kind, helpful character like Marek?","opts":["In a shopping list.","In a maths book.","In a science report.","In other storybooks and fairy tales."],"a":3,"type":"Main idea, title & genre"},{"q":"Why did everyone say that Marek was a hero?","opts":["Because he kept a parrot.","Because he turned the dull grey town into a bright, cheerful place.","Because he owned the most paint.","Because he won a painting prize."],"a":1,"type":"Inference"},{"q":"Which of these would also be a good title for this story?","opts":["“How to Cook Fruit”","“The Lost Parrot”","“How Marek Brightened the Town”","“A Rainy Day in Ashgate”"],"a":2,"type":"Main idea, title & genre"}]},{"title":"Tariq and the Old Town Bell","story":["Tariq lived in a sleepy town called Quietford, where people stayed indoors and the old bell tower had been silent for years. He looked after three grey pigeons called Coo, Roo and Boo, and he loved them dearly. When he was not feeding his pigeons, Tariq liked best of all to mend old, broken things.","The pigeons’ favourite food was golden corn. Tariq would scatter a handful, and the pigeons would flutter and coo softly, as fast as they could. But one day the corn ran out. Until Tariq could buy more, the pigeons had to make do with plain breadcrumbs instead, and they did not like it one bit.","Then Tariq had an idea. At the top of the tower stood the old, cracked town bell. “Perhaps,” he thought, “this one old bell might ring loud enough to bring everyone together again.” To make sure he did it right, he borrowed a book about mending bells from the library.","Tariq set to work on the bell. He polished it, and polished it, and polished it, until the metal gleamed. He waited for a still, clear evening.","At last he swung the rope, and a deep, golden note rang out, as warm as sunshine. Tariq’s eyes shone at the sound of it. It was the loveliest thing in all of Quietford.","When the bell was ready, Tariq rang it very carefully, so that not one swing would crack the old metal further. But the sound had other plans. It echoed far across the town, over rooftops and down every quiet street. At first, nobody noticed.","Then, one golden evening, it happened. All over Quietford, people came out of their houses — into the square, along the lanes and up to the old tower. They talked, they sang, and they held a great feast together. The whole town was no longer silent, but full of life.","Everyone said that Tariq was a hero, because one old bell and one kind boy had turned their sleepy, silent town into the friendliest, liveliest place for miles around."],"qs":[{"q":"Choose TWO words that describe how the pigeons behaved when Tariq scattered corn.","opts":["sat and yawned","fluttered and cooed (softly)","growled and snapped","once a year"],"a":1,"type":"Finding evidence"},{"q":"Why did everyone say that Tariq was a hero?","opts":["Because he kept three pigeons.","Because he turned the sleepy, silent town into a friendly, lively place.","Because he climbed the tallest tower.","Because he found the most bells."],"a":1,"type":"Inference"},{"q":"What did the pigeons have to make do with instead of corn?","opts":["Fresh berries","Plain breadcrumbs","More corn","A bowl of seeds"],"a":1,"type":"Literal recall"},{"q":"As well as feeding his pigeons, what did Tariq like to do best?","opts":["Mend old, broken things","Ride his bike","Paint pictures","Bake cakes"],"a":0,"type":"Literal recall"},{"q":"Tariq said the bell “might” ring loud enough to bring everyone together. What does the word ‘might’ tell us?","opts":["The bell had already rung.","Tariq was not sure it would work — it was only a hope.","The bell would definitely work.","The bell could never ring."],"a":1,"type":"Vocabulary & word meaning"},{"q":"“Tariq’s eyes shone at the sound of it.” What does this tell you about how Tariq felt?","opts":["He was frightened of the bell.","He was feeling sleepy.","He was delighted and thought it was wonderful.","He did not like the sound at all."],"a":2,"type":"Inference"},{"q":"Why did Tariq borrow a book from the library?","opts":["Because he had lost his own book.","To read a story to his pigeons.","To learn how to mend the bell properly.","To learn how to cook corn."],"a":2,"type":"Inference"},{"q":"The writer says Tariq “polished it, and polished it, and polished it.” Why does the writer repeat the word ‘polished’?","opts":["To show that he polished it only once.","To show that he forgot to polish it.","To show that the bell was cold.","To show that he polished it again and again, until it gleamed."],"a":3,"type":"Author's craft"},{"q":"Why did Tariq ring the bell ‘very carefully’?","opts":["So that not one swing would crack the old metal further.","Because the bell was far too heavy.","Because the pigeons were watching him.","Because he was feeling tired."],"a":0,"type":"Inference"},{"q":"Which word in the story shows that the bell’s sound was spreading across the town?","opts":["“silent”","“echoed”","“cracked”","“sleepy”"],"a":1,"type":"Finding evidence"},{"q":"“At first, nobody noticed.” Why did nobody notice the bell at first?","opts":["Everyone was asleep and nobody lived nearby.","People had stayed indoors for years and the first ring was new and faint to them.","The bell was right inside every house.","The bell made no sound at all."],"a":1,"type":"Inference"},{"q":"Where else might you find a kind, helpful character like Tariq?","opts":["In a science report.","In a shopping list.","In other storybooks and fairy tales.","In a maths book."],"a":2,"type":"Main idea, title & genre"},{"q":"Which of these would also be a good title for this story?","opts":["“How to Cook Corn”","“How Tariq Woke the Town”","“The Lost Pigeon”","“A Rainy Day in Quietford”"],"a":1,"type":"Main idea, title & genre"}]},{"title":"Beatrix and the Honey Bees","story":["Beatrix lived in a flat, grey place called Barren Hollow, where no flowers ever bloomed. She looked after one small hive of gentle honey bees, and she loved them dearly. When she was not tending her bees, Beatrix liked best of all to make things grow.","The bees’ favourite work was gathering nectar. On warm days they would leave the hive, and the bees would buzz and dance busily, as fast as they could. But with no flowers in Barren Hollow, the bees had to make do with sugar water that Beatrix mixed for them, and it was not the same one bit.","Then Beatrix had an idea. In a jar she had saved a tiny handful of flower seeds. “Perhaps,” she thought, “with my bees to help, these few seeds might fill the whole town with flowers.” To make sure she did it right, she borrowed a book about bees and flowers from the library.","Beatrix planted the seeds in a sunny patch. She watered them, and watered them, and watered them, all through the spring. She waited and hoped.","At last a row of bright flowers opened in her garden, humming with happy bees. Beatrix’s eyes shone at the sight of it. It was the most beautiful thing in all of Barren Hollow.","When the flowers were full of pollen, Beatrix moved the hive very carefully, so that not one little bee would be jostled and lost. But the bees had other plans. They flew far across the town, carrying pollen to gardens, yards and bare grey corners. At first, nobody noticed.","Then, one warm month, it happened. All over Barren Hollow, flowers came poking up — in gardens, on walls and along every grey path. Colours spread, the air smelled sweet, and bees hummed everywhere. The whole town was no longer bare, but blooming.","Everyone said that Beatrix was a hero, because one little hive and one kind girl had turned their flat, grey town into the sweetest, most colourful place for miles around."],"qs":[{"q":"What did the bees have to make do with instead of flower nectar?","opts":["Sugar water that Beatrix mixed","Fresh honey","More nectar","Plain water"],"a":0,"type":"Literal recall"},{"q":"As well as tending her bees, what did Beatrix like to do best?","opts":["Ride her bike","Make things grow","Paint pictures","Sing songs"],"a":1,"type":"Literal recall"},{"q":"Choose TWO words that describe how the bees behaved on warm days.","opts":["sat and stared","slept and snored","buzzed and danced (busily)","once a week"],"a":2,"type":"Finding evidence"},{"q":"Beatrix said the seeds “might” fill the town with flowers. What does the word ‘might’ tell us?","opts":["The town was already full of flowers.","The seeds would definitely fill the town.","Beatrix was not sure it would work — it was only a hope.","The seeds could never grow."],"a":2,"type":"Vocabulary & word meaning"},{"q":"“Beatrix’s eyes shone at the sight of it.” What does this tell you about how Beatrix felt?","opts":["She was feeling sleepy.","She was frightened of the flowers.","She did not like the flowers at all.","She was delighted and thought it was wonderful."],"a":3,"type":"Inference"},{"q":"Why did Beatrix borrow a book from the library?","opts":["To learn how to grow the flowers properly.","Because she had lost her own book.","To read a story to her bees.","To learn how to make honey cake."],"a":0,"type":"Inference"},{"q":"The writer says Beatrix “watered them, and watered them, and watered them.” Why does the writer repeat the word ‘watered’?","opts":["To show that she watered them only once.","To show that she watered them again and again, for a long time.","To show that she forgot to water them.","To show that the water was cold."],"a":1,"type":"Author's craft"},{"q":"Why did Beatrix move the hive ‘very carefully’?","opts":["Because the hive was far too heavy.","So that not one little bee would be jostled and lost.","Because she was feeling tired.","Because her friends were watching her."],"a":1,"type":"Inference"},{"q":"Which word in the story shows that the flowers were growing?","opts":["“bare”","“flat”","“poking up”","“grey”"],"a":2,"type":"Finding evidence"},{"q":"“At first, nobody noticed.” Why did nobody notice the change at first?","opts":["Everyone in the town was asleep.","Only a few small flowers had grown so far.","The flowers were huge and everywhere already.","Nobody lived in the town."],"a":1,"type":"Inference"},{"q":"Where else might you find a kind, helpful character like Beatrix?","opts":["In a maths book.","In other storybooks and fairy tales.","In a shopping list.","In a science report."],"a":1,"type":"Main idea, title & genre"},{"q":"Which of these would also be a good title for this story?","opts":["“The Lost Bee”","“How to Make Honey Cake”","“How Beatrix Brought the Flowers”","“A Snowy Day in Barren Hollow”"],"a":2,"type":"Main idea, title & genre"},{"q":"Why did everyone say that Beatrix was a hero?","opts":["Because she kept some bees.","Because she made the most honey.","Because she won a gardening prize.","Because she turned the flat, grey town into a sweet, blooming place."],"a":3,"type":"Inference"}]},{"title":"Diego and the Paper Boats","story":["Diego lived beside a wide river, in a town called Two Banks, where the people on each side never spoke to one another. He looked after three little fish in a glass bowl, called Bubble, Fin and Pearl, and he loved them dearly. When he was not feeding his fish, Diego liked best of all to fold things out of paper.","The fish’s favourite moment was feeding time. Diego would sprinkle a few flakes, and the fish would dart and circle quickly, as fast as they could. But one day the fish food ran out. Until Diego could buy more, the fish had to make do with a few soft crumbs instead, and they did not like it one bit.","Then Diego had an idea. He had one clean sheet of white paper. “Perhaps,” he thought, “if I fold a little boat and write a kind note, it might float across and make me a friend on the far bank.” To make sure he did it right, he borrowed a book about folding paper boats from the library.","Diego folded his boat with great care. He creased it, and creased it, and creased it, until every fold was sharp. He tucked a friendly note inside and waited for calm water.","At last he set the little boat on the river, and it sailed out, white and proud, as neat as a swan. Diego’s eyes shone at the sight of it. It was the most beautiful thing he had ever made.","When the boat set off, Diego placed it on the water very carefully, so that not one drop would soak the note and spoil it. But the river had other plans. The current carried the boat all the way to the far bank, where a girl found it and read his note. At first, nobody noticed.","Then, over one happy summer, it happened. All up and down the river, children sent paper boats of their own — with notes, with jokes and with invitations. The two banks became friends, and together they built a little bridge. The whole town was no longer divided, but joined.","Everyone said that Diego was a hero, because one paper boat and one kind boy had
