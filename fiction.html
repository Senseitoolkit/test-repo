rough loudest, so that the Thunder would be caught fast as it came booming through. And when the Thunder came booming, the noose drew tight and held it.","How the Thunder fought! It strained against the rope like a bull at the end of its tether, bucking and bellowing. Its voice was a great hammer-blow; its breath was a rushing gust. “Let me go! Let me go!” it begged.","“Not until you promise,” said Bran. “You must rumble softly and far off over Cragfoot from this day on, and never again shake loose what is not yours.” The Thunder, who had never been held before, had no choice but to agree. Bran loosened the heavy noose, and the Thunder rolled free. From that day the Thunder at Cragfoot only muttered gently among the far peaks, bringing the rain in its train, but never again loosing a single stone."],"qs":[{"q":"Which TWO phrases best show that the people of Cragfoot braced themselves against the Thunder?","opts":["“wedged stout timbers against the cliff above their roofs” and “ran indoors at the first far growl”","“climbing to the high crag” and “close to tears”","“snapped clean through” and “slippery as sound itself”","“bringing the rain in its train” and “muttered gently”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Bran’s hopes crashed down like the falling stones” tell you?","opts":["More rocks fell from the mountain.","Bran suddenly lost all of his hope.","Bran dropped his rope on the crag.","The mill had been crushed."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a great hammer-blow; its breath was a rushing gust,” which TWO things is the Thunder compared to?","opts":["A bull and a tether","A hammer-blow and a gust","The sky and a knot","Straw and vine"],"a":1,"type":"Figurative language"},{"q":"Why did Bran tie a great noose in the oxhide rope?","opts":["To hold his grandfather’s oxen.","To trap the Thunder as it rolled through the gap in the crags.","To help him climb safely down.","To carry the grain back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the crag was a long way above Bran’s home?","opts":["“the narrow gap in the crags”","“the houses below looked as small as knuckle-bones”","“close to his grandfather’s fire”","“one summer”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each rope to what happened when Bran used it?","opts":["straw rope – held the Thunder fast; vine rope – snapped; oxhide rope – the Thunder rolled free","straw rope – the Thunder rolled free; vine rope – held fast; oxhide rope – snapped","straw rope – snapped clean through; vine rope – the Thunder rolled free; oxhide rope – held the Thunder fast","straw rope – held fast; vine rope – held fast; oxhide rope – snapped"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Thunder “strained against the rope like a bull at the end of its tether.” What does this comparison tell you?","opts":["The Thunder had become calm and gentle.","The Thunder was struggling desperately to escape.","The Thunder had turned into a real bull.","The Thunder was herding cattle."],"a":1,"type":"Figurative language"},{"q":"What did the Thunder have to agree to do before Bran would set it free?","opts":["To carry Bran back to the village.","To rumble softly and far off and stop shaking the stones loose.","To rebuild the crushed mill.","To bring the rain once a year."],"a":1,"type":"Literal recall"},{"q":"When the Thunder cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the THUNDER, but NOT of Bran?","opts":["Climbed up to the high crag.","Plaited a rope of vine.","Had never been held before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Thunder was caught?","opts":["The Thunder promised to rumble softly.","Bran laid the great noose across the gap in the crags.","The Thunder muttered gently among the far peaks.","Bran loosened the heavy noose."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “He looped the rope over the jutting crag and set his feet wide apart.”","opts":["At the very start, before the Thunder crushed the mill.","Just after Bran made the rope of straw.","When Bran laid the oxhide noose and waited for the Thunder.","Right at the end, after the Thunder had rolled free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the high crags of long ago."},{"title":"How Wren Netted the Blight","story":["Long ago, in a farming village called Cropwell, there lived a girl named Wren. A grey Blight crept down on Cropwell, and in the damp years it oozed out of the rotten wood on the hill. The people of Cropwell had learned to keep it at bay: they burned sharp sulphur in the orchards, and they turned the stored grain each day to keep it dry, ready to cut out any spot of rot at once. To let that Blight take hold was to lose the whole harvest to it.","One damp year the Blight did something far worse. It crept down in the night and rotted the whole standing crop in the fields and the seed-grain in the barn, turning all to grey mush. Without a sound crop or seed the people of Cropwell would have nothing for the year ahead.","“Someone must net the Blight,” said Wren, “and teach it to keep to the wood.” Everyone laughed. You might as well bag a bad smell, they said. But Wren set out all the same, climbing to the high stile at the wood’s edge where the Blight seeped through a gap in the hedge — so far above the fields that the farms below looked as small as patches of moss.","First she knotted a net of dry straw and held it across the gap. The Blight only oozed, and the straw net fell apart. Next she wove a net of cobweb. But the Blight was slippery as slime, and it seeped clean through and was gone, leaving the cobweb grey and sodden. Wren’s hopes rotted away like the corn.","She climbed home and sat by her grandmother’s fire, close to tears. Her grandmother said nothing, but she took down from the hook a great net she had knotted herself, year after year, from the toughest flax of the fields. “This net has strained the curds through forty years,” she said. “It will hold a deal more than the Blight.”","Wren carried the flax net up to the stile. She spread it wide across the narrow gap in the hedge where the Blight seeped through thickest, so that the Blight would be caught fast as it crept through. And when the Blight crept through, the net drew tight and held it.","How the Blight struggled! It writhed in the net like a worm caught in a beak, twisting and oozing. Its voice was a wet whisper; its breath was a sour grave. “Let me go! Let me go!” it begged.","“Not until you promise,” said Wren. “You must keep to the rotten log in the wood from this day on, and never again creep to what is not yours.” The Blight, who had never been netted before, had no choice but to agree. Wren loosened the heavy net, and the Blight crept free. From that day the Blight at Cropwell stayed in the dead wood on the hill, rotting only the fallen logs, but never again touching a single field."],"qs":[{"q":"Which TWO phrases best show that the people of Cropwell tried to keep the Blight at bay?","opts":["“burned sharp sulphur in the orchards” and “turned the stored grain each day to keep it dry”","“climbing to the high stile” and “close to tears”","“fell apart” and “slippery as slime”","“rotting only the fallen logs” and “stayed in the dead wood”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Wren’s hopes rotted away like the corn” tell you?","opts":["The corn had gone mouldy.","Wren suddenly lost all of her hope.","It was a very damp year.","Wren was tired of farming."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a wet whisper; its breath was a sour grave,” which TWO things is the Blight compared to?","opts":["A worm and a beak","A whisper and a grave","A smell and a bag","Straw and cobweb"],"a":1,"type":"Figurative language"},{"q":"Why did Wren spread the flax net across the gap in the hedge?","opts":["To strain her grandmother’s curds.","To trap the Blight as it crept through the gap.","To help her climb safely down.","To carry the grain back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the stile was a long way above Wren’s home?","opts":["“the narrow gap in the hedge”","“the farms below looked as small as patches of moss”","“close to her grandmother’s fire”","“in the night”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Wren used it?","opts":["straw net – held the Blight fast; cobweb net – fell apart; flax net – the Blight seeped through","straw net – the Blight seeped through; cobweb net – held fast; flax net – fell apart","straw net – fell apart; cobweb net – the Blight seeped through; flax net – held the Blight fast","straw net – held fast; cobweb net – held fast; flax net – fell apart"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Blight “writhed in the net like a worm caught in a beak.” What does this comparison tell you?","opts":["The Blight had become calm and gentle.","The Blight was struggling desperately to escape.","The Blight had turned into a real worm.","The Blight was full of worms."],"a":1,"type":"Figurative language"},{"q":"What did the Blight have to agree to do before Wren would set it free?","opts":["To carry Wren back to the village.","To keep to the rotten log and stop creeping to the fields.","To bring back the rotted crop.","To stay in the wood once a year."],"a":1,"type":"Literal recall"},{"q":"When the Blight cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the BLIGHT, but NOT of Wren?","opts":["Climbed up to the high stile.","Wove a net of cobweb.","Had never been netted before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Blight was caught?","opts":["The Blight promised to keep to the wood.","Wren spread the flax net across the gap in the hedge.","The Blight stayed in the dead wood on the hill.","Wren loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “She spread the net across the gap in the hedge and waited for the grey creep.”","opts":["At the very start, before the Blight rotted the crop.","Just after Wren made the net of straw.","When Wren spread the flax net and waited for the Blight.","Right at the end, after the Blight had crept free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the patchwork fields of long ago."},{"title":"How Soren Caught the Dark","story":["Long ago, in a dale village called Eventide, there lived a boy named Soren. A creeping Dark settled on Eventide, and as the year turned it came earlier and earlier off the eastern fells. The people of Eventide had learned to live with the gloom: they kept lamps burning at every window, and they tied guide-ropes from house to house, ready to find their way even at midday. To wander from the rope in that Dark was to be lost until morning.","One autumn the Dark did something far worse. It came earlier each day until it swallowed the daylight whole, so that no crop would grow and folk lost their way even at noon. Without the light there would be no harvest at all, and the people of Eventide would be left groping in the gloom.","“Someone must catch the Dark,” said Soren, “and teach it to keep to the night.” Everyone laughed. You might as well pocket a shadow, they said. But Soren set out all the same, climbing to the high eastern ridge where the Dark poured in through a notch — so far above the dale that the lamps below looked as small as glow-worms.","First he knotted a net of dry reeds and held it open in the dusk. The Dark only sighed, and the reed net fell apart. Next he wove a net of cobweb. But the Dark was slippery as a shadow, and it seeped clean through and was gone, leaving the cobweb cold and empty. Soren’s hopes guttered like a candle in the wind.","He climbed home and sat by his grandmother’s fire, close to tears. His grandmother said nothing, but she took down from the hook a great net she had knotted herself, year after year, from the toughest flax of the dale. “This net has dried the nets through forty years,” she said. “It will hold a deal more than the Dark.”","Soren carried the flax net up to the ridge. He spread it wide across the narrow notch where the Dark poured in thickest, so that the Dark would be caught fast as it came flooding through. And when the Dark came flooding, the net drew tight and held it.","How the Dark struggled! It pressed against the net like a moth shut tight in a fist, billowing and curling. Its voice was a smothering hush; its breath was a starless pit. “Let me go! Let me go!” it begged.","“Not until you promise,” said Soren. “You must come only at nightfall and lift at dawn from this day on, and never again swallow what is not yours.” The Dark, who had never been held before, had no choice but to agree. Soren loosened the heavy net, and the Dark flooded free. From that day the Dark at Eventide came softly at dusk and lifted at dawn, hushing the evening and lighting the lamps, but never again stealing a single day."],"qs":[{"q":"Which TWO phrases best show that the people of Eventide lived with the gloom?","opts":["“kept lamps burning at every window” and “tied guide-ropes from house to house”","“climbing to the high eastern ridge” and “close to tears”","“fell apart” and “slippery as a shadow”","“hushing the evening” and “lighting the lamps”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Soren’s hopes guttered like a candle in the wind” tell you?","opts":["A candle had blown out.","Soren suddenly lost all of his hope.","The wind was rising on the ridge.","Soren needed a new lamp."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a smothering hush; its breath was a starless pit,” which TWO things is the Dark compared to?","opts":["A moth and a fist","A hush and a pit","A shadow and a pocket","Reeds and cobweb"],"a":1,"type":"Figurative language"},{"q":"Why did Soren spread the flax net across the notch in the ridge?","opts":["To dry his grandmother’s fishing nets.","To trap the Dark as it flooded through the notch.","To help him climb safely down.","To carry the lamps back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the ridge was a long way above Soren’s home?","opts":["“the narrow notch”","“the lamps below looked as small as glow-worms”","“close to his grandmother’s fire”","“as the year turned”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Soren used it?","opts":["reed net – held the Dark fast; cobweb net – fell apart; flax net – the Dark seeped through","reed net – the Dark seeped through; cobweb net – held fast; flax net – fell apart","reed net – fell apart; cobweb net – the Dark seeped through; flax net – held the Dark fast","reed net – held fast; cobweb net – held fast; flax net – fell apart"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Dark “pressed against the net like a moth shut tight in a fist.” What does this comparison tell you?","opts":["The Dark had become calm and gentle.","The Dark was struggling desperately to escape.","The Dark had turned into a real moth.","The Dark was full of moths."],"a":1,"type":"Figurative language"},{"q":"What did the Dark have to agree to do before Soren would set it free?","opts":["To carry Soren back to the village.","To come only at nightfall and lift at dawn, and stop swallowing the day.","To bring back the lost daylight.","To light the lamps once a year."],"a":1,"type":"Literal recall"},{"q":"When the Dark cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the DARK, but NOT of Soren?","opts":["Climbed up to the high ridge.","Wove a net of cobweb.","Had never been held before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Dark was caught?","opts":["The Dark promised to come only at nightfall.","Soren spread the flax net across the notch in the ridge.","The Dark came softly at dusk and lifted at dawn.","Soren loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “He spread the net across the notch in the ridge and waited as the light failed.”","opts":["At the very start, before the Dark swallowed the daylight.","Just after Soren made the net of reeds.","When Soren spread the flax net and waited for the Dark.","Right at the end, after the Dark had flooded free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the shadowed dales of long ago."},{"title":"How Inga Roped the Slide","story":["Long ago, in a mountain village called Scree End, there lived a girl named Inga. A great Slide of rock and snow thundered down on Scree End, and each spring it broke loose from the heights. The people of Scree End had learned to guard against it: they built their houses behind great stone wedges, and they kept off the open slope after the spring thaw, ready to scatter at the first deep rumble. To be caught on the slope when that Slide broke loose was to be swept away.","One spring the Slide did something far worse. It broke loose at dawn and thundered down the gully, burying the whole high pasture where the village herd was grazing. Without the herd there would be no milk and no meat, and the people of Scree End would be left with nothing.","“Someone must rope the Slide,” said Inga, “and teach it to keep to the bare rock.” Everyone laughed. You might as well leash an avalanche, they said. But Inga set out all the same, climbing to the high shoulder above the gully where the Slide thundered down fastest — so far above the village that the chalets below looked as small as dice.","First she twisted a rope of dry grass and flung it across the gully. The Slide only roared, and the grass rope snapped at once. Next she plaited a rope of trailing vine. But the Slide was slippery as scree, and it slid free and was gone, leaving the vine torn and buried. Inga’s hopes were buried like the pasture.","She climbed home and sat by her grandfather’s fire, close to tears. Her grandfather said nothing, but he took down from the peg a long rope he had plaited himself, year after year, from the toughest oxhide on the mountain. “This rope has held the oxen through forty harvests,” he said. “It will hold a deal more than the Slide.”","Inga carried the oxhide rope up to the shoulder. She tied a great noose and laid it across the narrow neck of the gully where the Slide thundered down fastest, so that the Slide would be caught fast as it came roaring through. And when the Slide came roaring, the noose drew tight and held it.","How the Slide fought! It bucked against the rope like a runaway horse, plunging and tumbling. Its voice was a roaring landslide; its breath was a cloud of snow. “Let me go! Let me go!” it begged.","“Not until you promise,” said Inga. “You must keep to the bare scree from this day on, and never again sweep away what is not yours.” The Slide, who had never been roped before, had no choice but to agree. Inga loosened the heavy noose, and the Slide rolled free. From that day the Slide at Scree End slipped only down the bare stone chutes, clearing the loose rock harmlessly, but never again burying a single green pasture."],"qs":[{"q":"Which TWO phrases best show that the people of Scree End guarded against the Slide?","opts":["“built their houses behind great stone wedges” and “kept off the open slope after the spring thaw”","“climbing to the high shoulder” and “close to tears”","“snapped at once” and “slippery as scree”","“clearing the loose rock” and “slipped down the bare stone chutes”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Inga’s hopes were buried like the pasture” tell you?","opts":["The pasture was covered in snow.","Inga suddenly lost all of her hope.","More rock came down the gully.","Inga was tired from climbing."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a roaring landslide; its breath was a cloud of snow,” which TWO things is the Slide compared to?","opts":["A horse and a rope","A landslide and a cloud of snow","An avalanche and a leash","Grass and vine"],"a":1,"type":"Figurative language"},{"q":"Why did Inga tie a great noose in the oxhide rope?","opts":["To hold her grandfather’s oxen.","To trap the Slide as it thundered down through the gully.","To help her climb safely down.","To carry the herd back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the shoulder was a long way above Inga’s home?","opts":["“the narrow neck of the gully”","“the chalets below looked as small as dice”","“close to her grandfather’s fire”","“at dawn”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each rope to what happened when Inga used it?","opts":["grass rope – held the Slide fast; vine rope – snapped; oxhide rope – the Slide slid free","grass rope – the Slide slid free; vine rope – held fast; oxhide rope – snapped","grass rope – snapped at once; vine rope – the Slide slid free; oxhide rope – held the Slide fast","grass rope – held fast; vine rope – held fast; oxhide rope – snapped"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Slide “bucked against the rope like a runaway horse.” What does this comparison tell you?","opts":["The Slide had become calm and gentle.","The Slide was struggling desperately to escape.","The Slide had turned into a real horse.","The Slide was carrying a horse."],"a":1,"type":"Figurative language"},{"q":"What did the Slide have to agree to do before Inga would set it free?","opts":["To carry Inga back to the village.","To keep to the bare scree and stop sweeping away the pasture.","To dig out the buried herd.","To clear the loose rock once a year."],"a":1,"type":"Literal recall"},{"q":"When the Slide cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the SLIDE, but NOT of Inga?","opts":["Climbed up to the high shoulder.","Plaited a rope of vine.","Had never been roped before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Slide was caught?","opts":["The Slide promised to keep to the bare scree.","Inga laid the great noose across the neck of the gully.","The Slide slipped only down the bare stone chutes.","Inga loosened the heavy noose."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “She braced herself in the lee of a great boulder and waited, the rope ready in her hands.”","opts":["At the very start, before the Slide buried the pasture.","Just after Inga made the rope of grass.","When Inga laid the oxhide noose and waited for the Slide.","Right at the end, after the Slide had rolled free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the high mountains of long ago."}]};

<script>
/* Reading Comprehension Practice — vanilla JS, no network, no AI.
   Expects a global DATA = { "PTE 7":[...10 tests], ... } injected before this script. */
(function () {
  "use strict";

  var GRADES = ["Year 1", "Year 2", "Year 3", "Year 4", "Year 5"];
  var LETTERS = ["A", "B", "C", "D", "E", "F"];

  var state = { grade: GRADES[0], test: null, answers: [], checked: false };

  function $(sel) { return document.querySelector(sel); }
  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function shuffle(a) {
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function buildTest(grade) {
    var pool = DATA[grade];
    var src = pool[Math.floor(Math.random() * pool.length)];
    var t = JSON.parse(JSON.stringify(src));
    t.qs.forEach(function (q) { q._origNum = null; });
    shuffle(t.qs);                       // randomise question-style order
    t.qs.forEach(function (q) {
      var correct = q.opts[q.a];
      shuffle(q.opts);                   // randomise answer order
      q.a = q.opts.indexOf(correct);
    });
    return t;
  }

  function newTest(grade) {
    state.grade = grade;
    state.test = buildTest(grade);
    state.answers = [];
    for (var i = 0; i < state.test.qs.length; i++) state.answers.push(null);
    state.checked = false;
    renderGradebar();
    renderTest();
    var r = $("#results"); r.innerHTML = ""; r.style.display = "none";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  /* ---------- rendering ---------- */

  function renderGradebar() {
    var bar = $("#gradebar");
    bar.innerHTML = "";
    GRADES.forEach(function (g) {
      var b = el("button", "gradebtn" + (g === state.grade ? " active" : ""), esc(g));
      b.setAttribute("type", "button");
      b.addEventListener("click", function () { newTest(g); });
      bar.appendChild(b);
    });
  }

  function renderTest() {
    var area = $("#testarea");
    area.innerHTML = "";
    var t = state.test;

    var head = el("div", "testhead");
    head.appendChild(el("div", "kicker", esc(state.grade) + " &middot; Narrative Reading Check"));
    head.appendChild(el("h2", "title", esc(t.title)));
    if (t.subtitle) head.appendChild(el("div", "subtitle", esc(t.subtitle)));
    head.appendChild(el("div", "instruction", "Read the story, then answer the questions. Choose the ONE best answer for each."));
    area.appendChild(head);

    var cols = el("div", "cols");

    var left = el("div", "col-read");
    left.appendChild(el("div", "qhead", "Story"));
    var story = el("div", "story");
    t.story.forEach(function (p) { story.appendChild(el("p", null, esc(p))); });
    left.appendChild(story);
    cols.appendChild(left);

    var right = el("div", "col-q");
    right.appendChild(el("div", "qhead", "Questions"));

    var form = el("div", "questions");
    t.qs.forEach(function (q, qi) {
      var qd = el("div", "question");
      qd.setAttribute("data-qi", qi);
      qd.appendChild(el("div", "qtext",
        '<span class="qnum">' + (qi + 1) + '</span>' + esc(q.q)));
      var opts = el("div", "options");
      q.opts.forEach(function (opt, oi) {
        var o = el("button", "option");
        o.setAttribute("type", "button");
        o.setAttribute("data-qi", qi);
        o.setAttribute("data-oi", oi);
        o.innerHTML = '<span class="letter">' + LETTERS[oi] + '</span><span class="otext">' + esc(opt) + '</span>';
        o.addEventListener("click", function () { onPick(qi, oi); });
        opts.appendChild(o);
      });
      qd.appendChild(opts);
      form.appendChild(qd);
    });
    right.appendChild(form);

    var controls = el("div", "controls");
    var check = el("button", "btn primary", "Check my answers");
    check.setAttribute("type", "button");
    check.id = "checkbtn";
    check.addEventListener("click", checkAnswers);
    var again = el("button", "btn", "New random test");
    again.setAttribute("type", "button");
    again.addEventListener("click", function () { newTest(state.grade); });
    controls.appendChild(check);
    controls.appendChild(again);
    right.appendChild(controls);

    cols.appendChild(right);
    area.appendChild(cols);

    syncSelection();
  }

  function onPick(qi, oi) {
    if (state.checked) return;
    state.answers[qi] = oi;
    syncSelection();
  }

  function syncSelection() {
    var qs = document.querySelectorAll(".question");
    qs.forEach(function (qd) {
      var qi = +qd.getAttribute("data-qi");
      qd.querySelectorAll(".option").forEach(function (o) {
        var oi = +o.getAttribute("data-oi");
        o.classList.toggle("selected", state.answers[qi] === oi && !state.checked);
      });
    });
  }

  /* ---------- scoring ---------- */

  function checkAnswers() {
    var unanswered = state.answers.filter(function (a) { return a === null; }).length;
    if (unanswered > 0 && !confirm(unanswered + " question(s) are not answered yet. They will be marked wrong. Check anyway?")) {
      return;
    }
    state.checked = true;

    var t = state.test;
    var correct = 0;
    var skills = {}; // type -> {c, n}

    t.qs.forEach(function (q, qi) {
      var pick = state.answers[qi];
      var isRight = pick === q.a;
      if (isRight) correct++;
      var type = q.type || "Comprehension";
      if (!skills[type]) skills[type] = { c: 0, n: 0 };
      skills[type].n++;
      if (isRight) skills[type].c++;

      var qd = document.querySelector('.question[data-qi="' + qi + '"]');
      qd.classList.add(isRight ? "right" : "wrong");
      qd.querySelectorAll(".option").forEach(function (o) {
        var oi = +o.getAttribute("data-oi");
        o.disabled = true;
        if (oi === q.a) o.classList.add("correct");
        if (oi === pick && oi !== q.a) o.classList.add("chosen-wrong");
        if (oi === pick) o.classList.add("picked");
      });
      var tag = el("div", "qresult " + (isRight ? "ok" : "no"),
        isRight ? "Correct" : (pick === null ? "Not answered" : "Not quite"));
      qd.querySelector(".qtext").appendChild(tag);
    });

    $("#checkbtn").disabled = true;
    renderResults(correct, t.qs.length, skills);
  }

  function renderResults(correct, total, skills) {
    var pct = Math.round((correct / total) * 100);
    var msg;
    if (pct >= 90) msg = "Excellent reading!";
    else if (pct >= 70) msg = "Good work!";
    else if (pct >= 50) msg = "Nice effort — keep practising.";
    else msg = "Let's read it again and try another.";

    var r = $("#results");
    r.innerHTML = "";
    r.style.display = "block";

    var top = el("div", "scorecard");
    top.appendChild(el("div", "scorebig", correct + " / " + total));
    top.appendChild(el("div", "scorepct", pct + "%"));
    top.appendChild(el("div", "scoremsg", esc(msg)));
    r.appendChild(top);

    r.appendChild(el("h3", "bd-title", "Breakdown by question type"));
    var table = el("div", "breakdown");
    Object.keys(skills).sort().forEach(function (type) {
      var s = skills[type];
      var p = Math.round((s.c / s.n) * 100);
      var row = el("div", "bd-row");
      row.appendChild(el("div", "bd-label", esc(type)));
      row.appendChild(el("div", "bd-count", s.c + " of " + s.n));
      var pct = el("div", "bd-pct" + (p === 100 ? " full" : (p === 0 ? " zero" : "")), p + "%");
      row.appendChild(pct);
      table.appendChild(row);
    });
    r.appendChild(table);

    var foot = el("div", "controls");
    var again = el("button", "btn primary", "Try another test (" + esc(state.grade) + ")");
    again.setAttribute("type", "button");
    again.addEventListener("click", function () { newTest(state.grade); });
    foot.appendChild(again);
    r.appendChild(foot);
    r.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  /* ---------- boot ---------- */
  document.addEventListener("DOMContentLoaded", function () {
    newTest(GRADES[0]);
  });
})();

</script>
</body>
</html>
