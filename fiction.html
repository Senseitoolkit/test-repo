et of cobweb.","Had never been held before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Mist was caught?","opts":["The Mist promised to come thin and gentle.","Owen spread the flax net across the cut in the dyke.","The Mist came soft and low over Greymere.","Owen loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “He held his breath and kept very still, the net spread wide between the stones.”","opts":["At the very start, before the Mist stole the flock.","Just after Owen made the net of rushes.","When Owen spread the flax net and waited for the Mist.","Right at the end, after the Mist had drifted free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the lonely fens of long ago."},{"title":"How Liesel Tamed the Storm","story":["Long ago, on a windswept farm-village called Thornridge, there lived a girl named Liesel. The Storm above Thornridge was fierce, and each summer it gathered black over the hills. The people of Thornridge had learned to brace for it: they roofed their barns with heavy turf, and they drove the cattle in at the first grumble of thunder, ready to bolt every door. To be out in the open when that Storm broke was to be struck down.","One summer the Storm did something far worse. It hurled down its lightning and set the great hay-barn ablaze, burning the whole year’s feed for the cattle. Without the hay the beasts would not last the winter, and without the beasts the village would be ruined.","“Someone must tame the Storm,” said Liesel, “and teach it to mind its temper.” Everyone laughed. You might as well harness the thunder, they said. But Liesel set out all the same, climbing to the high crag where the Storm broke hardest — so far above the farms that the fields below looked as small as toy bricks.","First she twisted a rope of straw and threw it up at the black cloud. The Storm only crackled, and the straw rope snapped in two. Next she plaited a rope of trailing vine. But the Storm was slippery as oil, and it slid free and was gone, leaving the vine scorched and smoking. Liesel’s hopes were scattered like leaves in the gale.","She climbed home and sat by her grandfather’s fire, close to tears. Her grandfather said nothing, but he took down from the peg a long rope he had plaited himself, year after year, from the toughest oxhide on the farm. “This rope has held the plough-oxen through forty harvests,” he said. “It will hold a deal more than a storm.”","Liesel carried the oxhide rope up to the crag. She tied a great loop and cast it over the black heart of the Storm where it boiled thickest, so that the Storm would be caught fast as it came rolling over. And when the Storm came rolling, the loop drew tight and held it.","How the Storm raged! It hauled against the rope like a bull dragged by the horns, flashing and roaring. Its voice was a beating drum; its breath was a roaring fire. “Let me go! Let me go!” it begged.","“Not until you promise,” said Liesel. “You must rumble far off over Thornridge from this day on, and never again hurl your fire at what is not yours.” The Storm, who had never been held before, had no choice but to agree. Liesel loosened the heavy loop, and the Storm rolled free. From that day the Storm over Thornridge grumbled gently along the far hills, watering the crops and clearing the air, but never again setting fire to a single roof."],"qs":[{"q":"Which TWO phrases best show that the people of Thornridge braced themselves against the Storm?","opts":["“roofed their barns with heavy turf” and “drove the cattle in at the first grumble of thunder”","“climbing to the high crag” and “close to tears”","“snapped in two” and “slippery as oil”","“watering the crops” and “clearing the air”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Liesel’s hopes were scattered like leaves in the gale” tell you?","opts":["The wind blew leaves across the crag.","Liesel suddenly lost all of her hope.","It was autumn on the hills.","Liesel raked up the fallen leaves."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a beating drum; its breath was a roaring fire,” which TWO things is the Storm compared to?","opts":["A bull and its horns","A drum and a fire","Oil and a vine","An ox and a plough"],"a":1,"type":"Figurative language"},{"q":"Why did Liesel tie a great loop in the oxhide rope?","opts":["To hold her grandfather’s oxen.","To trap the Storm as it rolled over the crag.","To help her climb safely down.","To carry the hay back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the crag was a long way above Liesel’s home?","opts":["“the black heart of the Storm”","“the fields below looked as small as toy bricks”","“close to her grandfather’s fire”","“one summer”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each rope to what happened when Liesel used it?","opts":["straw rope – held the Storm fast; vine rope – snapped; oxhide rope – the Storm slid free","straw rope – the Storm slid free; vine rope – held fast; oxhide rope – snapped","straw rope – snapped in two; vine rope – the Storm slid free; oxhide rope – held the Storm fast","straw rope – held fast; vine rope – held fast; oxhide rope – snapped"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Storm “hauled against the rope like a bull dragged by the horns.” What does this comparison tell you?","opts":["The Storm had become calm and gentle.","The Storm was struggling desperately to escape.","The Storm had turned into a real bull.","The Storm was herding cattle."],"a":1,"type":"Figurative language"},{"q":"What did the Storm have to agree to do before Liesel would set it free?","opts":["To carry Liesel back to the village.","To rumble far off and stop hurling its fire.","To bring back the burnt hay.","To water the crops once a year."],"a":1,"type":"Literal recall"},{"q":"When the Storm cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the STORM, but NOT of Liesel?","opts":["Climbed up to the high crag.","Plaited a rope of vine.","Had never been held before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Storm was caught?","opts":["The Storm promised to rumble far off.","Liesel cast the great loop over the black heart of the Storm.","The Storm grumbled gently along the far hills.","Liesel loosened the heavy loop."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “She looped the rope around a standing stone and gripped the end with both hands.”","opts":["At the very start, before the Storm burned the barn.","Just after Liesel made the rope of straw.","When Liesel cast the oxhide loop and waited for the Storm.","Right at the end, after the Storm had rolled free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the high farmlands of long ago."},{"title":"How Jamil Roped the Whirlwind","story":["Long ago, in a desert village called Zafira, there lived a boy named Jamil. A Whirlwind ranged across the sands round Zafira, and in the dry season it spun out of the dunes. The people of Zafira had learned to shelter from it: they wrapped their faces in cloth, and they pitched their tents in the lee of the rocks, ready to crouch low the moment the sand began to fly. To be caught in the open by that Whirlwind was to be lost in the dunes.","One scorching season the Whirlwind did something far worse. It came spinning through the heart of the village and buried the two deep wells under a mountain of sand, the only water for a hundred miles. Without the wells there would be nothing to drink, and the people of Zafira would have to leave their home for ever.","“Someone must rope the Whirlwind,” said Jamil, “and teach it to leave the wells alone.” Everyone laughed. You might as well bridle a sandstorm, they said. But Jamil set out all the same, climbing to the high red ridge where the Whirlwind spun fastest — so far above the tents that they looked as small as grains of sand.","First he twisted a rope of palm-leaf and flung it at the spinning column. The Whirlwind only screamed, and the palm-rope crumbled to powder. Next he plaited a rope of dry grass. But the Whirlwind was slippery as a serpent, and it spun free and was gone, leaving the grass-rope flung far across the sand. Jamil’s hopes blew away like dust.","He walked home and sat by his grandmother’s fire, close to tears. His grandmother said nothing, but she took down from the tent-pole a long rope she had plaited herself, year after year, from the toughest goat-hair of the herd. “This rope has tethered the camels through forty droughts,” she said. “It will hold a deal more than the wind.”","Jamil carried the goat-hair rope up to the ridge. He tied a great noose and laid it across the narrow neck of the ridge where the Whirlwind rushed through fastest, so that the Whirlwind would be caught fast as it came spinning through. And when the Whirlwind came spinning, the noose drew tight and held it.","How the Whirlwind fought! It writhed in the noose like a snake caught in a forked stick, twisting and lashing. Its voice was a screaming kettle; its breath was a furnace. “Let me go! Let me go!” it begged.","“Not until you promise,” said Jamil. “You must spin gently past Zafira from this day on, and never again bury what is not yours.” The Whirlwind, who had never been roped before, had no choice but to agree. Jamil loosened the heavy noose, and the Whirlwind spun free. From that day the Whirlwind by Zafira danced lightly along the far dunes, cooling the air and sweeping the sand-drifts smooth, but never again choking a single well."],"qs":[{"q":"Which TWO phrases best show that the people of Zafira sheltered from the Whirlwind?","opts":["“wrapped their faces in cloth” and “pitched their tents in the lee of the rocks”","“climbing to the high red ridge” and “close to tears”","“crumbled to powder” and “slippery as a serpent”","“cooling the air” and “sweeping the sand-drifts smooth”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Jamil’s hopes blew away like dust” tell you?","opts":["A dust-cloud rose over the dunes.","Jamil suddenly lost all of his hope.","The wind picked up across the sand.","Jamil’s tent was full of dust."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a screaming kettle; its breath was a furnace,” which TWO things is the Whirlwind compared to?","opts":["A snake and a stick","A kettle and a furnace","A camel and a tent","Sand and dust"],"a":1,"type":"Figurative language"},{"q":"Why did Jamil tie a great noose in the goat-hair rope?","opts":["To tether his grandmother’s camels.","To trap the Whirlwind as it spun through the neck of the ridge.","To help him climb safely down.","To carry water back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the ridge was a long way above Jamil’s home?","opts":["“the narrow neck of the ridge”","“the tents looked as small as grains of sand”","“close to his grandmother’s fire”","“one scorching season”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each rope to what happened when Jamil used it?","opts":["palm-leaf rope – held the Whirlwind fast; grass rope – crumbled; goat-hair rope – the Whirlwind spun free","palm-leaf rope – the Whirlwind spun free; grass rope – held fast; goat-hair rope – crumbled","palm-leaf rope – crumbled to powder; grass rope – the Whirlwind spun free; goat-hair rope – held the Whirlwind fast","palm-leaf rope – held fast; grass rope – held fast; goat-hair rope – crumbled"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Whirlwind “writhed in the noose like a snake caught in a forked stick.” What does this comparison tell you?","opts":["The Whirlwind had become calm and gentle.","The Whirlwind was struggling desperately to escape.","The Whirlwind had turned into a real snake.","The Whirlwind was full of snakes."],"a":1,"type":"Figurative language"},{"q":"What did the Whirlwind have to agree to do before Jamil would set it free?","opts":["To carry Jamil back to the village.","To spin gently past and stop burying things.","To dig out the buried wells.","To cool the air once a year."],"a":1,"type":"Literal recall"},{"q":"When the Whirlwind cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the WHIRLWIND, but NOT of Jamil?","opts":["Climbed up to the high ridge.","Plaited a rope of dry grass.","Had never been roped before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Whirlwind was caught?","opts":["The Whirlwind promised to spin gently.","Jamil laid the great noose across the neck of the ridge.","The Whirlwind danced lightly along the far dunes.","Jamil loosened the heavy noose."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “He knotted the rope to the old well-post and waited, his face wrapped tight against the sand.”","opts":["At the very start, before the Whirlwind buried the wells.","Just after Jamil made the rope of palm-leaf.","When Jamil laid the goat-hair noose and waited for the Whirlwind.","Right at the end, after the Whirlwind had spun free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the great desert of long ago."},{"title":"How Sten Snared the Frost","story":["Long ago, in an upland village called Rimedale, there lived a boy named Sten. The Frost crept down on Rimedale, and each autumn it came earlier and bit harder. The people of Rimedale had learned to guard against it: they wrapped the young fruit trees in straw, and they broke the ice on the well each morning, ready to lose a night’s sleep tending their fires. To leave anything tender out in that Frost was to find it blackened by dawn.","One autumn the Frost did something far worse. It crept in early, while the corn still stood green, and killed the whole crop in a single night, ear and stalk and root. Without the corn there would be no bread and no seed for spring, and the people of Rimedale would face a hungry year.","“Someone must snare the Frost,” said Sten, “and teach it to come late and softly.” Everyone laughed. You might as well catch the dark in a sack, they said. But Sten set out all the same, climbing to the high shoulder of the fell where the Frost gathered keenest — so far above the farms that the houses below looked as small as sugar-lumps.","First he knotted a net of dry straw and laid it open in the cold. The Frost only glittered, and the straw net fell to pieces. Next he wove a net of cobweb. But the Frost was slippery as ice, and it slipped clean through and was gone, leaving the cobweb stiff and white. Sten’s hopes froze hard in his chest.","He climbed home and sat by his grandmother’s fire, close to tears. His grandmother said nothing, but she took down from the shelf a great net she had knotted herself, year after year, from the toughest horsehair she could find. “This net has strained the milk through forty winters,” she said. “It will hold a deal more than the Frost.”","Sten carried the horsehair net up to the fell. He spread it wide across the narrow ledge where the Frost crept down keenest, so that the Frost would be caught fast as it came stealing through. And when the Frost came stealing, the net drew tight and held it.","How the Frost struggled! It twisted in the net like a fish on a line, glittering and snapping. Its voice was the crack of breaking ice; its breath was the cold of the grave. “Let me go! Let me go!” it begged.","“Not until you promise,” said Sten. “You must come late and softly to Rimedale from this day on, and never again kill what is not yours to kill.” The Frost, who had never been snared before, had no choice but to agree. Sten loosened the heavy net, and the Frost slipped free. From that day the Frost at Rimedale came late and light, silvering the grass and sweetening the sloes, but never again blackening a single field of corn."],"qs":[{"q":"Which TWO phrases best show that the people of Rimedale guarded against the Frost?","opts":["“wrapped the young fruit trees in straw” and “broke the ice on the well each morning”","“climbing to the high shoulder of the fell” and “close to tears”","“fell to pieces” and “slippery as ice”","“silvering the grass” and “sweetening the sloes”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Sten’s hopes froze hard in his chest” tell you?","opts":["Sten was shivering with cold.","Sten suddenly lost all of his hope.","Ice had formed on Sten’s coat.","Sten’s breath turned to frost."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was the crack of breaking ice; its breath was the cold of the grave,” which TWO things is the Frost compared to?","opts":["A fish and a line","Breaking ice and the grave","A sack and the dark","Straw and cobweb"],"a":1,"type":"Figurative language"},{"q":"Why did Sten spread the horsehair net across the ledge?","opts":["To strain his grandmother’s milk.","To trap the Frost as it crept down the fell.","To help him climb safely down.","To carry the corn back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the fell was a long way above Sten’s home?","opts":["“the narrow ledge”","“the houses below looked as small as sugar-lumps”","“close to his grandmother’s fire”","“in a single night”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Sten used it?","opts":["straw net – held the Frost fast; cobweb net – fell to pieces; horsehair net – the Frost slipped through","straw net – the Frost slipped through; cobweb net – held fast; horsehair net – fell to pieces","straw net – fell to pieces; cobweb net – the Frost slipped through; horsehair net – held the Frost fast","straw net – held fast; cobweb net – held fast; horsehair net – fell to pieces"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Frost “twisted in the net like a fish on a line.” What does this comparison tell you?","opts":["The Frost had become calm and gentle.","The Frost was struggling desperately to escape.","The Frost had turned into a real fish.","The Frost was full of fish."],"a":1,"type":"Figurative language"},{"q":"What did the Frost have to agree to do before Sten would set it free?","opts":["To carry Sten back to the village.","To come late and softly and stop killing the crops.","To bring back the killed corn.","To silver the grass once a year."],"a":1,"type":"Literal recall"},{"q":"When the Frost cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the FROST, but NOT of Sten?","opts":["Climbed up to the high fell.","Wove a net of cobweb.","Had never been snared before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Frost was caught?","opts":["The Frost promised to come late and softly.","Sten spread the horsehair net across the ledge.","The Frost came late and light over Rimedale.","Sten loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “He spread the net over the narrow ledge and crouched in the grey dawn light to wait.”","opts":["At the very start, before the Frost killed the corn.","Just after Sten made the net of straw.","When Sten set the horsehair net and waited for the Frost.","Right at the end, after the Frost had slipped free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the cold uplands of long ago."},{"title":"How Greta Bound the Fire","story":["Long ago, in a forest village called Ashfield, there lived a girl named Greta. Wildfire was the terror of Ashfield, and in the dry summers it ran through the woods. The people of Ashfield had learned to defend themselves: they cleared a ring of bare earth all round the village, and they kept barrels of water by every door, ready to douse a stray spark at once. To let the Fire reach the houses was to lose them all in an hour.","One dry summer the Fire did something far worse. It leapt the bare ring in the night and devoured the whole timber store and the drying-sheds, the village’s wealth for the winter. Without the timber there would be nothing to build with and nothing to sell, and the people of Ashfield would be left with ashes.","“Someone must bind the Fire,” said Greta, “and teach it to keep to the hearth.” Everyone laughed. You might as well leash the lightning, they said. But Greta set out all the same, climbing to the high rocky knoll where the Fire roared up fiercest — so far above the village that the cottages below looked as small as embers.","First she twisted a rope of dry grass and threw it at the flames. The Fire only laughed, and the grass rope burned to ash. Next she plaited a rope of green vine. But the Fire was slippery as a flame, and it slid free and was gone, leaving the vine scorched right through. Greta’s hopes turned to ashes.","She climbed home and sat by her grandmother’s fire, close to tears. Her grandmother said nothing, but she took down from the wall a long rope she had plaited herself, year after year, from the toughest river-flax, and she soaked it well in the stream. “This rope has drawn water from the well for forty years,” she said. “Wet through, it will hold a deal more than fire.”","Greta carried the soaked flax rope up to the knoll. She tied a great loop and laid it across the narrow gully where the Fire rushed up fiercest, so that the Fire would be caught fast as it came leaping through. And when the Fire came leaping, the loop drew tight and held it.","How the Fire raged! It strained against the wet rope like a cat fighting its way out of a sack, leaping and snapping. Its voice was a crackling laugh; its breath was a furnace’s roar. “Let me go! Let me go!” it begged.","“Not until you promise,” said Greta. “You must stay small in the hearth from this day on, and never again leap to what is not yours.” The Fire, who had never been bound before, had no choice but to agree. Greta loosened the heavy loop, and the Fire leapt free. From that day the Fire at Ashfield burned warm and low in the hearths, cooking the food and warming the cold, but never again leaping to a single roof."],"qs":[{"q":"Which TWO phrases best show that the people of Ashfield defended themselves against the Fire?","opts":["“cleared a ring of bare earth all round the village” and “kept barrels of water by every door”","“climbing to the high rocky knoll” and “close to tears”","“burned to ash” and “slippery as a flame”","“cooking the food” and “warming the cold”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Greta’s hopes turned to ashes” tell you?","opts":["A fire was still smouldering.","Greta suddenly lost all of her hope.","The woods had burned down.","Greta’s clothes were covered in ash."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a crackling laugh; its breath was a furnace’s roar,” which TWO things is the Fire compared to?","opts":["A cat and a sack","A laugh and a roar","Lightning and a hearth","Grass and a vine"],"a":1,"type":"Figurative language"},{"q":"Why did Greta tie a great loop in the soaked flax rope?","opts":["To draw water from her grandmother’s well.","To trap the Fire as it leapt up the gully.","To help her climb safely down.","To carry the timber back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the knoll was a long way above Greta’s home?","opts":["“the narrow gully”","“the cottages below looked as small as embers”","“close to her grandmother’s fire”","“one dry summer”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each rope to what happened when Greta used it?","opts":["grass rope – held the Fire fast; vine rope – burned to ash; flax rope – the Fire slid free","grass rope – the Fire slid free; vine rope – held fast; flax rope – burned to ash","grass rope – burned to ash; vine rope – the Fire slid free; soaked flax rope – held the Fire fast","grass rope – held fast; vine rope – held fast; flax rope – burned to ash"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Fire “strained against the wet rope like a cat fighting its way out of a sack.” What does this comparison tell you?","opts":["The Fire had become calm and gentle.","The Fire was struggling desperately to escape.","The Fire had turned into a real cat.","The Fire was full of cats."],"a":1,"type":"Figurative language"},{"q":"What did the Fire have to agree to do before Greta would set it free?","opts":["To carry Greta back to the village.","To stay small in the hearth and stop leaping out.","To bring back the burnt timber.","To warm the houses once a year."],"a":1,"type":"Literal recall"},{"q":"When the Fire cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the FIRE, but NOT of Greta?","opts":["Climbed up to the high knoll.","Plaited a rope of green vine.","Had never been bound before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Fire was caught?","opts":["The Fire promised to stay small in the hearth.","Greta laid the soaked loop across the narrow gully.","The Fire burned warm and low in the hearths.","Greta loosened the heavy loop."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “She soaked the rope once more in the stream and crept toward the wall of flame.”","opts":["At the very start, before the Fire devoured the timber.","Just after Greta made the rope of grass.","When Greta laid the soaked flax loop and waited for the Fire.","Right at the end, after the Fire had leapt free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the great forests of long ago."},{"title":"How Saba Caught the Sun","story":["Long ago, on the dry plains by a village called Goldfurrow, there lived a girl named Saba. The Sun above Goldfurrow was merciless, and through the long droughts it blazed without mercy. The people of Goldfurrow had learned to bear it: they worked their fields in the cool of the dawn, and they carried water from the deep well in the shade, ready to hide from the heat at midday. To labour under that Sun at noon was to drop where you stood.","One terrible summer the Sun did something far worse. It blazed week after week without a single cloud, and dried the river to cracked mud, withering the whole crop in the fields. Without the river and the crop there would be no water and no food, and the people of Goldfurrow would have to abandon their land.","“Someone must catch the Sun,” said Saba, “and teach it to shine more kindly.” Everyone laughed. You might as well rope a thunderbolt, they said. But Saba set out all the same, climbing to the high bare hilltop where at dusk the great Sun came down low — so far above the plain that the fields below looked as small as patches on a quilt.","First she twisted a rope of dry straw and cast it at the burning disc. The Sun only blazed, and the straw rope burst into flame. Next she plaited a rope of green willow. But the Sun was slippery as light, and it slid free and was gone, leaving the willow charred and smoking. Saba’s hopes withered like the corn.","She climbed home and sat by her grandmother’s fire, close to tears. Her grandmother said nothing, but she took down from the rafter a long rope she had plaited herself, year after year, from the toughest river-weed, kept always damp in a jar. “This rope has bound the rafts for forty floods,” she said. “Wet, it will hold a deal more than the Sun.”","Saba carried the damp river-weed rope up to the hilltop. At dusk she tied a great loop and cast it over the great Sun as it sank low through the gap in the hills, so that the Sun would be caught fast as it came down through. And when the Sun came down, the loop drew tight and held it.","How the Sun blazed and fought! It strained against the rope like a stag tangled in thorns, flaring and burning. Its voice was a roaring forge; its face was a coin of fire. “Let me go! Let me go!” it begged.","“Not until you promise,” said Saba. “You must shine kindly on Goldfurrow from this day on, and never again drink dry what is not yours.” The Sun, who had never been caught before, had no choice but to agree. Saba loosened the heavy loop, and the Sun rose free. From that day the Sun over Goldfurrow shone warm and kind, ripening the corn and lighting the fields, but never again drinking the river dry."],"qs":[{"q":"Which TWO phrases best show that the people of Goldfurrow learned to bear the heat of the Sun?","opts":["“worked their fields in the cool of the dawn” and “carried water from the deep well in the shade”","“climbing to the high bare hilltop” and “close to tears”","“burst into flame” and “slippery as light”","“ripening the corn” and “lighting the fields”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Saba’s hopes withered like the corn” tell you?","opts":["The corn had dried up in the heat.","Saba suddenly lost all of her hope.","The fields turned brown.","Saba felt thirsty and tired."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a roaring forge; its face was a coin of fire,” which TWO things is the Sun compared to?","opts":["A stag and thorns","A forge and a coin","A thunderbolt and a rope","Straw and willow"],"a":1,"type":"Figurative language"},{"q":"Why did Saba tie a great loop in the damp river-weed rope?","opts":["To bind her grandmother’s rafts.","To trap the Sun as it sank low through the gap in the hills.","To help her climb safely down.","To carry the crop back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the hilltop was a long way above Saba’s home?","opts":["“the gap in the hills”","“the fields below looked as small as patches on a quilt”","“close to her grandmother’s fire”","“week after week”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each rope to what happened when Saba used it?","opts":["straw rope – held the Sun fast; willow rope – burst into flame; river-weed rope – the Sun slid free","straw rope – the Sun slid free; willow rope – held fast; river-weed rope – burst into flame","straw rope – burst into flame; willow rope – the Sun slid free; damp river-weed rope – held the Sun fast","straw rope – held fast; willow rope – held fast; river-weed rope – burst into flame"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Sun “strained against the rope like a stag tangled in thorns.” What does this comparison tell you?","opts":["The Sun had become calm and gentle.","The Sun was struggling desperately to escape.","The Sun had turned into a real stag.","The Sun was hiding among the thorns."],"a":1,"type":"Figurative language"},{"q":"What did the Sun have to agree to do before Saba would set it free?","opts":["To carry Saba back to the village.","To shine kindly and stop drying things up.","To bring back the withered crop.","To light the fields once a year."],"a":1,"type":"Literal recall"},{"q":"When the Sun cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the SUN, but NOT of Saba?","opts":["Climbed up to the high hilltop.","Plaited a rope of green willow.","Had never been caught before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Sun was caught?","opts":["The Sun promised to shine kindly.","Saba cast the great loop over the Sun as it sank low.","The Sun shone warm and kind over Goldfurrow.","Saba loosened the heavy loop."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “She climbed to the bare hilltop at dusk, where the great Sun came down low, and made her loop ready.”","opts":["At the very start, before the Sun dried the river.","Just after Saba made the rope of straw.","When Saba was about to cast the river-weed loop over the Sun.","Right at the end, after the Sun had risen free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the parched plains of long ago."},{"title":"How Finn Netted the Rain","story":["Long ago, in a lowland village called Sodden Reach, there lived a boy named Finn. The Rain over Sodden Reach was endless, and in the grey months it fell without stopping. The people of Sodden Reach had learned to live with the wet: they thatched their roofs thick and steep, and they dug little channels to carry the water away, ready to bail out their floors at any hour. To let the Rain have its way was to watch your home turn to a pond.","One grey season the Rain did something far worse. It fell day and night for a month without pause, and drowned the whole of the planted fields, rotting the seed in the ground. Without a crop coming up there would be no harvest at all, and the people of Sodden Reach would go hungry through the next winter.","“Someone must net the Rain,” said Finn, “and teach it when to stop.” Everyone laughed. You might as well dam the clouds, they said. But Finn set out all the same, climbing to the high shoulder of the moor where the rain-clouds rolled down lowest — so far above the village that the rooftops below looked as small as lily-pads.","First he knotted a net of dry straw and held it up to the clouds. The Rain only hissed, and the straw net washed apart. Next he wove a net of trailing vine. But the Rain was slippery as water, and it ran clean through and was gone, leaving the vine limp and dripping. Finn’s hopes were washed away like footprints in the rain.","He climbed home and sat by his grandmother’s fire, close to tears. His grandmother said nothing, but she took down from the beam a great net she had knotted herself, year after year, from the toughest flax of the marsh. “This net has held the herring through forty seasons,” she said. “It will hold a deal more than the Rain.”","Finn carried the flax net up to the moor. He pegged it wide across the narrow gully where the rain-clouds rolled down lowest, so that the Rain would be caught fast as it came pouring through. And when the Rain came pouring, the net drew tight and held it.","How the Rain fought! It twisted in the net like an eel writhing in a fist, lashing and streaming. Its voice was a hissing serpent; its breath was a cold river. “Let me go! Let me go!” it begged.","“Not until you promise,” said Finn. “You must fall softly and pass on over Sodden Reach from this day on, and never again drown what is not yours.” The Rain, who had never been netted before, had no choice but to agree. Finn loosened the heavy net, and the Rain poured free. From that day the Rain at Sodden Reach fell soft and passed on, filling the wells and freshening the fields, but never again drowning a single furrow."],"qs":[{"q":"Which TWO phrases best show that the people of Sodden Reach lived with the constant wet?","opts":["“thatched their roofs thick and steep” and “dug little channels to carry the water away”","“climbing to the high shoulder of the moor” and “close to tears”","“washed apart” and “slippery as water”","“filling the wells” and “freshening the fields”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Finn’s hopes were washed away like footprints in the rain” tell you?","opts":["The path was covered in puddles.","Finn suddenly lost all of his hope.","Finn’s footprints filled with water.","It had rained on the moor."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a hissing serpent; its breath was a cold river,” which TWO things is the Rain compared to?","opts":["An eel and a fist","A serpent and a river","A cloud and a dam","Straw and vine"],"a":1,"type":"Figurative language"},{"q":"Why did Finn peg the flax net across the gully?","opts":["To hold his grandmother’s herring.","To trap the Rain as it poured down through the gully.","To help him climb safely down.","To carry the seed back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the moor was a long way above Finn’s home?","opts":["“the narrow gully”","“the rooftops below looked as small as lily-pads”","“close to his grandmother’s fire”","“for a month without pause”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Finn used it?","opts":["straw net – held the Rain fast; vine net – washed apart; flax net – the Rain ran through","straw net – the Rain ran through; vine net – held fast; flax net – washed apart","straw net – washed apart; vine net – the Rain ran through; flax net – held the Rain fast","straw net – held fast; vine net – held fast; flax net – washed apart"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Rain “twisted in the net like an eel writhing in a fist.” What does this comparison tell you?","opts":["The Rain had become calm and gentle.","The Rain was struggling desperately to escape.","The Rain had turned into a real eel.","The Rain was full of eels."],"a":1,"type":"Figurative language"},{"q":"What did the Rain have to agree to do before Finn would set it free?","opts":["To carry Finn back to the village.","To fall softly and pass on, and stop drowning the fields.","To bring back the rotted seed.","To fill the wells once a year."],"a":1,"type":"Literal recall"},{"q":"When the Rain cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the RAIN, but NOT of Finn?","opts":["Climbed up to the high moor.","Wove a net of vine.","Had never been netted before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Rain was caught?","opts":["The Rain promised to fall softly and pass on.","Finn pegged the flax net across the gully.","The Rain fell soft and passed on over Sodden Reach.","Finn loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “He pegged the net wide across the gully and waited for the clouds to roll down.”","opts":["At the very start, before the Rain drowned the fields.","Just after Finn made the net of straw.","When Finn set the flax net and waited for the Rain.","Right at the end, after the Rain had poured free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the flooded lowlands of long ago."}],"Year 5":[{"title":"How Edda Caught the Hail","story":["Long ago, in a farming village called Barleydown, there lived a girl named Edda. The Hail that fell on Barleydown was savage, and each summer it came clattering out of the black clouds. The people of Barleydown had learned to shield themselves from it: they shuttered their windows with stout boards, and they ran the beasts into the byre at the first grey cloud, ready to take cover in a heartbeat. To be caught in the open under that Hail was to be beaten black and blue.","One summer the Hail did something far worse. On the day before the reaping, it came smashing down and flattened the whole field of ripe barley, beating every ear into the mud. Without the barley there would be no bread and no seed, and the people of Barleydown would face a hungry winter.","“Someone must catch the Hail,” said Edda, “and teach it to fall gently.” Everyone laughed. You might as well bottle a thunderclap, they said. But Edda set out all the same, climbing to the high ridge where the Hail came down hardest — so far above the farms that the houses below looked as small as poppy-seeds.","First she knotted a net of dry straw and held it up to the cloud. The Hail only rattled, and the straw net was battered to bits. Next she wove a net of cobweb. But the Hail was slippery as ice-beads, and it smashed clean through and was gone, leaving the cobweb shredded and empty. Edda’s hopes were dashed like the barley.","She climbed home and sat by her grandmother’s fire, close to tears. Her grandmother said nothing, but she took down from the wall a great net she had knotted herself, year after year, from the toughest horsehair on the farm. “This net has strained the milk through forty summers,” she said. “It will hold a deal more than the Hail.”","Edda carried the horsehair net up to the ridge. She spread it wide across the narrow notch in the rocks where the Hail rattled down hardest, so that the Hail would be caught fast as it came clattering through. And when the Hail came clattering, the net drew tight and held it.","How the Hail struggled! It rattled in the net like a sackful of pebbles shaken hard, leaping and bouncing. Its voice was a rattling drum; its breath was a shower of stones. “Let me go! Let me go!” it begged.","“Not until you promise,” said Edda. “You must fall soft as rain on Barleydown from this day on, and never again batter what is not yours.” The Hail, who had never been caught before, had no choice but to agree. Edda loosened the heavy net, and the Hail bounced free. From that day the Hail at Barleydown came light and rare, melting into the soil and feeding the crops, but never again flattening a single field."],"qs":[{"q":"Which TWO phrases best show that the people of Barleydown shielded themselves from the Hail?","opts":["“shuttered their windows with stout boards” and “ran the beasts into the byre at the first grey cloud”","“climbing to the high ridge” and “close to tears”","“battered to bits” and “slippery as ice-beads”","“melting into the soil” and “feeding the crops”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Edda’s hopes were dashed like the barley” tell you?","opts":["The barley had been beaten flat.","Edda suddenly lost all of her hope.","It had started to hail again.","Edda fell over in the field."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a rattling drum; its breath was a shower of stones,” which TWO things is the Hail compared to?","opts":["Pebbles and a sack","A drum and a shower of stones","A thunderclap and a bottle","Straw and cobweb"],"a":1,"type":"Figurative language"},{"q":"Why did Edda spread the horsehair net across the notch in the rocks?","opts":["To strain her grandmother’s milk.","To trap the Hail as it clattered down through the notch.","To help her climb safely down.","To carry the barley back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the ridge was a long way above Edda’s home?","opts":["“the narrow notch in the rocks”","“the houses below looked as small as poppy-seeds”","“close to her grandmother’s fire”","“on the day before the reaping”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Edda used it?","opts":["straw net – held the Hail fast; cobweb net – battered to bits; horsehair net – the Hail smashed through","straw net – the Hail smashed through; cobweb net – held fast; horsehair net – battered to bits","straw net – battered to bits; cobweb net – the Hail smashed through; horsehair net – held the Hail fast","straw net – held fast; cobweb net – held fast; horsehair net – battered to bits"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Hail “rattled in the net like a sackful of pebbles shaken hard.” What does this comparison tell you?","opts":["The Hail had become calm and gentle.","The Hail was struggling desperately to escape.","The Hail had turned into real pebbles.","The Hail was full of pebbles."],"a":1,"type":"Figurative language"},{"q":"What did the Hail have to agree to do before Edda would set it free?","opts":["To carry Edda back to the village.","To fall soft as rain and stop battering the crops.","To bring back the flattened barley.","To feed the crops once a year."],"a":1,"type":"Literal recall"},{"q":"When the Hail cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the HAIL, but NOT of Edda?","opts":["Climbed up to the high ridge.","Wove a net of cobweb.","Had never been caught before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Hail was caught?","opts":["The Hail promised to fall soft as rain.","Edda spread the horsehair net across the notch in the rocks.","The Hail came light and rare over Barleydown.","Edda loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “She braced the net between two great boulders and waited for the black cloud.”","opts":["At the very start, before the Hail flattened the barley.","Just after Edda made the net of straw.","When Edda spread the horsehair net and waited for the Hail.","Right at the end, after the Hail had bounced free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the open downs of long ago."},{"title":"How Cai Snared the Whirlpool","story":["Long ago, in a cliff-top village called Spindrift, there lived a boy named Cai. A great Whirlpool spun in the mouth of the cove below, and at the turning of the tide it opened wide and hungry. The people of Spindrift had learned to keep clear of it: they rowed wide around the cove-mouth, and they never put to sea on the turning tide, ready to wait hours for safe water. To be caught by that Whirlpool was to be dragged down for ever.","One winter the Whirlpool did something far worse. As the ferry crossed the cove, it yawned open and sucked down the ferry and three fishing boats, with all the season’s catch aboard. Without the boats and the catch, the people of Spindrift would have nothing to live on.","“Someone must snare the Whirlpool,” said Cai, “and teach it to spin in peace.” Everyone laughed. You might as well knit a hole shut, they said. But Cai set out all the same, climbing to the high sea-stack above the narrows where the Whirlpool spun fiercest — so far above the water that the boats below looked as small as fish-scales.","First he knotted a net of dry seaweed and let it down into the swirl. The Whirlpool only roared, and the seaweed net came apart. Next he wove a net of fine spider-silk. But the Whirlpool was slippery as a seal, and it slid clean through and was gone, leaving the silk torn and trailing. Cai’s hopes went down like a stone in the deep.","He climbed home and sat by his grandfather’s fire, close to tears. His grandfather said nothing, but he took down from the rafter a great net he had knotted himself, winter after winter, from the toughest horsehair on the coast. “This net has hauled the crabs through forty seasons,” he said. “It will hold a deal more than a whirlpool.”","Cai carried the horsehair net down to the narrows. He spread it wide across the narrow throat of rock where the Whirlpool spun fiercest, so that the Whirlpool would be caught fast as it whirled through. And when the Whirlpool whirled, the net drew tight and held it.","How the Whirlpool fought! It spun against the net like an eel writhing in a creel, sucking and churning. Its voice was a sucking roar; its breath was the cold of the deep. “Let me go! Let me go!” it begged.","“Not until you promise,” said Cai. “You must turn gently in the cove from this day on, and never again swallow what is not yours.” The Whirlpool, who had never been snared before, had no choice but to agree. Cai loosened the heavy net, and the Whirlpool spun free. From that day the Whirlpool at Spindrift turned slow and calm, stirring the fish into the nets, but never again pulling down a single boat."],"qs":[{"q":"Which TWO phrases best show that the people of Spindrift kept clear of the Whirlpool?","opts":["“rowed wide around the cove-mouth” and “never put to sea on the turning tide”","“climbing to the high sea-stack” and “close to tears”","“came apart” and “slippery as a seal”","“stirring the fish into the nets” and “turned slow and calm”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Cai’s hopes went down like a stone in the deep” tell you?","opts":["A stone fell into the sea.","Cai suddenly lost all of his hope.","Cai dropped his net overboard.","The water was very deep."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a sucking roar; its breath was the cold of the deep,” which TWO things is the Whirlpool compared to?","opts":["An eel and a creel","A roar and the cold of the deep","A seal and a stone","Seaweed and silk"],"a":1,"type":"Figurative language"},{"q":"Why did Cai spread the horsehair net across the throat of rock?","opts":["To haul in his grandfather’s crabs.","To trap the Whirlpool as it whirled through the narrows.","To help him climb safely down.","To carry the catch back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the sea-stack was a long way above Cai’s home?","opts":["“the narrow throat of rock”","“the boats below looked as small as fish-scales”","“close to his grandfather’s fire”","“at the turning of the tide”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Cai used it?","opts":["seaweed net – held the Whirlpool fast; spider-silk net – came apart; horsehair net – the Whirlpool slid through","seaweed net – the Whirlpool slid through; spider-silk net – held fast; horsehair net – came apart","seaweed net – came apart; spider-silk net – the Whirlpool slid through; horsehair net – held the Whirlpool fast","seaweed net – held fast; spider-silk net – held fast; horsehair net – came apart"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Whirlpool “spun against the net like an eel writhing in a creel.” What does this comparison tell you?","opts":["The Whirlpool had become calm and gentle.","The Whirlpool was struggling desperately to escape.","The Whirlpool had turned into a real eel.","The Whirlpool was full of eels."],"a":1,"type":"Figurative language"},{"q":"What did the Whirlpool have to agree to do before Cai would set it free?","opts":["To carry Cai back to the village.","To turn gently and stop swallowing things.","To bring back the sunken boats.","To stir the fish in once a year."],"a":1,"type":"Literal recall"},{"q":"When the Whirlpool cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the WHIRLPOOL, but NOT of Cai?","opts":["Climbed up to the high sea-stack.","Wove a net of spider-silk.","Had never been snared before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Whirlpool was caught?","opts":["The Whirlpool promised to turn gently.","Cai spread the horsehair net across the throat of rock.","The Whirlpool turned slow and calm in the cove.","Cai loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “He lashed the net to the iron ring on the rock and held on with both hands.”","opts":["At the very start, before the Whirlpool swallowed the ferry.","Just after Cai made the net of seaweed.","When Cai spread the horsehair net and waited for the Whirlpool.","Right at the end, after the Whirlpool had spun free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the wild sea-coast of long ago."},{"title":"How Anya Netted the Swarm","story":["Long ago, in a valley village called Merefield, there lived a girl named Anya. A great Swarm of locusts haunted Merefield, and in the hot years it came pouring over the hills in a brown cloud. The people of Merefield had learned to drive it off: they beat their pans and drums to scare it away, and they covered their gardens with sheets of cloth, ready to fight for every leaf. To let that Swarm settle was to lose everything green you had.","One hot year the Swarm did something far worse. It poured down in its millions and stripped every field and orchard bare in a single afternoon, leaving not a leaf nor an ear behind. Without the crops there would be nothing to harvest and nothing to store, and the people of Merefield would starve.","“Someone must net the Swarm,” said Anya, “and teach it to take only its share.” Everyone laughed. You might as well count the raindrops, they said. But Anya set out all the same, climbing to the high hill above the valley mouth where the Swarm poured through thickest — so far above the village that the farms below looked as small as breadcrumbs.","First she knotted a net of dry grass and held it across the gap. The Swarm only seethed, and the grass net was chewed to nothing. Next she wove a net of cobweb. But the Swarm was slippery as a thousand wings, and it poured clean through and was gone, leaving the cobweb in tatters. Anya’s hopes shrivelled like the stripped fields.","She climbed home and sat by her grandmother’s fire, close to tears. Her grandmother said nothing, but she took down from the hook a great net she had knotted herself, year after year, from the toughest flax of the valley. “This net has dried the beans through forty summers,” she said. “It will hold a deal more than a swarm.”","Anya carried the flax net up to the hill. She spread it wide across the narrow gap where the Swarm poured through thickest, so that the Swarm would be caught fast as it streamed through. And when the Swarm streamed through, the net drew tight and held it.","How the Swarm struggled! It seethed in the net like a sack full of crawling beetles, buzzing and heaving. Its voice was a thousand snapping scissors; its breath was a hot dry wind. “Let me go! Let me go!” it begged.","“Not until you promise,” said Anya. “You must take only your share at the field-edge from this day on, and never again strip what is not yours.” The Swarm, who had never been netted before, had no choice but to agree. Anya loosened the heavy net, and the Swarm streamed free. From that day the Swarm at Merefield kept to the wild grass at the valley’s edge, nibbling only the weeds, but never again stripping a single field."],"qs":[{"q":"Which TWO phrases best show that the people of Merefield tried to drive the Swarm off?","opts":["“beat their pans and drums to scare it away” and “covered their gardens with sheets of cloth”","“climbing to the high hill” and “close to tears”","“chewed to nothing” and “slippery as a thousand wings”","“nibbling only the weeds” and “kept to the wild grass”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Anya’s hopes shrivelled like the stripped fields” tell you?","opts":["The fields had dried up.","Anya suddenly lost all of her hope.","It was a very hot day.","Anya was hungry and tired."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a thousand snapping scissors; its breath was a hot dry wind,” which TWO things is the Swarm compared to?","opts":["Beetles and a sack","Scissors and a wind","Raindrops and a cloud","Grass and cobweb"],"a":1,"type":"Figurative language"},{"q":"Why did Anya spread the flax net across the gap?","opts":["To dry her grandmother’s beans.","To trap the Swarm as it streamed through the valley mouth.","To help her climb safely down.","To carry the crops back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the hill was a long way above Anya’s home?","opts":["“the narrow gap”","“the farms below looked as small as breadcrumbs”","“close to her grandmother’s fire”","“in a single afternoon”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Anya used it?","opts":["grass net – held the Swarm fast; cobweb net – chewed to nothing; flax net – the Swarm poured through","grass net – the Swarm poured through; cobweb net – held fast; flax net – chewed to nothing","grass net – chewed to nothing; cobweb net – the Swarm poured through; flax net – held the Swarm fast","grass net – held fast; cobweb net – held fast; flax net – chewed to nothing"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Swarm “seethed in the net like a sack full of crawling beetles.” What does this comparison tell you?","opts":["The Swarm had become calm and gentle.","The Swarm was struggling desperately to escape.","The Swarm had turned into real beetles.","The Swarm was full of beetles."],"a":1,"type":"Figurative language"},{"q":"What did the Swarm have to agree to do before Anya would set it free?","opts":["To carry Anya back to the village.","To take only its share at the field-edge and stop stripping the fields.","To bring back the stripped crops.","To nibble the weeds once a year."],"a":1,"type":"Literal recall"},{"q":"When the Swarm cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the SWARM, but NOT of Anya?","opts":["Climbed up to the high hill.","Wove a net of cobweb.","Had never been netted before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Swarm was caught?","opts":["The Swarm promised to take only its share.","Anya spread the flax net across the gap.","The Swarm kept to the wild grass at the valley’s edge.","Anya loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “She pegged the net across the valley mouth and crouched down among the rocks.”","opts":["At the very start, before the Swarm stripped the fields.","Just after Anya made the net of grass.","When Anya spread the flax net and waited for the Swarm.","Right at the end, after the Swarm had streamed free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the green valley of long ago."},{"title":"How Jonah Held the Great Wave","story":["Long ago, in a harbour town called Pebblewick, there lived a boy named Jonah. A great Wave rose against Pebblewick, and in every storm it reared up taller than the houses. The people of Pebblewick had learned to defend against it: they built their sea-wall higher every year, and they drew their boats up beyond the tide-line each night, ready to run uphill at the first warning. To stand on the quay when that Wave broke was to be swept away.","One stormy night the Wave did something far worse. It reared over the sea-wall and swept the whole fishing fleet off the quay and out to sea, leaving the harbour bare. Without the boats the people of Pebblewick could catch no fish, and a fishing town with no boats is a town with no bread.","“Someone must hold the Wave,” said Jonah, “and teach it to keep to the shore.” Everyone laughed. You might as well stop the moon, they said. But Jonah set out all the same, climbing to the high cliff above the gap in the sea-stacks where the Wave funnelled through highest — so far above the town that the cottages below looked as small as cockle-shells.","First he knotted a net of dry seaweed and lowered it into the gap. The Wave only crashed, and the seaweed net was washed to shreds. Next he wove a net of fine spider-silk. But the Wave was slippery as a fish, and it burst clean through and was gone, leaving the silk torn and streaming. Jonah’s hopes were swept away like sand.","He climbed home and sat by his grandmother’s fire, close to tears. His grandmother said nothing, but she took down from the beam a great net she had knotted herself, season after season, from the toughest horsehair on the coast. “This net has hauled the crabs through forty seasons,” she said. “It will hold a deal more than a wave.”","Jonah carried the horsehair net up to the cliff. He spread it wide across the narrow gap between the sea-stacks where the Wave funnelled through highest, so that the Wave would be caught fast as it surged through. And when the Wave surged through, the net drew tight and held it.","How the Wave heaved! It strained against the net like a whale on a harpoon-line, rolling and rearing. Its voice was a crashing boom; its breath was a freezing spray. “Let me go! Let me go!” it begged.","“Not until you promise,” said Jonah. “You must come gently to the shore from this day on, and never again rise over what is not yours.” The Wave, who had never been held before, had no choice but to agree. Jonah loosened the heavy net, and the Wave rolled free. From that day the Wave at Pebblewick came smooth and steady, lapping the wall and carrying the boats in, but never again rising over the quay."],"qs":[{"q":"Which TWO phrases best show that the people of Pebblewick defended themselves against the Wave?","opts":["“built their sea-wall higher every year” and “drew their boats up beyond the tide-line each night”","“climbing to the high cliff” and “close to tears”","“washed to shreds” and “slippery as a fish”","“lapping the wall” and “carrying the boats in”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Jonah’s hopes were swept away like sand” tell you?","opts":["The beach was washed clean.","Jonah suddenly lost all of his hope.","Sand blew across the quay.","Jonah was standing on the shore."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a crashing boom; its breath was a freezing spray,” which TWO things is the Wave compared to?","opts":["A whale and a line","A boom and a spray","The moon and the shore","Seaweed and silk"],"a":1,"type":"Figurative language"},{"q":"Why did Jonah spread the horsehair net across the gap in the sea-stacks?","opts":["To haul in his grandmother’s crabs.","To trap the Wave as it funnelled through the gap.","To help him climb safely down.","To carry the boats back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the cliff was a long way above Jonah’s home?","opts":["“the narrow gap between the sea-stacks”","“the cottages below looked as small as cockle-shells”","“close to his grandmother’s fire”","“one stormy night”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Jonah used it?","opts":["seaweed net – held the Wave fast; spider-silk net – washed to shreds; horsehair net – the Wave burst through","seaweed net – the Wave burst through; spider-silk net – held fast; horsehair net – washed to shreds","seaweed net – washed to shreds; spider-silk net – the Wave burst through; horsehair net – held the Wave fast","seaweed net – held fast; spider-silk net – held fast; horsehair net – washed to shreds"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Wave “strained against the net like a whale on a harpoon-line.” What does this comparison tell you?","opts":["The Wave had become calm and gentle.","The Wave was struggling desperately to escape.","The Wave had turned into a real whale.","The Wave was carrying a whale."],"a":1,"type":"Figurative language"},{"q":"What did the Wave have to agree to do before Jonah would set it free?","opts":["To carry Jonah back to the town.","To come gently to the shore and stop rising over the wall.","To bring back the lost boats.","To carry the boats in once a year."],"a":1,"type":"Literal recall"},{"q":"When the Wave cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the WAVE, but NOT of Jonah?","opts":["Climbed up to the high cliff.","Wove a net of spider-silk.","Had never been held before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Wave was caught?","opts":["The Wave promised to come gently to the shore.","Jonah spread the horsehair net across the gap in the sea-stacks.","The Wave came smooth and steady at Pebblewick.","Jonah loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “He wedged the net between the two sea-stacks and braced his back against the rock.”","opts":["At the very start, before the Wave swept off the fleet.","Just after Jonah made the net of seaweed.","When Jonah spread the horsehair net and waited for the Wave.","Right at the end, after the Wave had rolled free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the storm-coast of long ago."},{"title":"How Brisa Roped the Gale","story":["Long ago, in a fishing village called Gullhaven, there lived a girl named Brisa. The Gale that blew on Gullhaven was vicious, and each spring it screamed in off the open sea. The people of Gullhaven had learned to make all fast against it: they lashed everything down with double ropes, and they watched the sky for the first white-caps, ready to haul in their sails in a moment. To be caught under full sail in that Gale was to be driven onto the rocks.","One spring the Gale did something far worse. It came shrieking in by night and drove the whole fishing fleet onto the rocks, tearing every sail to rags. Without their boats and sails the people of Gullhaven could not fish, and without the fish they could not live.","“Someone must rope the Gale,” said Brisa, “and teach it to blow fair.” Everyone laughed. You might as well halter the sky, they said. But Brisa set out all the same, climbing to the high headland where the Gale tore through a notch in the cliffs — so far above the harbour that it looked as small as a saucer.","First she twisted a rope of dry reed and flung it into the wind. The Gale only howled, and the reed rope snapped like thread. Next she plaited a rope of slippery kelp. But the Gale was slippery as spray, and it slid free and was gone, leaving the kelp limp and dripping. Brisa’s hopes were torn away like a sail.","She climbed home and sat by her grandfather’s fire, close to tears. Her grandfather said nothing, but he took down from the peg a long rope he had plaited himself, winter after winter, from the toughest horsehair on the shore. “This rope has held the boats at anchor through forty winters,” he said. “It will hold a deal more than a gale.”","Brisa carried the horsehair rope up to the headland. She tied a great noose and laid it across the narrow notch in the cliffs where the Gale tore through hardest, so that the Gale would be caught fast as it screamed through. And when the Gale screamed through, the noose drew tight and held it.","How the Gale fought! It pulled against the rope like a wild gull caught in a snare, beating and shrieking. Its voice was a shrieking whistle; its breath was an icy blast. “Let me go! Let me go!” it begged.","“Not until you promise,” said Brisa. “You must blow steady and fair over Gullhaven from this day on, and never again drive ashore what is not yours.” The Gale, who had never been roped before, had no choice but to agree. Brisa loosened the heavy noose, and the Gale blew free. From that day the wind at Gullhaven blew steady and fair, filling the sails and speeding the boats home, but never again wrecking a single hull."],"qs":[{"q":"Which TWO phrases best show that the people of Gullhaven made all fast against the Gale?","opts":["“lashed everything down with double ropes” and “watched the sky for the first white-caps”","“climbing to the high headland” and “close to tears”","“snapped like thread” and “slippery as spray”","“filling the sails” and “speeding the boats home”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Brisa’s hopes were torn away like a sail” tell you?","opts":["A sail had ripped in the wind.","Brisa suddenly lost all of her hope.","The boats had put out to sea.","Brisa was mending a sail."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a shrieking whistle; its breath was an icy blast,” which TWO things is the Gale compared to?","opts":["A gull and a snare","A whistle and a blast","The sky and a halter","Reed and kelp"],"a":1,"type":"Figurative language"},{"q":"Why did Brisa tie a great noose in the horsehair rope?","opts":["To hold her grandfather’s boats at anchor.","To trap the Gale as it tore through the notch in the cliffs.","To help her climb safely down.","To carry the sails back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the headland was a long way above Brisa’s home?","opts":["“the narrow notch in the cliffs”","“the harbour looked as small as a saucer”","“close to her grandfather’s fire”","“by night”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each rope to what happened when Brisa used it?","opts":["reed rope – held the Gale fast; kelp rope – snapped; horsehair rope – the Gale slid free","reed rope – the Gale slid free; kelp rope – held fast; horsehair rope – snapped","reed rope – snapped like thread; kelp rope – the Gale slid free; horsehair rope – held the Gale fast","reed rope – held fast; kelp rope – held fast; horsehair rope – snapped"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Gale “pulled against the rope like a wild gull caught in a snare.” What does this comparison tell you?","opts":["The Gale had become calm and gentle.","The Gale was struggling desperately to escape.","The Gale had turned into a real gull.","The Gale was full of gulls."],"a":1,"type":"Figurative language"},{"q":"What did the Gale have to agree to do before Brisa would set it free?","opts":["To carry Brisa back to the village.","To blow steady and fair and stop driving the boats ashore.","To bring back the wrecked boats.","To fill the sails once a year."],"a":1,"type":"Literal recall"},{"q":"When the Gale cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the GALE, but NOT of Brisa?","opts":["Climbed up to the high headland.","Plaited a rope of kelp.","Had never been roped before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Gale was caught?","opts":["The Gale promised to blow steady and fair.","Brisa laid the great noose across the notch in the cliffs.","The wind blew steady and fair over Gullhaven.","Brisa loosened the heavy noose."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “She knotted the rope around the cliff-stake and gripped it with both hands.”","opts":["At the very start, before the Gale wrecked the fleet.","Just after Brisa made the rope of reed.","When Brisa laid the horsehair noose and waited for the Gale.","Right at the end, after the Gale had blown free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the windward shore of long ago."},{"title":"How Tove Caught the Cold","story":["Long ago, in a northern village called Bittern Hollow, there lived a girl named Tove. The Cold that gripped Bittern Hollow was cruel, and some winters it came early and would not leave. The people of Bittern Hollow had learned to hold out against it: they burned their fires day and night, and they huddled the whole family in one warm room, ready to wait out weeks of darkness. To be lost outside in that Cold was never to thaw again.","One year the Cold did something far worse. It came early and clung on past its season, freezing the river so hard there were no fish, and freezing the seed solid in the store. Without fish or seed the people of Bittern Hollow would not see the spring.","“Someone must catch the Cold,” said Tove, “and teach it to keep its season.” Everyone laughed. You might as well grasp a shadow, they said. But Tove set out all the same, climbing to the high pass where the Cold poured down keenest — so far above the village that it looked as small as a scatter of salt.","First she knotted a net of dry straw and held it open in the freezing air. The Cold only glittered, and the straw net fell to pieces. Next she wove a net of cobweb. But the Cold was slippery as black ice, and it slipped clean through and was gone, leaving the cobweb stiff and white. Tove’s hopes froze like the river.","She climbed home and sat by her grandmother’s fire, close to tears. Her grandmother said nothing, but she took down from the wall a great net she had knotted herself, winter after winter, from the toughest mountain wool. “This net has wrapped the lambs through forty winters,” she said. “It will hold a deal more than the Cold.”","Tove carried the woollen net up to the pass. She spread it wide across the narrow saddle of rock where the Cold poured down keenest, so that the Cold would be caught fast as it came creeping through. And when the Cold came creeping, the net drew tight and held it.","How the Cold struggled! It shuddered in the net like a fish frozen stiff on a line, glittering and snapping. Its voice was a groaning ice; its breath was a long dark night. “Let me go! Let me go!” it begged.","“Not until you promise,” said Tove. “You must come in your season and leave in your season from this day on, and never again linger and starve what is not yours.” The Cold, who had never been caught before, had no choice but to agree. Tove loosened the heavy net, and the Cold crept free. From that day the Cold at Bittern Hollow came in its time and left in its time, frosting the windows and stilling the year, but never again clinging past the spring."],"qs":[{"q":"Which TWO phrases best show that the people of Bittern Hollow held out against the Cold?","opts":["“burned their fires day and night” and “huddled the whole family in one warm room”","“climbing to the high pass” and “close to tears”","“fell to pieces” and “slippery as black ice”","“frosting the windows” and “stilling the year”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Tove’s hopes froze like the river” tell you?","opts":["The river had iced over.","Tove suddenly lost all of her hope.","Tove was shivering with cold.","Ice covered the pass."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a groaning ice; its breath was a long dark night,” which TWO things is the Cold compared to?","opts":["A fish and a line","Groaning ice and a long dark night","A shadow and salt","Straw and cobweb"],"a":1,"type":"Figurative language"},{"q":"Why did Tove spread the woollen net across the saddle of rock?","opts":["To wrap her grandmother’s lambs.","To trap the Cold as it crept down through the pass.","To help her climb safely down.","To carry the seed back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the pass was a long way above Tove’s home?","opts":["“the narrow saddle of rock”","“it looked as small as a scatter of salt”","“close to her grandmother’s fire”","“past its season”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Tove used it?","opts":["straw net – held the Cold fast; cobweb net – fell to pieces; woollen net – the Cold slipped through","straw net – the Cold slipped through; cobweb net – held fast; woollen net – fell to pieces","straw net – fell to pieces; cobweb net – the Cold slipped through; woollen net – held the Cold fast","straw net – held fast; cobweb net – held fast; woollen net – fell to pieces"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Cold “shuddered in the net like a fish frozen stiff on a line.” What does this comparison tell you?","opts":["The Cold had become calm and gentle.","The Cold was struggling desperately to escape.","The Cold had turned into a real fish.","The Cold was full of fish."],"a":1,"type":"Figurative language"},{"q":"What did the Cold have to agree to do before Tove would set it free?","opts":["To carry Tove back to the village.","To come and leave in its season and stop lingering.","To bring back the frozen fish.","To frost the windows once a year."],"a":1,"type":"Literal recall"},{"q":"When the Cold cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the COLD, but NOT of Tove?","opts":["Climbed up to the high pass.","Wove a net of cobweb.","Had never been caught before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Cold was caught?","opts":["The Cold promised to keep its season.","Tove spread the woollen net across the saddle of rock.","The Cold came in its time and left in its time.","Tove loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “She spread the net across the mouth of the pass and waited in the bitter dark.”","opts":["At the very start, before the Cold froze the river.","Just after Tove made the net of straw.","When Tove spread the woollen net and waited for the Cold.","Right at the end, after the Cold had crept free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the far north of long ago."},{"title":"How Bran Roped the Thunder","story":["Long ago, in a mountain village called Cragfoot, there lived a boy named Bran. The Thunder that broke over Cragfoot was terrible, and each summer it bellowed among the peaks. The people of Cragfoot had learned to brace for it: they wedged stout timbers against the cliff above their roofs, and they ran indoors at the first far growl, ready to shelter the moment it rolled near. To stand below the crags when that Thunder bellowed was to be buried in falling stones.","One summer the Thunder did something far worse. It bellowed so hard that it shook a great fall of loose rock off the mountain, and the stones crushed the mill and the grain-store flat. Without the mill and the grain the people of Cragfoot would have no flour and no bread.","“Someone must rope the Thunder,” said Bran, “and teach it to mind its voice.” Everyone laughed. You might as well tie up the sky, they said. But Bran set out all the same, climbing to the high crag where the Thunder bellowed loudest — so far above the village that the houses below looked as small as knuckle-bones.","First he twisted a rope of dry straw and threw it up at the booming cloud. The Thunder only crashed, and the straw rope snapped clean through. Next he plaited a rope of trailing vine. But the Thunder was slippery as sound itself, and it rolled free and was gone, leaving the vine smoking on the rocks. Bran’s hopes crashed down like the falling stones.","He climbed home and sat by his grandfather’s fire, close to tears. His grandfather said nothing, but he took down from the peg a long rope he had plaited himself, year after year, from the toughest oxhide on the mountain. “This rope has held the plough-oxen through forty harvests,” he said. “It will hold a deal more than the Thunder.”","Bran carried the oxhide rope up to the crag. He tied a great noose and laid it across the narrow gap in the crags where the Thunder rolled th
