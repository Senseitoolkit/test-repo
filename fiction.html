 brought a town that never spoke together into the friendliest place for miles around."],"qs":[{"q":"As well as feeding his fish, what did Diego like to do best?","opts":["Fold things out of paper","Ride his bike","Sing songs","Bake bread"],"a":0,"type":"Literal recall"},{"q":"Choose TWO words that describe how the fish behaved at feeding time.","opts":["once a week","sat and stared","darted and circled (quickly)","growled and snapped"],"a":2,"type":"Finding evidence"},{"q":"What did the fish have to make do with instead of fish food?","opts":["A few soft crumbs","Fresh flakes","More fish food","A leaf of lettuce"],"a":0,"type":"Literal recall"},{"q":"Diego said the boat “might” make him a friend. What does the word ‘might’ tell us?","opts":["He had already made a friend.","The boat would definitely make him a friend.","Diego was not sure it would work — it was only a hope.","The boat could never make a friend."],"a":2,"type":"Vocabulary & word meaning"},{"q":"Why did Diego borrow a book from the library?","opts":["Because he had lost his own book.","To learn how to fold the boat properly.","To read a story to his fish.","To learn how to bake bread."],"a":1,"type":"Inference"},{"q":"“Diego’s eyes shone at the sight of it.” What does this tell you about how Diego felt?","opts":["He was feeling sleepy.","He was frightened of the boat.","He did not like the boat at all.","He was delighted and thought it was wonderful."],"a":3,"type":"Inference"},{"q":"The writer says Diego “creased it, and creased it, and creased it.” Why does the writer repeat the word ‘creased’?","opts":["To show that he creased it only once.","To show that he creased it again and again, until every fold was sharp.","To show that he forgot to crease it.","To show that the paper was cold."],"a":1,"type":"Author's craft"},{"q":"Why did Diego place the boat on the water ‘very carefully’?","opts":["So that not one drop would soak the note and spoil it.","Because the boat was far too heavy.","Because the fish were watching him.","Because he was feeling tired."],"a":0,"type":"Inference"},{"q":"Which word in the story shows that the boat was moving across the river?","opts":["“divided”","“sailed”","“wide”","“calm”"],"a":1,"type":"Finding evidence"},{"q":"“At first, nobody noticed.” Why did nobody notice the boat at first?","opts":["Everyone in the town was asleep.","It was only one small boat on a wide river.","The boat was enormous and right beside them.","Nobody lived in the town."],"a":1,"type":"Inference"},{"q":"Where else might you find a kind, helpful character like Diego?","opts":["In a maths book.","In a science report.","In a shopping list.","In other storybooks and fairy tales."],"a":3,"type":"Main idea, title & genre"},{"q":"Why did everyone say that Diego was a hero?","opts":["Because he kept three fish.","Because he folded the most boats.","Because he brought a town that never spoke together as friends.","Because he swam across the river."],"a":2,"type":"Inference"},{"q":"Which of these would also be a good title for this story?","opts":["“How to Bake Bread”","“The Lost Fish”","“How Diego Joined the Two Banks”","“A Rainy Day at the River”"],"a":2,"type":"Main idea, title & genre"}]},{"title":"Greta and the Little Library","story":["Greta lived in a quiet town called Dullham, where the days were long and nobody ever seemed to read. She looked after a small black cat called Inky, and she loved him dearly. When she was not stroking Inky, Greta liked best of all to read stories and to build little things from wood.","Inky’s favourite treat was a flake of fish. Greta would hold a piece up, and the cat would purr and curl cosily, as happily as he could. But one day the fish ran out. Until Greta could buy more, Inky had to make do with a plain dry biscuit instead, and he did not like it one bit.","Then Greta had an idea. On her shelf she had one well-loved storybook. “Perhaps,” she thought, “this one book might start the whole town reading.” To make sure she did it right, she borrowed a book about building little boxes from the library, so she could make a weatherproof box to keep the book in.","Greta built a small wooden box on a post by her gate. She sanded it, and sanded it, and sanded it, until the wood was smooth. Then she placed her storybook inside.","At last the little library stood ready, neat and snug, with the book waiting behind its glass door. Greta’s eyes shone at the sight of it. It was the most beautiful thing in all of Dullham.","Before she left it, Greta fixed the lid very carefully, so that not one drop of rain would creep in and spoil the pages. But the little box had other plans. A passer-by took the book to read, and left one of his own in its place. At first, nobody noticed.","Then, over one busy month, it happened. All over Dullham, little wooden book-boxes came springing up — by gates, on corners and along every quiet street. People swapped tales, children read aloud, and everyone had something to talk about. The whole town was no longer dull, but full of stories.","Everyone said that Greta was a hero, because one well-loved book and one kind girl had turned their quiet, dull town into the most curious, story-loving place for miles around."],"qs":[{"q":"Greta said the book “might” start the whole town reading. What does the word ‘might’ tell us?","opts":["The town was already reading.","Greta was not sure it would work — it was only a hope.","The book would definitely start the town reading.","The book could never be read."],"a":1,"type":"Vocabulary & word meaning"},{"q":"As well as stroking Inky, what did Greta like to do best?","opts":["Read stories and build little things from wood","Ride her bike","Cook dinner","Paint pictures"],"a":0,"type":"Literal recall"},{"q":"What did Inky have to make do with instead of fish?","opts":["A bowl of milk","A plain dry biscuit","More fish","A slice of meat"],"a":1,"type":"Literal recall"},{"q":"Choose TWO words that describe how Inky behaved when Greta held up a treat.","opts":["growled and hid","once a week","purred and curled (cosily)","barked and jumped"],"a":2,"type":"Finding evidence"},{"q":"Why did Greta borrow a book from the library?","opts":["To read a story to Inky.","Because she had lost her own book.","To learn how to make a weatherproof box for the book.","To learn how to bake bread."],"a":2,"type":"Inference"},{"q":"“Greta’s eyes shone at the sight of it.” What does this tell you about how Greta felt?","opts":["She was feeling sleepy.","She was delighted and thought it was wonderful.","She was frightened of the box.","She did not like the box at all."],"a":1,"type":"Inference"},{"q":"The writer says Greta “sanded it, and sanded it, and sanded it.” Why does the writer repeat the word ‘sanded’?","opts":["To show that she sanded it only once.","To show that she forgot to sand it.","To show that she sanded it again and again, until it was smooth.","To show that the wood was cold."],"a":2,"type":"Author's craft"},{"q":"Why did Greta fix the lid ‘very carefully’?","opts":["Because the box was far too heavy.","So that not one drop of rain would creep in and spoil the pages.","Because the cat was watching her.","Because she was feeling tired."],"a":1,"type":"Inference"},{"q":"Which word in the story shows that the book-boxes were appearing all over town?","opts":["“quiet”","“dull”","“springing up”","“long”"],"a":2,"type":"Finding evidence"},{"q":"“At first, nobody noticed.” Why did nobody notice the little library at first?","opts":["Everyone in the town was asleep.","It was only one small box by a single gate.","The box was enormous and in the town square.","Nobody lived in the town."],"a":1,"type":"Inference"},{"q":"Where else might you find a kind, helpful character like Greta?","opts":["In a shopping list.","In a science report.","In a maths book.","In other storybooks and fairy tales."],"a":3,"type":"Main idea, title & genre"},{"q":"Why did everyone say that Greta was a hero?","opts":["Because she kept a cat.","Because she owned the most books.","Because she turned the quiet, dull town into a curious, story-loving place.","Because she won a reading prize."],"a":2,"type":"Inference"},{"q":"Which of these would also be a good title for this story?","opts":["“How to Bake Bread”","“How Greta Filled the Town with Stories”","“The Lost Cat”","“A Rainy Day in Dullham”"],"a":1,"type":"Main idea, title & genre"}]}],"Year 3":[{"title":"Tuft and the New Smell","story":["At the edge of the busy market square, in a snug hollow in the old oak tree, there lived a red squirrel named Tuft. Tuft had a bushy red tail, sharp little claws, and two tufty ears that pricked up at every sound. All morning he watched the traders below and waited for his chance.","Tuft loved the market, but there was one thing he did NOT love: the nut-seller’s big brown dog, Rufus. Rufus lay beside the stall all day with one eye open. That was why Tuft was always so careful. One snap of those jaws, and that would be the end of him.","Every morning, before he climbed down, Tuft ‘read’ the smells that drifted up from the stalls. By now he knew them all: ripe red apples, fresh sweet hay, and the dusty scent of dry corn. These were his USUAL morning smells, the very same ones every single day.","But this morning was different. A brand-new smell came curling up through the leaves — warm, nutty and sweet, like nothing Tuft had ever known. His nose twitched. His tummy rumbled. Something new and special must be cooking, and he simply had to find out what it was.","Tuft darted down the trunk and along the edge of the stall, past the dozing dog, as quick and quiet as he could, for he could not wait to reach the wonderful smell. It grew stronger and stronger the closer he came, until at last he reached the top of the stall.","There, on a copper pan, sat a heap of roasted chestnuts, each one glossy and split open to show the soft gold inside. They were the most wonderful things Tuft had ever seen. (He had once spied chestnuts on Old Berry’s barrow across the square — small and pale, each no bigger than a pea — but even those were not as fine as these.) Beside the pan stood a basket of toffee apples, red and shining on their sticks. He nibbled a stray crumb from the boards, and his whiskers trembled with joy.","Just then a boy in a green cap stopped at the stall, pointed at the pan, and the nut-seller tipped every last chestnut into a paper cone. Tuft’s heart sank as he watched the roasted chestnuts disappear into the crowd.","But the nut-seller, whistling a tune, knocked the empty pan against the rail — and a shower of warm, crumbly chestnut pieces came tumbling down to the cobbles, right under Tuft’s nose. It was, he thought happily, a very good day after all."],"qs":[{"q":"What did Tuft ‘read’ every morning?","opts":["The traders’ price labels.","The smells that drifted up from the stalls.","A market newspaper.","The dog’s collar tag."],"a":1,"type":"Literal recall"},{"q":"Which TWO words from the story tell you that Tuft was a squirrel?","opts":["“claws” and “stall”","“apples” and “hay”","“bushy tail” and “tufty ears”","“market” and “tree”"],"a":2,"type":"Finding evidence"},{"q":"Which of these was an UNUSUAL smell for Tuft, not one of his everyday smells?","opts":["Ripe apples.","The warm, nutty new smell.","Fresh hay.","Dry corn."],"a":1,"type":"Literal recall"},{"q":"Why is the word USUAL written in capital letters?","opts":["To show it is the name of the stall.","To show that Tuft was shouting.","To show the word is hard to spell.","To stress that the smells were the same ordinary ones every single day."],"a":3,"type":"Author's craft"},{"q":"Why did the new smell get stronger and stronger?","opts":["Tuft was getting closer and closer to the chestnuts.","The dog had knocked over the pan.","The chestnuts were going cold.","The trader opened a window."],"a":0,"type":"Inference"},{"q":"Why was Tuft always careful around the nut-seller’s dog?","opts":["The dog snored too loudly.","The dog sat in his tree.","The dog could catch him and eat him.","The dog had eaten all the apples."],"a":2,"type":"Inference"},{"q":"Which sentence from the story best shows that Tuft liked the chestnuts?","opts":["“All morning he watched the traders below.”","“Rufus lay beside the stall all day.”","“A boy in a green cap stopped at the stall.”","“His whiskers trembled with joy.”"],"a":3,"type":"Finding evidence"},{"q":"What was impressive about Old Berry’s chestnuts across the square?","opts":["They were small and pale, each no bigger than a pea.","They glowed in the dark.","They were bigger than the whole stall.","They were made of toffee."],"a":0,"type":"Literal recall"},{"q":"Which option correctly matches each treat to one of its features?","opts":["roasted chestnuts – red on sticks; Old Berry’s chestnuts – glossy; toffee apples – pale","roasted chestnuts – glossy and split open; Old Berry’s chestnuts – small and pale; toffee apples – red and shining on sticks","roasted chestnuts – small and pale; Old Berry’s chestnuts – red on sticks; toffee apples – glossy","roasted chestnuts – pale; Old Berry’s chestnuts – toffee; toffee apples – split open"],"a":1,"type":"Compare, contrast & matching"},{"q":"Why did Tuft want to reach the stall as quickly as he could?","opts":["He wanted to wake the dog.","He was being chased by the boy.","He was eager to find the wonderful new smell.","He wanted to leave the market for good."],"a":2,"type":"Inference"},{"q":"What was disappointing to Tuft about the boy in the green cap?","opts":["He stepped on Tuft’s tail.","He woke the sleeping dog.","He knocked over the copper pan.","He bought every last chestnut."],"a":3,"type":"Literal recall"},{"q":"What did the brand-new smell suggest to Tuft?","opts":["That the dog was now awake.","That something new and special was being cooked.","That it was time to sleep.","That the market was closing."],"a":1,"type":"Inference"},{"q":"Which option shows the events of the story in the correct order?","opts":["A new smell appeared → Tuft read the morning smells → chestnuts fell → he saw the chestnuts → he crept past the dog","Tuft saw the chestnuts → he crept past the dog → he read the smells → a new smell appeared → chestnuts fell","Tuft read the morning smells → a new smell appeared → he crept past the dog → he saw the chestnuts → chestnut pieces fell to the cobbles","Tuft read the morning smells → chestnuts fell → a new smell appeared → he crept past the dog → he saw the chestnuts"],"a":2,"type":"Sequencing"},{"q":"Why was Tuft so cautious as he moved along the stall?","opts":["The boards were slippery and wet.","He did not want the dog to catch him.","He was carrying a heavy chestnut.","He was feeling very sleepy."],"a":1,"type":"Inference"},{"q":"Which ONE of these statements is TRUE according to the story?","opts":["The dog helped Tuft find the chestnuts.","Tuft lived inside the copper pan.","Tuft followed a new smell all the way to the stall.","Tuft did not really like chestnuts at all."],"a":2,"type":"Literal recall"}]},{"title":"Mim and the New Smell","story":["In the great kitchen of Ferndale House, behind the tall flour bins, there lived a dormouse named Mim. Mim had tiny soft paws, a long furry tail, and round dark eyes that shone in the candlelight. All day she hid in the shadows and waited for the cook to turn her back.","Mim loved the kitchen, but there was one thing she did NOT love: the cook’s big grey cat, Smoke. Smoke dozed by the hearth all day with one eye open. That was why Mim was always so careful. One pounce of those paws, and that would be the end of her.","Every morning, before she crept out, Mim ‘read’ the smells that floated through the kitchen. By now she knew them all: bubbling porridge, hot buttered toast, and warm creamy milk. These were her ORDINARY morning smells, the very same ones every single day.","But this morning was different. A brand-new smell came drifting across the floor — warm, spicy and sweet, like nothing Mim had ever known. Her nose twitched. Her tummy rumbled. Something new and special must be baking, and she simply had to find out what it was.","Mim scampered along the bottom of the dresser, past the sleeping cat, as quick and quiet as she could, for she could not wait to reach the wonderful smell. It grew stronger and stronger the closer she came, until at last she reached the great kitchen table.","There, on a wooden board, sat a row of spiced apple turnovers, each one folded into a neat triangle and dusted with cinnamon. They were the most wonderful things Mim had ever seen. (She had once glimpsed cream puffs in the cool dairy across the yard — round and white and soft as clouds — but even those were not as fine as these.) On a rack nearby stood little gingerbread men, each with three currant buttons. She nibbled a stray crumb from the floor, and her whiskers trembled with joy.","Just then a footman hurried in, lifted the whole board, and carried every last turnover away up the stairs to the dining room. Mim’s heart sank as she watched the turnovers disappear through the door.","But the cook, humming to herself, swept the empty board clean — and a shower of warm, spicy pastry flakes came tumbling down to the floor, right under Mim’s nose. It was, she thought happily, a very good day after all."],"qs":[{"q":"Why is the word ORDINARY written in capital letters?","opts":["To show it is the name of the house.","To show that Mim was shouting.","To show the word is hard to spell.","To stress that the smells were the same everyday ones every single day."],"a":3,"type":"Author's craft"},{"q":"Why was Mim always careful around the cook’s cat?","opts":["The cat snored too loudly.","The cat could pounce on her and eat her.","The cat had eaten the toast.","The cat slept in her nest."],"a":1,"type":"Inference"},{"q":"Which TWO words from the story tell you that Mim was a dormouse?","opts":["“porridge” and “toast”","“kitchen” and “dresser”","“tiny paws” and “furry tail”","“cook” and “footman”"],"a":2,"type":"Finding evidence"},{"q":"Which of these was an UNUSUAL smell for Mim, not one of her everyday smells?","opts":["The warm, spicy new smell.","Bubbling porridge.","Buttered toast.","Warm milk."],"a":0,"type":"Literal recall"},{"q":"What did the brand-new smell suggest to Mim?","opts":["That the cat was awake.","That the kitchen was on fire.","That it was bedtime.","That something new and special was baking."],"a":3,"type":"Inference"},{"q":"What was impressive about the cream puffs in the dairy across the yard?","opts":["They were round and white, soft as clouds.","They were bigger than the house.","They were made of plain bread.","They glowed in the dark."],"a":0,"type":"Literal recall"},{"q":"Why did the new smell get stronger and stronger?","opts":["The cat knocked over the board.","The turnovers were going cold.","Mim was getting closer and closer to the table.","The cook opened a window."],"a":2,"type":"Inference"},{"q":"Which sentence from the story best shows that Mim liked the turnovers?","opts":["“Smoke dozed by the hearth all day.”","“A footman hurried in.”","“All day she hid in the shadows.”","“Her whiskers trembled with joy.”"],"a":3,"type":"Finding evidence"},{"q":"Why did Mim want to reach the table as quickly as she could?","opts":["She wanted to wake the cat.","She wanted to leave the kitchen for good.","She was being chased by the footman.","She was eager to find the wonderful new smell."],"a":3,"type":"Inference"},{"q":"What did Mim ‘read’ every morning?","opts":["The cook’s recipe book.","The smells that floated through the kitchen.","A letter on the table.","The clock on the wall."],"a":1,"type":"Literal recall"},{"q":"Which option correctly matches each treat to one of its features?","opts":["turnovers – currant buttons; cream puffs – cinnamon; gingerbread men – round and white","turnovers – round and white; cream puffs – currant buttons; gingerbread men – cinnamon","turnovers – folded triangles dusted with cinnamon; cream puffs – round and white, soft; gingerbread men – three currant buttons","turnovers – soft as clouds; cream puffs – triangles; gingerbread men – dusted with cinnamon"],"a":2,"type":"Compare, contrast & matching"},{"q":"Why was Mim so cautious as she moved across the kitchen?","opts":["She did not want the cat to catch her.","The floor was wet and slippery.","She was carrying a heavy turnover.","She was very sleepy."],"a":0,"type":"Inference"},{"q":"What was disappointing to Mim about the footman?","opts":["He stepped on her tail.","He woke the cat.","He carried away every last turnover.","He dropped the wooden board."],"a":2,"type":"Literal recall"},{"q":"Which ONE of these statements is TRUE according to the story?","opts":["Mim lived inside the cook’s oven.","Mim followed a new smell all the way to the kitchen table.","The cat helped Mim find the turnovers.","Mim did not like pastries at all."],"a":1,"type":"Literal recall"},{"q":"Which option shows the events of the story in the correct order?","opts":["Mim read the morning smells → a new smell appeared → she crept past the cat → she saw the turnovers → pastry flakes fell","A new smell appeared → Mim read the morning smells → flakes fell → she saw the turnovers → she crept past the cat","Mim saw the turnovers → she crept past the cat → she read the smells → a new smell appeared → flakes fell","Mim read the smells → flakes fell → a new smell appeared → she crept past the cat → she saw the turnovers"],"a":0,"type":"Sequencing"}]},{"title":"Bracken and the New Smell","story":["In the cool pantry of Hollow Farm, behind a stack of old jars, there lived a field mouse named Bracken. Bracken had twitching whiskers, a thin pink tail, and quick little feet that made no sound at all. All day he hid among the shelves and waited for the kitchen to fall quiet.","Bracken loved the pantry, but there was one thing he did NOT love: the lean brown weasel that slipped in under the door. The weasel slid along the shelves all day with one eye open. That was why Bracken was always so careful. One dart of that long body, and that would be the end of him.","Every morning, before he set off, Bracken ‘read’ the smells that seeped under the pantry door. By now he knew them all: smoky bacon, sharp pickle, and the earthy scent of potatoes. These were his SAME morning smells, the very same ones every single day.","But this morning was different. A brand-new smell came creeping under the door — warm, cheesy and savoury, like nothing Bracken had ever known. His nose twitched. His tummy rumbled. Something new and special must be baking, and he simply had to find out what it was.","Bracken slipped along the back of the shelf, past the prowling weasel, as quick and quiet as he could, for he could not wait to reach the wonderful smell. It grew stronger and stronger the closer he came, until at last he reached the kitchen doorway.","There, on a wire rack, sat a batch of cheese scones, each one golden and flecked with cheese, with a crusty split across the top. They were the most wonderful things Bracken had ever seen. (He had once seen butter biscuits cooling in the dairy across the lane — pale and round and stamped with a flower — but even those were not as fine as these.) Beside the rack lay a fruit loaf, dark and studded with fat raisins. He nibbled a stray crumb from the tiles, and his whiskers trembled with joy.","Just then the farmer’s wife bustled in, packed every last scone into a basket, and carried them off to sell at the market. Bracken’s heart sank as he watched the scones disappear out of the door.","But the farmer’s wife, singing softly, shook out the empty rack — and a shower of warm, cheesy crumbs came tumbling down to the tiles, right under Bracken’s nose. It was, he thought happily, a very good day after all."],"qs":[{"q":"Which of these was an UNUSUAL smell for Bracken, not one of his everyday smells?","opts":["Smoky bacon.","Sharp pickle.","Earthy potatoes.","The warm, cheesy new smell."] ead the smells → crumbs fell → a new smell appeared → he slipped past the weasel → he saw the scones"],"a":1,"type":"Sequencing"}]},{"title":"Sorrel and the New Smell","story":["At the bottom of a cottage garden, in a burrow beneath the hedge, there lived a young rabbit named Sorrel. Sorrel had long velvet ears, a soft white fluffy tail, and a little twitching nose. All day she nibbled clover and waited for the garden to grow still.","Sorrel loved the garden, but there was one thing she did NOT love: the red fox that prowled along the lane. The fox padded by the hedge each day with one eye open. That was why Sorrel was always so careful. One snap of those jaws, and that would be the end of her.","Every morning, before she hopped out, Sorrel ‘read’ the smells that drifted down the garden. By now she knew them all: fresh-cut grass, sweet honeysuckle, and the green scent of growing beans. These were her USUAL morning smells, the very same ones every single day.","But this morning was different. A brand-new smell came floating from the cottage window — warm, sweet and golden, like nothing Sorrel had ever known. Her nose twitched. Her tummy rumbled. Something new and special must be baking, and she simply had to find out what it was.","Sorrel hopped along the foot of the wall, past the dozing fox, as quick and quiet as she could, for she could not wait to reach the wonderful smell. It grew stronger and stronger the closer she came, until at last she reached the cottage windowsill.","There, on the sill, sat a tray of honey buns, each one round and sticky and gleaming with golden honey. They were the most wonderful things Sorrel had ever seen. (She had once peeped at a seed cake on the windowsill next door — pale and speckled all over with tiny seeds — but even that was not as fine as these.) Beside the tray cooled a jam roly-poly, rolled up tight and oozing red at the ends. She nibbled a stray crumb from the ledge, and her whiskers trembled with joy.","Just then two children ran out, scooped up every last honey bun, and carried them indoors for their tea. Sorrel’s heart sank as she watched the honey buns disappear through the door.","But the children’s mother, humming a tune, brushed off the empty tray — and a shower of warm, sticky crumbs came tumbling down to the path, right under Sorrel’s nose. It was, she thought happily, a very good day after all."],"qs":[{"q":"Why was Sorrel always careful around the red fox?","opts":["The fox snored too loudly.","The fox could catch her and eat her.","The fox had eaten the clover.","The fox slept in her burrow."],"a":1,"type":"Inference"},{"q":"What did Sorrel ‘read’ every morning?","opts":["A note left on the sill.","The cottage curtains.","The smells that drifted down the garden.","The fox’s footprints."],"a":2,"type":"Literal recall"},{"q":"Which TWO words from the story tell you that Sorrel was a rabbit?","opts":["“grass” and “beans”","“garden” and “hedge”","“long ears” and “fluffy tail”","“cottage” and “window”"],"a":2,"type":"Finding evidence"},{"q":"Why is the word USUAL written in capital letters?","opts":["To show it is the name of the garden.","To show that Sorrel was shouting.","To show the word is hard to spell.","To stress that the smells were the same everyday ones every single day."],"a":3,"type":"Author's craft"},{"q":"Which of these was an UNUSUAL smell for Sorrel, not one of her everyday smells?","opts":["Fresh-cut grass.","Sweet honeysuckle.","Growing beans.","The warm, sweet new smell."],"a":3,"type":"Literal recall"},{"q":"What did the brand-new smell suggest to Sorrel?","opts":["That the fox was awake.","That something new and special was baking.","That it was time to sleep.","That the garden was on fire."],"a":1,"type":"Inference"},{"q":"What was impressive about the seed cake on the windowsill next door?","opts":["It was pale and speckled all over with tiny seeds.","It was bigger than the cottage.","It glowed in the dark.","It was made of honey."],"a":0,"type":"Literal olden and bursting with bright red cherries. They were the most wonderful things Chip had ever seen. (He had once seen iced fancies on a stand across the garden — little pink squares each topped with a sugar rose — but even those were not as fine as these.) Beside the stand lay a bundle of cheese straws, long and twisted and crisp. He pecked a stray crumb from the cloth, and he hopped and chirped with joy.","Just then a waiter swept past, lifted the china stand, and carried every last scone to a big table under the tree. Chip’s heart sank as he watched the cherry scones disappear across the garden.","But the waiter, whistling a tune, shook out the empty cloth — and a shower of warm, fruity crumbs came tumbling down to the path, right under Chip’s beak. It was, he thought happily, a very good day after all."],"qs":[{"q":"Which TWO words from the story tell you that Chip was a bird?","opts":["“coffee” and “tea”","“red breast” and “feathers”","“garden” and “wall”","“table” and “fence”"],"a":1,"type":"Finding evidence"},{"q":"Which of these was an UNUSUAL smell for Chip, not one of his everyday smells?","opts":["Strong coffee.","Buttered crumpets.","The warm, fruity new smell.","Warm tea."],"a":2,"type":"Literal recall"},{"q":"Why is the word ORDINARY written in capital letters?","opts":["To stress that the smells were the same everyday ones every single day.","To show that Chip was shouting.","To show it is the name of the garden.","To show the word is hard to spell."],"a":0,"type":"Author's craft"},{"q":"What did the brand-new smell suggest to Chip?","opts":["That the crow was awake.","That it was time to sleep.","That something new and special was baking.","That the garden was closing."],"a":2,"type":"Inference"},{"q":"What did Chip ‘read’ every morning?","opts":["The smells that drifted from the kitchen.","The menu on the table.","The crow’s feathers.","A newspaper left on a chair."],"a":0,"type":"Literal recall"},{"q":"Why was Chip always careful around the big bla  moved along the fence?","opts":["The fence was wet and slippery.","He did not want the crow to catch him.","He was carrying a heavy scone.","He was feeling very sleepy."],"a":1,"type":"Inference"},{"q":"Which ONE of these statements is TRUE according to the story?","opts":["Chip lived inside the kitchen oven.","The crow helped Chip find the scones.","Chip did not like scones at all.","Chip followed a new smell all the way to the serving table."],"a":3,"type":"Literal recall"},{"q":"Which option shows the events of the story in the correct order?","opts":["A new smell appeared → Chip read the smells → crumbs fell → he saw the scones → he flew past the crow","Chip saw the scones → he flew past the crow → he read the smells → a new smell appeared → crumbs fell","Chip read the smells → crumbs fell → a new smell appeared → he flew past the crow → he saw the scones","Chip read the morning smells → a new smell appeared → he flew past the crow → he saw the scones → fruity crumbs fell"],"a":3,"type":"Sequencing"}]},{"title":"Reed and the New Smell","story":["On the bank of a slow green river, in a hole among the roots, there lived a water vole named Reed. Reed had glossy brown fur, a short stubby tail, and tiny round ears almost hidden in his coat. All day he sat by the water and waited for the bank to grow quiet.","Reed loved the riverside, but there was one thing he did NOT love: the tall grey heron that stood in the shallows. The heron waited by the reeds all day with one eye open. That was why Reed was always so careful. One stab of that long beak, and that would be the end of him.","Every morning, before he set off, Reed ‘read’ the smells that drifted from the little tea-room. By now he knew them all: boiling kettles, toasted muffins, and the sharp scent of lemon. These were his SAME morning smells, the very same ones every single day.","But this morning was different. A brand-new smell came drifting over the water — warm, buttery and sweet, like nothing Reed had ever known. His nose twitched. His tummy rumbled. Something new and special must be baking, and he simply had to find out what it was.","Reed swam along the edge of the bank, past the watching heron, as quick and quiet as he could, for he could not wait to reach the wonderful smell. It grew stronger and stronger the closer he came, until at last he reached the wooden jetty.","There, on a tin plate, sat a stack of buttered teacakes, each one round and toasted and dripping with melted butter. They were the most wonderful things Reed had ever seen. (He had once seen fruit buns at the stall across the river — dark and glossy and packed with peel — but even those were not as fine as these.) Beside the plate lay fingers of shortbread, pale and crumbly and dusted with sugar. He nibbled a stray crumb from the planks, and his whiskers trembled with joy.","Just then a family on a boat called out, took every last teacake, and floated away down the river. Reed’s heart sank as he watched the teacakes disappear round the bend.","But the tea-room lady, humming a tune, brushed off the empty plate — and a shower of warm, buttery crumbs came tumbling down to the jetty, right under Reed’s nose. It was, he thought happily, a very good day after all."],"qs":[{"q":"What did Reed ‘read’ every morning?","opts":["The boats on the river.","The smells that drifted from the tea-room.","The heron’s feathers.","A sign on the jetty."],"a":1,"type":"Literal recall"},{"q":"Why is the word SAME written in capital letters?","opts":["To stress that the smells were the same everyday ones every single day.","To show that Reed was shouting.","To show it is the name of the river.","To show the word is hard to spell."],"a":0,"type":"Author's craft"},{"q":"Which of these was an UNUSUAL smell for Reed, not one of his everyday smells?","opts":["Boiling kettles.","Toasted muffins.","Sharp lemon.","The warm, buttery new smell."],"a":3,"type":"Literal recall"},{"q":"Why was Reed always careful around the tall grey heron?","opts":["The heron snored too loudly.","The heron had eaten the muffins.","The heron could stab him with its long beak.","The heron slept in his hole."],"a":2,"type":"Inference"},{"q":"Which TWO words from the story tell you that Reed was a water vole?","opts":["“kettles” and “lemon”","“glossy fur” and “stubby tail”","“river” and “jetty”","“plate” and “boat”"],"a":1,"type":"Finding evidence"},{"q":"Why did the new smell get stronger and stronger?","opts":["The heron knocked over the plate.","The teacakes were going cold.","Reed was getting closer and closer to the teacakes.","The lady opened a window."],"a":2,"type":"Inference"},{"q":"What did the brand-new smell suggest to Reed?","opts":["That the heron was awake.","That something new and special was baking.","That it was time to sleep.","That the tea-room was closing."],"a":1,"type":"Inference"},{"q":"Which sentence from the story best shows that Reed liked the teacakes?","opts":["“The heron waited by the reeds all day.”","“All day he sat by the water.”","“His whiskers trembled with joy.”","“A family on a boat called out.”"],"a":2,"type":"Finding evidence"},{"q":"What was impressive about the fruit buns at the stall across the river?","opts":["They were dark and glossy and packed with peel.","They were bigger than the tea-room.","They glowed in the dark.","They were made of butter."],"a":0,"type":"Literal recall"},{"q":"Why was Reed so cautious as he swam along the bank?","opts":["The water was very cold.","He did not want the heron to catch him.","He was carrying a heavy teacake.","He was feeling very sleepy."],"a":1,"type":"Inference"},{"q":"Which option correctly matches each treat to one of its features?","opts":["teacakes – packed with peel; fruit buns – dusted with sugar; shortbread – dripping butter","teacakes – round, toasted, dripping butter; fruit buns – dark, glossy, packed with peel; shortbread – pale, crumbly, dusted with sugar","teacakes – pale and crumbly; fruit buns – dripping butter; shortbr  One snap of that great beak, and that would be the end of him.","Every morning, before he set off, Skip ‘read’ the smells that blew from the bakery door. By now he knew them all: salty sea air, fresh white loaves, and the sweet scent of icing. These were his USUAL morning smells, the very same ones every single day.","But this morning was different. A brand-new smell came blowing along the prom — warm, sugary and rich, like nothing Skip had ever known. His feathers ruffled. His tummy rumbled. Something new and special must be frying, and he simply had to find out what it was.","Skip darted along the top of the railing, past the circling gull, as quick and quiet as he could, for he could not wait to reach the wonderful smell. It grew stronger and stronger the closer he came, until at last he reached the bakery window.","There, in the window, sat a tray of doughnuts, each one a fat sugary ring oozing red jam from the side. They were the most wonderful things Skip had ever seen. (He had once seen iced fingers in the café along the prom — long and soft, each with a stripe of white icing — but even those were not as fine as these.) Beside them coiled the Chelsea buns, spiralled and sticky and packed with currants. He pecked a stray crumb from the sill, and he hopped and chirped with joy.","Just then a child in a sunhat pointed at the tray, and the baker dropped every last doughnut into a paper bag. Skip’s heart sank as he watched the doughnuts disappear down the prom.","But the baker, whistling a tune, shook the sugar from the empty tray — and a shower of warm, sugary crumbs came tumbling down to the prom, right under Skip’s beak. It was, he thought happily, a very good day after all."],"qs":[{"q":"Why is the word USUAL written in capital letters?","opts":["To stress that the smells were the same everyday ones every single day.","To show that Skip was shouting.","To show it is the name of the bakery.","To show the word is hard to spell."],"a":0,"type":"Author's craft"}, mell","story":["At the bottom of a kitchen garden, in a nest in the woodpile, there lived a wren named Twig. Twig had tiny round wings, a little tail that cocked straight up, and a thin pointed beak. All day she darted through the bushes and waited for the garden to grow still.","Twig loved the garden, but there was one thing she did NOT love: the swift grey sparrowhawk that swept over the hedge. The hawk circled above the garden each day with one sharp eye open. That was why Twig was always so careful. One dive of those talons, and that would be the end of her.","Every morning, before she flew out, Twig ‘read’ the smells that drifted from the kitchen. By now she knew them all: frying eggs, baking bread, and the green scent of mint from the herb bed. These were her ORDINARY morning smells, the very same ones every single day.","But this morning was different. A brand-new smell came drifting from the window — warm, rich and fruity, like nothing Twig had ever known. Her feathers ruffled. Her tummy rumbled. Something new and special must be baking, and she simply had to find out what it was.","Twig flitted along the top of the fence, past the circling hawk, as quick and quiet as she could, for she could not wait to reach the wonderful smell. It grew stronger and stronger the closer she came, until at last she reached the kitchen windowsill.","There, on a cooling rack, sat a great fruit cake, dark and glossy and studded all over with cherries and nuts. It was the most wonderful thing Twig had ever seen. (She had once seen a madeira cake on the sill next door — tall and pale and plain, with a single crack down the top — but even that was not as fine as this.) Beside the cake lay a slab of flapjack, golden and chewy and full of oats. She pecked a stray crumb from the ledge, and she hopped and chirped with joy.","Just then the gardener leaned out, lifted the rack, and carried the whole fruit cake inside for tea. Twig’s heart sank as she watched the fruit cake disappear through the window.","But the gardener, humming a tune, knocked the empty rack against the sill — and a shower of warm, fruity crumbs came tumbling down to the bird-table, right under Twig’s beak. It was, she thought happily, a very good day after all."],"qs":[{"q":"Which of these was an UNUSUAL smell for Twig, not one of her everyday smells?","opts":["Frying eggs.","The warm, fruity new smell.","Baking bread.","Garden mint."],"a":1,"type":"Literal recall"},{"q":"Which TWO words from the story tell you that Twig was a bird?","opts":["“eggs” and “mint”","“round wings” and “cocked-up tail”","“garden” and “fence”","“rack” and “window”"],"a":1,"type":"Finding evidence"},{"q":"Why is the word ORDINARY written in capital letters?","opts":["To show it is the name of the garden.","To show that Twig was shouting.","To show the word is hard to spell.","To stress that the smells were the same everyday ones every single day."],"a":3,"type":"Author's craft"},{"q":"Why was Twig always careful around the sparrowhawk?","opts":["The hawk snored too loudly.","The hawk had eaten the bread.","The hawk could swoop down and catch her.","The hawk slept in her nest."],"a":2,"type":"Inference"},{"q":"What did Twig ‘read’ every morning?","opts":["The gardener’s seed packets.","The smells that drifted from the kitchen.","The hawk’s feathers.","A label on the rack."],"a":1,"type":"Literal recall"},{"q":"Why did the new smell get stronger and stronger?","opts":["The hawk knocked over the rack.","The cake was going cold.","Twig was getting closer and closer to the cake.","The gardener opened a window."],"a":2,"type":"Inference"},{"q":"What was impressive about the madeira cake on the sill next door?","opts":["It was tall and pale and plain, with a single crack down the top.","It was bigger than the whole garden.","It glowed in the dark.","It was made of oats."],"a":0,"type":"Literal recall"},{"q":"What did the brand-new smell suggest to Twig?","opts":["That something new and special was baking.","That the hawk was awake.","That it was time to sleep.","That the garden was on fire."],"a":0,"type":"Inference"},{"q":"Which sentence from the story best shows that Twig liked the cake?","opts":["“The hawk circled above the garden each day.”","“All day she darted through the bushes.”","“She hopped and chirped with joy.”","“The gardener leaned out.”"],"a":2,"type":"Finding evidence"},{"q":"Why did Twig want to reach the windowsill as quickly as she could?","opts":["She wanted to wake the hawk.","She was eager to find the wonderful new smell.","She wanted to leave the garden for good.","She was being chased by the gardener."],"a":1,"type":"Inference"},{"q":"Which option correctly matches each treat to one of its features?","opts":["fruit cake – single crack on top; madeira cake – full of oats; flapjack – studded with cherries","fruit cake – dark, glossy, studded with cherries and nuts; madeira cake – tall, pale, plain with a crack; flapjack – golden, chewy, full of oats","fruit cake – full of oats; madeira cake – studded with cherries; flapjack – tall and pale","fruit cake – plain with a crack; madeira cake – chewy; flapjack – dark and glossy"],"a":1,"type":"Compare, contrast & matching"},{"q":"Why was Twig so cautious as she moved along the fence?","opts":["She did not want the hawk to catch her.","The fence was wet and slippery.","She was carrying a heavy cake.","She was feeling very sleepy."],"a":0,"type":"Inference"},{"q":"Which option shows the events of the story in the correct order?","opts":["Twig read the morning smells → a new smell appeared → she flew past the hawk → she saw the cake → fruity crumbs fell","A new smell appeared → Twig read the smells → crumbs fell → she saw the cake → she flew past the hawk","Twig saw the cake → she flew past the hawk → she read the smells → a new smell appeared → crumbs fell","Twig read the smells → crumbs fell → a new smell appeared → she flew past the hawk → she saw the cake"],"a":0,"type":"Sequencing"},{"q":"Which ONE of these statements is TRUE according to the story?","opts":["Twig lived inside the kitchen oven.","The hawk helped Twig find the cake.","Twig followed a new smell all the way to the kitchen windowsill.","Twig did not like cake at all."],"a":2,"type":"Literal recall"},{"q":"What was disappointing to Twig about the gardener?","opts":["He stepped on her tail.","He woke the hawk.","He dropped the cooling rack.","He carried the whole fruit cake inside."],"a":3,"type":"Literal recall"}]},{"title":"Acorn and the New Smell","story":["In a tall plane tree beside the park kiosk, in a drey of twigs and leaves, there lived a squirrel named Acorn. Acorn had a thick bushy tail, sharp curved claws, and bright dark eyes that missed nothing. All day he watched the kiosk below and waited for his chance.","Acorn loved the park, but there was one thing he did NOT love: the big shaggy dog that bounded along the path. The dog raced past the kiosk each day with one eye open. That was why Acorn was always so careful. One snap of those jaws, and that would be the end of him.","Every morning, before he climbed down, Acorn ‘read’ the smells that rose from the kiosk. By now he knew them all: hot coffee, buttery popcorn, and the smoky scent of toasting bread. These were his SAME morning smells, the very same ones every single day.","But this morning was different. A brand-new smell came curling up through the leaves — warm, spicy and sweet, like nothing Acorn had ever known. His nose twitched. His tummy rumbled. Something new and special must be baking, and he simply had to find out what it was.","Acorn scurried down the trunk and along the kiosk roof, past the bounding dog, as quick and quiet as he could, for he could not wait to reach the wonderful smell. It grew stronger and stronger the closer he came, until at last he reached the kiosk counter.","There, in a warm basket, sat a batch of cinnamon pretzels, each one twisted into a knot and rolled in sugar and spice. They were the most wonderful things Acorn had ever seen. (He had once seen giant cookies at the stand across the park — wide and flat and dotted with chocolate chips — but even those were not as fine as these.) Beside the basket stood iced gingerbread, cut into the shape of stars. He nibbled a stray crumb from the counter, and his whiskers trembled with joy.","Just then a group of children crowded round, and the seller handed over every last pretzel in paper napkins. Acorn’s heart sank as he watched the pretzels disappear across the grass.","But the seller, whistling a tune, tipped out the empty basket — and a shower of warm, spicy crumbs came tumbling down to the bench, right under Acorn’s nose. It was, he thought happily, a very good day after all."],"qs":[{"q":"Which TWO words from the story tell you that Acorn was a squirrel?","opts":["“coffee” and “popcorn”","“bushy tail” and “curved claws”","“park” and “kiosk”","“basket” and “counter”"],"a":1,"type":"Finding evidence"},{"q":"Why is the word SAME written in capital letters?","opts":["To show it is the name of the park.","To show that Acorn was shouting.","To show the word is hard to spell.","To stress that the smells were the same everyday ones every single day."],"a":3,"type":"Author's craft"},{"q":"What did Acorn ‘read’ every morning?","opts":["The kiosk price list.","The dog’s collar.","The smells that rose from the kiosk.","A map of the park."],"a":2,"type":"Literal recall"},{"q":"Which of these was an UNUSUAL smell for Acorn, not one of his everyday smells?","opts":["Hot coffee.","Buttery popcorn.","Toasting bread.","The warm, spicy new smell."],"a":3,"type":"Literal recall"},{"q":"Why was Acorn always careful around the big shaggy dog?","opts":["The dog snored too loudly.","The dog had eaten the popcorn.","The dog could catch him and eat him.","The dog slept in his tree."],"a":2,"type":"Inference"},{"q":"What did the brand-new smell suggest to Acorn?","opts":["That something new and special was baking.","That the dog was awake.","Th .","They took every last pretzel.","They knocked over the basket."],"a":2,"type":"Literal recall"},{"q":"Which ONE of these statements is TRUE according to the story?","opts":["Acorn lived inside the warm basket.","The dog helped Acorn find the pretzels.","Acorn followed a new smell all the way to the kiosk counter.","Acorn did not like pretzels at all."],"a":2,"type":"Literal recall"},{"q":"Which option shows the events of the story in the correct order?","opts":["A new smell appeared → Acorn read the smells → crumbs fell → he saw the pretzels → he crept past the dog","Acorn saw the pretzels → he crept past the dog → he read the smells → a new smell appeared → crumbs fell","Acorn read the morning smells → a new smell appeared → he crept past the dog → he saw the pretzels → spicy crumbs fell","Acorn read the smells → crumbs fell → a new smell appeared → he crept past the dog → he saw the pretzels"],"a":2,"type":"Sequencing"}]},{"title":"Pim and the New Smell","story":["At a little country railway station, in a hole behind the ticket office, there lived a mouse named Pim. Pim had long fine whiskers, a thin pink tail, and bright round eyes that shone in the lamplight. All day she watched the platform and waited for the trains to pass.","Pim loved the station, but there was one thing she did NOT love: the station-master’s tabby cat. The cat lay on the warm bench all day with one eye open. That was why Pim was always so careful. One swipe of those paws, and that would be the end of her.","Every morning, before she set off, Pim ‘read’ the smells that drifted from the tea stall. By now she knew them all: stewed tea, warm pasties, and the sharp scent of brown sauce. These were her USUAL morning smells, the very same ones every single day.","But this morning was different. A brand-new smell came drifting along the platform — warm, peppery and savoury, like nothing Pim had ever known. Her nose twitched. Her tummy rumbled. Something new and special must be baking, and she simply had to find out what it was.","Pim scampered along the edge of the platform, past the dozing cat, as quick and quiet as she could, for she could not wait to reach the wonderful smell. It grew stronger and stronger the closer she came, until at last she reached the tea stall counter.","There, on a paper doily, sat a row of sausage rolls, each one golden and flaky and flecked with cracked black pepper. They were the most wonderful things Pim had ever seen. (She had once seen currant scones on the trolley along the platform — round and fruited and brushed with milk — but even those were not as fine as these.) Beside the doily sat jam doughnuts, round and sugared and glistening. She nibbled a stray crumb from the counter, and her whiskers trembled with joy.","Just then a traveller with a suitcase pointed at the doily, and the stall lady wrapped every last sausage roll before the train. Pim’s heart sank as she watched the sausage rolls disappear onto the train.","But the stall lady, humming a tune, shook out the empty doily — and a shower of warm, flaky crumbs came tumbling down to the platform, right under Pim’s nose. It was, she thought happily, a very good day after all."],"qs":[{"q":"What did Pim ‘read’ every morning?","opts":["The train timetable.","The smells that drifted from the tea stall.","The cat’s collar.","A poster on the platform."],"a":1,"type":"Literal recall"},{"q":"Which of these was an UNUSUAL smell for Pim, not one of her everyday smells?","opts":["Stewed tea.","Warm pasties.","The warm, peppery new smell.","Brown sauce."],"a":2,"type":"Literal recall"},{"q":"Which TWO words from the story tell you that Pim was a mouse?","opts":["“tea” and “pasties”","“long whiskers” and “pink tail”","“station” and “platform”","“doily” and “counter”"],"a":1,"type":"Finding evidence"},{"q":"Why is the word USUAL written in capital letters?","opts":["To stress that the smells were the same everyday ones every single day.","To show that Pim was shouting.","To show it is the name of the station.","To show the word is hard to spell."],"a":0,"type":"Author's craft"},{"q":"Why was Pim always careful around the tabby cat?","opts":["The cat snored too loudly.","The cat had eaten the pasties.","The cat could swipe at her and catch her.","The cat slept in her hole."],"a":2,"type":"Inference"},{"q":"Why did the new smell get stronger and stronger?","opts":["The cat knocked over the doily.","Pim was getting closer and closer to the sausage rolls.","The sausage rolls were going cold.","The stall lady opened a window."],"a":1,"type":"Inference"},{"q":"What did the brand-new smell suggest to Pim?","opts":["That the cat was awake.","That something new and special was baking.","That it was time to sleep.","That the station was closing."],"a":1,"type":"Inference"},{"q":"What was impressive about the currant scones on the trolley along the platform?","opts":["They were round and fruited and brushed with milk.","They were bigger than the station.","They glowed in the dark.","They were made of pepper."],"a":0,"type":"Literal recall"},{"q":"Which sentence from the story best shows that Pim liked the sausage rolls?","opts":["“The cat lay on the warm bench all day.”","“All day she watched the platform.”","“Her whiskers trembled with joy.”","“A traveller with a suitcase pointed at the doily.”"],"a":2,"type":"Finding evidence"},{"q":"Why was Pim so cautious as she moved along the platform?","opts":["The platform was wet and slippery.","She did not want the cat to catch her.","She was carrying a heavy sausage roll.","She was feeling very sleepy."],"a":1,"type":"Inference"},{"q":"Which option correctly matches each treat to one of its features?","opts":["sausage rolls – brushed with milk; currant scones – sugared; jam doughnuts – cracked pepper","sausage rolls – golden, flaky, cracked black pepper; currant scones – round, fruited, brushed with milk; jam doughnuts – round, sugared, glistening","sausage rolls – round and sugared; currant scones – cracked pepper; jam doughnuts – brushed with milk","sausage rolls – fruited; currant scones – glistening; jam doughnuts – flaky"],"a":1,"type":"Compare, contrast & matching"},{"q":"Why did Pim want to reach the tea stall as quickly as she could?","opts":["She wanted to wake the cat.","She was eager to find the wonderful new smell.","She wanted to leave the station for good.","She was being chased by the traveller."],"a":1,"type":"Inference"},{"q":"Which ONE of these statements is TRUE according to the story?","opts":["Pim lived inside the warm oven.","The cat helped Pim find the sausage rolls.","Pim followed a new smell all the way to the tea stall counter.","Pim did not like sausage rolls at all."],"a":2,"type":"Literal recall"},{"q":"What was disappointing to Pim about the traveller with the suitcase?","opts":["He stepped on her tail.","He woke the cat.","He had every last sausage roll wrapped up.","He dropped the doily."],"a":2,"type":"Literal recall"},{"q":"Which option shows the events of the story in the correct order?","opts":["A new smell appeared → Pim read the smells → crumbs fell → she saw the sausage rolls → she crept past the cat","Pim read the morning smells → a new smell appeared → she crept past the cat → she saw the sausage rolls → flaky crumbs fell","Pim saw the sausage rolls → she crept past the cat → she read the smells → a new smell appeared → crumbs fell","Pim read the smells → crumbs fell → a new smell appeared → she crept past the cat → she saw the sausage rolls"],"a":1,"type":"Sequencing"}]}],"Year 4":[{"title":"How Bryn Bound the River","story":["Long ago, in a valley village called Cwmbrook, there lived a boy named Bryn. A great river ran through Cwmbrook, and in the wet season it rose in a fury. The people of Cwmbrook had learned to live with its temper: they built their houses high on stilts of oak, and they kept a little boat tied by every door, ready to push off the moment the water climbed the step. To trust the river was to lose everything you owned.","One spring the river did something far worse. On the night before the market, it burst its banks and swept away the only bridge, along with the whole winter store of grain that waited on the far bank. Without the grain there would be nothing to plant and nothing to eat, and the village would starve.","“Someone must bind the river,” said Bryn, “and teach it to keep to its bed.” Everyone laughed. You might as well tie a knot in the rain, they said. But Bryn set out all the same, climbing to the high gorge where the river ran narrowest and fiercest — so far above the rooftops that the houses below looked as small as pebbles.","First he twisted a rope of green bulrushes and cast it across the flood. The river only roared, and the rush-rope snapped like cotton. Next he plaited a rope of trailing ivy. But the river was slippery as an eel, and it slid free and was gone, leaving the ivy loose and dripping. Bryn’s hopes sank like a stone.","He climbed home and sat by his grandfather’s fire, close to tears. His grandfather said nothing, but he lifted down from the beam a long cable he had plaited himself, season after season, from the toughest blackthorn roots in the valley. “This rope has moored the ferry through forty floods,” he said. “It will hold a deal more than a river.”","Bryn carried the blackthorn cable up to the gorge. He tied a great loop and stretched it across the narrow throat of the gorge where the river rushed through hardest, so that the river would be caught fast as it came surging through. And when the river came surging, the loop drew tight and held it.","How the river fought! It heaved against the rope like a great hooked fish, churning and boiling. Its voice was a rolling drum; its breath was a cold grey mist. “Let me go! Let me go!” it begged.","“Not until you promise,” said Bryn. “You must keep to your bed from this day on, and never again steal what is not yours.” The river, who had never been bound before, had no choice but to agree. Bryn loosened the great loop, and the river rushed free. From that day the river through Cwmbrook ran deep and steady, turning the mill-wheel and watering the fields, but never again climbing a single doorstep."],"qs":[{"q":"Which TWO phrases best show that the people of Cwmbrook were always ready for the river to rise?","opts":["“built their houses high on stilts” and “kept a little boat tied by every door”","“climbing to the high gorge” and “close to tears”","“snapped like cotton” and “slippery as an eel”","“turning the mill-wheel” and “watering the fields”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Bryn’s hopes sank like a stone” tell you?","opts":["A stone fell into the river.","Bryn suddenly lost all of his hope.","Bryn dropped his rope in the water.","Bryn felt heavy after his climb."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a rolling drum; its breath was a cold grey mist,” which TWO things is the river compared to?","opts":["A fish and an eel","A bridge and a boat","A drum and mist","A stone and a stilt"],"a":2,"type":"Figurative language"},{"q":"Why did Bryn tie a great loop in the blackthorn cable?","opts":["To moor his grandfather’s ferry.","To trap the river as it surged through the narrow gorge.","To help him climb safely down.","To carry the grain back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the gorge was a long way above Bryn’s home?","opts":["“the narrow throat of the gorge”","“the houses below looked as small as pebbles”","“close to his grandfather’s fire”","“on the night before the market”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each rope to what happened when Bryn used it?","opts":["bulrush rope – held the river fast; ivy rope – snapped; blackthorn cable – the river slid free","bulrush rope – the river slid free; ivy rope – held fast; blackthorn cable – snapped","bulrush rope – snapped like cotton; ivy rope – the river slid free; blackthorn cable – held the river fast","bulrush rope – held fast; ivy rope – held fast; blackthorn cable – snapped"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the river “heaved against the rope like a great hooked fish.” What does this comparison tell you?","opts":["The river had become calm and gentle.","The river was struggling desperately to escape.","The river had turned into a real fish.","The river was full of fish."],"a":1,"type":"Figurative language"},{"q":"What did the river have to agree to do before Bryn would set it free?","opts":["To carry Bryn back to the village.","To keep to its bed and stop stealing.","To find all the lost grain.","To turn the mill-wheel once a year."],"a":1,"type":"Literal recall"},{"q":"When the river cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the RIVER, but NOT of Bryn?","opts":["Climbed up to the high gorge.","Plaited a rope of ivy.","Had never been bound before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the river was caught?","opts":["The river promised to keep to its bed.","Bryn stretched the great loop across the throat of the gorge.","The river ran deep and steady through the village.","Bryn loosened the great loop."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “He wound the cable twice around a jut of rock so the flood could not tear it from his hands.”","opts":["At the very start, before the river stole the grain.","Just after Bryn made the rope of bulrushes.","When Bryn stretched the blackthorn loop and waited for the river.","Right at the end, after the river had rushed free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the deep valleys of long ago."},{"title":"How Mira Snared the Tide","story":["Long ago, in a fishing village called Saltcombe, there lived a girl named Mira. The sea at Saltcombe was greedy, and at the spring tides it came surging far up the shore. The people of Saltcombe had learned to guard against it: they hauled their boats high up the beach each night, and they kept one eye always on the water, ready to run the moment it crept too far. To turn your back on that sea was to lose your boat to it.","One autumn the sea did something far worse. On the night of the great spring tide, it came roaring up the strand and dragged away every boat in the village, along with the whole season’s catch drying on the racks. Without the boats and the fish, the people of Saltcombe would have nothing to sell and nothing to eat.","“Someone must snare the tide,” said Mira, “and teach it where to stop.” Everyone laughed. You might as well catch the moon in a creel, they said. But Mira set out all the same, climbing to the high headland where the tide raced through a rocky channel — so far above the bay that the cottages below looked as small as limpets.","First she knotted a net of dry seaweed and flung it into the channel. The sea only boomed, and the seaweed net crumbled to flakes. Next she wove a net of fine spider-silk. But the sea was slippery as a seal, and it slid clean through and was gone, leaving the silk torn and trailing. Mira’s hopes drained away like the ebbing tide.","She climbed home and sat by her grandmother’s fire, close to tears. Her grandmother said nothing, but she took down from the rafter a great net she had knotted herself, winter after winter, from the toughest horsehair on the coast. “This net has hauled the herring through forty seasons,” she said. “It will hold a deal more than the sea.”","Mira carried the horsehair net down to the channel. She spread it wide across the narrow gap in the rocks where the tide rushed through hardest, so that the tide would be caught fast as it came pouring through. And when the tide came pouring, the net drew tight and held it.","How the sea heaved! It fought in the net like a wild horse fighting its halter, surging and rearing. Its voice was a booming gong; its breath was a winter gale. “Let me go! Let me go!” it begged.","“Not until you promise,” said Mira. “You must rise gently up the shore from this day on, and never again drag away what is not yours.” The sea, who had never been snared before, had no choice but to agree. Mira loosened the heavy net, and the sea slid free. From that day the tide at Saltcombe rose and fell gently, lifting the boats and washing the shore, but never again carrying off a single net."],"qs":[{"q":"Which TWO phrases best show that the people of Saltcombe were always on their guard against the sea?","opts":["“hauled their boats high up the beach each night” and “kept one eye always on the water”","“climbing to the high headland” and “close to tears”","“crumbled to flakes” and “slippery as a seal”","“lifting the boats” and “washing the shore”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Mira’s hopes drained away like the ebbing tide” tell you?","opts":["The tide was going out.","Mira suddenly lost all of her hope.","Mira waded into the sea.","The water was very cold."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a booming gong; its breath was a winter gale,” which TWO things is the sea compared to?","opts":["A horse and a halter","A gong and a gale","A seal and a creel","A boat and a net"],"a":1,"type":"Figurative language"},{"q":"Why did Mira spread the horsehair net across the gap in the rocks?","opts":["To haul in her grandmother’s herring.","To trap the tide as it poured through the channel.","To help her climb safely down.","To carry the catch back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the headland was a long way above Mira’s home?","opts":["“the narrow gap in the rocks”","“the cottages below looked as small as limpets”","“close to her grandmother’s fire”","“on the night of the great spring tide”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Mira used it?","opts":["seaweed net – held the tide fast; spider-silk net – crumbled; horsehair net – the sea slid through","seaweed net – the sea slid through; spider-silk net – held fast; horsehair net – crumbled","seaweed net – crumbled to flakes; spider-silk net – the sea slid through; horsehair net – held the tide fast","seaweed net – held fast; spider-silk net – held fast; horsehair net – crumbled"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the sea “fought in the net like a wild horse fighting its halter.” What does this comparison tell you?","opts":["The sea had become calm and gentle.","The sea was struggling desperately to escape.","The sea had turned into a real horse.","The sea was carrying a horse."],"a":1,"type":"Figurative language"},{"q":"What did the sea have to agree to do before Mira would set it free?","opts":["To carry Mira back to the village.","To rise gently up the shore and stop dragging things away.","To bring back all the lost fish.","To lift the boats once a year."],"a":1,"type":"Literal recall"},{"q":"When the sea cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the SEA, but NOT of Mira?","opts":["Climbed up to the high headland.","Wove a net of spider-silk.","Had never been snared before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the tide was caught?","opts":["The sea promised to rise gently.","Mira spread the horsehair net across the gap in the rocks.","The tide rose and fell gently at Saltcombe.","Mira loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “She dug her heels into the wet sand and braced the net against the rocks.”","opts":["At the very start, before the sea dragged away the boats.","Just after Mira made the net of seaweed.","When Mira spread the horsehair net and waited for the tide.","Right at the end, after the sea had slid free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the rocky coast of long ago."},{"title":"How Nessa Caught the Snow","story":["Long ago, in a mountain village called Hollowfell, there lived a girl named Nessa. The Snow at Hollowfell was wild, and each winter it came howling down off the peaks. The people of Hollowfell had learned to make ready for it: they stacked the firewood to the rafters, and they dug their doorways clear each morning, ready to be shut in for days at a time. To be caught out in that Snow was never to be seen again.","One midwinter the Snow did something far worse. In a single night it buried the whole village to the chimney-tops and smothered the fold where the winter sheep were kept. Without the sheep there would be no wool and no meat, and the people of Hollowfell would not last till spring.","“Someone must catch the Snow,” said Nessa, “and teach it to fall softly.” Everyone laughed. You might as well bottle the stars, they said. But Nessa set out all the same, climbing to the high pass where the Snow swept down thickest — so far above the village that its lights below looked as small as sparks.","First she knotted a net of dry bracken and held it open in the gale. The Snow only laughed, and the bracken net fell to pieces. Next she wove a net of cobweb. But the Snow was slippery as frost, and it slipped clean through and was gone, leaving the cobweb torn and empty. Nessa’s hopes melted like snow in the sun.","She climbed home and sat by her grandmother’s fire, close to tears. Her grandmother said nothing, but she took down from the wall a great net she had knotted herself, winter after winter, from the toughest mountain wool. “This net has held the lambs through forty winters,” she said. “It will hold a deal more than the Snow.”","Nessa carried the woollen net up to the pass. She spread it wide across the narrow saddle of rock where the Snow rushed through thickest, so that the Snow would be caught fast as it came whirling through. And when the Snow came whirling, the net drew tight and held it.","How the Snow struggled! It beat against the net like a trapped bird beating its wings, swirling and spinning. Its voice was a wailing ghost; its breath was a frozen river. “Let me go! Let me go!” it begged.","“Not until you promise,” said Nessa. “You must fall softly on Hollowfell from this day on, and never again bury what is not yours to bury.” The Snow, who had never been caught before, had no choice but to agree. Nessa loosened the heavy net, and the Snow whirled free. From that day the Snow at Hollowfell fell soft and white, capping the roofs and blanketing the fields, but never again sealing a single door."],"qs":[{"q":"Which TWO phrases best show that the people of Hollowfell made ready for the Snow each winter?","opts":["“stacked the firewood to the rafters” and “dug their doorways clear each morning”","“climbing to the high pass” and “close to tears”","“fell to pieces” and “slippery as frost”","“capping the roofs” and “blanketing the fields”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Nessa’s hopes melted like snow in the sun” tell you?","opts":["The weather was growing warmer.","Nessa suddenly lost all of her hope.","The snow began to thaw on the pass.","Nessa was no longer cold."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a wailing ghost; its breath was a frozen river,” which TWO things is the Snow compared to?","opts":["A bird and its wings","A ghost and a river","A star and a bottle","A lamb and a fold"],"a":1,"type":"Figurative language"},{"q":"Why did Nessa spread the woollen net across the saddle of rock?","opts":["To hold in her grandmother’s lambs.","To trap the Snow as it whirled through the pass.","To help her climb safely down.","To carry the sheep back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the pass was a long way above Nessa’s home?","opts":["“the narrow saddle of rock”","“its lights below looked as small as sparks”","“close to her grandmother’s fire”","“in a single night”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Nessa used it?","opts":["bracken net – held the Snow fast; cobweb net – fell to pieces; woollen net – the Snow slipped through","bracken net – the Snow slipped through; cobweb net – held fast; woollen net – fell to pieces","bracken net – fell to pieces; cobweb net – the Snow slipped through; woollen net – held the Snow fast","bracken net – held fast; cobweb net – held fast; woollen net – fell to pieces"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Snow “beat against the net like a trapped bird beating its wings.” What does this comparison tell you?","opts":["The Snow had become calm and gentle.","The Snow was struggling desperately to escape.","The Snow had turned into a real bird.","The Snow was full of birds."],"a":1,"type":"Figurative language"},{"q":"What did the Snow have to agree to do before Nessa would set it free?","opts":["To carry Nessa back to the village.","To fall softly and stop burying things.","To bring back the lost sheep.","To cap the roofs once a year."],"a":1,"type":"Literal recall"},{"q":"When the Snow cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the SNOW, but NOT of Nessa?","opts":["Climbed up to the high pass.","Wove a net of cobweb.","Had never been caught before.","Sat by the fire, close to tears."],"a":2,"type":"Compare, contrast & matching"},{"q":"Which of these events happened BEFORE the Snow was caught?","opts":["The Snow promised to fall softly.","Nessa spread the woollen net across the saddle of rock.","The Snow fell soft and white over Hollowfell.","Nessa loosened the heavy net."],"a":1,"type":"Sequencing"},{"q":"Where in the story would this sentence best fit?  “She crouched low behind a cairn of stones and waited, the net ready in her hands.”","opts":["At the very start, before the Snow buried the village.","Just after Nessa made the net of bracken.","When Nessa spread the woollen net and waited for the Snow.","Right at the end, after the Snow had whirled free."],"a":2,"type":"Text structure"}],"subtitle":"A tale from the frozen north of long ago."},{"title":"How Owen Bottled the Mist","story":["Long ago, in a marsh village called Greymere, there lived a boy named Owen. A thick Mist haunted Greymere, and on many mornings it rolled in off the fen. The people of Greymere had learned to find their way in it: they called out to one another so as not to be lost, and they kept a lantern burning at every gate, ready to guide a wanderer home. To stray from the path in that Mist was to vanish for good.","One autumn the Mist did something far worse. It rolled in thick as wool and stole away the whole flock of geese, the herder with them, leaving not so much as a feather behind. Without the flock the village had nothing to trade at the fair, and without the herder a family was left grieving.","“Someone must bottle the Mist,” said Owen, “and teach it to keep its place.” Everyone laughed. You might as well weigh a shadow, they said. But Owen set out all the same, climbing to the high dyke where the Mist gathered thickest — so far above the fen that the gate-lanterns below looked as faint as fireflies.","First he wove a net of dry rushes and held it wide. The Mist only sighed, and the rush-net rotted away in his hands. Next he wove a net of cobweb. But the Mist was slippery as smoke, and it seeped clean through and was gone, leaving the cobweb damp and empty. Owen’s hopes faded like mist in the morning.","He climbed home and sat by his grandmother’s fire, close to tears. His grandmother said nothing, but she took down from the hook a great net she had knotted herself, year after year, from the toughest flax of the fen. “This net has dried the eels through forty seasons,” she said. “It will hold a deal more than the Mist.”","Owen carried the flax net up to the dyke. He spread it wide across the narrow cut where the Mist poured through thickest, so that the Mist would be caught fast as it came rolling through. And when the Mist came rolling, the net drew tight and held it.","How the Mist twisted! It writhed in the net like a moth caught in a web, curling and coiling. Its voice was a muffled bell; its breath was a cold grave. “Let me go! Let me go!” it begged.","“Not until you promise,” said Owen. “You must come thin and gentle over Greymere from this day on, and never again steal what is not yours.” The Mist, who had never been held before, had no choice but to agree. Owen loosened the heavy net, and the Mist drifted free. From that day the Mist at Greymere came soft and low, softening the dawn and pearling the grass, but never again swallowing the path."],"qs":[{"q":"Which TWO phrases best show that the people of Greymere tried not to get lost in the Mist?","opts":["“called out to one another so as not to be lost” and “kept a lantern burning at every gate”","“climbing to the high dyke” and “close to tears”","“rotted away in his hands” and “slippery as smoke”","“softening the dawn” and “pearling the grass”"],"a":0,"type":"Finding evidence"},{"q":"What does the phrase “Owen’s hopes faded like mist in the morning” tell you?","opts":["The mist was beginning to clear.","Owen suddenly lost all of his hope.","The morning had grown bright.","Owen could not see the path."],"a":1,"type":"Figurative language"},{"q":"In the sentence “Its voice was a muffled bell; its breath was a cold grave,” which TWO things is the Mist compared to?","opts":["A moth and a web","A bell and a grave","A shadow and smoke","A goose and a feather"],"a":1,"type":"Figurative language"},{"q":"Why did Owen spread the flax net across the cut in the dyke?","opts":["To dry his grandmother’s eels.","To trap the Mist as it rolled through the dyke.","To help him climb safely down.","To carry the flock back home."],"a":1,"type":"Inference"},{"q":"Which phrase shows that the dyke was a long way above Owen’s home?","opts":["“the narrow cut”","“the gate-lanterns below looked as faint as fireflies”","“close to his grandmother’s fire”","“on many mornings”"],"a":1,"type":"Finding evidence"},{"q":"Which option correctly matches each net to what happened when Owen used it?","opts":["rush net – held the Mist fast; cobweb net – rotted away; flax net – the Mist seeped through","rush net – the Mist seeped through; cobweb net – held fast; flax net – rotted away","rush net – rotted away; cobweb net – the Mist seeped through; flax net – held the Mist fast","rush net – held fast; cobweb net – held fast; flax net – rotted away"],"a":2,"type":"Compare, contrast & matching"},{"q":"The writer says the Mist “writhed in the net like a moth caught in a web.” What does this comparison tell you?","opts":["The Mist had become calm and gentle.","The Mist was struggling desperately to escape.","The Mist had turned into a real moth.","The Mist was full of moths."],"a":1,"type":"Figurative language"},{"q":"What did the Mist have to agree to do before Owen would set it free?","opts":["To carry Owen back to the village.","To come thin and gentle and stop stealing.","To bring back the lost flock.","To pearl the grass once a year."],"a":1,"type":"Literal recall"},{"q":"When the Mist cried “Let me go! Let me go!”, how was it most likely feeling?","opts":["Proud and powerful","Trapped and desperate","Calm and sleepy","Cheerful and playful"],"a":1,"type":"Inference"},{"q":"Which of these is true of the MIST, but NOT of Owen?","opts":["Climbed up to the high dyke.","Wove a n
