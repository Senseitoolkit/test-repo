<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sensei Toolkit – Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #333;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.4rem;
      margin-bottom: 10px;
      color: #0078FF;
    }

    p.intro {
      text-align: center;
      max-width: 600px;
      margin: 0 auto 40px auto;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .tool-list {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .tool-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .tool-card h3 {
      margin-top: 0;
      color: #222;
    }

    .tool-card p {
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .tool-card a {
      display: inline-block;
      padding: 8px 14px;
      background: #0078FF;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      color: #777;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <h1>Sensei Toolkit</h1>
  <p class="intro">
    A growing collection of simple, practical tools for international school classrooms.
    New tools will appear here as they are added.
  </p>

  <div class="tool-list">

    <!-- TOOL EXAMPLE — duplicate this block for each new tool -->
    <div class="tool-card">
      <h3>Lost & Found Form</h3>
      <p>A student-facing form to track items left on the floor and build responsibility.</p>
      <a href="#">Open Tool</a>
    </div>

    <!-- Add more tool-card blocks here as you create new tools -->

  </div>

  <footer>
    © 2026 Sensei Toolkit
  </footer>

</body>
</html>
