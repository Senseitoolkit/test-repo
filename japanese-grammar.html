<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文法 — Japanese Grammar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo-deep:#13213b; --indigo:#21385c; --indigo-soft:#3a557f;
    --washi:#f5efe1; --washi-dim:#e7ddc6; --washi-line:#d8cdb2;
    --ink:#222530; --ink-soft:#5a5d68;
    --shu:#c43d28; --shu-soft:#d9694f; --gold:#b6893e;
    --good:#2e7d52; --bad:#b23a2e;
    --radius:18px; --shadow:0 18px 40px -22px rgba(8,16,32,.85);
    --ff-jp:'Shippori Mincho',serif;
    --ff-ui:'Zen Kaku Gothic New',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--ff-ui);color:var(--ink);
    background:radial-gradient(circle at 18% -10%, #2a456e 0%, transparent 45%),
      radial-gradient(circle at 100% 100%, #1b2f50 0%, transparent 50%),
      linear-gradient(160deg,#14233f 0%,#101c33 100%);
    background-attachment:fixed;min-height:100vh;padding:clamp(14px,3vw,34px);-webkit-font-smoothing:antialiased;}
  .grain{position:fixed;inset:0;pointer-events:none;opacity:.05;z-index:0;
    background-image:radial-gradient(rgba(255,255,255,.9) .8px,transparent .8px);background-size:7px 7px;}
  .wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;}

  header{display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .seal{flex:0 0 auto;width:58px;height:58px;border-radius:14px;border:2.5px solid var(--shu);color:var(--washi);
    font-family:var(--ff-jp);font-weight:800;font-size:30px;display:grid;place-items:center;
    background:linear-gradient(160deg,#c43d28,#a52e1d);box-shadow:0 8px 18px -8px rgba(196,61,40,.7);}
  .brand h1{font-family:var(--ff-jp);font-weight:800;color:var(--washi);font-size:clamp(26px,5vw,34px);line-height:1;letter-spacing:2px}
  .brand p{color:#a9bbd6;font-size:13px;margin-top:6px;letter-spacing:.3px}
  .hublink{margin-left:auto;color:#a9bbd6;text-decoration:none;font-size:13px;font-weight:600;
    border:1px solid rgba(255,255,255,.18);padding:8px 14px;border-radius:10px;transition:.15s}
  .hublink:hover{background:rgba(255,255,255,.08);color:var(--washi)}

  .tabs{display:flex;gap:6px;background:rgba(255,255,255,.06);padding:6px;border-radius:14px;margin-bottom:16px;backdrop-filter:blur(4px)}
  .tab{flex:1;border:0;cursor:pointer;padding:12px 8px;border-radius:9px;font-family:var(--ff-ui);font-weight:700;font-size:15px;
    color:#aebbd2;background:transparent;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px}
  .tab .jp{font-family:var(--ff-jp);font-size:13px;opacity:.75}
  .tab[aria-selected="true"]{background:var(--washi);color:var(--indigo-deep);box-shadow:0 6px 14px -8px rgba(0,0,0,.6)}

  .controls{background:var(--washi);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--washi-dim)}
  .ctl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .ctl-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);flex:0 0 100%;margin-bottom:-2px}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{border:1.5px solid var(--washi-line);background:transparent;cursor:pointer;padding:7px 12px;border-radius:999px;
    font-family:var(--ff-ui);font-size:13px;font-weight:600;color:var(--ink-soft);transition:.15s}
  .chip:hover{border-color:var(--indigo-soft)}
  .chip[aria-pressed="true"]{background:var(--indigo);color:var(--washi);border-color:var(--indigo)}
  .switch{display:flex;align-items:center;gap:10px;cursor:pointer;margin-left:auto;font-size:13px;font-weight:600;color:var(--ink-soft)}
  .track{width:46px;height:26px;border-radius:999px;background:var(--washi-dim);position:relative;transition:.18s;flex:0 0 auto}
  .track::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .switch[aria-pressed="true"] .track{background:var(--shu)}
  .switch[aria-pressed="true"] .track::after{transform:translateX(20px)}

  .no-furi rt{visibility:hidden}
  rt{font-family:var(--ff-ui);font-weight:500;color:var(--shu-soft);font-size:.5em;transition:opacity .2s}
  .jpx{font-family:var(--ff-jp);line-height:2}

  .card{background:var(--washi);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--washi-dim);
    padding:26px 24px;position:relative;margin-bottom:14px}
  .card::before{content:"";position:absolute;inset:9px;border-radius:11px;border:1px solid var(--washi-line);pointer-events:none}
  .lvl-pill{position:absolute;top:14px;right:16px;font-size:11px;font-weight:800;color:var(--washi);background:var(--indigo-soft);padding:4px 11px;border-radius:999px}
  .g-form{font-family:var(--ff-jp);font-weight:800;font-size:clamp(30px,7vw,48px);color:var(--ink);line-height:1.1;position:relative;z-index:1;max-width:88%}
  .g-mean{font-size:clamp(16px,4vw,20px);font-weight:700;color:var(--shu);margin-top:6px;position:relative;z-index:1}
  .g-note{font-size:15px;line-height:1.65;color:#43464f;margin-top:14px;position:relative;z-index:1}
  .ex-wrap{margin-top:18px;position:relative;z-index:1}
  .ex-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
  .ex{background:#fffdf7;border:1px solid var(--washi-line);border-left:4px solid var(--gold);border-radius:11px;padding:13px 15px;margin-bottom:10px}
  .ex .jpx{font-size:21px;font-weight:500;color:var(--ink)}
  .ex .ex-en{font-size:14px;color:var(--ink-soft);margin-top:6px;font-style:italic}
  mark.hl{background:rgba(214,61,40,.16);color:var(--shu);font-weight:700;border-radius:4px;padding:0 2px}

  .nav{display:flex;align-items:center;gap:10px}
  .nav button{flex:1;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:var(--washi);cursor:pointer;
    padding:13px;border-radius:12px;font-family:var(--ff-ui);font-weight:700;font-size:14px;transition:.15s;backdrop-filter:blur(4px)}
  .nav button:hover{background:rgba(255,255,255,.14)}
  .nav .counter{flex:0 0 auto;color:#c4d2e8;font-size:14px;font-weight:700;min-width:80px;text-align:center;font-variant-numeric:tabular-nums}

  .score-bar{display:flex;gap:10px;margin-bottom:16px}
  .stat{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:11px 8px;text-align:center;backdrop-filter:blur(4px)}
  .stat b{display:block;font-size:23px;color:var(--washi);font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1}
  .stat span{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#9fb1cd}
  .reset{border:1px solid rgba(255,255,255,.18);background:transparent;color:#bcccdf;cursor:pointer;border-radius:13px;padding:0 16px;font-size:13px;font-weight:600}
  .reset:hover{background:rgba(255,255,255,.08)}
  .quiz-card{background:var(--washi);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--washi-dim);padding:26px 22px;position:relative;overflow:hidden}
  .q-prompt{text-align:center;padding:6px 4px 18px;margin-bottom:18px;border-bottom:1px dashed var(--washi-line)}
  .q-tag{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:12px}
  .q-sent{font-family:var(--ff-jp);font-size:clamp(20px,5vw,27px);line-height:1.9;font-weight:500}
  .q-en{font-size:14px;color:var(--ink-soft);margin-top:10px;font-style:italic}
  .blank{display:inline-block;min-width:54px;border-bottom:3px solid var(--shu);margin:0 4px;text-align:center;color:transparent}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:520px){.choices{grid-template-columns:1fr}}
  .choice{border:1.5px solid var(--washi-line);background:#fffdf7;cursor:pointer;text-align:center;padding:15px;border-radius:12px;
    font-family:var(--ff-jp);font-size:21px;font-weight:700;color:var(--ink);transition:.13s}
  .choice:hover:not(:disabled){border-color:var(--indigo-soft);transform:translateY(-1px)}
  .choice:disabled{cursor:default}
  .choice.correct{border-color:var(--good);background:#eaf5ee}
  .choice.wrong{border-color:var(--bad);background:#fbecea}
  .choice.dim{opacity:.45}
  .quiz-foot{margin-top:18px;display:flex;align-items:center;gap:12px;min-height:46px}
  .verdict{font-weight:700;font-size:15px}
  .verdict.ok{color:var(--good)} .verdict.no{color:var(--bad)}
  .verdict .pt{font-family:var(--ff-jp)}
  .next-btn{margin-left:auto;border:0;background:var(--indigo);color:var(--washi);cursor:pointer;padding:13px 26px;border-radius:11px;
    font-family:var(--ff-ui);font-weight:700;font-size:15px;transition:.15s;visibility:hidden}
  .next-btn:hover{background:var(--indigo-deep)}
  .next-btn.show{visibility:visible}
  .stamp{position:absolute;top:44%;left:50%;width:100px;height:100px;border-radius:50%;border:5px solid var(--shu);color:var(--shu);
    font-family:var(--ff-jp);font-weight:800;font-size:42px;display:grid;place-items:center;
    transform:translate(-50%,-50%) rotate(-13deg) scale(0);opacity:0;pointer-events:none;z-index:5;background:rgba(245,239,225,.4)}
  .stamp.fire{animation:stamp .5s cubic-bezier(.2,1.3,.4,1) forwards}
  @keyframes stamp{0%{transform:translate(-50%,-50%) rotate(-13deg) scale(2.1);opacity:0}55%{opacity:.95}100%{transform:translate(-50%,-50%) rotate(-13deg) scale(1);opacity:.92}}

  footer{text-align:center;margin-top:24px;color:#7e90ad;font-size:12px;line-height:1.7}
  footer b{color:#a9bbd6;font-family:var(--ff-jp)}
  .hidden{display:none!important}
  :focus-visible{outline:3px solid var(--shu-soft);outline-offset:3px;border-radius:6px}
  @media(prefers-reduced-motion:reduce){.stamp.fire{animation:none;opacity:.92;transform:translate(-50%,-50%) rotate(-13deg) scale(1)}}
</style>
</head>
<body>
<div class="grain"></div>
<div class="wrap">
  <header>
    <div class="seal" aria-hidden="true">文</div>
    <div class="brand">
      <h1>文法</h1>
      <p>Japanese grammar · N5 → N3 patterns, with drills</p>
    </div>
    <a class="hublink" href="index.html">← Hub</a>
  </header>

  <div class="tabs" role="tablist" aria-label="Mode">
    <button class="tab" role="tab" aria-selected="true" id="tab-learn" data-mode="learn">Learn <span class="jp">学ぶ</span></button>
    <button class="tab" role="tab" aria-selected="false" id="tab-quiz" data-mode="quiz">Drill <span class="jp">問題</span></button>
  </div>

  <div class="controls">
    <div class="ctl-row">
      <span class="ctl-label">Level</span>
      <div class="chips" id="levels"></div>
      <button class="switch" id="furi-toggle" aria-pressed="true" aria-label="Toggle furigana"><span>Furigana</span><span class="track" aria-hidden="true"></span></button>
    </div>
  </div>

  <section id="learn-panel">
    <div class="card" id="learn-card"></div>
    <div class="nav">
      <button id="prev-btn">‹ Prev</button>
      <span class="counter" id="counter">1 / 1</span>
      <button id="next-btn">Next ›</button>
      <button id="shuffle-btn" title="Shuffle">⤮ Shuffle</button>
    </div>
  </section>

  <section id="quiz-panel" class="hidden">
    <div class="score-bar">
      <div class="stat"><b id="s-score">0</b><span>Correct</span></div>
      <div class="stat"><b id="s-total">0</b><span>Asked</span></div>
      <div class="stat"><b id="s-streak">0</b><span>Streak</span></div>
      <div class="stat"><b id="s-acc">—</b><span>Accuracy</span></div>
      <button class="reset" id="reset-btn">Reset</button>
    </div>
    <div class="quiz-card">
      <div class="stamp" id="stamp" aria-hidden="true">正</div>
      <div class="q-prompt" id="q-prompt"></div>
      <div class="choices" id="q-choices"></div>
      <div class="quiz-foot">
        <span class="verdict" id="q-verdict" aria-live="polite"></span>
        <button class="next-btn" id="q-next">Next ›</button>
      </div>
    </div>
  </section>

  <footer>
    Learn keys: <b>← →</b> move · Drill keys: <b>1–4</b> answer, <b>Enter</b> next<br>
    <span id="g-count">0</span> grammar points · N5 → N3
  </footer>
</div>

<script>
const G = [
  /* ============================ N5 ============================ */
  {lv:"N5",f:"は",m:'topic marker — "as for…"',
   note:"Marks the topic of the sentence: what you're talking about. The comment about it follows.",
   ex:[
     {s:[["私","わたし"],["は","",1],["学生","がくせい"],["です"]],e:"I am a student."},
     {s:[["今日","きょう"],["は","",1],["暑","あつ"],["い"],["です"]],e:"As for today, it's hot."},
     {s:[["これ"],["は","",1],["何","なん"],["ですか"]],e:"What is this?"}
   ],q:["が","を","に"]},
  {lv:"N5",f:"が",m:"subject marker",
   note:"Marks the grammatical subject — often new information, or the thing liked, wanted, able, or existing. Used with 好き, 上手, ある/いる.",
   ex:[
     {s:[["猫","ねこ"],["が","",1],["好","す"],["き"],["です"]],e:"I like cats."},
     {s:[["雨","あめ"],["が","",1],["降","ふ"],["っています"]],e:"It's raining."},
     {s:[["誰","だれ"],["が","",1],["来","き"],["ますか"]],e:"Who is coming?"}
   ],q:["は","を","へ"]},
  {lv:"N5",f:"を",m:"direct-object marker",
   note:"Marks the direct object — the thing the action is done to.",
   ex:[
     {s:[["パン"],["を","",1],["食","た"],["べます"]],e:"I eat bread."},
     {s:[["映画","えいが"],["を","",1],["見","み"],["ます"]],e:"I watch a movie."},
     {s:[["水","みず"],["を","",1],["飲","の"],["みます"]],e:"I drink water."}
   ],q:["が","に","で"]},
  {lv:"N5",f:"に",m:"time / destination / location of existence",
   note:"Marks a point in time (七時に), a destination (学校に), or where something exists (部屋に).",
   ex:[
     {s:[["七時","しちじ"],["に","",1],["起","お"],["きます"]],e:"I get up at seven."},
     {s:[["学校","がっこう"],["に","",1],["行","い"],["きます"]],e:"I go to school."},
     {s:[["部屋","へや"],["に","",1],["猫","ねこ"],["が"],["います"]],e:"There's a cat in the room."}
   ],q:["を","で","と"]},
  {lv:"N5",f:"で",m:"place of action / means",
   note:"Marks where an action happens (図書館で) or the means/tool used (バスで, 箸で).",
   ex:[
     {s:[["バス"],["で","",1],["行","い"],["きます"]],e:"I go by bus."},
     {s:[["図書館","としょかん"],["で","",1],["勉強","べんきょう"],["します"]],e:"I study at the library."},
     {s:[["日本語","にほんご"],["で","",1],["話","はな"],["します"]],e:"I speak in Japanese."}
   ],q:["に","を","へ"]},
  {lv:"N5",f:"へ",m:"direction (to / toward)",
   note:"Marks the direction of movement. Interchangeable with destination に in many cases; へ stresses the direction.",
   ex:[
     {s:[["学校","がっこう"],["へ","",1],["行","い"],["きます"]],e:"I go to school."},
     {s:[["家","いえ"],["へ","",1],["帰","かえ"],["ります"]],e:"I return home."},
     {s:[["駅","えき"],["へ","",1],["向","む"],["かいます"]],e:"I head for the station."}
   ],q:["で","を","が"]},
  {lv:"N5",f:"と",m:"and / with (noun)",
   note:"Joins nouns exhaustively (A と B = A and B) or marks the person you do something with.",
   ex:[
     {s:[["友達","ともだち"],["と","",1],["行","い"],["きます"]],e:"I go with a friend."},
     {s:[["パン"],["と","",1],["卵","たまご"],["を"],["買","か"],["います"]],e:"I buy bread and eggs."},
     {s:[["先生","せんせい"],["と","",1],["話","はな"],["します"]],e:"I talk with the teacher."}
   ],q:["も","を","に"]},
  {lv:"N5",f:"も",m:"also / too",
   note:"Replaces は or が to mean “also / too.” 私も = me too.",
   ex:[
     {s:[["私","わたし"],["も","",1],["行","い"],["きます"]],e:"I'll go too."},
     {s:[["これ"],["も","",1],["ください"]],e:"This one too, please."},
     {s:[["彼","かれ"],["も","",1],["学生","がくせい"],["です"]],e:"He is a student too."}
   ],q:["は","が","を"]},
  {lv:"N5",f:"の",m:"possessive / noun link",
   note:"Links two nouns: A の B = B of A. 私の本 = my book.",
   ex:[
     {s:[["私","わたし"],["の","",1],["本","ほん"]],e:"my book"},
     {s:[["日本語","にほんご"],["の","",1],["先生","せんせい"]],e:"a Japanese teacher"},
     {s:[["友達","ともだち"],["の","",1],["車","くるま"]],e:"a friend's car"}
   ],q:["が","を","と"]},
  {lv:"N5",f:"や",m:"and (a partial list)",
   note:"Lists representative nouns, not exhaustively: A や B = A, B, and so on.",
   ex:[
     {s:[["本","ほん"],["や","",1],["ペン"],["を"],["買","か"],["います"]],e:"I buy books, pens, and such."},
     {s:[["りんご"],["や","",1],["みかん"],["が"],["あります"]],e:"There are apples, oranges, and so on."},
     {s:[["京都","きょうと"],["や","",1],["大阪","おおさか"],["へ"],["行","い"],["きました"]],e:"I went to Kyoto, Osaka, and other places."}
   ],q:["と","も","を"]},
  {lv:"N5",f:"か",m:"question marker / or",
   note:"Sentence-final か makes a question; between nouns it means “or.”",
   ex:[
     {s:[["学生","がくせい"],["です"],["か","",1]],e:"Are you a student?"},
     {s:[["行","い"],["きます"],["か","",1]],e:"Will you go?"},
     {s:[["コーヒー"],["か","",1],["お茶","おちゃ"]],e:"coffee or tea"}
   ],q:["ね","よ","の"]},
  {lv:"N5",f:"ね",m:"right? / isn't it? (seeking agreement)",
   note:"Sentence-final ね seeks agreement or confirmation from the listener.",
   ex:[
     {s:[["いい"],["天気","てんき"],["です"],["ね","",1]],e:"Nice weather, isn't it?"},
     {s:[["暑","あつ"],["い"],["です"],["ね","",1]],e:"It's hot, isn't it?"},
     {s:[["そう"],["です"],["ね","",1]],e:"That's right, isn't it."}
   ],q:["よ","か","な"]},
  {lv:"N5",f:"よ",m:"emphasis / informing",
   note:"Sentence-final よ tells the listener something new, or adds emphasis and assurance.",
   ex:[
     {s:[["これ"],["、"],["おいしい"],["です"],["よ","",1]],e:"This is tasty, you know."},
     {s:[["危","あぶ"],["ない"],["です"],["よ","",1]],e:"It's dangerous, I'm telling you."},
     {s:[["もう"],["時間","じかん"],["です"],["よ","",1]],e:"It's time already, you know."}
   ],q:["ね","か","な"]},
  {lv:"N5",f:"〜が ほしい",m:"want (a thing)",
   note:"Noun + が ほしい expresses wanting to have something. (For wanting to do, use 〜たい.)",
   ex:[
     {s:[["新","あたら"],["しい"],["車","くるま"],["が"],["ほしい","",1],["です"]],e:"I want a new car."},
     {s:[["時間","じかん"],["が"],["ほしい","",1]],e:"I want (more) time."},
     {s:[["何","なに"],["が"],["ほしい","",1],["ですか"]],e:"What do you want?"}
   ],q:["たい","ある","いる"]},
  {lv:"N5",f:"〜たい",m:"want to (do)",
   note:"Verb stem + たい expresses the speaker's desire to do something. 行きます → 行きたい.",
   ex:[
     {s:[["日本","にほん"],["へ"],["行","い"],["き"],["たい","",1],["です"]],e:"I want to go to Japan."},
     {s:[["水","みず"],["が"],["飲","の"],["み"],["たい","",1]],e:"I want to drink water."},
     {s:[["何","なに"],["が"],["食","た"],["べ"],["たい","",1],["ですか"]],e:"What do you want to eat?"}
   ],q:["ます","た","て"]},
  {lv:"N5",f:"〜から（から〜まで）",m:"from … (to …)",
   note:"から marks a start point (time or place); まで marks the end point.",
   ex:[
     {s:[["九時","くじ"],["から","",1],["五時","ごじ"],["まで"]],e:"from nine to five"},
     {s:[["東京","とうきょう"],["から","",1],["大阪","おおさか"],["まで"]],e:"from Tokyo to Osaka"},
     {s:[["月曜日","げつようび"],["から","",1],["金曜日","きんようび"],["まで"]],e:"from Monday to Friday"}
   ],q:["まで","より","だけ"]},
  {lv:"N5",f:"〜より",m:"than (comparison)",
   note:"A は B より … compares two things: A is more … than B.",
   ex:[
     {s:[["電車","でんしゃ"],["は"],["バス"],["より","",1],["速","はや"],["い"]],e:"The train is faster than the bus."},
     {s:[["今日","きょう"],["は"],["昨日","きのう"],["より","",1],["暑","あつ"],["い"]],e:"Today is hotter than yesterday."},
     {s:[["兄","あに"],["は"],["私","わたし"],["より","",1],["背","せ"],["が"],["高","たか"],["い"]],e:"My older brother is taller than me."}
   ],q:["から","まで","ほど"]},
  {lv:"N5",f:"〜てください",m:"please do …",

   ex:[

     {s:[["食","た"],["べ"],["て","",1],["ください"]],e:"Please eat."},

  {lv:"N5",f:"〜てもいいです",m:"may … / it's okay to …",

     {s:[["入","はい"],["っ"],["てもいいです","",1],["か"]],e:"May I come in?"},

     {s:[["写真","しゃしん"],["を"],["撮","と"],["っ"],["てもいいです","",1],["か"]],e:"May I take a photo?"}
   ],q:["てください","たいです","ましょう"]},
  {lv:"N5",f:"〜てはいけません",m:"must not / not allowed to",
   note:"Te-form + はいけません forbids something.",
   ex:[
     {s:[["入","はい"],["っ"],["てはいけません","",1]],e:"You must not enter."},
     {s:[["走","はし"],["っ"],["てはいけません","",1]],e:"You must not run."},
     {s:[["ここ"],["で"],["食","た"],["べ"],["てはいけません","",1]],e:"You must not eat here."}
   ],q:["てもいいです","てください","ましょう"]},
  {lv:"N5",f:"〜ています",m:"ongoing action / state",
   note:"Te-form + います = an action in progress (食べています) or a continuing state (住んでいます).",
   ex:[
     {s:[["今","いま"],["食","た"],["べ"],["ています","",1]],e:"I'm eating now."},

     {s:[["東京","とうきょう"],["に"],["住","す"],["ん"],["でいます","",1]],e:"I live in Tokyo."}
   ],q:["ました","たいです","ません"]},
  {lv:"N5",f:"〜から（理由）",m:"because (subjective)",
   note:"Plain or polite clause + から gives a reason. Speaker-centred; common for opinions and requests.",
   ex:[
     {s:[["寒","さむ"],["い"],["から","",1],["、"],["休","やす"],["みます"]],e:"Because it's cold, I'll rest."},
     {s:[["高","たか"],["い"],["から","",1],["、"],["買","か"],["いません"]],e:"Because it's expensive, I won't buy it."},
     {s:[["忙","いそが"],["しい"],["から","",1],["、"],["行","い"],["けません"]],e:"Because I'm busy, I can't go."}
   ],q:["のに","まで","と"]},
  {lv:"N5",f:"〜が、",m:"but / although",
   note:"Connects two clauses with a soft contrast: A but B.",
   ex:[
     {s:[["高","たか"],["い"],["です"],["が","",1],["、"],["いい"],["です"]],e:"It's expensive, but it's good."},
     {s:[["安","やす"],["い"],["です"],["が","",1],["、"],["まずい"],["です"]],e:"It's cheap, but it tastes bad."},
     {s:[["難","むずか"],["しい"],["です"],["が","",1],["、"],["面白","おもしろ"],["い"],["です"]],e:"It's difficult, but interesting."}
   ],q:["から","ので","し"]},
  {lv:"N5",f:"〜ましょう / ませんか",m:"let's … / shall we …?",
   note:"ましょう proposes doing something together; ませんか invites more softly.",
   ex:[
     {s:[["一緒","いっしょ"],["に"],["行","い"],["き"],["ましょう","",1]],e:"Let's go together."},
     {s:[["少","すこ"],["し"],["休","やす"],["み"],["ましょう","",1]],e:"Let's take a short break."},
     {s:[["お茶","おちゃ"],["を"],["飲","の"],["み"],["ませんか","",1]],e:"Won't you have some tea?"}
   ],q:["ました","たい","ます"]},
  {lv:"N5",f:"〜でしょう",m:"probably / right?",
   note:"Plain form or noun + でしょう expresses probability, or invites agreement; softer than だ.",
   ex:[
     {s:[["明日","あした"],["は"],["雨","あめ"],["でしょう","",1]],e:"It will probably rain tomorrow."},
     {s:[["彼","かれ"],["は"],["来","く"],["る"],["でしょう","",1]],e:"He'll probably come."},
     {s:[["大変","たいへん"],["でしょう","",1]],e:"That must be tough, right?"}
   ],q:["です","でした","ます"]},
  /* ============================ N4 ============================ */
  {lv:"N4",f:"〜て形（続き）",m:"te-form: linking actions",
   note:"The te-form chains actions in sequence (起きて、食べて、行きます) or links reasons and states.",
   ex:[
     {s:[["起","お"],["き"],["て","",1],["、"],["顔","かお"],["を"],["洗","あら"],["います"]],e:"I get up and wash my face."},
     {s:[["バス"],["に"],["乗","の"],["っ"],["て","",1],["、"],["行","い"],["きます"]],e:"I take the bus and go."},
     {s:[["安","やす"],["く"],["て","",1],["、"],["おいしい"],["です"]],e:"It's cheap and tasty."}
   ],q:["た","ながら","たら"]},
  {lv:"N4",f:"〜たことがある",m:"have done before (experience)",
   note:"Past plain verb + ことがある states that you have the experience of doing something.",
   ex:[
     {s:[["日本","にほん"],["へ"],["行","い"],["っ"],["たことがあります","",1]],e:"I have been to Japan."},
     {s:[["寿司","すし"],["を"],["食","た"],["べ"],["たことがあります","",1]],e:"I have eaten sushi."},
     {s:[["馬","うま"],["に"],["乗","の"],["っ"],["たことがあります","",1]],e:"I have ridden a horse."}
   ],q:["ています","たいです","てください"]},
  {lv:"N4",f:"〜たり〜たりする",m:"do things like A and B",
   note:"Lists representative actions, not exhaustively: 読んだり寝たりします = read, sleep, and so on.",
   ex:[
     {s:[["読","よ"],["ん"],["だり","",1],["、"],["寝","ね"],["たり"],["します"]],e:"I do things like reading and sleeping."},
     {s:[["歌","うた"],["っ"],["たり","",1],["、"],["踊","おど"],["ったり"],["します"]],e:"We sing and dance and so on."},
     {s:[["買","か"],["っ"],["たり","",1],["、"],["売","う"],["ったり"],["します"]],e:"I buy and sell and such."}
   ],q:["て","ながら","たら"]},
  {lv:"N4",f:"〜ながら",m:"while doing (two actions at once)",
   note:"Verb stem + ながら = doing one action while doing another. The main action is the second clause.",
   ex:[
     {s:[["音楽","おんがく"],["を"],["聴","き"],["き"],["ながら","",1],["勉強","べんきょう"],["します"]],e:"I study while listening to music."},
     {s:[["歩","ある"],["き"],["ながら","",1],["話","はな"],["します"]],e:"We talk while walking."},
     {s:[["テレビ"],["を"],["見","み"],["ながら","",1],["食","た"],["べます"]],e:"I eat while watching TV."}
   ],q:["てから","たり","ので"]},
  {lv:"N4",f:"〜ので",m:"because (objective, softer)",
   note:"Plain clause + ので gives a reason that feels factual and polite — softer than から. Good for excuses.",
   ex:[
     {s:[["忙","いそが"],["しい"],["ので","",1],["、"],["行","い"],["けません"]],e:"Because I'm busy, I can't go."},
     {s:[["雨","あめ"],["な"],["ので","",1],["、"],["中止","ちゅうし"],["です"]],e:"Because it's raining, it's cancelled."},
     {s:[["時間","じかん"],["が"],["ない"],["ので","",1],["、"],["急","いそ"],["ぎます"]],e:"Because there's no time, I'll hurry."}
   ],q:["のに","から","と"]},
  {lv:"N4",f:"〜のに",m:"even though / despite",
   note:"Plain clause + のに marks an unexpected, often frustrating contrast: A, even though B.",
   ex:[
     {s:[["勉強","べんきょう"],["した"],["のに","",1],["、"],["試験","しけん"],["が"],["だめ"],["でした"]],e:"Even though I studied, I failed the exam."},
     {s:[["高","たか"],["い"],["のに","",1],["、"],["まずい"],["です"]],e:"Even though it's expensive, it tastes bad."},
     {s:[["約束","やくそく"],["した"],["のに","",1],["、"],["来","こ"],["なかった"]],e:"Even though he promised, he didn't come."}
   ],q:["ので","から","し"]},
  {lv:"N4",f:"〜ば（条件）",m:"if … (general condition)",
   note:"Conditional ば-form states a general or hypothetical condition: 安ければ = if it's cheap.",
   ex:[
     {s:[["安","やす"],["けれ"],["ば","",1],["、"],["買","か"],["います"]],e:"If it's cheap, I'll buy it."},
     {s:[["押","お"],["せ"],["ば","",1],["、"],["開","あ"],["きます"]],e:"If you push it, it opens."},
     {s:[["練習","れんしゅう"],["すれ"],["ば","",1],["、"],["上手","じょうず"],["に"],["なります"]],e:"If you practice, you'll get better."}
   ],q:["たら","と","ても"]},
  {lv:"N4",f:"〜たら",m:"if / when (then…)",
   note:"Past plain + ら sets up “once/if X happens, then Y.” The most flexible conditional.",
   ex:[
     {s:[["着","つ"],["い"],["たら","",1],["、"],["電話","でんわ"],["します"]],e:"When I arrive, I'll call."},
     {s:[["雨","あめ"],["が"],["降","ふ"],["っ"],["たら","",1],["、"],["休","やす"],["みます"]],e:"If it rains, I'll rest."},
     {s:[["お金","おかね"],["が"],["あっ"],["たら","",1],["、"],["旅行","りょこう"],["します"]],e:"If I had money, I'd travel."}
   ],q:["ば","と","ながら"]},
  {lv:"N4",f:"〜と（自然結果）",m:"whenever / and then (natural result)",
   note:"Plain nonpast + と = whenever A happens, B naturally follows. Used for rules, directions, habits.",
   ex:[
     {s:[["春","はる"],["に"],["なる"],["と","",1],["、"],["暖","あたた"],["かく"],["なります"]],e:"When spring comes, it gets warm."},
     {s:[["右","みぎ"],["へ"],["曲","ま"],["がる"],["と","",1],["、"],["駅","えき"],["が"],["あります"]],e:"If you turn right, the station is there."},
     {s:[["二","に"],["に"],["三","さん"],["を"],["足","た"],["す"],["と","",1],["、"],["五","ご"],["に"],["なる"]],e:"Two plus three makes five."}
   ],q:["たら","ば","ので"]},
  {lv:"N4",f:"〜なら",m:"if (given that) …",
   note:"Noun/plain + なら picks up a topic the other person raised: “if (we're talking about)…”",

     {s:[["行","い"],["く"],["なら","",1],["、"],["傘","かさ"],["を"],["持","も"],["って"]],e:"If you're going, take an umbrella."},
     {s:[["安","やす"],["い"],["なら","",1],["、"],["買","か"],["います"]],e:"If it's cheap (as you say), I'll buy it."}
   ],q:["たら","ので","のに"]},
  {lv:"N4",f:"〜なければならない",m:"must / have to",

   ex:[
     {s:[["行","い"],["か"],["なければなりません","",1]],e:"I must go."},

  {lv:"N4",f:"可能形（できる）",m:"potential form — be able to",

  {lv:"N4",f:"〜つもりだ",m:"intend to / plan to",

  {lv:"N4",f:"〜そうだ（様態）",m:"looks like / seems (from appearance)",

  {lv:"N4",f:"〜てくれる",m:"do (something) for me",

  /* ============================ N3 ============================ */

  {lv:"N3",f:"〜ことにする",m:"decide to …",

     {s:[["毎朝","まいあさ"],["走","はし"],["る"],["ことにしました","",1]],e:"I decided to run every morning."},
     {s:[["たばこ"],["を"],["やめる"],["ことにしました","",1]],e:"I decided to quit smoking."},
     {s:[["留学","りゅうがく"],["する"],["ことにしました","",1]],e:"I decided to study abroad."}
   ],q:["ことになる","ようになる","つもりだ"]},
  {lv:"N3",f:"〜ことになる",m:"it has been decided that …",
   note:"Plain verb + ことになる: a decision or arrangement that's been reached, often not by the speaker.",
   ex:[
     {s:[["来月","らいげつ"],["、"],["転勤","てんきん"],["する"],["ことになりました","",1]],e:"It's been decided I'll transfer next month."},
     {s:[["会議","かいぎ"],["は"],["中止","ちゅうし"],["する"],["ことになりました","",1]],e:"It's been decided the meeting is cancelled."},
     {s:[["結婚","けっこん"],["する"],["ことになりました","",1]],e:"It's been settled that we'll marry."}
   ],q:["ことにする","ようになる","はずだ"]},
  {lv:"N3",f:"〜はずだ",m:"should be / ought to (expectation)",
   note:"Plain form + はずだ = a logical expectation: it should be the case that…",
   ex:[
     {s:[["彼","かれ"],["は"],["もう"],["着","つ"],["いている"],["はずです","",1]],e:"He should have arrived already."},
     {s:[["この"],["店","みせ"],["は"],["安","やす"],["い"],["はずです","",1]],e:"This shop should be cheap."},
     {s:[["鍵","かぎ"],["は"],["ここ"],["に"],["ある"],["はずです","",1]],e:"The key should be here."}
   ],q:["ようだ","らしい","つもりだ"]},
  {lv:"N3",f:"〜らしい",m:"seems / I hear (hearsay)",
   note:"Plain form + らしい reports information from an outside source, or describes typical character.",
   ex:[
     {s:[["明日","あした"],["は"],["雨","あめ"],["らしい","",1],["です"]],e:"It seems it'll rain tomorrow."},
     {s:[["彼","かれ"],["は"],["来","こ"],["ない"],["らしい","",1]],e:"It seems he's not coming."},
     {s:[["あの"],["店","みせ"],["は"],["おいしい"],["らしい","",1]],e:"I hear that shop is good."}
   ],q:["はずだ","ようだ","つもりだ"]},
  {lv:"N3",f:"〜ために",m:"in order to / for the sake of",
   note:"Plain verb or noun + の + ために expresses purpose or benefit.",
   ex:[
     {s:[["健康","けんこう"],["の"],["ために","",1],["、"],["運動","うんどう"],["します"]],e:"I exercise for my health."},
     {s:[["留学","りゅうがく"],["する"],["ために","",1],["、"],["お金","おかね"],["を"],["貯","た"],["めます"]],e:"I save money in order to study abroad."},
     {s:[["家族","かぞく"],["の"],["ために","",1],["、"],["働","はたら"],["きます"]],e:"I work for my family."}
   ],q:["ので","ように","のに"]},
  {lv:"N3",f:"〜ように",m:"so that … / in such a way that",
   note:"Plain form (often potential or negative) + ように states a goal aimed for. Contrast with the concrete-purpose ために.",
   ex:[
     {s:[["聞","き"],["こえる"],["ように","",1],["、"],["大","おお"],["きい"],["声","こえ"],["で"],["話","はな"],["します"]],e:"I speak loudly so I can be heard."},

     {s:[["風邪","かぜ"],["を"],["ひかない"],["ように","",1],["、"],["気","き"],["を"],["つけます"]],e:"I'm careful so as not to catch a cold."}
   ],q:["ために","ので","のに"]},
  {lv:"N3",f:"〜ば〜ほど",m:"the more …, the more …",
   note:"ば-form + the same verb's plain form + ほど = as one increases, so does the other.",
   ex:[
     {s:[["考","かんが"],["えれ"],["ば","",1],["考","かんが"],["える"],["ほど"],["、"],["難","むずか"],["しい"]],e:"The more I think, the harder it gets."},
     {s:[["練習","れんしゅう"],["すれ"],["ば","",1],["する"],["ほど"],["、"],["上手","じょうず"],["に"],["なる"]],e:"The more you practice, the better you get."},
     {s:[["読","よ"],["め"],["ば","",1],["読","よ"],["む"],["ほど"],["、"],["面白","おもしろ"],["い"]],e:"The more I read, the more interesting it is."}
   ],q:["たら","ても","ので"]},
  {lv:"N3",f:"〜ばかり",m:"only / nothing but / just did",
   note:"Noun + ばかり = nothing but; te-form + ばかり = just did it.",
   ex:[
     {s:[["ゲーム"],["ばかり","",1],["しています"]],e:"I do nothing but play games."},
     {s:[["甘","あま"],["い"],["もの"],["ばかり","",1],["食","た"],["べます"]],e:"I eat nothing but sweets."},
     {s:[["着","つ"],["いた"],["ばかり","",1],["です"]],e:"I've just arrived."}
   ],q:["だけ","しか","ほど"]},
  {lv:"N3",f:"〜ようだ / みたい",m:"seems like / appears (judgment)",
   note:"Plain + ようだ (formal) or みたい (casual): the speaker's judgment based on evidence.",
   ex:[
     {s:[["誰","だれ"],["か"],["来","き"],["た"],["ようです","",1]],e:"It seems someone came."},
     {s:[["風邪","かぜ"],["を"],["ひいた"],["ようです","",1]],e:"It seems I've caught a cold."},
     {s:[["留守","るす"],["の"],["ようです","",1]],e:"It seems no one is home."}
   ],q:["そうです","つもりです","はずです"]},
  {lv:"N3",f:"〜わけだ",m:"no wonder / that's why",
   note:"Plain form + わけだ draws a natural conclusion: that explains it.",
   ex:[
     {s:[["道理","どうり"],["で"],["寒","さむ"],["い"],["わけだ","",1]],e:"No wonder it's cold."},
     {s:[["窓","まど"],["が"],["開","あ"],["いている"],["。"],["寒","さむ"],["い"],["わけだ","",1]],e:"The window's open — that's why it's cold."},
     {s:[["三年","さんねん"],["住","す"],["んだ"],["。"],["上手","じょうず"],["な"],["わけだ","",1]],e:"She lived there three years — no wonder she's fluent."}
   ],q:["はずがない","つもりだ","らしい"]},
  {lv:"N3",f:"〜わけではない",m:"it's not (necessarily) that …",

   ex:[

     {s:[["全部","ぜんぶ"],["わかる"],["わけではない","",1]],e:"It's not that I understand everything."},

   ],q:["はずだ","つもりだ","らしい"]},
  {lv:"N3",f:"〜はずがない",m:"there's no way that … / can't be",
   note:"Plain form + はずがない: the speaker is sure something is impossible.",
   ex:[

   ],q:["はずだ","かもしれない","らしい"]},
  {lv:"N3",f:"〜べきだ",m:"should / ought to (moral)",
   note:"Plain verb + べきだ: something is the right thing to do. (する → するべき / すべき.)",
   ex:[
     {s:[["約束","やくそく"],["は"],["守","まも"],["る"],["べきです","",1]],e:"You should keep your promises."},
     {s:[["もっと"],["勉強","べんきょう"],["する"],["べきです","",1]],e:"You should study more."},
     {s:[["すぐ"],["謝","あやま"],["る"],["べきです","",1]],e:"You should apologize right away."}
   ],q:["はずです","つもりです","ようです"]},
  {lv:"N3",f:"〜うちに",m:"while … / before it changes",
   note:"Do something while a favorable state lasts, before it ends: 熱いうちに食べる.",
   ex:[
     {s:[["熱","あつ"],["い"],["うちに","",1],["、"],["食","た"],["べてください"]],e:"Eat it while it's hot."},
     {s:[["明","あか"],["るい"],["うちに","",1],["、"],["帰","かえ"],["ります"]],e:"I'll head home while it's still light."},
     {s:[["忘","わす"],["れない"],["うちに","",1],["、"],["書","か"],["きます"]],e:"I'll write it down before I forget."}
   ],q:["あいだに","ながら","ために"]},
  {lv:"N3",f:"〜間に（あいだに）",m:"during / while (a span)",
   note:"Noun + の / plain + 間（あいだ）に: an action happens within a span of time.",
   ex:[
     {s:[["留守","るす"],["の"],["間に","あいだに",1],["、"],["泥棒","どろぼう"],["が"],["入","はい"],["った"]],e:"A burglar broke in while I was out."},
     {s:[["夏休","なつやす"],["みの"],["間に","あいだに",1],["、"],["旅行","りょこう"],["した"]],e:"I traveled during summer vacation."},
     {s:[["寝","ね"],["ている"],["間に","あいだに",1],["、"],["地震","じしん"],["が"],["あった"]],e:"There was an earthquake while I slept."}
   ],q:["うちに","ながら","ために"]},
  {lv:"N3",f:"〜たびに",m:"every time / whenever",
   note:"Plain verb or noun + の + たびに: each time something happens.",
   ex:[
     {s:[["会","あ"],["う"],["たびに","",1],["、"],["プレゼント"],["を"],["くれる"]],e:"Every time we meet, she gives me a present."},
     {s:[["春","はる"],["に"],["なる"],["たびに","",1],["、"],["桜","さくら"],["が"],["咲","さ"],["く"]],e:"Every time spring comes, the cherry blossoms bloom."},
     {s:[["旅行","りょこう"],["の"],["たびに","",1],["、"],["写真","しゃしん"],["を"],["撮","と"],["る"]],e:"On every trip, I take photos."}
   ],q:["うちに","ばかり","ながら"]},
  {lv:"N3",f:"〜によって",m:"depending on / by means of / by (agent)",
   note:"Noun + によって: it varies depending on; by means of; or the agent in a passive sentence.",
   ex:[
     {s:[["人","ひと"],["によって","",1],["、"],["考","かんが"],["え"],["が"],["違","ちが"],["う"]],e:"Opinions differ from person to person."},
     {s:[["地震","じしん"],["によって","",1],["、"],["建物","たてもの"],["が"],["倒","たお"],["れた"]],e:"Buildings collapsed due to the earthquake."},
     {s:[["天気","てんき"],["によって","",1],["、"],["予定","よてい"],["を"],["変","か"],["える"]],e:"We change plans depending on the weather."}
   ],q:["について","のために","にとって"]},
  {lv:"N3",f:"〜について",m:"about / concerning",
   note:"Noun + について: regarding a topic.",
   ex:[
     {s:[["日本","にほん"],["の"],["文化","ぶんか"],["について","",1],["、"],["研究","けんきゅう"],["します"]],e:"I research Japanese culture."},
     {s:[["事故","じこ"],["について","",1],["、"],["話","はな"],["しました"]],e:"We talked about the accident."},
     {s:[["この"],["問題","もんだい"],["について","",1],["、"],["どう"],["思","おも"],["いますか"]],e:"What do you think about this issue?"}
   ],q:["によって","のために","にとって"]},
  {lv:"N3",f:"〜に対して（にたいして）",m:"toward / in contrast to",
   note:"Noun + に対して: an action directed at someone or something, or a contrast between two things.",
   ex:[
     {s:[["質問","しつもん"],["に対して","にたいして",1],["、"],["答","こた"],["える"]],e:"I respond to the question."},
     {s:[["親","おや"],["に対して","にたいして",1],["、"],["反抗","はんこう"],["する"]],e:"to rebel against one's parents"},
     {s:[["失礼","しつれい"],["な"],["態度","たいど"],["に対して","にたいして",1],["、"],["怒","おこ"],["った"]],e:"I got angry at the rude attitude."}
   ],q:["について","によって","にとって"]},
  {lv:"N3",f:"〜にとって",m:"for / to (from the standpoint of)",
   note:"Noun + にとって: seen from someone's viewpoint; what matters to them.",
   ex:[
     {s:[["私","わたし"],["にとって","",1],["、"],["家族","かぞく"],["が"],["一番","いちばん"],["大切","たいせつ"],["だ"]],e:"For me, family is the most important thing."},
     {s:[["子供","こども"],["にとって","",1],["、"],["遊","あそ"],["び"],["は"],["大切","たいせつ"],["だ"]],e:"For children, play is important."},
     {s:[["彼","かれ"],["にとって","",1],["、"],["難","むずか"],["しい"],["問題","もんだい"],["だ"]],e:"For him, it's a hard problem."}
   ],q:["について","に対して","によって"]},
  {lv:"N3",f:"〜ところだ",m:"about to / in the midst of / just did",
   note:"Verb form + ところ: dictionary form + ところ (about to), ている + ところ (in the middle), た + ところ (just did).",
   ex:[
     {s:[["今","いま"],["から"],["出","で"],["かける"],["ところです","",1]],e:"I'm just about to go out."},
     {s:[["今","いま"],["食","た"],["べている"],["ところです","",1]],e:"I'm in the middle of eating."},
     {s:[["今","いま"],["着","つ"],["いた"],["ところです","",1]],e:"I've just arrived."}
   ],q:["はずです","ばかりです","つもりです"]},
  {lv:"N3",f:"〜おかげで",m:"thanks to / owing to (good result)",
   note:"Plain form or noun + の + おかげで: a good outcome thanks to something.",
   ex:[
     {s:[["先生","せんせい"],["の"],["おかげで","",1],["、"],["合格","ごうかく"],["できた"]],e:"Thanks to the teacher, I passed."},
     {s:[["薬","くすり"],["の"],["おかげで","",1],["、"],["元気","げんき"],["に"],["なった"]],e:"Thanks to the medicine, I got better."},
     {s:[["手伝","てつだ"],["ってくれた"],["おかげで","",1],["、"],["早","はや"],["く"],["終","お"],["わった"]],e:"Thanks to your help, it finished early."}
   ],q:["せいで","ために","ように"]},
  {lv:"N3",f:"〜せいで",m:"because of (bad result) / due to",
   note:"Plain form or noun + の + せいで: a bad outcome blamed on something.",
   ex:[
     {s:[["雨","あめ"],["の"],["せいで","",1],["、"],["試合","しあい"],["が"],["中止","ちゅうし"],["に"],["なった"]],e:"Because of the rain, the match was cancelled."},
     {s:[["寝坊","ねぼう"],["した"],["せいで","",1],["、"],["遅刻","ちこく"],["した"]],e:"Because I overslept, I was late."},
     {s:[["君","きみ"],["の"],["せいで","",1],["、"],["負","ま"],["けた"]],e:"We lost because of you."}
   ],q:["おかげで","ために","ように"]},
  {lv:"N3",f:"〜かどうか",m:"whether or not",
   note:"Plain form + かどうか embeds a yes/no question inside a larger sentence.",
   ex:[
     {s:[["来","く"],["る"],["かどうか","",1],["、"],["わからない"]],e:"I don't know whether he'll come."},
     {s:[["正","ただ"],["しい"],["かどうか","",1],["、"],["確","たし"],["かめる"]],e:"I'll check whether it's correct."},
     {s:[["行","い"],["ける"],["かどうか","",1],["、"],["まだ"],["決","き"],["めていない"]],e:"I haven't decided whether I can go."}
   ],q:["かもしれない","ばかり","ように"]},
  {lv:"N3",f:"〜ことがある",m:"sometimes / there are times when",
   note:"Plain nonpast verb + ことがある: something happens occasionally. (Contrast た + ことがある = past experience.)",
   ex:[
     {s:[["たまに"],["遅刻","ちこく"],["する"],["ことがあります","",1]],e:"I'm sometimes late."},
     {s:[["朝","あさ"],["ごはん"],["を"],["抜","ぬ"],["く"],["ことがあります","",1]],e:"There are times I skip breakfast."},
     {s:[["道","みち"],["に"],["迷","まよ"],["う"],["ことがあります","",1]],e:"I sometimes get lost."}
   ],q:["たことがある","ばかり","はずだ"]},
  {lv:"N3",f:"〜てほしい",m:"want someone to do …",
   note:"Te-form + ほしい: the speaker wants another person to do something.",
   ex:[
     {s:[["手伝","てつだ"],["っ"],["てほしい","",1],["です"]],e:"I want you to help me."},
     {s:[["静","しず"],["かに"],["し"],["てほしい","",1]],e:"I want you to be quiet."},
     {s:[["本当","ほんとう"],["の"],["こと"],["を"],["言","い"],["っ"],["てほしい","",1]],e:"I want you to tell the truth."}
   ],q:["たい","てあげる","ながら"]}
];

/* ===== state ===== */
const state={mode:"learn",level:"all",furigana:true,deck:[],idx:0,
  qDeck:[],qPos:0,qCur:null,answered:false,score:0,total:0,streak:0};
const $=id=>document.getElementById(id);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function applyFuri(){document.body.classList.toggle("no-furi",!state.furigana);}
function filtered(){return state.level==="all"?G:G.filter(g=>g.lv===state.level);}

/* render a segment array; opt.hi highlights the marked token, opt.blank blanks it */
function segHTML(segs,opt){
  opt=opt||{};
  return segs.map(s=>{
    const base=s[0], ruby=s[1], mark=s[2];
    if(mark===1 && opt.blank) return `<span class="blank">${"\u3000".repeat(2)}</span>`;
    let inner = (ruby && state.furigana) ? `<ruby>${base}<rt>${ruby}</rt></ruby>` : base;
    if(mark===1 && opt.hi) inner=`<mark class="hl">${inner}</mark>`;
    return inner;
  }).join("");
}

/* ===== levels ===== */
function buildLevels(){
  const box=$("levels");
  const items=[["all","All "+G.length],["N5","N5"],["N4","N4"],["N3","N3"]];
  box.innerHTML=items.map(([k,l])=>{
    const n=k==="all"?G.length:G.filter(g=>g.lv===k).length;
    const lbl=k==="all"?l:`${k} ${n}`;
    return `<button class="chip" data-lv="${k}" aria-pressed="${state.level===k}">${lbl}</button>`;
  }).join("");
  box.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{
    state.level=b.dataset.lv;
    box.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed",c===b));
    rebuild();
  });
}

/* ===== learn ===== */
function rebuild(){ state.deck=filtered(); state.idx=0; renderLearn(); newQuiz(); }
function renderLearn(){
  const g=state.deck[state.idx];
  const exs=g.ex.map(e=>`<div class="ex"><div class="jpx">${segHTML(e.s,{hi:true})}</div><div class="ex-en">${e.e}</div></div>`).join("");
  $("learn-card").innerHTML=`
    <span class="lvl-pill">${g.lv}</span>
    <div class="g-form">${g.f}</div>
    <div class="g-mean">${g.m}</div>
    <div class="g-note">${g.note}</div>
    <div class="ex-wrap"><div class="ex-label">Examples</div>${exs}</div>`;
  $("counter").textContent=`${state.idx+1} / ${state.deck.length}`;
}
function move(d){ state.idx=(state.idx+d+state.deck.length)%state.deck.length; renderLearn(); }

/* ===== quiz ===== */
function newQuiz(){
  const pool=filtered();
  if(state.qPos>=pool.length||!state.qDeck.length){state.qDeck=shuffle(pool);state.qPos=0;}
  const g=state.qDeck[state.qPos++]; state.qCur=g; state.answered=false;
  const segs=g.ex[0].s;
  // answer = the marked token's base text from ex[0]
  const tok=segs.find(s=>s[2]===1);
  const answer=tok?tok[0]:g.f;
  const opts=shuffle([answer,...g.q]);
  $("q-prompt").innerHTML=`<span class="q-tag">Choose the form that fits</span>
    <div class="q-sent">${segHTML(segs,{blank:true})}</div>
    <div class="q-en">${g.ex[0].e}</div>`;
  const box=$("q-choices");
  box.innerHTML=opts.map((o,i)=>`<button class="choice" data-i="${i}">${o}</button>`).join("");
  [...box.children].forEach((btn,i)=>btn.onclick=()=>answer_(btn,opts[i]===answer,box,answer,g));
  $("q-verdict").textContent=""; $("q-verdict").className="verdict";
  $("q-next").classList.remove("show"); $("stamp").classList.remove("fire");
  applyFuri();
}
function answer_(btn,correct,box,answer,g){
  if(state.answered)return; state.answered=true; state.total++;
  const btns=[...box.querySelectorAll(".choice")];
  btns.forEach(b=>{b.disabled=true; if(b!==btn)b.classList.add("dim");});
  const correctBtn=btns.find(b=>b.textContent===answer);
  if(correct){
    btn.classList.remove("dim");btn.classList.add("correct");
    state.score++;state.streak++;
    $("q-verdict").innerHTML=`正解 — <span class="pt">${g.f}</span> · ${g.m}`;
    $("q-verdict").className="verdict ok";
    const st=$("stamp");st.classList.remove("fire");void st.offsetWidth;st.classList.add("fire");
  }else{
    btn.classList.remove("dim");btn.classList.add("wrong");
    if(correctBtn){correctBtn.classList.remove("dim");correctBtn.classList.add("correct");}
    state.streak=0;
    $("q-verdict").innerHTML=`不正解 — <span class="pt">${g.f}</span> · ${g.m}`;
    $("q-verdict").className="verdict no";
  }
  $("q-next").classList.add("show"); updateScore();
}
function updateScore(){
  $("s-score").textContent=state.score; $("s-total").textContent=state.total;
  $("s-streak").textContent=state.streak;
  $("s-acc").textContent=state.total?Math.round(state.score/state.total*100)+"%":"—";
}

/* ===== mode ===== */
function setMode(m){
  state.mode=m;
  $("tab-learn").setAttribute("aria-selected",m==="learn");
  $("tab-quiz").setAttribute("aria-selected",m==="quiz");
  $("learn-panel").classList.toggle("hidden",m!=="learn");
  $("quiz-panel").classList.toggle("hidden",m!=="quiz");
}

/* ===== wiring ===== */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>setMode(t.dataset.mode));
$("prev-btn").onclick=()=>move(-1);
$("next-btn").onclick=()=>move(1);
$("shuffle-btn").onclick=()=>{state.deck=shuffle(state.deck);state.idx=0;renderLearn();};
$("furi-toggle").onclick=()=>{state.furigana=!state.furigana;$("furi-toggle").setAttribute("aria-pressed",state.furigana);applyFuri();
  if(state.mode==="learn")renderLearn(); else if(!state.answered)newQuiz();};
$("q-next").onclick=newQuiz;
$("reset-btn").onclick=()=>{state.score=0;state.total=0;state.streak=0;updateScore();};
document.addEventListener("keydown",e=>{
  if(state.mode==="learn"){
    if(e.key==="ArrowLeft")move(-1); else if(e.key==="ArrowRight")move(1);
  }else{
    if(["1","2","3","4"].includes(e.key)){const b=$("q-choices").querySelector(`[data-i="${+e.key-1}"]`);if(b&&!b.disabled)b.click();}
    else if((e.key==="Enter"||e.key===" ")&&state.answered){e.preventDefault();newQuiz();}
  }
});

/* ===== init ===== */
$("g-count").textContent=G.length;
buildLevels(); applyFuri(); rebuild(); setMode("learn");
</script>
</body>
</html>
