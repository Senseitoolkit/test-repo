<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文法 — Japanese Grammar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo-deep:#13213b; --indigo:#21385c; --indigo-soft:#3a557f;
    --washi:#f5efe1; --washi-dim:#e7ddc6; --washi-line:#d8cdb2;
    --ink:#222530; --ink-soft:#5a5d68;
    --shu:#c43d28; --shu-soft:#d9694f; --gold:#b6893e;
    --good:#2e7d52; --bad:#b23a2e;
    --radius:18px; --shadow:0 18px 40px -22px rgba(8,16,32,.85);
    --ff-jp:'Shippori Mincho',serif;
    --ff-ui:'Zen Kaku Gothic New',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--ff-ui);color:var(--ink);
    background:radial-gradient(circle at 18% -10%, #2a456e 0%, transparent 45%),
      radial-gradient(circle at 100% 100%, #1b2f50 0%, transparent 50%),
      linear-gradient(160deg,#14233f 0%,#101c33 100%);
    background-attachment:fixed;min-height:100vh;padding:clamp(14px,3vw,34px);-webkit-font-smoothing:antialiased;}
  .grain{position:fixed;inset:0;pointer-events:none;opacity:.05;z-index:0;
    background-image:radial-gradient(rgba(255,255,255,.9) .8px,transparent .8px);background-size:7px 7px;}
.hub-back{display:inline-flex;align-items:center;gap:7px;margin-bottom:14px;
    color:#a9bbd6;font-size:13px;font-weight:600;text-decoration:none;
    padding:7px 13px;border:1px solid rgba(255,255,255,.16);border-radius:999px;
    background:rgba(255,255,255,.06);backdrop-filter:blur(4px);transition:.15s}
  .hub-back:hover{background:rgba(255,255,255,.12);color:var(--washi)}
  .hub-back .jp{font-family:var(--ff-jp);font-weight:700;color:var(--shu-soft)}
  header{display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .seal{flex:0 0 auto;width:58px;height:58px;border-radius:14px;border:2.5px solid var(--shu);color:var(--washi);
    font-family:var(--ff-jp);font-weight:800;font-size:30px;display:grid;place-items:center;
    background:linear-gradient(160deg,#c43d28,#a52e1d);box-shadow:0 8px 18px -8px rgba(196,61,40,.7);}
  .brand h1{font-family:var(--ff-jp);font-weight:800;color:var(--washi);font-size:clamp(26px,5vw,34px);line-height:1;letter-spacing:2px}
  .brand p{color:#a9bbd6;font-size:13px;margin-top:6px;letter-spacing:.3px}
  .hublink{margin-left:auto;color:#a9bbd6;text-decoration:none;font-size:13px;font-weight:600;
    border:1px solid rgba(255,255,255,.18);padding:8px 14px;border-radius:10px;transition:.15s}
  .hublink:hover{background:rgba(255,255,255,.08);color:var(--washi)}

  .tabs{display:flex;gap:6px;background:rgba(255,255,255,.06);padding:6px;border-radius:14px;margin-bottom:16px;backdrop-filter:blur(4px)}
  .tab{flex:1;border:0;cursor:pointer;padding:12px 8px;border-radius:9px;font-family:var(--ff-ui);font-weight:700;font-size:15px;
    color:#aebbd2;background:transparent;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px}
  .tab .jp{font-family:var(--ff-jp);font-size:13px;opacity:.75}
  .tab[aria-selected="true"]{background:var(--washi);color:var(--indigo-deep);box-shadow:0 6px 14px -8px rgba(0,0,0,.6)}

  .controls{background:var(--washi);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--washi-dim)}
  .ctl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .ctl-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);flex:0 0 100%;margin-bottom:-2px}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{border:1.5px solid var(--washi-line);background:transparent;cursor:pointer;padding:7px 12px;border-radius:999px;
    font-family:var(--ff-ui);font-size:13px;font-weight:600;color:var(--ink-soft);transition:.15s}
  .chip:hover{border-color:var(--indigo-soft)}
  .chip[aria-pressed="true"]{background:var(--indigo);color:var(--washi);border-color:var(--indigo)}
  .switch{display:flex;align-items:center;gap:10px;cursor:pointer;margin-left:auto;font-size:13px;font-weight:600;color:var(--ink-soft)}
  .track{width:46px;height:26px;border-radius:999px;background:var(--washi-dim);position:relative;transition:.18s;flex:0 0 auto}
  .track::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .switch[aria-pressed="true"] .track{background:var(--shu)}
  .switch[aria-pressed="true"] .track::after{transform:translateX(20px)}
  .switches{margin-left:auto;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .switches .switch{margin-left:0}

  .no-furi rt{visibility:hidden}
  .no-en .ex-en,.no-en .q-en{display:none}
  rt{font-family:var(--ff-ui);font-weight:500;color:var(--shu-soft);font-size:.5em;transition:opacity .2s}
  .jpx{font-family:var(--ff-jp);line-height:2}

  /* learn card */
  .card{background:var(--washi);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--washi-dim);
    padding:26px 24px;position:relative;margin-bottom:14px}
  .card::before{content:"";position:absolute;inset:9px;border-radius:11px;border:1px solid var(--washi-line);pointer-events:none}
  .lvl-pill{position:absolute;top:14px;right:16px;font-size:11px;font-weight:800;color:var(--washi);background:var(--indigo-soft);padding:4px 11px;border-radius:999px}
  .g-form{font-family:var(--ff-jp);font-weight:800;font-size:clamp(34px,8vw,52px);color:var(--ink);line-height:1.1;position:relative;z-index:1}
  .g-mean{font-size:clamp(17px,4vw,21px);font-weight:700;color:var(--shu);margin-top:6px;position:relative;z-index:1}
  .g-note{font-size:15px;line-height:1.65;color:#43464f;margin-top:14px;position:relative;z-index:1}
  .ex-wrap{margin-top:18px;position:relative;z-index:1}
  .ex-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
  .ex{background:#fffdf7;border:1px solid var(--washi-line);border-left:4px solid var(--gold);border-radius:11px;padding:13px 15px;margin-bottom:10px}
  .ex .jpx{font-size:21px;font-weight:500;color:var(--ink)}
  .ex .ex-en{font-size:14px;color:var(--ink-soft);margin-top:6px;font-style:italic}
  mark.hl{background:rgba(214,61,40,.16);color:var(--shu);font-weight:700;border-radius:4px;padding:0 2px}

  .nav{display:flex;align-items:center;gap:10px}
  .nav button{flex:1;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:var(--washi);cursor:pointer;
    padding:13px;border-radius:12px;font-family:var(--ff-ui);font-weight:700;font-size:14px;transition:.15s;backdrop-filter:blur(4px)}
  .nav button:hover{background:rgba(255,255,255,.14)}
  .nav .counter{flex:0 0 auto;color:#c4d2e8;font-size:14px;font-weight:700;min-width:80px;text-align:center;font-variant-numeric:tabular-nums}

  /* quiz */
  .score-bar{display:flex;gap:10px;margin-bottom:16px}
  .stat{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:11px 8px;text-align:center;backdrop-filter:blur(4px)}
  .stat b{display:block;font-size:23px;color:var(--washi);font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1}
  .stat span{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#9fb1cd}
  .reset{border:1px solid rgba(255,255,255,.18);background:transparent;color:#bcccdf;cursor:pointer;border-radius:13px;padding:0 16px;font-size:13px;font-weight:600}
  .reset:hover{background:rgba(255,255,255,.08)}
  .quiz-card{background:var(--washi);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--washi-dim);padding:26px 22px;position:relative;overflow:hidden}
  .q-prompt{text-align:center;padding:6px 4px 18px;margin-bottom:18px;border-bottom:1px dashed var(--washi-line)}
  .q-tag{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:12px}
  .q-sent{font-family:var(--ff-jp);font-size:clamp(20px,5vw,27px);line-height:1.9;font-weight:500}
  .q-en{font-size:14px;color:var(--ink-soft);margin-top:10px;font-style:italic}
  .blank{display:inline-block;min-width:54px;border-bottom:3px solid var(--shu);margin:0 4px;text-align:center;color:transparent}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:520px){.choices{grid-template-columns:1fr}}
  .choice{border:1.5px solid var(--washi-line);background:#fffdf7;cursor:pointer;text-align:center;padding:15px;border-radius:12px;
    font-family:var(--ff-jp);font-size:21px;font-weight:700;color:var(--ink);transition:.13s}
  .choice:hover:not(:disabled){border-color:var(--indigo-soft);transform:translateY(-1px)}
  .choice:disabled{cursor:default}
  .choice.correct{border-color:var(--good);background:#eaf5ee}
  .choice.wrong{border-color:var(--bad);background:#fbecea}
  .choice.dim{opacity:.45}
  .quiz-foot{margin-top:18px;display:flex;align-items:center;gap:12px;min-height:46px}
  .verdict{font-weight:700;font-size:15px}
  .verdict.ok{color:var(--good)} .verdict.no{color:var(--bad)}
  .verdict .pt{font-family:var(--ff-jp)}
  .next-btn{margin-left:auto;border:0;background:var(--indigo);color:var(--washi);cursor:pointer;padding:13px 26px;border-radius:11px;
    font-family:var(--ff-ui);font-weight:700;font-size:15px;transition:.15s;visibility:hidden}
  .next-btn:hover{background:var(--indigo-deep)}
  .next-btn.show{visibility:visible}
  .stamp{position:absolute;top:44%;left:50%;width:100px;height:100px;border-radius:50%;border:5px solid var(--shu);color:var(--shu);
    font-family:var(--ff-jp);font-weight:800;font-size:42px;display:grid;place-items:center;
    transform:translate(-50%,-50%) rotate(-13deg) scale(0);opacity:0;pointer-events:none;z-index:5;background:rgba(245,239,225,.4)}
  .stamp.fire{animation:stamp .5s cubic-bezier(.2,1.3,.4,1) forwards}
  @keyframes stamp{0%{transform:translate(-50%,-50%) rotate(-13deg) scale(2.1);opacity:0}55%{opacity:.95}100%{transform:translate(-50%,-50%) rotate(-13deg) scale(1);opacity:.92}}

  footer{text-align:center;margin-top:24px;color:#7e90ad;font-size:12px;line-height:1.7}
  footer b{color:#a9bbd6;font-family:var(--ff-jp)}
  .hidden{display:none!important}
  :focus-visible{outline:3px solid var(--shu-soft);outline-offset:3px;border-radius:6px}
  @media(prefers-reduced-motion:reduce){.stamp.fire{animation:none;opacity:.92;transform:translate(-50%,-50%) rotate(-13deg) scale(1)}}
</style>
</head>
<body>
<div class="grain"></div>
<div class="wrap">

  <a class="hub-back" href="https://senseitoolkit.com/japanese-hub.html">&lsaquo; <span class="jp">日本語</span> Study Hub</a>

  <header>
    <div class="seal" aria-hidden="true">文</div>
    <div class="brand">
      <h1>文法</h1>
      <p>Japanese grammar · N5 → N3 patterns, with drills</p>
    </div>
    <a class="hublink" href="index.html">← Hub</a>
  </header>

  <div class="tabs" role="tablist" aria-label="Mode">
    <button class="tab" role="tab" aria-selected="true" id="tab-learn" data-mode="learn">Learn <span class="jp">学ぶ</span></button>
    <button class="tab" role="tab" aria-selected="false" id="tab-quiz" data-mode="quiz">Drill <span class="jp">問題</span></button>
  </div>

  <div class="controls">
    <div class="ctl-row">
      <span class="ctl-label">Level</span>
      <div class="chips" id="levels"></div>
      <div class="switches">
        <button class="switch" id="furi-toggle" aria-pressed="true" aria-label="Toggle furigana"><span>Furigana</span><span class="track" aria-hidden="true"></span></button>
        <button class="switch" id="en-toggle" aria-pressed="true" aria-label="Toggle English"><span>English</span><span class="track" aria-hidden="true"></span></button>
      </div>
    </div>
  </div>

  <section id="learn-panel">
    <div class="card" id="learn-card"></div>
    <div class="nav">
      <button id="prev-btn">‹ Prev</button>
      <span class="counter" id="counter">1 / 1</span>
      <button id="next-btn">Next ›</button>
      <button id="shuffle-btn" title="Shuffle">⤮ Shuffle</button>
    </div>
  </section>

  <section id="quiz-panel" class="hidden">
    <div class="score-bar">
      <div class="stat"><b id="s-score">0</b><span>Correct</span></div>
      <div class="stat"><b id="s-total">0</b><span>Asked</span></div>
      <div class="stat"><b id="s-streak">0</b><span>Streak</span></div>
      <div class="stat"><b id="s-acc">—</b><span>Accuracy</span></div>
      <button class="reset" id="reset-btn">Reset</button>
    </div>
    <div class="quiz-card">
      <div class="stamp" id="stamp" aria-hidden="true">正</div>
      <div class="q-prompt" id="q-prompt"></div>
      <div class="choices" id="q-choices"></div>
      <div class="quiz-foot">
        <span class="verdict" id="q-verdict" aria-live="polite"></span>
        <button class="next-btn" id="q-next">Next ›</button>
      </div>
    </div>
  </section>

  <footer>
    Learn keys: <b>← →</b> move · Drill keys: <b>1–4</b> answer, <b>Enter</b> next<br>
    <span id="g-count">0</span> grammar points · N5 → N3
  </footer>
</div>

<script>
/* ===== Grammar data =====
   Each point: lv level; f the pattern; m short meaning; note explanation;
   ex an array of example objects {s:[segments], en:"translation"}.
   Each segment is [base] or [base,ruby]; the target pattern token carries a
   3rd value 1 so it can be highlighted (Learn) or blanked (Drill).
   q: distractor forms for the drill. The drill blanks the marked token of ex[0]. */
const G = [
  /* ============================ N5 ============================ */
  {lv:"N5",f:"は",m:"topic marker — “as for…”",note:"Marks the topic of the sentence: the thing you are talking about. The comment about it follows.",
   ex:[
     {s:[["私","わたし"],["は","",1],["学生","がくせい"],["です"]],en:"I am a student."},
     {s:[["これ"],["は","",1],["本","ほん"],["です"]],en:"This is a book."},
     {s:[["田中","たなか"],["さん"],["は","",1],["先生","せんせい"],["です"]],en:"Mr. Tanaka is a teacher."}
   ],q:["が","を","に"]},
  {lv:"N5",f:"が",m:"subject marker",note:"Marks the grammatical subject — often new information, or the thing liked / able / existing. Used with 好き, 上手, ある／いる, わかる.",
   ex:[
     {s:[["猫","ねこ"],["が","",1],["好","す"],["き"],["です"]],en:"I like cats."},
     {s:[["時間","じかん"],["が","",1],["ありません"]],en:"There is no time."},
     {s:[["日本語","にほんご"],["が","",1],["分","わ"],["かります"]],en:"I understand Japanese."}
   ],q:["は","を","へ"]},
  {lv:"N5",f:"を",m:"direct-object marker",note:"Marks the direct object — the thing the action is done to.",
   ex:[
     {s:[["パン"],["を","",1],["食","た"],["べます"]],en:"I eat bread."},
     {s:[["水","みず"],["を","",1],["飲","の"],["みます"]],en:"I drink water."},
     {s:[["テレビ"],["を","",1],["見","み"],["ます"]],en:"I watch TV."}
   ],q:["が","に","で"]},
  {lv:"N5",f:"に (時・場所)",m:"time / destination / location of existence",note:"Marks a point in time (七時に), a destination (学校に), or where something exists (部屋に).",
   ex:[
     {s:[["七時","しちじ"],["に","",1],["起","お"],["きます"]],en:"I wake up at seven."},
     {s:[["部屋","へや"],["に","",1],["猫","ねこ"],["が"],["います"]],en:"There is a cat in the room."},
     {s:[["友達","ともだち"],["に","",1],["会","あ"],["います"]],en:"I meet a friend."}
   ],q:["を","で","と"]},
  {lv:"N5",f:"で",m:"place of action / means",note:"Marks where an action happens (家で) or the means or tool used (バスで, 箸で).",
   ex:[
     {s:[["バス"],["で","",1],["行","い"],["きます"]],en:"I go by bus."},
     {s:[["図書館","としょかん"],["で","",1],["勉強","べんきょう"],["します"]],en:"I study at the library."},
     {s:[["箸","はし"],["で","",1],["食","た"],["べます"]],en:"I eat with chopsticks."}
   ],q:["に","を","へ"]},
  {lv:"N5",f:"へ",m:"direction (to / toward)",note:"Marks the direction of movement. Often interchangeable with destination に; へ stresses the direction.",
   ex:[
     {s:[["学校","がっこう"],["へ","",1],["行","い"],["きます"]],en:"I go to school."},
     {s:[["日本","にほん"],["へ","",1],["帰","かえ"],["ります"]],en:"I return to Japan."},
     {s:[["右","みぎ"],["へ","",1],["曲","ま"],["がってください"]],en:"Please turn to the right."}
   ],q:["で","を","が"]},
  {lv:"N5",f:"と",m:"and / with (noun)",note:"Joins nouns exhaustively (A と B = A and B), or marks the person you do something with.",
   ex:[
     {s:[["友達","ともだち"],["と","",1],["行","い"],["きます"]],en:"I go with a friend."},
     {s:[["パン"],["と","",1],["卵","たまご"],["を"],["買","か"],["います"]],en:"I buy bread and eggs."},
     {s:[["母","はは"],["と","",1],["話","はな"],["します"]],en:"I talk with my mother."}
   ],q:["も","を","に"]},
  {lv:"N5",f:"も",m:"also / too",note:"Replaces は or が to mean “also / too.” 私も = me too.",
   ex:[
     {s:[["私","わたし"],["も","",1],["行","い"],["きます"]],en:"I will go too."},
     {s:[["これ"],["も","",1],["ください"]],en:"This one too, please."},
     {s:[["彼","かれ"],["も","",1],["学生","がくせい"],["です"]],en:"He is a student too."}
   ],q:["は","が","を"]},
  {lv:"N5",f:"の",m:"possessive / noun link",note:"Links two nouns: A の B = B of A. 私の本 = my book.",
   ex:[
     {s:[["私","わたし"],["の","",1],["本","ほん"],["です"]],en:"It is my book."},
     {s:[["日本語","にほんご"],["の","",1],["先生","せんせい"],["です"]],en:"A Japanese teacher."},
     {s:[["誰","だれ"],["の","",1],["傘","かさ"],["ですか"]],en:"Whose umbrella is it?"}
   ],q:["が","を","と"]},
  {lv:"N5",f:"か (疑問)",m:"question particle",note:"Placed at the end of a sentence to make it a question.",
   ex:[
     {s:[["これ"],["は"],["本","ほん"],["です"],["か","",1]],en:"Is this a book?"},
     {s:[["学生","がくせい"],["です"],["か","",1]],en:"Are you a student?"},
     {s:[["何","なに"],["を"],["食","た"],["べます"],["か","",1]],en:"What will you eat?"}
   ],q:["ね","よ","の"]},
  {lv:"N5",f:"ね / よ",m:"sentence-final feeling",note:"ね seeks agreement (“…right?”); よ informs or emphasizes new information for the listener.",
   ex:[
     {s:[["いい"],["天気","てんき"],["です"],["ね","",1]],en:"Nice weather, isn’t it?"},
     {s:[["これ"],["、"],["おいしい"],["です"],["よ","",1]],en:"This is tasty, you know."},
     {s:[["明日","あした"],["休","やす"],["み"],["です"],["ね","",1]],en:"Tomorrow’s a day off, right?"}
   ],q:["よ","か","の"]},
  {lv:"N5",f:"〜から〜まで",m:"from … to …",note:"から marks a start point (time or place), まで the end point.",
   ex:[
     {s:[["九時","くじ"],["から","",1],["五時","ごじ"],["まで"],["働","はたら"],["きます"]],en:"I work from nine to five."},
     {s:[["駅","えき"],["から","",1],["家","いえ"],["まで"],["歩","ある"],["きます"]],en:"I walk from the station to home."},
     {s:[["月曜","げつよう"],["から","",1],["金曜","きんよう"],["まで"],["学校","がっこう"],["があります"]],en:"There is school from Monday to Friday."}
   ],q:["まで","より","だけ"]},
  {lv:"N5",f:"〜より〜のほうが",m:"comparison — A more than B",note:"より marks the standard of comparison; のほうが marks the one that is more.",
   ex:[
     {s:[["犬","いぬ"],["より","",1],["猫","ねこ"],["のほうが"],["好","す"],["きです"]],en:"I like cats more than dogs."},
     {s:[["今日","きょう"],["は"],["昨日","きのう"],["より","",1],["暑","あつ"],["いです"]],en:"Today is hotter than yesterday."},
     {s:[["バス"],["より","",1],["電車","でんしゃ"],["のほうが"],["速","はや"],["いです"]],en:"The train is faster than the bus."}
   ],q:["から","まで","だけ"]},
  {lv:"N5",f:"〜たい",m:"want to (do)",note:"Verb stem + たい expresses the speaker’s desire to do something. 行きます → 行きたい.",
   ex:[
     {s:[["日本","にほん"],["へ"],["行","い"],["きたい","",1],["です"]],en:"I want to go to Japan."},
     {s:[["水","みず"],["が"],["飲","の"],["みたい","",1],["です"]],en:"I want to drink water."},
     {s:[["何","なに"],["が"],["食","た"],["べたい","",1],["ですか"]],en:"What do you want to eat?"}
   ],q:["たくない","た","て"]},
  {lv:"N5",f:"〜てください",m:"please do …",note:"Te-form + ください makes a polite request.",
   ex:[
     {s:[["見","み"],["てください","",1]],en:"Please look."},
     {s:[["ちょっと"],["待","ま"],["ってください","",1]],en:"Please wait a moment."},
     {s:[["もう"],["一度","いちど"],["言","い"],["ってください","",1]],en:"Please say it once more."}
   ],q:["たいです","ます","ない"]},
  {lv:"N5",f:"〜ないでください",m:"please don’t …",note:"Negative ない-stem + でください asks someone not to do something.",
   ex:[
     {s:[["ここ"],["で"],["写真","しゃしん"],["を"],["撮","と"],["らないでください","",1]],en:"Please don’t take photos here."},
     {s:[["心配","しんぱい"],["しないでください","",1]],en:"Please don’t worry."},
     {s:[["入","はい"],["らないでください","",1]],en:"Please don’t come in."}
   ],q:["ってください","ります","りたい"]},
  {lv:"N5",f:"〜てもいいです",m:"may … / it’s okay to …",note:"Te-form + もいいです gives or asks permission.",
   ex:[
     {s:[["入","はい"],["ってもいいです","",1],["か"]],en:"May I come in?"},
     {s:[["写真","しゃしん"],["を"],["撮","と"],["ってもいいです","",1]],en:"You may take photos."},
     {s:[["帰","かえ"],["ってもいいです","",1],["か"]],en:"May I go home?"}
   ],q:["てください","たい","ないで"]},
  {lv:"N5",f:"〜てはいけません",m:"must not … (prohibition)",note:"Te-form + はいけません forbids an action.",
   ex:[
     {s:[["ここ"],["に"],["入","はい"],["ってはいけません","",1]],en:"You must not enter here."},
     {s:[["ここ"],["で"],["たばこ"],["を"],["吸","す"],["ってはいけません","",1]],en:"You must not smoke here."},
     {s:[["写真","しゃしん"],["を"],["撮","と"],["ってはいけません","",1]],en:"You must not take photos."}
   ],q:["てもいいです","てください","りたいです"]},
  {lv:"N5",f:"〜ています",m:"ongoing action / state",note:"Te-form + います = an action in progress (食べています) or a continuing state (住んでいます).",
   ex:[
     {s:[["今","いま"],["、"],["食","た"],["べています","",1]],en:"I am eating right now."},
     {s:[["東京","とうきょう"],["に"],["住","す"],["んでいます","",1]],en:"I live in Tokyo."},
     {s:[["雨","あめ"],["が"],["降","ふ"],["っています","",1]],en:"It is raining."}
   ],q:["ました","たい","ます"]},
  {lv:"N5",f:"〜てから",m:"after doing …",note:"Te-form + から = after one action, then the next. The order of events is the focus.",
   ex:[
     {s:[["ご飯","ごはん"],["を"],["食","た"],["べてから","",1],["、"],["出","で"],["かけます"]],en:"After eating, I go out."},
     {s:[["宿題","しゅくだい"],["を"],["してから","",1],["、"],["遊","あそ"],["びます"]],en:"After homework, I play."},
     {s:[["手","て"],["を"],["洗","あら"],["ってから","",1],["、"],["食","た"],["べます"]],en:"I eat after washing my hands."}
   ],q:["べないで","べたり","べると"]},
  {lv:"N5",f:"〜から (理由)",m:"because (subjective)",note:"Plain or polite clause + から gives a reason. Speaker-centred; common for opinions and requests.",
   ex:[
     {s:[["寒","さむ"],["い"],["から","",1],["、"],["休","やす"],["みます"]],en:"Because it’s cold, I’ll rest."},
     {s:[["高","たか"],["い"],["から","",1],["、"],["買","か"],["いません"]],en:"Because it’s expensive, I won’t buy it."},
     {s:[["忙","いそが"],["しい"],["から","",1],["、"],["行","い"],["けません"]],en:"Because I’m busy, I can’t go."}
   ],q:["のに","まで","と"]},
  {lv:"N5",f:"〜が、",m:"but / although",note:"Connects two clauses with a soft contrast: A but B.",
   ex:[
     {s:[["高","たか"],["いです"],["が","",1],["、"],["いいです"]],en:"It’s expensive, but it’s good."},
     {s:[["食","た"],["べたいです"],["が","",1],["、"],["お金","おかね"],["がありません"]],en:"I want to eat, but I have no money."},
     {s:[["難","むずか"],["しいです"],["が","",1],["、"],["面白","おもしろ"],["いです"]],en:"It’s hard, but interesting."}
   ],q:["から","ので","し"]},
  {lv:"N5",f:"〜ましょう / ませんか",m:"let’s … / shall we …?",note:"ましょう proposes doing something together; ませんか invites more softly.",
   ex:[
     {s:[["一緒","いっしょ"],["に"],["行","い"],["きましょう","",1]],en:"Let’s go together."},
     {s:[["お茶","おちゃ"],["を"],["飲","の"],["みませんか","",1]],en:"Won’t you have some tea?"},
     {s:[["少","すこ"],["し"],["休","やす"],["みましょう","",1]],en:"Let’s take a short break."}
   ],q:["ません","たい","ました"]},
  {lv:"N5",f:"です",m:"copula — to be (polite)",note:"Attaches to nouns and な-adjectives to make a polite statement: X です = it is X.",
   ex:[
     {s:[["これ"],["は"],["犬","いぬ"],["です","",1]],en:"This is a dog."},
     {s:[["私","わたし"],["は"],["田中","たなか"],["です","",1]],en:"I am Tanaka."},
     {s:[["今日","きょう"],["は"],["月曜日","げつようび"],["です","",1]],en:"Today is Monday."}
   ],q:["でした","だ","ます"]},
  {lv:"N5",f:"〜じゃありません",m:"is not (negative copula)",note:"Negative of です. じゃありません (casual: じゃない) negates a noun or な-adjective.",
   ex:[
     {s:[["学生","がくせい"],["じゃありません","",1]],en:"I am not a student."},
     {s:[["これ"],["は"],["私","わたし"],["の"],["じゃありません","",1]],en:"This is not mine."},
     {s:[["暇","ひま"],["じゃありません","",1]],en:"I am not free."}
   ],q:["です","でした","ます"]},
  {lv:"N5",f:"でした",m:"was (past copula)",note:"Past tense of です: X でした = it was X.",
   ex:[
     {s:[["昨日","きのう"],["は"],["休","やす"],["み"],["でした","",1]],en:"Yesterday was a day off."},
     {s:[["試験","しけん"],["は"],["簡単","かんたん"],["でした","",1]],en:"The exam was easy."},
     {s:[["先週","せんしゅう"],["は"],["雨","あめ"],["でした","",1]],en:"Last week was rainy."}
   ],q:["です","じゃない","ます"]},
  {lv:"N5",f:"〜くないです (い形)",m:"い-adjective — negative",note:"い-adjectives drop い and add くないです (or くありません) to become negative.",
   ex:[
     {s:[["この"],["本","ほん"],["は"],["面白","おもしろ"],["くないです","",1]],en:"This book is not interesting."},
     {s:[["今日","きょう"],["は"],["寒","さむ"],["くないです","",1]],en:"It’s not cold today."},
     {s:[["あまり"],["高","たか"],["くないです","",1]],en:"It’s not very expensive."}
   ],q:["い","かった","く"]},
  {lv:"N5",f:"〜かったです (い形)",m:"い-adjective — past",note:"い-adjectives drop い and add かったです to make the past tense.",
   ex:[
     {s:[["映画","えいが"],["は"],["面白","おもしろ"],["かったです","",1]],en:"The movie was interesting."},
     {s:[["昨日","きのう"],["は"],["暑","あつ"],["かったです","",1]],en:"Yesterday was hot."},
     {s:[["テスト"],["は"],["難","むずか"],["しかったです","",1]],en:"The test was hard."}
   ],q:["い","くない","く"]},
  {lv:"N5",f:"〜な (な形)",m:"な-adjective + noun",note:"な-adjectives take な before a noun: 静かな部屋 = a quiet room.",
   ex:[
     {s:[["静","しず"],["か"],["な","",1],["部屋","へや"],["です"]],en:"It is a quiet room."},
     {s:[["彼","かれ"],["は"],["親切","しんせつ"],["な","",1],["人","ひと"],["です"]],en:"He is a kind person."},
     {s:[["きれい"],["な","",1],["花","はな"],["ですね"]],en:"What a pretty flower."}
   ],q:["の","い","だ"]},
  {lv:"N5",f:"あります / います",m:"existence — there is …",note:"あります for inanimate things, います for living things. The thing that exists is marked with が.",
   ex:[
     {s:[["机","つくえ"],["の"],["上","うえ"],["に"],["本","ほん"],["が"],["あります","",1]],en:"There is a book on the desk."},
     {s:[["部屋","へや"],["に"],["猫","ねこ"],["が"],["います","",1]],en:"There is a cat in the room."},
     {s:[["近","ちか"],["く"],["に"],["コンビニ"],["が"],["あります","",1]],en:"There is a convenience store nearby."}
   ],q:["います","です","ました"]},
  {lv:"N5",f:"まだ / もう",m:"still / not yet · already",note:"もう = already (with affirmative) ; まだ = still / not yet (often with 〜ていません).",
   ex:[
     {s:[["もう","",1],["食","た"],["べました"]],en:"I have already eaten."},
     {s:[["まだ","",1],["食","た"],["べていません"]],en:"I haven’t eaten yet."},
     {s:[["もう","",1],["終","お"],["わりました"]],en:"It is already finished."}
   ],q:["まだ","よく","あまり"]},
  {lv:"N5",f:"〜がほしい",m:"want (a thing)",note:"Noun + がほしい expresses wanting to have something (a thing, not an action).",
   ex:[
     {s:[["新","あたら"],["しい"],["車","くるま"],["がほしいです","",1]],en:"I want a new car."},
     {s:[["時間","じかん"],["がほしいです","",1]],en:"I want (more) time."},
     {s:[["何","なに"],["がほしいです","",1],["か"]],en:"What do you want?"}
   ],q:["をください","がいい","がある"]},
  {lv:"N5",f:"〜くなる / になる",m:"become …",note:"い-adj → くなる, な-adj/noun → になる. Expresses a change of state.",
   ex:[
     {s:[["寒","さむ"],["くなりました","",1]],en:"It has gotten cold."},
     {s:[["日本語","にほんご"],["が"],["上手","じょうず"],["になりました","",1]],en:"My Japanese has gotten better."},
     {s:[["元気","げんき"],["になりました","",1]],en:"I have gotten well."}
   ],q:["いです","かった","くない"]},
  {lv:"N5",f:"これ / それ / あれ",m:"this / that / that over there",note:"これ = near me, それ = near you, あれ = away from both. これ etc. stand alone; この etc. modify a noun.",
   ex:[
     {s:[["これ","",1],["は"],["何","なん"],["ですか"]],en:"What is this?"},
     {s:[["それ","",1],["は"],["ペン"],["です"]],en:"That is a pen."},
     {s:[["あれ","",1],["は"],["富士山","ふじさん"],["です"]],en:"That over there is Mt. Fuji."}
   ],q:["この","ここ","こちら"]},
  {lv:"N5",f:"〜ました",m:"past polite",note:"ます → ました makes the polite past tense.",
   ex:[
     {s:[["昨日","きのう"],["、"],["映画","えいが"],["を"],["見","み"],["ました","",1]],en:"I watched a movie yesterday."},
     {s:[["朝ご飯","あさごはん"],["を"],["食","た"],["べました","",1]],en:"I ate breakfast."},
     {s:[["友達","ともだち"],["に"],["会","あ"],["いました","",1]],en:"I met a friend."}
   ],q:["ます","たい","ません"]},

  /* ============================ N4 ============================ */
  {lv:"N4",f:"〜て形 (続き)",m:"te-form: linking actions",note:"The te-form chains actions in sequence (起きて、食べて、行きます) or links reasons and states.",
   ex:[
     {s:[["朝","あさ"],["起","お"],["きて","",1],["、"],["ご飯","ごはん"],["を"],["食","た"],["べます"]],en:"I get up in the morning and eat."},
     {s:[["駅","えき"],["へ"],["行","い"],["って","",1],["、"],["電車","でんしゃ"],["に"],["乗","の"],["ります"]],en:"I go to the station and get on the train."},
     {s:[["安","やす"],["くて","",1],["、"],["おいしいです"]],en:"It’s cheap and tasty."}
   ],q:["きたり","きながら","きてから"]},
  {lv:"N4",f:"〜たことがある",m:"have done before (experience)",note:"Past plain verb + ことがある states that you have the experience of doing something.",
   ex:[
     {s:[["日本","にほん"],["へ"],["行","い"],["ったことがあります","",1]],en:"I have been to Japan."},
     {s:[["寿司","すし"],["を"],["食","た"],["べたことがあります","",1]],en:"I have eaten sushi before."},
     {s:[["富士山","ふじさん"],["を"],["見","み"],["たことがありません","",1]],en:"I have never seen Mt. Fuji."}
   ],q:["きたいです","っています","ってください"]},
  {lv:"N4",f:"〜たり〜たりする",m:"do things like A and B",note:"Lists representative actions (not exhaustive): 読んだり寝たりします = read, sleep, and so on.",
   ex:[
     {s:[["本","ほん"],["を"],["読","よ"],["んだり","",1],["、"],["音楽","おんがく"],["を"],["聞","き"],["いたりします"]],en:"I read books, listen to music, and so on."},
     {s:[["週末","しゅうまつ"],["は"],["掃除","そうじ"],["したり","",1],["、"],["洗濯","せんたく"],["したりします"]],en:"On weekends I clean, do laundry, and such."},
     {s:[["泣","な"],["いたり","",1],["笑","わら"],["ったりしました"]],en:"I cried and laughed and so on."}
   ],q:["んで","みながら","んだら"]},
  {lv:"N4",f:"〜ながら",m:"while doing (two actions at once)",note:"Verb stem + ながら = doing one action while doing another. The main action is the second clause.",
   ex:[
     {s:[["音楽","おんがく"],["を"],["聞","き"],["きながら","",1],["、"],["勉強","べんきょう"],["します"]],en:"I study while listening to music."},
     {s:[["テレビ"],["を"],["見","み"],["ながら","",1],["、"],["食","た"],["べます"]],en:"I eat while watching TV."},
     {s:[["歩","ある"],["きながら","",1],["、"],["話","はな"],["しました"]],en:"We talked while walking."}
   ],q:["いて","いたり","いたら"]},
  {lv:"N4",f:"〜ので",m:"because (objective, softer)",note:"Plain clause + ので gives a reason that feels factual and polite — softer than から. Good for excuses and explanations.",
   ex:[
     {s:[["忙","いそが"],["しい"],["ので","",1],["、"],["行","い"],["けません"]],en:"I can’t go because I’m busy."},
     {s:[["雨","あめ"],["な"],["ので","",1],["、"],["出","で"],["かけません"]],en:"Since it’s raining, I won’t go out."},
     {s:[["道","みち"],["が"],["込","こ"],["んでいる"],["ので","",1],["、"],["遅","おく"],["れます"]],en:"I’ll be late because the road is crowded."}
   ],q:["のに","から","と"]},
  {lv:"N4",f:"〜のに",m:"even though / despite",note:"Plain clause + のに marks an unexpected, often frustrating contrast: A, even though B.",
   ex:[
     {s:[["勉強","べんきょう"],["した"],["のに","",1],["、"],["試験","しけん"],["ができませんでした"]],en:"Even though I studied, I failed the exam."},
     {s:[["約束","やくそく"],["した"],["のに","",1],["、"],["来","こ"],["ませんでした"]],en:"He didn’t come, even though he promised."},
     {s:[["高","たか"],["い"],["のに","",1],["、"],["おいしくないです"]],en:"It’s expensive, yet it isn’t tasty."}
   ],q:["ので","から","し"]},
  {lv:"N4",f:"〜ば (条件)",m:"if … (general condition)",note:"Conditional ば-form states a general or hypothetical condition: 安ければ = if it’s cheap.",
   ex:[
     {s:[["安","やす"],["ければ","",1],["、"],["買","か"],["います"]],en:"If it’s cheap, I’ll buy it."},
     {s:[["時間","じかん"],["が"],["あれば","",1],["、"],["行","い"],["きます"]],en:"If I have time, I’ll go."},
     {s:[["押","お"],["せば","",1],["、"],["開","あ"],["きます"]],en:"If you push it, it opens."}
   ],q:["いと","いので","くて"]},
  {lv:"N4",f:"〜たら",m:"if / when (then …)",note:"Past plain + ら sets up “once/if X happens, then Y.” The most flexible conditional.",
   ex:[
     {s:[["着","つ"],["いたら","",1],["、"],["電話","でんわ"],["します"]],en:"When I arrive, I’ll call."},
     {s:[["雨","あめ"],["が"],["降","ふ"],["ったら","",1],["、"],["行","い"],["きません"]],en:"If it rains, I won’t go."},
     {s:[["暇","ひま"],["だったら","",1],["、"],["遊","あそ"],["びに来てください"]],en:"If you’re free, come hang out."}
   ],q:["いても","きながら","けば"]},
  {lv:"N4",f:"〜と (自然結果)",m:"whenever / and then (natural result)",note:"Plain nonpast + と = whenever A happens, B naturally follows. Used for rules, directions, habits.",
   ex:[
     {s:[["春","はる"],["に"],["なる"],["と","",1],["、"],["暖","あたた"],["かくなります"]],en:"When spring comes, it gets warm."},
     {s:[["ボタン"],["を"],["押","お"],["す"],["と","",1],["、"],["ドア"],["が"],["開","あ"],["きます"]],en:"When you press the button, the door opens."},
     {s:[["右","みぎ"],["に"],["曲","ま"],["がる"],["と","",1],["、"],["駅","えき"],["があります"]],en:"If you turn right, there’s the station."}
   ],q:["たら","ば","ので"]},
  {lv:"N4",f:"〜なければならない",m:"must / have to",note:"Negative ない-stem + ければならない = obligation. Casual: 〜なきゃ.",
   ex:[
     {s:[["行","い"],["かなければなりません","",1]],en:"I have to go."},
     {s:[["宿題","しゅくだい"],["を"],["しなければなりません","",1]],en:"I have to do my homework."},
     {s:[["薬","くすり"],["を"],["飲","の"],["まなければなりません","",1]],en:"I have to take medicine."}
   ],q:["ってもいいです","きたいです","ってください"]},
  {lv:"N4",f:"〜なくてもいい",m:"don’t have to",note:"Negative ない-stem → なくてもいい = it’s fine not to do it.",
   ex:[
     {s:[["急","いそ"],["がなくてもいいです","",1]],en:"You don’t have to hurry."},
     {s:[["来","こ"],["なくてもいいです","",1]],en:"You don’t have to come."},
     {s:[["全部","ぜんぶ"],["食","た"],["べなくてもいいです","",1]],en:"You don’t have to eat it all."}
   ],q:["がなければ","ぎたい","いでください"]},
  {lv:"N4",f:"〜ようと思う",m:"intend to / be thinking of …ing",note:"Volitional + と思う expresses a decision or intention the speaker currently holds.",
   ex:[
     {s:[["電車","でんしゃ"],["で"],["行","い"],["こう","",1],["と"],["思","おも"],["います"]],en:"I’m thinking of going by train."},
     {s:[["来年","らいねん"],["、"],["留学","りゅうがく"],["しよう","",1],["と"],["思","おも"],["います"]],en:"I’m thinking of studying abroad next year."},
     {s:[["今日","きょう"],["は"],["早","はや"],["く"],["寝","ね"],["よう","",1],["と"],["思","おも"],["います"]],en:"I think I’ll sleep early today."}
   ],q:["きたい","くつもり","きます"]},
  {lv:"N4",f:"〜つもりだ",m:"intend to / plan to",note:"Plain verb + つもりだ = a settled intention or plan.",
   ex:[
     {s:[["週末","しゅうまつ"],["に"],["会","あ"],["うつもりです","",1]],en:"I plan to meet (them) this weekend."},
     {s:[["来月","らいげつ"],["、"],["引","ひ"],["っ"],["越","こ"],["すつもりです","",1]],en:"I plan to move next month."},
     {s:[["たばこ"],["を"],["やめるつもりです","",1]],en:"I intend to quit smoking."}
   ],q:["いたいです","おうと思う","うはずだ"]},
  {lv:"N4",f:"可能形 (can)",m:"potential form — be able to",note:"Verbs change to show ability: 食べる→食べられる, 読む→読める, する→できる.",
   ex:[
     {s:[["漢字","かんじ"],["が"],["読","よ"],["めます","",1]],en:"I can read kanji."},
     {s:[["日本語","にほんご"],["が"],["話","はな"],["せます","",1]],en:"I can speak Japanese."},
     {s:[["朝","あさ"],["早","はや"],["く"],["起","お"],["きられます","",1]],en:"I can get up early."}
   ],q:["みます","みたい","みません"]},
  {lv:"N4",f:"〜そうだ (様態)",m:"looks like / seems (from appearance)",note:"Stem of い-adj / verb + そう = a judgement from appearance. おいしそう = looks tasty.",
   ex:[
     {s:[["この"],["ケーキ"],["は"],["おいしそうです","",1]],en:"This cake looks delicious."},
     {s:[["雨","あめ"],["が"],["降","ふ"],["りそうです","",1]],en:"It looks like it’s going to rain."},
     {s:[["彼","かれ"],["は"],["忙","いそが"],["しそうです","",1]],en:"He looks busy."}
   ],q:["おいしいそうです","おいしらしい","おいしみたい"]},
  {lv:"N4",f:"〜んです",m:"explanatory — “it’s that…”",note:"んです / のです adds explanation, reason, or emphasis to a statement or question.",
   ex:[
     {s:[["頭","あたま"],["が"],["痛","いた"],["いんです","",1]],en:"It’s that my head hurts."},
     {s:[["どうして"],["遅","おく"],["れた"],["んです","",1],["か"]],en:"Why is it that you’re late?"},
     {s:[["日本","にほん"],["へ"],["行","い"],["きたい"],["んです","",1]],en:"The thing is, I want to go to Japan."}
   ],q:["そうです","でした","たい"]},
  {lv:"N4",f:"あげる / くれる / もらう",m:"giving and receiving",note:"あげる = I give to others; くれる = someone gives to me/my side; もらう = I receive.",
   ex:[
     {s:[["私","わたし"],["は"],["友達","ともだち"],["に"],["プレゼント"],["を"],["あげました","",1]],en:"I gave my friend a present."},
     {s:[["友達","ともだち"],["が"],["私","わたし"],["に"],["本","ほん"],["を"],["くれました","",1]],en:"My friend gave me a book."},

  {lv:"N3",f:"〜せいで",m:"because of (negative cause)",note:"Noun + の / plain form + せいで blames a bad result on a cause.",
   ex:[
     {s:[["雨","あめ"],["の"],["せいで","",1],["、"],["試合","しあい"],["が"],["中止","ちゅうし"],["になりました"]],en:"Because of the rain, the match was cancelled."},
     {s:[["寝坊","ねぼう"],["した"],["せいで","",1],["、"],["電車","でんしゃ"],["に"],["遅","おく"],["れました"]],en:"I missed the train because I overslept."},
     {s:[["彼","かれ"],["の"],["せいで","",1],["、"],["計画","けいかく"],["が"],["失敗","しっぱい"],["しました"]],en:"The plan failed because of him."}
   ],q:["おかげで","ために","ので"]},
  {lv:"N3",f:"〜によると",m:"according to (source)",note:"Noun + によると cites the source of information, usually paired with そうだ / らしい at the end.",
   ex:[
     {s:[["天気予報","てんきよほう"],["によると","",1],["、"],["明日","あした"],["は"],["雨","あめ"],["だそうです"]],en:"According to the forecast, it’ll rain tomorrow."},
     {s:[["ニュース"],["によると","",1],["、"],["地震","じしん"],["があったそうです"]],en:"According to the news, there was an earthquake."},
     {s:[["彼","かれ"],["の"],["話","はなし"],["によると","",1],["、"],["来月","らいげつ"],["帰国","きこく"],["するらしいです"]],en:"According to him, he’ll return home next month."}
   ],q:["について","にとって","として"]},
  {lv:"N3",f:"〜について",m:"about / concerning",note:"Noun + について marks the topic that an action (speak, write, think) is concerned with.",
   ex:[
     {s:[["日本","にほん"],["の"],["歴史","れきし"],["について","",1],["、"],["勉強","べんきょう"],["しています"]],en:"I’m studying about Japanese history."},
     {s:[["その"],["問題","もんだい"],["について","",1],["、"],["話","はな"],["し合いました"]],en:"We discussed that problem."},
     {s:[["環境","かんきょう"],["について","",1],["、"],["レポート"],["を"],["書","か"],["きます"]],en:"I’ll write a report about the environment."}
   ],q:["によると","に対して","として"]},
  {lv:"N3",f:"〜に対して",m:"toward / against / in contrast to",note:"Noun + に対して marks the target of an attitude or action, or a contrast between two things.",
   ex:[
     {s:[["学生","がくせい"],["に対して","",1],["、"],["優","やさ"],["しいです"]],en:"He is kind toward students."},
     {s:[["親","おや"],["に対して","",1],["、"],["失礼","しつれい"],["なことを言いました"]],en:"I said something rude to my parents."},
     {s:[["その"],["意見","いけん"],["に対して","",1],["、"],["反対","はんたい"],["です"]],en:"I’m opposed to that opinion."}
   ],q:["について","によると","として"]},
  {lv:"N3",f:"〜として",m:"as / in the role of",note:"Noun + として marks a capacity, role, or status in which someone acts.",
   ex:[
     {s:[["医者","いしゃ"],["として","",1],["、"],["働","はたら"],["いています"]],en:"I work as a doctor."},
     {s:[["留学生","りゅうがくせい"],["として","",1],["、"],["日本","にほん"],["へ来ました"]],en:"I came to Japan as an exchange student."},
     {s:[["趣味","しゅみ"],["として","",1],["、"],["ピアノ"],["を"],["習","なら"],["っています"]],en:"As a hobby, I’m learning piano."}
   ],q:["について","にとって","に対して"]},
  {lv:"N3",f:"〜べきだ",m:"should / ought to (strong)",note:"Plain verb + べきだ states what is right or proper to do. Stronger than ほうがいい.",
   ex:[
     {s:[["もっと"],["勉強","べんきょう"],["する"],["べきです","",1]],en:"You should study more."},
     {s:[["約束","やくそく"],["は"],["守","まも"],["る"],["べきです","",1]],en:"You ought to keep your promises."},
     {s:[["若","わか"],["いうちに"],["、"],["いろいろ"],["経験","けいけん"],["する"],["べきです","",1]],en:"You should experience many things while young."}
   ],q:["ほうがいい","はずです","つもりです"]},
  {lv:"N3",f:"〜わけではない",m:"it’s not that … / not necessarily",note:"Plain form + わけではない softens or partially denies a conclusion someone might draw.",
   ex:[
     {s:[["嫌","きら"],["いな"],["わけではありません","",1]],en:"It’s not that I dislike it."},
     {s:[["全部","ぜんぶ"],["分","わ"],["かる"],["わけではありません","",1]],en:"It’s not that I understand everything."},
     {s:[["高","たか"],["いから"],["いいという"],["わけではありません","",1]],en:"Expensive doesn’t necessarily mean good."}
   ],q:["わけです","はずがない","かもしれない"]},
  {lv:"N3",f:"〜さえ〜ば",m:"if only … / as long as",note:"Noun + さえ + ば-clause = if only that one condition is met, the rest follows.",
   ex:[
     {s:[["お金","おかね"],["さえ","",1],["あれば"],["、"],["買","か"],["えます"]],en:"As long as I have money, I can buy it."},
     {s:[["君","きみ"],["さえ","",1],["いれば"],["、"],["ほかに何もいりません"]],en:"As long as I have you, I need nothing else."},
     {s:[["練習","れんしゅう"],["さえ","",1],["すれば"],["、"],["上手","じょうず"],["になります"]],en:"As long as you practise, you’ll improve."}
   ],q:["だけ","でも","ばかり"]},
  {lv:"N3",f:"〜たら〜のに",m:"if only … (regret / wish)",note:"A conditional + のに expresses regret about something contrary to fact: if only…, then…",
   ex:[
     {s:[["お金","おかね"],["があったら"],["、"],["買","か"],["える"],["のに","",1]],en:"If only I had money, I could buy it."},
     {s:[["もっと"],["早","はや"],["く"],["来","き"],["たら"],["、"],["会","あ"],["えた"],["のに","",1]],en:"If you’d come earlier, you could’ve met them."},
     {s:[["天気","てんき"],["がよかったら"],["、"],["行","い"],["けた"],["のに","",1]],en:"If the weather had been good, we could’ve gone."}
   ],q:["から","ので","けど"]},
  {lv:"N3",f:"〜ようとする",m:"try to / be about to",note:"Volitional + とする = make an effort to do, or be on the verge of doing something.",
   ex:[
     {s:[["出","で"],["かけ"],["ようとした","",1],["とき"],["、"],["電話","でんわ"],["が"],["鳴","な"],["りました"]],en:"Just as I was about to go out, the phone rang."},
     {s:[["ドア"],["を"],["開","あ"],["け"],["ようとしました","",1],["が"],["、"],["開","あ"],["きませんでした"]],en:"I tried to open the door, but it wouldn’t open."},
     {s:[["寝","ね"],["ようとした","",1],["とき"],["、"],["地震","じしん"],["がありました"]],en:"Just as I was about to sleep, there was an earthquake."}
   ],q:["ることにした","るつもりだった","たばかり"]},
  {lv:"N3",f:"〜がする",m:"a smell / sound / feeling occurs",note:"Sensory noun (におい・音・味・感じ) + がする = perceive a smell, sound, taste, or sensation.",
   ex:[
     {s:[["いい"],["におい"],["がします","",1]],en:"There’s a nice smell."},
     {s:[["変","へん"],["な"],["音","おと"],["がします","",1]],en:"There’s a strange sound."},
     {s:[["めまい"],["がします","",1]],en:"I feel dizzy."}
   ],q:["をします","になります","があります"]},
  {lv:"N3",f:"〜に違いない",m:"must be / surely (strong certainty)",note:"Plain form + に違いない = the speaker is almost certain something is true.",
   ex:[
     {s:[["彼","かれ"],["は"],["知","し"],["っている"],["に違いない","",1]],en:"He must know."},
     {s:[["あの"],["店","みせ"],["は"],["おいしい"],["に違いありません","",1]],en:"That shop must be delicious."},
     {s:[["彼女","かのじょ"],["は"],["怒","おこ"],["っている"],["に違いない","",1]],en:"She must be angry."}
   ],q:["かもしれない","はずがない","でしょう"]},
  {lv:"N3",f:"〜たびに",m:"each time / whenever",note:"Plain verb or noun + の + たびに = every single time A happens, B also happens.",
   ex:[
     {s:[["彼","かれ"],["に"],["会","あ"],["う"],["たびに","",1],["、"],["けんかします"]],en:"Every time I meet him, we argue."},
     {s:[["この"],["曲","きょく"],["を"],["聞","き"],["く"],["たびに","",1],["、"],["故郷","こきょう"],["を"],["思","おも"],["い出します"]],en:"Whenever I hear this song, I remember my hometown."},
     {s:[["旅行","りょこう"],["の"],["たびに","",1],["、"],["お"],["土産","みやげ"],["を"],["買","か"],["います"]],en:"Each time I travel, I buy souvenirs."}
   ],q:["ながら","あいだに","うちに"]},
  {lv:"N3",f:"〜くらい / ほど",m:"to the extent that …",note:"Marks a degree by comparison: …くらい / …ほど shows how much, often with an extreme image.",
   ex:[
     {s:[["泣","な"],["きたい"],["くらい","",1],["、"],["うれしかったです"]],en:"I was so happy I could have cried."},
     {s:[["数","かぞ"],["えきれない"],["ほど","",1],["、"],["星","ほし"],["があります"]],en:"There are countless stars."},
     {s:[["死","し"],["ぬ"],["ほど","",1],["疲","つか"],["れました"]],en:"I’m dead tired."}
   ],q:["ばかり","だけ","さえ"]}
];

/* ===== state ===== */
const state={mode:"learn",level:"all",furigana:true,english:true,deck:[],idx:0,
  qDeck:[],qPos:0,qCur:null,answered:false,score:0,total:0,streak:0};
const $=id=>document.getElementById(id);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function applyFuri(){document.body.classList.toggle("no-furi",!state.furigana);}
function applyEn(){document.body.classList.toggle("no-en",!state.english);}
function filtered(){return state.level==="all"?G:G.filter(g=>g.lv===state.level);}

/* render a segment array; opt.hi highlights the marked token, opt.blank blanks it */
function segHTML(segs,opt){
  opt=opt||{};
  return segs.map(s=>{
    const base=s[0], ruby=s[1], mark=s[2];
    if(mark===1 && opt.blank) return `<span class="blank">${"\u3000".repeat(2)}</span>`;
    let inner = ruby ? `<ruby>${base}<rt>${ruby}</rt></ruby>` : base;
    if(mark===1 && opt.hi) inner=`<mark class="hl">${inner}</mark>`;
    return inner;
  }).join("");
}

/* ===== levels ===== */
function buildLevels(){
  const box=$("levels");
  const items=[["all","All "+G.length],["N5","N5"],["N4","N4"],["N3","N3"]];
  box.innerHTML=items.map(([k,l])=>{
    const n=k==="all"?G.length:G.filter(g=>g.lv===k).length;
    const lbl=k==="all"?l:`${k} ${n}`;
    return `<button class="chip" data-lv="${k}" aria-pressed="${state.level===k}">${lbl}</button>`;
  }).join("");
  box.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{
    state.level=b.dataset.lv;
    box.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed",c===b));
    rebuild();
  });
}

/* ===== learn ===== */
function rebuild(){ state.deck=filtered(); state.idx=0; renderLearn(); newQuiz(); }
function renderLearn(){
  const g=state.deck[state.idx];
  const exs=g.ex.map(e=>`<div class="ex"><div class="jpx">${segHTML(e.s,{hi:true})}</div><div class="ex-en">${e.en}</div></div>`).join("");
  $("learn-card").innerHTML=`
    <span class="lvl-pill">${g.lv}</span>
    <div class="g-form">${g.f}</div>
    <div class="g-mean">${g.m}</div>
    <div class="g-note">${g.note}</div>
    <div class="ex-wrap"><div class="ex-label">Examples</div>${exs}</div>`;
  $("counter").textContent=`${state.idx+1} / ${state.deck.length}`;
}
function move(d){ state.idx=(state.idx+d+state.deck.length)%state.deck.length; renderLearn(); }

/* ===== quiz ===== */
function newQuiz(){
  const pool=filtered();
  if(state.qPos>=pool.length||!state.qDeck.length){state.qDeck=shuffle(pool);state.qPos=0;}
  const g=state.qDeck[state.qPos++]; state.qCur=g; state.answered=false;
  // answer = the marked token's base text from ex[0]
  const tok=g.ex[0].s.find(s=>s[2]===1);
  const answer=tok?tok[0]:g.f;
  const opts=shuffle([answer,...g.q]);
  $("q-prompt").innerHTML=`<span class="q-tag">Choose the form that fits</span>
    <div class="q-sent">${segHTML(g.ex[0].s,{blank:true})}</div>
    <div class="q-en">${g.ex[0].en}</div>`;
  const box=$("q-choices");
  box.innerHTML=opts.map((o,i)=>`<button class="choice" data-i="${i}">${o}</button>`).join("");
  [...box.children].forEach((btn,i)=>btn.onclick=()=>answer_(btn,opts[i]===answer,box,answer,g));
  $("q-verdict").textContent=""; $("q-verdict").className="verdict";
  $("q-next").classList.remove("show"); $("stamp").classList.remove("fire");
  applyFuri(); applyEn();
}
function answer_(btn,correct,box,answer,g){
  if(state.answered)return; state.answered=true; state.total++;
  const btns=[...box.querySelectorAll(".choice")];
  btns.forEach(b=>{b.disabled=true; if(b!==btn)b.classList.add("dim");});
  const correctBtn=btns.find(b=>b.textContent===answer);
  if(correct){
    btn.classList.remove("dim");btn.classList.add("correct");
    state.score++;state.streak++;
    $("q-verdict").innerHTML=`正解 — <span class="pt">${g.f}</span> · ${g.m}`;
    $("q-verdict").className="verdict ok";
    const st=$("stamp");st.classList.remove("fire");void st.offsetWidth;st.classList.add("fire");
  }else{
    btn.classList.remove("dim");btn.classList.add("wrong");
    if(correctBtn){correctBtn.classList.remove("dim");correctBtn.classList.add("correct");}
    state.streak=0;
    $("q-verdict").innerHTML=`不正解 — <span class="pt">${g.f}</span> · ${g.m}`;
    $("q-verdict").className="verdict no";
  }
  $("q-next").classList.add("show"); updateScore();
}
function updateScore(){
  $("s-score").textContent=state.score; $("s-total").textContent=state.total;
  $("s-streak").textContent=state.streak;
  $("s-acc").textContent=state.total?Math.round(state.score/state.total*100)+"%":"—";
}

/* ===== mode ===== */
function setMode(m){
  state.mode=m;
  $("tab-learn").setAttribute("aria-selected",m==="learn");
  $("tab-quiz").setAttribute("aria-selected",m==="quiz");
  $("learn-panel").classList.toggle("hidden",m!=="learn");
  $("quiz-panel").classList.toggle("hidden",m!=="quiz");
}

/* ===== wiring ===== */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>setMode(t.dataset.mode));
$("prev-btn").onclick=()=>move(-1);
$("next-btn").onclick=()=>move(1);
$("shuffle-btn").onclick=()=>{state.deck=shuffle(state.deck);state.idx=0;renderLearn();};
$("furi-toggle").onclick=()=>{state.furigana=!state.furigana;$("furi-toggle").setAttribute("aria-pressed",state.furigana);applyFuri();};
$("en-toggle").onclick=()=>{state.english=!state.english;$("en-toggle").setAttribute("aria-pressed",state.english);applyEn();};
$("q-next").onclick=newQuiz;
$("reset-btn").onclick=()=>{state.score=0;state.total=0;state.streak=0;updateScore();};
document.addEventListener("keydown",e=>{
  if(state.mode==="learn"){
    if(e.key==="ArrowLeft")move(-1); else if(e.key==="ArrowRight")move(1);
  }else{
    if(["1","2","3","4"].includes(e.key)){const b=$("q-choices").querySelector(`[data-i="${+e.key-1}"]`);if(b&&!b.disabled)b.click();}
    else if((e.key==="Enter"||e.key===" ")&&state.answered){e.preventDefault();newQuiz();}
  }
});

/* ===== init ===== */
$("g-count").textContent=G.length;
buildLevels(); applyFuri(); applyEn(); rebuild(); setMode("learn");
</script>
</body>
</html>
