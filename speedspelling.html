<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speed Spelling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fef6e4; --surface: #ffffff; --primary: #f582ae; --primary-dark: #e0608e;
      --accent: #8bd3dd; --accent-dark: #6bbfc9; --warning: #f3d250; --danger: #e85d75;
      --success: #4ecdc4; --success-dark: #3ab5ad; --text: #2d334a; --text-muted: #8b8fa3;
      --border: #e8e0d4; --shadow-lg: 0 12px 40px rgba(45,51,74,0.12);
      --radius: 16px; --radius-sm: 10px; --radius-pill: 999px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before, body::after { content: ''; position: fixed; border-radius: 50%; z-index: 0; opacity: 0.12; pointer-events: none; }
    body::before { width: 500px; height: 500px; background: var(--accent); top: -120px; left: -100px; animation: floatBlob 22s ease-in-out infinite; }
    body::after { width: 400px; height: 400px; background: var(--warning); bottom: -80px; right: -60px; animation: floatBlob 26s ease-in-out infinite reverse; }
    @keyframes floatBlob { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(25px,-18px) scale(1.04)} 66%{transform:translate(-18px,12px) scale(0.96)} }
    .app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
    .header { text-align: center; margin-bottom: 16px; }
    .header h1 { font-size: clamp(26px,5vw,40px); font-weight: 700; background: linear-gradient(135deg, var(--accent-dark), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.15; }
    .header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
    .score-strip { display: flex; justify-content: center; gap: 20px; margin-bottom: 14px; flex-wrap: wrap; }
    .score-item { display: flex; align-items: center; gap: 5px; font-size: 14px; font-weight: 500; }
    .score-item .num { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; }
    .score-item.current .num { color: var(--success); }
    .score-item.best .num { color: var(--warning); }
    .score-item.words .num { color: var(--accent-dark); }
    .level-bar { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
    .level-btn { font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 500; padding: 7px 14px; border: 2px solid var(--border); border-radius: var(--radius-pill); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .level-btn:hover { border-color: var(--accent); color: var(--accent-dark); }
    .level-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 2px 10px rgba(139,211,221,0.3); }
    .speed-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
    .speed-btn { font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 600; padding: 7px 18px; border: 2px solid var(--border); border-radius: var(--radius-pill); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .speed-btn:hover { border-color: var(--primary); color: var(--primary); }
    .speed-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 2px 10px rgba(245,130,174,0.3); }
    .game-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 28px 24px; margin-bottom: 16px; text-align: center; }
    .progress-wrapper { margin-bottom: 18px; }
    .progress-track { width: 100%; height: 8px; border-radius: var(--radius-pill); background: #ede7db; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: var(--radius-pill); background: var(--accent); transition: width 0.4s ease; width: 0%; }
    .progress-meta { display: flex; justify-content: space-between; margin-top: 4px; }
    .progress-meta span { font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace; }
    .flash-zone { position: relative; min-height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .flash-word { font-family: 'Space Mono', monospace; font-size: clamp(40px,10vw,72px); font-weight: 700; color: var(--text); letter-spacing: 0.06em; transition: opacity 0.15s, transform 0.15s; user-select: none; }
    .flash-word.correct { color: var(--success); animation: wordPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    .flash-word.wrong { color: var(--danger); animation: wordShake 0.4s ease; }
    @keyframes wordPop { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }
    @keyframes wordShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-12px)} 40%{transform:translateX(12px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)} }
    .countdown-ring { position: absolute; top: 8px; right: 8px; width: 52px; height: 52px; }
    .countdown-ring svg { transform: rotate(-90deg); width: 52px; height: 52px; }
    .countdown-ring .ring-bg { fill: none; stroke: #ede7db; stroke-width: 4; }
    .countdown-ring .ring-fill { fill: none; stroke: var(--success); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear, stroke 0.3s; }
    .countdown-ring .ring-fill.warn { stroke: var(--warning); }
    .countdown-ring .ring-fill.danger { stroke: var(--danger); }
    .countdown-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text); }
    .input-area { display: flex; gap: 10px; justify-content: center; align-items: center; margin-bottom: 14px; }
    .spell-input { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; padding: 12px 20px; border: 3px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); text-align: center; width: 280px; max-width: 65vw; outline: none; transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 0.08em; }
    .spell-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(139,211,221,0.2); }
    .spell-input.correct { border-color: var(--success); box-shadow: 0 0 0 4px rgba(78,205,196,0.2); }
    .spell-input.wrong { border-color: var(--danger); box-shadow: 0 0 0 4px rgba(232,93,117,0.2); }
    .status-msg { font-size: 16px; font-weight: 600; min-height: 26px; margin-bottom: 6px; transition: opacity 0.2s; }
    .status-msg.correct { color: var(--success); } .status-msg.wrong { color: var(--danger); }
    .status-msg.timeout { color: var(--warning); } .status-msg.info { color: var(--accent-dark); }
    .action-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
    .action-btn { font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 22px; border: none; border-radius: var(--radius-pill); cursor: pointer; transition: all 0.2s; }
    .action-btn:active { transform: scale(0.96); }
    .action-btn.restart { background: var(--primary); color: #fff; box-shadow: 0 3px 12px rgba(245,130,174,0.3); }
    .action-btn.restart:hover { background: var(--primary-dark); }
    .action-btn.secondary { background: #f0ece6; color: var(--text); }
    .action-btn.secondary:hover { background: #e6e0d6; }
    .word-list-panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 20px; }
    .word-list-panel h3 { font-size: 15px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .word-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .word-chip { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: var(--radius-pill); background: #f0ece6; color: var(--text-muted); transition: all 0.25s; }
    .word-chip.done { background: var(--success); color: #fff; }
    .word-chip.current { background: var(--accent); color: #fff; box-shadow: 0 0 0 3px rgba(139,211,221,0.3); }
    .word-chip.failed { background: var(--danger); color: #fff; }
    #confetti-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999; }
    @media (max-width: 500px) { .game-card { padding: 20px 14px; } .spell-input { width: 200px; font-size: 18px; } .countdown-ring { width: 42px; height: 42px; } .countdown-ring svg { width: 42px; height: 42px; } }
  </style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="app">
  <div class="header">
    <h1>Speed Spelling &#9889;</h1>
    <p>See the word above, type it below before time runs out!</p>
  </div>
  <div class="score-strip">
    <div class="score-item current">&#128293; <span class="num" id="s-streak">0</span> <span>streak</span></div>
    <div class="score-item best">&#11088; <span class="num" id="s-best">0</span> <span>best</span></div>
    <div class="score-item words">&#128221; <span class="num" id="s-word-num">1</span><span>/</span><span id="s-word-total">40</span></div>
  </div>
  <div class="level-bar" id="level-bar"></div>
  <div class="speed-row">
    <button class="speed-btn" data-speed="3">3s &#9889;</button>
    <button class="speed-btn active" data-speed="5">5s</button>
    <button class="speed-btn" data-speed="10">10s &#128034;</button>
  </div>
  <div class="game-card">
    <div class="progress-wrapper">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-meta"><span id="prog-label">Word 1 of 40</span><span id="prog-level">Pre-Primer</span></div>
    </div>
    <div class="flash-zone">
      <div class="flash-word" id="flash-word">the</div>
      <div class="countdown-ring"><svg viewBox="0 0 52 52"><circle class="ring-bg" cx="26" cy="26" r="22"/><circle class="ring-fill" id="ring-fill" cx="26" cy="26" r="22" stroke-dasharray="138.23" stroke-dashoffset="0"/></svg><div class="countdown-text" id="countdown-text">5</div></div>
    </div>
    <div class="input-area">
      <input type="text" class="spell-input" id="spell-input" placeholder="just start typing..." autocomplete="off" autocapitalize="off" spellcheck="false" />
    </div>
    <div class="status-msg" id="status">&nbsp;</div>
    <div class="action-bar">
      <button class="action-btn restart" id="btn-restart">&#8634; Start Over</button>
      <button class="action-btn secondary" id="btn-skip">Skip &#8594;</button>
    </div>
  </div>
  <div class="word-list-panel">
    <h3>Word List <span id="wl-label">(Pre-Primer)</span></h3>
    <div class="word-chips" id="word-chips"></div>
  </div>
</div>
<script>
var DOLCH = {
  preprimer: ["the","to","and","a","i","you","it","in","said","for","up","look","is","go","we","little","down","can","see","not","one","my","me","big","come","blue","red","where","jump","away","here","help","make","yellow","two","play","run","find","three","funny"],
  primer: ["he","was","that","she","on","they","but","at","with","all","there","out","be","have","am","do","did","what","so","get","like","this","will","yes","went","are","now","no","came","ride","into","good","want","too","pretty","four","saw","well","ran","brown","eat","who","new","must","black","white","soon","our","ate","say","under","please"],
  first: ["of","his","had","him","her","some","as","then","could","when","were","them","ask","an","over","just","from","any","how","know","put","take","every","old","by","after","think","let","going","walk","again","may","stop","fly","round","give","once","open","has","live","thank"],
  second: ["would","very","your","its","around","don't","right","green","their","call","sleep","five","wash","or","before","been","off","cold","tell","work","first","does","goes","write","always","made","gave","us","buy","those","use","fast","pull","both","sit","which","read","why","found","because","best","upon","these","sing","wish","many"],
  third: ["if","long","about","got","six","never","seven","eight","today","myself","much","keep","try","start","ten","bring","drink","only","better","hold","warm","full","done","light","pick","hurt","cut","kind","fall","carry","small","own","show","hot","far","draw","clean","grow","together","shall","laugh"],
  nouns: ["apple","baby","back","ball","bear","bed","bell","bird","birthday","boat","box","boy","bread","brother","cake","car","cat","chair","chicken","children","christmas","coat","corn","cow","day","dog","doll","door","duck","egg","eye","farm","farmer","father","feet","fire","fish","floor","flower","game","garden","girl","goodbye","grass","ground","hand","head","hill","home","horse","house","kitty","leg","letter","man","men","milk","money","morning","mother","name","nest","night","paper","party","picture","pig","rabbit","rain","ring","robin","santa","school","seed","sheep","shoe","sister","snow","song","squirrel","stick","street","sun","table","thing","time","top","toy","tree","watch","water","way","wind","window","wood"]
};
var LEVEL_NAMES = { preprimer:"Pre-Primer", primer:"Primer", first:"1st Grade", second:"2nd Grade", third:"3rd Grade", nouns:"Nouns" };
var LEVEL_KEYS = Object.keys(LEVEL_NAMES);

var selectedLevels = {};
LEVEL_KEYS.forEach(function(k){ selectedLevels[k] = true; });
var activeList = [];
var speed = 5, wordIndex = 0, streak = 0, bestStreak = 0;
var phase = "idle", timerId = null, timerRemaining = 0, flashTimerId = null;

var G = function(id){ return document.getElementById(id); };
var flashWord = G("flash-word"), spellInput = G("spell-input"), statusEl = G("status");
var progressFill = G("progress-fill"), progLabel = G("prog-label"), progLevel = G("prog-level");
var ringFill = G("ring-fill"), countdownText = G("countdown-text"), wordChips = G("word-chips");
var confettiCanvas = G("confetti-canvas"), CIRC = 2*Math.PI*22;

var confCtx = confettiCanvas.getContext("2d"), confPieces = [], confAnimId = null;
function resizeConf(){ confettiCanvas.width=window.innerWidth; confettiCanvas.height=window.innerHeight; }
window.addEventListener("resize", resizeConf); resizeConf();
function launchConfetti(){
  confPieces=[];
  var c=["#f582ae","#8bd3dd","#f3d250","#4ecdc4","#ff6b6b","#c084fc","#fbbf24"];
  for(var i=0;i<100;i++) confPieces.push({x:Math.random()*confettiCanvas.width,y:-20-Math.random()*200,w:5+Math.random()*6,h:3+Math.random()*4,color:c[Math.floor(Math.random()*c.length)],vy:2+Math.random()*3,vx:(Math.random()-0.5)*3,rot:Math.random()*360,rv:(Math.random()-0.5)*10,op:1});
  if(!confAnimId) animConf();
}
function animConf(){
  confCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  var alive=false;
  for(var i=0;i<confPieces.length;i++){var p=confPieces[i];p.y+=p.vy;p.x+=p.vx;p.rot+=p.rv;p.vy+=0.05;if(p.y>confettiCanvas.height+40)p.op-=0.05;if(p.op<=0)continue;alive=true;confCtx.save();confCtx.translate(p.x,p.y);confCtx.rotate(p.rot*Math.PI/180);confCtx.globalAlpha=Math.max(0,p.op);confCtx.fillStyle=p.color;confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);confCtx.restore();}
  if(alive)confAnimId=requestAnimationFrame(animConf);else{confAnimId=null;confCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);}
}

function rebuildList(){
  activeList=[];
  for(var i=0;i<LEVEL_KEYS.length;i++) if(selectedLevels[LEVEL_KEYS[i]]) activeList=activeList.concat(DOLCH[LEVEL_KEYS[i]]);
}
function countSel(){ var c=0; for(var i=0;i<LEVEL_KEYS.length;i++) if(selectedLevels[LEVEL_KEYS[i]]) c++; return c; }
function getLabel(){
  if(countSel()===LEVEL_KEYS.length) return "All Levels";
  var n=[]; for(var i=0;i<LEVEL_KEYS.length;i++) if(selectedLevels[LEVEL_KEYS[i]]) n.push(LEVEL_NAMES[LEVEL_KEYS[i]]);
  return n.join(", ");
}

function buildLevelBar(){
  var bar=G("level-bar"); bar.innerHTML="";
  var allBtn=document.createElement("button");
  allBtn.className="level-btn"+(countSel()===LEVEL_KEYS.length?" active":"");
  allBtn.textContent="All";
  allBtn.onclick=function(){
    if(countSel()===LEVEL_KEYS.length){ for(var i=0;i<LEVEL_KEYS.length;i++) selectedLevels[LEVEL_KEYS[i]]=false; selectedLevels.preprimer=true; }
    else{ for(var i=0;i<LEVEL_KEYS.length;i++) selectedLevels[LEVEL_KEYS[i]]=true; }
    onLevelsChanged();
  };
  bar.appendChild(allBtn);
  for(var i=0;i<LEVEL_KEYS.length;i++){
    (function(key){
      var btn=document.createElement("button");
      btn.className="level-btn"+(selectedLevels[key]?" active":"");
      btn.textContent=LEVEL_NAMES[key];
      btn.onclick=function(){
        if(selectedLevels[key] && countSel()>1) selectedLevels[key]=false;
        else selectedLevels[key]=true;
        onLevelsChanged();
      };
      bar.appendChild(btn);
    })(LEVEL_KEYS[i]);
  }
}
function onLevelsChanged(){
  stopTimers(); rebuildList(); wordIndex=0; streak=0; phase="idle";
  buildLevelBar(); buildChips(); updateScores(); updateProgress(); showWord();
  spellInput.value=""; spellInput.className="spell-input"; spellInput.disabled=false;
  setCD(speed,speed);
  statusEl.innerHTML="Just start typing to begin!"; statusEl.className="status-msg info";
}
function buildChips(){
  wordChips.innerHTML="";
  for(var i=0;i<activeList.length;i++){var ch=document.createElement("span");ch.className="word-chip";ch.textContent=activeList[i];ch.id="chip-"+i;wordChips.appendChild(ch);}
  G("wl-label").textContent="("+getLabel()+")";
}
function updateChipStates(){
  for(var i=0;i<activeList.length;i++){var ch=G("chip-"+i);if(!ch)continue;ch.className="word-chip";if(i<wordIndex)ch.classList.add("done");else if(i===wordIndex)ch.classList.add("current");}
}
function updateScores(){
  G("s-streak").textContent=streak; G("s-best").textContent=bestStreak;
  G("s-word-num").textContent=Math.min(wordIndex+1,activeList.length); G("s-word-total").textContent=activeList.length;
}
function updateProgress(){
  var pct=activeList.length>0?(wordIndex/activeList.length)*100:0;
  progressFill.style.width=pct+"%";
  progLabel.textContent="Word "+Math.min(wordIndex+1,activeList.length)+" of "+activeList.length;
  progLevel.textContent=getLabel();
}
function setCD(rem,total){
  var pct=total>0?rem/total:0;
  ringFill.style.strokeDasharray=CIRC; ringFill.style.strokeDashoffset=CIRC*(1-pct);
  ringFill.classList.remove("warn","danger");
  if(pct<0.25)ringFill.classList.add("danger"); else if(pct<0.5)ringFill.classList.add("warn");
  countdownText.textContent=Math.ceil(rem);
}
function setSpeed(s){ speed=s; document.querySelectorAll(".speed-btn").forEach(function(b){b.classList.toggle("active",parseInt(b.dataset.speed)===s);}); }
function showWord(){ if(wordIndex<activeList.length){flashWord.textContent=activeList[wordIndex];flashWord.className="flash-word";} }
function stopTimers(){ clearInterval(timerId); clearTimeout(flashTimerId); timerId=null; flashTimerId=null; }

function startRound(){
  if(wordIndex>=activeList.length){
    phase="done"; flashWord.textContent="\uD83C\uDF89"; flashWord.className="flash-word";
    statusEl.innerHTML="Amazing! You spelled all <b>"+activeList.length+"</b> words!";
    statusEl.className="status-msg correct"; spellInput.disabled=true; launchConfetti(); return;
  }
  phase="typing"; statusEl.innerHTML="&nbsp;"; statusEl.className="status-msg";
  spellInput.value=""; spellInput.className="spell-input"; spellInput.disabled=false; spellInput.focus();
  showWord(); updateChipStates(); updateProgress(); updateScores();
  timerRemaining=speed; setCD(speed,speed); clearInterval(timerId);
  timerId=setInterval(function(){
    timerRemaining-=0.1;
    if(timerRemaining<=0){timerRemaining=0;clearInterval(timerId);handleTimeout();}
    setCD(Math.max(0,timerRemaining),speed);
  },100);
}
function checkInput(){
  // If idle, auto-start the round when the user begins typing
  if(phase==="idle"){
    startRound();
    // After startRound clears the input, restore the character that triggered this
    // We do this on next tick so startRound's spellInput.value="" doesn't erase it
    return;
  }
  if(phase!=="typing") return;
  var word=activeList[wordIndex];
  if(spellInput.value.trim().toLowerCase()===word.toLowerCase()){clearInterval(timerId);handleCorrect(word);}
}
function handleEnter(){
  if(phase==="idle"){startRound();return;}
  if(phase==="done"){restartGame();return;}
  if(phase==="typing"){
    clearInterval(timerId); var word=activeList[wordIndex]; var ans=spellInput.value.trim().toLowerCase();
    if(ans===word.toLowerCase()) handleCorrect(word); else handleWrong(word,ans);
  }
}
function handleCorrect(word){
  phase="feedback"; flashWord.className="flash-word correct";
  spellInput.className="spell-input correct"; spellInput.disabled=true;
  streak++; if(streak>bestStreak) bestStreak=streak; wordIndex++;
  var ch=G("chip-"+(wordIndex-1)); if(ch) ch.className="word-chip done";
  statusEl.textContent="Correct! \u2728"; statusEl.className="status-msg correct";
  updateScores(); updateProgress();
  if(streak>0 && streak%5===0) launchConfetti();
  flashTimerId=setTimeout(function(){startRound();},600);
}
function goBack(delay){
  flashTimerId=setTimeout(function(){
    wordIndex=0; updateProgress(); updateScores(); buildChips(); showWord();
    spellInput.value=""; spellInput.className="spell-input"; spellInput.disabled=false;
    setCD(speed,speed);
    statusEl.innerHTML="Back to word 1. Just start typing!"; statusEl.className="status-msg info"; phase="idle";
  },delay||2000);
}
function handleWrong(word,ans){
  phase="feedback"; flashWord.textContent=word; flashWord.className="flash-word wrong";
  spellInput.className="spell-input wrong"; spellInput.disabled=true;
  var ch=G("chip-"+wordIndex); if(ch) ch.className="word-chip failed";
  var typed=ans||"(empty)";
  statusEl.innerHTML='You typed "<b>'+typed+'</b>" \u2014 the word was <b>'+word+'</b>. Starting over!';
  statusEl.className="status-msg wrong"; streak=0; updateScores(); goBack();
}
function handleTimeout(){
  var word=activeList[wordIndex];
  phase="feedback"; flashWord.textContent=word; flashWord.className="flash-word wrong";
  spellInput.className="spell-input wrong"; spellInput.disabled=true;
  var ch=G("chip-"+wordIndex); if(ch) ch.className="word-chip failed";
  statusEl.innerHTML="\u23F0 Time's up! The word was <b>"+word+"</b>. Starting over!";
  statusEl.className="status-msg timeout"; streak=0; updateScores(); goBack();
}
function skipWord(){
  if(phase!=="typing") return; stopTimers();
  var word=activeList[wordIndex]; flashWord.textContent=word; flashWord.className="flash-word wrong";
  var ch=G("chip-"+wordIndex); if(ch) ch.className="word-chip failed";
  statusEl.innerHTML="Skipped! The word was <b>"+word+"</b>. Starting over!";
  statusEl.className="status-msg wrong"; streak=0; spellInput.disabled=true; phase="feedback"; updateScores(); goBack(1500);
}
function restartGame(){
  stopTimers(); wordIndex=0; streak=0; phase="idle";
  updateProgress(); updateScores(); buildChips(); showWord();
  spellInput.value=""; spellInput.className="spell-input"; spellInput.disabled=false;
  setCD(speed,speed);
  statusEl.innerHTML="Just start typing to begin!"; statusEl.className="status-msg info";
}

// EVENTS
spellInput.addEventListener("keydown", function(e){
  if(e.key==="Enter"){e.preventDefault();handleEnter();return;}
  // Auto-start on any letter key when idle
  if(phase==="idle" && e.key.length===1 && /[a-zA-Z']/.test(e.key)){
    startRound();
    // Let the keydown continue so the character lands in the (now-active) input naturally
  }
});
spellInput.addEventListener("input", function(){
  if(phase==="typing") checkInput();
});
document.addEventListener("keydown", function(e){
  if(e.key==="Enter"){e.preventDefault();if(phase==="idle"||phase==="done")handleEnter();return;}
  if(e.key.length===1 && /[a-zA-Z']/.test(e.key) && document.activeElement!==spellInput && !spellInput.disabled){
    spellInput.focus();
    if(phase==="idle") startRound();
  }
});
G("btn-restart").addEventListener("click", restartGame);
G("btn-skip").addEventListener("click", skipWord);
document.querySelectorAll(".speed-btn").forEach(function(btn){
  btn.addEventListener("click",function(){setSpeed(parseInt(btn.dataset.speed));if(phase==="idle"||phase==="done")restartGame();});
});

// INIT
buildLevelBar(); setSpeed(5); rebuildList(); buildChips();
updateScores(); updateProgress(); showWord();
statusEl.innerHTML="Just start typing to begin!"; statusEl.className="status-msg info";
spellInput.focus();
</script>
</body>
</html>
