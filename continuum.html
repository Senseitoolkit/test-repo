<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIST Writing Guide — Grades 1–5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F2EDE3;--surface:#FFF;--navy:#192C42;--navy-mid:#253D57;
  --text:#1A2535;--text-mid:#4A5568;--text-light:#718096;
  --amber:#D97706;--amber-bg:#FEF3C7;--amber-border:#FCD34D;--amber-text:#78350F;
  --green-bg:#D1FAE5;--green-border:#6EE7B7;--green-text:#065F46;
  --blue-bg:#DBEAFE;--blue-border:#93C5FD;--blue-text:#1E3A8A;
  --c-ideas:#1A6EB5;--c-org:#1A7A4C;--c-voice:#A62878;
  --c-word:#B45309;--c-fluency:#6B46C1;--c-conv:#C2410C;
  --r:10px;
}
html{font-size:16px;scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}

.header{background:var(--navy);color:#fff;padding:26px 24px 20px;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 1px,transparent 20px);pointer-events:none;}
.header-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px;}
.header-title{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:4px;}
.header-sub{font-size:13px;color:rgba(255,255,255,.45);}

.grade-nav{background:var(--navy-mid);padding:12px 20px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.gb{padding:7px 20px;border-radius:24px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13.5px;font-weight:600;background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);transition:all .2s;white-space:nowrap;}
.gb:hover:not(.on){background:rgba(255,255,255,.18);color:#fff;}
.gb.on{background:var(--amber);color:var(--navy);box-shadow:0 2px 10px rgba(217,119,6,.45);}

.container{max-width:880px;margin:0 auto;padding:24px 20px 56px;}

.grade-banner{background:#fff;border-radius:0 var(--r) var(--r) 0;border-left:4px solid var(--amber);padding:14px 18px;margin-bottom:20px;animation:up .3s ease both;}
.grade-banner-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:var(--navy);margin-bottom:2px;}
.grade-banner-desc{font-size:13.5px;color:var(--text-mid);}

/* Tab nav */
.tab-nav{display:flex;gap:0;border-bottom:2px solid #DDD8CE;margin-bottom:24px;}
.tb-btn{padding:10px 18px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:13.5px;font-weight:600;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;white-space:nowrap;}
.tb-btn.on{color:var(--navy);border-bottom-color:var(--amber);}
.tb-btn:hover:not(.on){color:var(--text-mid);}

/* Overview section */
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.lbl-warn{color:var(--amber);}
.lbl-muted{color:var(--text-light);}

.struggles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:9px;margin-bottom:32px;}
.sc{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r);padding:11px 13px;animation:up .3s ease both;animation-delay:calc(var(--i,0)*40ms);}
.sc-trait{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--amber);margin-bottom:5px;}
.sc-text{font-size:13px;color:var(--amber-text);line-height:1.5;}

.tc{background:#fff;border:1px solid #DDD8CE;border-radius:var(--r);margin-bottom:7px;overflow:hidden;transition:border-color .2s,box-shadow .2s;animation:up .3s ease both;animation-delay:calc(var(--i,0)*35ms);}
.tc.op{border-color:#B2A898;box-shadow:0 2px 14px rgba(0,0,0,.08);}
.th{display:flex;align-items:center;padding:11px 16px;cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:'Nunito',sans-serif;gap:10px;transition:background .15s;}
.th:hover{background:#F7F4EE;}
.t-stripe{width:4px;height:30px;border-radius:2px;flex-shrink:0;}
.t-name{font-weight:700;font-size:14px;flex-shrink:0;min-width:125px;}
.t-goal{font-size:13px;color:var(--text-mid);flex:1;}
.t-chev{flex-shrink:0;transition:transform .25s;color:var(--text-light);}
.tc.op .t-chev{transform:rotate(180deg);}
.tb2{display:none;grid-template-columns:1fr 1fr;gap:20px;padding:4px 18px 18px 30px;background:#FAFAF7;border-top:1px solid #EAE4D8;animation:fade .2s ease both;}
.tc.op .tb2{display:grid;}
.tb-col-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;margin:14px 0 9px;}
.stem{font-size:13px;color:var(--text);padding:6px 0 6px 11px;border-left:2px solid;margin-bottom:6px;line-height:1.45;}
.ci{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.ci-dot{width:17px;height:17px;border-radius:50%;background:#D1FAE5;border:1.5px solid #34D399;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ci-text{font-size:13px;color:var(--text);line-height:1.4;}

/* Example tab */
.ex-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-light);margin-bottom:8px;}
.ex-text-wrap{background:#FDFCF8;border:1px solid #DDD8CE;border-radius:var(--r);padding:22px 26px;margin-bottom:20px;animation:up .3s ease both;}
.ex-text-wrap p{font-size:14.5px;line-height:1.8;color:var(--text);margin-bottom:14px;}
.ex-text-wrap p:last-child{margin-bottom:0;}

.bd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.bd-card{border-radius:var(--r);padding:14px 16px;animation:up .3s ease both;animation-delay:calc(var(--i,0)*50ms);}
.bd-card.blue{background:var(--blue-bg);border:1px solid var(--blue-border);}
.bd-card.amber{background:var(--amber-bg);border:1px solid var(--amber-border);}
.bd-card.green{background:var(--green-bg);border:1px solid var(--green-border);}
.bd-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.bd-title.blue{color:var(--blue-text);}
.bd-title.amber{color:var(--amber);}
.bd-title.green{color:var(--green-text);}
.bd-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;}
.bd-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.bd-dot.blue{background:var(--blue-text);}
.bd-dot.amber{background:var(--amber);}
.bd-dot.green{background:var(--green-text);}
.bd-text{font-size:13px;line-height:1.4;}
.bd-text.blue{color:var(--blue-text);}
.bd-text.amber{color:var(--amber-text);}
.bd-text.green{color:var(--green-text);}
.bd-foundation{font-size:13px;color:var(--green-text);line-height:1.5;font-style:italic;}

.footer{text-align:center;padding:20px;font-size:12px;color:var(--text-light);border-top:1px solid #DDD8CE;margin-top:12px;}

@keyframes up{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
@keyframes fade{from{opacity:0;}to{opacity:1;}}

@media(max-width:680px){
  .bd-grid{grid-template-columns:1fr;}
  .tc.op .tb2{grid-template-columns:1fr;}
  .struggles-grid{grid-template-columns:1fr;}
  .t-goal{display:none;}
  .header-title{font-size:22px;}
  .container{padding:16px 14px 48px;}
  .tab-nav{overflow-x:auto;padding-bottom:2px;}
  .tb-btn{font-size:12.5px;padding:9px 13px;}
}
@media print{
  .grade-nav,.header::before{display:none;}
  .tc.op .tb2{display:grid;}
  .tc{page-break-inside:avoid;}
  body{background:#fff;}
}
</style>
</head>
<body>

<header class="header">
  <p class="header-label">KIST Writing Curriculum</p>
  <h1 class="header-title">Writing Guide — Grades 1–5</h1>
  <p class="header-sub">Six Traits · Pearson Edexcel Aligned · Writing Continuum</p>
</header>

<nav class="grade-nav" role="navigation" aria-label="Select a grade">
  <button class="gb on" onclick="sw(1,this)">Grade 1</button>
  <button class="gb" onclick="sw(2,this)">Grade 2</button>
  <button class="gb" onclick="sw(3,this)">Grade 3</button>
  <button class="gb" onclick="sw(4,this)">Grade 4</button>
  <button class="gb" onclick="sw(5,this)">Grade 5</button>
</nav>

<main class="container">
  <div id="banner"></div>
  <div class="tab-nav">
    <button class="tb-btn on" onclick="swTab('overview',this)">Overview</button>
    <button class="tb-btn" onclick="swTab('story',this)">Story example</button>
    <button class="tb-btn" onclick="swTab('info',this)">Information example</button>
  </div>
  <div id="tab-content"></div>
</main>

<footer class="footer">
  KIST Writing Curriculum &middot; Pearson Edexcel Aligned &middot; Six Traits of Writing
</footer>

<script>
const GI={
  1:{ages:'6–7',desc:'Foundational writing — clear ideas, BME structure, and basic conventions'},
  2:{ages:'7–8',desc:'Developing voice, simple paragraphs, and sentence variety'},
  3:{ages:'8–9',desc:'Complex sentences, varied transitions, and accurately punctuated dialogue'},
  4:{ages:'9–10',desc:'Rich vocabulary, maintained perspective, and structured paragraphs'},
  5:{ages:'10–11',desc:'Controlled pacing, figurative language, and thematic depth'}
};

const TC={
  'Ideas':'var(--c-ideas)','Organization':'var(--c-org)','Voice':'var(--c-voice)',
  'Word Choice':'var(--c-word)','Sentence Fluency':'var(--c-fluency)','Conventions':'var(--c-conv)'
};

const SL={
  1:[
    {t:'Ideas',s:'Writing 1–2 sentences with no detail — the story just stops with nothing developed'},
    {t:'Organization',s:'No clear ending — events listed without resolution; BME structure missing'},
    {t:'Voice',s:'Flat writing: "It was fun." — no feelings or personality expressed at all'},
    {t:'Word Choice',s:'Repeating "nice", "good", "fun" throughout — no descriptive variety'},
    {t:'Sentence Fluency',s:'Every sentence starts with "I" — no variety in openings whatsoever'},
    {t:'Conventions',s:'Missing capitals and full stops; no finger spaces between words'}
  ],
  2:[
    {t:'Ideas',s:'Wandering off-topic mid-piece — starts well but loses focus quickly'},
    {t:'Organization',s:'One unbroken block of text — ideas not grouped into paragraphs at all'},
    {t:'Voice',s:'Voice disappears in non-narrative writing — informational text feels flat and lifeless'},
    {t:'Word Choice',s:'Weak verbs throughout: "went", "said", "did" — no strong or specific action verbs'},
    {t:'Sentence Fluency',s:'All sentences the same length — no variety in structure or pattern'},
    {t:'Conventions',s:'Tense shifts mid-piece (past ↔ present); missing commas in lists'}
  ],
  3:[
    {t:'Ideas',s:'Surface-level details — ideas listed but not developed with explanation or depth'},
    {t:'Organization',s:'Repetitive transitions: "Then… Then… Then…" — no variety or sophistication'},
    {t:'Voice',s:'Tone shifts mid-piece — inconsistent style between sections breaks the reading experience'},
    {t:'Word Choice',s:'Adjectives without action — describing scenes without vivid verbs or imagery'},
    {t:'Sentence Fluency',s:'All simple sentences — no compound or complex sentence variety attempted'},
    {t:'Conventions',s:'Dialogue incorrectly punctuated — missing quotation marks and no new lines per speaker'}
  ],
  4:[
    {t:'Ideas',s:'Good ideas but underdeveloped — missing explanation, examples, or deeper analysis'},
    {t:'Organization',s:'Weak hooks and abrupt endings — reader is not drawn in or left satisfied'},
    {t:'Voice',s:"Perspective drifts — the narrator's voice becomes inconsistent mid-story"},
    {t:'Word Choice',s:'Vocabulary too safe — not taking risks with precise, loaded, or atmospheric words'},
    {t:'Sentence Fluency',s:'Overusing one conjunction (e.g. "Although…") at the start of every sentence'},
    {t:'Conventions',s:'Perfect tense errors; apostrophe confusion between possession and contractions'}
  ],
  5:[
    {t:'Ideas',s:'No thematic message — events happen but there is no deeper meaning or lasting insight'},
    {t:'Organization',s:'Pacing issues — rushed climax or overlong setup; structure feels unintentional'},
    {t:'Voice',s:'Over-describing slows the pace — the reader loses interest mid-way through the piece'},
    {t:'Word Choice',s:'Figurative language used randomly — similes and metaphors feel forced or generic'},
    {t:'Sentence Fluency',s:'Overly long sentences that confuse; uncertain when to use a dash or semicolon'},
    {t:'Conventions',s:'Relative clauses poorly integrated; passive voice overused or avoided entirely'}
  ]
};

const TD={
  1:{
    'Ideas':{goal:'A clear story idea with some details',stems:['My story is about ___.','First, ___ happened.','The problem in my story is ___.','The solution is ___.'],check:['I told what happened','I added at least 2 details','My idea makes sense']},
    'Organization':{goal:'Clear beginning, middle, and end (BME)',stems:['Beginning: One day… / At the start…','Middle: Then… / After that…','End: Finally… / In the end…'],check:['I have a beginning, middle, and end','My events are in order','My ending matches my story']},
    'Voice':{goal:'Show feelings or personality',stems:['I felt ___ when ___.','"___!" I said.','It was so ___!','I was thinking ___.'],check:['I used feelings','My story sounds like me']},
    'Word Choice':{goal:'Simple but descriptive words',stems:['My character is ___ (adjective).','The place looks ___.','I used words like ___, ___, ___ to describe.'],check:['I used adjectives','I used accurate describing words','I did not repeat the same word too much']},
    'Sentence Fluency':{goal:'Simple sentences with some variety',stems:['Start with: Then… / After that… / Suddenly… / Finally…','Join ideas with and, but, so.'],check:['My sentences are complete','I used different beginnings','My story is easy to read aloud']},
    'Conventions':{goal:'Capitals, full stops, and finger spaces',stems:['I used a, an, the correctly.','Today I play. Yesterday I played.','I ended sentences with . ? !'],check:['Capital letter at sentence start','Full stop at the end','Proper nouns start with capitals','Simple words spelled correctly','Neat handwriting and spacing']}
  },
  2:{
    'Ideas':{goal:'Clear idea with supporting details and sense of audience',stems:['My story is about ___ who wants ___.','The problem in my story is ___.','My story will entertain the reader by ___.'],check:['My idea is clear and stays on topic','I added supporting details','Written to entertain or inform']},
    'Organization':{goal:'Clear BME with simple paragraphs',stems:['Beginning: One day… / At the start…','Middle: Then… / Suddenly…','End: Finally… / The problem was solved when…'],check:['I used paragraphs (BME)','My events are in logical order','My ending matches the problem']},
    'Voice':{goal:'A consistent personal style and appropriate tone',stems:['My character felt ___ when ___.','"___!" the character shouted / whispered / sighed.','I want the reader to feel ___ during this part.'],check:['My voice is consistent','Tone matches the genre','I used dialogue or feelings to show personality']},
    'Word Choice':{goal:'Deliberate vocabulary that adds detail and depth',stems:['The setting looked ___ (adjective + noun).','My character moved ___ (adverb).','A strong verb I used is ___.'],check:['I used specific nouns and strong verbs','I used adjectives and adverbs to add detail','My words help the reader imagine']},
    'Sentence Fluency':{goal:'Varied sentence beginnings and patterns',stems:['Start with: When… / As… / Suddenly… / While… / Later…','Join ideas with and, but, so, when, if.'],check:['My sentences have variety','Easy to read aloud','I used different lengths and patterns']},
    'Conventions':{goal:'Capitals, commas in lists, consistent verb tense',stems:['Past: walked, played, found  |  Present: walks  |  Future: will walk','Commas in a list: ___, ___, and ___.'],check:['Capital letters and end punctuation correct','Commas used in lists','Handwriting neat and spaced']}
  },
  3:{
    'Ideas':{goal:'A clear, focused main idea with depth and development',stems:['My story is about ___ who must ___.','The main problem is ___, and it matters because ___.','A key moment in my story is when ___.'],check:['My idea is clear, focused, and developed','I stayed on task','I added rich supporting details']},
    'Organization':{goal:'Logical paragraphs, purposeful transitions, integrated dialogue',stems:['Beginning: Long ago… / One afternoon… / Meanwhile…','Middle: As the problem grew… / Because of this…','Dialogue: "___," said ___. (new line for each speaker)'],check:['I used indented paragraphs','Transitions: next, after that, meanwhile, although, however','Dialogue is correctly paragraphed']},
    'Voice':{goal:'A consistent personal style and appropriate narrative tone',stems:['My character felt ___ when ___.','I want the reader to sense ___ during this moment.','My narrator sounds ___ (curious / brave / worried).'],check:['My voice is consistent','Tone matches the genre','I used feelings, thoughts, and reactions']},
    'Word Choice':{goal:'Rich, precise vocabulary that adds depth',stems:['A vivid verb I used is ___.','Sensory detail: I saw… I heard… I felt…','A descriptive phrase I added is ___.'],check:['Specific nouns, strong verbs, and precise adjectives','My words create imagery','My vocabulary adds depth']},
    'Sentence Fluency':{goal:'Varied sentence types, flowing rhythm, complex structures',stems:['Start with: As… / While… / Although… / Because… / Suddenly…','Use conjunctions: although, however, while, because, therefore'],check:['I used simple, compound, and complex sentences','Flows smoothly when read aloud','I varied my sentence beginnings']},
    'Conventions':{goal:'Accurate grammar; consistent and correct punctuation',stems:['Perfect tense: She has found… / They had climbed…','Dialogue: "___," she said. (new line for each speaker)',"Possession: Mira's key"],check:['Grammar is accurate and varied','Punctuation consistently correct','Spelling of complex words accurate']}
  },
  4:{
    'Ideas':{goal:'Clear, focused main idea with rich development and depth',stems:['My story is about ___, who must ___.','The central problem is ___, and it matters because ___.','This detail adds depth because ___.'],check:['My idea is clear, focused, and developed','I added rich, relevant details','Clearly written for its purpose']},
    'Organization':{goal:'Structured paragraphs, challenging transitions, purposeful devices',stems:['Beginning: Although everything seemed normal… / On a stormy afternoon…','Middle: Meanwhile… / Despite this… / As tension grew…','Climax: Suddenly… / At that moment…'],check:['I used structured, indented paragraphs','Transitions: meanwhile, nevertheless, despite','Stylistic devices (hooks, imagery, layout)']},
    'Voice':{goal:'Consistent, appropriate voice with maintained perspective',stems:['I want the reader to sense ___ during this moment.',"My character's perspective is shown when ___.",'My narrator sounds ___ (curious / brave / uncertain).'],check:['Voice is consistent and appropriate','My perspective is clearly maintained','I took creative risks with voice or tone']},
    'Word Choice':{goal:'Rich, precise vocabulary that creates atmosphere and mood',stems:['A vivid verb I used is ___.','A phrase that builds atmosphere is ___.','This word choice adds emotion because ___.'],check:['Rich, precise vocabulary throughout','My words create mood and atmosphere','I used loaded vocabulary to generate emotion']},
    'Sentence Fluency':{goal:'Rhythmic, flowing sentences with varied structures',stems:['Start with: Although… / While… / Despite… / As soon as…','Use: although, however, while, therefore, despite'],check:['Simple, compound, and complex sentences','Flows smoothly when read aloud','Some sentences have rhythm and flow']},
    'Conventions':{goal:'Accurate and varied grammar; consistently correct punctuation',stems:['Perfect: She had discovered the lantern.','Passive: The room was transformed by the light.','Comma after transition: Meanwhile, the lantern glowed.'],check:['Grammar is accurate and varied','Punctuation consistently correct','Spelling of complex patterns accurate']}
  },
  5:{
    'Ideas':{goal:'Clear, focused idea with depth and thematic meaning',stems:['My story explores ___ and shows that ___.','The central conflict is ___, which matters because ___.','A key turning point occurs when ___.'],check:['Clear, focused, and developed with depth','Rich, relevant supporting details','A clear theme or message']},
    'Organization':{goal:'Controlled paragraphs, effective pacing, purposeful stylistic devices',stems:['Beginning: Although everything seemed normal… / On an ordinary afternoon…','Rising action: Meanwhile… / Despite this… / As tension increased…','Climax: At that moment… / Suddenly…'],check:['Structured, indented paragraphs','Pacing is controlled and intentional','Stylistic devices (foreshadowing, layout, hooks)']},
    'Voice':{goal:'Consistent, engaging narrative voice with maintained perspective',stems:['My narrator sounds ___ (curious / reflective / uncertain).',"This moment reveals character's perspective because ___.",'I want the reader to sense ___ during this scene.'],check:['Voice is consistent and engaging','Perspective clearly maintained','I took creative risks with voice or tone']},
    'Word Choice':{goal:'Rich, precise vocabulary and effective figurative language',stems:['A vivid verb I used is ___.','This simile / metaphor / personification adds meaning because ___.','This word choice creates emotion because ___.'],check:['Rich, precise vocabulary throughout','Figurative language used effectively','Words create mood, atmosphere, and emotion']},
    'Sentence Fluency':{goal:'Rhythmic, flowing sentences with varied structures and purposeful punctuation',stems:['Start with: Although… / While… / Because… / As a result… / Despite this…','Dash: He hesitated—just for a moment—before stepping inside.','Semicolon: The project was challenging; however, it was rewarding.'],check:['Simple, compound, and complex sentences','Flows smoothly when read aloud','Dashes or semicolons used for effect where appropriate']},
    'Conventions':{goal:'Accurate, varied grammar with controlled and purposeful punctuation',stems:['Past perfect: He had discovered the staircase.','Passive: The book was lifted by an unseen force.','Phrase comma: The room, glowing faintly, felt alive.'],check:['Grammar is accurate and varied','Punctuation is controlled and purposeful','Spelling of complex patterns accurate']}
  }
};

const EX={
  1:{
    story:{
      paras:["On Monday morning, I was getting ready for school when I noticed something strange. One of the buttons on my blue jacket was missing. \"Oh no!\" I said. I needed that jacket because it was cold outside.","I looked under my bed, but the button wasn't there. I checked my backpack, but it wasn't there either. I felt worried, so I asked my little sister if she had seen it. She pointed to the living room.","I hurried over and saw my dog, Momo, sitting on the carpet. Right in front of him was my shiny blue button! I picked it up and laughed. \"Momo, you silly dog!\" I said. I gave him a hug and put the button safely in my pocket. When I got to school, I told my friends the whole story. They laughed and said Momo should come to class one day. I felt happy that I found my button and that my day turned out okay."],
      title:'The Lost Button',
      considerations:['A single clear problem introduced in the opening sentences','Events in chronological order — no flashbacks or time jumps','Feelings word used in context, not as a standalone sentence','Basic adjectives describe characters and setting (blue jacket, shiny button)','Simple conjunctions connect ideas (and, but, so, because)','Full stops and capital letters consistently applied','Dialogue present to show character voice'],
      challenges:['Story ends without resolution — the problem is discovered but never clearly solved','Every sentence starts with "I" — no attempt at varied openings','Emotions stated without context: "I felt sad." with nothing before or after to earn it','Describing words missing — characters and settings are unnamed or generic','Incomplete sentences: "Then the dog. And the button."'],
      evolution:null
    },
    info:{
      paras:["Penguins are birds that cannot fly, but they are amazing swimmers. They use their flippers to move quickly through the water. Penguins live in cold places like Antarctica, where there is lots of ice and snow.","Penguins eat fish, squid, and krill. They catch their food in the water. Sometimes they slide on their bellies to move faster on the ice.","Baby penguins are called chicks. They are soft and fluffy. Penguin parents take turns keeping the egg warm. When the chick hatches, the parents feed it until it can find food on its own.","Penguins are interesting animals because they work together, stay warm in groups, and take care of their babies."],
      title:'All About Penguins',

  2:{

      paras:["One sunny afternoon, Leo was building a giant marble track in his room. He reached into his marble jar, but his favourite blue marble was gone. \"That\'s strange,\" he whispered. He always kept it in the jar because it rolled the fastest.","Leo searched under his bed, behind his bookshelf, and even inside his slippers. It was nowhere. He felt worried, so he decided to investigate. He followed a tiny trail of glitter that led out of his room and down the hallway. \"This looks like fairy dust,\" he said, feeling excited.","When he reached the living room, he saw something unbelievable — a small fairy with sparkly wings trying to roll the blue marble across the carpet. \"Oh! I didn\'t mean to take it forever,\" the fairy said. \"I just wanted to see how fast it could go.\" Leo laughed and said she could try it on his track instead. Together, they raced the marble again and again. At the end of the day, Leo felt proud that he had solved the mystery — and happy to have a magical new friend."],

    info:{
      paras:["Sea turtles are amazing reptiles that live in warm oceans around the world. They have strong flippers that help them swim long distances. Their shells protect them from predators like sharks. Sea turtles can hold their breath for a very long time, which helps them stay underwater.","Sea turtles eat different foods depending on their species. Some sea turtles eat seaweed and seagrass, while others eat jellyfish, crabs, or small fish. Their sharp beaks help them bite and tear their food. Green sea turtles mostly eat plants, which is why their fat looks green.","Baby sea turtles have a difficult start to life. They hatch from eggs buried in the sand. When they crawl out of the nest, they must quickly reach the ocean before birds or crabs catch them. Only a few baby turtles survive to become adults.","Sea turtles are interesting animals because they travel far, live long lives, and help keep the ocean healthy."],

    info:{
      paras:["Coral reefs are one of the most diverse and important ecosystems on Earth. Although they look like colourful underwater plants, corals are actually tiny animals called polyps. These polyps live together in large groups and build hard skeletons that form the structure of the reef. Because reefs provide food and shelter for so many species, scientists often call them the \"rainforests of the sea.\"","Many different animals depend on coral reefs to survive. Brightly coloured fish hide between the coral branches to stay safe from predators. Sea turtles visit reefs to find sponges to eat, while octopuses use their camouflage to blend into the rocks. Meanwhile, sharks patrol the deeper areas, keeping the food chain balanced. Without coral reefs, many ocean animals would lose their homes.","Coral reefs are also important for people. They protect coastlines from strong waves and support fishing communities around the world. However, reefs are in danger because of pollution, overfishing, and rising ocean temperatures.","To protect coral reefs, scientists and communities are working together. Some groups plant new corals, while others create protected areas where fishing is limited. Even small actions — like reducing plastic waste — can help keep reefs healthy.","Coral reefs are beautiful, complex, and essential. By learning about them, we can understand why they must be protected for the future."],
      title:'The Amazing World of Coral Reefs',

    info:{
      paras:["Honeybees are some of the most important insects on our planet, even though many people only notice them when they buzz past. A honeybee colony works like a well-organised city. Each bee has a specific job, and the survival of the hive depends on cooperation. Although bees are tiny, their impact on the environment is enormous.","Inside the hive, honeybees follow a strict system of roles. The queen bee lays thousands of eggs and keeps the colony growing. Worker bees — all female — clean the hive, feed the larvae, and protect the entrance. Meanwhile, drone bees have only one job: to mate with a queen. This division of labour allows the hive to function smoothly, even during difficult seasons.","Honeybees also play a crucial role in pollination. As bees travel from flower to flower collecting nectar, pollen sticks to their bodies. When they land on the next flower, some of the pollen rubs off, helping plants produce fruits and seeds. Without bees, many crops — such as apples, almonds, and strawberries — would struggle to grow. Therefore, bees are essential to global food production.","Unfortunately, honeybee populations are declining. Pesticides, habitat loss, and climate change all threaten their survival. Despite these challenges, scientists and communities are working together to protect bees by planting wildflowers, reducing pesticide use, and creating safe habitats.","Honeybees may be small, but their importance is enormous. By understanding how they live and why they matter, we can help protect them for the future."],
      title:'Honeybees: Small Insects, Enormous Impact',

  5:{
    story:{
      paras:["The first time Leo heard the whisper, he thought it was just the old library settling into the night. The building was famous for its creaking floors and dusty corners, but tonight felt different. The air was unusually still, as if the books themselves were holding their breath.","Leo had volunteered to help the librarian close up, even though he usually avoided staying late. His curiosity had grown ever since he discovered a hidden staircase behind the history section the week before. Tonight, he planned to explore it — carefully, quietly, and without drawing attention.","As he dusted the last shelf, the whisper returned: \"Find the forgotten one…\" Leo froze. Despite his racing heartbeat, he followed the sound toward the back of the library. The hidden staircase waited in the shadows. He took a deep breath and stepped down.","At the bottom, he found a circular room filled with ancient books chained to stone pedestals. One book, however, lay open on a table, its pages fluttering even though there was no breeze. A figure made of swirling ink stood beside it — shifting like smoke, like a memory trying to hold its shape. \"I am the Echo,\" it said. \"A memory of every story ever forgotten. This one is fading. If no one reads it, it will disappear forever.\"","So Leo read — slowly at first, then with growing confidence. As he spoke the final line, the room brightened. \"Stories live only when someone cares enough to remember them,\" the Echo said softly. When Leo found himself back in the library, the staircase gone, the open book waited on the table beside him. He smiled. He would return tomorrow — because some stories deserved to be remembered."],

    info:{
      paras:["Earthquakes are powerful natural events that occur when the Earth\'s crust suddenly shifts, releasing energy that travels through the ground. Although earthquakes can feel unpredictable, scientists have discovered clear patterns in how and why they happen. Understanding these patterns helps communities prepare for emergencies and reduce damage.","To begin with, earthquakes are caused by the movement of tectonic plates — massive slabs of rock that fit together like a giant jigsaw puzzle beneath the Earth\'s surface. However, the plates do not move smoothly. Instead, they grind, collide, or slide past one another. When pressure builds up along the boundaries — called faults — it is eventually released as seismic waves that shake the ground, sometimes gently and sometimes with destructive force.","The strength of an earthquake depends on several factors. Scientists measure magnitude using the Moment Magnitude Scale, which calculates how much energy is released. Meanwhile, the intensity of shaking in a specific location depends on the depth of the earthquake, the type of ground, and the distance from the epicentre. Soft soil can amplify shaking, while solid rock can reduce it — meaning two places experiencing the same earthquake may feel it very differently.","Earthquakes can cause a wide range of effects. Buildings may crack or collapse, roads split open, and in coastal regions, underwater earthquakes can trigger tsunamis — massive waves that travel across the ocean. Despite these dangers, engineers have developed earthquake-resistant structures, such as flexible foundations and shock absorbers, to help protect communities.","Although earthquakes cannot be prevented, preparation can save lives. Scientists use seismographs to monitor ground movement and identify patterns. Communities practise emergency drills, create evacuation plans, and secure heavy furniture. With knowledge and preparation, we can reduce risks and protect the places we call home."],

const CHK=`<svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M1.5 5.5L3.5 7.5L8.5 2.5" stroke="#059669" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

let cg=1, op={}, ct='overview';

function sw(g,btn){
  document.querySelectorAll('.gb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  cg=g; op={};
  render();
}

function swTab(t,btn){
  document.querySelectorAll('.tb-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ct=t;
  render();
}

function tog(name){
  op[name]=!op[name];
  renderTraits();
}

function renderBanner(){
  const info=GI[cg];
  document.getElementById('banner').innerHTML=`
    <div class="grade-banner">
      <div class="grade-banner-title">Grade ${cg} &middot; Ages ${info.ages}</div>
      <div class="grade-banner-desc">${info.desc}</div>
    </div>`;
}

function renderOverview(){
  const tc=document.getElementById('tab-content');
  tc.innerHTML=`
    <p class="section-label lbl-warn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Common struggles to watch for
    </p>
    <div id="struggles" class="struggles-grid"></div>
    <p class="section-label lbl-muted">Six traits reference — tap any trait to expand</p>
    <div id="traits"></div>`;

  document.getElementById('struggles').innerHTML=SL[cg].map((s,i)=>`
    <div class="sc" style="--i:${i}">
      <div class="sc-trait">${s.t}</div>
      <div class="sc-text">${s.s}</div>
    </div>`).join('');

  renderTraits();
}

function renderTraits(){
  const el=document.getElementById('traits');
  if(!el)return;
  el.innerHTML=Object.entries(TD[cg]).map(([name,info],i)=>{
    const col=TC[name];
    const isOpen=op[name];
    return `
    <div class="tc${isOpen?' op':''}" style="--i:${i}">
      <button class="th" onclick="tog('${name}')" aria-expanded="${!!isOpen}">
        <span class="t-stripe" style="background:${col}"></span>
        <span class="t-name" style="color:${col}">${name}</span>
        <span class="t-goal">${info.goal}</span>
        <svg class="t-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      ${isOpen?`<div class="tb2">
        <div>
          <div class="tb-col-title" style="color:${col}">Sentence stems</div>
          ${info.stems.map(s=>`<div class="stem" style="border-color:${col}">${s}</div>`).join('')}
        </div>
        <div>
          <div class="tb-col-title" style="color:#059669">Mini checklist</div>
          ${info.check.map(c=>`<div class="ci"><div class="ci-dot">${CHK}</div><span class="ci-text">${c}</span></div>`).join('')}
        </div>
      </div>`:''}
    </div>`;
  }).join('');
}

function renderExample(genre){
  const ex=EX[cg][genre];
  const label=genre==='story'?'Story / Narrative':'Information / Non-Fiction';
  const evolTitle=cg===1?'Foundation year':'Evolution from Grade '+(cg-1);

  const evolutionContent=ex.evolution===null
    ?`<p class="bd-foundation">This is the foundation year. Students are beginning to write for the first time — the goal is simply to get ideas onto the page in complete sentences, with a clear topic and an attempt at structure. There is no prior year to build from.</p>`
    :ex.evolution.map(e=>`<div class="bd-item"><div class="bd-dot green"></div><span class="bd-text green">${e}</span></div>`).join('');

  document.getElementById('tab-content').innerHTML=`
    <p class="ex-label">Grade ${cg} ${label} — Meeting / Exceeding level</p>
    <div class="ex-text-wrap">
      <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--navy);margin-bottom:16px;">${ex.title}</p>
      ${ex.paras.map(p=>`<p>${p}</p>`).join('')}
    </div>
    <div class="bd-grid">
      <div class="bd-card blue" style="--i:0">
        <div class="bd-title blue">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          What to look for
        </div>
        ${ex.considerations.map(c=>`<div class="bd-item"><div class="bd-dot blue"></div><span class="bd-text blue">${c}</span></div>`).join('')}
      </div>
      <div class="bd-card amber" style="--i:1">
        <div class="bd-title amber">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Likely student challenges
        </div>
        ${ex.challenges.map(c=>`<div class="bd-item"><div class="bd-dot amber"></div><span class="bd-text amber">${c}</span></div>`).join('')}
      </div>
      <div class="bd-card green" style="--i:2">
        <div class="bd-title green">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          ${evolTitle}
        </div>
        ${evolutionContent}
      </div>
    </div>`;
}

function render(){
  renderBanner();
  if(ct==='overview') renderOverview();
  else if(ct==='story') renderExample('story');
  else renderExample('info');
}

render();
</script>
