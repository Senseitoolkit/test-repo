<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Guide — Grades 1–5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F2EDE3;--surface:#FFF;--navy:#192C42;--navy-mid:#253D57;
  --text:#1A2535;--text-mid:#4A5568;--text-light:#718096;
  --amber:#D97706;--amber-bg:#FEF3C7;--amber-border:#FCD34D;--amber-text:#78350F;
  --green-bg:#D1FAE5;--green-border:#6EE7B7;--green-text:#065F46;
  --blue-bg:#DBEAFE;--blue-border:#93C5FD;--blue-text:#1E3A8A;
  --grey-bg:#F1F5F9;--grey-border:#CBD5E1;--grey-text:#475569;
  --c-ideas:#1A6EB5;--c-fluency:#6B46C1;--c-org:#1A7A4C;--c-word:#B45309;
  --c-voice:#A62878;--c-grammar:#C2410C;--c-punc:#0E7490;--c-spell:#4D7C0F;--c-pres:#57534E;
  --r:10px;
}
html{font-size:16px;scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}

.header{background:var(--navy);color:#fff;padding:26px 24px 20px;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 1px,transparent 20px);pointer-events:none;}
.header-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px;}
.header-title{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:4px;}
.header-sub{font-size:13px;color:rgba(255,255,255,.45);}

.grade-nav{background:var(--navy-mid);padding:12px 20px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.gb{padding:7px 20px;border-radius:24px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13.5px;font-weight:600;background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);transition:all .2s;white-space:nowrap;}
.gb:hover:not(.on){background:rgba(255,255,255,.18);color:#fff;}
.gb.on{background:var(--amber);color:var(--navy);box-shadow:0 2px 10px rgba(217,119,6,.45);}

.container{max-width:880px;margin:0 auto;padding:24px 20px 56px;}

.grade-banner{background:#fff;border-radius:0 var(--r) var(--r) 0;border-left:4px solid var(--amber);padding:14px 18px;margin-bottom:14px;animation:up .3s ease both;}
.grade-banner-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:var(--navy);margin-bottom:2px;}
.grade-banner-desc{font-size:13.5px;color:var(--text-mid);}

/* Tab nav */
.tab-nav{display:flex;gap:0;border-bottom:2px solid #DDD8CE;margin-bottom:24px;}
.tb-btn{padding:10px 18px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:13.5px;font-weight:600;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;white-space:nowrap;}
.tb-btn.on{color:var(--navy);border-bottom-color:var(--amber);}
.tb-btn:hover:not(.on){color:var(--text-mid);}

/* Overview section */
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.lbl-warn{color:var(--amber);}
.lbl-muted{color:var(--text-light);}

.struggles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:9px;margin-bottom:32px;}
.sc{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r);padding:11px 13px;animation:up .3s ease both;animation-delay:calc(var(--i,0)*40ms);}
.sc-trait{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--amber);margin-bottom:5px;}
.sc-text{font-size:13px;color:var(--amber-text);line-height:1.5;}

.tc{background:#fff;border:1px solid #DDD8CE;border-radius:var(--r);margin-bottom:7px;overflow:hidden;transition:border-color .2s,box-shadow .2s;animation:up .3s ease both;animation-delay:calc(var(--i,0)*35ms);}
.tc.op{border-color:#B2A898;box-shadow:0 2px 14px rgba(0,0,0,.08);}
.th{display:flex;align-items:center;padding:11px 16px;cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:'Nunito',sans-serif;gap:10px;transition:background .15s;}
.th:hover{background:#F7F4EE;}
.t-stripe{width:4px;height:30px;border-radius:2px;flex-shrink:0;}
.t-name{font-weight:700;font-size:14px;flex-shrink:0;min-width:118px;}
.co-badge{display:inline-block;font-size:9.5px;font-weight:700;color:#fff;padding:2px 7px;border-radius:9px;flex-shrink:0;letter-spacing:.4px;}
.t-goal{font-size:12.5px;color:var(--text-mid);flex:1;}
.t-chev{flex-shrink:0;transition:transform .25s;color:var(--text-light);}
.tc.op .t-chev{transform:rotate(180deg);}
.tb2{display:none;grid-template-columns:1fr 1fr;gap:20px;padding:4px 18px 18px 30px;background:#FAFAF7;border-top:1px solid #EAE4D8;animation:fade .2s ease both;}
.tc.op .tb2{display:grid;}
.tb-col-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;margin:14px 0 9px;}

/* SAME 4-point scale bands */
.same-band{border-left:3px solid;padding:7px 11px;border-radius:0 7px 7px 0;margin-bottom:8px;}
.same-band.meet{border-color:var(--green-text);background:var(--green-bg);}
.same-band.appr{border-color:var(--amber);background:var(--amber-bg);}
.same-band.start{border-color:var(--grey-border);background:var(--grey-bg);}
.same-lvl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;}
.same-band.meet .same-lvl{color:var(--green-text);}
.same-band.appr .same-lvl{color:var(--amber-text);}
.same-band.start .same-lvl{color:var(--grey-text);}
.same-desc{font-size:12.5px;color:var(--text);line-height:1.45;}

.ci{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.ci-dot{width:17px;height:17px;border-radius:50%;background:#D1FAE5;border:1.5px solid #34D399;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ci-text{font-size:12.5px;color:var(--text);line-height:1.4;}

/* Example tab */
.ex-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-light);margin-bottom:8px;}
.ex-text-wrap{background:#FDFCF8;border:1px solid #DDD8CE;border-radius:var(--r);padding:22px 26px;margin-bottom:20px;animation:up .3s ease both;}
.ex-text-wrap p{font-size:14.5px;line-height:1.8;color:var(--text);margin-bottom:14px;}
.ex-text-wrap p:last-child{margin-bottom:0;}

.bd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.bd-card{border-radius:var(--r);padding:14px 16px;animation:up .3s ease both;animation-delay:calc(var(--i,0)*50ms);}
.bd-card.blue{background:var(--blue-bg);border:1px solid var(--blue-border);}
.bd-card.amber{background:var(--amber-bg);border:1px solid var(--amber-border);}
.bd-card.green{background:var(--green-bg);border:1px solid var(--green-border);}
.bd-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.bd-title.blue{color:var(--blue-text);}
.bd-title.amber{color:var(--amber);}
.bd-title.green{color:var(--green-text);}
.bd-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;}
.bd-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.bd-dot.blue{background:var(--blue-text);}
.bd-dot.amber{background:var(--amber);}
.bd-dot.green{background:var(--green-text);}
.bd-text{font-size:13px;line-height:1.4;}
.bd-text.blue{color:var(--blue-text);}
.bd-text.amber{color:var(--amber-text);}
.bd-text.green{color:var(--green-text);}
.bd-foundation{font-size:13px;color:var(--green-text);line-height:1.5;font-style:italic;}

.footer{text-align:center;padding:20px;font-size:12px;color:var(--text-light);border-top:1px solid #DDD8CE;margin-top:12px;}

@keyframes up{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
@keyframes fade{from{opacity:0;}to{opacity:1;}}

@media(max-width:680px){
  .bd-grid{grid-template-columns:1fr;}
  .tc.op .tb2{grid-template-columns:1fr;}
  .struggles-grid{grid-template-columns:1fr;}
  .t-goal{display:none;}
  .header-title{font-size:22px;}
  .container{padding:16px 14px 48px;}
  .tab-nav{overflow-x:auto;padding-bottom:2px;}
  .tb-btn{font-size:12.5px;padding:9px 13px;}
}
@media print{
  .grade-nav,.header::before{display:none;}
  .tc.op .tb2{display:grid;}
  .tc{page-break-inside:avoid;}
  body{background:#fff;}
}
</style>
</head>
<body>

<header class="header">
  <p class="header-label">Writing Assessment Rubric 2026–27</p>
  <h1 class="header-title">Writing Guide — Grades 1–5</h1>
  <p class="header-sub">Six Traits of Writing · SAME 4-Point Scale</p>
</header>

<nav class="grade-nav" role="navigation" aria-label="Select a grade">
  <button class="gb on" onclick="sw(1,this)">Grade 1</button>
  <button class="gb" onclick="sw(2,this)">Grade 2</button>
  <button class="gb" onclick="sw(3,this)">Grade 3</button>
  <button class="gb" onclick="sw(4,this)">Grade 4</button>
  <button class="gb" onclick="sw(5,this)">Grade 5</button>
</nav>

<main class="container">
  <div id="banner"></div>
  <div class="tab-nav">
    <button class="tb-btn on" onclick="swTab('overview',this)">Rubric overview</button>
    <button class="tb-btn" onclick="swTab('story',this)">Story example</button>
    <button class="tb-btn" onclick="swTab('info',this)">Information example</button>
  </div>
  <div id="tab-content"></div>
</main>

<footer class="footer">
  Writing Assessment Rubric 2026–27 &middot; Six Traits of Writing &middot; SAME 4-Point Scale
</footer>

<script>
const GI={
  1:{ages:'6–7',desc:'Foundational writing — clear ideas, beginning–middle–end structure, and basic conventions'},
  2:{ages:'7–8',desc:'Developing voice, simple paragraphs, sequencing, and sentence variety'},
  3:{ages:'8–9',desc:'Complex sentences, varied transitions, and accurately punctuated dialogue'},
  4:{ages:'9–10',desc:'Cohesive devices, figurative language, and grammar that suits purpose'},
  5:{ages:'10–11',desc:'Sustained ideas, deliberate craft, and advanced punctuation'}
};

// Nine assessment traits, in rubric order, with CO codes and the SAME 4-point
// descriptors. These descriptors are grade-independent in the rubric.
const TRAITS=[
  {n:'Ideas',co:'CO1',
    s:'The writer does not have clear, focused, and engaging ideas.',
    a:'Has difficulty developing clear, focused, and engaging ideas.',
    m:'Develops clear, focused, and engaging ideas.'},
  {n:'Sentence Fluency',co:'CO2',
    s:'The writing has no flow or readability.',
    a:'Has difficulty constructing sentences that enhance the flow and readability of writing.',
    m:'Constructs sentences that enhance the flow and readability of writing.'},
  {n:'Organization',co:'CO3',
    s:'Structure is not logical or coherent.',
    a:'Has difficulty structuring writing logically for clarity and coherence.',
    m:'Structures writing logically for clarity and coherence.'},
  {n:'Word Choice',co:'CO4',
    s:'The writer is not using a level of vocabulary expected for this grade.',
    a:'Has difficulty using vocabulary to enhance meaning and engage the reader.',
    m:'Uses precise, varied, and purposeful vocabulary to enhance meaning and engage the reader.'},
  {n:'Voice',co:'CO5',
    s:'The writer is not using a clear and appropriate voice.',
    a:'Has difficulty writing with a clear and appropriate voice.',
    m:'Writes with a clear and appropriate voice.'},
  {n:'Grammar',co:'CO6 · CO7',
    s:'It is evident that the writer does not understand taught grammar structures.',
    a:'Has difficulty constructing and manipulating a range of sentence structures (CO6) and applying grammatical knowledge accurately (CO7).',
    m:'Constructs and manipulates a range of sentence structures (CO6); applies grammatical knowledge accurately (CO7).'},
  {n:'Punctuation',co:'CO8',
    s:'It is evident that the writer does not understand taught punctuation and capitalisation rules.',
    a:'Has difficulty using punctuation accurately and purposefully.',
    m:'Uses punctuation accurately and purposefully.'},
  {n:'Spelling',co:'CO9',
    s:'It is evident that the writer does not understand age-appropriate spelling rules.',
    a:'Has difficulty spelling common and familiar words accurately.',
    m:'Spells common and familiar words accurately.'},
  {n:'Presentation',co:'CO10',
    s:'Overall presentation makes the piece illegible.',
    a:'Has difficulty presenting written work clearly and neatly.',
    m:'Presents written work clearly and neatly.'}
];

const TC={
  'Ideas':'var(--c-ideas)','Sentence Fluency':'var(--c-fluency)','Organization':'var(--c-org)',
  'Word Choice':'var(--c-word)','Voice':'var(--c-voice)','Grammar':'var(--c-grammar)',
  'Punctuation':'var(--c-punc)','Spelling':'var(--c-spell)','Presentation':'var(--c-pres)'
};

// Grade-specific indicators — what "Meeting (3)" looks like at each grade.
// Taken directly from the rubric's Indicators column.
const IND={
  1:{
    'Ideas':['Develops a clear main idea related to the task or topic','Includes details to support ideas','Maintains focus on the task'],
    'Sentence Fluency':['Writes clear, complete simple sentences that can be read aloud smoothly','Links ideas using basic connectives (e.g. and, but, because)','Writes sequences of sentences that flow logically'],
    'Organization':['Organises ideas in a logical order','Uses a simple structure such as beginning–middle–end','Groups related ideas together'],
    'Word Choice':['Uses topic-related vocabulary','Includes descriptive words to add detail','Begins to choose words intentionally'],
    'Voice':['Writes with a tone suited to the task','Expresses feelings or opinions through writing','Shows awareness that writing is meant to be read'],
    'Grammar':['Uses simple sentences accurately','Writes compound sentences using connectives (e.g. and, but, because)','Uses statements and questions appropriately','Uses singular and plural nouns accurately','Uses present and past tense verbs appropriately','Uses subject pronouns correctly'],
    'Punctuation':['Uses capital letters and full stops accurately','Uses question marks and exclamation marks appropriately','Uses capital letters for proper nouns (e.g. names, places)'],
    'Spelling':['Spells common words accurately','Uses phonics strategies to attempt new words','Spells topic-related words with growing independence'],
    'Presentation':['Writes neatly with legible handwriting','Uses spacing between words','Presents work clearly']
  },
  2:{
    'Ideas':['Develops a clear main idea','Supports the main idea with several relevant details or reasons','Maintains focus on the task'],

    'Organization':['Organises ideas in a logical order','Uses familiar structures (e.g. beginning–middle–end, letter format)','Uses sequencing language'],
    'Word Choice':['Uses topic-appropriate vocabulary','Chooses specific words to add detail (e.g. adjectives, verbs)','Begins to select vocabulary deliberately'],
    'Voice':['Writes with a tone appropriate to the task','Shares feelings, opinions, or information through writing','Shows awareness of the reader'],
    'Grammar':['Uses simple sentences accurately','Uses compound sentences with coordinating conjunctions','Begins to vary sentence lengths and beginnings','Uses correct tense appropriately','Uses subject–verb agreement accurately','Applies basic grammar rules consistently'],
    'Punctuation':['Uses capital letters and end punctuation accurately','Uses commas in lists','Uses capital letters for proper nouns'],
    'Spelling':['Spells common words accurately','Applies spelling patterns and strategies','Spells topic-related words with increasing consistency'],
    'Presentation':['Writes legibly with consistent letter formation','Uses consistent spacing between words','Presents work neatly, so overall appearance is clear']
  },
  3:{
    'Ideas':['Develops a clear main idea that is generally maintained','Supports ideas with relevant details or examples','Shapes ideas to suit the purpose of the task (e.g. narrative, explanation, opinion)'],
    'Sentence Fluency':['Writes clear, complete sentences that flow smoothly when read aloud','Uses a range of sentence lengths, including simple and compound sentences','Links ideas effectively within and across sentences'],
    'Organization':['Organises writing into clear sections or paragraphs','Uses simple text structures appropriate to purpose','Sequences ideas logically'],
    'Word Choice':['Uses topic-appropriate vocabulary','Chooses specific nouns, verbs, and adjectives','Begins to use descriptive or figurative language'],
    'Voice':['Maintains an appropriate tone for the task','Expresses ideas, opinions, or feelings clearly','Shows awareness of the reader'],
    'Grammar':['Uses simple and compound sentences accurately','Uses complex sentences (with conjunctions or clauses) to expand ideas','Varies sentence structure to improve clarity','Maintains tense consistency','Uses subject–verb agreement accurately','Uses a range of word classes correctly'],
    'Punctuation':['Uses capital letters and end punctuation accurately','Uses commas and apostrophes correctly in familiar contexts','Uses quotation marks appropriately in dialogue'],
    'Spelling':['Spells most high-frequency words correctly','Applies spelling rules and patterns','Spells topic-specific words with growing accuracy'],
    'Presentation':['Maintains legible handwriting','Uses consistent spacing and layout','Presents work neatly']
  },
  4:{
    'Ideas':['Develops a clear main idea that is maintained throughout writing','Supports ideas with relevant and developed details','Shapes ideas to suit the task and purpose'],

    'Organization':['Organises writing into clear paragraphs or sections','Uses structures suited to purpose (e.g. narrative, explanation, persuasion)','Uses a range of cohesive devices (e.g. transitions, referential links) to link ideas'],

    'Grammar':['Uses simple, compound, and complex sentences accurately','Expands ideas using phrases and clauses','Uses sentence variety to improve clarity','Maintains consistent tense and agreement','Uses a wide range of word classes accurately','Applies grammar to suit purpose (progressive, perfect, modal, active and passive)'],
    'Punctuation':['Uses capital letters and end punctuation accurately','Uses commas and apostrophes correctly','Uses quotation marks accurately'],
    'Spelling':['Spells most high-frequency words correctly','Applies spelling rules to unfamiliar words','Spells subject-specific vocabulary accurately'],
    'Presentation':['Maintains legible handwriting across longer texts','Uses appropriate spacing and layout','Presents work neatly and consistently']
  },
  5:{
    'Ideas':['Develops a clear, focused main idea that is sustained throughout the writing','Develops ideas with relevant and well-chosen details','Shapes ideas deliberately to suit purpose and audience'],
    'Sentence Fluency':['Uses a variety of sentence lengths and structures','Writes sentences that flow naturally when read aloud','Avoids repetitive sentence patterns'],
    'Organization':['Organises writing into clear, purposeful paragraphs','Uses structures appropriate to text type','Uses cohesive devices (e.g. transitions) to link ideas across paragraphs'],
    'Word Choice':['Uses precise and subject-specific vocabulary','Uses descriptive and figurative language (e.g. similes, metaphors) appropriately','Avoids unnecessary repetition'],
    'Voice':['Writes a consistent and appropriate tone','Shows awareness of audience throughout writing','Expresses ideas with confidence and individuality'],
    'Grammar':['Uses simple, compound, and complex sentences accurately','Expands ideas using clauses and phrases','Selects sentence structures deliberately','Maintains tense, agreement, and consistency','Uses a wide range of word classes accurately','Applies grammar to suit different text types'],
    'Punctuation':['Uses punctuation accurately, including commas and quotation marks','Applies punctuation to clarify meaning','Begins to use advanced punctuation appropriately'],
    'Spelling':['Spells most words accurately across writing','Applies spelling patterns and strategies confidently','Spells subject-specific vocabulary accurately'],
    'Presentation':['Maintains legible handwriting or presentation format','Uses spacing, layout, and formatting consistently','Presents work clearly across extended tasks']
  }
};

// Common struggles (Approaching / Starting reality), one per trait, grounded
// in each grade's indicators.
const SL={
  1:[
    {t:'Ideas',s:'Writes 1–2 sentences with no detail — a main idea is named but never developed'},
    {t:'Sentence Fluency',s:'Sentences sit side by side without connectives (and, but, because)'},
    {t:'Organization',s:'No clear ending — events are listed without a beginning–middle–end shape'},
    {t:'Word Choice',s:'Repeats "nice", "good", "fun" — few topic or describing words'},
    {t:'Voice',s:'Flat writing: "It was fun." — no feelings or sense of a reader'},
    {t:'Grammar',s:'Run-on or incomplete sentences; plural or tense slips (e.g. "two dog")'},

    {t:'Word Choice',s:'Weak verbs throughout: went, said, did — no specific choices'},
    {t:'Voice',s:'Voice disappears in non-narrative writing — informational text feels flat'},
    {t:'Grammar',s:'Tense shifts mid-piece (past ↔ present); subject–verb agreement slips'},

    {t:'Spelling',s:'Familiar words misspelled; spelling patterns not yet applied'},

  ],
  3:[
    {t:'Ideas',s:'Surface-level details — ideas listed but not developed or shaped to purpose'},
    {t:'Sentence Fluency',s:'All simple sentences — no compound or complex variety; choppy flow'},
    {t:'Organization',s:'Repetitive transitions ("Then… Then…"); sections or paragraphs unclear'},
    {t:'Word Choice',s:'Adjectives without strong verbs or any figurative language'},
    {t:'Voice',s:'Tone shifts mid-piece — inconsistent style between sections'},
    {t:'Grammar',s:'Complex sentences attempted but mis-joined; tense not maintained'},
    {t:'Punctuation',s:'Dialogue unpunctuated — missing quotation marks; apostrophes misused'},
    {t:'Spelling',s:'High-frequency words mostly fine, but topic-specific words inconsistent'},
    {t:'Presentation',s:'Layout untidy — spacing and handwriting inconsistent across the page'}
  ],
  4:[
    {t:'Ideas',s:'Good ideas but underdeveloped — missing explanation, examples, or depth'},
    {t:'Sentence Fluency',s:'Overuses one structure; sentences lack varied length and flow'},
    {t:'Organization',s:'Weak hooks and abrupt endings; cohesive devices thin or missing'},

  ],

    {t:'Sentence Fluency',s:'Overly long sentences that confuse; little deliberate variety or rhythm'},
    {t:'Organization',s:'Pacing issues — rushed climax or long setup; cohesion across paragraphs weak'},
    {t:'Word Choice',s:'Figurative language used randomly — similes and metaphors feel forced'},
    {t:'Voice',s:'Over-describing slows the pace; voice not consistently confident'},
    {t:'Grammar',s:'Relative clauses poorly integrated; passive overused or avoided entirely'},
    {t:'Punctuation',s:'Uncertain when to use a dash or semicolon; advanced punctuation inconsistent'},
    {t:'Spelling',s:'Subject-specific vocabulary misspelled in extended writing'},
    {t:'Presentation',s:'Presentation inconsistent across extended tasks — layout and formatting waver'}
  ]
};

const EX={"1":{"story":{"title":"The Lost Button","paras":["On Monday morning, I was getting ready for school when I noticed something strange. One of the buttons on my blue jacket was missing. \"Oh no!\" I said. I needed that jacket because it was cold outside.","I looked under my bed, but the button wasn't there. I checked my backpack, but it wasn't there either. I felt worried, so I asked my little sister if she had seen it. She pointed to the living room.","I hurried over and saw my dog, Momo, sitting on the carpet. Right in front of him was my shiny blue button! I picked it up and laughed. \"Momo, you silly dog!\" I said. I gave him a hug and put the button safely in my pocket. When I got to school, I told my friends the whole story. They laughed and said Momo should come to class one day. I felt happy that I found my button and that my day turned out okay."],"considerations":["A single clear problem introduced in the opening sentences","Events in chronological order, with no flashbacks or time jumps","A feelings word used in context, not as a standalone sentence","Basic adjectives describe characters and setting (blue jacket, shiny button)","Simple conjunctions connect ideas (and, but, so, because)","Full stops and capital letters used consistently","Dialogue used to show character voice"],"challenges":["The story ends without resolution, so the problem is found but never solved","Every sentence starts with \"I\", with no attempt at varied openings","Emotions stated with no context: \"I felt sad.\" with nothing to earn it","Describing words missing, so characters and settings stay generic","Incomplete sentences: \"Then the dog. And the button.\""],"evolution":null},"info":{"title":"All About Penguins","paras":["Penguins are birds that cannot fly, but they are amazing swimmers. They use their flippers to move quickly through the water. Penguins live in cold places like Antarctica, where there is lots of ice and snow.","Penguins eat fish, squid, and krill. They catch their food in the water. Sometimes they slide on their bellies to move faster on the ice.","Baby penguins are called chicks. They are soft and fluffy. Penguin parents take turns keeping the egg warm. When the chick hatches, the parents feed it until it can find food on its own.","Penguins are interesting animals because they work together, stay warm in groups, and take care of their babies."],"considerations":["A topic sentence that names and introduces the subject clearly","Three to five facts organised into logical groups (habitat, diet, young)","Simple nonfiction vocabulary suited to the topic (flippers, chicks)","Full sentences throughout, not bullet points or labels","A closing sentence that says why the topic is interesting","One idea per sentence, with no mixed-up facts in a single sentence"],"challenges":["Writing a word list rather than full sentences: \"Penguins: fish, cold, flippers\"","No topic sentence, jumping straight to a random fact","Facts mixed up with no logical grouping or order","Ending on a random fact rather than a concluding thought","Repeating the same fact in different words across sentences"],"evolution":null}},"2":{"story":{"title":"The Mystery of the Missing Marble","paras":["One sunny afternoon, Leo was building a giant marble track in his bedroom. He loved racing his marbles down the loops and ramps. His favourite was a shiny blue marble because it always rolled the fastest.","Leo opened his marble jar to start a new race. He counted his marbles one by one. Then he stopped and looked again. His blue marble was not there!","Leo felt worried. He searched under his bed and behind his bookshelf, but the blue marble was gone. Just then, he saw a tiny trail of sparkly glitter on the floor. The trail led out of his room and down the hallway.","Leo followed the glitter all the way to the living room. There he saw a little fairy with sparkly wings. She was rolling his blue marble across the carpet. \"I am sorry,\" said the fairy. \"I only wanted to see how fast it could go.\" Leo smiled and said she could race it on his track instead.","Together they raced the blue marble again and again. It zoomed down every ramp and won every time. At the end of the day, Leo felt proud that he had solved the mystery. Best of all, he had made a new magical friend."],"considerations":["Five clear parts: beginning, build up, problem, solution, and ending","Each part sits in its own paragraph, so the structure is easy to see","A character with a clear goal, not just a list of actions","Dialogue used to show character, with correct speech punctuation","Adjectives and adverbs together add detail (sparkly wings, rolled fastest)","A mix of simple and compound sentences","Time and sequence words guide the reader (one afternoon, then, at the end of the day)"],"challenges":["The five parts blur together, so the problem or solution is missing","Speech written without quotation marks or a new line for each speaker","One verb repeated throughout (went, went, went) instead of stronger choices","The story stops after the problem, with no real solution or ending","Every sentence the same short length, with no variety in rhythm"],"evolution":["The arc grows from beginning, middle, and end into five clear parts: beginning, build up, problem, solution, and ending","Paragraphs are now expected, with each part of the story shown separately","Dialogue appears for the first time as a writing expectation","Adverbs are expected alongside adjectives to add precision","Sentences begin to vary in length and pattern"]},"info":{"title":"Sea Turtles","paras":["Sea turtles are amazing reptiles that live in warm oceans all around the world. They have lived on Earth for millions of years. There are many interesting things to learn about how they look, what they eat, and how they grow.","Sea turtles have special bodies that help them live in the sea. Their strong flippers help them swim long distances. Their hard shells protect them from animals like sharks. They can also hold their breath for a long time when they dive underwater.","Sea turtles eat different foods depending on their type. Some sea turtles eat seaweed and seagrass. Other sea turtles eat jellyfish, crabs, and small fish. Their sharp beaks help them bite and tear their food.","Baby sea turtles have a hard start to life. They hatch from eggs that are buried in the warm sand. When they come out, they must hurry to the ocean before birds and crabs catch them. Only a few baby turtles grow up to become adults.","Sea turtles are special animals that we should protect. They travel far, live long lives, and help keep the ocean healthy. If we look after the sea, sea turtles can live safely for many more years."],"considerations":["Five paragraphs: an introduction, three body paragraphs, and a conclusion","The introduction names the topic and previews what the text will cover","Each body paragraph begins with a clear topic sentence","Each body paragraph covers one idea only (body, diet, life cycle)","Topic words are used accurately (flippers, seagrass, hatch)","The conclusion sums up the topic and says why it matters"],"challenges":["Facts jumbled together instead of grouped into separate paragraphs","Body paragraphs with no topic sentence to introduce the idea","No real conclusion, so the text stops on a random fact","Vague wording (\"they eat food\") instead of specific facts","Everything written in one block with no clear structure"],"evolution":["Writing moves to a full five-paragraph shape: introduction, three body paragraphs, conclusion","Every body paragraph must open with a clear topic sentence","Facts must be grouped by idea, one idea per paragraph","A proper conclusion is expected, not just a final fact","Topic-specific vocabulary is now part of the expectation"]}},"3":{"story":{"title":"The Cuckoo Clock","paras":["Mira loved visiting her grandfather's tiny clock shop at the end of Maple Street. Every shelf was filled with ticking clocks of all shapes and sizes. Her favourite was an old wooden cuckoo clock that had not worked for years. \"One day,\" her grandfather always said, \"you will be the one to fix it.\"","One rainy afternoon, Mira decided to try. She carefully opened the back of the clock and found a small silver key hidden inside. When she turned the key, the whole shop began to shimmer. The clocks ticked faster and faster until a bright flash filled the room.","Suddenly, Mira found herself standing in a strange forest where giant gears turned like trees. A tiny mechanical bird fluttered toward her. \"You must help us,\" it chirped. \"The Time Tree has stopped, and our whole world is slowing down.\" Mira felt nervous, but she knew she had to try.","The bird led her to a tall tree made of spinning wheels and glowing numbers. At the very top, one golden gear was missing. Mira reached into her pocket and felt the silver key. She climbed carefully, slipped the key into the empty space, and turned it. At once, the Time Tree began to glow and the gears spun smoothly again.","In another bright flash, Mira was back in the clock shop. For the first time in years, the old cuckoo clock chimed loudly. Her grandfather smiled and said, \"I knew you could do it.\" Mira grinned, wondering if the magical forest had been real, or if the clock was simply full of surprises."],"considerations":["Five clear parts: beginning, build up, problem, solution, and ending","Four to six paragraphs that move the story along at a steady pace","Dialogue on a new line for each speaker, with correct punctuation","A range of sentence lengths, including some complex sentences","At least one example of figurative language (a simile or metaphor)","Sensory detail builds the setting through sight and sound","One consistent narrator and tense from start to finish"],"challenges":["The build up or solution is rushed, so the arc feels uneven","Dialogue run together without speaker breaks or quotation marks","Figurative language that is clichéd or does not fit the moment","Tense slips between past and present within the story","A long build up followed by a one-sentence problem and solution"],"evolution":["The five-part arc is now told across several organised paragraphs","Figurative language (simile, metaphor, personification) is expected","The perfect tense is introduced (she had found, it had stopped)","Transitions become more varied (suddenly, at once, for the first time)","Dialogue must follow full punctuation rules and use new lines per speaker"]},"info":{"title":"The Amazing World of Coral Reefs","paras":["Coral reefs are some of the most colourful and important places in the ocean. Although they look like underwater gardens, corals are actually tiny animals that live together in huge groups. Reefs are home to thousands of sea creatures, which is why people often call them the rainforests of the sea.","Coral reefs give food and shelter to many different animals. Brightly coloured fish hide among the coral to stay safe from larger predators. Sea turtles visit the reef to feed, while octopuses change colour to blend into the rocks. Without the reef, many of these animals would lose their homes.","Coral reefs are also important for people. They act like a natural wall that protects beaches and coastlines from strong waves. Many families around the world depend on healthy reefs for fishing and for visitors who come to see them. In this way, reefs help both nature and people.","Sadly, coral reefs are now in danger. Pollution, overfishing, and warmer oceans are harming the coral and the animals that live there. To help, scientists are growing new coral and creating protected areas where fishing is limited. Even small actions, like using less plastic, can make a difference.","Coral reefs are beautiful, busy, and full of life. They protect our coasts, feed countless animals, and support communities everywhere. By learning about reefs and caring for the ocean, we can help keep them healthy for the future."],"considerations":["Five paragraphs: an introduction, three body paragraphs, and a conclusion","A clear topic sentence opens each body paragraph","Each body paragraph develops one idea with supporting detail","Some sentences explain why a fact matters, not just what it is","Subject vocabulary is used accurately (coral, predators, protected)","The conclusion draws the ideas together rather than adding a new fact"],"challenges":["Body paragraphs with no topic sentence to anchor them","Facts listed without any explanation of why they matter","A conclusion that simply repeats the introduction","Ideas from different paragraphs mixed together","Transitions copied in but used in the wrong place"],"evolution":["Each body paragraph now needs a topic sentence and supporting detail","Students begin to explain why facts matter, not just state them","Transitions link ideas within and between paragraphs","Subject-specific vocabulary is expected with growing accuracy","The conclusion must pull the ideas together, not add a new one"]}},"4":{"story":{"title":"The Lantern of Paths","paras":["Lena had explored every corner of her grandmother's house except the attic. It was the only place she was not allowed to enter. \"Too dusty,\" her grandmother always said, although Lena suspected there was another reason.","One stormy afternoon, while the wind rattled the windows and her grandmother was napping, Lena noticed that the attic door was slightly open. Curiosity tugged at her like an invisible string. She climbed the narrow staircase, and each step creaked beneath her feet. The attic smelled of old books and cedar wood, and in the centre of the room a single silver lantern was lit by a thin beam of sunlight.","As Lena reached for the lantern, it flickered to life. A soft blue glow spread across the attic, and the floorboards began to shimmer. Before she could step back, the room melted away. Instead of dusty boxes, Lena found herself standing in a forest of glowing trees whose leaves sparkled like tiny stars. She had no idea how to find her way home.","A fox with shimmering fur stepped forward and spoke in a calm voice. \"You have awakened the Lantern of Paths,\" it said. \"It shows you the place you need most.\" Lena's heart pounded as she asked why it had brought her here. \"Because you have been feeling lost,\" the fox replied. \"This forest shows you the courage you already have.\" As Lena understood, the lantern's glow grew brighter and gently guided her back.","In a flash, Lena was standing in the attic again, holding the now dim lantern. She could hear her grandmother calling her name from downstairs. Lena smiled to herself and hurried down, certain that she would return one day, when she was ready to discover more."],"considerations":["Five clear parts: beginning, build up, problem, solution, and ending","An opening that draws the reader in through action or mystery","Atmosphere built with carefully chosen, descriptive vocabulary","One consistent narrative perspective throughout","Cohesive devices link the paragraphs (one afternoon, before, as)","Both active and passive voice used for effect (the lantern was lit by sunlight)","A meaningful object that matters to the story (the lantern)"],"challenges":["An opening that summarises the plot instead of drawing the reader in","Perspective that slips into another character without warning","Ambitious vocabulary used incorrectly or repeated","Passive voice that becomes awkward or unclear","Paragraphs that jump without a smooth link between them"],"evolution":["Opening hooks are now expected, not a plain summary","Atmosphere and mood matter as much as the events","Narrative perspective must stay consistent throughout","A meaningful or symbolic object is introduced as a craft technique","Active and passive voice are chosen deliberately for effect"]},"info":{"title":"Honeybees: Small Insects, Big Importance","paras":["Honeybees are some of the most important insects on our planet, even though many people only notice them when they buzz past. A honeybee colony works like a busy, well-organised city where every bee has a job to do. Although bees are tiny, their impact on the world around us is enormous.","Inside the hive, honeybees follow a strict system of roles. The queen bee lays thousands of eggs so that the colony keeps growing. The worker bees, which are all female, clean the hive, feed the young, and guard the entrance. The male bees, called drones, have just one job, which is to help a new queen start her own colony.","Honeybees also play a vital role in helping plants grow. As bees travel from flower to flower to collect nectar, soft yellow pollen sticks to their bodies. When they land on the next flower, some of this pollen rubs off and helps the plant make fruits and seeds. Because of this, many of the foods we eat, such as apples, almonds, and strawberries, depend on bees.","Sadly, honeybee numbers are falling in many parts of the world. Harmful chemicals, the loss of wild spaces, and a changing climate all make life difficult for bees. However, scientists and communities are working hard to help them. They plant wildflowers, use fewer chemicals, and build safe places for bees to live.","Honeybees may be small, but their importance is huge. They keep our plants healthy and help to provide much of the food we enjoy. By learning about bees and protecting them, we can make sure these amazing insects survive for the future."],"considerations":["Five paragraphs: introduction, three body paragraphs, and a conclusion","Each body paragraph opens with a clear topic sentence and develops one idea","Ideas follow a claim, then an explanation, then an example","Cohesive devices link the paragraphs (however, because of this, also)","Subject vocabulary is precise and used with confidence","The conclusion sums up the ideas and explains why the topic matters"],"challenges":["Body paragraphs that try to cover everything with no clear focus","Facts stated without the explanation that makes them meaningful","Weak transitions (first, next, then) rather than logical links","A conclusion that just repeats the introduction","Topic sentences missing, so paragraphs have no controlling idea"],"evolution":["Each body paragraph follows claim, explanation, and example","Transitions link ideas logically, not just decoratively","Writing shows understanding, not just recall of facts","Subject-specific vocabulary is expected throughout","The conclusion explains significance rather than restating the opening"]}},"5":{"story":{"title":"The Echo","paras":["The first time Leo heard the whisper, he thought it was only the old library settling into the night. The building was famous for its creaking floors and dusty corners, yet tonight felt strangely different. The air was unusually still, as if the books themselves were holding their breath.","Leo had offered to help the librarian close up, even though he usually hurried home before dark. His curiosity had been growing ever since he discovered a hidden staircase behind the history section the week before. Tonight, he had quietly decided to explore it. As he dusted the final shelf, the whisper returned, soft and clear: \"Find the forgotten one.\"","Leo froze. Although his heart was pounding, he followed the sound toward the shadows at the back of the library, where the hidden staircase waited. He took a slow breath and stepped down into the dark. At the bottom he found a circular room filled with ancient books, and one book lay open on a stone table, its pages fluttering even though there was no breeze.","Beside the book stood a figure made of swirling ink, a shape that shifted like smoke and seemed to fade with every passing second. \"I am the Echo,\" it said softly. \"I am the memory of every story that has been forgotten. This one is fading; if no one reads it, it will vanish forever.\" So Leo began to read. He read slowly at first, then with growing confidence, until the final words filled the room and the pages glowed with a warm, golden light.","When Leo looked up, the ink figure had gently faded away. \"Stories live only when someone cares enough to remember them,\" its voice echoed one last time. Suddenly he was back in the quiet library, and the staircase was gone, but the rescued book rested safely in his hands. Leo smiled to himself. He would return the very next night, because he had learned that some stories truly deserve to be remembered."],"considerations":["Five clear parts: beginning, build up, problem, solution, and ending","Deliberate pacing: a slow, atmospheric build that quickens at the problem","A hint of what is to come planted in the opening (foreshadowing)","Varied, purposeful figurative language (simile, metaphor, personification)","A theme or message shown through events, not stated outright","Advanced punctuation such as semicolons and colons used for effect","Relative clauses woven in smoothly to add detail","Internal thoughts developed as fully as the action"],"challenges":["Uneven pacing: a long build up and a one-sentence problem or ending","Figurative language in every sentence, making the writing cluttered","The message stated directly (\"the moral of this story is...\")","Semicolons placed at random rather than for effect","Relative clauses that add length but not meaning"],"evolution":["Pacing is now planned: students choose where to slow down and speed up","Symbolism is introduced as a narrative craft technique","A theme or message is expected, shown through the story","Semicolons and colons are used deliberately for effect","Internal reflection becomes part of the structure, not an add-on"]},"info":{"title":"Understanding Earthquakes","paras":["Earthquakes are powerful natural events that happen when the Earth's crust suddenly shifts and releases energy into the ground. Although they can feel sudden and unpredictable, scientists have discovered clear patterns in how and why they occur. Understanding earthquakes helps communities prepare for them and stay safe.","Earthquakes are caused by the slow movement of the Earth's tectonic plates, which are enormous slabs of rock that fit together beneath the surface. These plates do not slide smoothly past one another. Instead, they grind and push until pressure builds up along their edges, which are known as faults. When that pressure is finally released, it travels through the ground as powerful seismic waves.","The strength of an earthquake depends on several different factors. Scientists measure how much energy an earthquake releases using a tool called a seismograph. The amount of shaking that people feel also depends on the depth of the earthquake and the type of ground beneath them. Soft soil can make the shaking stronger, while solid rock can make it weaker.","Earthquakes can cause serious damage, but people have found clever ways to stay safe. Strong shaking can crack roads and make buildings collapse, and earthquakes under the sea can even create giant waves called tsunamis. To reduce this danger, engineers now design buildings that can bend and absorb movement. Communities also practise emergency drills so that everyone knows what to do.","Earthquakes cannot be stopped, but their dangers can be reduced. By studying how earthquakes work, scientists can warn people and help them prepare. With knowledge, careful planning, and safer buildings, communities around the world can protect the places they call home."],"considerations":["Five paragraphs: introduction, three body paragraphs, and a conclusion","A clear, formal topic sentence opens each body paragraph","An academic, informative tone is held throughout","Relative clauses add precision (plates, which fit together beneath the surface)","Some passive voice creates an objective, factual tone","Subject vocabulary is used accurately and explained through context","The conclusion synthesises the ideas rather than repeating them"],"challenges":["The formal tone slips into casual language partway through","Forced figurative language that does not suit an informative text","Relative clauses added for length but carrying no real meaning","Passive voice overused where active voice would be clearer","A conclusion copied word for word from the introduction"],"evolution":["The academic tone must be sustained across the whole text","Relative clauses are expected as a normal sentence-building tool","Passive voice is used purposefully for an objective tone","Technical vocabulary is explained through context, not simple definitions","The conclusion must synthesise the main ideas, not repeat them"]}}};

const CHK=`<svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M1.5 5.5L3.5 7.5L8.5 2.5" stroke="#059669" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

let cg=1, op={}, ct='overview';

function sw(g,btn){
  document.querySelectorAll('.gb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  cg=g; op={};
  render();
}

function swTab(t,btn){
  document.querySelectorAll('.tb-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ct=t;
  render();
}

function tog(name){
  op[name]=!op[name];
  renderTraits();
}

function renderBanner(){
  const info=GI[cg];
  document.getElementById('banner').innerHTML=`
    <div class="grade-banner">
      <div class="grade-banner-title">Grade ${cg} &middot; Ages ${info.ages}</div>
      <div class="grade-banner-desc">${info.desc}</div>
    </div>`;
}

function renderOverview(){
  const tc=document.getElementById('tab-content');
  tc.innerHTML=`
    <p class="section-label lbl-warn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Common struggles to watch for
    </p>
    <div id="struggles" class="struggles-grid"></div>
    <p class="section-label lbl-muted">Assessment rubric — nine traits (CO1–CO10) · tap any trait to expand</p>
    <div id="traits"></div>`;

  document.getElementById('struggles').innerHTML=SL[cg].map((s,i)=>`
    <div class="sc" style="--i:${i}">
      <div class="sc-trait">${s.t}</div>
      <div class="sc-text">${s.s}</div>
    </div>`).join('');

  renderTraits();
}

function renderTraits(){
  const el=document.getElementById('traits');
  if(!el)return;
  el.innerHTML=TRAITS.map((tr,i)=>{
    const name=tr.n;
    const col=TC[name];
    const isOpen=op[name];
    const indicators=IND[cg][name]||[];
    return `
    <div class="tc${isOpen?' op':''}" style="--i:${i}">
      <button class="th" onclick="tog('${name}')" aria-expanded="${!!isOpen}">
        <span class="t-stripe" style="background:${col}"></span>
        <span class="t-name" style="color:${col}">${name}</span>
        <span class="co-badge" style="background:${col}">${tr.co}</span>
        <span class="t-goal">${tr.m}</span>
        <svg class="t-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      ${isOpen?`<div class="tb2">
        <div>
          <div class="tb-col-title" style="color:${col}">SAME 4-point scale</div>
          <div class="same-band meet">
            <div class="same-lvl">Meeting · 3</div>
            <div class="same-desc">${tr.m}</div>
          </div>
          <div class="same-band appr">
            <div class="same-lvl">Approaching · 2 / 2.5</div>
            <div class="same-desc">${tr.a}</div>
          </div>
          <div class="same-band start">
            <div class="same-lvl">Starting · 1</div>
            <div class="same-desc">${tr.s}</div>
          </div>
        </div>
        <div>
          <div class="tb-col-title" style="color:#059669">What “Meeting” looks like — Grade ${cg}</div>
          ${indicators.map(c=>`<div class="ci"><div class="ci-dot">${CHK}</div><span class="ci-text">${c}</span></div>`).join('')}
        </div>
      </div>`:''}
    </div>`;
  }).join('');
}

function renderExample(genre){
  const ex=EX[cg][genre];
  const label=genre==='story'?'Story / Narrative':'Information / Non-Fiction';
  const evolTitle=cg===1?'Foundation year':'Evolution from Grade '+(cg-1);

  const evolutionContent=ex.evolution===null
    ?`<p class="bd-foundation">This is the foundation year. Students are beginning to write for the first time — the goal is simply to get ideas onto the page in complete sentences, with a clear topic and an attempt at structure. There is no prior year to build from.</p>`
    :ex.evolution.map(e=>`<div class="bd-item"><div class="bd-dot green"></div><span class="bd-text green">${e}</span></div>`).join('');

  document.getElementById('tab-content').innerHTML=`
    <p class="ex-label">Grade ${cg} ${label} — Meeting (3) exemplar</p>
    <div class="ex-text-wrap">
      <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--navy);margin-bottom:16px;">${ex.title}</p>
      ${ex.paras.map(p=>`<p>${p}</p>`).join('')}
    </div>
    <div class="bd-grid">
      <div class="bd-card blue" style="--i:0">
        <div class="bd-title blue">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          What to look for
        </div>
        ${ex.considerations.map(c=>`<div class="bd-item"><div class="bd-dot blue"></div><span class="bd-text blue">${c}</span></div>`).join('')}
      </div>
      <div class="bd-card amber" style="--i:1">
        <div class="bd-title amber">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Likely student challenges
        </div>
        ${ex.challenges.map(c=>`<div class="bd-item"><div class="bd-dot amber"></div><span class="bd-text amber">${c}</span></div>`).join('')}
      </div>
      <div class="bd-card green" style="--i:2">
        <div class="bd-title green">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          ${evolTitle}
        </div>
        ${evolutionContent}
      </div>
    </div>`;
}

function render(){
  renderBanner();
  if(ct==='overview') renderOverview();
  else if(ct==='story') renderExample('story');
  else renderExample('info');
}

render();
</script>
</body>
</html>
