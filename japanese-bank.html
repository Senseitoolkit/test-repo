<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>場面別ことばバンク · Word Banks · Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo-deep:#13213b; --indigo:#21385c; --indigo-soft:#3a557f;
    --washi:#f5efe1; --washi-dim:#e7ddc6; --washi-line:#d8cdb2;
    --ink:#222530; --ink-soft:#5a5d68;
    --shu:#c43d28; --shu-soft:#d9694f; --gold:#b6893e; --sage:#5a7a52;
    --radius:20px; --shadow:0 22px 46px -24px rgba(8,16,32,.9);
    --ff-jp:'Shippori Mincho',serif;
    --ff-ui:'Zen Kaku Gothic New',system-ui,sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--ff-ui); color:var(--ink);
    background:
      radial-gradient(circle at 18% -10%, #2a456e 0%, transparent 45%),
      radial-gradient(circle at 100% 100%, #1b2f50 0%, transparent 50%),
      linear-gradient(160deg,#14233f 0%,#101c33 100%);
    background-attachment:fixed; min-height:100vh; -webkit-font-smoothing:antialiased;
    padding:0 0 64px;
  }
  .grain{position:fixed; inset:0; pointer-events:none; opacity:.05; z-index:0;
    background-image:radial-gradient(rgba(255,255,255,.9) .8px,transparent .8px); background-size:7px 7px;}
  .wrap{position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:0 clamp(16px,4vw,24px);}

  /* ---------- TOP BAR ---------- */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:22px 0 0;}
  .back{display:inline-flex; align-items:center; gap:8px; text-decoration:none; color:#a9bbd6;
    font-size:13px; font-weight:700; letter-spacing:.5px; padding:8px 14px; border-radius:11px;
    border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.04); transition:.15s;}
  .back:hover{color:var(--washi); background:rgba(255,255,255,.09); transform:translateX(-2px);}
  .back .jp{font-family:var(--ff-jp);}
  .crumb{color:#7e90ad; font-size:12px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase;}

  /* ---------- HERO ---------- */
  header.hero{padding:26px 0 6px;}
  .top{display:flex; align-items:center; gap:18px;}
  .seal{
    flex:none; width:72px; height:72px; border-radius:18px; border:3px solid var(--shu);
    background:linear-gradient(160deg,#c43d28,#a52e1d); color:var(--washi); display:grid; place-items:center;
    font-family:var(--ff-jp); font-weight:800; font-size:38px; box-shadow:0 10px 22px -8px rgba(196,61,40,.7);
  }
  .titles .eyebrow{color:var(--shu-soft); font-size:12px; font-weight:800; letter-spacing:3px; text-transform:uppercase; margin-bottom:8px;}
  .titles h1{font-family:var(--ff-jp); font-weight:800; font-size:clamp(28px,5.4vw,44px); letter-spacing:1px; line-height:1.06; color:var(--washi);}
  .titles h1 rt{font-size:.3em; font-weight:500; color:#9fb1cd; letter-spacing:0;}
  .titles .latin{font-weight:700; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#a9bbd6; margin-top:9px;}
  .lead{margin-top:16px; max-width:62ch; font-size:14.5px; font-weight:500; color:#9fb1cd; line-height:1.65;}
  .lead rt{font-size:.5em; color:#7e90ad;}

  /* ---------- CONTROLS BAR ---------- */
  .bar{position:sticky; top:0; z-index:20; margin-top:22px; padding:13px 0 12px;
    background:rgba(16,28,51,.92); backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(255,255,255,.12);}
  .bar-inner{display:flex; gap:12px; align-items:center; flex-wrap:wrap;}
  .search{flex:1; min-width:220px; position:relative;}
  .search input{
    width:100%; font-family:var(--ff-ui); font-weight:500; font-size:15px; color:var(--ink);
    padding:11px 14px 11px 40px; border:1px solid var(--washi-dim); border-radius:12px;
    background:var(--washi); transition:border-color .15s, box-shadow .15s;
  }
  .search input::placeholder{color:#9a8f78;}
  .search input:focus{outline:none; border-color:var(--shu); box-shadow:0 0 0 3px rgba(196,61,40,.18);}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--ink-soft);}
  .toggles{display:flex; gap:8px;}
  .tg{
    font-family:var(--ff-ui); font-weight:700; font-size:13.5px; cursor:pointer;
    border:1px solid var(--washi-dim); border-radius:12px; background:var(--washi); color:var(--ink);
    padding:10px 14px; display:flex; align-items:center; gap:9px; transition:all .15s; white-space:nowrap;
  }
  .tg .dot{width:9px; height:9px; border-radius:50%; background:#cabfa6; transition:background .15s; flex:none;}
  .tg.on{border-color:var(--sage);}
  .tg.on .dot{background:var(--sage);}
  .tg:hover{transform:translateY(-1px);}

  /* ---------- SECTION LABEL ---------- */
  .section-label{display:flex; align-items:center; gap:14px; margin:24px 0 14px; color:#a9bbd6;
    font-size:12px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase;}
  .section-label::after{content:""; flex:1; height:1px; background:rgba(255,255,255,.14);}
  .section-label .jp{font-family:var(--ff-jp); letter-spacing:1px; color:#7e90ad;}

  /* ---------- CATEGORY NAV ---------- */
  nav{overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:thin;}
  .navrow{display:flex; gap:9px; padding-bottom:8px; min-width:min-content;}
  .cat{
    --accent:var(--indigo-soft);
    flex:none; cursor:pointer; border:1px solid var(--washi-dim); background:var(--washi);
    border-radius:13px; padding:8px 14px 8px 9px; display:flex; align-items:center; gap:10px;
    transition:transform .15s, box-shadow .15s; color:var(--ink);
    box-shadow:0 12px 26px -20px rgba(0,0,0,.9); border-bottom:3px solid transparent;
  }
  .cat .cs{flex:none; width:30px; height:30px; border-radius:9px; display:grid; place-items:center;
    font-family:var(--ff-jp); font-weight:800; font-size:16px; color:var(--washi);
    background:linear-gradient(160deg, var(--accent), color-mix(in srgb, var(--accent) 70%, black));}
  .cat .lab{text-align:left; line-height:1.15;}
  .cat .lab .j{font-family:var(--ff-jp); font-weight:800; font-size:15px; display:block;}
  .cat .lab .e{font-weight:700; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); display:block; margin-top:1px;}
  .cat:hover{transform:translateY(-3px);}
  .cat.on{border-bottom-color:var(--accent); transform:translateY(-3px); box-shadow:0 16px 30px -18px rgba(0,0,0,.95);}
  .cat.on .lab .j{color:var(--accent);}

  /* ---------- CONTENT ---------- */
  main{margin-top:28px;}
  .cat-head{display:flex; align-items:center; gap:14px; margin-bottom:8px; flex-wrap:wrap;}
  .chead-seal{flex:none; width:50px; height:50px; border-radius:13px; display:grid; place-items:center;
    font-family:var(--ff-jp); font-weight:800; font-size:26px; color:var(--washi);
    background:linear-gradient(160deg, var(--accent), color-mix(in srgb, var(--accent) 70%, black));
    box-shadow:0 8px 18px -10px rgba(0,0,0,.7);}
  .cat-head h2{font-family:var(--ff-jp); font-weight:800; font-size:28px; letter-spacing:1px; color:var(--washi);}
  .cat-head h2 rt{font-size:.32em; font-weight:500; color:#9fb1cd;}
  .cat-head .sub{font-weight:700; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--shu-soft);}
  .cat-head .count{margin-left:auto; font-weight:700; font-size:12px; color:#a9bbd6;
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); border-radius:999px; padding:5px 12px;}

  .group{margin-top:26px;}
  .group-head{display:flex; align-items:baseline; gap:11px; margin-bottom:13px; padding-left:14px; position:relative;}
  .group-head::before{content:""; position:absolute; left:0; top:3px; bottom:3px; width:4px; border-radius:2px; background:var(--accent);}
  .group-head .gj{font-family:var(--ff-jp); font-weight:800; font-size:17px; color:var(--washi);}
  .group-head .gj rt{font-size:.4em; font-weight:500; color:#9fb1cd;}
  .group-head .ge{font-weight:700; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#7e90ad;}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:9px;}
  .word{
    background:var(--washi); border:1px solid var(--washi-dim); border-radius:12px;
    padding:11px 14px 10px; transition:border-color .12s, transform .12s, box-shadow .12s;
    box-shadow:0 12px 26px -22px rgba(0,0,0,.9);
  }
  .word:hover{border-color:var(--accent); transform:translateY(-2px); box-shadow:0 16px 30px -18px rgba(0,0,0,.7);}
  .word .j{font-family:var(--ff-ui); font-weight:700; font-size:18px; line-height:1.9; color:var(--ink);}
  .word .j rt{font-family:var(--ff-ui); font-weight:500; font-size:.52em; color:#a07c3c; user-select:none;}
  .word .e{font-weight:500; font-size:13px; line-height:1.35; color:var(--indigo-soft); margin-top:3px;}

  .empty{padding:40px 0; text-align:center; color:#9fb1cd; font-weight:500;}
  .empty b{color:var(--washi);}
  .empty rt{color:#7e90ad;}

  /* ---------- TOGGLE STATES ---------- */
  body.no-furigana rt{display:none;}
  body.no-english .word .e{display:none;}
  .hidden{display:none !important;}

  footer{margin-top:46px; padding-top:18px; border-top:1px solid rgba(255,255,255,.14);
    font-size:12px; color:#7e90ad; line-height:1.7; text-align:center;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important; scroll-behavior:auto !important;} }
  @media(max-width:560px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(146px,1fr));}
    .seal{width:58px; height:58px; font-size:30px;}
  }
</style>
</head>

<div class="grain"></div>
<div class="wrap">

  <div class="topbar">
    <a class="back" href="japanese-hub.html"><span>←</span> <span class="jp">日本語</span> Study Hub</a>
    <span class="crumb">場面別 · Word Banks</span>
  </div>

  <header class="hero">
    <div class="top">
      <div class="seal">場</div>
      <div class="titles">
        <div class="eyebrow">場面別 · By Situation</div>
        <h1><ruby>場面別<rt>ばめんべつ</rt></ruby>ことばバンク</h1>
        <div class="latin">Japanese word banks by situation</div>
      </div>
    </div>
    <p class="lead">よく<ruby>使<rt>つか</rt></ruby>う<ruby>場面<rt>ばめん</rt></ruby>ごとに、ことばを<ruby>集<rt>あつ</rt></ruby>めました。ふりがなと<ruby>英語<rt>えいご</rt></ruby>は<ruby>上<rt>うえ</rt></ruby>のボタンで<ruby>切<rt>き</rt></ruby>りかえられます。<ruby>両方<rt>りょうほう</rt></ruby>けして、<ruby>自分<rt>じぶん</rt></ruby>でクイズもできます。</p>

  <div class="bar">

      <div class="search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" type="search" placeholder="ことば・よみ・英語で検索 / search…" autocomplete="off">
      </div>
      <div class="toggles">
        <button class="tg on" id="furiBtn"><span class="dot"></span>ふりがな</button>

      </div>

  </div>

  <div class="section-label">場面をえらぶ <span class="jp">Choose a situation</span></div>
  <nav><div class="navrow" id="nav"></div></nav>

  <main id="content"></main>

  <footer id="foot"></footer>
</div>

  ]},

  ]}
]},

{id:"family", ico:"👪", j:`${r('家族','かぞく')}`, jt:"family", e:"Family", groups:[
  {gj:`${r('家族','かぞく')}`+"のことば", ge:"Family members", w:[
    [`${r('家族','かぞく')}`,"family"],[`${r('両親','りょうしん')}`,"parents"],[`${r('父','ちち')}`,"father (my own)"],['お'+r('父','とう')+'さん',"father, dad"],

{id:"work", ico:"💼", j:`${r('仕事','しごと')}`, jt:"work", e:"Work", groups:[

  ]},

// kanji seal + accent color per situation (Study Hub palette)
const SEAL = {home:'家', family:'族', work:'仕', school:'学', shop:'買', hospital:'病', hobby:'趣',
  sports:'技', ent:'娯', goals:'標', challenge:'課', food:'食', travel:'旅', holiday:'祝', emotion:'心',
  weather:'天', town:'町', tech:'電', clothes:'服', nature:'然'};
const PAL = ['#c43d28','#3a557f','#5a7a52','#b6893e','#5b7e9e','#9a6b2e','#6e567f','#bd6a4a'];
const accentOf = idx => PAL[idx % PAL.length];

let current = 0;
const $ = id => document.getElementById(id);

function buildNav(){
  const nav=$('nav'); nav.innerHTML='';
  DATA.forEach((c,idx)=>{
    const b=document.createElement('button');
    b.className='cat'+(idx===current?' on':'');
    b.style.setProperty('--accent', accentOf(idx));
    b.innerHTML=`<span class="cs">${SEAL[c.id]||''}</span><span class="lab"><span class="j">${c.j}</span><span class="e">${c.e}</span></span>`;
    b.addEventListener('click',()=>{current=idx; buildNav(); render(); window.scrollTo({top:0});});
    nav.appendChild(b);
  });
}

function countWords(c){return c.groups.reduce((n,g)=>n+g.w.length,0);}

function render(){
  const c=DATA[current];
  const total=countWords(c);
  $('content').style.setProperty('--accent', accentOf(current));
  let html=`<div class="cat-head"><span class="chead-seal">${SEAL[c.id]||''}</span><h2>${c.j}</h2><span class="sub">${c.e}</span><span class="count" id="count">${total} ${total===1?'word':'words'}</span></div>`;
  c.groups.forEach((g,gi)=>{
    html+=`<section class="group" data-g="${gi}"><div class="group-head"><span class="gj">${g.gj}</span><span class="ge">${g.ge}</span></div><div class="grid">`;
    g.w.forEach(([j,e])=>{
      const s=(j+' '+e).toLowerCase().replace(/<[^>]+>/g,m=>m).replace(/<rt>|<\/rt>|<ruby>|<\/ruby>/g,'');
      html+=`<div class="word" data-s="${s.replace(/"/g,'')}"><div class="j">${j}</div><div class="e">${e}</div></div>`;
    });
    html+=`</div></section>`;
  });
  html+=`<div class="empty hidden" id="empty">「<b id="eq"></b>」に<ruby>合<rt>あ</rt></ruby>うことばが<ruby>見<rt>み</rt></ruby>つかりませんでした。<br>No words match that search.</div>`;
  $('content').innerHTML=html;
  applySearch();
}

function applySearch(){
  const q=$('search').value.trim().toLowerCase();
  const words=document.querySelectorAll('.word');
  let shown=0;
  words.forEach(w=>{
    const hit = !q || w.dataset.s.includes(q);
    w.classList.toggle('hidden',!hit);
    if(hit) shown++;
  });
  document.querySelectorAll('.group').forEach(g=>{
    const any=g.querySelectorAll('.word:not(.hidden)').length>0;
    g.classList.toggle('hidden',!any);
  });
  const emptyEl=$('empty');
  if(emptyEl){
    emptyEl.classList.toggle('hidden', shown>0);
    if(shown===0) $('eq').textContent=$('search').value.trim();
  }
  const cnt=$('count');
  if(cnt){
    const total=countWords(DATA[current]);
    cnt.textContent = q ? `${shown} / ${total}` : `${total} words`;
  }
}

$('search').addEventListener('input',applySearch);
$('furiBtn').addEventListener('click',function(){document.body.classList.toggle('no-furigana'); this.classList.toggle('on');});
$('enBtn').addEventListener('click',function(){document.body.classList.toggle('no-english'); this.classList.toggle('on');});

$('foot').innerHTML = `${DATA.length} situations · ${DATA.reduce((n,c)=>n+countWords(c),0)} words · toggle ふりがな / English above, or hide both to quiz yourself.`;

buildNav();
render();
</script>
