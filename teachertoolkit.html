
<script>
  // ============ STRATEGY DESCRIPTIONS ============
  const strategies = { /* KEEP YOUR EXISTING STRATEGY DATA HERE (unchanged) */ };

  // Render chips
  function renderChips() {
    document.querySelectorAll('[data-chips]').forEach(container => {
      const key = container.dataset.chips;
      const list = strategies[key];
      if (!list) return;

      container.innerHTML = list.map(([name, desc], i) => `
        <button class="chip" data-desc-id="${key}-${i}" type="button">${name}</button>
      `).join('') + `
        <div class="chip-desc">
          <div class="chip-desc-inner"></div>
        </div>`;
    });

    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const id = chip.dataset.descId;
        const [key, idx] = id.split(/-(?=\d+$)/);
        const container = chip.closest('.chips');
        const panel = container.querySelector('.chip-desc');
        const inner = panel.querySelector('.chip-desc-inner');

        if (chip.classList.contains('open')) {
          chip.classList.remove('open');
          panel.classList.remove('open');
          return;
        }

        container.querySelectorAll('.chip.open').forEach(c => c.classList.remove('open'));

        const [name, desc] = strategies[key][parseInt(idx)];
        inner.innerHTML = `<strong>${name} —</strong> ${desc}`;
        chip.classList.add('open');
        panel.classList.add('open');

        chip.insertAdjacentElement('afterend', panel);
      });
    });
  }

  renderChips();

  // ============ TAB SWITCHING ============
  const fwButtons = document.querySelectorAll('nav.frameworks button');
  const frameworks = document.querySelectorAll('.framework');

  fwButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.fw;

      fwButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      frameworks.forEach(f => f.classList.remove('active'));
      const newFramework = document.getElementById('fw-' + target);
      newFramework.classList.add('active');

      // ALWAYS collapse everything when switching tabs
      newFramework.querySelectorAll('.stage').forEach(s => s.classList.remove('open'));
      newFramework.querySelectorAll('.group').forEach(g => g.classList.remove('open'));
      newFramework.querySelectorAll('.stage-header').forEach(h => h.setAttribute('aria-expanded', 'false'));

      // Reset search
      document.getElementById('search').value = '';
      runSearch('');

      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  // ============ ACCORDIONS ============
  document.querySelectorAll('.stage-header').forEach(btn => {
    btn.addEventListener('click', () => {
      const stage = btn.closest('.stage');
      const isOpen = stage.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen);
    });
  });

  document.querySelectorAll('.group-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.closest('.group').classList.toggle('open');
    });
  });

  // ============ CONTROLS ============
  document.getElementById('expand-all').addEventListener('click', () => {
    const active = document.querySelector('.framework.active');
    active.querySelectorAll('.stage').forEach(s => s.classList.add('open'));
    active.querySelectorAll('.group').forEach(g => g.classList.add('open'));
    active.querySelectorAll('.stage-header').forEach(h => h.setAttribute('aria-expanded', 'true'));
  });

  document.getElementById('collapse-all').addEventListener('click', () => {
    const active = document.querySelector('.framework.active');
    active.querySelectorAll('.stage').forEach(s => s.classList.remove('open'));
    active.querySelectorAll('.group').forEach(g => g.classList.remove('open'));
    active.querySelectorAll('.stage-header').forEach(h => h.setAttribute('aria-expanded', 'false'));
  });

  // ============ SEARCH ============
  const searchInput = document.getElementById('search');
  const searchCount = document.getElementById('search-count');
  const noResults = document.getElementById('no-results');

  function runSearch(q) {
    q = q.trim().toLowerCase();
    const active = document.querySelector('.framework.active');
    const stages = active.querySelectorAll('.stage');

    if (!q) {
      stages.forEach(s => s.classList.remove('hidden-by-search'));
      searchCount.textContent = '';
      noResults.classList.remove('show');
      return;
    }

    let totalMatches = 0;

    stages.forEach(stage => {
      const text = stage.textContent.toLowerCase();
      if (text.includes(q)) {
        stage.classList.remove('hidden-by-search');
        stage.classList.add('open');
        totalMatches++;
      } else {
        stage.classList.add('hidden-by-search');
      }
    });

    searchCount.textContent = totalMatches + ' matches';
    noResults.classList.toggle('show', totalMatches === 0);
  }

  searchInput.addEventListener('input', e => {
    runSearch(e.target.value);
  });

  // ✅ KEY FIX: FORCE EVERYTHING CLOSED ON LOAD
  document.querySelectorAll('.stage').forEach(stage => stage.classList.remove('open'));
  document.querySelectorAll('.group').forEach(group => group.classList.remove('open'));
  document.querySelectorAll('.stage-header').forEach(h => h.setAttribute('aria-expanded', 'false'));
</script>
