<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #0F6E56; --green-text: #085041;
    --red-light: #FCEBEB; --red-border: #A32D2D; --red-text: #501313;
    --bg: #F7F5F0; --card: #FFFFFF; --text: #2C2A26; --muted: #6B6860;
    --border: #E2DDD4; --radius: 14px; --radius-sm: 8px;
  }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .app-header {
    background: var(--green); padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(15,110,86,0.18);
  }
  .app-title { font-size: 1.1rem; font-weight: 800; color: white; letter-spacing: -0.01em; }
  .score-chip { background: rgba(255,255,255,0.2); color: white; border-radius: 20px; padding: 4px 14px; font-size: 0.85rem; font-weight: 700; }

  /* Year selector */
  .year-bar {
    background: #0F6E56; display: flex; padding: 0 1.5rem; gap: 4px;
  }
  .year-btn {
    padding: 0.55rem 1.1rem; border: none; background: none;
    font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700;
    color: rgba(255,255,255,0.6); cursor: pointer; border-radius: 6px 6px 0 0;
    transition: all 0.15s; letter-spacing: 0.03em;
  }
  .year-btn.active { background: var(--bg); color: var(--green-dark); }
  .year-btn:hover:not(.active) { color: rgba(255,255,255,0.9); }

  /* Set tabs */
  .tabs-bar {
    background: white; border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; padding: 0 1.5rem;
  }
  .tab-btn {
    padding: 0.8rem 1.2rem; border: none; background: none;
    font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600;
    color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -1.5px; transition: all 0.18s;
  }
  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* Progress */
  .progress-wrap {
    background: white; padding: 0.8rem 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
  }
  .progress-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); white-space: nowrap; min-width: 110px; }
  .progress-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }

  .main { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* Passage */
  .passage-card {
    background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border);
    padding: 1.5rem; margin-bottom: 1.25rem;
  }
  .passage-label { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
  .passage-badge {
    background: var(--green-light); color: var(--green-text);
    font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.07em; padding: 3px 10px; border-radius: 20px;
  }
  .passage-title-text { font-family: 'Lora', serif; font-size: 1.15rem; font-weight: 600; color: var(--text); }
  .passage-body { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.85; color: #3A3830; }

  /* Questions */
  .question-card {
    background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border);
    padding: 1.25rem; margin-bottom: 1rem; transition: border-color 0.2s;
  }
  .question-card.answered { border-color: #C0E8D6; }
  .q-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .q-text { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 14px; line-height: 1.45; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-radius: var(--radius-sm); border: 1.5px solid var(--border);
    background: var(--bg); color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 500;
    cursor: pointer; text-align: left; transition: all 0.15s; width: 100%;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--green); background: var(--green-light); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { background: var(--green-light); border-color: var(--green); color: var(--green-text); font-weight: 700; }
  .opt-btn.wrong { background: var(--red-light); border-color: var(--red-border); color: var(--red-text); }
  .opt-letter {
    width: 26px; height: 26px; border-radius: 50%; background: white;
    border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 800; flex-shrink: 0; color: var(--muted); transition: all 0.15s;
  }
  .opt-btn.correct .opt-letter { background: var(--green); color: white; border-color: var(--green); }
  .opt-btn.wrong .opt-letter { background: var(--red-border); color: white; border-color: var(--red-border); }

  /* Feedback */
  .feedback { margin-top: 14px; border-radius: var(--radius-sm); overflow: hidden; display: none; }
  .feedback.show { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }
  .feedback-header {
    padding: 10px 14px; font-size: 0.9rem; font-weight: 800;
    display: flex; align-items: center; gap: 6px;
  }
  .feedback-header.correct-h { background: var(--green); color: white; }
  .feedback-header.wrong-h { background: var(--red-border); color: white; }
  .feedback-body {
    padding: 12px 14px; background: #F9F8F5;
    border: 1.5px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  }
  .fb-row { font-size: 0.88rem; color: var(--muted); margin-bottom: 7px; line-height: 1.55; }
  .fb-row:last-child { margin-bottom: 0; }
  .fb-label { font-weight: 800; color: var(--text); }
  .fb-quote {
    font-family: 'Lora', serif; font-style: italic;
    color: var(--green-dark); background: var(--green-light);
    border-radius: 4px; padding: 2px 6px; display: inline;
  }

  /* Nav */
  .nav-row { display: flex; align-items: center; justify-content: space-between; margin-top: 1.5rem; gap: 10px; }
  .nav-btn {
    display: flex; align-items: center; gap: 6px; padding: 10px 22px;
    border-radius: 30px; border: 1.5px solid var(--border);
    background: white; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) { background: var(--bg); border-color: #bbb; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: var(--green); color: white; border-color: var(--green); padding: 10px 28px; }
  .nav-btn.primary:hover:not(:disabled) { background: var(--green-dark); border-color: var(--green-dark); }

  /* Complete */
  .complete-screen { text-align: center; padding: 4rem 1rem; animation: fadeIn 0.4s ease; }
  .complete-emoji { font-size: 4rem; margin-bottom: 1rem; }
  .complete-score { font-size: 3.5rem; font-weight: 800; color: var(--green); line-height: 1; margin-bottom: 0.5rem; }
  .complete-label { font-size: 0.85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1.5rem; }
  .complete-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; }
  .complete-sub { font-size: 1rem; color: var(--muted); margin-bottom: 2rem; }

  @media (max-width: 500px) {
    .main { padding: 1rem 0.75rem 4rem; }
    .passage-body { font-size: 0.97rem; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Prediction</div>
  <div class="score-chip" id="scoreChip">Score: 0 / 0</div>
</header>

<div class="year-bar">
  <button class="year-btn active" id="year-btn-1" onclick="switchYear(1)">Year 1</button>
  <button class="year-btn" id="year-btn-2" onclick="switchYear(2)">Year 2</button>
  <button class="year-btn" id="year-btn-3" onclick="switchYear(3)">Year 3</button>
  <button class="year-btn" id="year-btn-4" onclick="switchYear(4)">Year 4</button>
  <button class="year-btn" id="year-btn-5" onclick="switchYear(5)">Year 5</button>
  <button class="year-btn" id="year-btn-6" onclick="switchYear(6)">Year 6</button>
</div>

<div class="tabs-bar">
  <button class="tab-btn active" id="tab-fiction" onclick="switchSet('fiction')">📖 Fiction</button>
  <button class="tab-btn" id="tab-nonfiction" onclick="switchSet('nonfiction')">🔬 Non-fiction</button>
</div>

<div class="progress-wrap">
  <div class="progress-label" id="progressLabel">Passage 1 of 20</div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<main class="main" id="mainContent"></main>

      { title:"The Suspicious Email", passage:"Grandpa's screen showed a message claiming he'd won a huge prize, asking only for his bank details to 'release the funds.' The sender's address was a jumble of random letters, and the message was full of spelling mistakes. Grandpa frowned and moved the mouse toward the delete button.", questions:[

      { title:"The Reluctant Confession", passage:"The vase lay in pieces on the floor, and Mum's gaze swept the room, landing on each child in turn. Jojo's little brother stared hard at his shoes, his cheeks burning red, while the others looked puzzled. Slowly, the brother's lip began to tremble.", questions:[

      { title:"The Last Train", passage:"Sprinting through the station, Daniel saw the doors of the last train of the night beginning to slide shut. His ticket was clutched in his hand and the platform was almost empty. A guard by the door raised a hand and called out to him.", questions:[

      { title:"The Quiet Rebellion", passage:"Every morning, the strict new teacher made the class copy lines in silence. Today, when she turned to write on the board, a folded paper aeroplane drifted across the room. She spun around just as it landed, and thirty pairs of eyes dropped instantly to their desks.", questions:[

      { title:"The Faltering Candle", passage:"During the power cut, the family huddled around a single candle whose flame had shrunk to a tiny, wavering point. The wax was almost gone and the wick leaned to one side. Dad quietly reached into the drawer where the spare candles were kept.", questions:[

      { title:"The New Coach's Test", passage:"On the first day, the new coach said nothing about the team's losing streak. Instead, he set up a simple passing drill and watched closely, jotting notes whenever a player showed effort rather than skill. At the end, he called over the boy who had tried hardest, not the most talented.", questions:[

        { q:"What can you predict the coach will encourage in training?", opts:["Hard work from everyone","Only the star players","Giving up when behind"], correct:0, evidence:"…he called over the boy who had tried hardest, not the most talented.", rationale:"Rewarding the hardest worker signals he'll push everyone to work hard." }

      { title:"The Melting Alibi", passage:"Mum found the empty ice cream tub in the bin and a trail of sticky drips leading to the sofa. Ben insisted he hadn't touched it, but a small smear of chocolate sat at the corner of his mouth. Mum folded her arms and raised one eyebrow.", questions:[

      { title:"The Hesitant Diver", passage:"At the top of the high board, Priya peered down at the shimmering blue far below. Her toes curled over the edge and her breath came fast. Behind her, a long queue of swimmers waited, and the lifeguard gave an encouraging nod.", questions:[

      { title:"The Forgotten Anniversary", passage:"Dad came home whistling, unaware that the calendar on the fridge had a red circle around today's date — his and Mum's anniversary. Mum sat at the table, the good plates untouched, glancing between the clock and the door. As Dad walked in empty-handed, her smile tightened.", questions:[

      { title:"The Risky Shortcut", passage:"To get home before dark, the hikers spotted a steep, muddy path that cut straight down the hillside. The marked trail wound the long way around but was dry and safe. One hiker pointed at the gathering clouds and the fading light.", questions:[

      { title:"The Understudy's Chance", passage:"An hour before curtain, the lead actor phoned in sick with a fever. The director turned to the understudy, a nervous girl who had quietly learned every line by heart. The girl swallowed hard, then squared her shoulders and reached for the costume.", questions:[

      { title:"The Tempting Test Paper", passage:"During the exam, a folded note slid across the floor and stopped by Aisha's foot, the answers to question three visible inside. The invigilator was looking the other way. Aisha glanced at it, then deliberately slid it further away with her shoe and kept writing her own answer.", questions:[

      { title:"The Slowing Clock", passage:"During the long history lesson, Marcus noticed the wall clock seemed to tick more and more slowly. His stomach growled and his eyes kept sliding to the window, where his friends were already gathering for lunch break outside. His foot tapped under the desk.", questions:[

      { title:"The Generous Rival", passage:"In the final round, Sara realised her main rival had dropped a vital note card without noticing, just before his turn. Picking it up, Sara could have kept quiet and gained an easy advantage. Instead, she tapped his shoulder and held the card out to him.", questions:[

    nonfiction: [
      { title:"How Overfishing Affects the Sea", passage:"When boats catch fish faster than the fish can breed, the population shrinks year by year. Fewer adult fish means fewer young, and the decline speeds up. If it continues unchecked, a once-rich fishing ground can collapse, leaving almost no fish at all.", questions:[
        { q:"What can you predict will happen if overfishing continues for years?", opts:["The fish population may collapse","The fish will multiply","Nothing will change"], correct:0, evidence:"…a once-rich fishing ground can collapse, leaving almost no fish at all.", rationale:"Continued overfishing drives the population to collapse." },
        { q:"Why does the decline speed up over time?", opts:["Fewer adults means fewer young","Fish stop eating","The sea gets smaller"], correct:0, evidence:"Fewer adult fish means fewer young, and the decline speeds up.", rationale:"With fewer adults breeding, each year produces fewer fish, accelerating the fall." },
        { q:"What can you predict would help the fish recover?", opts:["Catching far fewer fish for a time","Catching even more fish","Adding more boats"], correct:0, evidence:"When boats catch fish faster than the fish can breed, the population shrinks…", rationale:"If overfishing causes the decline, reducing the catch would let numbers recover." }

      { title:"How Greenhouse Gases Trap Heat", passage:"Certain gases in the atmosphere let sunlight through but trap some of the heat trying to escape back into space. As more of these gases build up, more heat is held in, and the planet gradually warms. Scientists track these gases to predict future changes in climate.", questions:[
        { q:"What can you predict will happen as greenhouse gases keep building up?", opts:["The planet will keep warming","The planet will cool","Nothing will change"], correct:0, evidence:"As more of these gases build up, more heat is held in, and the planet gradually warms.", rationale:"More greenhouse gas traps more heat, so warming continues." },
        { q:"Why do scientists track these gases?", opts:["To predict future climate changes","To make new gases","To cool the sun"], correct:0, evidence:"Scientists track these gases to predict future changes in climate.", rationale:"The passage states they track gases to forecast climate change." },
        { q:"What can you predict if these gases were reduced?", opts:["Less heat would be trapped","More heat would be trapped","The sun would dim"], correct:0, evidence:"…more of these gases build up, more heat is held in…", rationale:"If more gas traps more heat, fewer gases would trap less." }
      ]},
      { title:"How Invasive Species Spread", passage:"When a plant or animal is brought to a new land with no natural enemies, its numbers can explode. With nothing to keep it in check, it may crowd out the native species that have no defences against it. In time, the newcomer can take over entire habitats.", questions:[
        { q:"What can you predict will happen to native species when an invader arrives?", opts:["They may be crowded out","They will grow stronger","They will eat the invader"], correct:0, evidence:"…it may crowd out the native species that have no defences against it.", rationale:"Lacking defences, native species are likely to be pushed out." },
        { q:"Why can the invader's numbers explode?", opts:["It has no natural enemies there","It eats only plants","It cannot reproduce"], correct:0, evidence:"…brought to a new land with no natural enemies, its numbers can explode.", rationale:"With nothing to limit it, the invader multiplies freely." },
        { q:"What can you infer kept the invader in check in its original home?", opts:["Natural enemies it left behind","Better weather","More food"], correct:0, evidence:"With nothing to keep it in check…", rationale:"If lacking enemies lets it explode here, enemies must have limited it back home." }

      { title:"How a Drought Affects Crops", passage:"Crops need a steady supply of water from the soil to grow. During a long drought, the soil dries out and the plants begin to wilt and yellow. If the rain does not come soon, the harvest will fail and food will become scarce.", questions:[
        { q:"What can you predict will happen to the crops if the drought continues?", opts:["The harvest will fail","The crops will thrive","The soil will flood"], correct:0, evidence:"…the harvest will fail and food will become scarce.", rationale:"A prolonged drought without rain leads to failed crops." },
        { q:"Why do the plants wilt and yellow?", opts:["They lack water","They have too much water","They get too much shade"], correct:0, evidence:"…the soil dries out and the plants begin to wilt and yellow.", rationale:"Dried-out soil deprives the plants of the water they need." },
        { q:"What can you predict about food prices after a failed harvest?", opts:["They may rise as food grows scarce","They will fall sharply","They will not change"], correct:0, evidence:"…food will become scarce.", rationale:"Scarce food usually leads to higher prices." }
      ]},
      { title:"How Vaccination Protects a Community", passage:"When most people in a community are vaccinated, a germ struggles to find new people to infect. This shields even those who cannot be vaccinated, such as newborns. But if too many people skip the vaccine, the germ can spread freely once more.", questions:[
        { q:"What can you predict if vaccination rates in a town drop sharply?", opts:["Outbreaks may return","Disease will vanish forever","Newborns become immune"], correct:0, evidence:"…if too many people skip the vaccine, the germ can spread freely once more.", rationale:"Low vaccination lets the germ spread, so outbreaks can return." },
        { q:"Why are newborns protected when most people are vaccinated?", opts:["The germ can't spread to reach them","They are naturally immune","They get the vaccine at birth"], correct:0, evidence:"This shields even those who cannot be vaccinated, such as newborns.", rationale:"A germ that can't spread rarely reaches the vulnerable." },
        { q:"What can you predict keeps a community safest?", opts:["High vaccination rates","Low vaccination rates","No vaccination at all"], correct:0, evidence:"When most people in a community are vaccinated, a germ struggles…", rationale:"Since high rates block spread, keeping them high keeps the community safe." }

      { title:"How Soil Erosion Happens", passage:"Plant roots help hold soil firmly in place. When forests are cleared and the land left bare, rain and wind can sweep the loose soil away. Without its fertile topsoil, the land becomes much harder to farm.", questions:[
        { q:"What can you predict will happen to bare, cleared land in heavy rain?", opts:["Soil will be washed away","Soil will pile up higher","Roots will regrow instantly"], correct:0, evidence:"…rain and wind can sweep the loose soil away.", rationale:"With no roots to hold it, bare soil is washed off by rain." },
        { q:"Why does losing topsoil matter?", opts:["The land becomes hard to farm","The land grows more crops","Nothing changes"], correct:0, evidence:"Without its fertile topsoil, the land becomes much harder to farm.", rationale:"Fertile topsoil is needed for farming, so losing it harms the land." },
        { q:"What can you predict would help protect the soil?", opts:["Keeping plants and roots in the ground","Removing all plants","Adding more bare land"], correct:0, evidence:"Plant roots help hold soil firmly in place.", rationale:"Since roots hold soil, keeping plants would protect against erosion." }
      ]},
      { title:"How Antibiotics Lose Their Power", passage:"Each time bacteria meet an antibiotic, a few tough survivors with resistance may live on. They reproduce and pass their resistance to others. Over many uses, a once-powerful antibiotic can stop working against the bacteria it used to kill.", questions:[

        { q:"Why do the surviving bacteria matter?", opts:["They spread their resistance","They die out","They become harmless"], correct:0, evidence:"They reproduce and pass their resistance to others.", rationale:"Survivors pass on resistance, spreading the problem." },
        { q:"What can you predict would help keep antibiotics working?", opts:["Using them only when necessary","Using them constantly","Mixing many together"], correct:0, evidence:"Over many uses, a once-powerful antibiotic can stop working…", rationale:"If frequent use causes resistance, careful use would preserve their power." }
      ]},
      { title:"How Melting Ice Raises Sea Levels", passage:"As the planet warms, great sheets of ice on land slowly melt and the water runs into the sea. Adding this extra water makes the oceans rise. Low-lying coastal towns may one day face flooding as the waters creep higher.", questions:[

        { q:"Why are the oceans rising?", opts:["Melted ice adds water","The seabed lifts up","Rivers dry up"], correct:0, evidence:"Adding this extra water makes the oceans rise.", rationale:"Meltwater running into the sea raises its level." },
        { q:"What can you predict if the warming were slowed?", opts:["Ice would melt more slowly","Ice would melt faster","Seas would drop at once"], correct:0, evidence:"As the planet warms, great sheets of ice on land slowly melt…", rationale:"If warming melts the ice, less warming would slow the melting." }

      { title:"How Predators Keep Balance", passage:"In a healthy habitat, predators such as wolves keep the number of grazing animals in check. If the predators are removed, the grazers multiply rapidly and eat the plants down to bare ground. Without plants, many other creatures lose their homes.", questions:[

        { q:"What can you predict will follow as the grazers strip the plants?", opts:["Other creatures will lose their homes","More plants will grow","The grazers will starve at once"], correct:0, evidence:"Without plants, many other creatures lose their homes.", rationale:"Stripped plant life leaves other animals without habitat." },
        { q:"What does this reveal about a habitat?", opts:["Its parts are connected and depend on each other","Each animal lives alone","Predators are unimportant"], correct:0, evidence:"In a healthy habitat, predators such as wolves keep the number of grazing animals in check.", rationale:"The chain of effects shows the habitat's parts are interdependent." }
      ]},
      { title:"How Light Pollution Affects Turtles", passage:"Newly hatched sea turtles instinctively crawl toward the brightest light, which over a natural beach is the moonlit sea. Bright lights from seaside buildings can shine even brighter than the moon on the water. Confused hatchlings may then crawl the wrong way, inland and into danger.", questions:[
        { q:"What can you predict hatchlings will do on a brightly lit beach?", opts:["Crawl toward the buildings instead of the sea","Crawl straight to the water","Stay in their nests"], correct:0, evidence:"Confused hatchlings may then crawl the wrong way, inland and into danger.", rationale:"Drawn to the brightest light, they head inland toward the buildings." },
        { q:"Why does the turtles' instinct usually work?", opts:["The sea is normally the brightest light","The sea glows on its own","Turtles can read maps"], correct:0, evidence:"…the brightest light, which over a natural beach is the moonlit sea.", rationale:"Naturally, the moonlit sea is brightest, so the instinct guides them right." },
        { q:"What can you predict would help the hatchlings?", opts:["Dimming the seaside lights at night","Adding brighter lights inland","Removing the moon"], correct:0, evidence:"Bright lights from seaside buildings can shine even brighter than the moon…", rationale:"Since the lights mislead them, dimming them lets the natural cue work." }
      ]},
      { title:"How Feedback Speeds Up Melting", passage:"Bright white ice reflects much of the sun's heat back into space. When some ice melts, it uncovers dark ground or sea that soaks up heat instead. This extra warmth melts more ice, uncovering still more dark surface.", questions:[
        { q:"What can you predict will happen once melting begins in this cycle?", opts:["The melting will speed up","The melting will stop on its own","The ice will refreeze quickly"], correct:0, evidence:"This extra warmth melts more ice, uncovering still more dark surface.", rationale:"Each round of melting causes more melting, so it accelerates." },
        { q:"Why does dark ground warm faster than ice?", opts:["It soaks up heat instead of reflecting it","It is always warmer","It is closer to the sun"], correct:0, evidence:"…it uncovers dark ground or sea that soaks up heat instead.", rationale:"Dark surfaces absorb heat, unlike reflective white ice." },

      { title:"How Bees Are Vital to Crops", passage:"Many crops can only produce fruit if their flowers are pollinated, and bees do much of this work. As a bee moves from flower to flower, it carries pollen that lets the plants form seeds and fruit. If bee numbers fall sharply, many crops would produce far less.", questions:[

        { q:"What can you predict would help protect crop harvests?", opts:["Protecting bee populations","Removing all bees","Planting fewer flowers"], correct:0, evidence:"…bees do much of this work.", rationale:"Since bees enable the harvest, protecting them safeguards the crops." }

      { title:"How Dams Change Rivers", passage:"A dam blocks a river and holds back a great lake of water behind it. Below the dam, the river flows with less water and carries less of the sand it once spread downstream. Over years, beaches and wetlands further down the river may shrink without that sand.", questions:[

        { q:"Why does less sand reach downstream after a dam is built?", opts:["The dam holds back the water that carried it","The sand dissolves","The river speeds up"], correct:0, evidence:"…carries less of the sand it once spread downstream.", rationale:"The dam reduces the flow that used to carry sand down the river." },
        { q:"What can you predict about the lake behind the dam?", opts:["Sand will settle and collect there","It will stay perfectly clear","It will dry out"], correct:0, evidence:"A dam blocks a river and holds back a great lake of water behind it.", rationale:"As the held-back water slows, the sand it carried settles in the lake." }

      { title:"How a Habitat Recovers", passage:"After a forest fire, the land looks black and lifeless. Yet within weeks, fast-growing plants sprout from seeds in the soil, and insects return to feed on them. Slowly, larger animals follow the food, and the habitat begins to rebuild itself.", questions:[

      { title:"How the Body Adapts to High Altitude", passage:"High in the mountains, the thin air carries less oxygen than at sea level. At first, a visitor may feel breathless and tired. Over days, the body makes more red blood cells to carry oxygen, and the person slowly feels stronger.", questions:[

      { title:"How Plastic Harms the Ocean", passage:"Plastic waste that reaches the sea does not rot away like food scraps. Instead, it breaks into smaller and smaller pieces over many years. Sea creatures may swallow these fragments, mistaking them for food, which can make them ill.", questions:[

        { q:"Why might sea creatures eat plastic fragments?", opts:["They mistake them for food","They enjoy the taste","They need plastic"], correct:0, evidence:"Sea creatures may swallow these fragments, mistaking them for food…", rationale:"The creatures confuse the fragments with real food." },
        { q:"What can you predict about reducing plastic waste?", opts:["It would lower the harm to sea life","It would harm sea life more","It would make plastic rot faster"], correct:0, evidence:"…which can make them ill.", rationale:"Since plastic harms sea life, less plastic would mean less harm." }

      { title:"How Forests Affect Rainfall", passage:"Trees draw water up from the soil and release it from their leaves into the air as vapour. This vapour helps form clouds that bring rain to the region. When a large forest is cut down, the area can slowly become drier.", questions:[

        { q:"How do trees help bring rain?", opts:["They release vapour that forms clouds","They block the sun","They drink the rain"], correct:0, evidence:"This vapour helps form clouds that bring rain to the region.", rationale:"The vapour from trees feeds the clouds that rain on the region." },
        { q:"What can you predict planting more trees might do over time?", opts:["Help bring more rainfall","Dry the area out","Stop all rain"], correct:0, evidence:"Trees draw water up from the soil and release it from their leaves…", rationale:"Since trees aid rainfall, more trees could increase it." }

      { title:"How Coral Reefs Shelter Fish", passage:"A coral reef is a maze of nooks and crannies where small fish hide from larger hunters. Many ocean creatures depend on the reef for shelter and food. If a reef dies and crumbles to rubble, the fish that relied on it must leave or perish.", questions:[

        { q:"Why do small fish gather around reefs?", opts:["To hide from larger hunters","To find sunlight","To stay warm"], correct:0, evidence:"…where small fish hide from larger hunters.", rationale:"The reef's nooks give the small fish hiding places from predators." },
        { q:"What can you predict about ocean life in an area where reefs are protected?", opts:["It is more likely to thrive","It will die out","It will leave the area"], correct:0, evidence:"Many ocean creatures depend on the reef for shelter and food.", rationale:"Since creatures depend on reefs, protected reefs support thriving life." }

      { title:"How Insulation Saves Energy", passage:"In winter, heat naturally escapes from a warm house into the cold outside. Adding thick insulation in the walls and roof slows this escape of heat. A well-insulated home stays warmer and needs less energy to heat.", questions:[
        { q:"What can you predict about heating costs in a well-insulated house?", opts:["They will be lower","They will be higher","They will not change"], correct:0, evidence:"A well-insulated home stays warmer and needs less energy to heat.", rationale:"Needing less energy to heat means lower heating costs." },
        { q:"Why does heat escape from a house in winter?", opts:["It moves from warm to cold","Cold pulls it out","The house makes cold"], correct:0, evidence:"…heat naturally escapes from a warm house into the cold outside.", rationale:"Heat naturally flows from the warm inside to the cold outside." },

      { title:"How Wetlands Prevent Floods", passage:"Wetlands act like giant sponges, soaking up heavy rain and releasing it slowly over time. This keeps rivers from rising too fast after a storm. When wetlands are drained and built over, nearby towns may flood more often.", questions:[

        { q:"How do wetlands keep rivers from rising too fast?", opts:["They soak up rain and release it slowly","They block the river","They heat the water"], correct:0, evidence:"Wetlands act like giant sponges, soaking up heavy rain and releasing it slowly…", rationale:"By absorbing rain and releasing it slowly, wetlands steady the rivers." },
        { q:"What can you predict protecting wetlands would do for nearby towns?", opts:["Help guard them against floods","Cause more floods","Dry out their water"], correct:0, evidence:"This keeps rivers from rising too fast after a storm.", rationale:"Since wetlands curb fast river rises, keeping them protects towns from floods." }

      { title:"The Tampered Experiment", passage:"Priya's science results were perfect — too perfect. Reviewing her partner's notes, she found that one inconvenient measurement had been crossed out and replaced with a neater number. Their project was due to be judged in an hour, and her partner was nowhere to be found. Priya picked up the original data sheet and a pen.", questions:[

      { title:"The Reluctant Heir", passage:"At eighteen, Mara was expected to take over the family bakery, as everyone always had. But her sketchbooks were filled with architecture, and her eyes lit up only when she spoke of buildings. At Sunday dinner, her father slid the bakery keys across the table toward her, smiling proudly. Mara's hand stopped halfway to them.", questions:[

let currentYear = 1;
let currentSet = 'fiction';
let currentIdx = 0;
let answers = {};
let score = 0;

let activePassages = [];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildActivePassages() {
  const source = DATA[currentYear][currentSet];
  activePassages = shuffle(source).map(p => {
    const questions = p.questions.map(q => {
      const paired = q.opts.map((opt, i) => ({ opt, isCorrect: i === q.correct }));
      const shuffled = shuffle(paired);
      return {
        q: q.q,
        opts: shuffled.map(x => x.opt),
        correct: shuffled.findIndex(x => x.isCorrect),
        evidence: q.evidence,
        rationale: q.rationale
      };
    });
    return { title: p.title, passage: p.passage, questions };
  });
}

function getPassages() { return activePassages; }

function updateScoreChip() {
  document.getElementById('scoreChip').textContent = 'Score: ' + score + ' / ' + answered;
}

function updateProgress() {
  const passages = getPassages();
  const pct = Math.round((currentIdx / passages.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = 'Passage ' + (currentIdx + 1) + ' of ' + passages.length;
}

function switchYear(y) {
  currentYear = y;
  currentSet = 'fiction';
  currentIdx = 0;
  answers = {};
  score = 0;
  answered = 0;
  buildActivePassages();
  document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('year-btn-' + y).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-fiction').classList.add('active');
  updateScoreChip();
  render();
}

function switchSet(s) {
  currentSet = s;
  currentIdx = 0;
  answers = {};
  score = 0;
  answered = 0;
  buildActivePassages();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + s).classList.add('active');
  updateScoreChip();
  render();
}

  const key = currentYear + currentSet + currentIdx;

        else if (oi === chosen) cls = 'wrong';
      }

    const feedbackHTML = isDone ? `
      <div class="feedback show">
        <div class="feedback-header ${isCorrect ? 'correct-h' : 'wrong-h'}">
          <span class="feedback-icon">${isCorrect ? '✓' : '✗'}</span>
          ${isCorrect ? 'Correct!' : 'The answer is: ' + q.opts[q.correct]}
        </div>
        <div class="feedback-body">
          <div class="fb-row"><span class="fb-label">Clue: </span><span class="fb-quote">"${q.evidence}"</span></div>
          <div class="fb-row"><span class="fb-label">Why: </span>${q.rationale}</div>
        </div>
      </div>` : '<div class="feedback"></div>';

    return `<div class="question-card${isDone ? ' answered' : ''}">
      <div class="q-label">Question ${qi + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      ${feedbackHTML}
    </div>`;
  }).join('');

  const isLast = currentIdx === passages.length - 1;
  const badgeLabel = currentSet === 'fiction' ? 'Fiction' : 'Non-fiction';

  document.getElementById('mainContent').innerHTML = `
    <div class="passage-card">
      <div class="passage-label">
        <span class="passage-badge">${badgeLabel}</span>
        <span class="passage-title-text">${p.title}</span>
      </div>
      <div class="passage-body">${p.passage}</div>
    </div>
    ${questionsHTML}
    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" ${currentIdx === 0 ? 'disabled' : ''}>← Back</button>
      <button class="nav-btn primary" onclick="next()" ${!allDone ? 'disabled' : ''}>
        ${isLast ? 'Finish ✓' : 'Next →'}
      </button>
    </div>`;
}

function answer(qi, oi) {
  const key = currentYear + currentSet + currentIdx;
  if (!answers[key]) answers[key] = {};
  if (answers[key][qi] !== undefined) return;
  answers[key][qi] = oi;
  answered++;
  if (oi === getPassages()[currentIdx].questions[qi].correct) score++;
  updateScoreChip();
  render();
}

function next() {
  const passages = getPassages();
  if (currentIdx < passages.length - 1) { currentIdx++; render(); }
  else { renderComplete(); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prev() {
  if (currentIdx > 0) { currentIdx--; render(); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderComplete() {
  const passages = getPassages();
  const total = passages.reduce((s, p) => s + p.questions.length, 0);
  const pct = Math.round((score / total) * 100);
  let emoji = '⭐';
  if (pct >= 90) emoji = '🏆';
  else if (pct >= 70) emoji = '🌟';
  else if (pct >= 50) emoji = '👍';

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'Complete!';

  document.getElementById('mainContent').innerHTML = `
    <div class="complete-screen">
      <div class="complete-emoji">${emoji}</div>
      <div class="complete-score">${score}/${total}</div>
      <div class="complete-label">${pct}% correct</div>
      <h2 class="complete-title">Well done!</h2>
      <p class="complete-sub">You finished all ${passages.length} Year ${currentYear} ${currentSet} passages.</p>
      <button class="nav-btn primary" onclick="restart()">Try again</button>
    </div>`;
}

function restart() {
  currentIdx = 0;
  answers = {};
  score = 0;
  answered = 0;
  buildActivePassages();
  updateScoreChip();
  render();
}

buildActivePassages();
render();
</script>
</body>
</html>
