<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speed Hangman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fef6e4;
      --surface: #ffffff;
      --primary: #f582ae;
      --primary-dark: #e0608e;
      --accent: #8bd3dd;
      --accent-dark: #6bbfc9;
      --warning: #f3d250;
      --danger: #e85d75;
      --success: #4ecdc4;
      --text: #2d334a;
      --text-muted: #8b8fa3;
      --border: #e8e0d4;
      --shadow: 0 4px 24px rgba(45,51,74,0.08);
      --shadow-lg: 0 12px 40px rgba(45,51,74,0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Fredoka', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      z-index: 0;
      opacity: 0.15;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--primary);
      top: -120px; right: -100px;
      animation: floatBlob 20s ease-in-out infinite;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--accent);
      bottom: -80px; left: -60px;
      animation: floatBlob 25s ease-in-out infinite reverse;
    }
    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }
    .header p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Score strip */
    .score-strip {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 14px;
    }
    .score-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .score-item .num {
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
    }
    .score-item.wins .num { color: var(--success); }
    .score-item.losses .num { color: var(--danger); }
    .score-item.streak .num { color: var(--warning); }

    /* Level bar */
    .level-bar {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .level-btn {
      font-family: 'Fredoka', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .level-btn:hover { border-color: var(--accent); color: var(--text); }
    .level-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Mode row */
    .mode-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .mode-btn {
      font-family: 'Fredoka', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: var(--radius-pill);
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn:hover { border-color: var(--primary); color: var(--text); }
    .mode-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ─── START SCREEN ─── */
    .start-screen {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 48px 32px;
      text-align: center;
      margin-bottom: 20px;
    }
    .start-screen .start-icon {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .start-screen h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .start-screen p {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 28px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }
    .start-btn {
      font-family: 'Fredoka', sans-serif;
      font-size: 20px;
      font-weight: 700;
      padding: 16px 48px;
      border-radius: var(--radius-pill);
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--accent-dark));
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(245,130,174,0.35);
    }
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(245,130,174,0.45);
    }
    .start-btn:active { transform: translateY(0); }

    /* Game Card */
    .game-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 20px;
      margin-bottom: 20px;
    }

    /* Timer */
    .timer-wrapper { margin-bottom: 16px; }
    .timer-track {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      background: var(--success);
      border-radius: 4px;
      width: 100%;
      transition: width 0.1s linear, background 0.3s;
    }
    .timer-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Board */
    .board {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .board-left { flex: 1; }
    .board-right {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
    }

    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(139,211,221,0.12);
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      margin-bottom: 12px;
    }
    .info-badge .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* Word display */
    .word-display {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      min-height: 52px;
    }
    .letter-slot {
      width: 40px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      border-bottom: 3px solid var(--border);
      color: transparent;
      transition: all 0.3s;
    }
    .letter-slot.revealed {
      color: var(--text);
      border-color: var(--success);
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .letter-slot.hint {
      border-color: var(--primary);
      color: var(--primary);
    }
    .letter-slot.wrong-reveal {
      border-color: var(--danger);
      color: var(--danger);
    }
    .letter-slot.apostrophe {
      width: 16px;
      border: none;
      color: var(--text);
      font-size: 28px;
    }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Lives */
    .lives-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 6px;
    }
    .heart {
      font-size: 22px;
      transition: all 0.3s;
      display: inline-block;
    }
    .heart.lost {
      opacity: 0.2;
      transform: scale(0.8);
      filter: grayscale(1);
    }
    .heart.breaking {
      animation: heartBreak 0.4s ease-out;
    }
    @keyframes heartBreak {
      0% { transform: scale(1); }
      30% { transform: scale(1.3); }
      100% { transform: scale(0.8); opacity: 0.2; }
    }

    /* Misses */
    .misses-row {
      font-size: 13px;
      color: var(--text-muted);
      min-height: 20px;
    }
    .miss-letter {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      color: var(--danger);
      background: rgba(232,93,117,0.08);
      padding: 1px 6px;
      border-radius: 4px;
      margin: 0 2px;
      font-size: 12px;
    }

    /* Status message */
    .status-msg {
      margin-top: 12px;
      font-size: 18px;
      font-weight: 600;
      min-height: 28px;
      transition: opacity 0.3s;
    }
    .status-msg.win { color: var(--success); }
    .status-msg.lose { color: var(--danger); }
    .status-msg.hint { color: var(--primary); }

    /* SVG Hangman */
    .hangman-svg { width: 160px; height: 200px; }
    .hangman-svg line, .hangman-svg circle { stroke-linecap: round; stroke-linejoin: round; }
    .hm-structure { stroke: #c9bfad; stroke-width: 3; fill: none; }
    .hm-part {
      stroke: var(--text);
      stroke-width: 3;
      fill: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .hm-part.show { opacity: 1; animation: drawIn 0.3s ease-out; }
    .hm-head.show { fill: none; }
    .hm-face { opacity: 0; transition: opacity 0.3s; font-size: 10px; }
    .hm-face.show { opacity: 1; }
    @keyframes drawIn {
      from { stroke-dasharray: 100; stroke-dashoffset: 100; }
      to { stroke-dasharray: 100; stroke-dashoffset: 0; }
    }

    /* Keyboard */
    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .kb-row {
      display: flex;
      justify-content: center;
      gap: 5px;
    }
    .key {
      font-family: 'Fredoka', sans-serif;
      font-size: 16px;
      font-weight: 600;
      width: 36px;
      height: 40px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .key:hover { border-color: var(--accent); background: rgba(139,211,221,0.08); }
    .key.hit {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
      pointer-events: none;
    }
    .key.miss {
      background: var(--border);
      border-color: var(--border);
      color: var(--text-muted);
      opacity: 0.4;
      pointer-events: none;
    }

    /* Action buttons */
    .action-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .action-btn {
      font-family: 'Fredoka', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: var(--radius-pill);
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { border-color: var(--accent); }
    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .action-btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .board { flex-direction: column; align-items: center; }
      .board-right { order: -1; }
      .key { width: 30px; height: 36px; font-size: 14px; }
      .letter-slot { width: 32px; height: 40px; font-size: 18px; }
      .start-screen { padding: 36px 20px; }
      .start-btn { font-size: 18px; padding: 14px 40px; }
    }
  </style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="app">

  <!-- Header -->
  <div class="header">
    <h1>Speed Hangman</h1>
    <p>Learn sight words the fun way — guess before time runs out!</p>
  </div>

  <!-- Score -->
  <div class="score-strip">
    <div class="score-item wins">🏆 <span class="num" id="score-wins">0</span> <span>wins</span></div>
    <div class="score-item losses">💔 <span class="num" id="score-losses">0</span> <span>losses</span></div>
    <div class="score-item streak">🔥 <span class="num" id="score-streak">0</span> <span>streak</span></div>
  </div>

  <!-- Levels -->
  <div class="level-bar" id="level-bar"></div>

  <!-- Mode -->
  <div class="mode-row">
    <button class="mode-btn active" id="btn-normal">☀️ Normal</button>
    <button class="mode-btn" id="btn-speed">⚡ Speed</button>
  </div>

  <!-- START SCREEN (shown first) -->
  <div class="start-screen" id="start-screen">
    <span class="start-icon">⏱️</span>
    <h2>Ready to Play?</h2>
    <p>Pick your level and mode above, then hit the button to start guessing words before time runs out!</p>
    <button class="start-btn" id="btn-start">Start Game</button>
  </div>

  <!-- Game Card (hidden until start) -->
  <div class="game-card" id="game-card" style="display:none;">
    <!-- Timer -->
    <div class="timer-wrapper">
      <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
      <div class="timer-meta">
        <span id="timer-mode-label">Normal · 10s per guess</span>
        <span id="timer-text">10.0s</span>
      </div>
    </div>

    <!-- Board -->
    <div class="board">
      <div class="board-left">
        <div class="info-badge"><span class="dot"></span> <span id="level-label">Pre-Primer</span> · <span id="word-length-label">4 letters</span></div>
        <div class="word-display" id="word-display"></div>
        <div class="lives-row" id="lives-display"></div>
        <div class="misses-row" id="misses-display"></div>
        <div class="status-msg" id="status"></div>
      </div>
      <div class="board-right">
        <svg class="hangman-svg" viewBox="0 0 160 200" id="hangman-svg">
          <line class="hm-structure" x1="20" y1="190" x2="140" y2="190"/>
          <line class="hm-structure" x1="40" y1="190" x2="40" y2="20"/>
          <line class="hm-structure" x1="40" y1="20" x2="100" y2="20"/>
          <line class="hm-structure" x1="100" y1="20" x2="100" y2="40"/>
          <line class="hm-structure" x1="40" y1="50" x2="65" y2="20"/>
          <circle class="hm-part hm-head" id="hm-head" cx="100" cy="55" r="15"/>
          <line class="hm-part" id="hm-body" x1="100" y1="70" x2="100" y2="120"/>
          <line class="hm-part" id="hm-larm" x1="100" y1="82" x2="75" y2="100"/>
          <line class="hm-part" id="hm-rarm" x1="100" y1="82" x2="125" y2="100"/>
          <line class="hm-part" id="hm-lleg" x1="100" y1="120" x2="75" y2="155"/>
          <line class="hm-part" id="hm-rleg" x1="100" y1="120" x2="125" y2="155"/>
          <line class="hm-part" id="hm-lfoot" x1="75" y1="155" x2="62" y2="152"/>
          <line class="hm-part" id="hm-rfoot" x1="125" y1="155" x2="138" y2="152"/>
          <text class="hm-face" id="hm-face" x="100" y="59" text-anchor="middle">x  x</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- Keyboard (hidden until start) -->
  <div id="keyboard-wrap" style="display:none;">
    <div class="keyboard" id="keyboard"></div>
    <div class="action-row">
      <button class="action-btn primary" id="btn-new">New Word</button>
      <button class="action-btn" id="btn-hint">💡 Hint</button>
      <button class="action-btn" id="btn-reveal">👁 Reveal</button>
    </div>
  </div>

</div>

<script>
// ─── WORD LISTS (Dolch) ───
const WORDS = {
  preprimer: ["a","and","away","big","blue","can","come","down","find","for","funny","go","help","here","I","in","is","it","jump","little","look","make","me","my","not","one","play","red","run","said","see","the","three","to","two","up","we","where","yellow","you"],
  primer: ["all","am","are","at","ate","be","black","brown","but","came","did","do","eat","four","get","good","have","he","into","like","must","new","no","now","on","our","out","please","pretty","ran","ride","saw","say","she","so","soon","that","there","they","this","too","under","want","was","well","went","what","white","who","will","with","yes"],
  first: ["after","again","an","any","as","ask","by","could","every","fly","from","give","going","had","has","her","him","his","how","just","know","let","live","may","of","old","once","open","over","put","round","some","stop","take","thank","them","then","think","walk","were","when"],
  second: ["always","around","because","been","before","best","both","buy","call","cold","does","don't","fast","first","five","found","gave","goes","green","its","made","many","off","or","pull","read","right","sing","sit","sleep","tell","their","these","those","upon","us","use","very","wash","which","why","wish","work","would","write","your"],
  third: ["about","better","bring","carry","clean","cut","done","draw","drink","eight","fall","far","full","got","grow","hold","hot","hurt","if","keep","kind","laugh","light","long","much","myself","never","nine","only","own","pick","seven","shall","show","six","small","start","ten","today","together","try","warm","eight","seven","six","ten"]
};

const LEVEL_NAMES = {
  preprimer: "Pre-Primer",
  primer: "Primer",
  first: "1st Grade",
  second: "2nd Grade",
  third: "3rd Grade"
};

// ─── STATE ───
const state = {
  word: "",
  revealed: [],
  misses: [],
  lives: 8,
  maxLives: 8,
  gameOver: true,
  level: "preprimer",
  mode: "normal",
  wins: 0,
  losses: 0,
  streak: 0,
  bestStreak: 0,
  hintsUsed: 0,
  usedWords: new Set(),
  started: false
};

let timerDuration = 10;
let timerRemaining = 10;
let timerId = null;

// ─── DOM ───
const wordDisplay = document.getElementById("word-display");
const livesDisplay = document.getElementById("lives-display");
const missesDisplay = document.getElementById("misses-display");
const statusEl = document.getElementById("status");
const levelLabel = document.getElementById("level-label");
const wordLenLabel = document.getElementById("word-length-label");
const timerFill = document.getElementById("timer-fill");
const timerText = document.getElementById("timer-text");
const timerModeLabel = document.getElementById("timer-mode-label");
const btnNormal = document.getElementById("btn-normal");
const btnSpeed = document.getElementById("btn-speed");
const btnNew = document.getElementById("btn-new");
const btnHint = document.getElementById("btn-hint");
const btnReveal = document.getElementById("btn-reveal");
const btnStart = document.getElementById("btn-start");
const startScreen = document.getElementById("start-screen");
const gameCard = document.getElementById("game-card");
const keyboardWrap = document.getElementById("keyboard-wrap");

const HM_PARTS = ["hm-head","hm-body","hm-larm","hm-rarm","hm-lleg","hm-rleg","hm-lfoot","hm-rfoot"];

// ─── CONFETTI ───
const confCanvas = document.getElementById("confetti-canvas");
const confCtx = confCanvas.getContext("2d");
let confetti = [];
function resizeConfCanvas() { confCanvas.width = window.innerWidth; confCanvas.height = window.innerHeight; }
window.addEventListener("resize", resizeConfCanvas);
resizeConfCanvas();

function launchConfetti() {
  const colors = ["#f582ae","#8bd3dd","#f3d250","#4ecdc4","#e85d75","#6bbfc9"];
  for (let i = 0; i < 80; i++) {
    confetti.push({
      x: Math.random() * confCanvas.width,
      y: confCanvas.height + 10,
      w: Math.random() * 8 + 4,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 6,
      vy: -(Math.random() * 14 + 6),
      rot: Math.random() * 360,
      rv: (Math.random() - 0.5) * 10,
      gravity: 0.18 + Math.random() * 0.08
    });
  }
  if (confetti.length === 80) requestAnimationFrame(animConfetti);
}
function animConfetti() {
  confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
  confetti = confetti.filter(p => p.y < confCanvas.height + 20);
  confetti.forEach(p => {
    p.x += p.vx;
    p.vy += p.gravity;
    p.y += p.vy;
    p.rot += p.rv;
    confCtx.save();
    confCtx.translate(p.x, p.y);
    confCtx.rotate(p.rot * Math.PI / 180);
    confCtx.fillStyle = p.color;
    confCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confCtx.restore();
  });
  if (confetti.length > 0) requestAnimationFrame(animConfetti);
}

// ─── TIMER ───
function resetTimer() {
  clearInterval(timerId);
  timerRemaining = timerDuration;
  updateTimerUI();
  timerId = setInterval(() => {
    timerRemaining -= 0.1;
    if (timerRemaining <= 0) {
      timerRemaining = 0;
      clearInterval(timerId);
      // Time up = lose a life
      if (!state.gameOver) {
        state.lives--;
        updateLives();
        updateHangman();
        checkEnd();
        if (!state.gameOver) resetTimer();
      }
    }
    updateTimerUI();
  }, 100);
}

function updateTimerUI() {
  const pct = timerRemaining / timerDuration;
  timerFill.style.width = (pct * 100) + "%";
  timerText.textContent = timerRemaining.toFixed(1) + "s";
  if (pct > 0.5) timerFill.style.background = "var(--success)";
  else if (pct > 0.25) timerFill.style.background = "var(--warning)";
  else timerFill.style.background = "var(--danger)";
}

// ─── UI BUILDERS ───
function buildLevelBar() {
  const bar = document.getElementById("level-bar");
  bar.innerHTML = "";
  Object.keys(LEVEL_NAMES).forEach(key => {
    const btn = document.createElement("button");
    btn.className = "level-btn" + (key === state.level ? " active" : "");
    btn.textContent = LEVEL_NAMES[key];
    btn.addEventListener("click", () => setLevel(key));
    bar.appendChild(btn);
  });
}

function buildKeyboard() {
  const kb = document.getElementById("keyboard");
  const rows = ["qwertyuiop","asdfghjkl","zxcvbnm"];
  kb.innerHTML = "";
  rows.forEach(row => {
    const rowDiv = document.createElement("div");
    rowDiv.className = "kb-row";
    row.split("").forEach(ch => {
      const btn = document.createElement("button");
      btn.className = "key";
      btn.textContent = ch.toUpperCase();
      btn.dataset.letter = ch;
      btn.addEventListener("click", () => handleGuess(ch));
      rowDiv.appendChild(btn);
    });
    kb.appendChild(rowDiv);
  });
}

function updateWordDisplay() {
  wordDisplay.innerHTML = "";
  if (!state.word) return;
  wordLenLabel.textContent = state.word.replace(/'/g, "").length + " letters";
  state.word.split("").forEach((ch, i) => {
    const slot = document.createElement("div");
    if (ch === "'") {
      slot.className = "letter-slot apostrophe";
      slot.textContent = "'";
    } else {
      slot.className = "letter-slot" + (state.revealed[i] ? " revealed" : "");
      slot.textContent = ch.toUpperCase();
    }
    wordDisplay.appendChild(slot);
  });
}

function updateLives() {
  livesDisplay.innerHTML = "";
  for (let i = 0; i < state.maxLives; i++) {
    const h = document.createElement("span");
    h.className = "heart" + (i >= state.lives ? " lost" : "");
    h.textContent = "❤️";
    livesDisplay.appendChild(h);
  }
}

function updateMisses() {
  missesDisplay.innerHTML = state.misses.map(m => `<span class="miss-letter">${m.toUpperCase()}</span>`).join(" ");
}

function updateScores() {
  document.getElementById("score-wins").textContent = state.wins;
  document.getElementById("score-losses").textContent = state.losses;
  document.getElementById("score-streak").textContent = state.streak;
}

function resetHangman() {
  HM_PARTS.forEach(id => { const el = document.getElementById(id); if (el) el.classList.remove("show"); });
  const face = document.getElementById("hm-face");
  if (face) face.classList.remove("show");
}

function updateHangman() {
  const missed = state.maxLives - state.lives;
  HM_PARTS.forEach((id, i) => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle("show", i < missed);
  });
  if (state.lives <= 0) {
    const face = document.getElementById("hm-face");
    if (face) face.classList.add("show");
  }
}

// ─── GAME LOGIC ───
function pickWord() {
  const pool = WORDS[state.level];
  const available = pool.filter(w => !state.usedWords.has(w));
  const list = available.length > 0 ? available : pool;
  if (available.length === 0) state.usedWords.clear();
  const word = list[Math.floor(Math.random() * list.length)];
  state.usedWords.add(word);
  return word.toLowerCase();
}

function newWord() {
  state.word = pickWord();
  state.revealed = new Array(state.word.length).fill(false);
  state.misses = [];
  state.lives = state.maxLives;
  state.gameOver = false;
  state.hintsUsed = 0;
  statusEl.textContent = "";
  statusEl.className = "status-msg";

  // Reveal apostrophes only
  for (let i = 0; i < state.word.length; i++) {
    if (state.word[i] === "'") state.revealed[i] = true;
  }

  // Reset keyboard
  document.querySelectorAll(".key").forEach(k => { k.className = "key"; });

  resetHangman();
  updateWordDisplay();
  updateMisses();
  updateLives();
  resetTimer();
}

function setLevel(key) {
  state.level = key;
  state.usedWords.clear();
  levelLabel.textContent = LEVEL_NAMES[key];
  document.querySelectorAll(".level-btn").forEach((btn, i) => {
    btn.classList.toggle("active", Object.keys(LEVEL_NAMES)[i] === key);
  });
  if (state.started) newWord();
}

function setMode(m) {
  state.mode = m;
  btnNormal.classList.toggle("active", m === "normal");
  btnSpeed.classList.toggle("active", m === "speed");
  timerDuration = m === "speed" ? 5 : 10;
  timerModeLabel.textContent = m === "speed" ? "Speed · 5s per guess" : "Normal · 10s per guess";
  if (state.started) resetTimer();
}

function handleGuess(letter) {
  if (state.gameOver || !state.started) return;
  letter = letter.toLowerCase();
  if (!/^[a-z]$/.test(letter)) return;

  const alreadyHit = state.revealed.some((v, i) => v && state.word[i] === letter);
  if (alreadyHit || state.misses.includes(letter)) return;

  const keyBtn = document.querySelector(`.key[data-letter="${letter}"]`);

  if (state.word.includes(letter)) {
    state.word.split("").forEach((ch, idx) => { if (ch === letter) state.revealed[idx] = true; });
    if (keyBtn) keyBtn.classList.add("hit");
  } else {
    state.misses.push(letter);
    state.lives--;
    if (keyBtn) keyBtn.classList.add("miss");
    updateMisses();
    updateLives();
    updateHangman();
  }

  updateWordDisplay();
  checkEnd();
  if (!state.gameOver) resetTimer();
}

function checkEnd() {
  if (state.revealed.every(v => v)) {
    state.gameOver = true;
    clearInterval(timerId);
    state.wins++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    updateScores();
    statusEl.textContent = "You got it! 🎉";
    statusEl.className = "status-msg win";
    document.querySelectorAll(".letter-slot").forEach(s => s.classList.add("revealed"));
    launchConfetti();
    return;
  }
  if (state.lives <= 0) {
    state.gameOver = true;
    clearInterval(timerId);
    state.losses++;
    state.streak = 0;
    updateScores();
    state.word.split("").forEach((ch, i) => { state.revealed[i] = true; });
    updateWordDisplay();
    document.querySelectorAll(".letter-slot:not(.revealed)").forEach(s => s.classList.add("wrong-reveal"));
    statusEl.innerHTML = `The word was <strong>${state.word.toUpperCase()}</strong>`;
    statusEl.className = "status-msg lose";
    updateHangman();
  }
}

function giveHint() {
  if (state.gameOver || !state.word) return;
  const idx = state.revealed.findIndex(v => !v);
  if (idx === -1) return;
  state.revealed[idx] = true;
  state.hintsUsed++;
  updateWordDisplay();
  const letter = state.word[idx];
  const keyBtn = document.querySelector(`.key[data-letter="${letter}"]`);
  if (keyBtn && !keyBtn.classList.contains("hit")) keyBtn.classList.add("hit");
  const slots = wordDisplay.children;
  if (slots[idx]) slots[idx].classList.add("hint");
  statusEl.textContent = "💡 Hint used!";
  statusEl.className = "status-msg hint";
  checkEnd();
  if (!state.gameOver) resetTimer();
}

function revealWord() {
  if (!state.word) return;
  state.revealed = new Array(state.word.length).fill(true);
  state.gameOver = true;
  clearInterval(timerId);
  updateWordDisplay();
  statusEl.innerHTML = `Revealed: <strong>${state.word.toUpperCase()}</strong>`;
  statusEl.className = "status-msg";
}

// ─── START GAME ───
function startGame() {
  state.started = true;
  startScreen.style.display = "none";
  gameCard.style.display = "";
  keyboardWrap.style.display = "";
  newWord();
}

// ─── EVENTS ───
btnNormal.addEventListener("click", () => { setMode("normal"); if (state.started) newWord(); });
btnSpeed.addEventListener("click", () => { setMode("speed"); if (state.started) newWord(); });
btnNew.addEventListener("click", newWord);
btnHint.addEventListener("click", giveHint);
btnReveal.addEventListener("click", revealWord);
btnStart.addEventListener("click", startGame);

document.addEventListener("keydown", e => {
  if (!state.started) {
    if (e.key === "Enter") { startGame(); return; }
    return;
  }
  if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
    handleGuess(e.key);
  } else if (e.key === "Enter") {
    newWord();
  }
});

// ─── INIT (no auto-start) ───
buildLevelBar();
buildKeyboard();
setMode("normal");
</script>
</body>
</html>
