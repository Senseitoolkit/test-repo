<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lesson Explorer · PYP lesson types</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F2EA; --surface:#FFFFFF; --surface-2:#F0EBE0;
  --ink:#2B2A25; --muted:#6E6A60; --faint:#9C988C;
  --line:rgba(43,42,37,.12); --line-2:rgba(43,42,37,.22); --line-strong:rgba(43,42,37,.34);
  --accent:#0F6E56; --accent-soft:#E4F0EA;
  --tune:#1D9E75; --find:#2E7DBE; --sort:#BA7517; --share:#C2552B; --reflect:#5A50C0;
  --calm:#1D9E75; --moderate:#2E7DBE; --active:#BA7517; --buzzing:#C2552B;
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-pill:30px;
  --shadow:0 1px 2px rgba(43,42,37,.04), 0 6px 18px rgba(43,42,37,.05);
  --sans:'Hanken Grotesk',system-ui,sans-serif; --display:'Fraunces',Georgia,serif;
}
@media (prefers-color-scheme: dark){
:root{
  --paper:#1C1B18; --surface:#262420; --surface-2:#2F2C27;
  --ink:#ECE8DE; --muted:#A9A498; --faint:#7C786E;
  --line:rgba(236,232,222,.13); --line-2:rgba(236,232,222,.22); --line-strong:rgba(236,232,222,.34);
  --accent:#3FB28F; --accent-soft:#1E3A31;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 18px rgba(0,0,0,.28);
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.55}
body{padding-bottom:env(safe-area-inset-bottom)}
button,input,select{font-family:inherit;color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 clamp(14px,3.5vw,40px)}

header.app-head{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--paper) 88%,transparent);backdrop-filter:blur(10px);border-bottom:.5px solid var(--line)}
.head-inner{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:14px 0}
.brand{display:flex;flex-direction:column;flex:1;min-width:160px}
.brand h1{font-family:var(--display);font-weight:600;font-size:clamp(20px,2.6vw,27px);letter-spacing:-.01em;line-height:1.05}
.brand p{font-size:12.5px;color:var(--muted);margin-top:2px}
.head-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search{position:relative;flex:1;min-width:150px}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--faint);fill:none;stroke-width:1.8}
.search input{width:100%;padding:9px 12px 9px 34px;font-size:14px;border-radius:var(--r-pill);border:.5px solid var(--line-2);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
select{padding:9px 12px;font-size:13px;border-radius:var(--r-pill);border:.5px solid var(--line-2);background:var(--surface);cursor:pointer;outline:none}
select:focus{border-color:var(--accent)}

.filters{padding:14px 0 6px}
.frow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.flabel{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;flex-shrink:0;width:52px}
.chiprow{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.chiprow::-webkit-scrollbar{height:0}
.chip{font-size:13px;padding:6px 13px;border-radius:var(--r-pill);border:.5px solid var(--line-2);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;transition:all .14s}
.chip:hover{border-color:var(--line-strong);color:var(--ink)}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink);font-weight:500}
.chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chip.on .dot{outline:1.5px solid var(--paper);outline-offset:1px}
.tagchip{font-size:12px;padding:4px 11px;border-radius:var(--r-pill);border:.5px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .14s}
.tagchip:hover{border-color:var(--line-2);color:var(--ink)}
.tagchip.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);font-weight:500}
.more-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 0;font-weight:500}
#tagFrow{display:none}

.count{font-size:12px;color:var(--faint);font-weight:500;padding:6px 0 14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,255px),1fr));gap:14px;padding-bottom:120px}
.card{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r-lg);padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:9px;position:relative;transition:transform .16s,border-color .16s,box-shadow .16s}
.card:hover{transform:translateY(-2px);border-color:var(--line-2);box-shadow:var(--shadow)}
.card.picked{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card-name{font-family:var(--display);font-weight:600;font-size:17px;letter-spacing:-.01em;line-height:1.12;padding-right:30px}
.card-best{font-size:13px;color:var(--muted);line-height:1.45}
.card-lens{font-size:12.5px;color:var(--muted);line-height:1.5;background:var(--surface-2);border-radius:var(--r-sm);padding:9px 11px;border-left:2.5px solid var(--accent)}
.card-lens b{font-weight:600;color:var(--ink)}
.card-meta{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-top:auto;padding-top:6px}
.ebadge{font-size:11px;padding:3px 9px;border-radius:var(--r-pill);color:#fff;font-weight:600;text-transform:capitalize}
.prep{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--faint);font-weight:500}
.bars{display:flex;gap:2.5px}
.bar{width:5px;height:10px;border-radius:1.5px;background:var(--line-2)}
.bar.f{background:var(--muted)}
.pips{display:flex;gap:3px;margin-left:auto}
.pip{width:8px;height:8px;border-radius:50%}
.add{position:absolute;top:13px;right:13px;width:26px;height:26px;border-radius:50%;border:.5px solid var(--line-2);background:var(--surface);color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;transition:all .14s;font-weight:400}
.add:hover{border-color:var(--accent);color:var(--accent)}
.add.on{background:var(--accent);color:#fff;border-color:var(--accent)}

.tray{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom));z-index:40;display:none;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r-pill);background:var(--ink);color:var(--paper);box-shadow:0 8px 30px rgba(0,0,0,.22);max-width:calc(100% - 28px)}
.tray.show{display:flex}
.tray-txt{font-size:13px;font-weight:500}
.tray-txt b{font-weight:700}
.tray button{font-size:13px;padding:7px 14px;border-radius:var(--r-pill);border:none;cursor:pointer;font-weight:600;white-space:nowrap}
.tray .ghost{background:transparent;color:var(--paper);border:.5px solid rgba(255,255,255,.35)}
.tray .solid{background:var(--accent);color:#fff}
.tray .solid:disabled{opacity:.45;cursor:default}

.screen{display:none}
.screen.on{display:block}
.back{display:inline-flex;align-items:center;gap:7px;font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;padding:18px 0 8px;font-weight:500}
.back:hover{color:var(--ink)}
.back svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.9}

.detail{padding-bottom:80px;max-width:760px}
.d-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
.d-name{font-family:var(--display);font-weight:600;font-size:clamp(24px,4vw,34px);letter-spacing:-.015em;line-height:1.04}
.d-best{font-size:15px;color:var(--muted);margin:8px 0 22px;line-height:1.5}
.metagrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-bottom:26px}
.metacard{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r-md);padding:12px 14px}
.metacard .ml{font-size:10.5px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.metacard .mv{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
.sec{margin-bottom:26px}
.sec-h{font-family:var(--display);font-weight:600;font-size:13px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:11px}
.phase-chips{display:flex;flex-wrap:wrap;gap:7px}
.pchip{font-size:13px;padding:5px 12px;border-radius:var(--r-pill);color:#fff;font-weight:600}
.pc-cols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.pc-head{font-size:12px;font-weight:600;margin-bottom:9px;text-transform:uppercase;letter-spacing:.05em}
.pro-h{color:var(--tune)}.con-h{color:var(--share)}
.pc-item{font-size:14px;color:var(--muted);line-height:1.5;padding-left:16px;position:relative;margin-bottom:8px}
.pc-item::before{content:'';position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%}
.pro::before{background:var(--tune)}.con::before{background:var(--share)}
.box{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r-md);padding:14px 16px;font-size:14.5px;color:var(--muted);line-height:1.65}
.prereqs{list-style:none}
.prereqs li{font-size:14.5px;color:var(--muted);padding:5px 0 5px 20px;position:relative;line-height:1.5}
.prereqs li::before{content:'→';position:absolute;left:0;color:var(--accent);font-weight:600}
.band{border:.5px solid var(--line);border-radius:var(--r-md);padding:13px 16px;margin-bottom:10px;background:var(--surface)}
.band.lens{border-color:var(--accent);background:var(--accent-soft)}
.band-yr{font-size:13px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.band-yr .tag{font-size:10px;padding:2px 8px;border-radius:var(--r-pill);background:var(--accent);color:#fff;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.band-how{font-size:14px;color:var(--muted);line-height:1.6}
.pairs{display:flex;flex-wrap:wrap;gap:9px}
.pairchip{font-size:13.5px;padding:8px 14px;border-radius:var(--r-pill);background:var(--surface);border:.5px solid var(--line-2);cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-weight:500;transition:all .14s}
.pairchip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.pairchip svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.tagline{display:flex;flex-wrap:wrap;gap:7px}
.dtag{font-size:12.5px;padding:4px 11px;border-radius:var(--r-pill);background:var(--surface-2);color:var(--muted)}
.plan-btn{width:100%;padding:15px;font-size:15px;border-radius:var(--r-md);border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity .14s}
.plan-btn:hover{opacity:.9}
.plan-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.9}

.cmp{padding-bottom:80px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cmp-table{border-collapse:collapse;width:100%;min-width:560px}
.cmp-table th,.cmp-table td{text-align:left;padding:13px 15px;border-bottom:.5px solid var(--line);vertical-align:top;font-size:13.5px;line-height:1.5}
.cmp-table thead th{font-family:var(--display);font-weight:600;font-size:17px;color:var(--ink);border-bottom:1px solid var(--line-2);position:sticky;top:0;background:var(--paper)}
.cmp-table td:first-child,.cmp-table th:first-child{color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;width:120px;white-space:nowrap}
.cmp-table td{color:var(--muted)}
.cmp-h{font-family:var(--display);font-weight:600;font-size:clamp(20px,3vw,26px);margin:6px 0 18px}

.empty{grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--faint);font-size:14px}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:var(--r-pill);font-size:13.5px;font-weight:500;opacity:0;transition:opacity .25s,transform .25s;z-index:60;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.22)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:620px){
  .pc-cols{grid-template-columns:1fr;gap:14px}
  .flabel{width:46px;font-size:10.5px}
  .head-inner{padding:12px 0}
}
@media print{
  header.app-head,.tray,.add,.plan-btn,.back,.filters,.count{display:none!important}
  .card{break-inside:avoid;box-shadow:none}
}
</style>
</head>
<body>

<header class="app-head">
  <div class="wrap head-inner">
    <div class="brand">
      <h1>Lesson Explorer</h1>
      <p>20 lesson types · filter by inquiry phase, year group &amp; energy</p>
    </div>
    <div class="head-tools">
      <div class="search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="search" placeholder="Search lessons…" oninput="render()" aria-label="Search lessons">
      </div>
      <select id="sort" onchange="render()" aria-label="Sort">
        <option value="az">A–Z</option>
        <option value="prep">Least prep first</option>
        <option value="energy">Calmest first</option>
      </select>
    </div>
  </div>
</header>

<main class="wrap">
  <section class="screen on" id="browse">
    <div class="filters">
      <div class="frow"><span class="flabel">Phase</span><div class="chiprow" id="phaseChips"></div></div>
      <div class="frow"><span class="flabel">Year</span>
        <select id="yearLens" onchange="render()" aria-label="Year group lens">
          <option value="all">All years</option>
          <option value="0">Reception–Y1</option>
          <option value="1">Y2–Y3</option>
          <option value="2">Y4–Y5</option>
          <option value="3">Y6</option>
        </select>
      </div>
      <div class="frow"><span class="flabel">Energy</span><div class="chiprow" id="energyChips"></div></div>
      <div class="frow" id="tagFrow"><span class="flabel">Tags</span><div class="chiprow" id="tagChips"></div></div>
      <button class="more-btn" id="moreBtn" onclick="toggleTags()">Show tag filters</button>
    </div>
    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
  </section>

  <section class="screen" id="detailScreen">
    <button class="back" onclick="goBrowse()"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>All lessons</button>
    <div class="detail" id="detailBody"></div>
  </section>

  <section class="screen" id="compareScreen">
    <button class="back" onclick="goBrowse()"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>All lessons</button>
    <h2 class="cmp-h" id="cmpHeading"></h2>
    <div class="cmp" id="compareBody"></div>
  </section>
</main>

<div class="tray" id="tray">
  <span class="tray-txt" id="trayTxt"></span>
  <button class="ghost" onclick="clearPicks()">Clear</button>
  <button class="solid" id="cmpBtn" onclick="openCompare()">Compare</button>
</div>
<div class="toast" id="toast"></div>

<script>
const PHC={tune:'var(--tune)',find:'var(--find)',sort:'var(--sort)',share:'var(--share)',reflect:'var(--reflect)'};
const PHL={tune:'Tuning in',find:'Finding out',sort:'Sorting out',share:'Going further',reflect:'Reflecting'};
const ENC={calm:'var(--calm)',moderate:'var(--moderate)',active:'var(--active)',buzzing:'var(--buzzing)'};
const ENORD={calm:0,moderate:1,active:2,buzzing:3};
const BANDS=['Reception–Y1','Y2–Y3','Y4–Y5','Y6'];

const L=[
{name:"Concept-first",best:"Introducing a new skill, sport, or idea",phases:["tune","find"],tags:["PYP","PE","any subject"],energy:"calm",prep:2,dur:"30 min",group:"Whole class → pairs",
 pros:["Anchors learning in big ideas","Builds transfer of understanding"],cons:["Can feel abstract without follow-up","Needs confident facilitation"],
 needs:"1–2 clear, concrete examples of the concept in action",
 prereqs:["Can listen to a short explanation","Can notice and name what they observe","Some prior experience with the topic"],
 pairs:["I Do → We Do → You Do","Thinking routine","Skill ladder"],
 scale:["Use one simple physical example. Ask 'what do you notice?'. Focus on one word (e.g. balance). Keep it under 5 minutes before moving.","Show two contrasting examples. Students discuss in pairs and use the concept word in writing or drawing.","Students predict before seeing examples, compare multiple contexts, and start making cross-subject links independently.","Students define the concept themselves before exploring it, apply it across subjects unprompted, and discuss nuance and exceptions."]},
{name:"Inquiry-driven",best:"PYP units, science, social studies",phases:["tune","find","sort"],tags:["PYP","student agency","inquiry"],energy:"moderate",prep:3,dur:"45+ min",group:"Mixed",
 pros:["Students own the direction","Sustains genuine curiosity"],cons:["Hard to time — can spiral","Needs a flexible teacher stance"],
 needs:"A strong provocation: video, object, or scenario",
 prereqs:["Can form and ask questions","Can sit with not-knowing","Basic research or observation skills","Some independence in groups"],
 pairs:["Thinking routine","Experiment lesson","Learning journey"],
 scale:["Provocation is hands-on (an object, a visitor). Teacher scribes questions. Investigation is short and guided; sharing is verbal.","Students write questions on post-its. Small-group investigation with support. Findings in drawings or simple notes.","Students choose their path, use mixed sources, record in a structured way, then compare findings across groups.","Students design their own investigation, select sources critically, and present evidence-based conclusions. Teacher is a thinking partner."]},
{name:"I Do → We Do → You Do",best:"Any new technique or strategy",phases:["find","sort"],tags:["explicit teaching","any subject","structure"],energy:"calm",prep:1,dur:"30 min",group:"Whole class → solo",
 pros:["Clear scaffolding, low confusion","Works across all age groups"],cons:["Students passive during 'I Do'","Limits spontaneous agency"],
 needs:"A prepared model + 2–3 guided examples",
 prereqs:["Can watch and listen attentively","Willing to attempt without full confidence","Basic imitation skills"],
 pairs:["Loop lesson","Skill ladder","Stations / Rotations"],
 scale:["'I Do' is 1–2 steps. 'We Do' is whole-class together. 'You Do' is a supported attempt with the teacher nearby and lots of narration.","'I Do' includes think-aloud. 'We Do' uses partner work. 'You Do' has a scaffold or prompt card.","Students predict next steps during 'I Do'. 'We Do' is mostly peer-led. 'You Do' adds a challenge extension.","'I Do' is minimal — students question as you model. 'You Do' becomes 'You Do and teach someone else'."]},
{name:"Thinking routine",best:"Any subject — building deep thinking habits",phases:["tune","sort","reflect"],tags:["PYP","thinking","metacognition"],energy:"calm",prep:1,dur:"15 min",group:"Mixed",
 pros:["Builds metacognition over time","Works across subjects and ages"],cons:["Feels mechanical at first","Needs consistent repetition"],
 needs:"A chosen routine (e.g. See-Think-Wonder)",
 prereqs:["Can slow down and observe","Tolerates open-ended questions","Some vocabulary for thinking and noticing"],
 pairs:["Inquiry-driven","Puzzle-based","Concept-first"],
 scale:["See-Think-Wonder with an image or object. Teacher models each step aloud; responses verbal and scribed. Cap at 10 minutes.","Students record their own thinking in a template. Pair-share before whole class. Begin naming the routine.","Students choose where to start the routine, apply it to texts or data, and begin using it independently elsewhere.","Students select the right routine for the task, use it across subjects unprompted, and facilitate it for others."]},
{name:"Stations / Rotations",best:"Mixed abilities, PE, literacy centres",phases:["find","sort"],tags:["PE","differentiation","high energy"],energy:"active",prep:3,dur:"40 min",group:"Small groups",
 pros:["High engagement, low wait time","Naturally differentiated"],cons:["Needs very clear station cards","Hard to monitor every group"],
 needs:"4–6 stations with visual instructions",
 prereqs:["Can follow visual instructions alone","A transition routine is in place","Can work without constant teacher presence"],
 pairs:["Skill ladder","Peer coaching","Choice board"],
 scale:["2–3 stations only, pictorial instructions, an adult at the hardest one. Rotation is teacher-led with a clear signal.","4 stations with picture-word cards. Students manage rotation with a timer. One station is a teacher table.","5–6 stations, students record outcomes, a peer-coaching station, and free revisits when finished early.","Students may design or run a station. Self-directed rotation order, with choice and open challenge built in."]},
{name:"Skill ladder",best:"PE, sports, literacy, math strategies",phases:["find","sort","share"],tags:["PE","progression","self-assessment"],energy:"active",prep:2,dur:"35 min",group:"Mixed",
 pros:["Students see their own progress","Builds confidence step by step"],cons:["Some plateau at Level 1","Descriptors take time to write"],
 needs:"Defined levels (0–4) and a self-assessment tool",
 prereqs:["Can self-assess honestly","Comfortable not being at the top level","Some sense of what improvement looks like"],
 pairs:["Loop lesson","Peer coaching","I Do → We Do → You Do"],
 scale:["Two levels only: 'I'm trying' and 'I can do it'. Teacher assesses verbally. Celebrate all levels. No written self-assessment.","Three levels with picture examples. Thumbs up/sideways/down self-assessment; teacher confirms the next step.","Four levels with written criteria. Students pick their level, practise, move up, and peer-verify.","Students help write the descriptors, track progress over a unit, and set their own next-step goals."]},
{name:"Peer coaching",best:"PE, writing, presentations",phases:["sort","share","reflect"],tags:["communication","empathy","ATL"],energy:"moderate",prep:1,dur:"25 min",group:"Pairs",
 pros:["Builds empathy and communication","Students internalise criteria"],cons:["Feedback quality varies widely","Pairs need a clear protocol"],
 needs:"A simple feedback protocol (e.g. Stars & Steps)",
 prereqs:["Psychological safety in the class","Can observe and describe specifically","Some grasp of the success criteria"],
 pairs:["Skill ladder","Performance lesson","Creative expression"],

const ALLTAGS=[...new Set(L.flatMap(l=>l.tags))].sort();
let phase="all",energy="all",tags=new Set(),lens="all",picks=new Set(),tagsOpen=false;
const $=id=>document.getElementById(id);
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const enc=s=>s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

function buildChips(){
  let ph=`<button class="chip ${phase==='all'?'on':''}" onclick="setPhase('all')">All phases</button>`+
    Object.keys(PHC).map(p=>`<button class="chip ${phase===p?'on':''}" onclick="setPhase('${p}')"><span class="dot" style="background:${PHC[p]}"></span>${PHL[p]}</button>`).join("");
  $("phaseChips").innerHTML=ph;
  let en=`<button class="chip ${energy==='all'?'on':''}" onclick="setEnergy('all')">Any</button>`+
    Object.keys(ENC).map(e=>`<button class="chip ${energy===e?'on':''}" onclick="setEnergy('${e}')"><span class="dot" style="background:${ENC[e]}"></span>${e[0].toUpperCase()+e.slice(1)}</button>`).join("");
  $("energyChips").innerHTML=en;
  $("tagChips").innerHTML=ALLTAGS.map(t=>`<button class="tagchip ${tags.has(t)?'on':''}" onclick="toggleTag('${enc(t)}')">${esc(t)}</button>`).join("");
}
function setPhase(p){phase=p;render()}
function setEnergy(e){energy=e;render()}
function toggleTag(t){tags.has(t)?tags.delete(t):tags.add(t);render()}
function toggleTags(){tagsOpen=!tagsOpen;$("tagFrow").style.display=tagsOpen?"flex":"none";$("moreBtn").textContent=tagsOpen?"Hide tag filters":"Show tag filters"}
function bars(n){return `<span class="bars">${[1,2,3].map(i=>`<span class="bar ${i<=n?'f':''}"></span>`).join("")}</span>`}
const prepLabel=n=>["","low prep","some prep","high prep"][n];

function render(){
  lens=$("yearLens").value;
  const q=$("search").value.toLowerCase(), sort=$("sort").value;
  buildChips();
  let list=L.filter(l=>{
    const pOk=phase==="all"||l.phases.includes(phase);
    const eOk=energy==="all"||l.energy===energy;
    const tOk=tags.size===0||[...tags].every(t=>l.tags.includes(t));
    const qOk=!q||l.name.toLowerCase().includes(q)||l.best.toLowerCase().includes(q)||l.tags.some(t=>t.toLowerCase().includes(q));
    return pOk&&eOk&&tOk&&qOk;
  });
  if(sort==="az")list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==="prep")list.sort((a,b)=>a.prep-b.prep||a.name.localeCompare(b.name));
  else if(sort==="energy")list.sort((a,b)=>ENORD[a.energy]-ENORD[b.energy]||a.name.localeCompare(b.name));

  $("count").textContent=list.length+" of "+L.length+" lesson types"+(lens!=="all"?" · viewing as "+BANDS[+lens]:"");
  const g=$("grid");
  if(!list.length){g.innerHTML='<div class="empty">No lessons match — try clearing a filter.</div>';updateTray();return;}
  g.innerHTML=list.map(l=>{
    const pips=Object.keys(PHC).map(p=>`<span class="pip" style="background:${l.phases.includes(p)?PHC[p]:'var(--line-2)'}" title="${PHL[p]}"></span>`).join("");
    const body=lens!=="all"?`<div class="card-lens"><b>${BANDS[+lens]}:</b> ${esc(l.scale[+lens])}</div>`:`<div class="card-best">${esc(l.best)}</div>`;
    return `<article class="card ${picks.has(l.name)?'picked':''}" onclick="openDetail('${enc(l.name)}')">
      <button class="add ${picks.has(l.name)?'on':''}" onclick="event.stopPropagation();togglePick('${enc(l.name)}')" aria-label="Add to compare">${picks.has(l.name)?'✓':'+'}</button>
      <h3 class="card-name">${esc(l.name)}</h3>
      ${body}
      <div class="card-meta">
        <span class="ebadge" style="background:${ENC[l.energy]}">${l.energy}</span>
        <span class="prep">${bars(l.prep)} ${prepLabel(l.prep)}</span>
        <span class="pips">${pips}</span>
      </div>
    </article>`;
  }).join("");
  updateTray();
}
function togglePick(n){if(picks.has(n))picks.delete(n);else{if(picks.size>=3){toast('You can compare up to 3');return}picks.add(n)}render()}
function clearPicks(){picks.clear();render()}
function updateTray(){
  const t=$("tray");
  if(picks.size===0){t.classList.remove("show");return}
  t.classList.add("show");
  $("trayTxt").innerHTML=`<b>${picks.size}</b> selected${picks.size<2?' · pick 1 more':''}`;
  $("cmpBtn").disabled=picks.size<2;
}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));$(id).classList.add("on");window.scrollTo(0,0)}
function goBrowse(){show("browse")}

function openDetail(name){
  const l=L.find(x=>x.name===name);if(!l)return;
  const chips=l.phases.map(p=>`<span class="pchip" style="background:${PHC[p]}">${PHL[p]}</span>`).join("");
  const tg=l.tags.map(t=>`<span class="dtag">${esc(t)}</span>`).join("");
  const pros=l.pros.map(p=>`<div class="pc-item pro">${esc(p)}</div>`).join("");
  const cons=l.cons.map(c=>`<div class="pc-item con">${esc(c)}</div>`).join("");
  const pre=l.prereqs.map(p=>`<li>${esc(p)}</li>`).join("");
  const bands=l.scale.map((s,i)=>{
    const isLens=lens!=="all"&&+lens===i;
    return `<div class="band ${isLens?'lens':''}"><div class="band-yr">${BANDS[i]}${isLens?'<span class="tag">your filter</span>':''}</div><div class="band-how">${esc(s)}</div></div>`;
  }).join("");
  const pairs=l.pairs.map(p=>`<button class="pairchip" onclick="openDetail('${enc(p)}')"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>${esc(p)}</button>`).join("");
  $("detailBody").innerHTML=`
    <div class="d-head"><h2 class="d-name">${esc(l.name)}</h2>
      <button class="add ${picks.has(l.name)?'on':''}" style="position:static;flex-shrink:0" onclick="togglePick('${enc(l.name)}')" aria-label="Add to compare">${picks.has(l.name)?'✓':'+'}</button></div>
    <p class="d-best">${esc(l.best)}</p>
    <div class="metagrid">
      <div class="metacard"><div class="ml">Energy</div><div class="mv"><span style="width:9px;height:9px;border-radius:50%;background:${ENC[l.energy]}"></span>${l.energy[0].toUpperCase()+l.energy.slice(1)}</div></div>
      <div class="metacard"><div class="ml">Prep effort</div><div class="mv">${bars(l.prep)} <span style="font-size:13px;color:var(--muted);font-weight:500">${prepLabel(l.prep)}</span></div></div>
      <div class="metacard"><div class="ml">Typical length</div><div class="mv">${esc(l.dur)}</div></div>
      <div class="metacard"><div class="ml">Grouping</div><div class="mv" style="font-size:13px">${esc(l.group)}</div></div>
    </div>
    <div class="sec"><div class="sec-h">Inquiry phases</div><div class="phase-chips">${chips}</div></div>
    <div class="sec"><div class="sec-h">Pros &amp; cons</div><div class="pc-cols"><div><div class="pc-head pro-h">Pros</div>${pros}</div><div><div class="pc-head con-h">Cons</div>${cons}</div></div></div>
    <div class="sec"><div class="sec-h">What you need</div><div class="box">${esc(l.needs)}</div></div>
    <div class="sec"><div class="sec-h">Skill prerequisites</div><div class="box"><ul class="prereqs">${pre}</ul></div></div>
    <div class="sec"><div class="sec-h">How it scales · Reception → Year 6</div>${bands}</div>
    <div class="sec"><div class="sec-h">Pairs well with</div><div class="pairs">${pairs}</div></div>
    <div class="sec"><div class="sec-h">Tags</div><div class="tagline">${tg}</div></div>
    <button class="plan-btn" onclick="copyPrompt('${enc(l.name)}')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>Copy a lesson-plan prompt</button>`;
  show("detailScreen");
}

function copyPrompt(name){
  const txt=`Build me a full lesson plan using the "${name}" lesson format for a PYP class. Include learning objectives, a step-by-step flow, differentiation ideas, and a reflection prompt.`;
  navigator.clipboard?.writeText(txt).then(()=>toast('Prompt copied — paste it into Claude'),()=>toast('Copy failed — select and copy manually'));
}

function openCompare(){
  if(picks.size<2)return;
  const sel=L.filter(l=>picks.has(l.name));
  const yr=lens==="all"?3:+lens;
  $("cmpHeading").textContent="Comparing "+sel.length+" lesson types";
  const head=`<th></th>`+sel.map(l=>`<th>${esc(l.name)}</th>`).join("");
  const row=(label,fn)=>`<tr><td>${label}</td>${sel.map(l=>`<td>${fn(l)}</td>`).join("")}</tr>`;
  const body=
    row("Best for",l=>esc(l.best))+
    row("Phases",l=>l.phases.map(p=>`<span class="pchip" style="font-size:11px;padding:3px 9px;background:${PHC[p]}">${PHL[p]}</span>`).join(" "))+
    row("Energy",l=>`<span class="ebadge" style="background:${ENC[l.energy]}">${l.energy}</span>`)+
    row("Prep",l=>`${bars(l.prep)} ${prepLabel(l.prep)}`)+
    row("Length",l=>esc(l.dur))+
    row("Grouping",l=>esc(l.group))+
    row("You need",l=>esc(l.needs))+
    row("Key prerequisite",l=>esc(l.prereqs[0]))+
    row(BANDS[yr],l=>esc(l.scale[yr]));
  $("compareBody").innerHTML=`<table class="cmp-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  show("compareScreen");
}

let toastTimer;
function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2200)}

buildChips();render();
</script>
