<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inference</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #0F6E56; --green-text: #085041;
    --red-light: #FCEBEB; --red-border: #A32D2D; --red-text: #501313;
    --bg: #F7F5F0; --card: #FFFFFF; --text: #2C2A26; --muted: #6B6860;
    --border: #E2DDD4; --radius: 14px; --radius-sm: 8px;
  }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .app-header {
    background: var(--green); padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(15,110,86,0.18);
  }
  .app-title { font-size: 1.1rem; font-weight: 800; color: white; letter-spacing: -0.01em; }
  .score-chip { background: rgba(255,255,255,0.2); color: white; border-radius: 20px; padding: 4px 14px; font-size: 0.85rem; font-weight: 700; }

  /* Year selector */
  .year-bar {
    background: #0F6E56; display: flex; padding: 0 1.5rem; gap: 4px;
  }
  .year-btn {
    padding: 0.55rem 1.1rem; border: none; background: none;
    font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700;
    color: rgba(255,255,255,0.6); cursor: pointer; border-radius: 6px 6px 0 0;
    transition: all 0.15s; letter-spacing: 0.03em;
  }
  .year-btn.active { background: var(--bg); color: var(--green-dark); }
  .year-btn:hover:not(.active) { color: rgba(255,255,255,0.9); }

  /* Set tabs */
  .tabs-bar {
    background: white; border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; padding: 0 1.5rem;
  }
  .tab-btn {
    padding: 0.8rem 1.2rem; border: none; background: none;
    font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600;
    color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -1.5px; transition: all 0.18s;
  }
  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* Progress */
  .progress-wrap {
    background: white; padding: 0.8rem 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
  }
  .progress-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); white-space: nowrap; min-width: 110px; }
  .progress-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }

  .main { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* Passage */
  .passage-card {
    background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border);
    padding: 1.5rem; margin-bottom: 1.25rem;
  }
  .passage-label { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
  .passage-badge {
    background: var(--green-light); color: var(--green-text);
    font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.07em; padding: 3px 10px; border-radius: 20px;
  }
  .passage-title-text { font-family: 'Lora', serif; font-size: 1.15rem; font-weight: 600; color: var(--text); }
  .passage-body { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.85; color: #3A3830; }

  /* Questions */
  .question-card {
    background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border);
    padding: 1.25rem; margin-bottom: 1rem; transition: border-color 0.2s;
  }
  .question-card.answered { border-color: #C0E8D6; }
  .q-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .q-text { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 14px; line-height: 1.45; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-radius: var(--radius-sm); border: 1.5px solid var(--border);
    background: var(--bg); color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 500;
    cursor: pointer; text-align: left; transition: all 0.15s; width: 100%;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--green); background: var(--green-light); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { background: var(--green-light); border-color: var(--green); color: var(--green-text); font-weight: 700; }
  .opt-btn.wrong { background: var(--red-light); border-color: var(--red-border); color: var(--red-text); }
  .opt-letter {
    width: 26px; height: 26px; border-radius: 50%; background: white;
    border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 800; flex-shrink: 0; color: var(--muted); transition: all 0.15s;
  }
  .opt-btn.correct .opt-letter { background: var(--green); color: white; border-color: var(--green); }
  .opt-btn.wrong .opt-letter { background: var(--red-border); color: white; border-color: var(--red-border); }

  /* Feedback */
  .feedback { margin-top: 14px; border-radius: var(--radius-sm); overflow: hidden; display: none; }
  .feedback.show { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }
  .feedback-header {
    padding: 10px 14px; font-size: 0.9rem; font-weight: 800;
    display: flex; align-items: center; gap: 6px;
  }
  .feedback-header.correct-h { background: var(--green); color: white; }
  .feedback-header.wrong-h { background: var(--red-border); color: white; }
  .feedback-body {
    padding: 12px 14px; background: #F9F8F5;
    border: 1.5px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  }
  .fb-row { font-size: 0.88rem; color: var(--muted); margin-bottom: 7px; line-height: 1.55; }
  .fb-row:last-child { margin-bottom: 0; }
  .fb-label { font-weight: 800; color: var(--text); }
  .fb-quote {
    font-family: 'Lora', serif; font-style: italic;
    color: var(--green-dark); background: var(--green-light);
    border-radius: 4px; padding: 2px 6px; display: inline;
  }

  /* Nav */
  .nav-row { display: flex; align-items: center; justify-content: space-between; margin-top: 1.5rem; gap: 10px; }
  .nav-btn {
    display: flex; align-items: center; gap: 6px; padding: 10px 22px;
    border-radius: 30px; border: 1.5px solid var(--border);
    background: white; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) { background: var(--bg); border-color: #bbb; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: var(--green); color: white; border-color: var(--green); padding: 10px 28px; }
  .nav-btn.primary:hover:not(:disabled) { background: var(--green-dark); border-color: var(--green-dark); }

  /* Complete */
  .complete-screen { text-align: center; padding: 4rem 1rem; animation: fadeIn 0.4s ease; }
  .complete-emoji { font-size: 4rem; margin-bottom: 1rem; }
  .complete-score { font-size: 3.5rem; font-weight: 800; color: var(--green); line-height: 1; margin-bottom: 0.5rem; }
  .complete-label { font-size: 0.85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1.5rem; }
  .complete-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; }
  .complete-sub { font-size: 1rem; color: var(--muted); margin-bottom: 2rem; }

  @media (max-width: 500px) {
    .main { padding: 1rem 0.75rem 4rem; }
    .passage-body { font-size: 0.97rem; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Inference</div>
  <div class="score-chip" id="scoreChip">Score: 0 / 0</div>
</header>

<div class="year-bar">
  <button class="year-btn active" id="year-btn-1" onclick="switchYear(1)">Year 1</button>
  <button class="year-btn" id="year-btn-2" onclick="switchYear(2)">Year 2</button>
  <button class="year-btn" id="year-btn-3" onclick="switchYear(3)">Year 3</button>
  <button class="year-btn" id="year-btn-4" onclick="switchYear(4)">Year 4</button>
  <button class="year-btn" id="year-btn-5" onclick="switchYear(5)">Year 5</button>
  <button class="year-btn" id="year-btn-6" onclick="switchYear(6)">Year 6</button>
</div>

<div class="tabs-bar">
  <button class="tab-btn active" id="tab-fiction" onclick="switchSet('fiction')">📖 Fiction</button>
  <button class="tab-btn" id="tab-nonfiction" onclick="switchSet('nonfiction')">🔬 Non-fiction</button>
</div>

<div class="progress-wrap">
  <div class="progress-label" id="progressLabel">Passage 1 of 20</div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<main class="main" id="mainContent"></main>

<script>
const DATA = {
  1: {
    fiction: [
      { title:"The Empty Bowl", passage:"Ben filled Rusty's bowl with food and called his name. He waited by the back door, holding the leash. Rusty's favourite ball sat untouched on the mat. Ben checked the clock and sighed.", questions:[
        { q:"What is Ben most likely waiting to do?", opts:["Take Rusty for a walk","Give Rusty a bath","Teach Rusty a trick"], correct:0, evidence:"…holding the leash.", rationale:"Holding a leash and waiting by the door suggests he wants to take the dog out, even though it isn't said directly." },
        { q:"Why might Ben have sighed?", opts:["He is excited","Rusty has not come","He is tired of walking"], correct:1, evidence:"He waited by the back door…", rationale:"The food, the untouched ball, and the sigh together hint that Rusty hasn't appeared yet." },
        { q:"What kind of animal is Rusty?", opts:["A cat","A dog","A bird"], correct:1, evidence:"…holding the leash.", rationale:"A bowl, a ball, and a leash are clues that point to a dog rather than another pet." }
      ]},
      { title:"The Wet Footprints", passage:"When Mum came inside, she saw wet footprints leading from the back door to the bathroom. The dog's towel was missing from its hook. Outside, the garden hose was still running.", questions:[
        { q:"What probably happened before Mum came in?", opts:["The dog had a bath outside","It snowed in the garden","The dog dug a hole"], correct:0, evidence:"…the garden hose was still running.", rationale:"Wet prints, a missing dog towel, and a running hose together suggest the dog was washed outside." },
        { q:"Who most likely made the footprints?", opts:["Mum","The dog","A visitor"], correct:1, evidence:"The dog's towel was missing…", rationale:"The clues about the dog and water make the dog the likely source of the wet prints." },
        { q:"How can you tell someone forgot something?", opts:["The towel is folded","The hose is still running","The door is locked"], correct:1, evidence:"…the garden hose was still running.", rationale:"Leaving the hose on suggests someone forgot to turn it off." }

      { title:"The Quiet Classroom", passage:"When Mr Lee walked in, every child was staring at their desk. No one giggled. A paper aeroplane lay on the floor near the bin. Mr Lee raised one eyebrow.", questions:[
        { q:"What probably happened just before Mr Lee came in?", opts:["The class was reading quietly","Someone threw the paper plane","The children were singing"], correct:1, evidence:"A paper aeroplane lay on the floor…", rationale:"The plane on the floor and the sudden silence hint that something playful happened before he entered." },
        { q:"How do the children most likely feel?", opts:["Bored","A little guilty","Sleepy"], correct:1, evidence:"…every child was staring at their desk.", rationale:"Avoiding eye contact and going quiet are clues that they feel caught out." },
        { q:"Why does Mr Lee raise an eyebrow?", opts:["He is suspicious","He is happy","He is cold"], correct:0, evidence:"Mr Lee raised one eyebrow.", rationale:"A raised eyebrow suggests he suspects something happened." }
      ]},
      { title:"The Melting Snowman", passage:"In the morning, Aria's snowman stood tall with a carrot nose. By afternoon, only the carrot and two stones lay in a puddle on the grass. The sun was bright and warm.", questions:[
        { q:"Why did the snowman fall apart?", opts:["Someone knocked it down","The sun melted it","A dog ate it"], correct:1, evidence:"The sun was bright and warm.", rationale:"Bright, warm sun and a puddle are clues that the snow melted rather than being knocked over." },
        { q:"What time of year is it most likely?", opts:["Summer","Near the end of winter","Autumn"], correct:1, evidence:"…only the carrot and two stones lay in a puddle…", rationale:"Snow that melts quickly in warm sun suggests winter is ending." },
        { q:"How might Aria feel seeing the puddle?", opts:["Disappointed","Excited","Hungry"], correct:0, evidence:"…stood tall with a carrot nose.", rationale:"Her proud, tall snowman is gone, so disappointment is the likely feeling." }
      ]},
      { title:"The Loud Tummy", passage:"During the lesson, Sam's tummy made a loud noise. He had skipped breakfast that morning. He kept glancing at the clock and licking his lips.", questions:[
        { q:"What is Sam most likely feeling?", opts:["Hungry","Cold","Sleepy"], correct:0, evidence:"He had skipped breakfast that morning.", rationale:"A rumbling tummy plus a skipped breakfast point to hunger." },
        { q:"Why does Sam keep looking at the clock?", opts:["He wants lunchtime to come","He is timing the lesson","He likes the clock"], correct:0, evidence:"He kept glancing at the clock…", rationale:"A hungry child watching the clock is probably waiting for lunch." },

      { title:"The Hidden Present", passage:"Lily noticed her mum whispering on the phone and quickly hiding a bag behind her back. There were balloons in the cupboard. Lily's birthday was tomorrow.", questions:[

        { q:"How does Lily probably feel?", opts:["Curious","Angry","Bored"], correct:0, evidence:"Lily noticed her mum whispering…", rationale:"Noticing all these secret clues suggests she is curious about what's happening." }

      { title:"The Broken Umbrella", passage:"Tom arrived at school with dripping hair and soggy shoes. His umbrella hung in his hand, bent and useless. He shivered as he sat down.", questions:[
        { q:"What was the weather like?", opts:["Sunny","Rainy and windy","Snowy"], correct:1, evidence:"His umbrella hung in his hand, bent and useless.", rationale:"A broken umbrella and a soaked, shivering child point to heavy rain and wind." },

      { title:"The Spilled Flour", passage:"There was flour on the floor and a cookbook open on the counter. A tray of biscuits cooled by the window. Nana wiped her hands on her apron and smiled.", questions:[

        { q:"Why is there flour on the floor?", opts:["It spilled while baking","The dog knocked it","It is always there"], correct:0, evidence:"There was flour on the floor…", rationale:"Spilled flour during baking is the most likely explanation given the scene." },
        { q:"How does Nana feel about the biscuits?", opts:["Pleased","Worried","Bored"], correct:0, evidence:"Nana wiped her hands on her apron and smiled.", rationale:"Her smile suggests she is pleased with how the baking turned out." }

      { title:"The Missing Slice", passage:"Mum cut the cake into eight slices and left the room. When she came back, there were only seven. Little Max had crumbs on his shirt and a big grin.", questions:[

      ]},
      { title:"The Sandy Shoes", passage:"Jake dropped his bucket and spade by the door. His shoes were full of sand and his nose was pink. He smelled of sun cream.", questions:[

      { title:"The Trembling Leaf", passage:"Mia held her drawing up to show the class. Her hands shook a little and her voice came out very quietly. When everyone clapped, she let out a big breath and smiled.", questions:[

      { title:"The Quiet Puppy", passage:"Usually Pepper barked and jumped when Eli came home. Today Pepper stayed in his basket with his head down. He didn't touch his food.", questions:[

      { title:"The Squeaky Door", passage:"Late at night, Ava heard the front door squeak open. Soon she smelled toast and heard quiet footsteps in the kitchen. Dad's coat was by the door, dripping.", questions:[

      { title:"The Packed Bag", passage:"Grandpa zipped up a big suitcase and checked his ticket twice. A taxi waited outside with its engine running. He hugged everyone tightly before stepping out.", questions:[

      { title:"The Half-Eaten Carrot", passage:"In the morning, the vegetable patch had a half-eaten carrot and small paw prints in the soil. The little fence had a gap near the bottom. Grandma frowned at the hole.", questions:[

      { title:"The Bright Torch", passage:"The whole street went dark all at once. Inside, Dad reached for a torch and the family gathered in one room. Outside, none of the houses had any lights on.", questions:[

      { title:"How Lightning Finds the Ground", passage:"Lightning tends to strike the tallest object in an area because that point offers the shortest path between the cloud and the ground. Tall buildings are fitted with lightning rods — metal strips that give the lightning a safe route down into the earth, protecting the structure.", questions:[

      { title:"Why Bread Goes Stale", passage:"Fresh bread is soft because its starch holds water in a loose structure. Over time, the starch slowly rearranges and squeezes out the water, leaving the bread dry and firm. Surprisingly, this happens faster in the fridge, where the cold speeds up the starch's rearrangement.", questions:[

      { title:"How Echoes Reveal Distance", passage:"Sound travels at a steady, known speed through air. When you shout toward a cliff, the sound bounces back as an echo. By timing how long the echo takes to return, you can work out how far away the cliff is — the longer the delay, the greater the distance.", questions:[

      { title:"Why Mountaineers Need Extra Oxygen", passage:"High on a mountain, the air is much thinner, meaning each breath contains far less oxygen than at sea level. The body struggles to get enough, leaving climbers dizzy and exhausted. On the highest peaks, many climbers carry tanks of oxygen to breathe.", questions:[

      { title:"How Trees Talk Through Roots", passage:"Beneath a forest, tree roots are linked by vast networks of fungal threads. Through these threads, trees can share water, nutrients, and even warning signals. A tree under attack by insects can alert its neighbours, which then boost their own defences before the pests arrive.", questions:[

      { title:"Why Deserts Are Cold at Night", passage:"Sand and rock do not hold heat well. During the day, the desert surface bakes under the sun, but as soon as the sun sets, that heat radiates away into the clear sky almost immediately. With no moisture in the air to trap it, the temperature can plunge below freezing.", questions:[

      { title:"The Unopened Door", passage:"For as long as Jacob could remember, the room at the end of the hall had stayed locked. His mother dusted the door but never the inside. On the rare occasions he asked about it, she would smile, change the subject, and find some small task that needed doing in another room. The key hung on her ring, polished smooth from handling.", questions:[
        { q:"What can you infer about the locked room?", opts:["It holds something emotionally significant to his mother","It is simply storage she forgot about","It does not exist"], correct:0, evidence:"His mother dusted the door but never the inside.", rationale:"Caring for the door yet never entering suggests the room means something she can't face." },
        { q:"What does the smoothly polished key reveal?", opts:["She handles it often, perhaps thinking of the room","She never touches it","It is brand new"], correct:0, evidence:"The key hung on her ring, polished smooth from handling.", rationale:"A key worn smooth implies frequent handling, hinting the room is often on her mind." },
        { q:"Why might she always change the subject?", opts:["The topic is painful or private","She doesn't hear him","She finds it boring"], correct:0, evidence:"…she would smile, change the subject, and find some small task…", rationale:"Deflecting with a forced smile and busywork suggests avoidance of a sensitive matter." }
      ]},
      { title:"The Quiet Resignation", passage:"At the staff meeting, Mr Delgado announced he was 'moving on to new opportunities' and thanked everyone for their support. He'd cleared his desk the night before, taking even the plant he'd kept for a decade. As he spoke, his eyes lingered on the framed award on the wall — the one his name had been removed from in last month's restructure.", questions:[
        { q:"What can you infer about Mr Delgado's departure?", opts:["It may not be entirely his own choice","He is thrilled to be leaving","He plans to return soon"], correct:0, evidence:"…the one his name had been removed from in last month's restructure.", rationale:"His name being removed and the timing suggest he was pushed out rather than leaving freely." },
        { q:"Why might he have cleared his desk the night before?", opts:["He preferred to avoid a public farewell","He forgot the meeting","He was in a hurry to start a new job"], correct:0, evidence:"He'd cleared his desk the night before, taking even the plant…", rationale:"Quietly packing beforehand suggests he wanted to leave without a drawn-out goodbye." },
        { q:"What does his lingering look at the award reveal?", opts:["He still feels the sting of being sidelined","He is proud of the restructure","He has forgotten the award"], correct:0, evidence:"…his eyes lingered on the framed award…", rationale:"Dwelling on the award he was removed from hints at lingering hurt." }
      ]},
      { title:"The Generous Stranger", passage:"The elderly man came to the soup kitchen every Tuesday, not to eat, but to quietly leave an envelope of cash with the manager before slipping out. He always wore the same threadbare coat and walked rather than took the bus, even in winter. One week a volunteer recognised him from a newspaper photo — he had once run the largest factory in town.", questions:[
        { q:"What can you infer about the man's wealth now versus his manner?", opts:["He lives modestly despite once being prosperous","He has always been poor","He is pretending to be rich"], correct:0, evidence:"He always wore the same threadbare coat and walked rather than took the bus…", rationale:"His frugal habits contrast with his past as a factory owner, suggesting deliberate modesty." },
        { q:"Why might he slip out without being seen?", opts:["He wants no recognition for his giving","He is ashamed of the food","He is in a rush"], correct:0, evidence:"…quietly leave an envelope of cash with the manager before slipping out.", rationale:"Giving anonymously and leaving quietly suggests he seeks no praise." },
        { q:"What does walking in winter rather than taking the bus suggest?", opts:["He may be saving money to give away","He enjoys the cold","He has no money at all"], correct:0, evidence:"…walked rather than took the bus, even in winter.", rationale:"Choosing hardship over a small expense, while donating cash, hints he economises to give more." }
      ]},
      { title:"The Changed Handwriting", passage:"The letters from Grandfather had always been firm and slanted, each one filling three neat pages. The most recent one was barely half a page, the words large and wavering, some trailing off mid-sentence. He insisted in it that he was 'perfectly fine' and that nobody should fuss or visit.", questions:[
        { q:"What can you infer from the change in handwriting?", opts:["Grandfather's health may be declining","He has learned a new style","He is writing in a hurry"], correct:0, evidence:"…the words large and wavering, some trailing off mid-sentence.", rationale:"Wavering, trailing writing very different from his firm hand suggests failing strength or health." },
        { q:"Why might he insist nobody fuss or visit?", opts:["He wants to hide his struggles","He genuinely needs nothing","He dislikes his family"], correct:0, evidence:"He insisted… that he was 'perfectly fine' and that nobody should fuss…", rationale:"Insisting he's fine while showing signs otherwise suggests he's downplaying his condition." },
        { q:"What does the shorter letter length imply?", opts:["Writing has become difficult for him","He had little to say","He was interrupted"], correct:0, evidence:"The most recent one was barely half a page…", rationale:"A drop from three pages to half suggests writing now costs him great effort." }
      ]},
      { title:"The Empty Restaurant", passage:"The new restaurant had been packed every night for its first month, with queues down the street. Now, six months on, the chairs sat empty and the once-bustling chef leaned in the doorway, watching people walk past without slowing. A review pinned proudly in the window had yellowed, its date long out of season.", questions:[
        { q:"What can you infer about the restaurant's fortunes?", opts:["Its early success has faded","It is more popular than ever","It just opened"], correct:0, evidence:"Now, six months on, the chairs sat empty…", rationale:"The shift from queues to empty chairs shows the business has declined." },
        { q:"What does the yellowed review in the window suggest?", opts:["The restaurant is clinging to past glory","It received a fresh review","Nobody reads reviews"], correct:0, evidence:"A review pinned proudly in the window had yellowed…", rationale:"Displaying an old, faded review hints they have no recent praise to show." },
        { q:"What does the chef watching passers-by reveal?", opts:["He's hoping in vain for customers","He is taking a relaxed break","He dislikes his customers"], correct:0, evidence:"…watching people walk past without slowing.", rationale:"Watching people pass without stopping suggests anxious hope for trade that isn't coming." }
      ]},
      { title:"The Forgotten Anniversary", passage:"Priya laid out two glasses and a bottle she'd been saving, then sat by the window as the evening light faded. Her phone showed no missed calls. By the time the candles had burned halfway down, she blew them out, poured one glass back into the bottle, and put the second away unused.", questions:[
        { q:"What can you infer Priya had been expecting?", opts:["To share a special evening with someone who didn't come","To dine alone","A delivery"], correct:0, evidence:"Priya laid out two glasses and a bottle she'd been saving…", rationale:"Two glasses and a saved bottle show she planned to share the evening with someone." },
        { q:"What does pouring one glass back suggest?", opts:["The other person never arrived","She changed her mind about drinking","She spilled it"], correct:0, evidence:"…poured one glass back into the bottle, and put the second away unused.", rationale:"Returning the unused glass shows the expected guest didn't come." },
        { q:"How does Priya most likely feel by the end?", opts:["Disappointed","Relieved","Excited"], correct:0, evidence:"By the time the candles had burned halfway down, she blew them out…", rationale:"Quietly ending the evening alone after waiting suggests quiet disappointment." }
      ]},
      { title:"The Reluctant Witness", passage:"When the lawyer asked Tobias what he had seen that night, he shifted in his seat and said he 'couldn't be sure of the details.' Yet earlier, in private, he had described the scene precisely. His gaze flicked toward the back of the courtroom, where a tall man in a grey suit watched him without blinking.", questions:[
        { q:"Why might Tobias now claim uncertainty?", opts:["He may be afraid to tell the truth openly","He genuinely forgot overnight","He never saw anything"], correct:0, evidence:"…earlier, in private, he had described the scene precisely.", rationale:"Knowing the details privately but feigning doubt publicly suggests he's holding back from fear." },
        { q:"What does his glance toward the grey-suited man suggest?", opts:["That man may be influencing his testimony","He knows the man socially","He is looking for a friend"], correct:0, evidence:"His gaze flicked toward the back of the courtroom, where a tall man… watched him without blinking.", rationale:"Glancing nervously at an unblinking watcher hints the man's presence is silencing him." },
        { q:"What can you infer about the man in grey?", opts:["He is connected to the case in a threatening way","He is the lawyer","He is a random spectator"], correct:0, evidence:"…watched him without blinking.", rationale:"His fixed, intimidating stare and Tobias's reaction suggest he is pressuring the witness." }
      ]},
      { title:"The Quiet Mentor", passage:"Coach Nadia rarely praised anyone aloud, and the team often grumbled that she seemed impossible to please. Yet when Sam finally mastered the difficult dive after months of failure, she said nothing — only nodded once and made a small mark in the worn notebook she always carried. That evening, Sam found his name at the top of a list pinned to the board: the squad for the national trials.", questions:[
        { q:"What can you infer about Coach Nadia's single nod?", opts:["It was a meaningful sign of approval from her","It showed indifference","It was an accident"], correct:0, evidence:"…she said nothing — only nodded once and made a small mark…", rationale:"From someone who rarely praises, a deliberate nod carries weight far beyond its size." },
        { q:"What does the notebook most likely contain?", opts:["Careful records of the athletes' progress","Her shopping lists","Random doodles"], correct:0, evidence:"…made a small mark in the worn notebook she always carried.", rationale:"Marking it after a breakthrough, then selecting Sam, implies she tracks performance in it." },
        { q:"What does the team's view of Nadia overlook?", opts:["She notices and values effort closely","She has no standards","She praises everyone"], correct:0, evidence:"…the team often grumbled that she seemed impossible to please.", rationale:"Her quiet recognition of Sam shows she observes far more than the grumbling team realises." }
      ]},
      { title:"The Returned Ring", passage:"A small box arrived at Eleanor's door with no return address, only her name in careful capitals. Inside lay the ring she had lost on the beach two summers before, polished and gleaming, wrapped in a note that read simply: 'I waited until I was sure it was yours.' She turned the box over and found a faint smudge of sand still caught in the corner.", questions:[
        { q:"What can you infer about the sender?", opts:["They found the ring and took care to return it honestly","They stole the ring","They are a shop"], correct:0, evidence:"'I waited until I was sure it was yours.'", rationale:"Holding the ring until certain of the owner shows honesty and care." },
        { q:"What does the trapped sand suggest?", opts:["The ring may have stayed near the beach where it was lost","The sender lives by a desert","Eleanor never went to a beach"], correct:0, evidence:"…a faint smudge of sand still caught in the corner.", rationale:"Sand in the box links it to the beach, hinting the ring stayed in that environment." },
        { q:"Why might the sender omit a return address?", opts:["They sought no thanks or reward","They forgot it","They wanted to be paid"], correct:0, evidence:"…with no return address, only her name in careful capitals.", rationale:"Returning it anonymously suggests they wanted nothing in return." }
      ]},
      { title:"The Overgrown Garden", passage:"Mr Bramwell's garden had once been the pride of the street, its hedges clipped into perfect spheres and its roses winning ribbons each summer. Now the grass reached the windowsills and brambles swallowed the gate. The curtains stayed drawn at all hours, and the milk bottles by the door had multiplied, untouched.", questions:[
        { q:"What can you infer about Mr Bramwell?", opts:["Something has stopped him caring for his home as before","He moved house","He hired a new gardener"], correct:0, evidence:"…the grass reached the windowsills and brambles swallowed the gate.", rationale:"A once-perfect garden left to ruin suggests he can no longer tend it." },
        { q:"What do the multiplying, untouched milk bottles suggest?", opts:["He may not be coming to the door","He drinks no milk","Someone is stealing them"], correct:0, evidence:"…the milk bottles by the door had multiplied, untouched.", rationale:"Uncollected bottles piling up imply he isn't well enough or present to take them in." },
        { q:"Why might the curtains stay drawn at all hours?", opts:["He may be unwell or withdrawn","He prefers darkness for plants","The windows are broken"], correct:0, evidence:"The curtains stayed drawn at all hours…", rationale:"Constantly closed curtains, with the other clues, hint at illness or withdrawal." }
      ]},
      { title:"The Confident Newcomer", passage:"On her first day, Aisha answered every question before the others had finished reading them and corrected the teacher twice. By the second week, though, she sat at the back, volunteering nothing, her work handed in late. A crumpled letter from her previous school poked out of her bag, its corner stamped with a word she kept hidden.", questions:[
        { q:"What can you infer about Aisha's change in behaviour?", opts:["Something has happened to dampen her confidence","She has become lazy","She has learned everything already"], correct:0, evidence:"By the second week… she sat at the back, volunteering nothing…", rationale:"A sharp drop from eager to withdrawn suggests an underlying change in how she feels." },
        { q:"What might the hidden letter hint at?", opts:["Troubles connected to her previous school","A prize she won","A holiday plan"], correct:0, evidence:"A crumpled letter from her previous school… a word she kept hidden.", rationale:"A hidden, crumpled letter from her old school suggests it relates to something difficult she conceals." },
        { q:"Why might her early confidence have been a kind of front?", opts:["She may have been masking insecurity","She was genuinely arrogant always","She wanted to fail"], correct:0, evidence:"…answered every question before the others… corrected the teacher twice.", rationale:"Loud confidence that quickly collapses can be a cover for deeper unease." }
      ]},
      { title:"The Late Arrival", passage:"The interviewer noticed that the candidate arrived breathless, with a coffee stain on his shirt and one shoe scuffed badly. Yet his answers were sharp and well-prepared, and he produced a folder of careful notes. When asked about the morning, he simply said his usual train had been cancelled and he'd run the last mile.", questions:[
        { q:"What can you infer about the candidate's character?", opts:["He is determined and committed despite setbacks","He is careless and disorganised","He didn't want the job"], correct:0, evidence:"…his answers were sharp and well-prepared, and he produced a folder of careful notes.", rationale:"Arriving flustered yet thoroughly prepared shows commitment that overcame the morning's chaos." },
        { q:"What does running the last mile suggest?", opts:["He refused to let an obstacle stop him","He enjoys exercise","He was lost"], correct:0, evidence:"…his usual train had been cancelled and he'd run the last mile.", rationale:"Choosing to run rather than give up shows determination to attend despite difficulty." },
        { q:"Why might the interviewer view the stains differently after hearing his story?", opts:["They reflect effort, not carelessness","They prove he is messy","They are irrelevant entirely"], correct:0, evidence:"…with a coffee stain on his shirt and one shoe scuffed badly.", rationale:"Once explained by his rush, the stains become signs of effort rather than sloppiness." }
      ]},
      { title:"The Silent Auction", passage:"At the charity auction, bidding on the painting climbed slowly until a woman at the back raised her paddle and the room fell quiet. She paid far more than the painting was worth, then asked that it be donated straight back to the school. Afterwards, she lingered before it, tracing the signature in the corner — a child's name, the same as the surname on her own name badge.", questions:[
        { q:"Why might the woman have paid so much?", opts:["The painting has personal meaning to her","She didn't know its value","She wanted to show off only"], correct:0, evidence:"…tracing the signature in the corner — a child's name, the same as the surname on her own name badge.", rationale:"The matching surname suggests a family connection that made the painting precious to her." },
        { q:"Why might she donate the painting straight back?", opts:["She valued the cause and the gesture over owning it","She disliked the painting","She had no wall for it"], correct:0, evidence:"…then asked that it be donated straight back to the school.", rationale:"Buying it dearly only to give it back shows her aim was to support, not to possess." },
        { q:"What can you infer about her connection to the painting?", opts:["It was likely made by a relative","She painted it herself recently","She had never seen it before"], correct:0, evidence:"…a child's name, the same as the surname on her own name badge.", rationale:"The shared surname points to the young artist being family." }
      ]},
      { title:"The Unworn Uniform", passage:"The football kit hung in its plastic wrapper at the back of Dylan's wardrobe, the price tag still attached. He'd begged for it for months and saved to buy it himself. But ever since the day he came home limping and quiet, he hadn't mentioned the team once, and the muddy boots by the door had dried hard and cracked.", questions:[
        { q:"What can you infer happened on the day Dylan came home limping?", opts:["Something turned him away from football","He won a big match","He bought new boots"], correct:0, evidence:"…ever since the day he came home limping and quiet, he hadn't mentioned the team once.", rationale:"A limp, silence, and sudden loss of interest suggest a bad experience that day." },
        { q:"What does the still-wrapped kit reveal?", opts:["His enthusiasm collapsed before he could use it","He is saving it for a special day","It was the wrong size"], correct:0, evidence:"The football kit hung in its plastic wrapper… the price tag still attached.", rationale:"A longed-for, self-bought kit left unworn shows his eagerness vanished suddenly." },
        { q:"What do the dried, cracked boots add to the picture?", opts:["He hasn't played in a long while","He plays every day","He never owned boots"], correct:0, evidence:"…the muddy boots by the door had dried hard and cracked.", rationale:"Boots left to harden show a long gap since he last used them." }
      ]},
      { title:"The Careful Editor", passage:"Mr Okoro returned Lena's story covered in red ink, far more than any other student received. Where others got a brief 'good effort,' her margins were filled with detailed questions and suggestions. She noticed he'd also underlined three sentences and written 'submit this for the competition' beside them.", questions:[
        { q:"What can you infer from the amount of red ink on Lena's work?", opts:["He took her writing seriously enough to engage deeply","He thought it was the worst","He marked it carelessly"], correct:0, evidence:"…her margins were filled with detailed questions and suggestions.", rationale:"Detailed engagement, unlike the brief notes others got, signals he saw real promise worth developing." },
        { q:"What does the competition note suggest he believes about Lena?", opts:["She has genuine talent","She should give up writing","She copied her work"], correct:0, evidence:"…written 'submit this for the competition' beside them.", rationale:"Urging her to enter a competition shows he rates her ability highly." },
        { q:"Why might heavy criticism actually be encouraging here?", opts:["It reflects investment in her growth","It means he hates the work","It is meant to discourage her"], correct:0, evidence:"…far more than any other student received.", rationale:"The contrast with others' brief notes shows the effort is a mark of attention, not dismissal." }
      ]},
      { title:"The Locked Phone", passage:"Maya's brother usually left his phone lying around, screen lighting up with messages he ignored. Lately he kept it face-down, locked, and tucked into his pocket even at dinner. When it buzzed, he tensed and excused himself, returning with red-rimmed eyes that he blamed on tiredness.", questions:[
        { q:"What can you infer about Maya's brother?", opts:["He is dealing with something troubling in private","He has a new phone","He has become more organised"], correct:0, evidence:"…returning with red-rimmed eyes that he blamed on tiredness.", rationale:"Secrecy plus red eyes he tries to explain away suggest private distress." },
        { q:"Why might he now keep the phone hidden and locked?", opts:["The messages are sensitive or upsetting","He fears losing it","He dislikes the screen light"], correct:0, evidence:"Lately he kept it face-down, locked, and tucked into his pocket…", rationale:"A shift from careless to secretive handling suggests the contents have become private and important." },
        { q:"What does blaming his eyes on tiredness suggest?", opts:["He is hiding the real cause","He genuinely slept badly","He has an eye infection"], correct:0, evidence:"…red-rimmed eyes that he blamed on tiredness.", rationale:"Offering a quick excuse for crying-reddened eyes suggests he's concealing the truth." }
      ]},
      { title:"The Spotless Record", passage:"The job applicant's history was flawless on paper: glowing references, no gaps, every box ticked. But the manager noticed that each reference used almost identical wording, and all three were dated the same day. When asked for a contact number to verify one, the applicant suddenly remembered an urgent appointment.", questions:[
        { q:"What might the identical wording of the references suggest?", opts:["They may not be genuine","The referees are good friends","The applicant is very popular"], correct:0, evidence:"…each reference used almost identical wording, and all three were dated the same day.", rationale:"Near-identical references written on one day hint they were faked by a single person." },
        { q:"Why might the applicant suddenly recall an urgent appointment?", opts:["To avoid the references being checked","He genuinely had one","He was bored of the interview"], correct:0, evidence:"When asked for a contact number to verify one, the applicant suddenly remembered an urgent appointment.", rationale:"Leaving the moment verification is requested suggests he's dodging scrutiny." },
        { q:"What can you infer the manager now suspects?", opts:["The flawless record may be fabricated","The applicant is overqualified","The references are too modest"], correct:0, evidence:"…glowing references, no gaps, every box ticked.", rationale:"A suspiciously perfect record combined with the other clues points to fabrication." }
      ]},
      { title:"The Returning Tide", passage:"Each evening, the old fisherman walked to the harbour wall and looked out at the same empty mooring where a boat had once been tied. He never spoke to the others mending their nets, but he always brought two cups of tea, drinking from one and leaving the other to grow cold on the stones beside him.", questions:[
        { q:"What can you infer the second cup of tea is for?", opts:["Someone no longer there whom he remembers","A friend who will arrive soon","A passing stranger"], correct:0, evidence:"…drinking from one and leaving the other to grow cold on the stones beside him.", rationale:"Pouring tea for someone who never drinks it suggests he honours an absent person." },
        { q:"What does the empty mooring most likely represent?", opts:["A loss connected to a boat and its owner","A space for a new boat","A place to fish"], correct:0, evidence:"…the same empty mooring where a boat had once been tied.", rationale:"Returning nightly to a now-empty spot where a boat used to be suggests grief over what's gone." },
        { q:"Why might he keep apart from the other fishermen?", opts:["He is absorbed in private mourning","He dislikes them","He is too busy fishing"], correct:0, evidence:"He never spoke to the others mending their nets…", rationale:"Withdrawing into a solitary ritual suggests he is dwelling in private grief." }
      ]}
    ],
    nonfiction: [
      { title:"Why Vaccination Rates Matter", passage:"When most of a community is vaccinated against a disease, even those who cannot be vaccinated — such as newborns or the seriously ill — gain protection, because the germ struggles to spread. This shield is called herd immunity. However, if vaccination rates drop below a certain level, the germ can spread freely again, and outbreaks return.", questions:[
        { q:"Why are unvaccinated people safer when most others are vaccinated?", opts:["The germ can't spread easily to reach them","Vaccines spread through the air","They become immune automatically"], correct:0, evidence:"…the germ struggles to spread.", rationale:"If the germ can't move easily through the population, it rarely reaches the vulnerable." },
        { q:"What can you infer happens if vaccination rates fall too low?", opts:["Previously controlled diseases may return","Nothing changes","Vaccines stop working forever"], correct:0, evidence:"…the germ can spread freely again, and outbreaks return.", rationale:"Below the threshold, the protective shield breaks and outbreaks recur." },
        { q:"Why might protecting newborns depend on others' choices?", opts:["Newborns rely on the community's immunity","Newborns are always immune","Newborns can be vaccinated at birth"], correct:0, evidence:"…even those who cannot be vaccinated — such as newborns… gain protection…", rationale:"Since newborns can't be vaccinated, their safety depends on herd immunity from others." }
      ]},
      { title:"How Glaciers Record the Past", passage:"As snow falls on a glacier year after year, it traps tiny bubbles of air from the atmosphere at the time. Deeper layers are older, having been buried longest. By drilling out long cores of ice and studying the trapped air, scientists can learn what the atmosphere was like thousands of years ago.", questions:[
        { q:"Why are deeper layers of glacier ice older?", opts:["They were buried first, long ago","They are colder","They are heavier"], correct:0, evidence:"Deeper layers are older, having been buried longest.", rationale:"Snow piles up over time, so lower layers fell earliest." },
        { q:"How can trapped bubbles reveal the ancient atmosphere?", opts:["They preserve a sample of old air","They change colour with age","They release modern air"], correct:0, evidence:"…it traps tiny bubbles of air from the atmosphere at the time.", rationale:"The bubbles hold air from when the snow fell, giving a record of past conditions." },
        { q:"What can you infer about a very deep ice core sample?", opts:["It reveals more distant history than a shallow one","It is the most recent","It contains no air"], correct:0, evidence:"Deeper layers are older…", rationale:"If depth means age, the deepest ice holds the oldest record." }
      ]},
      { title:"Why Predators Keep Ecosystems Healthy", passage:"When wolves were removed from one national park, the deer population exploded and grazed the young trees to nothing. Riverbanks eroded without roots to hold them, and many species lost their habitats. When wolves were later reintroduced, the deer moved more cautiously, the trees recovered, and the whole landscape began to heal.", questions:[
        { q:"What can you infer about the role of predators?", opts:["They help keep other populations in balance","They only cause harm","They have no effect on plants"], correct:0, evidence:"…the deer population exploded and grazed the young trees to nothing.", rationale:"The chaos that followed removing wolves shows predators kept the system balanced." },
        { q:"Why did riverbanks erode after the wolves were removed?", opts:["Overgrazing left no roots to hold the soil","Wolves dug up the banks","The rivers grew larger"], correct:0, evidence:"Riverbanks eroded without roots to hold them…", rationale:"Too many deer destroyed the plants whose roots stabilised the banks." },
        { q:"What does the landscape's recovery suggest about ecosystems?", opts:["They are interconnected and sensitive to one species","Each part works alone","Predators are unimportant"], correct:0, evidence:"…the trees recovered, and the whole landscape began to heal.", rationale:"One species' return healing the whole system shows deep interconnection." }
      ]},
      { title:"How Antibodies Remember", passage:"After fighting off a particular germ, the body keeps a small number of 'memory cells' tuned to that exact invader. If the same germ returns, these cells recognise it instantly and mount a defence far faster than the first time. This is why people rarely catch certain illnesses, like chickenpox, twice.", questions:[
        { q:"Why is the body's second response to a germ faster?", opts:["Memory cells recognise the germ immediately","The germ is weaker the second time","The body has no defences left"], correct:0, evidence:"…these cells recognise it instantly and mount a defence far faster…", rationale:"Pre-made memory cells skip the slow learning stage of the first infection." },
        { q:"What can you infer about why chickenpox rarely strikes twice?", opts:["Memory cells fight it off before it takes hold","The germ disappears from the world","People avoid it deliberately"], correct:0, evidence:"…people rarely catch certain illnesses, like chickenpox, twice.", rationale:"The fast memory response stops the germ before it causes illness again." },
        { q:"What is the main purpose of memory cells?", opts:["To prepare the body for a germ's return","To attack the body's own cells","To replace lost blood"], correct:0, evidence:"…the body keeps a small number of 'memory cells' tuned to that exact invader.", rationale:"They exist to be ready if the same germ comes back." }
      ]},
      { title:"Why Some Bridges Sway", passage:"Engineers discovered that a crowd walking across a footbridge can unintentionally fall into step with its slight sway. As more people match the rhythm, they push the bridge harder in time with its movement, making the swaying grow worse. Modern bridges include dampers — devices that absorb this energy and steady the structure.", questions:[
        { q:"Why can a crowd make a bridge sway more?", opts:["People sync with the motion and amplify it","People are too heavy","The bridge dislikes crowds"], correct:0, evidence:"…they push the bridge harder in time with its movement, making the swaying grow worse.", rationale:"Matching the rhythm reinforces the sway rather than cancelling it." },
        { q:"What do dampers do?", opts:["Absorb energy to reduce swaying","Add weight to the crowd","Speed up the movement"], correct:0, evidence:"…dampers — devices that absorb this energy and steady the structure.", rationale:"Dampers take away the energy that builds up the sway." },
        { q:"What can you infer about a bridge without dampers in a crowd?", opts:["It may sway more dangerously","It cannot sway at all","It will be perfectly still"], correct:0, evidence:"…making the swaying grow worse.", rationale:"If dampers control sway, a bridge lacking them risks worsening movement." }
      ]},
      { title:"How Light Pollution Affects Wildlife", passage:"Many animals rely on natural darkness to navigate or hunt. Newly hatched sea turtles, for instance, instinctively crawl toward the brightest horizon, which over the ocean is the moonlit water. Bright city lights along the coast can lure them inland instead, away from the sea and into danger.", questions:[
        { q:"Why do hatchling turtles crawl toward the brightest light?", opts:["It normally guides them to the moonlit sea","They are attracted to heat","They follow their parents"], correct:0, evidence:"…instinctively crawl toward the brightest horizon, which over the ocean is the moonlit water.", rationale:"The instinct works because, naturally, the brightest light is the sea." },
        { q:"What can you infer goes wrong near a brightly lit coast?", opts:["City lights become brighter than the sea and mislead them","The turtles can't see at all","The moon disappears"], correct:0, evidence:"Bright city lights along the coast can lure them inland instead…", rationale:"If artificial light outshines the sea, the instinct sends them the wrong way." },
        { q:"What might help protect the turtles?", opts:["Reducing coastal lighting at night","Adding more lights inland","Removing the moon"], correct:0, evidence:"…away from the sea and into danger.", rationale:"Since artificial light causes the harm, dimming it would let the natural cue work." }
      ]},
      { title:"Why Mountains Affect Rainfall", passage:"When moist air from the sea meets a mountain range, it is forced to rise. As it climbs, it cools and releases its moisture as heavy rain on the slope facing the sea. By the time the air crosses to the far side, it is dry, creating an arid 'rain shadow' where little grows.", questions:[
        { q:"Why does the seaward slope receive heavy rain?", opts:["Rising, cooling air drops its moisture there","It is closer to the sun","Mountains make their own rain"], correct:0, evidence:"…it cools and releases its moisture as heavy rain on the slope facing the sea.", rationale:"The air rises and cools first on that side, so it rains there." },
        { q:"What can you infer about life in the rain shadow?", opts:["It must cope with dry conditions","It is lush and green","It floods often"], correct:0, evidence:"…creating an arid 'rain shadow' where little grows.", rationale:"An arid zone where little grows means life there faces dryness." },
        { q:"Why is the air dry on the far side of the mountains?", opts:["It already lost its moisture climbing the near side","It gained moisture crossing","It was always dry"], correct:0, evidence:"By the time the air crosses to the far side, it is dry…", rationale:"The rain on the near slope left the air with little moisture for the far side." }
      ]},
      { title:"How Feedback Loops Drive Change", passage:"In the Arctic, bright white ice reflects much of the sun's heat back into space. As the climate warms and ice melts, it exposes dark ocean water, which absorbs heat instead of reflecting it. This extra warmth melts yet more ice, which exposes more dark water — a cycle that speeds itself up.", questions:[
        { q:"Why does melting ice lead to even more melting?", opts:["Exposed dark water absorbs more heat","Ice grows back stronger","The sun moves closer"], correct:0, evidence:"…it exposes dark ocean water, which absorbs heat instead of reflecting it.", rationale:"Dark water traps heat, warming the area and melting more ice in a loop." },
        { q:"What can you infer about white surfaces and heat?", opts:["They reflect heat away","They absorb the most heat","They have no effect"], correct:0, evidence:"…bright white ice reflects much of the sun's heat back into space.", rationale:"The ice reflecting heat shows white surfaces send heat away." },
        { q:"Why is this called a cycle that 'speeds itself up'?", opts:["Each round of melting causes more melting","It happens only once","It slows down over time"], correct:0, evidence:"…a cycle that speeds itself up.", rationale:"The output of each step feeds back to strengthen the next, accelerating the process." }
      ]},
      { title:"Why Coral Reefs Support So Much Life", passage:"Coral reefs cover only a tiny fraction of the ocean floor, yet they shelter roughly a quarter of all marine species. Their complex, branching structures provide countless hiding places and surfaces for creatures to live on. When a reef dies and crumbles, the animals that depended on its shelter must leave or perish.", questions:[
        { q:"Why do so many species live around reefs?", opts:["The complex structures offer shelter and surfaces","Reefs are the warmest places","Reefs produce all ocean food"], correct:0, evidence:"Their complex, branching structures provide countless hiding places…", rationale:"The varied structure supplies the homes many creatures need." },
        { q:"What can you infer happens to biodiversity when a reef dies?", opts:["It declines sharply in that area","It increases","It stays exactly the same"], correct:0, evidence:"…the animals that depended on its shelter must leave or perish.", rationale:"Losing the shelter forces dependent species out or to death, reducing local life." },
        { q:"Why is it striking that reefs support a quarter of marine species?", opts:["They occupy only a tiny area of the ocean","They are found everywhere","They are very large"], correct:0, evidence:"Coral reefs cover only a tiny fraction of the ocean floor, yet they shelter roughly a quarter of all marine species.", rationale:"Supporting so much life in such a small space shows how vital and concentrated reefs are." }
      ]},
      { title:"How Sound Reveals Hidden Structures", passage:"Doctors can use ultrasound — sound waves too high for us to hear — to see inside the body without surgery. The waves pass through soft tissue but bounce back off denser structures like bone or a developing baby. A machine turns these echoes into a picture on a screen.", questions:[
        { q:"Why can ultrasound create an image of a baby?", opts:["Sound echoes off the denser baby and is mapped","It uses bright light","It cuts the body open gently"], correct:0, evidence:"…bounce back off denser structures like bone or a developing baby.", rationale:"The echoes from denser tissue are turned into a picture." },
        { q:"What can you infer about why soft tissue appears differently from bone?", opts:["Sound passes through soft tissue but reflects off dense bone","Bone is invisible to sound","Soft tissue glows"], correct:0, evidence:"The waves pass through soft tissue but bounce back off denser structures…", rationale:"Differing reflection of soft and dense material creates the contrast in the image." },
        { q:"Why is ultrasound valuable in medicine?", opts:["It lets doctors see inside without surgery","It is the only way to hear","It replaces all other tests"], correct:0, evidence:"…to see inside the body without surgery.", rationale:"Seeing inside without cutting makes it a safe, useful tool." }
      ]},
      { title:"Why Invasive Species Cause Damage", passage:"When a species is moved to a new region with no natural predators, its numbers can grow unchecked. It may outcompete native species for food and space, driving them toward extinction. Because the local wildlife never evolved alongside the newcomer, it often has no defences against it.", questions:[
        { q:"Why can an invasive species' numbers grow so quickly?", opts:["Nothing in the new region keeps it in check","It reproduces faster everywhere","It eats only plants"], correct:0, evidence:"…with no natural predators, its numbers can grow unchecked.", rationale:"Without predators to limit it, the population can expand freely." },
        { q:"Why are native species often defenceless against newcomers?", opts:["They never evolved alongside them","They are always weaker","They refuse to fight"], correct:0, evidence:"…the local wildlife never evolved alongside the newcomer…", rationale:"Lacking shared evolutionary history, natives have no adaptations to cope." },
        { q:"What can you infer about predators in the invader's original home?", opts:["They likely kept its numbers controlled there","They never existed","They helped it spread"], correct:0, evidence:"…with no natural predators, its numbers can grow unchecked.", rationale:"If lacking predators causes the boom, its home predators must have limited it before." }
      ]},
      { title:"How Trees Cool Cities", passage:"Streets lined with trees can be several degrees cooler than bare concrete ones nearby. The leaves provide shade, and water evaporating from them carries heat away, much like sweat cools skin. In summer, neighbourhoods with many trees use far less energy on air conditioning.", questions:[
        { q:"Why are tree-lined streets cooler than bare ones?", opts:["Shade and evaporation remove heat","Trees blow cold air","Concrete makes heat"], correct:0, evidence:"The leaves provide shade, and water evaporating from them carries heat away…", rationale:"Both shade and evaporation lower the temperature." },
        { q:"Why might leafy neighbourhoods use less air conditioning?", opts:["They are naturally cooler, needing less cooling","Trees power the units","People there dislike cool air"], correct:0, evidence:"…neighbourhoods with many trees use far less energy on air conditioning.", rationale:"If trees keep streets cooler, less artificial cooling is needed." },
        { q:"What does the comparison to sweat help explain?", opts:["How evaporation removes heat","Why trees are wet","Why skin is green"], correct:0, evidence:"…carries heat away, much like sweat cools skin.", rationale:"The familiar example of sweat clarifies how evaporation cools." }
      ]},
      { title:"Why Deep-Sea Creatures Glow", passage:"In the deep ocean, sunlight never reaches and the water is utterly dark. Many creatures there produce their own light through chemical reactions. Some use it to lure prey closer, others to startle predators, and a few to signal to mates across the blackness.", questions:[
        { q:"Why is producing light especially useful in the deep sea?", opts:["There is no sunlight, so glowing stands out","The water is too bright","It keeps them warm"], correct:0, evidence:"…sunlight never reaches and the water is utterly dark.", rationale:"In total darkness, self-made light becomes a powerful tool." },
        { q:"What can you infer about communication in the deep ocean?", opts:["Light can serve where sight in sunlight cannot","Animals shout to each other","No communication is possible"], correct:0, evidence:"…a few to signal to mates across the blackness.", rationale:"Using glow to signal shows light replaces sunlight-dependent signalling there." },
        { q:"Why might the same glow serve different purposes?", opts:["Different species evolved it for different needs","All glow means the same thing","Glow is purely decorative"], correct:0, evidence:"Some use it to lure prey… others to startle predators…", rationale:"The varied uses listed show the trait adapted to each creature's needs." }
      ]},
      { title:"How Quicksand Traps", passage:"Quicksand forms when loose sand becomes saturated with water, so it can no longer support weight. A person who steps in begins to sink, and panicked struggling only pulls them deeper. Staying calm and moving slowly, however, lets the body float, since a human is less dense than the thick mixture.", questions:[
        { q:"Why does struggling make sinking worse?", opts:["Sudden movements pull the body deeper","It makes the sand harder","It dries the sand"], correct:0, evidence:"…panicked struggling only pulls them deeper.", rationale:"Thrashing disturbs the mixture and drives the body down." },
        { q:"Why can a calm person float in quicksand?", opts:["The body is less dense than the mixture","Humans cannot sink in water","Calmness adds air"], correct:0, evidence:"…a human is less dense than the thick mixture.", rationale:"Being less dense means the body naturally rises if not forced down." },
        { q:"What does the advice to move slowly imply about escaping?", opts:["Patience works better than force","Speed is essential","Escape is impossible"], correct:0, evidence:"Staying calm and moving slowly, however, lets the body float…", rationale:"Slow, calm movement is what allows floating and escape." }
      ]},
      { title:"Why Some Plants Eat Insects", passage:"Plants normally draw nutrients from the soil, but some grow in bogs where the soil is poor in nitrogen. To survive, these plants trap and digest insects, extracting the nitrogen their roots cannot get from the ground. The Venus flytrap is one famous example.", questions:[
        { q:"Why do these plants catch insects?", opts:["To get nitrogen missing from poor soil","Because they cannot photosynthesise","To attract pollinators"], correct:0, evidence:"…extracting the nitrogen their roots cannot get from the ground.", rationale:"They eat insects to supply a nutrient the soil lacks." },
        { q:"What can you infer about the bogs where they grow?", opts:["The soil there is short on key nutrients","The soil is the richest available","There are no insects there"], correct:0, evidence:"…some grow in bogs where the soil is poor in nitrogen.", rationale:"The plants' insect-eating adaptation reveals the bog soil is nutrient-poor." },
        { q:"Why might most plants NOT need to trap insects?", opts:["Their soil already supplies enough nutrients","They cannot move","Insects avoid them"], correct:0, evidence:"Plants normally draw nutrients from the soil…", rationale:"If normal soil provides nutrients, most plants don't need an alternative source." }
      ]},
      { title:"How Earthquakes Are Located", passage:"An earthquake sends out two main types of waves that travel at different speeds. By measuring the gap between when the faster and slower waves arrive, a single station can work out its distance from the quake. With readings from three or more stations, the exact location can be pinpointed.", questions:[
        { q:"How can one station estimate its distance from a quake?", opts:["From the time gap between the two wave types","By feeling how strong it is","By the colour of the waves"], correct:0, evidence:"By measuring the gap between when the faster and slower waves arrive…", rationale:"The arrival-time difference reveals the distance." },
        { q:"Why are three or more stations needed to find the exact spot?", opts:["Combining distances narrows it to one point","One station is unreliable","More stations are faster"], correct:0, evidence:"With readings from three or more stations, the exact location can be pinpointed.", rationale:"Several distance readings together intersect at the quake's location." },
        { q:"What can you infer about a station very close to a quake?", opts:["Its two waves would arrive close together","It would feel nothing","The waves would not reach it"], correct:0, evidence:"…the faster and slower waves arrive…", rationale:"A short distance gives the waves little time to separate, so they arrive nearly together." }
      ]},
      { title:"Why We Yawn", passage:"Scientists believe yawning may help cool the brain, which works best within a narrow temperature range. A wide yawn draws in cool air and increases blood flow, lowering the brain's temperature slightly. This may explain why people yawn more when tired, as a warm, weary brain needs cooling.", questions:[
        { q:"How might a yawn help the brain?", opts:["It cools the brain down slightly","It warms the brain up","It empties the lungs"], correct:0, evidence:"A wide yawn draws in cool air and increases blood flow, lowering the brain's temperature…", rationale:"The cooling effect is how yawning may aid the brain." },
        { q:"Why might tiredness trigger more yawning?", opts:["A weary brain may be warmer and need cooling","Tired people breathe less","Yawning causes tiredness"], correct:0, evidence:"…a warm, weary brain needs cooling.", rationale:"If tiredness warms the brain, yawning to cool it would increase." },
        { q:"What can you infer about the brain's ideal conditions?", opts:["It functions best at a steady temperature","It prefers to be very hot","Temperature doesn't affect it"], correct:0, evidence:"…the brain, which works best within a narrow temperature range.", rationale:"Needing cooling implies the brain performs best at a controlled temperature." }
      ]},
      { title:"How Bacteria Share Resistance", passage:"Bacteria can pass small rings of genetic material directly to one another, even between different species. If one bacterium carries a gene that resists a drug, it can hand that gene to its neighbours. This means resistance can spread through a population far faster than by reproduction alone.", questions:[
        { q:"Why can drug resistance spread so quickly among bacteria?", opts:["They share resistance genes directly with each other","They reproduce instantly","Drugs make them stronger"], correct:0, evidence:"…it can hand that gene to its neighbours.", rationale:"Direct gene-sharing spreads resistance faster than waiting for offspring." },
        { q:"What can you infer is concerning about sharing between species?", opts:["Resistance can jump to new kinds of bacteria","It cures the bacteria","It kills all bacteria"], correct:0, evidence:"…even between different species.", rationale:"Cross-species sharing means resistance can spread beyond one type of bacterium." },
        { q:"Why is gene-sharing faster than reproduction for spreading traits?", opts:["A gene can pass to many existing bacteria at once","Reproduction is forbidden","Genes reproduce by themselves"], correct:0, evidence:"…resistance can spread through a population far faster than by reproduction alone.", rationale:"Handing genes to existing neighbours skips the slower step of breeding new generations." }
      ]},
      { title:"Why Skyscrapers Sway", passage:"Very tall buildings are designed to bend slightly in strong winds rather than stand perfectly rigid. A structure that cannot flex would face enormous stress and might crack. Some skyscrapers contain a huge weight near the top that shifts to counter the sway, keeping the movement comfortable for the people inside.", questions:[
        { q:"Why are skyscrapers built to bend rather than stay rigid?", opts:["Flexing reduces stress that could crack them","Bending looks impressive","Rigid buildings are cheaper"], correct:0, evidence:"A structure that cannot flex would face enormous stress and might crack.", rationale:"Bending relieves the stress that rigidity would build up dangerously." },
        { q:"What does the huge weight near the top do?", opts:["It shifts to counter the building's sway","It adds extra height","It powers the lifts"], correct:0, evidence:"…a huge weight near the top that shifts to counter the sway…", rationale:"The weight moves opposite to the sway to cancel it out." },
        { q:"What can you infer about people inside a swaying skyscraper?", opts:["The design aims to keep the motion bearable for them","They never feel any movement","They must leave in wind"], correct:0, evidence:"…keeping the movement comfortable for the people inside.", rationale:"Designing for comfort implies the sway could otherwise be unpleasant for occupants." }
      ]},
      { title:"How Migratory Birds Find Their Way", passage:"Some birds travel thousands of miles between summer and winter homes, often returning to the exact same nesting site. Research suggests they navigate using a combination of the sun's position, the stars, and even the Earth's magnetic field, which they can sense. Young birds on their first journey rely partly on following experienced adults.", questions:[
        { q:"What can you infer about how birds navigate such long journeys?", opts:["They combine several different natural cues","They simply guess the direction","They follow roads"], correct:0, evidence:"…using a combination of the sun's position, the stars, and even the Earth's magnetic field…", rationale:"Relying on multiple cues together is how they find their way so precisely." },
        { q:"Why might young birds follow experienced adults?", opts:["They have not yet learned the route alone","Adults force them to","They cannot fly far"], correct:0, evidence:"Young birds on their first journey rely partly on following experienced adults.", rationale:"Following adults suggests the route is partly learned, not fully instinctive at first." },
        { q:"What does sensing the magnetic field suggest about these birds?", opts:["They have abilities humans lack","They carry compasses","They cannot see"], correct:0, evidence:"…the Earth's magnetic field, which they can sense.", rationale:"Sensing magnetism is a natural ability beyond human senses." }
      ]}
    ]

  6: {
    fiction: [
      { title:"The Curator's Choice", passage:"The museum's new director announced that the painting would finally be moved from the dim back corridor to the grand entrance hall. The elderly curator, who had quietly tended it for thirty years, said nothing — but that evening she was seen unscrewing the small brass plaque she had made herself, the one bearing a date and a single set of initials that matched her own. She slipped it into her pocket before the movers arrived.", questions:[
        { q:"What can you infer about the curator's connection to the painting?", opts:["It holds a deeply personal meaning for her","She dislikes the painting","She painted it for the museum"], correct:0, evidence:"…a single set of initials that matched her own.", rationale:"A self-made plaque with her own initials suggests a private, personal bond she's kept hidden for decades." },
        { q:"Why might she remove the plaque before the move?", opts:["She wishes to keep her connection private","The plaque is damaged","She is stealing the painting"], correct:0, evidence:"She slipped it into her pocket before the movers arrived.", rationale:"Quietly taking it before others arrive suggests she doesn't want her link to the work made public in the busy entrance hall." },
        { q:"What does her silence at the announcement most likely conceal?", opts:["Complicated feelings about the painting becoming public","Total indifference","Excitement she can't express"], correct:0, evidence:"The elderly curator… said nothing…", rationale:"Saying nothing while secretly acting on the plaque implies suppressed, conflicted emotion rather than indifference." }

      { title:"The Translator's Pause", passage:"During the tense negotiation, the translator rendered each side's words smoothly until one delegate made a sharp, insulting remark. The translator hesitated — a fraction longer than usual — then conveyed it as 'my colleague expresses strong reservations.' The meeting continued calmly. Later, the delegate who had been insulted thanked the translator warmly, unaware of what had truly been said.", questions:[

        { q:"Why might the meeting have 'continued calmly'?", opts:["The softened wording avoided provoking offence","Nobody was paying attention","The insult was actually a compliment"], correct:0, evidence:"The meeting continued calmly.", rationale:"Calm following the softened version implies the original blunt words would have inflamed things." },
        { q:"What is ironic about the insulted delegate's thanks?", opts:["He's grateful without knowing he was shielded from an insult","He knows exactly what happened","He is being sarcastic"], correct:0, evidence:"…unaware of what had truly been said.", rationale:"He thanks the translator for a courtesy he doesn't realise occurred — protection from an insult aimed at him." }
