      { title:"The Unspent Inheritance", passage:"Years after her aunt's death, Rosa still hadn't touched the considerable sum left to her, though her own flat was cramped and her car unreliable. The bank statements arrived monthly and went straight into a drawer, unopened. On the anniversary each year, she visited the small grave and stayed a long while, returning with reddened eyes and an envelope she never posted.", questions:[
        { q:"Why might Rosa leave the inheritance untouched despite needing money?", opts:["Spending it may feel like losing her aunt further","She forgot about it","The money isn't really hers"], correct:0, evidence:"…still hadn't touched the considerable sum… though her own flat was cramped…", rationale:"Refusing money she clearly needs suggests an emotional barrier — the money is tied to her grief." },
        { q:"What do the unopened statements suggest about her state of mind?", opts:["She avoids confronting anything connected to the loss","She is simply disorganised","She cannot read"], correct:0, evidence:"The bank statements arrived monthly and went straight into a drawer, unopened.", rationale:"Refusing even to open them points to avoidance of the painful subject, not mere untidiness." },
        { q:"What might the unposted envelope represent?", opts:["Grief she hasn't been able to express or release","A bill she forgot","A letter to the bank"], correct:0, evidence:"…returning with reddened eyes and an envelope she never posted.", rationale:"Tears at the grave and a letter never sent suggest unresolved feelings she can't yet let go of." }
      ]},
      { title:"The Apprentice's Masterpiece", passage:"When the young apprentice unveiled her finished violin, the old master examined it in silence for a long time, turning it over and over. The other apprentices waited for his usual stream of corrections. Instead, he set down his own tools — which he had not done for a single lesson in forty years — and asked, quietly, if she might teach him the technique she had used on the scroll.", questions:[
        { q:"What can you infer about the quality of the apprentice's violin?", opts:["It is exceptional, even by the master's standards","It is badly flawed","It is merely average"], correct:0, evidence:"…asked, quietly, if she might teach him the technique she had used…", rationale:"A master asking to learn from a student implies the work surpassed even his expertise." },
        { q:"Why is it significant that the master set down his tools?", opts:["It breaks a forty-year habit, marking a rare moment","He was tired","He had finished his own work"], correct:0, evidence:"…which he had not done for a single lesson in forty years…", rationale:"Breaking an unbroken forty-year habit signals the moment is extraordinary to him." },
        { q:"What does the other apprentices' expectation reveal by contrast?", opts:["The master normally criticises rather than praises","The master always praises freely","The apprentices expected applause"], correct:0, evidence:"The other apprentices waited for his usual stream of corrections.", rationale:"Their expectation of corrections shows his admiring response was highly unusual." }
      ]},
      { title:"The Reluctant Hero", passage:"After the rescue, reporters crowded around Dev, but he kept his cap low and gave only short answers before slipping away. He declined the medal ceremony, citing 'a prior commitment.' Yet a neighbour mentioned that Dev had spent that very afternoon sitting alone at the hospital bedside of the person he'd pulled from the river, holding their hand and saying nothing.", questions:[
        { q:"What can you infer about Dev's reason for avoiding the ceremony?", opts:["He cares more about the person than public recognition","He is afraid of crowds in general","He doesn't think the rescue happened"], correct:0, evidence:"…sitting alone at the hospital bedside of the person he'd pulled from the river…", rationale:"Choosing the bedside over the medal shows his priorities lie with the rescued person, not acclaim." },
        { q:"What does his 'prior commitment' turn out to be?", opts:["Being at the survivor's bedside","A business meeting","A holiday"], correct:0, evidence:"…Dev had spent that very afternoon sitting alone at the hospital bedside…", rationale:"The neighbour's account reveals the vague 'commitment' was the hospital visit." },
        { q:"What does keeping his cap low and giving short answers suggest?", opts:["He is uncomfortable with attention","He is hiding a crime","He is proud and boastful"], correct:0, evidence:"…he kept his cap low and gave only short answers before slipping away.", rationale:"Shrinking from the spotlight points to genuine discomfort with being celebrated." }
      ]},
      { title:"The Last Performance", passage:"The pianist played the familiar concerto flawlessly, yet those in the front row noticed her glance repeatedly at an empty seat in the second row — the same seat, they later learned, her late teacher had occupied at every concert for twenty years. At the final note, instead of bowing to the applause, she turned first toward that empty chair and inclined her head.", questions:[
        { q:"Why might the pianist keep glancing at the empty seat?", opts:["She associates it with her late teacher","She is looking for latecomers","She finds the audience distracting"], correct:0, evidence:"…the same seat… her late teacher had occupied at every concert for twenty years.", rationale:"The seat's history with her teacher explains why it draws her eyes during the performance." },
        { q:"What does her bow toward the empty chair signify?", opts:["A private tribute to her teacher","Confusion about where the audience is","A rehearsed part of the show"], correct:0, evidence:"…she turned first toward that empty chair and inclined her head.", rationale:"Bowing to the chair before the crowd is a gesture of gratitude to the absent teacher." },
        { q:"What can you infer about the teacher's importance to her?", opts:["The teacher profoundly shaped her career","The teacher was a stranger","She resented the teacher"], correct:0, evidence:"…inclined her head.", rationale:"Honouring the teacher before the applauding audience implies a deep, lasting influence." }
      ]},
      { title:"The Quiet Refusal", passage:"Offered a glittering promotion that would double his salary, Marcus asked only one question: whether it would require relocating away from the small town. Told that it would, he thanked the executives politely and declined. That weekend, he was seen as usual pushing his father's wheelchair along the seafront, the old man's face turned up to catch the sun.", questions:[
        { q:"What can you infer was behind Marcus's refusal?", opts:["He stays to care for his father","He dislikes more money","He fears new challenges"], correct:0, evidence:"…pushing his father's wheelchair along the seafront…", rationale:"His weekend devotion to his father suggests staying near him outweighed the promotion." },
        { q:"Why might Marcus have asked specifically about relocating?", opts:["Leaving the town was his real concern","He wanted a bigger office","He was curious about the city"], correct:0, evidence:"…whether it would require relocating away from the small town.", rationale:"Singling out that one question shows relocation was the deciding factor for him." },
        { q:"What does the contrast between the salary and his choice reveal?", opts:["He values his father's care over wealth","He doesn't understand money","He expects a better offer"], correct:0, evidence:"…declined.", rationale:"Turning down double pay for family duty shows where his true priorities lie." }
      ]},
      { title:"The Misdirected Praise", passage:"At the awards dinner, the chairman lavished praise on the head of department for the project's success, and the room applauded. Throughout the speech, the head of department's eyes kept drifting to a junior analyst seated near the back, whose name was never mentioned. When the applause died down, the head quietly left her own seat, crossed the room, and placed the trophy on the junior's table.", questions:[
        { q:"What can you infer about who truly drove the project's success?", opts:["The unnamed junior analyst","The chairman","The head of department alone"], correct:0, evidence:"…placed the trophy on the junior's table.", rationale:"Giving the trophy to the junior implies the head believes that person deserved the credit." },
        { q:"Why might the head's eyes keep drifting to the back during the speech?", opts:["She feels the praise belongs to someone there","She is bored","She is looking for the exit"], correct:0, evidence:"…the head of department's eyes kept drifting to a junior analyst…whose name was never mentioned.", rationale:"Watching the unacknowledged junior during the praise hints she knows the credit is misdirected." },
        { q:"What does the head's action reveal about her character?", opts:["She is fair and willing to redirect undeserved credit","She is jealous of the junior","She dislikes trophies"], correct:0, evidence:"…crossed the room, and placed the trophy on the junior's table.", rationale:"Publicly passing on the honour shows integrity and fairness." }
      ]},
      { title:"The Empty Frame", passage:"In the hallway of family portraits, one frame had hung empty for as long as the children could remember. Their grandmother dusted it as carefully as the others and would adjust it if it tilted, yet she never explained whose picture had once been there. When pressed, she only said, 'Some people we keep in a different way,' and changed the subject with a brightness that ended all questions.", questions:[
        { q:"What can you infer about the empty frame?", opts:["It marks someone significant who is absent or lost","It was never meant to hold a picture","The grandmother forgot to fill it"], correct:0, evidence:"'Some people we keep in a different way…'", rationale:"Her cryptic remark suggests the frame honours someone she remembers privately rather than displays." },
        { q:"Why does she care for the empty frame as much as the others?", opts:["The absent person still matters deeply to her","She is simply tidy","The frame is valuable"], correct:0, evidence:"Their grandmother dusted it as carefully as the others…", rationale:"Tending an empty frame with equal care shows the missing person remains important to her." },
        { q:"What does her practised brightness when 'pressed' suggest?", opts:["The subject is painful and she deflects it","She enjoys the questions","She has nothing to hide"], correct:0, evidence:"…changed the subject with a brightness that ended all questions.", rationale:"A bright deflection that shuts down questions is a familiar sign of avoiding something painful." }

      { title:"The Honest Mistake", passage:"The shopkeeper realised at closing time that she had given a customer too much change — nearly a week's takings — by misreading a note. She had no way to trace him. The next morning, before opening, the same man was waiting at the door, holding out the exact surplus. 'You looked tired last night,' he said. 'I counted it twice on the bus and couldn't keep what wasn't mine.'", questions:[

        { q:"Why might he mention that she 'looked tired'?", opts:["He understands her mistake was human and forgivable","He is criticising her","He wants her to feel guilty"], correct:0, evidence:"'You looked tired last night,' he said.", rationale:"Noting her tiredness frames the error with empathy rather than blame." },

      { title:"The Veteran's Garden", passage:"Mr Achterberg grew a single row of red poppies along his fence and tended them with unusual devotion, though he grew nothing else. Each November he cut exactly as many blooms as there were names on a worn list he kept folded in his wallet, and laid them at the war memorial before dawn, when no one was about. He never attended the public ceremony held later that day.", questions:[

      ]},
      { title:"The Withheld Diagnosis", passage:"The doctor's voice was warm and measured as she explained the test results to the family, choosing her words with visible care and pausing often. The patient's daughter noticed that the doctor mentioned 'options to keep you comfortable' but never once used the word 'cure.' On the way out, the daughter saw the doctor stop in the corridor, take a slow breath, and compose her face before entering the next room.", questions:[
        { q:"What can the daughter most likely infer from the doctor's word choice?", opts:["The news is grave, even if gently delivered","The patient will fully recover","The tests were inconclusive"], correct:0, evidence:"…mentioned 'options to keep you comfortable' but never once used the word 'cure.'", rationale:"Speaking of comfort but never cure implies the illness cannot be cured." },
        { q:"Why might the doctor pause and compose herself in the corridor?", opts:["Delivering such news is emotionally taxing","She forgot the next patient's name","She is checking her appearance"], correct:0, evidence:"…take a slow breath, and compose her face before entering the next room.", rationale:"Steadying herself between rooms suggests the conversations weigh on her emotionally." },
        { q:"What does the doctor's careful, measured delivery suggest about her?", opts:["She is trying to be compassionate with hard news","She is unsure of the results","She is in a hurry"], correct:0, evidence:"…choosing her words with visible care and pausing often.", rationale:"Careful, gentle pacing reflects an effort to soften a painful truth with compassion." }
      ]},
      { title:"The Returned Manuscript", passage:"For two decades the publisher had rejected the novelist's submissions with the same printed slip. When her final manuscript arrived posthumously, sent by her daughter, the same editor read it overnight and wept. He wrote back at once offering to publish it — then noticed the date on the covering letter and set down his pen, the office very quiet around him.", questions:[
        { q:"Why might the editor have set down his pen after noticing the date?", opts:["He realised his acceptance had come too late","He forgot what he was writing","He decided to reject it"], correct:0, evidence:"When her final manuscript arrived posthumously…", rationale:"The manuscript came after her death, so his offer can never reach her — the date drives this home." },
        { q:"What can you infer about the manuscript's quality?", opts:["It was far better than he'd long assumed her work to be","It was as poor as the earlier ones","It was unfinished"], correct:0, evidence:"…the same editor read it overnight and wept.", rationale:"Reading it in one sitting and weeping shows it moved him deeply, unlike the work he'd dismissed for years." },
        { q:"What does the long history of identical rejection slips suggest?", opts:["Her talent went unrecognised for most of her life","She rarely submitted work","The editor loved her writing"], correct:0, evidence:"…the publisher had rejected the novelist's submissions with the same printed slip.", rationale:"Twenty years of form rejections imply her ability was overlooked until it was too late." }
      ]},
      { title:"The Substitute's Lesson", passage:"The substitute teacher was warned that the class had driven off three teachers that term. She entered, said nothing about the rumours, and simply began sketching a complex bridge on the board, asking which student thought they could explain why it didn't collapse. By the end of the hour, the loudest troublemaker was at the front, chalk in hand, arguing about forces while the others leaned in.", questions:[
        { q:"What can you infer about the substitute's strategy?", opts:["She won the class over through engagement rather than confrontation","She frightened them into silence","She ignored the lesson entirely"], correct:0, evidence:"…simply began sketching a complex bridge… asking which student thought they could explain…", rationale:"Drawing them into a problem instead of addressing the rumours shows she chose curiosity over conflict." },
        { q:"What does the troublemaker's change reveal?", opts:["His disruptiveness may have come from boredom, not malice","He was never really difficult","He disliked the lesson"], correct:0, evidence:"…the loudest troublemaker was at the front, chalk in hand, arguing about forces…", rationale:"His eager involvement once engaged suggests his earlier behaviour stemmed from a lack of stimulation." },
        { q:"Why might she have said nothing about the rumours?", opts:["She refused to let the class's reputation define the lesson","She hadn't heard them","She was too nervous to speak"], correct:0, evidence:"She entered, said nothing about the rumours…", rationale:"Ignoring the reputation lets her start fresh rather than confirm the class's expectations of conflict." }
      ]},
      { title:"The Collector's Confession", passage:"The famous collector was admired for owning a rare painting that scholars had long sought. On his deathbed, he asked that the canvas be examined by an expert before being donated. The expert found, beneath the surface, the faint signature of the collector himself — and a much earlier date than the work was supposed to bear.", questions:[
        { q:"What can you infer the painting most likely is?", opts:["A forgery the collector painted himself","An authentic masterpiece","A copy made by a scholar"], correct:0, evidence:"…the faint signature of the collector himself — and a much earlier date…", rationale:"His own hidden signature on the supposedly rare work strongly implies he forged it." },
        { q:"Why might he have asked for it to be examined before donation?", opts:["He wanted the truth revealed rather than deceive forever","He doubted the experts","He wanted to raise its price"], correct:0, evidence:"On his deathbed, he asked that the canvas be examined by an expert…", rationale:"Requesting scrutiny at the end suggests a wish to confess the deception before it was given away." },
        { q:"What does the hidden signature suggest about his decades of fame?", opts:["His celebrated reputation rested on a deception","His skill was genuine and recognised","He never cared for the painting"], correct:0, evidence:"The famous collector was admired for owning a rare painting…", rationale:"If the prized work was his own forgery, the admiration he enjoyed was founded on a lie." }
      ]},
      { title:"The Final Move", passage:"The two old rivals met for their weekly chess game as they had for forty years, though now one arrived in a wheelchair and the other's hands trembled too much to move the pieces cleanly. Neither kept score anymore. When one of them quietly knocked over his own king mid-game, the other simply reset the board without a word, and they began again.", questions:[
        { q:"What can you infer about why neither keeps score anymore?", opts:["The companionship now matters more than winning","They have forgotten the rules","They both always lose"], correct:0, evidence:"Neither kept score anymore.", rationale:"Abandoning the score after forty years of rivalry suggests the friendship has eclipsed competition." },
        { q:"Why might one player knock over his own king and the other reset without comment?", opts:["They prefer to keep playing rather than let a game end","He resigned in anger","They are cheating"], correct:0, evidence:"…the other simply reset the board without a word, and they began again.", rationale:"Quietly restarting rather than ending suggests they value continuing together over the result." },
        { q:"What does the passage imply about the rivals' relationship now?", opts:["Their rivalry has softened into deep companionship","They still bitterly compete","They barely tolerate each other"], correct:0, evidence:"…as they had for forty years…", rationale:"Decades of weekly games, now played without scores, point to a bond that has outgrown rivalry." }
      ]},
      { title:"The Quiet Donation", passage:"The town's library was saved from closure by an anonymous gift that arrived just before the deadline. The librarian noticed the cheque was drawn on the account of the gruff old man who came every day to read the newspapers for free and had once been heard muttering that the building was 'the only warm place that never asked him for anything.' She told no one.", questions:[
        { q:"What can you infer about the old man's circumstances?", opts:["He may have little, yet gave generously","He is secretly very poor and gave nothing","He dislikes the library"], correct:0, evidence:"…'the only warm place that never asked him for anything.'", rationale:"Valuing it as a free, warm refuge hints at hardship, making his gift all the more striking." },
        { q:"Why might the librarian tell no one?", opts:["She respects his wish to remain anonymous","She wants the credit herself","She doubts the cheque is real"], correct:0, evidence:"…an anonymous gift… She told no one.", rationale:"He gave anonymously, so keeping his secret honours his clear preference for privacy." },
        { q:"What does his daily free visit, contrasted with his gift, reveal?", opts:["The library meant far more to him than anyone realised","He was wasting his time there","He resented paying for nothing"], correct:0, evidence:"…the gruff old man who came every day to read the newspapers for free…", rationale:"A man who used it freely repaying it so generously shows a deep, hidden attachment." }
      ]},
      { title:"The Interpreter of Silence", passage:"At the family gathering, everyone praised how well Grandmother seemed since Grandfather's passing — how she laughed and bustled about with trays of food. Only the youngest grandchild noticed that she had set two cups of tea, and that she paused each time she passed the empty armchair, resting her hand briefly on its worn arm before moving on.", questions:[
        { q:"What can you infer about Grandmother's true state?", opts:["She is grieving beneath her cheerful surface","She has fully recovered and moved on","She has forgotten her husband died"], correct:0, evidence:"…she had set two cups of tea, and that she paused each time she passed the empty armchair…", rationale:"The extra cup and the touch on his chair reveal private grief her busyness conceals." },
        { q:"Why might only the youngest grandchild notice?", opts:["The small, quiet signs escape those who see only her cheerful front","Children invent stories","The others weren't there"], correct:0, evidence:"Only the youngest grandchild noticed…", rationale:"The others accept the surface cheer, while the child catches the subtle, telling details." },
        { q:"What does resting her hand on the empty chair suggest?", opts:["A tender, habitual gesture toward her late husband","She is checking the chair for dust","She is tired and needs support"], correct:0, evidence:"…resting her hand briefly on its worn arm before moving on.", rationale:"A gentle, repeated touch on his chair reads as quiet remembrance rather than a practical act." }
      ]},
      { title:"The Withdrawn Application", passage:"The brilliant student had been the clear favourite to win the national scholarship, and her teachers were baffled when she withdrew her application days before the deadline. She gave no reason. That same week, her younger brother's name appeared on the list for an expensive specialist treatment, and the family's car, always polished, was quietly sold.", questions:[
        { q:"What can you infer about why the student withdrew?", opts:["The family needed resources for her brother's treatment","She no longer wanted to study","She expected to lose"], correct:0, evidence:"…her younger brother's name appeared on the list for an expensive specialist treatment…", rationale:"The timing links her withdrawal to the family's sudden need to fund the treatment." },
        { q:"What does the quiet sale of the prized car suggest?", opts:["The family is raising money urgently","They wanted a newer car","They no longer drive"], correct:0, evidence:"…the family's car, always polished, was quietly sold.", rationale:"Selling a clearly cherished car points to an urgent need for funds." },
        { q:"Why might she have given no reason for withdrawing?", opts:["She chose not to burden others with the family's private struggle","She was forbidden to explain","She had simply changed her mind"], correct:0, evidence:"She gave no reason.", rationale:"Staying silent amid a private hardship suggests she preferred not to share the painful circumstances." }
      ]},
      { title:"The Returning Soldier", passage:"When the soldier came home, the whole street had hung banners, but he walked past them with his eyes down and went straight inside. His mother found him later sitting in the dark kitchen, still in his coat, turning a small photograph over and over in his hands. When she switched on the light, he flinched, and she switched it off again without a word.", questions:[
        { q:"What can you infer about the soldier's state of mind?", opts:["He is troubled by what he has experienced","He is delighted to be celebrated","He is simply tired from travel"], correct:0, evidence:"…sitting in the dark kitchen, still in his coat, turning a small photograph over and over…", rationale:"Sitting alone in the dark, fixated on a photo, suggests he is haunted rather than relieved." },
        { q:"Why might he have walked past the banners with his eyes down?", opts:["He cannot share the street's celebratory mood","He didn't see them","He was looking for someone"], correct:0, evidence:"…he walked past them with his eyes down and went straight inside.", rationale:"Avoiding the celebration implies the homecoming feels far heavier to him than to those cheering." },
        { q:"Why might his mother switch off the light without a word?", opts:["She senses he needs gentleness, not questions","She wants to save electricity","She is angry with him"], correct:0, evidence:"…he flinched, and she switched it off again without a word.", rationale:"Responding to his flinch by quietly restoring the dark shows wordless understanding of his fragile state." }
      ]}
    ],
    nonfiction: [
      { title:"Why Correlation Is Not Causation", passage:"Researchers noticed that towns with more ice cream sales also had more drowning incidents, and some wondered whether ice cream was to blame. In fact, both rise in hot summer weather: heat drives people to buy ice cream and, separately, to swim. The weather is the hidden cause linking two things that have no direct effect on each other.", questions:[
        { q:"Why is it a mistake to blame ice cream for drownings?", opts:["A third factor, hot weather, causes both","Ice cream is harmless to eat","Drowning causes ice cream sales"], correct:0, evidence:"…both rise in hot summer weather…", rationale:"The shared cause of heat explains both trends without one causing the other." },
        { q:"What does this example warn us about when two things rise together?", opts:["They may share a hidden common cause rather than be linked","One must always cause the other","The link is always real"], correct:0, evidence:"The weather is the hidden cause linking two things that have no direct effect on each other.", rationale:"It shows that a correlation can come from a third factor, not a direct cause." },
        { q:"What can you infer would happen to both figures in a cold summer?", opts:["Both would likely fall together","Only drownings would rise","Ice cream sales alone would rise"], correct:0, evidence:"…heat drives people to buy ice cream and, separately, to swim.", rationale:"If heat drives both up, the absence of heat would bring both down together." }
      ]},
      { title:"How Survivorship Bias Misleads", passage:"In wartime, engineers studied returning aircraft to decide where to add armour, marking the spots most riddled with bullet holes. One analyst argued the opposite: armour should go where the returning planes showed no damage. Planes hit in those untouched areas, he reasoned, were the ones that never made it back to be studied.", questions:[
        { q:"Why did the analyst suggest armouring the undamaged areas?", opts:["Hits there likely destroyed the missing planes","Those areas were weakest","The damaged areas were unimportant"], correct:0, evidence:"Planes hit in those untouched areas… were the ones that never made it back…", rationale:"Surviving planes lacked damage there because such hits were fatal, so those spots need protection." },
        { q:"What flaw lies in only studying the planes that returned?", opts:["The most damaging hits are invisible in the survivors","Returning planes are unrepresentative of all","Both of these"], correct:2, evidence:"…the ones that never made it back to be studied.", rationale:"The survivors are a biased sample, hiding exactly the hits that proved fatal." },
        { q:"What broader lesson can you infer from this story?", opts:["Missing data can be as telling as the data you have","Always trust the visible evidence","Bullet holes mark weak points"], correct:0, evidence:"…were the ones that never made it back to be studied.", rationale:"The reasoning hinges on what's absent, showing missing cases can reshape a conclusion." }
      ]},
      { title:"Why Antibiotic Resistance Spreads", passage:"Each time antibiotics are used, the most vulnerable bacteria die quickly, but any with a chance mutation that resists the drug survive and multiply. Over many treatments, resistant strains come to dominate. Using antibiotics when they aren't needed, such as for viral infections they cannot treat, accelerates this process without any benefit.", questions:[
        { q:"Why does antibiotic use favour resistant bacteria?", opts:["It clears the vulnerable ones, leaving the resistant to multiply","It mutates the bacteria directly","It feeds the bacteria"], correct:0, evidence:"…the most vulnerable bacteria die quickly, but any with a chance mutation that resists the drug survive…", rationale:"Removing the vulnerable bacteria gives the resistant survivors room to dominate." },
        { q:"Why is taking antibiotics for a viral infection especially unwise?", opts:["It breeds resistance while doing no good","Viruses become stronger","It cures the virus faster"], correct:0, evidence:"…for viral infections they cannot treat, accelerates this process without any benefit.", rationale:"It drives resistance yet offers no cure, since antibiotics don't work on viruses." },
        { q:"What can you infer would slow the rise of resistance?", opts:["Using antibiotics only when truly necessary","Using them as often as possible","Mixing many antibiotics always"], correct:0, evidence:"Using antibiotics when they aren't needed… accelerates this process…", rationale:"If unnecessary use speeds resistance, careful, limited use would slow it." }
      ]},
      { title:"How Tree Rings Reveal Climate", passage:"A tree adds one ring of growth each year, and the width of each ring depends on the conditions that year. In warm, wet years the tree grows fast, producing wide rings; in cold or dry years the rings are narrow. By examining rings in very old trees and ancient timber, scientists can reconstruct climate patterns stretching back thousands of years.", questions:[
        { q:"What can a wide tree ring tell a scientist?", opts:["That year had favourable growing conditions","That year was harsh","The tree was injured"], correct:0, evidence:"In warm, wet years the tree grows fast, producing wide rings…", rationale:"Wide rings correspond to warm, wet, growth-friendly years." },
        { q:"How can scientists study climate from before records began?", opts:["By reading rings in ancient trees and timber","By guessing","By measuring modern temperatures"], correct:0, evidence:"…scientists can reconstruct climate patterns stretching back thousands of years.", rationale:"Old wood preserves a year-by-year record long predating written measurements." },
        { q:"What can you infer about a series of unusually narrow rings?", opts:["A run of cold or dry years","A period of rapid growth","Years of heavy rainfall"], correct:0, evidence:"…in cold or dry years the rings are narrow.", rationale:"Several narrow rings in a row would indicate a stretch of poor, harsh conditions." }
      ]},
      { title:"Why Placebos Can Work", passage:"In drug trials, some patients are given a dummy pill with no active ingredient, yet a number of them genuinely improve. This 'placebo effect' shows that a patient's expectation of getting better can trigger real changes in the body. To prove a new drug truly works, its results must be measured against this placebo response, not against no treatment at all.", questions:[
        { q:"Why must a new drug be tested against a placebo, not nothing?", opts:["Some improvement may come from expectation alone","Placebos are cheaper","Patients prefer pills"], correct:0, evidence:"…its results must be measured against this placebo response…", rationale:"Only by subtracting the placebo effect can the drug's true benefit be seen." },
        { q:"What does the placebo effect reveal about the mind and body?", opts:["Expectation can produce real physical change","The body ignores the mind","Dummy pills contain medicine"], correct:0, evidence:"…a patient's expectation of getting better can trigger real changes in the body.", rationale:"Real improvement from a dummy pill shows the mind can influence the body." },
        { q:"What can you infer if a drug performs no better than the placebo?", opts:["Its benefit may be due to expectation, not the drug","It is definitely effective","The placebo was faulty"], correct:0, evidence:"To prove a new drug truly works, its results must be measured against this placebo response…", rationale:"Matching the placebo means the drug adds nothing beyond expectation." }
      ]},
      { title:"How Keystone Species Shape Habitats", passage:"Sea otters feed heavily on sea urchins, which in turn graze on kelp forests. Where otters were hunted to near extinction, urchin numbers soared and stripped the kelp bare, destroying habitat for countless other species. The otter, though not the most numerous animal, holds the whole system together — a 'keystone species.'", questions:[
        { q:"Why did kelp forests collapse when otters disappeared?", opts:["Unchecked urchins grazed the kelp away","Otters ate the kelp","The water grew too warm"], correct:0, evidence:"…urchin numbers soared and stripped the kelp bare…", rationale:"Without otters to control them, urchins multiplied and destroyed the kelp." },
        { q:"What does 'keystone species' imply about the otter's importance?", opts:["Its influence far outweighs its numbers","It is the most common animal","It lives apart from the system"], correct:0, evidence:"…though not the most numerous animal, holds the whole system together…", rationale:"The term marks a species whose role is critical despite modest numbers." },
        { q:"What can you infer would help the kelp forests recover?", opts:["Restoring the otter population","Removing all urchins by hand","Adding more kelp seeds only"], correct:0, evidence:"The otter… holds the whole system together…", rationale:"Since otters control the urchins that destroy kelp, their return would let kelp recover." }
      ]},
      { title:"Why Eyewitnesses Can Be Unreliable", passage:"Memory does not work like a video recording; instead, the brain reconstructs events each time we recall them, filling gaps with assumptions. Studies show that the wording of a question can reshape a witness's memory — asking how fast cars were going when they 'smashed' yields higher estimates than 'hit.' Confident witnesses are not necessarily accurate ones.", questions:[
        { q:"Why can a question's wording change a witness's memory?", opts:["The brain reconstructs memory and absorbs suggestions","Witnesses lie deliberately","Memories never change"], correct:0, evidence:"…the brain reconstructs events each time we recall them, filling gaps with assumptions.", rationale:"Because memory is rebuilt, suggestive wording can be woven into the recollection." },
        { q:"What can you infer about a very confident witness?", opts:["Confidence does not guarantee accuracy","They are always right","They are always wrong"], correct:0, evidence:"Confident witnesses are not necessarily accurate ones.", rationale:"The passage directly warns that confidence and accuracy are not the same." },
        { q:"Why might the word 'smashed' produce higher speed estimates than 'hit'?", opts:["It suggests greater force, reshaping the memory","It is louder to say","It is a longer word"], correct:0, evidence:"…'smashed' yields higher estimates than 'hit.'", rationale:"The more violent word plants an impression of greater speed and impact." }
      ]},
      { title:"How Compound Interest Grows", passage:"When money earns interest, that interest can itself earn further interest in later periods. Early on, the growth seems modest, but because each gain is added to the total that earns the next gain, the amount accelerates over time. This is why starting to save even a small amount early can outpace saving a larger amount much later.", questions:[
        { q:"Why does compound growth accelerate over time?", opts:["Each gain enlarges the base that earns the next gain","Interest rates always rise","Money multiplies randomly"], correct:0, evidence:"…each gain is added to the total that earns the next gain…", rationale:"Growing the base means each round earns more than the last, speeding up." },
        { q:"Why can saving a small amount early beat saving more later?", opts:["The early money has more time to compound","Small amounts earn higher rates","Later saving earns nothing"], correct:0, evidence:"…starting to save even a small amount early can outpace saving a larger amount much later.", rationale:"More time lets compounding work longer, overcoming a larger but later sum." },
        { q:"What can you infer about why early growth 'seems modest'?", opts:["The base is still small, so gains are small at first","Interest hasn't started yet","The money is losing value"], correct:0, evidence:"Early on, the growth seems modest…", rationale:"With a small starting total, the first gains are small before compounding builds momentum." }
      ]},
      { title:"Why Vaccines Need Boosters", passage:"After a first vaccination, the body's protection can fade over months or years as the number of defensive cells gradually declines. A booster dose re-exposes the immune system to the threat, prompting it to rebuild and even strengthen its defences. This is why some vaccines require several doses spaced out over time.", questions:[
        { q:"Why does protection from a single vaccine dose fade?", opts:["Defensive cells gradually decline over time","The germ becomes stronger","The vaccine was faulty"], correct:0, evidence:"…the number of defensive cells gradually declines.", rationale:"Fading protection follows the natural decline of the body's defensive cells." },
        { q:"How does a booster restore protection?", opts:["It re-exposes the immune system, rebuilding defences","It replaces the blood","It removes old cells"], correct:0, evidence:"A booster dose re-exposes the immune system to the threat, prompting it to rebuild…", rationale:"The booster reactivates the defences so they regrow and strengthen." },
        { q:"What can you infer about diseases needing several spaced doses?", opts:["One dose alone gives incomplete or temporary protection","One dose is always enough","Boosters cause the disease"], correct:0, evidence:"…some vaccines require several doses spaced out over time.", rationale:"Requiring multiple doses implies a single dose doesn't provide lasting full protection." }
      ]},
      { title:"How Selection Pressure Drives Adaptation", passage:"On an island where the only seeds available became larger and tougher during a drought, finches with bigger, stronger beaks were more likely to crack them and survive. These birds passed their beak traits to their offspring. Within a few generations, the average beak size in the population had measurably increased.", questions:[
        { q:"Why did big-beaked finches survive the drought better?", opts:["They could crack the larger, tougher seeds","They needed less food","They could fly further"], correct:0, evidence:"…finches with bigger, stronger beaks were more likely to crack them and survive.", rationale:"Bigger beaks suited the harder seeds, giving those birds an edge." },
        { q:"Why did average beak size increase over generations?", opts:["Survivors passed bigger-beak traits to their young","Beaks grow throughout life","The birds chose to grow them"], correct:0, evidence:"These birds passed their beak traits to their offspring.", rationale:"Because survivors bred, their advantageous trait spread through the population." },
        { q:"What can you infer might happen if wetter years returned smaller seeds?", opts:["Selection could favour smaller beaks again","Beaks would keep growing forever","All finches would die"], correct:0, evidence:"…the only seeds available became larger and tougher during a drought…", rationale:"If conditions reversed, the advantage could shift, favouring different beaks." }
      ]},
      { title:"Why Feedback Can Stabilise or Destabilise", passage:"In a system with negative feedback, a change triggers a response that pushes back toward balance — like a thermostat switching off the heating once a room is warm enough. In positive feedback, a change triggers a response that amplifies it further, as when melting ice exposes dark ground that absorbs more heat and melts still more ice.", questions:[
        { q:"How does negative feedback keep a system stable?", opts:["It opposes change and restores balance","It speeds up every change","It ignores all change"], correct:0, evidence:"…a change triggers a response that pushes back toward balance…", rationale:"Counteracting change is what holds the system steady." },
        { q:"Why is the melting-ice example a case of positive feedback?", opts:["The change feeds on itself and grows","It restores the original state","It has no effect"], correct:0, evidence:"…melting ice exposes dark ground that absorbs more heat and melts still more ice.", rationale:"Each step amplifies the next, the hallmark of positive feedback." },
        { q:"What can you infer is risky about positive feedback in a climate system?", opts:["It can drive runaway change hard to reverse","It always returns to balance","It cools the planet"], correct:0, evidence:"…a response that amplifies it further…", rationale:"Self-amplifying change can accelerate beyond easy control." }
      ]},
      { title:"How Statistics Can Mislead with Averages", passage:"A report stated that the average income on a small street was very high, suggesting a wealthy neighbourhood. In reality, all but one household earned modest wages, while a single resident was a millionaire whose vast income pulled the average up. The 'typical' household was far poorer than the average implied.", questions:[
        { q:"Why was the high average income misleading here?", opts:["One extreme value distorted the average","Everyone was genuinely wealthy","The figures were invented"], correct:0, evidence:"…a single resident was a millionaire whose vast income pulled the average up.", rationale:"One huge income skewed the average above what most households earned." },
        { q:"What can you infer would better describe a 'typical' household?", opts:["A measure less affected by extreme values","The same average","The millionaire's income"], correct:0, evidence:"The 'typical' household was far poorer than the average implied.", rationale:"Since the average misleads, a measure resistant to outliers would represent the typical case better." },
        { q:"What lesson does this example teach about averages?", opts:["An average can hide an uneven spread","Averages are always accurate","Higher averages mean fairness"], correct:0, evidence:"In reality, all but one household earned modest wages…", rationale:"The gap between the average and reality shows averages can mask how unevenly things are spread." }
      ]},
      { title:"Why Sample Size Matters", passage:"A small survey of ten people found that 70 percent preferred a new product, and the company rushed it to market. A later survey of ten thousand people showed only 40 percent preferred it. With very few people, a handful of unusual responses can swing the result wildly, whereas a large sample tends to reflect the wider population more reliably.", questions:[
        { q:"Why did the two surveys reach such different conclusions?", opts:["The small sample was easily skewed by a few responses","People changed their minds","The product itself changed"], correct:0, evidence:"With very few people, a handful of unusual responses can swing the result wildly…", rationale:"A tiny sample is unstable, so a few atypical answers distorted the first result." },
        { q:"What can you infer about which survey to trust more?", opts:["The larger one, as it better reflects the population","The smaller one, as it was first","Neither, as surveys are useless"], correct:0, evidence:"…a large sample tends to reflect the wider population more reliably.", rationale:"The passage indicates larger samples give more dependable results." },
        { q:"What mistake did the company make?", opts:["Acting on too little evidence","Surveying too many people","Ignoring the larger survey"], correct:0, evidence:"A small survey of ten people… and the company rushed it to market.", rationale:"Rushing to act on just ten responses meant relying on an unreliable sample." }
      ]},
      { title:"How Herd Behaviour Forms Bubbles", passage:"When the price of an asset begins to rise, some investors buy simply because others are buying, expecting to sell later at a profit. This demand pushes prices higher still, drawing in yet more buyers in a self-feeding spiral detached from the asset's real value. Eventually confidence cracks, everyone tries to sell at once, and the price collapses.", questions:[
        { q:"Why do prices rise far beyond an asset's real value in a bubble?", opts:["Buying driven by others' buying feeds on itself","The asset genuinely improves","Sellers vanish permanently"], correct:0, evidence:"This demand pushes prices higher still, drawing in yet more buyers in a self-feeding spiral…", rationale:"The self-reinforcing buying detaches the price from real worth." },
        { q:"What can you infer triggers the collapse?", opts:["Confidence breaks and the crowd reverses at once","Prices rise forever","The asset is destroyed"], correct:0, evidence:"Eventually confidence cracks, everyone tries to sell at once, and the price collapses.", rationale:"The same herd behaviour reverses, causing a sudden crash." },
        { q:"What does this reveal about prices in a bubble?", opts:["They reflect crowd psychology more than true value","They are always accurate","They are set by the asset itself"], correct:0, evidence:"…a self-feeding spiral detached from the asset's real value.", rationale:"Prices driven by herd buying track sentiment, not the asset's actual worth." }
      ]},
      { title:"Why Diseases Jump From Animals to Humans", passage:"Many new human diseases originate in animals and only later infect people. When humans clear forests and crowd closer to wildlife, the chances of contact — and of a germ adapting to a human host — increase. Once a germ can pass between people, a local outbreak can spread rapidly through travel into a global one.", questions:[
        { q:"Why does clearing forests raise the risk of new diseases?", opts:["It brings humans into closer contact with wildlife","It kills all the germs","It cools the climate"], correct:0, evidence:"…humans clear forests and crowd closer to wildlife, the chances of contact… increase.", rationale:"More contact with animals gives germs more opportunities to cross to humans." },
        { q:"What can you infer turns a local outbreak into a global one?", opts:["The germ spreading between people, carried by travel","The germ getting weaker","Animals migrating"], correct:0, evidence:"Once a germ can pass between people, a local outbreak can spread rapidly through travel…", rationale:"Human-to-human spread plus travel is what scales an outbreak globally." },
        { q:"Why might a germ need to 'adapt' to a human host?", opts:["It originally evolved to live in animals, not people","Humans are immune to all germs","Germs prefer forests"], correct:0, evidence:"Many new human diseases originate in animals…", rationale:"Coming from animals, a germ must change to thrive in the unfamiliar human body." }
      ]},
      { title:"How the Brain Fills in Gaps", passage:"Each eye has a blind spot where the optic nerve leaves the retina, yet we never notice a hole in our vision. The brain seamlessly fills the gap using the surrounding image and information from the other eye. This same gap-filling helps us read messy handwriting, but it can also make us 'see' things that aren't actually there.", questions:[
        { q:"Why don't we notice the blind spot in our vision?", opts:["The brain fills it in using nearby information","The blind spot is tiny","We close one eye"], correct:0, evidence:"The brain seamlessly fills the gap using the surrounding image…", rationale:"The brain patches the gap so smoothly that we remain unaware of it." },
        { q:"What can you infer is a downside of this gap-filling?", opts:["It can make us perceive things that aren't real","It slows our reading","It damages the retina"], correct:0, evidence:"…it can also make us 'see' things that aren't actually there.", rationale:"The same process that helps can also generate false perceptions." },
        { q:"How does gap-filling help with messy handwriting?", opts:["The brain infers unclear letters from context","It sharpens our eyesight","It rewrites the words"], correct:0, evidence:"This same gap-filling helps us read messy handwriting…", rationale:"The brain uses surrounding clues to reconstruct what unclear marks must be." }
      ]},
      { title:"Why Monocultures Are Vulnerable", passage:"A field planted with a single crop variety can be highly productive, but if all the plants are genetically identical, a disease that harms one can sweep through the entire field. Historically, farms relying on a single variety have suffered devastating failures when a new blight arrived. Planting diverse varieties spreads the risk.", questions:[
        { q:"Why can one disease wipe out an entire monoculture?", opts:["Identical plants share the same vulnerability","The plants are too far apart","Disease prefers large fields"], correct:0, evidence:"…if all the plants are genetically identical, a disease that harms one can sweep through the entire field.", rationale:"Genetic sameness means a weakness in one plant exists in them all." },
        { q:"Why does planting diverse varieties reduce risk?", opts:["A disease is unlikely to harm every different variety","Diverse crops grow faster","It confuses the farmers"], correct:0, evidence:"Planting diverse varieties spreads the risk.", rationale:"Variety means some plants will likely resist any given disease." },
        { q:"What can you infer is a trade-off of monoculture?", opts:["High productivity comes with high vulnerability","It is always the safest choice","It eliminates all disease"], correct:0, evidence:"A field planted with a single crop variety can be highly productive, but…", rationale:"The 'but' signals that the productivity gain is paired with serious risk." }
      ]},
      { title:"How Anchoring Shapes Decisions", passage:"When people are shown a high number before estimating a price, their guesses tend to be higher than those shown a low number first — even when the initial number is plainly irrelevant. This 'anchoring' happens because the mind latches onto the first figure it sees and adjusts insufficiently from it. Skilled negotiators exploit this by naming their figure first.", questions:[
        { q:"Why might a negotiator want to name their figure first?", opts:["The first number anchors the other person's expectations","It is polite to speak first","It saves time"], correct:0, evidence:"Skilled negotiators exploit this by naming their figure first.", rationale:"Setting the anchor early pulls the other party's judgement toward it." },
        { q:"What can you infer about how strongly we adjust away from an anchor?", opts:["We adjust too little, staying near the anchor","We ignore the anchor completely","We overshoot wildly"], correct:0, evidence:"…the mind latches onto the first figure it sees and adjusts insufficiently from it.", rationale:"'Adjusts insufficiently' means our final estimate stays close to the anchor." },
        { q:"What is surprising about the anchoring effect?", opts:["It works even when the first number is clearly irrelevant","It only works with true figures","It requires expert knowledge"], correct:0, evidence:"…even when the initial number is plainly irrelevant.", rationale:"That an obviously meaningless number still sways us is the striking part." }
      ]},
      { title:"Why Some Materials Are Recycled and Others Are Not", passage:"Aluminium can be melted and reshaped endlessly without losing quality, so recycling it saves enormous energy compared with making it fresh from ore. Many plastics, by contrast, degrade each time they are processed, yielding a weaker material. This is one reason aluminium is recycled far more reliably than much plastic.", questions:[
        { q:"Why is aluminium recycled so reliably?", opts:["It can be reused endlessly without losing quality","It is the cheapest metal","It never needs recycling"], correct:0, evidence:"Aluminium can be melted and reshaped endlessly without losing quality…", rationale:"Keeping its quality through recycling makes it consistently worth recycling." },
        { q:"What can you infer is a problem with recycling many plastics?", opts:["The recycled material is weaker than the original","Plastic cannot be melted","Plastic is too valuable to recycle"], correct:0, evidence:"…plastics… degrade each time they are processed, yielding a weaker material.", rationale:"Degrading with each cycle limits how usefully plastic can be reused." },
        { q:"Why does recycling aluminium save energy versus making it new?", opts:["Melting it uses far less energy than extracting it from ore","Ore is buried too deep","Recycling needs no energy at all"], correct:0, evidence:"…recycling it saves enormous energy compared with making it fresh from ore.", rationale:"Reprocessing existing metal avoids the heavy energy cost of fresh extraction." }
      ]},
      { title:"How Confirmation Bias Distorts Belief", passage:"People naturally tend to seek out and remember information that supports what they already believe, while overlooking or dismissing evidence that contradicts it. Over time, this can make a shaky belief feel increasingly certain, since every remembered example seems to confirm it. To think clearly, one must deliberately search for evidence that might prove oneself wrong.", questions:[
        { q:"Why can a weak belief come to feel very certain over time?", opts:["We notice confirming evidence and ignore the rest","The belief becomes true","Others keep agreeing with us"], correct:0, evidence:"…every remembered example seems to confirm it.", rationale:"Selectively recalling supportive cases inflates our confidence regardless of the truth." },
        { q:"What can you infer is the antidote to confirmation bias?", opts:["Actively seeking evidence against one's own view","Trusting your instincts more","Avoiding all new information"], correct:0, evidence:"…one must deliberately search for evidence that might prove oneself wrong.", rationale:"The passage names looking for disconfirming evidence as the corrective." },
        { q:"Why is dismissing contradictory evidence dangerous?", opts:["It lets false beliefs survive unchallenged","It saves mental effort harmlessly","It improves memory"], correct:0, evidence:"…while overlooking or dismissing evidence that contradicts it.", rationale:"Ignoring what challenges a belief allows even a wrong one to persist." }
      ]}
    ]
  }
};

let currentYear = 1;
let currentSet = 'fiction';
let currentIdx = 0;
let answers = {};
let score = 0;
let answered = 0;
let activePassages = [];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildActivePassages() {
  const source = DATA[currentYear][currentSet];
  activePassages = shuffle(source).map(p => {
    const questions = p.questions.map(q => {
      const paired = q.opts.map((opt, i) => ({ opt, isCorrect: i === q.correct }));
      const shuffled = shuffle(paired);
      return {
        q: q.q,
        opts: shuffled.map(x => x.opt),
        correct: shuffled.findIndex(x => x.isCorrect),
        evidence: q.evidence,
        rationale: q.rationale
      };
    });
    return { title: p.title, passage: p.passage, questions };
  });
}

function getPassages() { return activePassages; }

function updateScoreChip() {
  document.getElementById('scoreChip').textContent = 'Score: ' + score + ' / ' + answered;
}

function updateProgress() {
  const passages = getPassages();
  const pct = Math.round((currentIdx / passages.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = 'Passage ' + (currentIdx + 1) + ' of ' + passages.length;
}

function switchYear(y) {
  currentYear = y;
  currentSet = 'fiction';
  currentIdx = 0;
  answers = {};
  score = 0;
  answered = 0;
  buildActivePassages();
  document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('year-btn-' + y).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-fiction').classList.add('active');
  updateScoreChip();
  render();
}

function switchSet(s) {
  currentSet = s;
  currentIdx = 0;
  answers = {};
  score = 0;
  answered = 0;
  buildActivePassages();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + s).classList.add('active');
  updateScoreChip();
  render();
}

function render() {
  const passages = getPassages();
  updateProgress();

  if (currentIdx >= passages.length) { renderComplete(); return; }

  const p = passages[currentIdx];
  const key = currentYear + currentSet + currentIdx;
  const passageAnswers = answers[key] || {};
  const allDone = p.questions.every((_, i) => passageAnswers[i] !== undefined);

  const questionsHTML = p.questions.map((q, qi) => {
    const chosen = passageAnswers[qi];
    const isDone = chosen !== undefined;
    const isCorrect = isDone && chosen === q.correct;

    const optsHTML = q.opts.map((opt, oi) => {
      let cls = '';
      if (isDone) {
        if (oi === q.correct) cls = 'correct';
        else if (oi === chosen) cls = 'wrong';
      }
      return `<button class="opt-btn${cls ? ' ' + cls : ''}" ${isDone ? 'disabled' : ''} onclick="answer(${qi}, ${oi})">
        <span class="opt-letter">${['A','B','C'][oi]}</span>${opt}
      </button>`;
    }).join('');

    const feedbackHTML = isDone ? `
      <div class="feedback show">
        <div class="feedback-header ${isCorrect ? 'correct-h' : 'wrong-h'}">
          <span class="feedback-icon">${isCorrect ? '✓' : '✗'}</span>
          ${isCorrect ? 'Correct!' : 'The answer is: ' + q.opts[q.correct]}
        </div>
        <div class="feedback-body">
          <div class="fb-row"><span class="fb-label">Clue: </span><span class="fb-quote">"${q.evidence}"</span></div>
          <div class="fb-row"><span class="fb-label">Why: </span>${q.rationale}</div>
        </div>
      </div>` : '<div class="feedback"></div>';

    return `<div class="question-card${isDone ? ' answered' : ''}">
      <div class="q-label">Question ${qi + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      ${feedbackHTML}
    </div>`;
  }).join('');

  const isLast = currentIdx === passages.length - 1;
  const badgeLabel = currentSet === 'fiction' ? 'Fiction' : 'Non-fiction';

  document.getElementById('mainContent').innerHTML = `
    <div class="passage-card">
      <div class="passage-label">
        <span class="passage-badge">${badgeLabel}</span>
        <span class="passage-title-text">${p.title}</span>
      </div>
      <div class="passage-body">${p.passage}</div>
    </div>
    ${questionsHTML}
    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" ${currentIdx === 0 ? 'disabled' : ''}>← Back</button>
      <button class="nav-btn primary" onclick="next()" ${!allDone ? 'disabled' : ''}>
        ${isLast ? 'Finish ✓' : 'Next →'}
      </button>
    </div>`;
}

function answer(qi, oi) {
  const key = currentYear + currentSet + currentIdx;
  if (!answers[key]) answers[key] = {};
  if (answers[key][qi] !== undefined) return;
  answers[key][qi] = oi;
  answered++;
  if (oi === getPassages()[currentIdx].questions[qi].correct) score++;
  updateScoreChip();
  render();
}

function next() {
  const passages = getPassages();
  if (currentIdx < passages.length - 1) { currentIdx++; render(); }
  else { renderComplete(); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prev() {
  if (currentIdx > 0) { currentIdx--; render(); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderComplete() {
  const passages = getPassages();
  const total = passages.reduce((s, p) => s + p.questions.length, 0);
  const pct = Math.round((score / total) * 100);
  let emoji = '⭐';
  if (pct >= 90) emoji = '🏆';
  else if (pct >= 70) emoji = '🌟';
  else if (pct >= 50) emoji = '👍';

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'Complete!';

  document.getElementById('mainContent').innerHTML = `
    <div class="complete-screen">
      <div class="complete-emoji">${emoji}</div>
      <div class="complete-score">${score}/${total}</div>
      <div class="complete-label">${pct}% correct</div>
      <h2 class="complete-title">Well done!</h2>
      <p class="complete-sub">You finished all ${passages.length} Year ${currentYear} ${currentSet} passages.</p>
      <button class="nav-btn primary" onclick="restart()">Try again</button>
    </div>`;
}

function restart() {
  currentIdx = 0;
  answers = {};
  score = 0;
  answered = 0;
  buildActivePassages();
  updateScoreChip();
  render();
}

buildActivePassages();
render();
</script>
