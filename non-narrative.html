<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Non-Narrative Reading Check (Years 1\u20135)</title>
<style>
:root{
  --paper:#f6f4ef; --ink:#26282b; --muted:#6b6f76; --line:#e3ddd0;
  --accent:#2E75B6; --accent-deep:#1F3864; --card:#ffffff;
  --green:#2e7d32; --green-bg:#e8f4e9; --red:#c62828; --red-bg:#fbe9e9;
  --shadow:0 1px 2px rgba(0,0,0,.05),0 8px 24px rgba(31,56,100,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.55; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1120px;margin:0 auto;padding:24px 18px 80px}

header.app{padding:8px 0 4px}
header.app h1{font-size:1.55rem;margin:0 0 2px;color:var(--accent-deep);letter-spacing:-.01em}
header.app .tag{color:var(--muted);font-size:.92rem;margin-bottom:14px}

#gradebar{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 22px}
.gradebtn{
  border:1px solid var(--line);background:#fff;color:var(--accent-deep);
  padding:9px 16px;border-radius:999px;font-weight:600;font-size:.95rem;cursor:pointer;
  transition:all .15s ease;
}
.gradebtn:hover{border-color:var(--accent);}
.gradebtn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--shadow)}

#testarea{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 26px 22px;box-shadow:var(--shadow)}
.testhead{border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}
.kicker{text-transform:uppercase;letter-spacing:.08em;font-size:.72rem;font-weight:700;color:var(--accent)}
.title{font-size:1.5rem;margin:.25em 0 .1em;color:var(--accent-deep)}
.subtitle{color:var(--muted);font-style:italic;margin-bottom:.3em}
.instruction{color:var(--muted);font-size:.92rem;margin-top:6px}

.story p{font-family:Georgia,"Times New Roman",serif;font-size:1.06rem;line-height:1.72;margin:0 0 .85em;white-space:pre-wrap}
.story h4.shead{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:1.02rem;color:var(--accent-deep);margin:1.1em 0 .35em;letter-spacing:.01em}
.story p.caption{font-style:italic;color:var(--muted);font-size:.96rem;border-left:3px solid var(--line);padding-left:12px;margin-bottom:1em}

.qhead{margin:0 0 6px;font-weight:700;color:var(--accent-deep);font-size:1.1rem;border-top:1px solid var(--line);padding-top:14px}

.cols{display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:start;margin-top:6px}
.col-read{position:sticky;top:14px;max-height:calc(100vh - 40px);overflow:auto;padding-right:10px}
.col-q{min-width:0}
.col-read::-webkit-scrollbar{width:9px}
.col-read::-webkit-scrollbar-thumb{background:#d9d2c4;border-radius:9px}

.question{padding:16px 0;border-bottom:1px solid var(--line)}
.question:last-child{border-bottom:none}
.qtext{font-weight:600;margin-bottom:10px;display:flex;flex-wrap:wrap;align-items:flex-start;gap:6px}
.qnum{display:inline-flex;align-items:center;justify-content:center;min-width:1.7em;height:1.7em;padding:0 .35em;margin-right:6px;border-radius:8px;background:var(--accent);color:#fff;font-size:.8rem;font-weight:700;flex:none}

.options{display:flex;flex-direction:column;gap:8px;margin-left:2px}
.option{
  display:flex;align-items:flex-start;gap:10px;text-align:left;width:100%;
  border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 13px;
  font-size:1rem;color:var(--ink);cursor:pointer;font-family:inherit;line-height:1.45;
  transition:border-color .12s ease,background .12s ease;
}
.option:hover{border-color:var(--accent)}
.option .letter{flex:none;font-weight:700;color:var(--accent);border:1px solid var(--line);border-radius:7px;width:1.7em;height:1.7em;display:inline-flex;align-items:center;justify-content:center;font-size:.85rem}
.option.selected{border-color:var(--accent);background:#eef5fb}
.option.selected .letter{background:var(--accent);color:#fff;border-color:var(--accent)}
.option:disabled{cursor:default;opacity:1}
.option.correct{border-color:var(--green);background:var(--green-bg)}
.option.correct .letter{background:var(--green);color:#fff;border-color:var(--green)}
.option.chosen-wrong{border-color:var(--red);background:var(--red-bg)}
.option.chosen-wrong .letter{background:var(--red);color:#fff;border-color:var(--red)}

.qresult{margin-left:auto;font-size:.78rem;font-weight:700;padding:2px 10px;border-radius:999px}
.qresult.ok{background:var(--green-bg);color:var(--green)}
.qresult.no{background:var(--red-bg);color:var(--red)}

.controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
.btn{border:1px solid var(--line);background:#fff;color:var(--accent-deep);font-weight:600;padding:11px 18px;border-radius:12px;cursor:pointer;font-size:.98rem;font-family:inherit}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--shadow)}
.btn.primary:hover{background:#2a6aa6}
.btn:disabled{opacity:.5;cursor:default}

#results{display:none;margin-top:22px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:var(--shadow)}
.scorecard{text-align:center;padding:6px 0 16px;border-bottom:1px solid var(--line)}
.scorebig{font-size:2.6rem;font-weight:800;color:var(--accent-deep);line-height:1}
.scorepct{font-size:1.1rem;color:var(--accent);font-weight:700;margin-top:2px}
.scoremsg{color:var(--muted);margin-top:6px}
.bd-title{margin:18px 0 12px;font-size:1.05rem;color:var(--accent-deep)}
.breakdown{display:flex;flex-direction:column}
.bd-row{display:grid;grid-template-columns:1fr auto auto;gap:16px;align-items:baseline;padding:7px 0;border-bottom:1px dotted var(--line)}
.bd-row:last-child{border-bottom:none}
.bd-label{font-size:.96rem}
.bd-count{color:var(--muted);font-variant-numeric:tabular-nums;font-size:.85rem;white-space:nowrap}
.bd-pct{font-weight:800;font-variant-numeric:tabular-nums;min-width:52px;text-align:right;color:var(--accent-deep);font-size:1.05rem}
.bd-pct.full{color:var(--green)}
.bd-pct.zero{color:var(--red)}

footer.app{color:var(--muted);font-size:.82rem;text-align:center;margin-top:26px}

@media (max-width:820px){
  .cols{grid-template-columns:1fr;gap:6px}
  .col-read{position:static;max-height:none;overflow:visible;padding-right:0;margin-bottom:8px}
  .title{font-size:1.3rem}
}
@media print{
  #gradebar,.controls,#results{display:none!important}
  body{background:#fff}
  #testarea{box-shadow:none;border:none}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <h1>Non-Narrative Reading Check</h1>
    <div class="tag">Pick a year group. You get one random information text from ten, with the questions and answers shuffled each time.</div>
  </header>
  <div id="gradebar"></div>
  <div id="testarea"></div>
  <div id="results"></div>
  <footer class="app">50 information texts &middot; 5 year groups &middot; works offline, no account needed.</footer>
</div>

ive some of the first food to bees waking up after winter. On a sunny winter day, you might even see a bee drinking from a snowdrop."], "qs": [{"q": "When does the writer say the snowdrop flowers?", "opts": ["In every month of the year", "In the middle of summer", "In January and February", "Only once every ten years"], "a": 2}, {"q": "Why are the tips of the snowdrop's leaves hard and tough?", "opts": ["So that birds will not eat them", "So they can push up through the frozen soil without being hurt", "So they can float on water", "So they can catch insects"], "a": 1}, {"q": "Why does the writer put these two sentences next to each other: \"The tips of its leaves are hard and tough.\" and \"This lets them push up through the frozen soil without being hurt.\"?", "opts": ["To make the text longer", "To explain how snow is made", "To explain how the tough leaf-tips help the snowdrop grow through frozen ground", "To describe two different flowers"], "a": 2}, {"q": "Which option correctly matches each part of the snowdrop to its use?", "opts": ["Bulb → pushes through soil; Leaf-tips → feed bees; Flowers → store food", "Bulb → feeds bees; Leaf-tips → store food; Flowers → push through soil", "Bulb → stores food; Leaf-tips → push through frozen soil; Flowers → feed early bees", "Bulb → flying; Leaf-tips → swimming; Flowers → digging"], "a": 2}, {"q": "Where does the name \"snowdrop\" come from?", "opts": ["From the sound it makes", "Each little white flower hangs down like a drop of snow", "From the word \"drip\"", "From a girl named Snow"], "a": 1}, {"q": "Why has the writer chosen to describe the snowdrop as 'brave'?", "opts": ["To show that it can fight other plants", "To show that it is afraid of the snow", "To show that it grows in the cold when most plants are still asleep", "To show that it is very large"], "a": 2}, {"q": "Which ONE of these statements is TRUE according to the text?", "opts": ["Snowdrops flower in the warm summer.", "Snowdrops have bright red flowe wn crier rang his bell and called out the news.", "They wrote everything down in printed books."], "a": 2}, {"q": "Why is Thornbury different from an ordinary museum?", "opts": ["It is only open during the summer holidays.", "Visitors can step inside the past and see people living as they once did, instead of only looking at objects behind glass.", "It does not let any visitors come inside.", "It is much smaller than most other museums."], "a": 1}, {"q": "According to the text, what should you do before you try one of the activities?", "opts": ["Read the whole leaflet aloud.", "Collect a clay token from the desk in the Guildhall.", "Buy a ticket on the website.", "Dye a strip of wool first."], "a": 1}, {"q": "What is the purpose of the map?", "opts": ["To help visitors find their way around the town.", "To show what the place looked like long ago.", "To list the price of the tickets.", "To explain how one of the activities is done."], "a": 0}, {"q": "The leaflet describes how dyed cloth was made. Which option shows the steps in the correct order?", "opts": ["Weave the thread into cloth → Wash the raw wool → Hang it up to dry → Spin it into thread → Soak the cloth in the dye", "Spin it into thread → Hang it up to dry → Weave the thread into cloth → Wash the raw wool → Soak the cloth in the dye", "Wash the raw wool → Spin it into thread → Weave the thread into cloth → Soak the cloth in the dye → Hang it up to dry", "Hang it up to dry → Soak the cloth in the dye → Weave the thread into cloth → Spin it into thread → Wash the raw wool"], "a": 2}, {"q": "Which TWO tools helped the people of Thornbury to gather food?", "opts": ["A wooden bowl and a clay cup", "A hunting bow and a curved sickle", "A map and a booklet", "A woollen cloak and a wooden token"], "a": 1}, {"q": "Which phrase from the leaflet uses alliteration?", "opts": ["\"behind the glass cases\"", "\"about six hundred years ago\"", "\"the price of the tickets\"", "\"stalls of silver salmon\""], "a": 3}, {"q": "Which piece of information is NOT given on the website or in the booklet?", "opts": ["Directions to the site by bus", "The price of the tickets", "Instructions for dyeing wool at home", "The opening times"], "a": 2}, {"q": "In which section would this sentence best fit? \"There is a gift shop near the exit that sells toys, books and sweets.\"", "opts": ["Things to do", "Life in the market town", "Welcome to Thornbury", "Plan your visit"], "a": 3}, {"q": "At Thornbury, what were the traders selling on the quayside?", "opts": ["Stalls of silver salmon", "Loaves of bread", "Bolts of cloth", "Bronze tools"], "a": 0}], "subtitle": "A Medieval Market Town"}], "Year 5": [{"title": "Wonderful Things: The Story of Tutankhamun's Tomb", "story": [{"t": "A forgotten king", "h": true}, "More than three thousand years ago, a boy named Tutankhamun became pharaoh of Egypt. He ruled for only about ten years and died while still young. He was buried with great treasure in a secret tomb in the Valley of the Kings.", {"t": "Hidden beneath the sand", "h": true}, "Over the centuries, sand and rubble buried the doorway, and workers building other tombs piled their waste on top, hiding it completely. Robbers emptied almost every other royal tomb, but Tutankhamun's stayed sealed and safe. An old inscription warned: \"Death cometh on swift wings to he who disturbeth the king.\"", {"t": "The long search", "h": true}, "By the early 1900s, most experts believed the valley held no more tombs. One man disagreed. The archaeologist Howard Carter searched the valley for years, and for six long seasons he found nothing.", {"t": "A sealed door", "h": true}, "Then, in November 1922, Carter's team uncovered a step cut into the rock, and then a staircase leading down to a sealed door. When he held a candle to a small hole and was asked if he could see anything, Carter replied that he could see wonderful things. Behind the door lay room after room of gold.", {"t": "Opening the tomb", "h": true}, "It took almost ten years to record everything: a golden mask, a throne, chariots, even fresh-looking flowers laid on the coffin. Because the sealed, dry tomb had protected everything so perfectly, the find was like a time capsule from ancient Egypt. \"The objects were probably placed here in a hurry,\" explains one Egyptologist, \"because some of the paint was not yet dry.\" Today the treasures fill a great museum."], "qs": [{"q": "Why does the writer include the detail that \"He was buried with great treasure in a secret tomb\"?", "opts": ["To explain that the pharaoh enjoyed gardening.", "To show how important and rich the young pharaoh was.", "To prove that Carter built the tomb himself.", "To suggest the treasure was worthless."], "a": 1}, {"q": "Why was Tutankhamun's tomb not discovered for so many centuries?", "opts": ["The pharaoh had ordered that it must never be opened.", "People believed it was cursed and refused to look.", "It had been moved to another valley.", "Sand and rubble buried the doorway, and waste from other tombs was piled on top, hiding it completely."], "a": 3}, {"q": "How did being sealed beneath the sand affect the tomb?", "opts": ["It destroyed all the gold inside.", "It protected the treasures from robbers and from the desert wind.", "It turned the treasures to dust.", "It made the tomb rise to the surface."], "a": 1}, {"q": "Which phrase best shows that Carter's search was long and difficult?", "opts": ["\"the most famous pharaoh of all\"", "\"a boy named Tutankhamun\"", "\"room after room of gold\"", "\"for six long seasons he found nothing\""], "a": 3}, {"q": "Which option shows the events in the correct order?", "opts": ["Sand and rubble hid the doorway → The treasures were recorded and put in a museum → Tutankhamun was buried in a secret tomb → Carter found the sealed door in 1922 → Carter searched the valley for years", "Carter searched the valley for years → Tutankhamun was buried in a secret tomb → The treasures were recorded and put in a museum → Sand and rubble hid the doorway → Carter found the sealed door in 1922", "The treasures were recorded and put in a museum → Carter found the sealed door in 1922 → Sand and rubble hid the doorway → Carter searched the valley for years → Tutankhamun was buried in a secret tomb", "Tutankhamun was buried in a secret tomb → Sand and rubble hid the doorway → Carter searched the valley for years → Carter found the sealed door in 1922 → The treasures were recorded and put in a museum"], "a": 3}, {"q": "Which word from the old inscription best shows that it was written long ago?", "opts": ["\"death\"", "\"disturbeth\"", "\"wings\"", "\"king\""], "a": 1}, {"q": "What is the most likely reason that Tutankhamun's tomb still held its treasure when others were empty?", "opts": ["Its doorway lay sealed and hidden under the sand and rubble, so robbers never found it.", "Guards protected it for three thousand years.", "The treasure inside was not worth stealing.", "The other tombs had never held any treasure."], "a": 0}, {"q": "Why does the expert use the word 'probably' when describing how the objects were placed in the tomb?", "opts": ["Because the expert is completely certain it is true.", "Because no one can be completely sure, so it is a careful expert guess based on the evidence.", "Because the people from the past told the expert exactly what happened.", "Because the expert does not care about being accurate."], "a": 1}, {"q": "How do we know that the tomb gives us a true and detailed picture of ancient Egypt?", "opts": ["Because it was rebuilt exactly as it had been.", "Because someone wrote down every detail at the time.", "Because the dry, sealed tomb preserved everything so well that it survived almost untouched.", "Because a famous writer described it in a book."], "a": 2}, {"q": "\"like a time capsule from ancient Egypt\" What does this phrase tell us about the tomb of Tutankhamun?", "opts": ["It contained secret letters from a king.", "It was preserved almost untouched, carrying information about the past directly to us today.", "It was locked shut with a real key.", "It was very difficult to lift."], "a": 1}, {"q": "In which section would this sentence best fit? \"Each object had to be photographed and labelled before it could be lifted out.\"", "opts": ["A forgotten king", "Hidden beneath the sand", "The long search", "A sealed door", "Opening the tomb"], "a": 4}]}, {"title": "An Army of Clay: The Story of the Terracotta Warriors", "story": [{"t": "The first emperor", "h": true}, "More than two thousand years ago, Qin Shi Huang became the first emperor of China. He was a powerful and feared ruler. He wanted to be guarded even after death, so he ordered an army of life-sized clay soldiers to be made and buried near his tomb.", {"t": "Buried in secret", "h": true}, "Thousands of workers spent years making the soldiers, and each one had a different face. When the work was finished, the whole army was buried in deep pits and covered with earth and timber roofs. An ancient historian wrote that craftsmen \"wrought figures without number, and rivers of mercury did flow therein.\"", {"t": "Lost for two thousand years", "h": true}, "Over the centuries the wooden roofs rotted and collapsed, and the pits filled with earth. The villages above forgot the army was ever there. For more than two thousand years the clay soldiers stood silently in the dark.", {"t": "A chance discovery", "h": true}, "In 1974, during a dry spring, farmers digging a well struck the head of a clay soldier. Archaeologists soon realised that the farmers had stumbled upon one of the greatest finds in history.", {"t": "Digging up an army", "h": true}, "Sealed under the soil, the figures had been protected from robbers and weather, so the army is like a photograph of the emperor's soldiers, frozen for two thousand years. \"Each soldier was probably modelled on a real person,\" explains one archaeologist. Today a huge hall lets visitors look down on the silent ranks."], "qs": [{"q": "Why does the writer include the detail that \"each one had a different face\"?", "opts": ["To explain that the soldiers were alive.", "To prove the emperor made them himself.", "To suggest the soldiers were badly made.", "To show how much care and skill went into making the army."], "a": 3}, {"q": "Why was the Terracotta Army not found for so many centuries?", "opts": ["People knew it was there but were afraid of it.", "The emperor had taken the army with him.", "The wooden roofs rotted and the pits filled with earth, so the army was buried and forgotten.", "It had been carried away by a river."], "a": 2}, {"q": "How did being buried under the soil affect the clay soldiers?", "opts": ["It lifted them to the surface.", "It painted the soldiers bright colours.", "It protected them from robbers and the weather for two thousand years.", "It dissolved the clay completely."], "a": 2}, {"q": "Which phrase best shows that the army was hidden for a very long time?", "opts": ["\"the clay soldiers stood silently in the dark\"", "\"during a dry spring\"", "\"look down on the silent ranks\"", "\"each one had a different face\""], "a": 0}, {"q": "Which option shows the events in the correct order?", "opts": ["The emperor ordered an army of clay soldiers → The soldiers were buried in deep pits → The roofs rotted and the pits filled with earth → Farmers struck a clay head in 1974 → Archaeologists dug up the whole army", "Archaeologists dug up the whole army → Farmers struck a clay head in 1974 → The soldiers were buried in deep pits → The roofs rotted and the pits filled with earth → The emperor ordered an army of clay soldiers", "The roofs rotted and the pits filled with earth → The emperor ordered an army of clay soldiers → Archaeologists dug up the whole army → The soldiers were buried in deep pits → Farmers struck a clay head in 1974", "The soldiers were buried in deep pits → Archaeologists dug up the whole army → The emperor ordered an army of clay soldiers → Farmers struck a clay head in 1974 → The roofs rotted and the pits filled with earth"], "a": 0}, {"q": "Which word from the ancient historian best shows that it was written long ago?", "opts": ["\"number\"", "\"figures\"", "\"wrought\"", "\"rivers\""], "a": 2}, {"q": "What is the most likely reason the soldiers had survived so well?", "opts": ["They were made of solid gold.", "They were only made a few years ago.", "Soldiers guarded them all that time.", "They were sealed deep under the soil, away from robbers and the weather."], "a": 3}, {"q": "Why does the expert use the word 'probably' when describing how each soldier was made?", "opts": ["Because no one can be completely sure, so it is a careful expert guess based on the evidence.", "Because the expert does not care about being accurate.", "Because the people from the past told the expert exactly what happened.", "Because the expert is completely certain it is true."], "a": 0}, {"q": "How do we know that the army gives us a true picture of the emperor's soldiers?", "opts": ["Because the soil preserved everything so well that it survived almost untouched.", "Because a famous writer described it in a book.", "Because it was rebuilt exactly as it had been.", "Because someone wrote down every detail at the time."], "a": 0}, {"q": "\"like a photograph of the emperor's soldiers, frozen for two thousand years\" What does this phrase tell us about the Terracotta Army?", "opts": ["It contained secret letters from a king.", "It was preserved almost untouched, carrying information about the past directly to us today.", "It was very difficult to lift.", "It was locked shut with a real key."], "a": 1}, {"q": "In which section would this sentence best fit? \"No two faces are exactly the same, as if each soldier were a real man.\"", "opts": ["The first emperor", "Buried in secret", "Lost for two thousand years", "A chance discovery", "Digging up an army"], "a": 1}]}, {"title": "Frozen in Time: The Story of Pompeii", "story": [{"t": "A busy Roman town", "h": true}, "Nearly two thousand years ago, Pompeii was a busy Roman town near the Bay of Naples. Its streets were full of shops, baths and fine houses with painted walls. Above the town rose a mountain called Vesuvius, which everyone believed was a harmless, sleeping hill.", {"t": "The mountain wakes", "h": true}, "In AD 79, Vesuvius suddenly erupted. For two days it rained down ash and stone until the whole town was buried many metres deep. A Roman writer named Pliny watched from across the bay and later wrote: \"A fearful cloud spread itself afar, and folk cried out that the end was nigh.\"", {"t": "A town under ash", "h": true}, "Sealed beneath the ash, Pompeii lay hidden for almost seventeen hundred years. The thick blanket of ash kept out air and water, so the buildings, the wall-paintings and even loaves of bread in the ovens were preserved almost exactly as they had been.", {"t": "Rediscovered", "h": true}, "In the 1700s, workers digging a channel struck the buried walls. Slowly, archaeologists uncovered whole streets and houses. Plaster poured into hollows in the ash even revealed the shapes of people where they had fallen.", {"t": "A window into Rome", "h": true}, "Pompeii is like a photograph of a single Roman day, frozen forever. Because the ash preserved so much, it shows how ordinary Romans really lived. \"The people who stayed behind were probably overcome by poisonous gas,\" explains one archaeologist, \"rather than by the ash itself.\" Today visitors walk the same stone streets the Romans walked."], "qs": [{"q": "Why does the writer include the detail that \"fine houses with painted walls\"?", "opts": ["To explain how the mountain erupted.", "To prove that Romans could not paint.", "To show how wealthy and comfortable the town was before the disaster.", "To suggest the town was poor and empty."], "a": 2}, {"q": "Why was Pompeii not rediscovered for so many centuries?", "opts": ["The whole town had been buried many metres deep under ash and its name was forgotten.", "The Romans had forbidden anyone to dig there.", "People believed the town was cursed.", "The town had been washed out to sea."], "a": 0}, {"q": "How did the thick ash affect the town?", "opts": ["It burned everything to nothing.", "It made the houses float away.", "It sealed the town and preserved the buildings and objects almost exactly as they had been.", "It turned the streets to gold."], "a": 2}, {"q": "Which phrase best shows that the town had been hidden for a very long time?", "opts": ["\"hidden for almost seventeen hundred years\"", "\"fine houses with painted walls\"", "\"walk the same stone streets\"", "\"a busy Roman town\""], "a": 0}, {"q": "Which option shows the events in the correct order?", "opts": ["Vesuvius erupted and buried the town in ash → Archaeologists uncovered the streets and houses → Pompeii was a busy Roman town → Workers struck the buried walls in the 1700s → The town lay sealed and forgotten for centuries", "Archaeologists uncovered the streets and houses → Workers struck the buried walls in the 1700s → Vesuvius erupted and buried the town in ash → The town lay sealed and forgotten for centuries → Pompeii was a busy Roman town", "Pompeii was a busy Roman town → Vesuvius erupted and buried the town in ash → The town lay sealed and forgotten for centuries → Workers struck the buried walls in the 1700s → Archaeologists uncovered the streets and houses", "The town lay sealed and forgotten for centuries → Pompeii was a busy Roman town → Archaeologists uncovered the streets and houses → Vesuvius erupted and buried the town in ash → Workers struck the buried walls in the 1700s"], "a": 2}, {"q": "Which word from Pliny's account best shows that it was written long ago?", "opts": ["\"spread\"", "\"nigh\"", "\"end\"", "\"cloud\""], "a": 1}, {"q": "What is the most likely reason that loaves of bread survived in the ovens?", "opts": ["Bread never goes mouldy.", "The bakers came back to protect it.", "The bread was made of stone.", "The ash sealed them away from air and water, so they did not rot."], "a": 3}, {"q": "Why does the expert use the word 'probably' when describing what happened to the people who stayed behind?", "opts": ["Because no one can be completely sure, so it is a careful expert guess based on the evidence.", "Because the people from the past told the expert exactly what happened.", "Because the expert is completely certain it is true.", "Because the expert does not care about being accurate."], "a": 0}, {"q": "How do we know that Pompeii gives us a true picture of how Romans really lived?", "opts": ["Because someone wrote down every detail at the time.", "Because the ash preserved everything so well that it survived almost untouched.", "Because a famous writer described it in a book.", "Because it was rebuilt exactly as it had been."], "a": 1}, {"q": "\"like a photograph of a single Roman day, frozen forever\" What does this phrase tell us about the lost city of Pompeii?", "opts": ["It was preserved almost untouched, carrying information about the past directly to us today.", "It was very difficult to lift.", "It was locked shut with a real key.", "It contained secret letters from a king."], "a": 0}, {"q": "In which section would this sentence best fit? \"Even graffiti scratched on the walls can still be read today.\"", "opts": ["A busy Roman town", "The mountain wakes", "A town under ash", "Rediscovered", "A window into Rome"], "a": 4}]}, {"title": "The Ghost Ship: The Story of Sutton Hoo", "story": [{"t": "Mounds in a field", "h": true}, "On a sandy heath in Suffolk stood a group of grassy mounds. For hundreds of years local people walked past them, never guessing that one of the greatest treasures in British history lay beneath their feet.", {"t": "A buried ship", "h": true}, "More than thirteen hundred years ago, an Anglo-Saxon king was buried here. His people dragged a whole wooden ship up from the river, laid him inside with his treasure, and heaped earth over the top. An old Anglo-Saxon poem describes such a burial: \"They laid their dear lord in the ship's bosom, and gold they gave him, betwixt mast and stern.\"", {"t": "A vanishing ship", "h": true}, "The acid, sandy soil slowly ate away every plank of the wooden ship. Yet as the timber rotted, the iron rivets and the dark stain of the wood stayed exactly in place, leaving a perfect ghostly print of the ship in the sand.", {"t": "The 1939 dig", "h": true}, "In 1939, the landowner asked a local archaeologist named Basil Brown to dig into the largest mound. Brown brushed the soil away with great care until a helmet, a golden buckle and silver bowls came to light.", {"t": "Treasure of a king", "h": true}, "The wooden ship had vanished, yet it was still there, printed in the sand like a shadow that would not fade. The treasure showed that the Anglo-Saxons were skilled artists, not the rough people once imagined. \"The buried king was probably a ruler named Raedwald,\" explains a modern archaeologist. Today the treasures are among the most precious objects in the British Museum."], "qs": [{"q": "Why does the writer include the detail that \"one of the greatest treasures in British history lay beneath their feet\"?", "opts": ["To show how important the discovery would turn out to be.", "To explain how to plough a field.", "To suggest the mounds were only piles of rubbish.", "To prove the field was worthless."], "a": 0}, {"q": "Why did no one realise what lay inside the mounds for so long?", "opts": ["The king's family had taken the treasure away.", "The treasure was hidden deep under the grassy mounds, and people simply walked past them.", "A fence kept everyone away from the field.", "The mounds were guarded day and night."], "a": 1}, {"q": "How did the acid, sandy soil affect the wooden ship?", "opts": ["It carried the ship out to sea.", "It ate away the planks but left a perfect ghostly print of the ship in the sand.", "It turned the ship into gold.", "It kept the ship completely whole."], "a": 1}, {"q": "Which phrase best shows that the wooden ship had completely rotted away?", "opts": ["\"a helmet, a golden buckle and silver bowls\"", "\"ate away every plank of the wooden ship\"", "\"the most precious objects in the British Museum\"", "\"a group of grassy mounds\""], "a": 1}, {"q": "Which option shows the events in the correct order?", "opts": ["The acid soil rotted the wooden planks away → The treasures went to the British Museum → An Anglo-Saxon king was buried in a ship under a mound → Basil Brown dug into the mound in 1939 → The mounds stood unexplored for centuries", "An Anglo-Saxon king was buried in a ship under a mound → The acid soil rotted the wooden planks away → The mounds stood unexplored for centuries → Basil Brown dug into the mound in 1939 → The treasures went to the British Museum", "The treasures went to the British Museum → Basil Brown dug into the mound in 1939 → The acid soil rotted the wooden planks away → The mounds stood unexplored for centuries → An Anglo-Saxon king was buried in a ship under a mound", "The mounds stood unexplored for centuries → An Anglo-Saxon king was buried in a ship under a mound → The treasures went to the British Museum → The acid soil rotted the wooden planks away → Basil Brown dug into the mound in 1939"], "a": 1}, {"q": "Which word from the old poem best shows that it was written long ago?", "opts": ["\"gold\"", "\"ship\"", "\"lord\"", "\"betwixt\""], "a": 3}, {"q": "What is the most likely reason the ship left a print even though the wood had gone?", "opts": ["The wood floated up but left its shadow.", "Someone painted a picture of the ship in the soil.", "The iron rivets and the dark stain of the rotted wood stayed in place in the sand.", "The ship was made of sand to begin with."], "a": 2}, {"q": "Why does the expert use the word 'probably' when describing who the buried king was?", "opts": ["Because the expert is completely certain it is true.", "Because the expert does not care about being accurate.", "Because the people from the past told the expert exactly what happened.", "Because no one can be completely sure, so it is a careful expert guess based on the evidence."], "a": 3}, {"q": "How do we know that the burial shows that the Anglo-Saxons were skilled artists?", "opts": ["Because someone wrote down every detail at the time.", "Because the sandy soil preserved everything so well that it survived almost untouched.", "Because it was rebuilt exactly as it had been.", "Because a famous writer described it in a book."], "a": 1}, {"q": "\"printed in the sand like a shadow that would not fade\" What does this phrase tell us about the ship burial at Sutton Hoo?", "opts": ["It was very difficult to lift.", "It was preserved almost untouched, carrying information about the past directly to us today.", "It contained secret letters from a king.", "It was locked shut with a real key."], "a": 1}, {"q": "In which section would this sentence best fit? \"Carefully, the diggers followed the line of rusty rivets to trace the ship's shape.\"", "opts": ["Mounds in a field", "A buried ship", "A vanishing ship", "The 1939 dig", "Treasure of a king"], "a": 3}]}, {"title": "Dragon in the Rock: The Story of Mary Anning's Discovery", "story": [{"t": "A girl on the beach", "h": true}, "Two hundred years ago, a girl named Mary Anning lived in the seaside town of Lyme Regis. Her family was poor, so Mary searched the cliffs for fossils to sell to visitors. She had a sharp eye and knew the dangerous, crumbling cliffs better than anyone.", {"t": "A monster in the cliff", "h": true}, "One day, Mary and her brother spotted a strange skull poking from the cliff. Over many months Mary chipped away the rock until she had freed the skeleton of a huge sea creature, longer than a rowing boat. A local newspaper called it \"a monster of the deep, wondrous to behold, the like whereof was never seen.\"", {"t": "Locked in stone", "h": true}, "The creature had died in the sea millions of years before. Mud had covered its body, and over a vast time the mud and bones had slowly turned to solid rock. Locked in the stone, the whole skeleton was preserved, every bone in its place.", {"t": "Out into the light", "h": true}, "It took great skill and patience to free the fossil without breaking it. Mary sold it, and crowds came to stare at the strange beast, which scientists later named an ichthyosaur.", {"t": "Reading the rocks", "h": true}, "The fossil was like a stone photograph of a creature no human had ever seen alive. \"It was probably a fierce hunter,\" explains a palaeontologist, \"judging by its many sharp teeth.\" Mary went on to find many more fossils, and today she is remembered as one of the greatest fossil hunters of all time."], "qs": [{"q": "Why does the writer include the detail that \"She had a sharp eye and knew the dangerous, crumbling cliffs better than anyone\"?", "opts": ["To prove that Mary disliked the seaside.", "To explain how to swim in the sea.", "To suggest that anyone could find fossils easily.", "To show how skilful and knowledgeable Mary was at finding fossils."], "a": 3}, {"q": "Why had no one seen this sea creature alive?", "opts": ["It had escaped back into the sea.", "It had died in the sea millions of years before and had slowly turned to stone in the rock.", "It only came out at night.", "It was hiding in a deep cave."], "a": 1}, {"q": "How did the rock affect the dead sea creature's body?", "opts": ["It dissolved every bone away.", "Over millions of years the mud and bones turned to solid rock, preserving the whole skeleton.", "It washed the bones out to sea.", "It made the creature come back to life."], "a": 1}, {"q": "Which phrase best shows that freeing the fossil was slow and careful work?", "opts": ["\"one of the greatest fossil hunters of all time\"", "\"Over many months Mary chipped away the rock\"", "\"crowds came to stare at the strange beast\"", "\"a girl named Mary Anni <script>
/* Non-Narrative Reading Comprehension Practice. Vanilla JS, no network, no AI. */
(function () {
  "use strict";

  var GRADES = ["Year 1", "Year 2", "Year 3", "Year 4", "Year 5"];
  var LETTERS = ["A", "B", "C", "D", "E", "F"];

  var state = { grade: GRADES[0], test: null, answers: [], checked: false };

  function $(sel) { return document.querySelector(sel); }
  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }
  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function shuffle(a) {
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  /* Derive a question-skill label from its wording, for the breakdown panel. */
  function skillOf(q) {
    var t = (q.q || "").toLowerCase();
    if (/correct order|in the right order|order\?|sequence/.test(t)) return "Sequencing";
    if (/which section|best fit|where would|add(ing)? (a|this) sentence/.test(t)) return "Text structure";
    if (/match(es|ing)?\b|correctly matches/.test(t)) return "Compare, contrast & matching";
    if (/best title|which would be the best title|good title|the writer.*purpose|purpose of/.test(t)) return "Main idea, title & purpose";
    if (/what does the word|what does .* mean|the word .* tell|choose the best word|complete this sentence/.test(t)) return "Vocabulary & word meaning";
    if (/why (does|has|did) the writer|why is .* written|why are .* (underlined|italic|inverted)|alliteration|play on words|caption|subheading|inverted commas|word .* shows|phrase .* shows|figurative|why .* use(s|d)? the word|old-fashioned|written long ago/.test(t)) return "Author's craft";
    if (/^why\b|most likely|how do we know|how did .* affect|suggest|tell(s)? (you|us)|infer/.test(t)) return "Inference";
    return "Retrieval (finding facts)";
  }

  function buildTest(grade) {
    var pool = DATA[grade];
    var src = pool[Math.floor(Math.random() * pool.length)];
    var t = JSON.parse(JSON.stringify(src));
    t.qs.forEach(function (q) { q._type = skillOf(q); });
    shuffle(t.qs);
    t.qs.forEach(function (q) {
      var correct = q.opts[q.a];
      shuffle(q.opts);
      q.a = q.opts.indexOf(correct);
    });
    return t;
  }

  function newTest(grade) {
    state.grade = grade;
    state.test = buildTest(grade);
    state.answers = [];
    for (var i = 0; i < state.test.qs.length; i++) state.answers.push(null);
    state.checked = false;
    renderGradebar();
    renderTest();
    var r = $("#results"); r.innerHTML = ""; r.style.display = "none";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function renderGradebar() {
    var bar = $("#gradebar");
    bar.innerHTML = "";
    GRADES.forEach(function (g) {
      var b = el("button", "gradebtn" + (g === state.grade ? " active" : ""), esc(g));
      b.setAttribute("type", "button");
      b.addEventListener("click", function () { newTest(g); });
      bar.appendChild(b);
    });
  }

  function renderTest() {
    var area = $("#testarea");
    area.innerHTML = "";
    var t = state.test;

    var head = el("div", "testhead");
    head.appendChild(el("div", "kicker", esc(state.grade) + " &middot; Non-Narrative Reading Check"));
    head.appendChild(el("h2", "title", esc(t.title)));
    if (t.subtitle) head.appendChild(el("div", "subtitle", esc(t.subtitle)));
    head.appendChild(el("div", "instruction", "Read the text, then answer the questions. Choose the ONE best answer for each."));
    area.appendChild(head);

    var cols = el("div", "cols");

    var left = el("div", "col-read");
    left.appendChild(el("div", "qhead", "Text"));
    var story = el("div", "story");
    t.story.forEach(function (p) {
      if (p && typeof p === "object") {
        if (p.h) story.appendChild(el("h4", "shead", esc(p.t)));
        else if (p.c) story.appendChild(el("p", "caption", esc(p.t)));
        else story.appendChild(el("p", null, esc(p.t)));
      } else {
        story.appendChild(el("p", null, esc(p)));
      }
    });
    left.appendChild(story);
    cols.appendChild(left);

    var right = el("div", "col-q");
    right.appendChild(el("div", "qhead", "Questions"));

    var form = el("div", "questions");
    t.qs.forEach(function (q, qi) {
      var qd = el("div", "question");
      qd.setAttribute("data-qi", qi);
      qd.appendChild(el("div", "qtext",
        '<span class="qnum">' + (qi + 1) + '</span>' + esc(q.q)));
      var opts = el("div", "options");
      q.opts.forEach(function (opt, oi) {
        var o = el("button", "option");
        o.setAttribute("type", "button");
        o.setAttribute("data-qi", qi);
        o.setAttribute("data-oi", oi);
        o.innerHTML = '<span class="letter">' + LETTERS[oi] + '</span><span class="otext">' + esc(opt) + '</span>';
        o.addEventListener("click", function () { onPick(qi, oi); });
        opts.appendChild(o);
      });
      qd.appendChild(opts);
      form.appendChild(qd);
    });
    right.appendChild(form);

    var controls = el("div", "controls");
    var check = el("button", "btn primary", "Check my answers");
    check.setAttribute("type", "button");
    check.id = "checkbtn";
    check.addEventListener("click", checkAnswers);
    var again = el("button", "btn", "New random test");
    again.setAttribute("type", "button");
    again.addEventListener("click", function () { newTest(state.grade); });
    controls.appendChild(check);
    controls.appendChild(again);
    right.appendChild(controls);

    cols.appendChild(right);
    area.appendChild(cols);

    syncSelection();
  }

  function onPick(qi, oi) {
    if (state.checked) return;
    state.answers[qi] = oi;
    syncSelection();
  }

  function syncSelection() {
    var qs = document.querySelectorAll(".question");
    qs.forEach(function (qd) {
      var qi = +qd.getAttribute("data-qi");
      qd.querySelectorAll(".option").forEach(function (o) {
        var oi = +o.getAttribute("data-oi");
        o.classList.toggle("selected", state.answers[qi] === oi && !state.checked);
      });
    });
  }

  function checkAnswers() {
    var unanswered = state.answers.filter(function (a) { return a === null; }).length;
    if (unanswered > 0 && !confirm(unanswered + " question(s) are not answered yet. They will be marked wrong. Check anyway?")) {
      return;
    }
    state.checked = true;

    var t = state.test;
    var correct = 0;
    var skills = {};

    t.qs.forEach(function (q, qi) {
      var pick = state.answers[qi];
      var isRight = pick === q.a;
      if (isRight) correct++;
      var type = q._type || "Comprehension";
      if (!skills[type]) skills[type] = { c: 0, n: 0 };
      skills[type].n++;
      if (isRight) skills[type].c++;

      var qd = document.querySelector('.question[data-qi="' + qi + '"]');
      qd.classList.add(isRight ? "right" : "wrong");
      qd.querySelectorAll(".option").forEach(function (o) {
        var oi = +o.getAttribute("data-oi");
        o.disabled = true;
        if (oi === q.a) o.classList.add("correct");
        if (oi === pick && oi !== q.a) o.classList.add("chosen-wrong");
        if (oi === pick) o.classList.add("picked");
      });
      var tag = el("div", "qresult " + (isRight ? "ok" : "no"),
        isRight ? "Correct" : (pick === null ? "Not answered" : "Not quite"));
      qd.querySelector(".qtext").appendChild(tag);
    });

    $("#checkbtn").disabled = true;
    renderResults(correct, t.qs.length, skills);
  }

  function renderResults(correct, total, skills) {
    var pct = Math.round((correct / total) * 100);
    var msg;
    if (pct >= 90) msg = "Excellent reading!";
    else if (pct >= 70) msg = "Good work!";
    else if (pct >= 50) msg = "Nice effort \u2014 keep practising.";
    else msg = "Let's read it again and try another.";

    var r = $("#results");
    r.innerHTML = "";
    r.style.display = "block";

    var top = el("div", "scorecard");
    top.appendChild(el("div", "scorebig", correct + " / " + total));
    top.appendChild(el("div", "scorepct", pct + "%"));
    top.appendChild(el("div", "scoremsg", esc(msg)));
    r.appendChild(top);

    r.appendChild(el("h3", "bd-title", "Breakdown by question type"));
    var table = el("div", "breakdown");
    Object.keys(skills).sort().forEach(function (type) {
      var s = skills[type];
      var p = Math.round((s.c / s.n) * 100);
      var row = el("div", "bd-row");
      row.appendChild(el("div", "bd-label", esc(type)));
      row.appendChild(el("div", "bd-count", s.c + " of " + s.n));
      var pe = el("div", "bd-pct" + (p === 100 ? " full" : (p === 0 ? " zero" : "")), p + "%");
      row.appendChild(pe);
      table.appendChild(row);
    });
    r.appendChild(table);

    var foot = el("div", "controls");
    var again = el("button", "btn primary", "Try another test (" + esc(state.grade) + ")");
    again.setAttribute("type", "button");
    again.addEventListener("click", function () { newTest(state.grade); });
    foot.appendChild(again);
    r.appendChild(foot);
    r.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  document.addEventListener("DOMContentLoaded", function () {
    newTest(GRADES[0]);
  });
})();
</script>
</body>
</html>
