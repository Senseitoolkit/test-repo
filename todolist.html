<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To-Do List</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');

html,body{height:100%;margin:0;}

.cu-root{
  --size-scale: 1;
  --paper:#f1e8d8; --card:#fbf6ec; --ink:#2a2017; --soft:#7c7062;
  --line:#e6dac5; --accent:#bd4a2c; --accent-2:#d98a3a; --green:#5f7d4a;
  --shadow:0 1px 2px rgba(60,40,20,.06),0 10px 30px rgba(80,50,25,.10);
  font-family:'Hanken Grotesk',ui-sans-serif,system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(130% 100% at 25% -10%, #f7f0e2 0%, var(--paper) 55%, #ece1cd 100%);
  display:flex; align-items:stretch; flex-direction:column;
  width:100%; min-height:100vh; box-sizing:border-box;
  padding:clamp(20px,3vw,48px);
  gap:clamp(20px,3vw,52px);
}
.cu-root *{box-sizing:border-box;}

/* ---- Color Schemes ---- */
.cu-root.scheme-warm{
  --paper:#f1e8d8; --card:#fbf6ec; --ink:#2a2017; --soft:#7c7062;
  --line:#e6dac5; --accent:#bd4a2c; --accent-2:#d98a3a; --green:#5f7d4a;
}
.cu-root.scheme-dark{
  --paper:#1a1a1a; --card:#252525; --ink:#f5f5f5; --soft:#a8a8a8;
  --line:#404040; --accent:#ff6b6b; --accent-2:#ff8c8c; --green:#51cf66;
}
.cu-root.scheme-cool{
  --paper:#e3f2fd; --card:#f3f7ff; --ink:#0d47a1; --soft:#5c7fa8;
  --line:#b3d9f2; --accent:#1976d2; --accent-2:#1e88e5; --green:#00897b;
}
.cu-root.scheme-forest{
  --paper:#e8f5e9; --card:#f1f8f6; --ink:#1b5e20; --soft:#558b6f;
  --line:#c8e6c9; --accent:#2e7d32; --accent-2:#43a047; --green:#00695c;
}
.cu-root.scheme-sunset{
  --paper:#fff3e0; --card:#fffbf0; --ink:#e65100; --soft:#bf5f1f;
  --line:#ffe0b2; --accent:#f57c00; --accent-2:#fb8c00; --green:#c62828;
}

.cu-root.scheme-dark{background:radial-gradient(130% 100% at 25% -10%, #2a2a2a 0%, var(--paper) 55%, #0f0f0f 100%);}
.cu-root.scheme-cool{background:radial-gradient(130% 100% at 25% -10%, #e0f4ff 0%, var(--paper) 55%, #cce5ff 100%);}
.cu-root.scheme-forest{background:radial-gradient(130% 100% at 25% -10%, #d4f1e3 0%, var(--paper) 55%, #c2e5d8 100%);}
.cu-root.scheme-sunset{background:radial-gradient(130% 100% at 25% -10%, #ffe5cc 0%, var(--paper) 55%, #ffd4a3 100%);}

/* ---- top controls ---- */
.cu-topbar{
  display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
  gap:16px;
}
.cu-controls-group{display:flex; align-items:center; gap:12px;}
.cu-size-controls{display:flex; align-items:center; gap:6px; padding:8px 12px;
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  box-shadow:var(--shadow);}
.cu-size-btn{width:36px; height:36px; border:none; border-radius:8px;
  background:#fff; color:var(--ink); font-weight:700; font-size:18px;
  cursor:pointer; transition:all .2s;}
.cu-size-btn:hover{background:var(--accent); color:#fff;}
.cu-size-btn:active{transform:scale(.95);}
.cu-size-display{font-size:12px; color:var(--soft); min-width:28px; text-align:center;}

.cu-scheme-btn{width:40px; height:40px; border:2px solid var(--line);
  border-radius:10px; cursor:pointer; transition:all .2s; background:#fff;}
.cu-scheme-btn:hover{transform:scale(1.05);}
.cu-scheme-btn:active{transform:scale(.95);}

.scheme-warm-swatch{background:linear-gradient(135deg, #f1e8d8 0%, #bd4a2c 100%);}
.scheme-dark-swatch{background:linear-gradient(135deg, #252525 0%, #ff6b6b 100%);}
.scheme-cool-swatch{background:linear-gradient(135deg, #e3f2fd 0%, #1976d2 100%);}
.scheme-forest-swatch{background:linear-gradient(135deg, #e8f5e9 0%, #2e7d32 100%);}
.scheme-sunset-swatch{background:linear-gradient(135deg, #fff3e0 0%, #f57c00 100%);}

/* ---- main content ---- */
.cu-content{
  display:flex; align-items:stretch;
  width:100%; flex:1; gap:clamp(20px,3vw,52px);
}

/* ---------- LEFT : timer ---------- */
.cu-left{
  flex:0 0 42%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:clamp(14px,2.2vh,30px);
}
.cu-head{text-align:center;}
.cu-kicker{font-size:clamp(11px,1vw,15px); letter-spacing:.34em;
  color:var(--accent); font-weight:700; margin-bottom:8px;}
.cu-title{font-family:'Fraunces',serif; font-weight:600;
  font-size:clamp(30px,3.8vw,58px); line-height:1.02; margin:0; cursor:text;
  letter-spacing:-.01em; font-optical-sizing:auto; outline:none;
  border-bottom:2px dashed transparent; transition:color .2s,border-color .2s;}
.cu-title:hover{color:var(--accent);}
.cu-title[contenteditable="true"]{border-bottom-color:var(--line); color:var(--ink);}

.cu-timer{display:flex; flex-direction:column; align-items:center;
  gap:clamp(16px,2.4vh,30px); transition:filter .3s;}
.cu-timer.is-done{animation:flash 1s ease 3;}
@keyframes flash{50%{filter:drop-shadow(0 0 14px rgba(189,74,44,.6));}}

.cu-ring-wrap{position:relative; width:clamp(240px,30vw,400px); aspect-ratio:1;}
.cu-ring{width:100%; height:100%; transform:rotate(-90deg);}
.cu-ring-track{fill:none; stroke:var(--line); stroke-width:8;}
.cu-ring-progress{fill:none; stroke:var(--accent); stroke-width:8;
  stroke-linecap:round; transition:stroke-dashoffset .9s linear, stroke .4s;}
.cu-ring-center{position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;}
.cu-time{font-family:'Fraunces',serif; font-weight:500;
  font-size:clamp(54px,7vw,118px); letter-spacing:-.02em;
  font-variant-numeric:tabular-nums; font-optical-sizing:auto; line-height:1;}
.cu-time.low{color:var(--accent); animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{50%{opacity:.5;}}
.cu-status{font-size:clamp(11px,1vw,15px); letter-spacing:.24em;
  text-transform:uppercase; color:var(--soft); margin-top:6px;}

.cu-controls{display:flex; align-items:center; gap:clamp(16px,2vw,28px);}
.cu-step{display:flex; flex-direction:column; align-items:center; gap:2px;
  width:clamp(74px,7vw,104px); height:clamp(74px,7vw,104px); border-radius:50%;
  border:1px solid var(--line); background:#fff; color:var(--ink); cursor:pointer;
  box-shadow:var(--shadow); transition:transform .12s, background .2s, color .2s;
  font-family:'Hanken Grotesk';}
.cu-step:hover{transform:translateY(-3px); background:var(--accent); color:#fff;
  border-color:var(--accent);}
.cu-step:active{transform:translateY(0) scale(.96);}
.cu-step-sym{font-size:clamp(28px,3vw,42px); line-height:1; font-weight:600; margin-top:8px;}
.cu-step-lbl{font-size:clamp(10px,.9vw,13px); letter-spacing:.08em; opacity:.72;}

.cu-play{min-width:clamp(140px,13vw,200px); height:clamp(54px,5.5vw,76px);
  border-radius:40px; border:none; background:var(--accent); color:#fdf7ee;
  font-family:'Hanken Grotesk'; font-size:clamp(18px,1.8vw,28px); font-weight:700;
  letter-spacing:.02em; cursor:pointer; box-shadow:0 8px 20px rgba(189,74,44,.32);
  transition:transform .12s, filter .2s;}
.cu-play:hover{filter:brightness(1.05); transform:translateY(-2px);}
.cu-play:active{transform:translateY(0) scale(.98);}
.cu-play.running{background:var(--ink); box-shadow:0 8px 20px rgba(42,32,23,.28);}

.cu-reset{background:none; border:none; color:var(--soft);
  font-family:'Hanken Grotesk'; font-size:clamp(13px,1.1vw,17px); cursor:pointer;
  letter-spacing:.03em;}
.cu-reset:hover{color:var(--accent);}

/* ---------- RIGHT : checklist ---------- */
.cu-right{
  flex:1; min-width:0; display:flex; flex-direction:column;
  background:var(--card); border:1px solid var(--line);
  border-radius:24px; box-shadow:var(--shadow);
  padding:clamp(20px,2vw,34px); min-height:0;
}
.cu-list-head{display:flex; align-items:center; gap:clamp(14px,1.5vw,24px);
  margin-bottom:clamp(16px,1.8vh,26px);}
.cu-count{font-size:clamp(14px,1.2vw,20px); font-weight:600; color:var(--soft);
  white-space:nowrap;}
.cu-bar{flex:1; height:clamp(8px,.9vw,12px); background:var(--line);
  border-radius:99px; overflow:hidden;}
.cu-bar-fill{height:100%;
  background:linear-gradient(90deg,var(--accent-2),var(--green));
  border-radius:99px; transition:width .4s ease;}

.cu-list{list-style:none; margin:0; padding:4px 4px 4px 0; display:flex;
  flex-direction:column; gap:2px; flex:1; min-height:0; overflow-y:auto;}
.cu-list::-webkit-scrollbar{width:8px;}
.cu-list::-webkit-scrollbar-thumb{background:var(--line); border-radius:99px;}

.cu-item{display:flex; align-items:center; gap:clamp(14px,1.3vw,20px);
  padding:clamp(14px,1.8vh,24px) 8px; border-radius:14px;
  transition:background .15s; animation:rise .4s ease both;}
.cu-item:hover{background:rgba(189,74,44,.05);}
.cu-item:hover .cu-del{opacity:1;}
@keyframes rise{from{opacity:0; transform:translateY(7px);}}

.cu-check{flex:none; width:clamp(42px,3.5vw,52px); height:clamp(42px,3.5vw,52px);
  border-radius:10px; border:2px solid var(--line); background:#fff; cursor:pointer;
  padding:0; display:flex; align-items:center; justify-content:center; transition:all .18s;}
.cu-check:hover{border-color:var(--accent);}
.cu-item.done .cu-check{background:var(--green); border-color:var(--green);}
.cu-tick{width:62%; height:62%; fill:none; stroke:#fff; stroke-width:3;
  stroke-linecap:round; stroke-linejoin:round;}

.cu-text{flex:1; font-size:calc(clamp(36px,4vw,64px) * var(--size-scale)); line-height:1.25; cursor:text;
  color:var(--ink); padding:6px 8px; margin:-6px -8px; border-radius:8px;
  word-break:break-word; outline:none; font-weight:500; transition:font-size .2s;}
.cu-text[contenteditable="true"]{background:#fff; box-shadow:0 0 0 2px var(--accent) inset;}
.cu-item.done .cu-text{text-decoration:line-through; color:var(--soft);
  text-decoration-color:var(--accent-2);}

.cu-del{flex:none; width:clamp(44px,3.5vw,54px); height:clamp(44px,3.5vw,54px);
  border:none; background:none; color:var(--soft);
  font-size:clamp(32px,3vw,42px); line-height:1; cursor:pointer; opacity:0;
  border-radius:9px; transition:opacity .15s, color .15s, background .15s;
  font-family:'Hanken Grotesk';}
.cu-del:hover{color:var(--accent); background:rgba(189,74,44,.1);}

.cu-empty{color:var(--soft); font-size:calc(clamp(24px,2vw,36px) * var(--size-scale)); text-align:center;
  padding:20px 0; list-style:none; transition:font-size .2s;}

.cu-footer{margin-top:clamp(14px,1.6vh,22px);}
.cu-add{display:flex; gap:10px;}
.cu-add-input{flex:1; font-family:'Hanken Grotesk'; font-size:calc(clamp(24px,2vw,36px) * var(--size-scale));
  border:1px solid var(--line); border-radius:13px;
  padding:clamp(11px,1.2vh,17px) clamp(13px,1.2vw,18px); background:#fff;
  color:var(--ink); outline:none; transition:border-color .2s, font-size .2s;}
.cu-add-input:focus{border-color:var(--accent);}
.cu-add-input::placeholder{color:#b3a690;}
.cu-add-btn{flex:none; border:none; border-radius:13px; padding:0 clamp(18px,2vw,30px);
  background:var(--ink); color:#fdf7ee; font-family:'Hanken Grotesk'; font-weight:600;
  font-size:calc(clamp(24px,2vw,36px) * var(--size-scale)); cursor:pointer; transition:background .2s, font-size .2s;}
.cu-add-btn:hover{background:var(--accent);}

.cu-clear{margin-top:12px; width:100%; background:none; border:1px dashed var(--line);
  color:var(--soft); border-radius:13px; padding:clamp(8px,1vh,12px);
  font-family:'Hanken Grotesk'; font-size:calc(clamp(18px,1.5vw,26px) * var(--size-scale)); cursor:pointer;
  transition:all .2s, font-size .2s; display:none;}
.cu-clear:hover{border-color:var(--accent); color:var(--accent);}

/* ---------- stack when not landscape ---------- */
@media (max-width:820px), (orientation:portrait){
  .cu-root{flex-direction:column;}
  .cu-content{flex-direction:column;}
  .cu-topbar{flex-direction:column; align-items:stretch;}
  .cu-left{flex:none;}
  .cu-right{flex:none; min-height:340px;}
}
</style>
</head>
<body>
<div class="cu-root">
  <!-- TOP CONTROLS -->
  <div class="cu-topbar">
    <div class="cu-controls-group">
      <div class="cu-size-controls">
        <button class="cu-size-btn" id="sizeDown" aria-label="Decrease text size">A−</button>
        <span class="cu-size-display" id="sizeDisplay">100%</span>
        <button class="cu-size-btn" id="sizeUp" aria-label="Increase text size">A+</button>
      </div>
    </div>
    <div class="cu-controls-group">
      <button class="cu-scheme-btn scheme-warm-swatch" id="scheme-warm" title="Warm" data-scheme="warm"></button>
      <button class="cu-scheme-btn scheme-dark-swatch" id="scheme-dark" title="Dark" data-scheme="dark"></button>
      <button class="cu-scheme-btn scheme-cool-swatch" id="scheme-cool" title="Cool" data-scheme="cool"></button>
      <button class="cu-scheme-btn scheme-forest-swatch" id="scheme-forest" title="Forest" data-scheme="forest"></button>
      <button class="cu-scheme-btn scheme-sunset-swatch" id="scheme-sunset" title="Sunset" data-scheme="sunset"></button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="cu-content">
    <!-- LEFT : timer -->
    <section class="cu-left">
      <div class="cu-head">
        <div class="cu-kicker">FOCUS SESSION</div>
        <h1 class="cu-title" id="title" title="Click to rename">To-Do List</h1>
      </div>

      <div class="cu-timer" id="timer">
        <div class="cu-ring-wrap">
          <svg viewBox="0 0 200 200" class="cu-ring">
            <circle cx="100" cy="100" r="86" class="cu-ring-track"></circle>
            <circle cx="100" cy="100" r="86" class="cu-ring-progress" id="ring"></circle>
          </svg>
          <div class="cu-ring-center">
            <div class="cu-time" id="time">25:00</div>
            <div class="cu-status" id="status">paused</div>
          </div>
        </div>

        <div class="cu-controls">
          <button class="cu-step" id="minus" aria-label="Subtract one minute">
            <span class="cu-step-sym">&minus;</span><span class="cu-step-lbl">1 min</span>
          </button>
          <button class="cu-play" id="play">Start</button>
          <button class="cu-step" id="plus" aria-label="Add one minute">
            <span class="cu-step-sym">+</span><span class="cu-step-lbl">1 min</span>
          </button>
        </div>

        <button class="cu-reset" id="reset">&#8634; reset to 25:00</button>
      </div>
    </section>

    <!-- RIGHT : checklist -->
    <section class="cu-right">
      <div class="cu-list-head">
        <span class="cu-count" id="count">0 of 0 done</span>
        <div class="cu-bar"><div class="cu-bar-fill" id="bar"></div></div>
      </div>

      <ul class="cu-list" id="list"></ul>

      <div class="cu-footer">
        <div class="cu-add">
          <input class="cu-add-input" id="addInput" placeholder="Add a task to catch up on&hellip;" />
          <button class="cu-add-btn" id="addBtn">Add</button>
        </div>
        <button class="cu-clear" id="clear">Clear completed</button>
      </div>
    </section>
  </div>
</div>

<script>
(function () {
  "use strict";

  var STORE_KEY = "catchup:v1";
  var R = 86, C = 2 * Math.PI * R;

  var state = {
    title: "To-Do List",
    items: [
      { id: 1, text: "Read the lecture notes I missed", done: false },
      { id: 2, text: "Finish the problem set", done: false },
      { id: 3, text: "Reply to outstanding emails", done: false }
    ],
    base: 25 * 60,
    secs: 25 * 60,
    running: false,
    finished: false,
    sizeScale: 1,
    colorScheme: "warm"
  };

  var tickId = null;

  // ---- elements ----
  var $ = function (id) { return document.getElementById(id); };
  var elRoot = document.querySelector(".cu-root");
  var elTitle = $("title"), elTimer = $("timer"), elRing = $("ring"),
      elTime = $("time"), elStatus = $("status"), elPlay = $("play"),
      elReset = $("reset"), elList = $("list"), elCount = $("count"),
      elBar = $("bar"), elAddInput = $("addInput"), elClear = $("clear"),
      elSizeDisplay = $("sizeDisplay");

  // ---- helpers ----
  function pad(n){ return String(n).padStart(2, "0"); }
  function fmt(s){ return pad(Math.floor(s/60)) + ":" + pad(s%60); }

  function save(){
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({
        title: state.title, items: state.items, base: state.base,
        sizeScale: state.sizeScale, colorScheme: state.colorScheme
      }));
    } catch (e) { }
  }
  function load(){
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      if (typeof d.title === "string") state.title = d.title;
      if (Array.isArray(d.items)) state.items = d.items;
      if (typeof d.base === "number") { state.base = d.base; state.secs = d.base; }
      if (typeof d.sizeScale === "number") state.sizeScale = d.sizeScale;
      if (typeof d.colorScheme === "string") state.colorScheme = d.colorScheme;
    } catch (e) { }
  }

  function beep(){
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      var ctx = new AC();
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = "sine"; o.frequency.value = 880;
      g.gain.setValueAtTime(0.001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
      o.start(); o.stop(ctx.currentTime + 0.6);
    } catch (e) { }
  }

  // ---- size controls ----
  function updateSize(){
    elRoot.style.setProperty("--size-scale", state.sizeScale);
    elSizeDisplay.textContent = Math.round(state.sizeScale * 100) + "%";
    save();
  }
  function sizeUp(){
    state.sizeScale = Math.min(2, state.sizeScale + 0.1);
    updateSize();
  }
  function sizeDown(){
    state.sizeScale = Math.max(0.6, state.sizeScale - 0.1);
    updateSize();
  }

  // ---- color scheme ----
  function setScheme(scheme){
    state.colorScheme = scheme;
    elRoot.className = "cu-root scheme-" + scheme;
    updateSchemeButtons();
    save();
  }
  function updateSchemeButtons(){
    document.querySelectorAll(".cu-scheme-btn").forEach(function(btn){
      var scheme = btn.getAttribute("data-scheme");
      btn.style.borderWidth = (scheme === state.colorScheme) ? "4px" : "2px";
    });
  }

  // ---- timer rendering ----
  function renderTimer(){
    var low = state.running && state.secs <= 60;
    var frac = state.base > 0 ? Math.max(0, Math.min(1, state.secs / state.base)) : 0;
    elTime.textContent = fmt(state.secs);
    elTime.classList.toggle("low", low);
    elRing.style.strokeDasharray = C;
    elRing.style.strokeDashoffset = C * (1 - frac);
    elStatus.textContent = state.finished ? "time's up" : (state.running ? "counting down" : "paused");
    elPlay.textContent = state.running ? "Pause" : (state.secs === 0 ? "Done" : "Start");
    elPlay.classList.toggle("running", state.running);
    elReset.innerHTML = "&#8634; reset to " + fmt(state.base);
    elTimer.classList.toggle("is-done", state.finished);
  }

  function tick(){
    state.secs -= 1;
    if (state.secs <= 0){
      state.secs = 0; state.running = false; state.finished = true;
      stopInterval(); beep();
    }
    renderTimer();
  }
  function startInterval(){ if (!tickId) tickId = setInterval(tick, 1000); }
  function stopInterval(){ if (tickId){ clearInterval(tickId); tickId = null; } }

  function adjust(delta){
    var idle = !state.running && state.secs === state.base;
    state.finished = false;
    state.secs = Math.max(0, state.secs + delta);
    if (idle) state.base = Math.max(0, state.base + delta);
    save(); renderTimer();
  }
  function toggleRun(){
    if (state.secs === 0) return;
    state.finished = false;
    state.running = !state.running;
    if (state.running) startInterval(); else stopInterval();
    renderTimer();
  }
  function reset(){
    state.running = false; state.finished = false;
    stopInterval(); state.secs = state.base;
    renderTimer();
  }

  // ---- checklist rendering ----
  function renderProgress(){
    var total = state.items.length;
    var done = state.items.filter(function(x){ return x.done; }).length;
    elCount.textContent = done + " of " + total + " done";
    elBar.style.width = (total ? Math.round(done/total*100) : 0) + "%";
    elClear.style.display = done > 0 ? "block" : "none";
    elClear.textContent = "Clear " + done + " completed";
  }

  function makeTick(){
    var ns = "http://www.w3.org/2000/svg";
    var svg = document.createElementNS(ns, "svg");
    svg.setAttribute("viewBox", "0 0 24 24"); svg.setAttribute("class", "cu-tick");
    var p = document.createElementNS(ns, "path");
    p.setAttribute("d", "M5 13l4 4L19 7"); svg.appendChild(p);
    return svg;
  }

  function renderList(){
    elList.innerHTML = "";
    if (state.items.length === 0){
      var empty = document.createElement("li");
      empty.className = "cu-empty";
      empty.textContent = "Nothing here yet — add your first task below.";
      elList.appendChild(empty);
      renderProgress();
      return;
    }
    state.items.forEach(function(item, i){
      var li = document.createElement("li");
      li.className = "cu-item" + (item.done ? " done" : "");
      li.style.animationDelay = (Math.min(i, 10) * 40) + "ms";

      var check = document.createElement("button");
      check.className = "cu-check";
      check.setAttribute("aria-label", item.done ? "Mark not done" : "Mark done");
      if (item.done) check.appendChild(makeTick());
      check.addEventListener("click", function(){
        item.done = !item.done; save(); renderList();
      });

      var text = document.createElement("span");
      text.className = "cu-text";
      text.textContent = item.text;
      text.title = "Click to edit";
      text.addEventListener("click", function(){
        if (text.getAttribute("contenteditable") === "true") return;
        text.setAttribute("contenteditable", "true");
        text.focus();
        var range = document.createRange();
        range.selectNodeContents(text);
        var sel = window.getSelection();
        sel.removeAllRanges(); sel.addRange(range);
      });
      text.addEventListener("keydown", function(e){
        if (e.key === "Enter"){ e.preventDefault(); text.blur(); }
        if (e.key === "Escape"){ text.textContent = item.text; text.blur(); }
      });
      text.addEventListener("blur", function(){
        text.removeAttribute("contenteditable");
        var v = text.textContent.trim();
        if (!v){ state.items = state.items.filter(function(x){ return x.id !== item.id; }); }
        else { item.text = v; }
        save(); renderList();
      });

      var del = document.createElement("button");
      del.className = "cu-del";
      del.setAttribute("aria-label", "Delete task");
      del.innerHTML = "&times;";
      del.addEventListener("click", function(){
        state.items = state.items.filter(function(x){ return x.id !== item.id; });
        save(); renderList();
      });

      li.appendChild(check); li.appendChild(text); li.appendChild(del);
      elList.appendChild(li);
    });
    renderProgress();
  }

  function addItem(){
    var v = elAddInput.value.trim();
    if (!v) return;
    state.items.push({ id: Date.now(), text: v, done: false });
    elAddInput.value = "";
    save(); renderList();
  }

  // ---- title editing ----
  elTitle.addEventListener("click", function(){
    if (elTitle.getAttribute("contenteditable") === "true") return;
    elTitle.setAttribute("contenteditable", "true");
    elTitle.focus();
  });
  elTitle.addEventListener("keydown", function(e){
    if (e.key === "Enter" || e.key === "Escape"){ e.preventDefault(); elTitle.blur(); }
  });
  elTitle.addEventListener("blur", function(){
    elTitle.removeAttribute("contenteditable");
    var v = elTitle.textContent.trim() || "To-Do List";
    state.title = v; elTitle.textContent = v; save();
  });

  // ---- wire up ----
  $("minus").addEventListener("click", function(){ adjust(-60); });
  $("plus").addEventListener("click", function(){ adjust(60); });
  elPlay.addEventListener("click", toggleRun);
  elReset.addEventListener("click", reset);
  $("addBtn").addEventListener("click", addItem);
  elAddInput.addEventListener("keydown", function(e){ if (e.key === "Enter") addItem(); });
  elClear.addEventListener("click", function(){
    state.items = state.items.filter(function(x){ return !x.done; });
    save(); renderList();
  });

  // ---- size controls ----
  $("sizeDown").addEventListener("click", sizeDown);
  $("sizeUp").addEventListener("click", sizeUp);

  // ---- color scheme ----
  document.querySelectorAll(".cu-scheme-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      setScheme(btn.getAttribute("data-scheme"));
    });
  });

  // ---- init ----
  load();
  elTitle.textContent = state.title;
  setScheme(state.colorScheme);
  updateSize();
  renderTimer();
  renderList();
})();
</script>
</body>
</html>
