<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fable Mad Libs</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky: #e8f0e4;
      --sun: #f5c542;
      --sun-glow: #fde68a;
      --stone: #3d3d3d;
      --cream: #fdf8f0;
      --cream-dark: #f5ece0;
      --ink: #2c2c2c;
      --card-shadow: 0 2px 20px rgba(74,124,89,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--sky); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

    .scene { position: relative; width: 100%; height: 240px; overflow: hidden; background: linear-gradient(180deg, #c9e4ca 0%, #e8f0e4 100%); }
    .hill { position: absolute; border-radius: 50%; }
    .hill-1 { width: 600px; height: 300px; background: #6ba368; left: -5%; bottom: -40%; }
    .hill-2 { width: 500px; height: 280px; background: #5a9a58; left: 30%; bottom: -50%; }
    .hill-3 { width: 700px; height: 320px; background: #4a7c59; right: -10%; bottom: -45%; }
    .sun-orb { position: absolute; top: 30px; right: 80px; width: 70px; height: 70px; background: var(--sun); border-radius: 50%; box-shadow: 0 0 40px var(--sun-glow); animation: pulse-sun 4s ease-in-out infinite; }
    @keyframes pulse-sun { 0%,100%{box-shadow:0 0 40px var(--sun-glow),0 0 80px rgba(245,197,66,.3)} 50%{box-shadow:0 0 55px var(--sun-glow),0 0 110px rgba(245,197,66,.4)} }
    .water-line { position: absolute; bottom: 0; width: 100%; height: 24px; background: linear-gradient(90deg,transparent,#a8d4f0,#5b9bd5,#a8d4f0,transparent); opacity: 0.6; animation: water-flow 3s ease-in-out infinite; }
    @keyframes water-flow { 0%,100%{transform:translateX(-5px)} 50%{transform:translateX(5px)} }
    .scene-emoji { position: absolute; font-size: 28px; bottom: 60px; animation: goat-bounce 2s ease-in-out infinite; }
    .e1{left:18%;font-size:20px;animation-delay:0s} .e2{left:27%;font-size:26px;animation-delay:.4s} .e3{left:37%;font-size:34px;animation-delay:.8s}
    @keyframes goat-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .title-wrap { position: absolute; bottom: 36px; right: 40px; text-align: right; }
    .title-wrap h1 { font-family:'Fraunces',serif; font-weight:900; font-size:2.4rem; color:var(--stone); line-height:1; letter-spacing:-1px; }
    .title-wrap .subtitle { font-size:.9rem; margin-top:4px; font-weight:600; transition:color .3s; }

    .container { max-width: 700px; margin: 0 auto; padding: 28px 20px 60px; }

    /* FABLE TABS */
    .fable-tabs-wrap { overflow-x: auto; padding-bottom: 6px; margin-bottom: 20px; }
    .fable-tabs-wrap::-webkit-scrollbar { height: 4px; }
    .fable-tabs-wrap::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    .fable-tabs { display: flex; gap: 8px; width: max-content; }
    .fable-tab {
      border: 2px solid #e0e0e0; border-radius: 50px; padding: 9px 18px;
      font-family:'Nunito',sans-serif; font-weight:700; font-size:.85rem;
      cursor:pointer; transition:all .22s; background:white; color:#777;
      white-space: nowrap; box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
    .fable-tab:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.1); }
    .fable-tab.active { border-color:var(--fable-color); color:var(--fable-color); transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,.12); }

    .fable-banner {
      background:white; border-radius:16px; padding:18px 22px; margin-bottom:24px;
      box-shadow:var(--card-shadow); border-left:5px solid var(--fable-color,#4a7c59); transition:border-color .3s;
    }
    .fable-banner h2 { font-family:'Fraunces',serif; font-weight:900; font-size:1.3rem; color:var(--stone); margin-bottom:4px; }
    .fable-banner p { font-size:.92rem; color:#666; line-height:1.5; }

    /* INPUT GRID */
    .input-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media(max-width:500px){ .input-grid{grid-template-columns:1fr} .title-wrap h1{font-size:1.7rem} .title-wrap{right:18px} .scene{height:200px} }
    .field {
      background:white; border-radius:14px; padding:13px 15px 11px;
      box-shadow:var(--card-shadow); transition:transform .2s,box-shadow .2s,border-color .2s;
      border:2px solid transparent; opacity:0; animation:field-in .4s ease forwards;
    }
    .field:focus-within { border-color:var(--fable-color,#6ba368); transform:translateY(-2px); box-shadow:0 4px 22px rgba(74,124,89,.18); }
    .field label { display:block; font-size:.68rem; text-transform:uppercase; letter-spacing:1.2px; font-weight:700; color:var(--fable-color,#4a7c59); margin-bottom:5px; transition:color .3s; }
    .field .hint { font-size:.73rem; color:#aaa; font-weight:400; text-transform:none; letter-spacing:0; }
    .field input { width:100%; border:none; outline:none; font-family:'Fraunces',serif; font-size:1.1rem; font-weight:700; color:var(--stone); background:transparent; padding:2px 0; }
    .field input::placeholder { color:#ccc; font-weight:400; }
    @keyframes field-in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* BUTTONS */
    .btn-row { display:flex; gap:11px; justify-content:center; margin-top:24px; flex-wrap:wrap; }
    .btn { border:none; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:700; font-size:.95rem; border-radius:50px; padding:13px 32px; transition:all .22s; letter-spacing:.4px; }
    .btn-primary { background:var(--fable-color,#4a7c59); color:white; box-shadow:0 4px 14px rgba(74,124,89,.28); transition:background .3s,transform .2s,box-shadow .2s; }
    .btn-primary:hover { filter:brightness(1.1); transform:translateY(-2px); }
    .btn-primary:active { transform:translateY(0); }
    .btn-secondary { background:white; color:#666; border:2px solid #ddd; }
    .btn-secondary:hover { border-color:#bbb; background:#f8f8f8; }
    .btn-shuffle { background:var(--sun); color:var(--stone); box-shadow:0 4px 10px rgba(245,197,66,.28); }
    .btn-shuffle:hover { background:#f7d06b; transform:translateY(-2px); }

    /* STORY */
    .story-container { margin-top:28px; opacity:0; transform:translateY(20px); transition:opacity .6s ease,transform .6s ease; }
    .story-container.visible { opacity:1; transform:translateY(0); }
    .story-card { background:var(--cream); border-radius:20px; padding:30px 26px; box-shadow:0 4px 28px rgba(0,0,0,.08); border:2px solid var(--cream-dark); position:relative; overflow:hidden; }
    .story-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:var(--fable-color,#4a7c59); transition:background .3s; }
    .story-label { font-family:'Fraunces',serif; font-weight:900; font-size:1.25rem; color:var(--fable-color,#4a7c59); margin-bottom:14px; display:flex; align-items:center; gap:8px; transition:color .3s; }
    .story-text { font-size:1.02rem; line-height:1.88; color:#3a3a3a; white-space:pre-line; }
    .story-text .filled { font-family:'Fraunces',serif; font-weight:700; color:var(--fable-color,#7a4988); padding:0 2px; }
    .mascot { position:absolute; bottom:-2px; right:20px; font-size:38px; animation:mascot-rise .8s ease-out forwards; opacity:0; }
    @keyframes mascot-rise { 0%{transform:translateY(30px);opacity:0} 100%{transform:translateY(0);opacity:1} }
    .print-btn { margin-top:18px; background:none; border:1px dashed #ccc; padding:7px 16px; border-radius:8px; cursor:pointer; font-family:'Nunito',sans-serif; font-size:.83rem; color:#999; transition:all .2s; }
    .print-btn:hover { border-color:var(--fable-color); color:var(--fable-color); }
    @media print { .scene,.fable-tabs-wrap,.fable-banner,.input-grid,.btn-row,.print-btn{display:none!important} .story-container{opacity:1!important;transform:none!important} .story-card{box-shadow:none;border:1px solid #ddd} }
  </style>
</head>
<body>

<div class="scene">
  <div class="sun-orb"></div>
  <div class="hill hill-1"></div>
  <div class="hill hill-2"></div>
  <div class="hill hill-3"></div>
  <span class="scene-emoji e1" id="em1">🐐</span>
  <span class="scene-emoji e2" id="em2">🐐</span>
  <span class="scene-emoji e3" id="em3">🐐</span>
  <div class="water-line"></div>
  <div class="title-wrap">
    <h1>Fable<br>Mad Libs</h1>
    <div class="subtitle" id="sceneSubtitle">Silly retellings of classic tales</div>
  </div>
</div>

<div class="container">
  <div class="fable-tabs-wrap"><div class="fable-tabs" id="fableTabs"></div></div>
  <div class="fable-banner">
    <h2 id="bannerTitle"></h2>
    <p id="bannerDesc"></p>
  </div>
  <div class="input-grid" id="inputGrid"></div>
  <div class="btn-row">
    <button class="btn btn-shuffle" onclick="randomFill()">🎲 Random</button>
    <button class="btn btn-primary" onclick="makeStory()">📖 Make Story</button>
    <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
  </div>
  <div class="story-container" id="storyContainer">
    <div class="story-card">
      <div class="story-label" id="storyLabel">📜 Your Story</div>
      <div class="story-text" id="storyText"></div>
      <span class="mascot" id="mascot"></span>
      <button class="print-btn" onclick="window.print()">🖨️ Print this story</button>
    </div>
  </div>
</div>

<script>
function w(t){ return `<span class="filled">${t}</span>`; }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function getVal(id, fb){ const el=document.getElementById(id); return (el&&el.value.trim())?el.value.trim():fb; }

const FABLES = [
  {
    id:'goats', name:'🐐 Three Billy Goats', color:'#4a7c59',
    emojis:['🐐','🐐','🐐'], subtitle:'Crossing the bridge...',
    title:'Three Billy Goats Gruff', desc:'Three brave goats must cross a bridge — but a fearsome troll lurks below!',
    mascots:['👹','🧌','👾','🦖'],

      {id:'place',    label:'Place',          hint:'a location',         ph:'e.g. volcano'},
      {id:'noun',     label:'Noun',           hint:'a thing',            ph:'e.g. waffle'},
      {id:'plural',   label:'Plural Noun',    hint:'things',             ph:'e.g. pickles'},

      {id:'creature', label:'Creature',       hint:'something scary',    ph:'e.g. blob monster'},

    ],
    randoms:{
      adj:['slimy','sparkly','enormous','wobbly','purple','funky','majestic','soggy','turbo','stinky'],
      animal:['flamingo','hamster','penguin','unicorn','robot','llama','wombat','narwhal'],
      place:['volcano','bathtub','moon','dance floor','laundromat','cloud','swamp'],
      noun:['waffle','spaceship','banana','toaster','kazoo','pancake','trampoline'],
      plural:['pickles','marshmallows','tacos','cupcakes','gummy bears','noodles','donuts'],
      phrase:['OH NOODLES','GREAT GOOGLY MOOGLY','WHAT THE BISCUIT','HOLY MEATBALLS','JUMPIN JELLYFISH'],
      creature:['blob monster','sock puppet','mega-toad','pizza goblin','dust bunny','homework monster'],
      verb:['tickle','juggle','yodel at','karate-chop','high-five','out-dance','smooch'],
      bodypart:['nose','elbow','left kneecap','forehead','earlobe'],
    },
    gen(v){
      const A=w(v.adj),AN=w(v.animal),P=w(v.place),N=w(v.noun),PL=w(v.plural),
            PH=w(v.phrase),CR=w(v.creature),VB=w(v.verb),BP=w(v.bodypart);
      return `Once upon a time, three ${A} ${AN}s lived on a ${N} hillside with very little ${PL} to eat. Across the ${P}, they saw a meadow full of ${A} ${PL}.

To reach it, they had to cross a ${A} bridge. But under the bridge lived a ${A} ${CR} troll.

First came the smallest ${AN}. "${PH}?" shouted the troll. "I'm going to the ${P} to ${VB} some ${PL}," said the little one. The troll yelled, "I'm going to ${VB} you!" But the small ${AN} said, "Wait for my ${A} sibling!" The troll let it pass.

Next came the middle ${AN}. "${PH}?" shouted the troll again. "I'm going to the ${P} to ${VB} some ${PL}." The troll growled, "I'm going to ${VB} you!" But the middle ${AN} said, "Wait for my ${A} sibling!" The troll let it pass.

Then came the BIGGEST ${AN}. The bridge ${VB}ed under its weight. "${PH}?" roared the troll. "I'm the ${A} one!" said the big ${AN}.

The troll jumped up to ${VB}, but the big ${AN} lowered its ${BP}, charged, and ${VB}ed the troll off the bridge and into the ${P} below.

After that, all three ${AN}s crossed the bridge safely and ate ${A} ${PL} in the sunny ${P}.

THE END 🐐`;
    }
  },

  {
    id:'goose', name:'🥚 Golden Goose', color:'#c8860a',
    emojis:['🪿','🥚','✨'], subtitle:'Be careful what you wish for...',
    title:'The Goose That Laid Golden Eggs', desc:'A magical goose lays golden eggs every day — until one greedy farmer ruins everything.',
    mascots:['🥚','🪿','💰','😩'],
    fields:[
      {id:'adj',      label:'Adjective',      hint:'describing word',   ph:'e.g. grumpy'},
      {id:'person',   label:'Type of Person', hint:'a job or type',     ph:'e.g. baker'},
      {id:'animal',   label:'Animal',         hint:'a farm animal',     ph:'e.g. duck'},
      {id:'place',    label:'Place',          hint:'a location',        ph:'e.g. treehouse'},
      {id:'noun',     label:'Noun',           hint:'a thing',           ph:'e.g. frisbee'},
      {id:'material', label:'Material',       hint:'what it\'s made of', ph:'e.g. cheese'},
      {id:'plural',   label:'Plural Noun',    hint:'things you want',   ph:'e.g. jet skis'},
      {id:'tool',     label:'Tool',           hint:'something to use',  ph:'e.g. spatula'},
    ],
    randoms:{

      person:['baker','plumber','detective','librarian','dentist','zookeeper','chef'],
      animal:['duck','chicken','flamingo','platypus','penguin','emu','turkey'],
      place:['treehouse','igloo','submarine','attic','swamp','abandoned shed'],
      noun:['frisbee','trophy','crown','golden thimble','jewelled spoon','diamond sock'],
      material:['cheese','bubble wrap','chocolate','spaghetti','clouds','solid gold'],
      plural:['jet skis','mansions','trampolines','swimming pools','yachts','pizza parlours'],
      tool:['spatula','soup ladle','giant spoon','salad tongs','oversized fork'],
    },
    gen(v){
      const A=w(v.adj),PS=w(v.person),AN=w(v.animal),P=w(v.place),
            N=w(v.noun),MAT=w(v.material),PL=w(v.plural),TL=w(v.tool);
      return `A ${A} ${PS} farmer owned a ${A} ${AN} that lived in a small ${P}. One morning, the farmer found a shiny ${A} ${N} in the nest. It wasn't normal — it was made of ${MAT}!

Every day, the ${AN} laid another ${A} ${N}, and the farmer became very ${A}. They started dreaming of ${PL}, more ${PL}, and even a giant ${N}.

But soon, the farmer grew ${A} and wanted all the ${PL} at once. They said, "Why wait? I'll get everything ${A} today!"

So the farmer picked up a ${TL} and ${A}ly opened the ${AN}'s ${A} belly, hoping to find a whole pile of ${PL} inside.

But there was nothing. No treasure. No ${PL}. Just one very ${A} mistake.

The farmer sat down in the ${P}, feeling ${A} and hollow, realising they had lost the one thing that brought them ${N} every single day.

MORAL: Don't sacrifice what you have for what you wish you had.

THE END 🪿`;
    }
  },

  {
    id:'ant', name:'🐜 Ant & Grasshopper', color:'#3a7d44',
    emojis:['🐜','🦗','❄️'], subtitle:'Work now, celebrate later.',
    title:'The Ant and the Grasshopper', desc:'One works all summer. One plays all summer. Only one survives the winter.',
    mascots:['🐜','🦗','❄️','🎻'],

      {id:'hopper',   label:'Lazy Animal',        hint:'a carefree one',    ph:'e.g. sloth'},
      {id:'adj',      label:'Adjective',          hint:'describing word',   ph:'e.g. sweaty'},
      {id:'place',    label:'Home/Storage',       hint:'somewhere to live', ph:'e.g. underground bunker'},
      {id:'plural',   label:'Plural Food',        hint:'things to eat',     ph:'e.g. crumpets'},
      {id:'verb1',    label:'Work Verb',          hint:'how the ant works', ph:'e.g. hauled'},
      {id:'verb2',    label:'Fun Verb',           hint:'how the hopper plays', ph:'e.g. tap-danced'},

    ],

      ant:['beaver','honeybee','squirrel','termite','dung beetle','industrious mole'],
      hopper:['sloth','lounging lizard','sleepy raccoon','chilled-out koala','yawning panda'],
      adj:['sweaty','magnificent','boiling','miserable','soggy','absolutely parched'],
      place:['underground bunker','cosy burrow','well-stocked cave','secret pantry','fortified den'],
      plural:['crumpets','sunflower seeds','giant biscuits','dried berries','mini quiches'],

      verb2:['tap-danced','yodelled','somersaulted','pirouetted','did the worm','freestyled'],

    },

            PL=w(v.plural),V1=w(v.verb1),V2=w(v.verb2),N=w(v.noun);
      return `All summer long, a hardworking ${A} ${AT} ${V1} ${PL} and stored them in its ${P}. The ${AT} worked every day, even when it was ${A} outside.

Nearby, a ${A} ${HP} spent the days ${V2} and ${V2}, playing tunes on a tiny ${N}. "Come relax with me!" the ${HP} called. But the ${AT} replied, "I must prepare for winter."

When winter finally came, the weather turned ${A} and food was nowhere to be found. The ${HP} had no ${PL} at all. Cold and hungry, it shuffled to the ${AT}'s ${P} and knocked pitifully for help.

The ${AT} shared a little ${PL}, but said warmly, "Next time, you should ${V1} ${PL} during summer, not just ${V2}."

The ${HP} felt ${A} and promised to be more like the ${AT} in the future.

MORAL: Prepare today for what you'll need tomorrow.

THE END 🐜`;
    }
  },

  {
    id:'goldilocks', name:'🐻 Goldilocks', color:'#b07d2c',
    emojis:['🐻','🥣','🛏️'], subtitle:'Just right — or is it?',
    title:'Goldilocks and the Three Bears', desc:'A curious girl sneaks into a house and samples everything — then gets a surprise.',
    mascots:['🐻','🥣','😱','🏃'],
    fields:[
      {id:'adj1',   label:'Adjective 1', hint:'too much of this',   ph:'e.g. volcanic'},
      {id:'adj2',   label:'Adjective 2', hint:'too little of this', ph:'e.g. arctic'},
      {id:'adj3',   label:'Adjective 3', hint:'just right!',        ph:'e.g. perfect'},
      {id:'person', label:'Person',      hint:'who is Goldilocks',  ph:'e.g. professor'},

      {id:'animal', label:'Animal',      hint:'who lives there',    ph:'e.g. pandas'},
    ],
    randoms:{
      adj1:['volcanic','scorching','overwhelmingly spicy','blisteringly hot','lava-temperature'],
      adj2:['arctic','ice-cold','frozen solid','numbingly cold','absolutely glacial'],
      adj3:['perfectly lukewarm','suspiciously ideal','disturbingly right','goldenly perfect','just right'],
      person:['professor','retired astronaut','enthusiastic librarian','confused tourist','sleepy doctor'],

Soon, the three ${AN} who lived there came home. They saw the ${F} had been eaten, the ${N} was broken, and there was a ${A3} ${PS} asleep in their bed.

Goldilocks woke up, saw the three ${AN}, screamed something ${A1}, and sprinted out of the house and back through the ${P}.

She never returned to the ${A3} house again.

THE END 🐻`;
    }
  },

  {
    id:'wolf_cry', name:'🐺 Boy Cried Wolf', color:'#2c6e8a',
    emojis:['🐺','😱','📢'], subtitle:'Tell the truth — always.',
    title:'The Boy Who Cried Wolf', desc:'A bored shepherd keeps fooling the village — until a real wolf shows up.',
    mascots:['🐺','😤','📢','😰'],
    fields:[
      {id:'adj',    label:'Adjective',      hint:'describing word',   ph:'e.g. bored'},
      {id:'person', label:'Type of Person', hint:'who the boy is',    ph:'e.g. intern'},
      {id:'animal', label:'Herd Animal',    hint:'what he watches',   ph:'e.g. llamas'},

let currentFable = FABLES[0];

function setColor(c){ document.documentElement.style.setProperty('--fable-color',c); }

function buildTabs(){
  const tabs = document.getElementById('fableTabs');
  tabs.innerHTML = '';
  FABLES.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'fable-tab' + (f.id===currentFable.id?' active':'');
    btn.textContent = f.name;
    btn.style.setProperty('--fable-color', f.color);
    btn.onclick = () => selectFable(f.id);
    tabs.appendChild(btn);
  });
}

function selectFable(id){
  currentFable = FABLES.find(f=>f.id===id);
  setColor(currentFable.color);
  document.querySelectorAll('.fable-tab').forEach((btn,i)=>{
    btn.classList.toggle('active', FABLES[i].id===id);
  });
  document.getElementById('bannerTitle').textContent = currentFable.title;
  document.getElementById('bannerDesc').textContent = currentFable.desc;
  document.getElementById('sceneSubtitle').textContent = currentFable.subtitle;
  document.getElementById('sceneSubtitle').style.color = currentFable.color;
  const em = currentFable.emojis;
  document.getElementById('em1').textContent = em[0]||'🐐';
  document.getElementById('em2').textContent = em[1]||'🐐';
  document.getElementById('em3').textContent = em[2]||'🐐';
  buildInputGrid();
  clearStory();
}

function buildInputGrid(){
  const grid = document.getElementById('inputGrid');
  grid.innerHTML='';
  currentFable.fields.forEach((f,i)=>{
    const d=document.createElement('div');
    d.className='field';
    d.style.animationDelay=`${0.04+i*0.05}s`;
    d.innerHTML=`<label for="${f.id}">${f.label} <span class="hint">· ${f.hint}</span></label><input id="${f.id}" placeholder="${f.ph}">`;
    grid.appendChild(d);
  });
  grid.querySelectorAll('input').forEach((inp,i,all)=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){ e.preventDefault(); i<all.length-1?all[i+1].focus():makeStory(); }
    });
  });
}

function randomFill(){
  currentFable.fields.forEach(f=>{
    const el=document.getElementById(f.id);
    if(el&&currentFable.randoms[f.id]){
      el.value=pick(currentFable.randoms[f.id]);
      el.parentElement.style.animation='none';
      el.parentElement.offsetHeight;
      el.parentElement.style.animation='field-in 0.3s ease forwards';
    }
  });
}

function makeStory(){
  const vals={};
  currentFable.fields.forEach(f=>{ vals[f.id]=getVal(f.id, f.ph.replace('e.g. ','')); });
  const story = currentFable.gen(vals);
  const container=document.getElementById('storyContainer');
  const textEl=document.getElementById('storyText');
  const mascot=document.getElementById('mascot');
  const label=document.getElementById('storyLabel');
  textEl.innerHTML=story;
  label.style.color=currentFable.color;
  mascot.textContent=pick(currentFable.mascots);
  mascot.style.animation='none'; mascot.offsetHeight;
  mascot.style.animation='mascot-rise 0.8s ease-out forwards';
  container.classList.add('visible');
  container.scrollIntoView({behavior:'smooth',block:'start'});
}

function clearAll(){
  document.querySelectorAll('input').forEach(i=>i.value='');
  clearStory();
}
function clearStory(){ document.getElementById('storyContainer').classList.remove('visible'); }
