<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goat Bridge Mad Lib</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --meadow: #4a7c59;
      --meadow-light: #6ba368;
      --sky: #e8f0e4;
      --sun: #f5c542;
      --sun-glow: #fde68a;
      --bridge: #8b6f47;
      --bridge-dark: #6b5335;
      --water: #5b9bd5;
      --water-light: #a8d4f0;
      --stone: #3d3d3d;
      --cream: #fdf8f0;
      --cream-dark: #f5ece0;
      --ink: #2c2c2c;
      --troll: #7a4988;
      --danger: #c0392b;
      --card-shadow: 0 2px 20px rgba(74,124,89,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--sky);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === SCENIC HEADER === */
    .scene {
      position: relative;
      width: 100%;
      height: 260px;
      overflow: hidden;
      background: linear-gradient(180deg, #c9e4ca 0%, #e8f0e4 100%);
    }

    .hills {
      position: absolute;
      bottom: 0;
      width: 120%;
      left: -10%;
    }

    .hill {
      position: absolute;
      border-radius: 50%;
      bottom: -60%;
    }

    .hill-1 { width: 600px; height: 300px; background: #6ba368; left: -5%; bottom: -40%; }
    .hill-2 { width: 500px; height: 280px; background: #5a9a58; left: 30%; bottom: -50%; }
    .hill-3 { width: 700px; height: 320px; background: #4a7c59; right: -10%; bottom: -45%; }

    .sun-orb {
      position: absolute;
      top: 30px;
      right: 80px;
      width: 70px;
      height: 70px;
      background: var(--sun);
      border-radius: 50%;
      box-shadow: 0 0 40px var(--sun-glow), 0 0 80px rgba(245,197,66,0.3);
      animation: pulse-sun 4s ease-in-out infinite;
    }

    @keyframes pulse-sun {
      0%, 100% { box-shadow: 0 0 40px var(--sun-glow), 0 0 80px rgba(245,197,66,0.3); }
      50% { box-shadow: 0 0 50px var(--sun-glow), 0 0 100px rgba(245,197,66,0.4); }
    }

    .bridge-art {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 80px;
    }

    .bridge-arc {
      width: 200px;
      height: 60px;
      border: 6px solid var(--bridge-dark);
      border-bottom: none;
      border-radius: 100px 100px 0 0;
      position: absolute;
      bottom: 20px;
      background: var(--bridge);
    }

    .bridge-plank {
      position: absolute;
      bottom: 18px;
      left: -10px;
      width: 220px;
      height: 10px;
      background: var(--bridge-dark);
      border-radius: 2px;
    }

    .water-line {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 24px;
      background: linear-gradient(90deg, transparent, var(--water-light), var(--water), var(--water-light), transparent);
      opacity: 0.6;
      animation: water-flow 3s ease-in-out infinite;
    }

    @keyframes water-flow {
      0%, 100% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
    }

    /* Goat silhouettes */
    .goat {
      position: absolute;
      font-size: 28px;
      bottom: 60px;
      animation: goat-bounce 2s ease-in-out infinite;
    }
    .goat-1 { left: 20%; font-size: 20px; animation-delay: 0s; }
    .goat-2 { left: 28%; font-size: 26px; animation-delay: 0.4s; }
    .goat-3 { left: 38%; font-size: 34px; animation-delay: 0.8s; }

    @keyframes goat-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .title-wrap {
      position: absolute;
      bottom: 40px;
      right: 40px;
      text-align: right;
    }

    .title-wrap h1 {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 2.6rem;
      color: var(--stone);
      line-height: 1;
      letter-spacing: -1px;
    }

    .title-wrap .subtitle {
      font-size: 0.95rem;
      color: var(--meadow);
      margin-top: 4px;
      font-weight: 600;
    }

    /* === MAIN CONTENT === */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .instructions {
      text-align: center;
      font-size: 1.05rem;
      color: #555;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .instructions strong {
      color: var(--meadow);
    }

    /* === INPUT GRID === */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 500px) {
      .input-grid { grid-template-columns: 1fr; }
      .title-wrap h1 { font-size: 1.8rem; }
      .title-wrap { right: 20px; }
      .scene { height: 220px; }
    }

    .field {
      position: relative;
      background: white;
      border-radius: 14px;
      padding: 14px 16px 12px;
      box-shadow: var(--card-shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid transparent;
    }

    .field:focus-within {
      border-color: var(--meadow-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(74,124,89,0.18);
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 700;
      color: var(--meadow);
      margin-bottom: 6px;
    }

    .field .hint {
      font-size: 0.75rem;
      color: #999;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
    }

    .field input {
      width: 100%;
      border: none;
      outline: none;
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--stone);
      background: transparent;
      padding: 2px 0;
    }

    .field input::placeholder {
      color: #ccc;
      font-weight: 400;
    }

    /* === BUTTONS === */
    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 28px;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 50px;
      padding: 14px 36px;
      transition: all 0.25s;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: var(--meadow);
      color: white;
      box-shadow: 0 4px 16px rgba(74,124,89,0.3);
    }

    .btn-primary:hover {
      background: var(--meadow-light);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(74,124,89,0.35);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: white;
      color: var(--meadow);
      border: 2px solid #ddd;
    }

    .btn-secondary:hover {
      border-color: var(--meadow-light);
      background: #f8fdf8;
    }

    .btn-shuffle {
      background: var(--sun);
      color: var(--stone);
      box-shadow: 0 4px 12px rgba(245,197,66,0.3);
    }

    .btn-shuffle:hover {
      background: #f7d06b;
      transform: translateY(-2px);
    }

    /* === STORY OUTPUT === */
    .story-container {
      margin-top: 32px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .story-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .story-card {
      background: var(--cream);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.08);
      border: 2px solid var(--cream-dark);
      position: relative;
      overflow: hidden;
    }

    .story-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--meadow), var(--sun), var(--water), var(--troll));
    }

    .story-label {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--meadow);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .story-text {
      font-size: 1.05rem;
      line-height: 1.85;
      color: #3a3a3a;
      white-space: pre-line;
    }

    .story-text .filled {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      color: var(--troll);
      background: linear-gradient(180deg, transparent 60%, rgba(122,73,136,0.12) 60%);
      padding: 0 2px;
    }

    /* Troll peek animation */
    .troll-peek {
      position: absolute;
      bottom: -2px;
      right: 20px;
      font-size: 40px;
      animation: troll-rise 0.8s ease-out forwards;
      opacity: 0;
    }

    @keyframes troll-rise {
      0% { transform: translateY(30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* Print-friendly */
    .story-card .print-btn {
      margin-top: 20px;
      background: none;
      border: 1px dashed #ccc;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      color: #888;
      transition: all 0.2s;
    }
    .story-card .print-btn:hover { border-color: var(--meadow); color: var(--meadow); }

    @media print {
      .scene, .input-grid, .btn-row, .instructions, .print-btn { display: none !important; }
      .story-container { opacity: 1 !important; transform: none !important; }
      .story-card { box-shadow: none; border: 1px solid #ddd; }
    }

    /* entrance animations */
    .field {
      opacity: 0;
      animation: field-in 0.4s ease forwards;
    }
    @keyframes field-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- SCENIC HEADER -->
<div class="scene">
  <div class="sun-orb"></div>
  <div class="hill hill-1"></div>
  <div class="hill hill-2"></div>
  <div class="hill hill-3"></div>
  <span class="goat goat-1">🐐</span>
  <span class="goat goat-2">🐐</span>
  <span class="goat goat-3">🐐</span>
  <div class="bridge-art">
    <div class="bridge-arc"></div>
    <div class="bridge-plank"></div>
  </div>
  <div class="water-line"></div>
  <div class="title-wrap">
    <h1>Goat Bridge<br>Mad Lib</h1>
    <div class="subtitle">A silly retelling of a classic tale</div>
  </div>
</div>

<!-- MAIN -->
<div class="container">
  <p class="instructions">
    Fill in <strong>eight words</strong> below, then hit <strong>Make Story</strong> to create your own wacky version of the Three Billy Goats Gruff.
  </p>

  <div class="input-grid">
    <div class="field" style="animation-delay:0.05s">
      <label>Adjective <span class="hint">· describing word</span></label>
      <input id="adj" placeholder="e.g. slimy">
    </div>
    <div class="field" style="animation-delay:0.1s">
      <label>Plural Animal <span class="hint">· more than one</span></label>
      <input id="plural" placeholder="e.g. flamingos">
    </div>
    <div class="field" style="animation-delay:0.15s">
      <label>Noun <span class="hint">· a thing</span></label>
      <input id="noun" placeholder="e.g. waffle">
    </div>
    <div class="field" style="animation-delay:0.2s">
      <label>Place <span class="hint">· a location</span></label>
      <input id="place" placeholder="e.g. volcano">
    </div>
    <div class="field" style="animation-delay:0.25s">
      <label>Another Noun <span class="hint">· another thing</span></label>
      <input id="noun2" placeholder="e.g. pickles">
    </div>
    <div class="field" style="animation-delay:0.3s">
      <label>Feeling <span class="hint">· an emotion</span></label>
      <input id="feeling" placeholder="e.g. confused">
    </div>
    <div class="field" style="animation-delay:0.35s">
      <label>Scary Creature <span class="hint">· something spooky</span></label>
      <input id="creature" placeholder="e.g. tax accountant">
    </div>
    <div class="field" style="animation-delay:0.4s">
      <label>Action Verb <span class="hint">· something you do</span></label>
      <input id="verb" placeholder="e.g. tickle">
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-shuffle" onclick="randomFill()">🎲 Random</button>
    <button class="btn btn-primary" onclick="makeStory()">📖 Make Story</button>
    <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
  </div>

  <div class="story-container" id="storyContainer">
    <div class="story-card">
      <div class="story-label">📜 Your Story</div>
      <div class="story-text" id="storyText"></div>
      <span class="troll-peek" id="trollPeek"></span>
      <button class="print-btn" onclick="window.print()">🖨️ Print this story</button>
    </div>
  </div>
</div>

<script>
  const randomWords = {
    adj: ['slimy', 'sparkly', 'enormous', 'invisible', 'wobbly', 'purple', 'funky', 'majestic', 'soggy', 'turbo'],
    plural: ['flamingos', 'hamsters', 'dinosaurs', 'penguins', 'unicorns', 'robots', 'squirrels', 'llamas', 'wombats'],
    noun: ['waffle', 'spaceship', 'banana', 'skateboard', 'toaster', 'kazoo', 'pancake', 'trampoline', 'pickle'],
    place: ['volcano', 'bathtub', 'moon', 'playground', 'dance floor', 'laundromat', 'jungle gym', 'cloud'],
    noun2: ['pickles', 'marshmallows', 'tacos', 'cupcakes', 'pizza slices', 'gummy bears', 'noodles', 'donuts'],
    feeling: ['confused', 'hangry', 'dramatic', 'bewildered', 'grumpy', 'ticklish', 'suspicious', 'flabbergasted'],
    creature: ['tax accountant', 'sock puppet', 'evil dentist', 'mega-toad', 'pizza goblin', 'homework monster', 'dust bunny'],
    verb: ['tickle', 'juggle', 'yodel at', 'karate-chop', 'high-five', 'smooch', 'challenge', 'out-dance']
  };

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function randomFill() {
    for (const key of Object.keys(randomWords)) {
      const el = document.getElementById(key);
      el.value = pick(randomWords[key]);
      el.parentElement.style.animation = 'none';
      el.parentElement.offsetHeight;
      el.parentElement.style.animation = 'field-in 0.3s ease forwards';
    }
  }

  function getVal(id, fallback) {
    return document.getElementById(id).value.trim() || fallback;
  }

  function w(text) {
    return `<span class="filled">${text}</span>`;
  }

  function makeStory() {
    const adj = getVal('adj', 'brave');
    const plural = getVal('plural', 'goats');
    const noun = getVal('noun', 'rocky');
    const place = getVal('place', 'river');
    const noun2 = getVal('noun2', 'grass');
    const feeling = getVal('feeling', 'angry');
    const creature = getVal('creature', 'troll');
    const verb = getVal('verb', 'eat');

    const A = w(adj), P = w(plural), N = w(noun), L = w(place);
    const N2 = w(noun2), F = w(feeling), C = w(creature), V = w(verb);
    const BIG = w(adj.toUpperCase());

    const story = `Once upon a time, three ${A} ${P} lived on a ${N} hillside. There was hardly any ${N} left for them to eat. Across a ${L}, however, was a meadow full of ${A} ${N2}.

The only way to reach it was by crossing an old ${A} bridge.

But under the bridge lived a ${F} ${C}.

The smallest ${P} went first.

"WHO'S THAT ${N} OVER MY BRIDGE?" shouted the ${C}, climbing up from below.

"It's only me, the little ${P}," said the smallest one. "I'm going to the ${L} to ${V} some ${N2}."

"I'm going to ${V} you!" yelled the ${C}.

"Oh, please don't," said the little one. "My big sibling is coming soon. They are much ${A}-er than me."

The ${C} thought about a bigger meal and said, "Fine. Go ahead."

Next came the middle ${P}.

"WHO'S THAT ${N} OVER MY BRIDGE?" yelled the ${C} again.

"It's the middle ${P}," said the goat.

"I'm going to ${V} you!" growled the ${C}.

"Better wait for my older sibling," said the goat. "They're the ${A}-est one of all."

The ${C} licked its lips. "Fine. Go on."

Then came the biggest ${P}.

The whole bridge ${N}-ed.

"WHO'S THAT ${N} OVER MY BRIDGE?" roared the ${C}.

"It's the ${BIG} ${P}," said the goat loudly.

"And I'm going to ${V} you!" screamed the ${C}, jumping onto the bridge.

But the big goat lowered its ${N}, charged forward, and ${V}-ed the ${C} so hard that it flew off the bridge and into the ${L} below.

The ${C} was never seen again.

After that, all three ${P} crossed the bridge whenever they wanted and ate ${A} ${N2} in the sunny ${L} for the rest of the season.

THE END 🐐`;

    const container = document.getElementById('storyContainer');
    const textEl = document.getElementById('storyText');
    const troll = document.getElementById('trollPeek');

    textEl.innerHTML = story;
    container.classList.add('visible');
    troll.textContent = ['👹','🧌','👾','👻','🦖'][Math.floor(Math.random()*5)];

    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function clearAll() {
    document.querySelectorAll('input').forEach(i => i.value = '');
    const container = document.getElementById('storyContainer');
    container.classList.remove('visible');
  }

  // Enter key cycles to next input or triggers story
  document.querySelectorAll('input').forEach((input, i, all) => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (i < all.length - 1) all[i + 1].focus();
        else makeStory();
      }
    });
  });
</script>

</body>
</html>
