<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reception Maths Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#7C3AED;--primary-light:#F3E8FF;--secondary:#EC4899;
  --success:#10B981;--danger:#EF4444;--warning:#F59E0B;
  --bg:#FDF4FF;--card:#ffffff;--text:#1E1B4B;--muted:#6B7280;--border:#E9D5FF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem;}
.wrap{width:100%;max-width:720px;padding-top:1rem;}
.screen{display:none;}.screen.active{display:block;}
.start-card{background:var(--card);border-radius:28px;padding:3rem 2.5rem;text-align:center;box-shadow:0 8px 40px rgba(124,58,237,.15);}
.mascot{font-size:5rem;display:block;margin-bottom:1rem;animation:bounce 2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.start-card h1{font-family:'Fredoka One',cursive;font-size:2.6rem;color:var(--primary);margin-bottom:.5rem;}
.start-card p{color:var(--muted);font-size:1.05rem;margin-bottom:1.5rem;}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
.info-box{background:var(--primary-light);border-radius:16px;padding:1rem;}
.info-box .num{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--primary);}
.info-box .lbl{font-size:.75rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.start-btn{background:var(--primary);color:#fff;border:none;border-radius:18px;padding:1.1rem 2.8rem;font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:800;cursor:pointer;transition:all .2s;}
.start-btn:hover{background:#6D28D9;transform:translateY(-2px);}
.qhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:1rem;}
.prog-wrap{flex:1;}
.prog-lbl{font-size:.85rem;color:var(--muted);font-weight:700;margin-bottom:4px;}
.prog-bar{height:12px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:99px;transition:width .5s ease;}
.timer{display:flex;align-items:center;gap:6px;background:var(--card);border-radius:14px;padding:.6rem 1rem;font-family:'Fredoka One',cursive;font-size:1.5rem;min-width:105px;justify-content:center;box-shadow:0 2px 12px rgba(124,58,237,.1);transition:color .3s;}
.timer.ok{color:#10B981;}.timer.warn{color:#F59E0B;}.timer.danger{color:#EF4444;animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.qcard{background:var(--card);border-radius:24px;padding:2rem 2.2rem;box-shadow:0 6px 30px rgba(124,58,237,.1);margin-bottom:1rem;animation:slideIn .35s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.topic-tag{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--primary);background:var(--primary-light);display:inline-block;padding:2px 10px;border-radius:99px;margin-bottom:.5rem;}
.diff-badge{display:inline-flex;align-items:center;font-size:.72rem;font-weight:800;text-transform:uppercase;padding:3px 10px;border-radius:99px;margin-bottom:.75rem;margin-left:6px;}
.diff-badge.easy{background:#D1FAE5;color:#059669;}.diff-badge.medium{background:#FEF3C7;color:#D97706;}.diff-badge.hard{background:#FEE2E2;color:#DC2626;}
.term-badge{display:inline-flex;font-size:.7rem;font-weight:800;text-transform:uppercase;padding:3px 10px;border-radius:99px;margin-left:6px;background:#EDE9FE;color:#7C3AED;}
.vis{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:.5rem;margin-bottom:1.4rem;padding:1.2rem;background:var(--primary-light);border-radius:18px;min-height:70px;}
.vis-emoji{font-size:2.4rem;line-height:1.1;}
.vis-num{font-family:'Fredoka One',cursive;font-size:4rem;color:var(--primary);text-align:center;width:100%;}
.vis-label{font-size:.85rem;font-weight:800;color:var(--muted);text-align:center;width:100%;margin-top:.3rem;}
.qtext{font-size:1.3rem;font-weight:800;color:var(--text);line-height:1.5;margin-bottom:1.2rem;text-align:center;}
.hint{font-size:.9rem;color:var(--muted);margin-bottom:1rem;font-style:italic;text-align:center;}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;}
.opt-btn{background:var(--primary-light);border:3px solid transparent;border-radius:18px;padding:1rem .75rem;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;color:var(--primary);cursor:pointer;text-align:center;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:.4rem;min-height:90px;justify-content:center;}
.opt-btn .opt-vis{font-size:2.2rem;line-height:1.1;}
.opt-btn .opt-txt{font-size:.95rem;}
.opt-btn:hover:not(:disabled){background:#EDE9FE;border-color:var(--primary);transform:translateY(-2px);}
.opt-btn.correct{background:#D1FAE5;border-color:var(--success);color:#065F46;}
.opt-btn.incorrect{background:#FEE2E2;border-color:var(--danger);color:#991B1B;}
.opt-btn:disabled{cursor:default;transform:none;}
.tf-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.tf-btn{padding:1.4rem 1rem;border-radius:20px;border:3px solid transparent;font-family:'Fredoka One',cursive;font-size:1.6rem;cursor:pointer;transition:all .18s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.3rem;}
.tf-btn.t-btn{background:#D1FAE5;color:#065F46;}.tf-btn.f-btn{background:#FEE2E2;color:#991B1B;}
.tf-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.1);}
.tf-btn.correct{border-color:var(--success);}.tf-btn.incorrect{border-color:var(--danger);opacity:.5;}
.tf-btn:disabled{cursor:default;transform:none;}
.tf-label{font-size:.9rem;font-weight:800;}
.fill-row{display:flex;gap:.75rem;align-items:center;justify-content:center;flex-wrap:wrap;}
.blank{border:3px solid var(--border);border-radius:14px;padding:.8rem 1rem;font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--text);background:var(--primary-light);outline:none;width:120px;text-align:center;transition:border-color .2s;}
.blank:focus{border-color:var(--primary);}
.blank.correct{border-color:var(--success);background:#D1FAE5;color:#065F46;}
.blank.incorrect{border-color:var(--danger);background:#FEE2E2;color:#991B1B;}
.sub-btn{background:var(--primary);color:#fff;border:none;border-radius:14px;padding:.8rem 1.6rem;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:800;cursor:pointer;transition:all .18s;}
.sub-btn:hover:not(:disabled){background:#6D28D9;transform:translateY(-1px);}
.sub-btn:disabled{opacity:.5;cursor:default;}
.order-list{display:flex;flex-direction:column;gap:.5rem;}
.order-item{background:var(--primary-light);border:2px solid var(--border);border-radius:14px;padding:.75rem 1rem;font-weight:800;font-size:1.2rem;cursor:grab;user-select:none;display:flex;align-items:center;gap:10px;transition:all .18s;}
.order-item:hover{background:#EDE9FE;}
.order-item.dragging{opacity:.3;}
.order-handle{color:var(--muted);font-size:1.1rem;}
.order-num{width:28px;height:28px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:800;color:var(--primary);flex-shrink:0;}
.order-item.correct-pos{border-color:var(--success);background:#D1FAE5;}
.order-item.incorrect-pos{border-color:var(--danger);background:#FEE2E2;}
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
.match-col-lbl{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.5rem;}
.drag-item{background:var(--primary-light);border:2px dashed var(--border);border-radius:12px;padding:.65rem 1rem;margin-bottom:.5rem;font-weight:700;font-size:1rem;cursor:grab;user-select:none;transition:all .18s;min-height:52px;display:flex;align-items:center;gap:8px;}
.drag-item:hover{background:#EDE9FE;border-color:var(--primary);}
.drag-item.dragging{opacity:.35;cursor:grabbing;}
.drop-zone{background:#F9F5FF;border:2px dashed var(--border);border-radius:12px;padding:.65rem 1rem;margin-bottom:.5rem;min-height:52px;display:flex;align-items:center;font-size:1rem;font-weight:700;transition:all .18s;}
.drop-zone.drag-over{border-color:var(--primary);background:var(--primary-light);}
.drop-zone.correct{border-color:var(--success);background:#D1FAE5;color:#065F46;border-style:solid;}
.drop-zone.incorrect{border-color:var(--danger);background:#FEE2E2;color:#991B1B;border-style:solid;}
.drop-placeholder{color:var(--muted);font-size:.85rem;font-weight:600;}
.feedback{border-radius:16px;padding:1rem 1.25rem;margin-top:1rem;font-weight:800;font-size:1rem;display:none;text-align:center;}
.feedback.show{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.feedback.correct{background:#D1FAE5;color:#065F46;}
.feedback.incorrect{background:#FEE2E2;color:#991B1B;}
.next-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:18px;padding:1.1rem;font-family:'Nunito',sans-serif;font-size:1.15rem;font-weight:800;cursor:pointer;display:none;transition:all .2s;margin-top:.75rem;}
.next-btn.show{display:block;animation:fadeIn .3s ease;}
.next-btn:hover{background:#6D28D9;transform:translateY(-2px);}
.results-card{background:var(--card);border-radius:28px;padding:3rem 2.5rem;text-align:center;box-shadow:0 8px 40px rgba(124,58,237,.12);}
.res-emoji{font-size:5rem;display:block;margin-bottom:1rem;animation:tada .8s ease;}
@keyframes tada{0%{transform:scale(1);}10%,20%{transform:scale(.9) rotate(-3deg);}30%,50%,70%,90%{transform:scale(1.1) rotate(3deg);}40%,60%,80%{transform:scale(1.1) rotate(-3deg);}100%{transform:scale(1) rotate(0);}}
.results-card h2{font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--primary);margin-bottom:.5rem;}
.score-big{font-family:'Fredoka One',cursive;font-size:4rem;color:var(--primary);line-height:1;margin:1rem 0;}
.score-big span{font-size:1.5rem;color:var(--muted);}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1.5rem 0;}
.stat-box{background:var(--primary-light);border-radius:16px;padding:1rem;}
.stat-box .sn{font-family:'Fredoka One',cursive;font-size:1.8rem;}
.stat-box .sl{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
.stat-box.g .sn{color:var(--success);}.stat-box.r .sn{color:var(--danger);}.stat-box.b .sn{color:var(--primary);}
.breakdown{margin-top:1.5rem;text-align:left;}
.breakdown h3{font-size:.85rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.75rem;}
.bd-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.9rem;}
.bd-row:last-child{border-bottom:none;}
.bd-pct{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--primary);}
.bd-bar-wrap{flex:1;margin:0 1rem;height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
.bd-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),var(--secondary));}
.restart-btn{background:var(--primary);color:#fff;border:none;border-radius:18px;padding:1.1rem 2.8rem;font-family:'Nunito',sans-serif;font-size:1.15rem;font-weight:800;cursor:pointer;transition:all .2s;margin-top:1.5rem;}
.restart-btn:hover{background:#6D28D9;transform:translateY(-2px);}
@media(max-width:500px){
  .opt-grid,.tf-grid,.stats-grid,.info-grid,.match-wrap{grid-template-columns:1fr;}
  .qcard{padding:1.5rem 1.2rem;}
}
</style>
</head>
<body>
<div class="wrap">
<div id="startScreen" class="screen active">
  <div class="start-card">
    <span class="mascot">🎨</span>
    <h1>Reception Maths</h1>
    <p>A picture maths quiz! Questions get harder as you go — do as many as you can in the time!</p>
    <div class="info-grid">
      <div class="info-box"><div class="num">80</div><div class="lbl">Questions</div></div>
      <div class="info-box"><div class="num">10</div><div class="lbl">Minutes</div></div>
      <div class="info-box"><div class="num">6</div><div class="lbl">Types</div></div>
    </div>
    <button class="start-btn" onclick="startQuiz()">▶ Start!</button>
  </div>
</div>
<div id="quizScreen" class="screen">
  <div class="qhdr">
    <div class="prog-wrap">
      <div class="prog-lbl" id="qLabel">Question 1 of 80</div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="timer ok" id="timerBox">⏱ 10:00</div>
  </div>
  <div class="qcard" id="qCard"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" tabindex="-1" onclick="nextQuestion()">Next ➜</button>
</div>
<div id="resultsScreen" class="screen">
  <div class="results-card">
    <span class="res-emoji" id="resEmoji">🎉</span>
    <h2 id="resTitle">Well done!</h2>
    <p style="color:var(--muted);margin-bottom:.5rem;">Here is how you did:</p>
    <div class="score-big" id="scoreBig">0 <span>/ 0</span></div>
    <div class="stats-grid">
      <div class="stat-box g"><div class="sn" id="statCorrect">0</div><div class="sl">Correct</div></div>
      <div class="stat-box r"><div class="sn" id="statWrong">0</div><div class="sl">Wrong</div></div>
      <div class="stat-box b"><div class="sn" id="statTime">0:00</div><div class="sl">Time Left</div></div>
    </div>
    <div class="breakdown" id="breakdown"></div>
    <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
  </div>
</div>
</div>
<script>
const TOTAL_TIME=10*60;

function em(e,n){return Array(n).fill('<span class="vis-emoji">'+e+'</span>').join('');}
function visBox(inner,label){return '<div class="vis">'+inner+(label?'<div class="vis-label">'+label+'</div>':'')+'</div>';}
function visEmojis(e,n,label){return visBox(em(e,n),label||'');}
function visBig(n){return visBox('<div class="vis-num">'+n+'</div>','');}
function visPlus(e1,n1,e2,n2,label){
  return visBox('<div style="display:flex;flex-direction:column;align-items:center;gap:.5rem;width:100%"><div style="display:flex;flex-wrap:wrap;gap:.3rem;justify-content:center">'+em(e1,n1)+'</div><div style="font-family:Fredoka One,cursive;font-size:1.8rem;color:var(--primary)">+</div><div style="display:flex;flex-wrap:wrap;gap:.3rem;justify-content:center">'+em(e2,n2)+'</div></div>',label||'');
}
function visMath(expr){return visBox('<div style="font-family:Fredoka One,cursive;font-size:2.6rem;color:var(--primary);text-align:center">'+expr+'</div>','');}
function visShape(svg,label){return visBox('<div style="text-align:center">'+svg+'</div>',label||'');}
function visPattern(str){return visBox('<div style="font-size:2.2rem;text-align:center;letter-spacing:.2rem">'+str+'<span style="font-family:Fredoka One,cursive;font-size:2rem;color:var(--primary)"> ?</span></div>','What comes next?');}

const BANK=[

// ═══════════════════════ EASY ═══════════════════════

{type:'mcq',topic:'Counting',term:'Autumn',difficulty:1,
 visual:visEmojis('⭐',3),q:'How many stars?',
 options:['1','2','3','4'],answer:2},

{type:'mcq',topic:'Counting',term:'Autumn',difficulty:1,
 visual:visEmojis('🍎',5),q:'How many apples?',
 options:['3','4','5','6'],answer:2},

{type:'mcq',topic:'Counting',term:'Autumn',difficulty:1,
 visual:visEmojis('🐸',4),q:'How many frogs?',
 options:['3','4','5','6'],answer:1},

{type:'mcq',topic:'Counting',term:'Autumn',difficulty:1,
 visual:visEmojis('🌟',6),q:'How many stars?',
 options:['4','5','6','7'],answer:2},

{type:'mcq',topic:'Counting',term:'Autumn',difficulty:1,
 visual:visEmojis('🦋',2),q:'How many butterflies?',
 options:['1','2','3','4'],answer:1},

{type:'truefalse',topic:'Counting',term:'Autumn',difficulty:1,
 visual:visEmojis('🐶',4),q:'There are 4 dogs.',answer:true},

{type:'truefalse',topic:'Counting',term:'Autumn',difficulty:1,
 visual:visEmojis('🍪',3),q:'There are 5 biscuits.',answer:false},

{type:'mcq',topic:'Counting',term:'Autumn',difficulty:1,
 visual:visBig(7),q:'Which number comes AFTER 7?',
 options:['6','8','9','5'],answer:1},

{type:'mcq',topic:'Counting',term:'Autumn',difficulty:1,
 visual:visBig(4),q:'Which number comes BEFORE 4?',
 options:['5','2','3','6'],answer:2},

{type:'truefalse',topic:'Counting',term:'Autumn',difficulty:1,
 visual:visBox('<div style="display:flex;flex-direction:column;gap:.3rem;align-items:center"><div>'+em('🐣',7)+'</div><div>'+em('🐣',5)+'</div></div>','Top row — bottom row'),
 q:'The top row has MORE chicks.',answer:true},

{type:'mcq',topic:'Addition & Subtraction',term:'Autumn',difficulty:1,
 visual:visPlus('🍓',2,'🍓',3,'2 + 3'),q:'How many altogether?',
 options:['4','5','6','3'],answer:1},

{type:'mcq',topic:'Addition & Subtraction',term:'Autumn',difficulty:1,
 visual:visPlus('🐥',1,'🐥',4,'1 + 4'),q:'How many chicks altogether?',
 options:['3','4','5','6'],answer:2},

{type:'truefalse',topic:'Addition & Subtraction',term:'Autumn',difficulty:1,
 visual:visPlus('🔵',3,'🔵',2,'3 + 2'),q:'3 + 2 = 5',answer:true},

{type:'mcq',topic:'Addition & Subtraction',term:'Autumn',difficulty:1,
 visual:visMath('1 more than 6 = ?'),q:'',
 options:['5','6','7','8'],answer:2},

{type:'mcq',topic:'Addition & Subtraction',term:'Autumn',difficulty:1,
 visual:visMath('1 less than 8 = ?'),q:'',
 options:['9','7','6','5'],answer:1},

{type:'mcq',topic:'Shape & Space',term:'Autumn',difficulty:1,
 visual:visShape('<svg width="90" height="90"><circle cx="45" cy="45" r="40" fill="#C4B5FD" stroke="#7C3AED" stroke-width="3"/></svg>'),
 q:'What shape is this?',
 options:['Triangle','Square','Circle','Rectangle'],answer:2},

{type:'mcq',topic:'Shape & Space',term:'Autumn',difficulty:1,
 visual:visShape('<svg width="90" height="90"><polygon points="45,5 85,85 5,85" fill="#FDE68A" stroke="#D97706" stroke-width="3"/></svg>'),
 q:'What shape is this?',
 options:['Square','Triangle','Circle','Rectangle'],answer:1},

{type:'mcq',topic:'Shape & Space',term:'Autumn',difficulty:1,
 visual:visShape('<svg width="90" height="90"><rect x="5" y="5" width="80" height="80" fill="#BBF7D0" stroke="#059669" stroke-width="3"/></svg>'),
 q:'How many sides does this shape have?',
 options:['3','4','5','0'],answer:1},

{type:'truefalse',topic:'Shape & Space',term:'Autumn',difficulty:1,
 visual:visShape('<svg width="90" height="90"><circle cx="45" cy="45" r="40" fill="#FCA5A5" stroke="#EF4444" stroke-width="3"/></svg>'),
 q:'A circle has 0 corners.',answer:true},

{type:'truefalse',topic:'Measures',term:'Autumn',difficulty:1,
 visual:visBox('<div style="display:flex;gap:2rem;align-items:center;justify-content:center"><div style="text-align:center"><div style="font-size:2.8rem">📏</div><div style="font-weight:800;color:var(--primary)">LONG</div></div><div style="text-align:center"><div style="font-size:1.6rem">📏</div><div style="font-weight:800;color:var(--muted)">short</div></div></div>'),
 q:'The LONGER ruler is bigger.',answer:true},

{type:'mcq',topic:'Measures',term:'Autumn',difficulty:1,
 visual:visBox('<div style="display:flex;gap:1.5rem;justify-content:center"><div style="text-align:center"><div style="font-size:3rem">🫙</div><div style="font-weight:800;font-size:.85rem;color:var(--primary)">FULL</div></div><div style="text-align:center"><div style="font-size:3rem">🫗</div><div style="font-weight:800;font-size:.85rem;color:var(--muted)">EMPTY</div></div></div>'),
 q:'Which jar is FULL?',
 options:['First','Second','Both','None'],answer:0},

{type:'mcq',topic:'Patterns',term:'Autumn',difficulty:1,
 visual:visPattern('🔴🔵🔴🔵🔴'),q:'',
 options:['Red','Blue','Green','Yellow'],answer:1},

{type:'mcq',topic:'Patterns',term:'Autumn',difficulty:1,
 visual:visPattern('🌙⭐🌙⭐🌙'),q:'',
 options:['Moon','Star','Sun','Rainbow'],answer:1},

// Match — easy
{type:'match',topic:'Shape & Space',term:'Autumn',difficulty:1,
 visual:visBox('<div style="display:flex;gap:1rem;justify-content:center"><svg width="50" height="50"><circle cx="25" cy="25" r="22" fill="#C4B5FD"/></svg><svg width="50" height="50"><polygon points="25,3 47,47 3,47" fill="#FDE68A"/></svg><svg width="50" height="50"><rect x="3" y="3" width="44" height="44" fill="#BBF7D0"/></svg></div>','Circle — Triangle — Square'),
 q:'Match each shape to its number of sides:',
 pairs:[{left:'Circle',right:'0 sides'},{left:'Triangle',right:'3 sides'},{left:'Square',right:'4 sides'}]},

// ═══════════════════════ MEDIUM ═══════════════════════

// ====================== STATE ======================
let questions=[],current=0,score=0,wrong=0,secondsLeft=TOTAL_TIME;
let timerInterval=null,answered=false;
let topicScores={},diffScores={};
let dragSrc=null,orderDragItem=null;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startQuiz(){
  const easy=shuffle(BANK.filter(q=>q.difficulty===1));
  const med=shuffle(BANK.filter(q=>q.difficulty===2));
  const hard=shuffle(BANK.filter(q=>q.difficulty===3));
  const ep=easy.slice(0,27),mp=med.slice(0,27),hp=hard.slice(0,Math.max(0,80-ep.length-mp.length));
  questions=[...ep,...mp,...hp];
  current=0;score=0;wrong=0;secondsLeft=TOTAL_TIME;answered=false;topicScores={};diffScores={};
  document.getElementById('startScreen').classList.remove('active');
  document.getElementById('quizScreen').classList.add('active');
  startTimer();renderQ();
}

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{secondsLeft--;updateTimer();if(secondsLeft<=0){clearInterval(timerInterval);showResults();}},1000);
}
function updateTimer(){
  const m=Math.floor(secondsLeft/60),s=secondsLeft%60;
  const box=document.getElementById('timerBox');
  box.textContent='⏱ '+m+':'+s.toString().padStart(2,'0');
  box.className='timer';
  if(secondsLeft>120)box.classList.add('ok');
  else if(secondsLeft>60)box.classList.add('warn');
  else box.classList.add('danger');
}

function renderQ(){
  answered=false;
  const q=questions[current];
  document.getElementById('qLabel').textContent='Question '+(current+1)+' of '+questions.length;
  document.getElementById('progFill').style.width=(current/questions.length*100)+'%';
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
  const diffText=q.difficulty===1?'Easy':q.difficulty===2?'Medium':'Hard';
  const diffClass=q.difficulty===1?'easy':q.difficulty===2?'medium':'hard';
  let html='<div><span class="topic-tag">'+q.topic+'</span><span class="diff-badge '+diffClass+'">'+diffText+'</span><span class="term-badge">'+q.term+'</span></div>';
  if(q.visual)html+=q.visual;
  if(q.q)html+='<div class="qtext">'+q.q+'</div>';
  if(q.hint)html+='<div class="hint">'+q.hint+'</div>';

  if(q.type==='mcq'){
    const letters=['A','B','C','D'];
    const sh=shuffle(q.options.map((o,i)=>({o,origIdx:i})));
    html+='<div class="opt-grid">'+sh.map((item,i)=>{
      const o=item.o;
      const visHtml=typeof o==='object'?'<span class="opt-vis">'+o.vis+'</span><span class="opt-txt">'+o.txt+'</span>':'<span class="opt-vis">'+o+'</span>';
      return '<button class="opt-btn" data-correct="'+(item.origIdx===q.answer)+'" onclick="checkMCQ(this)">'+visHtml+'</button>';
    }).join('')+'</div>';
  }
  else if(q.type==='truefalse'){
    const trueFirst=Math.random()<0.5;
    const tBtn='<button class="tf-btn t-btn" onclick="checkTF(this,true,'+q.answer+')"><span>✅</span><span class="tf-label">True</span></button>';
    const fBtn='<button class="tf-btn f-btn" onclick="checkTF(this,false,'+q.answer+')"><span>❌</span><span class="tf-label">False</span></button>';
    html+='<div class="tf-grid">'+(trueFirst?tBtn+fBtn:fBtn+tBtn)+'</div>';
  }
  else if(q.type==='fillin'){
    html+='<div class="fill-row"><input class="blank" id="blankInp" type="text" placeholder="?" autocomplete="off" onkeydown="if(event.key===\'Enter\'){event.preventDefault();if(answered)nextQuestion();else submitFill(null);}"/><button class="sub-btn" onclick="submitFill(this)">Check ✓</button></div>';
  }
  else if(q.type==='match'){
    const shuffledR=shuffle(q.pairs.map(p=>p.right));
    html+='<div class="match-wrap"><div><div class="match-col-lbl">Drag these</div>'+shuffledR.map(r=>'<div class="drag-item" draggable="true" data-val="'+r+'" ondragstart="dStart(event)" ondragend="dEnd(event)">'+r+'</div>').join('')+'</div><div><div class="match-col-lbl">Drop here</div>'+q.pairs.map(p=>'<div class="drop-zone" data-correct="'+p.right+'" data-left="'+p.left+'" ondragover="dOver(event)" ondrop="dDrop(event)" ondragleave="dLeave(event)"><b style="margin-right:8px;">'+p.left+'</b><span class="drop-placeholder" id="dp_'+encodeId(p.left)+'">drop here</span></div>').join('')+'</div></div><button class="sub-btn" style="margin-top:.75rem;" onclick="submitMatch(this)">Check ✓</button>';
  }
  else if(q.type==='order'){
    const sh=shuffle(q.items);
    html+='<div class="order-list" id="orderList">'+sh.map((item,i)=>'<div class="order-item" draggable="true" data-val="'+item+'" ondragstart="oDragStart(event)" ondragend="oDragEnd(event)" ondragover="oDragOver(event)" ondrop="oDrop(event)"><span class="order-handle">⠿</span><span class="order-num">'+(i+1)+'</span><span>'+item+'</span></div>').join('')+'</div><button class="sub-btn" style="margin-top:.75rem;" data-order=\''+JSON.stringify(q.correctOrder)+'\' onclick="submitOrder(this,JSON.parse(this.dataset.order))">Check ✓</button>';
  }

  document.getElementById('qCard').innerHTML=html;
  document.getElementById('qCard').style.animation='none';
  void document.getElementById('qCard').offsetWidth;
  document.getElementById('qCard').style.animation='slideIn .35s ease';
  const inp=document.getElementById('blankInp');
  if(inp)setTimeout(()=>inp.focus(),50);
}

function encodeId(s){return s.replace(/[^a-z0-9]/gi,'_');}

function markCorrect(msg){
  score++;
  const q=questions[current];
  if(!topicScores[q.topic])topicScores[q.topic]={c:0,t:0};
  topicScores[q.topic].c++;topicScores[q.topic].t++;
  if(!diffScores[q.difficulty])diffScores[q.difficulty]={c:0,t:0};
  diffScores[q.difficulty].c++;diffScores[q.difficulty].t++;
  showFeedback(true,'✅ '+(msg||'Well done!'));showNext();
}
function markWrong(msg){
  wrong++;
  const q=questions[current];
  if(!topicScores[q.topic])topicScores[q.topic]={c:0,t:0};
  topicScores[q.topic].t++;
  if(!diffScores[q.difficulty])diffScores[q.difficulty]={c:0,t:0};
  diffScores[q.difficulty].t++;
  showFeedback(false,'❌ '+(msg||'Good try!'));showNext();
}
function showFeedback(ok,msg){const fb=document.getElementById('feedback');fb.className='feedback '+(ok?'correct':'incorrect')+' show';fb.textContent=msg;}
function showNext(){answered=true;document.getElementById('nextBtn').className='next-btn show';}

function checkMCQ(btn){
  if(answered)return;
  const isCorrect=btn.dataset.correct==='true';
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(isCorrect){btn.classList.add('correct');markCorrect('Correct! 🌟');}
  else{btn.classList.add('incorrect');document.querySelectorAll('.opt-btn').forEach(b=>{if(b.dataset.correct==='true')b.classList.add('correct');});markWrong('Not quite — the answer is in green.');}
}
function checkTF(btn,chosen,correct){
  if(answered)return;
  document.querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
  if(chosen===correct){btn.classList.add('correct');markCorrect('That\'s right! 🌟');}
  else{btn.classList.add('incorrect');document.querySelectorAll('.tf-btn').forEach(b=>{const isT=b.classList.contains('t-btn');if((isT&&correct)||(!isT&&!correct))b.classList.add('correct');});markWrong('The answer was '+(correct?'True':'False')+'.');}
}
function submitFill(btn){
  if(answered)return;
  const inp=document.getElementById('blankInp');
  const val=inp.value.trim().toLowerCase().replace(/\s+/g,' ');
  if(!val)return;
  const q=questions[current];
  inp.disabled=true;if(btn)btn.disabled=true;
  const accepted=[q.answer,...(q.accept||[])].map(a=>String(a).toLowerCase().replace(/\s+/g,' '));
  if(accepted.includes(val)){inp.classList.add('correct');markCorrect('Correct! The answer is '+q.answer+' 🌟');}
  else{inp.classList.add('incorrect');markWrong('Not quite — the answer was '+q.answer+'.');}
}
function dStart(e){dragSrc=e.target;e.target.classList.add('dragging');e.dataTransfer.setData('text/plain',e.target.dataset.val);}
function dEnd(e){e.target.classList.remove('dragging');}
function dOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dLeave(e){e.currentTarget.classList.remove('drag-over');}
function dDrop(e){
  e.preventDefault();const zone=e.currentTarget;zone.classList.remove('drag-over');
  const val=e.dataTransfer.getData('text/plain');
  const id='dp_'+encodeId(zone.dataset.left);
  const span=document.getElementById(id);
  if(span){span.textContent=val;span.classList.remove('drop-placeholder');span.style.color='var(--text)';}
  zone.dataset.dropped=val;zone.classList.add('filled');
}
function submitMatch(btn){
  if(answered)return;
  const zones=document.querySelectorAll('.drop-zone');let allRight=true;
  zones.forEach(z=>{const dropped=z.dataset.dropped||'';if(dropped===z.dataset.correct)z.classList.add('correct');else{z.classList.add('incorrect');allRight=false;}});
  btn.disabled=true;
  if(allRight)markCorrect('Perfect matching! 🌟');else markWrong('Some matches were wrong. Correct ones are in green.');
}
function oDragStart(e){orderDragItem=e.currentTarget;e.currentTarget.classList.add('dragging');}
function oDragEnd(e){e.currentTarget.classList.remove('dragging');}
function oDragOver(e){e.preventDefault();}
function oDrop(e){
  e.preventDefault();const tgt=e.currentTarget;if(tgt===orderDragItem)return;
  const list=document.getElementById('orderList');const items=[...list.querySelectorAll('.order-item')];
  const si=items.indexOf(orderDragItem),ti=items.indexOf(tgt);
  if(si<ti)list.insertBefore(orderDragItem,tgt.nextSibling);else list.insertBefore(orderDragItem,tgt);
  [...list.querySelectorAll('.order-item')].forEach((el,i)=>el.querySelector('.order-num').textContent=i+1);
}
function submitOrder(btn,correctOrder){
  if(answered)return;
  const list=document.getElementById('orderList');const items=[...list.querySelectorAll('.order-item')];let allRight=true;
  items.forEach((el,i)=>{if(el.dataset.val===correctOrder[i])el.classList.add('correct-pos');else{el.classList.add('incorrect-pos');allRight=false;}el.setAttribute('draggable','false');});
  btn.disabled=true;
  if(allRight)markCorrect('Perfect order! 🌟');else markWrong('Correct order: '+correctOrder.join(' → '));
}
function nextQuestion(){current++;if(current>=questions.length)showResults();else renderQ();}
function showResults(){
  clearInterval(timerInterval);
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('resultsScreen').classList.add('active');
  const cnt=current,pct=cnt>0?Math.round((score/cnt)*100):0;
  let emoji='⭐',title='Keep practising!';
  if(pct>=90){emoji='🏆';title='Outstanding!';}else if(pct>=70){emoji='🎉';title='Well done!';}else if(pct>=50){emoji='👍';title='Good effort!';}
  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resTitle').textContent=title;
  document.getElementById('scoreBig').innerHTML=score+' <span>/ '+cnt+' answered</span>';
  document.getElementById('statCorrect').textContent=score;
  document.getElementById('statWrong').textContent=wrong;
  const m=Math.floor(secondsLeft/60),s=secondsLeft%60;
  document.getElementById('statTime').textContent=m+':'+s.toString().padStart(2,'0');
  let bdHtml='<h3>Topic breakdown</h3>';
  Object.entries(topicScores).forEach(([topic,{c,t}])=>{
    const p=Math.round((c/t)*100);
    bdHtml+='<div class="bd-row"><span style="flex:0 0 160px;font-weight:700;font-size:.88rem;">'+topic+'</span><div class="bd-bar-wrap"><div class="bd-bar" style="width:'+p+'%"></div></div><span class="bd-pct">'+c+'/'+t+'</span></div>';
  });
  document.getElementById('breakdown').innerHTML=bdHtml;
}
function restartQuiz(){document.getElementById('resultsScreen').classList.remove('active');document.getElementById('startScreen').classList.add('active');}
</script>
