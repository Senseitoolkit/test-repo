<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>言の葉 — Japanese Phrase Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo-deep:#13213b;
    --indigo:#21385c;
    --indigo-soft:#3a557f;
    --washi:#f5efe1;
    --washi-dim:#e7ddc6;
    --washi-line:#d8cdb2;
    --ink:#222530;
    --ink-soft:#5a5d68;
    --shu:#c43d28;
    --shu-soft:#d9694f;
    --gold:#b6893e;
    --good:#2e7d52;
    --bad:#b23a2e;
    --radius:18px;
    --shadow:0 18px 40px -22px rgba(8,16,32,.85);
    --ff-jp:'Shippori Mincho',serif;
    --ff-ui:'Zen Kaku Gothic New',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--ff-ui);
    color:var(--ink);
    background:
      radial-gradient(circle at 18% -10%, #2a456e 0%, transparent 45%),
      radial-gradient(circle at 100% 100%, #1b2f50 0%, transparent 50%),
      linear-gradient(160deg,#14233f 0%,#101c33 100%);
    background-attachment:fixed;
    min-height:100vh;
    padding:clamp(14px,3vw,34px);
    -webkit-font-smoothing:antialiased;
  }
  .grain{position:fixed;inset:0;pointer-events:none;opacity:.05;z-index:0;
    background-image:radial-gradient(rgba(255,255,255,.9) .8px,transparent .8px);
    background-size:7px 7px;}
  .wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;}

  /* ---------- Header ---------- */
  header{display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .seal{
    flex:0 0 auto;width:58px;height:58px;border-radius:14px;
    border:2.5px solid var(--shu);color:var(--washi);
    font-family:var(--ff-jp);font-weight:800;font-size:30px;
    display:grid;place-items:center;
    background:linear-gradient(160deg,#c43d28,#a52e1d);
    box-shadow:0 8px 18px -8px rgba(196,61,40,.7);
    letter-spacing:-1px;
  }
  .brand h1{font-family:var(--ff-jp);font-weight:800;color:var(--washi);
    font-size:clamp(26px,5vw,34px);line-height:1;letter-spacing:1px}
  .brand p{color:#a9bbd6;font-size:13px;margin-top:6px;letter-spacing:.4px}
  .hub-link{
    margin-left:auto;align-self:center;text-decoration:none;
    font-family:var(--ff-jp);font-weight:600;font-size:14px;
    color:var(--washi);background:rgba(245,239,225,.07);
    border:1px solid rgba(245,239,225,.25);border-radius:10px;
    padding:9px 14px;white-space:nowrap;transition:background .15s,border-color .15s}
  .hub-link:hover{background:rgba(245,239,225,.16);border-color:var(--shu-soft)}

  /* ---------- Mode tabs ---------- */
  .tabs{display:flex;gap:6px;background:rgba(255,255,255,.06);padding:6px;
    border-radius:14px;margin-bottom:16px;backdrop-filter:blur(4px)}
  .tab{flex:1;border:0;cursor:pointer;padding:12px 8px;border-radius:9px;
    font-family:var(--ff-ui);font-weight:700;font-size:15px;color:#aebbd2;
    background:transparent;transition:.18s;display:flex;align-items:center;
    justify-content:center;gap:8px}
  .tab .jp{font-family:var(--ff-jp);font-size:13px;opacity:.75}
  .tab[aria-selected="true"]{background:var(--washi);color:var(--indigo-deep);
    box-shadow:0 6px 14px -8px rgba(0,0,0,.6)}

  /* ---------- Control bar ---------- */
  .controls{background:var(--washi);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow);
    border:1px solid var(--washi-dim)}
  .ctl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .ctl-row + .ctl-row{margin-top:12px;padding-top:12px;
    border-top:1px solid var(--washi-line)}
  .ctl-label{font-size:11px;font-weight:700;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--ink-soft);
    flex:0 0 100%;margin-bottom:-2px}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{border:1.5px solid var(--washi-line);background:transparent;cursor:pointer;
    padding:7px 12px;border-radius:999px;font-family:var(--ff-ui);font-size:13px;
    font-weight:600;color:var(--ink-soft);transition:.15s;display:flex;
    align-items:center;gap:6px}
  .chip .jp{font-family:var(--ff-jp);font-size:13px}
  .chip:hover{border-color:var(--indigo-soft)}
  .chip[aria-pressed="true"]{background:var(--indigo);color:var(--washi);
    border-color:var(--indigo)}
  .chip[aria-pressed="true"] .en{opacity:.8}

  /* switch */
  .switch{display:flex;align-items:center;gap:10px;cursor:pointer;
    margin-left:auto;font-size:13px;font-weight:600;color:var(--ink-soft)}
  .track{width:46px;height:26px;border-radius:999px;background:var(--washi-dim);
    position:relative;transition:.18s;flex:0 0 auto}
  .track::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;
    border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .switch[aria-pressed="true"] .track{background:var(--shu)}
  .switch[aria-pressed="true"] .track::after{transform:translateX(20px)}

  .seg{display:flex;background:var(--washi-dim);border-radius:10px;padding:4px;gap:4px}
  .seg button{border:0;background:transparent;cursor:pointer;padding:8px 14px;
    border-radius:7px;font-family:var(--ff-ui);font-weight:700;font-size:13px;
    color:var(--ink-soft);transition:.15s;display:flex;align-items:center;gap:6px}
  .seg button .jp{font-family:var(--ff-jp)}
  .seg button[aria-pressed="true"]{background:#fff;color:var(--indigo-deep);
    box-shadow:0 2px 6px -3px rgba(0,0,0,.4)}

  /* ---------- Ruby / furigana ---------- */
  ruby{ruby-align:center}
  rt{font-family:var(--ff-ui);font-weight:500;color:var(--shu-soft);
    font-size:.46em;letter-spacing:0;transition:opacity .2s}
  .no-furi rt{visibility:hidden}

  /* ---------- Learn card ---------- */
  .stage{perspective:1400px;margin-bottom:14px}
  .card{cursor:pointer;border:0;background:transparent;width:100%;padding:0;
    display:block;font-family:inherit}
  .card-inner{position:relative;width:100%;min-height:260px;
    transition:transform .55s cubic-bezier(.4,.1,.2,1);transform-style:preserve-3d}
  .card.flipped .card-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;
    -webkit-backface-visibility:hidden;border-radius:var(--radius);
    background:var(--washi);box-shadow:var(--shadow);
    border:1px solid var(--washi-dim);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:30px 24px;text-align:center}
  .face.back{transform:rotateY(180deg)}
  .face::before{content:"";position:absolute;inset:9px;border-radius:11px;
    border:1px solid var(--washi-line);pointer-events:none}
  .face-tag{position:absolute;top:14px;left:16px;font-size:10px;font-weight:800;
    letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft)}
  .cat-pill{position:absolute;top:12px;right:14px;font-size:11px;font-weight:700;
    color:var(--washi);background:var(--indigo-soft);padding:4px 10px;
    border-radius:999px;font-family:var(--ff-jp)}
  .jp-big{font-family:var(--ff-jp);font-weight:700;color:var(--ink);
    font-size:clamp(28px,7vw,42px);line-height:1.9}
  .en-big{font-size:clamp(22px,5vw,30px);font-weight:700;color:var(--ink);
    line-height:1.4}
  .flip-hint{position:absolute;bottom:14px;font-size:11px;color:var(--ink-soft);
    letter-spacing:.5px}

  .nav{display:flex;align-items:center;gap:10px}
  .nav button{flex:1;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);
    color:var(--washi);cursor:pointer;padding:13px;border-radius:12px;
    font-family:var(--ff-ui);font-weight:700;font-size:14px;transition:.15s;
    backdrop-filter:blur(4px)}
  .nav button:hover{background:rgba(255,255,255,.14)}
  .nav .counter{flex:0 0 auto;color:#c4d2e8;font-size:14px;font-weight:700;
    min-width:74px;text-align:center;font-variant-numeric:tabular-nums}

  /* ---------- Quiz ---------- */
  .quiz-card{background:var(--washi);border-radius:var(--radius);box-shadow:var(--shadow);
    border:1px solid var(--washi-dim);padding:26px 22px;position:relative;overflow:hidden}
  .prompt{text-align:center;min-height:90px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:8px;margin-bottom:20px;
    padding:6px 4px 14px;border-bottom:1px dashed var(--washi-line)}
  .prompt .small-tag{font-size:10px;font-weight:800;letter-spacing:2px;
    text-transform:uppercase;color:var(--ink-soft)}
  .prompt .jp-big{font-size:clamp(26px,6.5vw,38px);line-height:1.8}
  .prompt .en-big{font-size:clamp(21px,5vw,28px)}
  .choices{display:grid;gap:10px}
  .choice{border:1.5px solid var(--washi-line);background:#fffdf7;cursor:pointer;
    text-align:left;padding:15px 16px;border-radius:12px;font-family:var(--ff-ui);
    font-size:16px;font-weight:600;color:var(--ink);transition:.13s;
    display:flex;align-items:center;gap:13px}
  .choice .num{flex:0 0 26px;height:26px;border-radius:7px;background:var(--washi-dim);
    color:var(--ink-soft);font-size:12px;font-weight:800;display:grid;place-items:center}
  .choice .txt .jp-big{font-size:24px;line-height:1.6;font-weight:700}
  .choice:hover:not(:disabled){border-color:var(--indigo-soft);transform:translateY(-1px)}
  .choice:disabled{cursor:default}
  .choice.correct{border-color:var(--good);background:#eaf5ee}
  .choice.correct .num{background:var(--good);color:#fff}
  .choice.wrong{border-color:var(--bad);background:#fbecea}
  .choice.wrong .num{background:var(--bad);color:#fff}
  .choice.dim{opacity:.5}

  .quiz-foot{margin-top:18px;display:flex;align-items:center;gap:12px;min-height:48px}
  .verdict{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
  .verdict.ok{color:var(--good)} .verdict.no{color:var(--bad)}
  .next-btn{margin-left:auto;border:0;background:var(--indigo);color:var(--washi);
    cursor:pointer;padding:13px 26px;border-radius:11px;font-family:var(--ff-ui);
    font-weight:700;font-size:15px;transition:.15s;visibility:hidden}
  .next-btn:hover{background:var(--indigo-deep)}
  .next-btn.show{visibility:visible}

  /* stamp */
  .stamp{position:absolute;top:50%;left:50%;width:104px;height:104px;border-radius:50%;
    border:5px solid var(--shu);color:var(--shu);font-family:var(--ff-jp);
    font-weight:800;font-size:48px;display:grid;place-items:center;
    transform:translate(-50%,-50%) rotate(-14deg) scale(0);opacity:0;
    pointer-events:none;z-index:5;background:rgba(245,239,225,.4)}
  .stamp.fire{animation:stamp .5s cubic-bezier(.2,1.3,.4,1) forwards}
  @keyframes stamp{
    0%{transform:translate(-50%,-50%) rotate(-14deg) scale(2.2);opacity:0}
    55%{opacity:.95}
    100%{transform:translate(-50%,-50%) rotate(-14deg) scale(1);opacity:.92}
  }

  /* ---------- Scoreboard ---------- */
  .score-bar{display:flex;gap:10px;margin-bottom:16px}
  .stat{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
    border-radius:13px;padding:11px 8px;text-align:center;backdrop-filter:blur(4px)}
  .stat b{display:block;font-size:23px;color:var(--washi);font-weight:800;
    font-variant-numeric:tabular-nums;line-height:1.1}
  .stat span{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#9fb1cd}
  .reset{border:1px solid rgba(255,255,255,.18);background:transparent;color:#bcccdf;
    cursor:pointer;border-radius:13px;padding:0 16px;font-size:13px;font-weight:600}
  .reset:hover{background:rgba(255,255,255,.08)}

  footer{text-align:center;margin-top:24px;color:#7e90ad;font-size:12px;line-height:1.7}
  footer b{color:#a9bbd6;font-family:var(--ff-jp)}

  .hidden{display:none!important}
  :focus-visible{outline:3px solid var(--shu-soft);outline-offset:3px;border-radius:6px}

  @media (max-width:520px){
    .switch{margin-left:0}
    .seg button{padding:8px 11px}
    .choice .txt .jp-big{font-size:21px}
  }
  @media (prefers-reduced-motion:reduce){
    .card-inner{transition:none}
    .stamp.fire{animation:none;opacity:.92;transform:translate(-50%,-50%) rotate(-14deg) scale(1)}
    *{scroll-behavior:auto}
  }
</style>
</head>
<body>
<div class="grain"></div>
<div class="wrap">

  <header>
    <div class="seal" aria-hidden="true">語</div>
    <div class="brand">
      <h1>言の葉</h1>
      <p>High-frequency Japanese phrases · learn &amp; quiz</p>
    </div>
    <a class="hub-link" href="https://senseitoolkit.com/japanese-hub.html">← 日本語 Study Hub</a>
  </header>

  <div class="tabs" role="tablist" aria-label="Mode">
    <button class="tab" role="tab" aria-selected="true" id="tab-learn" data-mode="learn">
      Learn <span class="jp">学ぶ</span>
    </button>
    <button class="tab" role="tab" aria-selected="false" id="tab-quiz" data-mode="quiz">
      Quiz <span class="jp">問題</span>
    </button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="ctl-row">
      <span class="ctl-label">Category</span>
      <div class="chips" id="cats"></div>
    </div>
    <div class="ctl-row">
      <!-- learn: front language toggle -->
      <div class="seg" id="learn-front-seg" role="group" aria-label="Front of card">
        <button data-front="jp" aria-pressed="true">日本語 <span class="jp"></span></button>
        <button data-front="en" aria-pressed="false">English</button>
      </div>
      <!-- quiz: direction toggle -->
      <div class="seg hidden" id="quiz-dir-seg" role="group" aria-label="Quiz direction">
        <button data-dir="jp2en" aria-pressed="true"><span class="jp">日</span>→EN</button>
        <button data-dir="en2jp" aria-pressed="false">EN→<span class="jp">日</span></button>
      </div>
      <button class="switch" id="furi-toggle" aria-pressed="true" aria-label="Toggle furigana">
        <span>Furigana</span><span class="track" aria-hidden="true"></span>
      </button>
    </div>
  </div>

  <!-- ===== LEARN ===== -->
  <section id="learn-panel">
    <div class="stage">
      <button class="card" id="card" aria-label="Flashcard. Activate to flip.">
        <div class="card-inner">
          <div class="face front" id="face-front"></div>
          <div class="face back" id="face-back"></div>
        </div>
      </button>
    </div>
    <div class="nav">
      <button id="prev-btn">‹ Prev</button>
      <span class="counter" id="counter">1 / 1</span>
      <button id="next-btn">Next ›</button>
      <button id="shuffle-btn" title="Shuffle deck">⤮ Shuffle</button>
    </div>
  </section>

  <!-- ===== QUIZ ===== -->
  <section id="quiz-panel" class="hidden">
    <div class="score-bar">
      <div class="stat"><b id="s-score">0</b><span>Correct</span></div>
      <div class="stat"><b id="s-total">0</b><span>Asked</span></div>
      <div class="stat"><b id="s-streak">0</b><span>Streak</span></div>
      <div class="stat"><b id="s-acc">—</b><span>Accuracy</span></div>
      <button class="reset" id="reset-btn">Reset</button>
    </div>
    <div class="quiz-card">
      <div class="stamp" id="stamp" aria-hidden="true">正</div>
      <div class="prompt" id="q-prompt"></div>
      <div class="choices" id="q-choices"></div>
      <div class="quiz-foot">
        <span class="verdict" id="q-verdict" aria-live="polite"></span>
        <button class="next-btn" id="q-next">Next ›</button>
      </div>
    </div>
  </section>

  <footer>
    Tap a card to flip it · Learn keys: <b>← →</b> move, <b>Space</b> flip ·
    Quiz keys: <b>1–4</b> answer, <b>Enter</b> next<br>
    <span id="phrase-count">0</span> phrases · expanded from your master phrasebook
  </footer>
</div>

<script>
/* ---------------- DATA ---------------- */
// seg: {t:"text"} plain kana | {t:"kanji", r:"reading"} ruby
const CATS = {
  greetings:{jp:"挨拶",   en:"Greetings"},
  general:  {jp:"会話",   en:"Conversation"},
  questions:{jp:"質問",   en:"Questions"},
  requests: {jp:"依頼",   en:"Requests"},
  daily:    {jp:"生活",   en:"Daily Life"},
  checking: {jp:"確認",   en:"Checking"},
  time:     {jp:"時間",   en:"Time"},
  feelings: {jp:"気持ち", en:"Feelings"},
  food:     {jp:"食事",   en:"Food & Dining"},
  shopping: {jp:"買い物", en:"Shopping"},
  travel:   {jp:"移動",   en:"Getting Around"},
  emergency:{jp:"緊急",   en:"Emergency"}
};

const DATA = [
  // GENERAL
  {c:"general", s:[{t:"ありがとうございます"}], e:"Thank you"},
  {c:"general", s:[{t:"すみません"}], e:"Excuse me / Sorry"},
  {c:"general", s:[{t:"お"},{t:"願",r:"ねが"},{t:"いします"}], e:"Please (I ask you)"},
  {c:"general", s:[{t:"大丈夫",r:"だいじょうぶ"},{t:"です"}], e:"I'm fine / It's okay"},
  {c:"general", s:[{t:"わかりました"}], e:"I understand / Got it"},
  {c:"general", s:[{t:"わかりません"}], e:"I don't understand"},
  {c:"general", s:[{t:"そうです"}], e:"That's right"},
  {c:"general", s:[{t:"そうじゃないです"}], e:"That's not right"},
  {c:"general", s:[{t:"たしかにそうですね"}], e:"That's certainly true"},
  {c:"general", s:[{t:"なるほど"}], e:"I see"},
  {c:"general", s:[{t:"なるほどね"}], e:"I see (casual)"},
  {c:"general", s:[{t:"本当",r:"ほんとう"},{t:"にそう"},{t:"思",r:"おも"},{t:"います"}], e:"I really think so"},
  {c:"general", s:[{t:"まあまあ"}], e:"So-so"},
  {c:"general", s:[{t:"まじで"}], e:"Seriously? / For real"},
  {c:"general", s:[{t:"うそでしょ"}], e:"No way / You're kidding"},
  {c:"general", s:[{t:"やっぱりね"}], e:"I knew it"},
  {c:"general", s:[{t:"そう"},{t:"思",r:"おも"},{t:"います"}], e:"I think so"},
  {c:"general", s:[{t:"そう"},{t:"聞",r:"き"},{t:"きました"}], e:"I heard that"},
  {c:"general", s:[{t:"まあ"},{t:"仕方",r:"しかた"},{t:"ないです"}], e:"Well, it can't be helped"},
  {c:"general", s:[{t:"気",r:"き"},{t:"に"},{t:"入",r:"い"},{t:"りました"}], e:"I like it"},
  {c:"general", s:[{t:"気",r:"き"},{t:"に"},{t:"入",r:"い"},{t:"らないです"}], e:"I don't like it"},

  // REQUESTS
  {c:"requests", s:[{t:"見",r:"み"},{t:"てください"}], e:"Please look"},
  {c:"requests", s:[{t:"聞",r:"き"},{t:"いてください"}], e:"Please listen"},
  {c:"requests", s:[{t:"急",r:"いそ"},{t:"いでください"}], e:"Please hurry"},
  {c:"requests", s:[{t:"入",r:"はい"},{t:"ってください"}], e:"Please come in"},
  {c:"requests", s:[{t:"座",r:"すわ"},{t:"ってください"}], e:"Please sit down"},
  {c:"requests", s:[{t:"立",r:"た"},{t:"ってください"}], e:"Please stand up"},
  {c:"requests", s:[{t:"静",r:"しず"},{t:"かにしてください"}], e:"Please be quiet"},
  {c:"requests", s:[{t:"貸",r:"か"},{t:"してもらえますか"}], e:"Could you lend me that?"},
  {c:"requests", s:[{t:"取",r:"と"},{t:"ってください"}], e:"Please pass / take it"},
  {c:"requests", s:[{t:"持",r:"も"},{t:"ってきてください"}], e:"Please bring it"},
  {c:"requests", s:[{t:"見",r:"み"},{t:"せてもらえますか"}], e:"Could you show me?"},
  {c:"requests", s:[{t:"教",r:"おし"},{t:"えてください"}], e:"Please tell me / teach me"},
  {c:"requests", s:[{t:"手伝",r:"てつだ"},{t:"ってください"}], e:"Please help me"},
  {c:"requests", s:[{t:"ゆっくり"},{t:"言",r:"い"},{t:"ってください"}], e:"Please say it slowly"},
  {c:"requests", s:[{t:"書",r:"か"},{t:"いてください"}], e:"Please write it"},
  {c:"requests", s:[{t:"読",r:"よ"},{t:"んでください"}], e:"Please read it"},
  {c:"requests", s:[{t:"開",r:"あ"},{t:"けてください"}], e:"Please open it"},
  {c:"requests", s:[{t:"閉",r:"し"},{t:"めてください"}], e:"Please close it"},
  {c:"requests", s:[{t:"電気",r:"でんき"},{t:"をつけてください"}], e:"Please turn on the light"},
  {c:"requests", s:[{t:"電気",r:"でんき"},{t:"を"},{t:"消",r:"け"},{t:"してください"}], e:"Please turn off the light"},
  {c:"requests", s:[{t:"ここ"},{t:"押",r:"お"},{t:"してください"}], e:"Please press here"},
  {c:"requests", s:[{t:"これ"},{t:"直",r:"なお"},{t:"してください"}], e:"Please fix this"},

  {c:"checking", s:[{t:"これで"},{t:"最後",r:"さいご"},{t:"ですか"}], e:"Is this the last one?"}

/* ---------------- STATE ---------------- */
const state = {
  mode:"learn", category:"all", furigana:true,
  learnFront:"jp", deck:[], idx:0, flipped:false,
  quizDir:"jp2en", qDeck:[], qPos:0, qCur:null, answered:false,
  score:0, total:0, streak:0
};

/* ---------------- HELPERS ---------------- */
const $ = id => document.getElementById(id);
function renderJP(segs){
  return segs.map(s => s.r ? `<ruby>${s.t}<rt>${s.r}</rt></ruby>` : s.t).join("");
}
function jpHTML(p){ return `<span class="jp-big">${renderJP(p.s)}</span>`; }
function enHTML(p){ return `<span class="en-big">${p.e}</span>`; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function filtered(){ return state.category==="all" ? DATA : DATA.filter(p=>p.c===state.category); }
function applyFuri(){ document.body.classList.toggle("no-furi", !state.furigana); }

/* ---------------- CATEGORY CHIPS ---------------- */
function buildCats(){
  const box = $("cats");
  const entries = [["all",{jp:"すべて",en:"All"}], ...Object.entries(CATS)];
  box.innerHTML = entries.map(([k,v])=>{
    const n = k==="all" ? DATA.length : DATA.filter(p=>p.c===k).length;
    const on = state.category===k;
    return `<button class="chip" data-cat="${k}" aria-pressed="${on}">
      <span class="jp">${v.jp}</span><span class="en">${v.en} ${n}</span></button>`;
  }).join("");
  box.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{
    state.category=b.dataset.cat;
    box.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed", c===b));
    rebuildDecks();
  });
}

/* ---------------- LEARN ---------------- */
function rebuildDecks(){
  state.deck = filtered();
  state.idx = 0; state.flipped = false;
  renderLearn();
  newQuiz();
}
function renderLearn(){
  const p = state.deck[state.idx];
  $("card").classList.toggle("flipped", state.flipped);
  const cat = CATS[p.c];
  const frontIsJP = state.learnFront==="jp";
  const front = $("face-front"), back = $("face-back");
  const jpFace = `<span class="face-tag">日本語</span><span class="cat-pill">${cat.jp}</span>${jpHTML(p)}<span class="flip-hint">tap to reveal</span>`;
  const enFace = `<span class="face-tag">English</span><span class="cat-pill">${cat.jp}</span>${enHTML(p)}<span class="flip-hint">tap to flip back</span>`;
  front.innerHTML = frontIsJP ? jpFace : enFace;
  back.innerHTML  = frontIsJP ? enFace : jpFace;
  $("counter").textContent = `${state.idx+1} / ${state.deck.length}`;
}
function move(d){
  state.flipped=false;
  $("card").classList.remove("flipped");
  // wait for flip-back before swapping content if it was flipped
  state.idx = (state.idx + d + state.deck.length) % state.deck.length;
  renderLearn();
}
function flip(){ state.flipped=!state.flipped; $("card").classList.toggle("flipped", state.flipped); }

/* ---------------- QUIZ ---------------- */
function newQuiz(){
  const pool = filtered();
  if(state.qPos>=pool.length || !state.qDeck.length){ state.qDeck=shuffle(pool); state.qPos=0; }
  const p = state.qDeck[state.qPos++];
  state.qCur = p; state.answered=false;
  const dirJP2EN = state.quizDir==="jp2en";

  // distractors from same pool
  const others = shuffle(pool.filter(x=>x!==p)).slice(0,3);
  const opts = shuffle([p, ...others]);
  optsCur = opts;

  // prompt
  $("q-prompt").innerHTML = dirJP2EN
    ? `<span class="small-tag">日本語 → English</span>${jpHTML(p)}`
    : `<span class="small-tag">English → 日本語</span>${enHTML(p)}`;

  // choices
  const box = $("q-choices");
  box.innerHTML = opts.map((o,i)=>{
    const txt = dirJP2EN ? `<span class="en-big" style="font-size:17px">${o.e}</span>`
                         : `<span class="jp-big">${renderJP(o.s)}</span>`;
    return `<button class="choice" data-i="${i}">
      <span class="num">${i+1}</span><span class="txt">${txt}</span></button>`;
  }).join("");
  [...box.children].forEach((btn,i)=>{
    btn.onclick=()=>answer(btn, opts[i]===p, box);
  });

  $("q-verdict").textContent="";
  $("q-verdict").className="verdict";
  $("q-next").classList.remove("show");
  $("stamp").classList.remove("fire");
  applyFuri();
}
function answer(btn, correct, box){
  if(state.answered) return;
  state.answered=true; state.total++;
  const buttons = [...box.querySelectorAll(".choice")];
  buttons.forEach(b=>{ b.disabled=true; if(b!==btn) b.classList.add("dim"); });
  const correctBtn = buttons.find(b => optsCur[+b.dataset.i] === state.qCur);
  if(correct){
    btn.classList.remove("dim"); btn.classList.add("correct");
    state.score++; state.streak++;
    $("q-verdict").textContent="正解 — Correct";
    $("q-verdict").className="verdict ok";
    const st=$("stamp"); st.classList.remove("fire"); void st.offsetWidth; st.classList.add("fire");
  }else{
    btn.classList.remove("dim"); btn.classList.add("wrong");
    if(correctBtn){ correctBtn.classList.remove("dim"); correctBtn.classList.add("correct"); }
    state.streak=0;
    $("q-verdict").textContent="不正解 — Answer shown";
    $("q-verdict").className="verdict no";
  }
  $("q-next").classList.add("show");
  updateScore();
}
// keep a reference to current options for marking
let optsCur=[];
function updateScore(){
  $("s-score").textContent=state.score;
  $("s-total").textContent=state.total;
  $("s-streak").textContent=state.streak;
  $("s-acc").textContent = state.total ? Math.round(state.score/state.total*100)+"%" : "—";
}

/* ---------------- MODE / TOGGLES ---------------- */
function setMode(m){
  state.mode=m;
  $("tab-learn").setAttribute("aria-selected", m==="learn");
  $("tab-quiz").setAttribute("aria-selected", m==="quiz");
  $("learn-panel").classList.toggle("hidden", m!=="learn");
  $("quiz-panel").classList.toggle("hidden", m!=="quiz");
  $("learn-front-seg").classList.toggle("hidden", m!=="learn");
  $("quiz-dir-seg").classList.toggle("hidden", m!=="quiz");
}

/* ---------------- WIRING ---------------- */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>setMode(t.dataset.mode));
$("card").onclick=flip;
$("prev-btn").onclick=()=>move(-1);
$("next-btn").onclick=()=>move(1);
$("shuffle-btn").onclick=()=>{ state.deck=shuffle(state.deck); state.idx=0; state.flipped=false; renderLearn(); };

$("learn-front-seg").querySelectorAll("button").forEach(b=>b.onclick=()=>{
  state.learnFront=b.dataset.front;
  $("learn-front-seg").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed", x===b));
  state.flipped=false; renderLearn();
});
$("quiz-dir-seg").querySelectorAll("button").forEach(b=>b.onclick=()=>{
  state.quizDir=b.dataset.dir;
  $("quiz-dir-seg").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed", x===b));
  newQuiz();
});
$("furi-toggle").onclick=()=>{
  state.furigana=!state.furigana;
  $("furi-toggle").setAttribute("aria-pressed", state.furigana);
  applyFuri();
};
$("q-next").onclick=newQuiz;
$("reset-btn").onclick=()=>{ state.score=0;state.total=0;state.streak=0; updateScore(); };

document.addEventListener("keydown",e=>{
  if(state.mode==="learn"){
    if(e.key==="ArrowLeft") move(-1);
    else if(e.key==="ArrowRight") move(1);
    else if(e.key===" "||e.key==="Enter"){e.preventDefault();flip();}
    else if(e.key.toLowerCase()==="s"){ $("shuffle-btn").click(); }
  }else{
    if(["1","2","3","4"].includes(e.key)){
      const b=$("q-choices").querySelector(`[data-i="${+e.key-1}"]`);
      if(b&&!b.disabled) b.click();
    }else if((e.key==="Enter"||e.key===" ")&&state.answered){ e.preventDefault(); newQuiz(); }
  }
});

/* ---------------- INIT ---------------- */
$("phrase-count").textContent = DATA.length;
buildCats();
applyFuri();
rebuildDecks();
setMode("learn");
</script>
</body>
