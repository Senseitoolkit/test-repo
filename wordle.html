<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelling Wordle</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --correct: #2ecc71;
      --present: #f39c12;
      --absent: #4a4e69;
      --text: #e8e8e8;
      --text-dim: #8892a8;
      --accent: #e94560;
      --tile-border: #2a2a4a;
      --tile-bg: #22224a;
      --key-bg: #2a2a5a;
      --key-hover: #3a3a6a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(233,69,96,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(46,204,113,0.05) 0%, transparent 50%);
      animation: bgDrift 20s ease-in-out infinite alternate;
      z-index: -1;
    }
    @keyframes bgDrift {
      0% { transform: translate(0,0) rotate(0deg); }
      100% { transform: translate(-3%,2%) rotate(3deg); }
    }

    /* Header spans full width */
    header {
      padding: 16px 20px 0;
      text-align: center;
      width: 100%;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #e94560, #f39c12);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--text-dim);
      font-size: 0.82rem;
      margin-top: 4px;
    }
    .stats-bar {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    .stats-bar .stat-val {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      display: block;
    }

    /* Length selector full width */
    .length-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      padding: 10px 20px;
    }
    .len-btn {
      padding: 5px 12px;
      border: 1.5px solid var(--tile-border);
      background: var(--surface);
      color: var(--text-dim);
      border-radius: 20px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .len-btn:hover { border-color: var(--accent); color: var(--text); }
    .len-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(233,69,96,0.3);
    }

    /* ===== MAIN LAYOUT: side by side ===== */
    .main-layout {
      display: flex;
      gap: 20px;
      padding: 6px 20px 16px;
      max-width: 960px;
      margin: 0 auto;
      align-items: flex-start;
    }

    /* Left: game column */
    .game-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    /* Right: word bank */
    .bank-col {
      flex: 1;
      min-width: 180px;
      max-width: 300px;
    }
    .bank-header {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      padding-left: 4px;
    }
    .word-bank-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 10px;
      background: var(--surface);
      border-radius: 10px;
      max-height: 420px;
      overflow-y: auto;
      border: 1px solid var(--tile-border);
    }
    .word-bank-grid::-webkit-scrollbar { width: 4px; }
    .word-bank-grid::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
    .wb-word {
      padding: 3px 9px;
      background: var(--tile-bg);
      border-radius: 14px;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-dim);
      border: 1px solid var(--tile-border);
      transition: all 0.2s;
    }
    .wb-word.used-correct {
      background: rgba(46,204,113,0.15);
      border-color: var(--correct);
      color: var(--correct);
    }
    .wb-word.used-wrong {
      background: rgba(233,69,96,0.1);
      border-color: var(--accent);
      color: var(--accent);
      text-decoration: line-through;
    }

    /* Grid */
    #grid {
      display: grid;
      gap: 5px;
      justify-content: center;
      padding: 4px 0;
      min-height: 60px;
    }
    .tile {
      width: 42px; height: 42px;
      border: 2px solid var(--tile-border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 1.05rem;
      text-transform: uppercase;
      background: var(--tile-bg);
      color: var(--text);
      transition: transform 0.15s, border-color 0.15s;
    }
    .tile.pop { animation: popIn 0.12s ease; }
    @keyframes popIn {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .tile.filled { border-color: var(--text-dim); }
    .tile.reveal { animation: flipReveal 0.45s ease forwards; }
    @keyframes flipReveal {
      0% { transform: scaleY(1); }
      50% { transform: scaleY(0); }
      100% { transform: scaleY(1); }
    }
    .tile.correct { background: var(--correct); border-color: var(--correct); color: #fff; }
    .tile.present { background: var(--present); border-color: var(--present); color: #fff; }
    .tile.absent  { background: var(--absent);  border-color: var(--absent);  color: #bbb; }
    .tile.win-bounce { animation: winBounce 0.5s ease; }
    @keyframes winBounce {
      0%,100% { transform: translateY(0); }
      40% { transform: translateY(-14px); }
      60% { transform: translateY(-5px); }
    }

    /* Message */
    #message {
      min-height: 24px;
      padding: 4px 0;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
    }
    #message.success { color: var(--correct); }
    #message.fail { color: var(--accent); }

    /* Buttons */
    .action-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 6px 0;
    }
    .action-btn {
      padding: 7px 16px;
      border: 1.5px solid var(--tile-border);
      background: var(--surface);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .action-btn:hover { border-color: var(--accent); background: var(--surface2); }
    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .action-btn.primary:hover { background: #d63a54; }

    /* Keyboard */
    .keyboard {
      width: 100%;
      max-width: 480px;
      padding: 0;
      margin-top: 4px;
    }
    .kb-row {
      display: flex;
      justify-content: center;
      gap: 3px;
      margin-bottom: 3px;
    }
    .key {
      height: 40px;
      min-width: 26px;
      padding: 0 6px;
      border: none;
      border-radius: 5px;
      background: var(--key-bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s;
      flex: 1;
      max-width: 38px;
      display: flex; align-items: center; justify-content: center;
    }
    .key:hover { background: var(--key-hover); }
    .key:active { transform: scale(0.93); }
    .key.wide { max-width: 58px; font-size: 0.68rem; letter-spacing: 0.03em; }
    .key.correct { background: var(--correct); color: #fff; }
    .key.present { background: var(--present); color: #fff; }
    .key.absent  { background: #2a2a3a; color: #555; }

    /* Footer */
    .game-footer {
      margin-top: 6px;
      font-size: 0.68rem;
      color: var(--text-dim);
      opacity: 0.5;
      text-align: center;
    }

    /* Shake */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* Responsive: stack on narrow screens */
    @media (max-width: 640px) {
      .main-layout {
        flex-direction: column;
        align-items: center;
      }
      .bank-col {
        max-width: 100%;
        width: 100%;
      }
      .word-bank-grid {
        max-height: 160px;
      }
      .tile { width: 38px; height: 38px; font-size: 0.95rem; }
      .key { height: 38px; font-size: 0.75rem; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Spelling Wordle</h1>
  <p>Pick a word length · Guess the hidden word · Your guess must be from the Word Bank</p>
  <div class="stats-bar">
    <div><span class="stat-val" id="statPlayed">0</span> played</div>
    <div><span class="stat-val" id="statWon">0</span> won</div>
    <div><span class="stat-val" id="statStreak">0</span> streak</div>
  </div>
</header>

<div class="length-selector" id="lengthButtons"></div>

<div class="main-layout">
  <div class="game-col">
    <div id="grid"></div>
    <div id="message"></div>
    <div class="action-row">
      <button class="action-btn primary" id="newBtn">New Word</button>
      <button class="action-btn" id="hintBtn">💡 Hint</button>
    </div>
    <div class="keyboard" id="keyboard"></div>
    <div class="game-footer">Green = correct · Yellow = wrong spot · Grey = not in word</div>
  </div>
  <div class="bank-col">
    <div class="bank-header">Word Bank</div>
    <div class="word-bank-grid" id="wordBank"></div>
  </div>
</div>

<script>
const WORDS = [
  "black","egg","sink","frog","lump","name","seen","high","stone","cute",
  "character","narrative","fable","moral","dialogue",
  "shrug","throw","shrunk","throne","shred","thrash","shrimp","thread","shrapnel","through",
  "script","voice","illustration","perspective","storytelling",
  "secret","submit","carrot","target","pocket","quite","quiet","planet","rabbit","jacket",
  "diet","summit","poet","maggot","budget",
  "boy","soil","avoid","toy","enjoy","annoy","coin","foyer","choice","destroy","voyage",
  "poison","employ","anoint",
  "itch","catch","bench","match","switch","watch","sketch","witch","patch","different",
  "hatchet","kitchen","launch","stretch","blotchy",
  "steer","chair","repair","cheer","stair","peer","dairy","pair","fairy","jeer",
  "staircase","volunteer","despair","eerie","pioneer",
  "skills","wishes","birds","mixes","packets","tomatoes","punches","buses","few","houses",
  "pianos","coaches","crosses","superheroes",
  "could","hour","talk","walk","half","honest","should","climb","would","bomb",
  "integrity","inspiration","empathy","influence","responsibility",
  "selling","asking","eating","moving","dreaming","smiling","carrying","painting",
  "trying","whining","equality","diversity","courage","resilience",
  "sigh","light","right","fight","night","flight","alright","knight","mighty",
  "firelight","eyesight","fortnight","midnight","copyright",
  "winning","hopping","rotting","grabbing","shutting","swimming","beginning",
  "splitting","dropping","clapping","programming","permitting","wrapping",
  "regretting","scrapping",
  "grey","they","eight","obey","weight","eighty","eighteen","weighed","survey",
  "neighbor","lightweight","feint","weightlifter","freight",
  "apple","angle","local","final","equal","people","bottle","angel","table","travel",
  "example","marvel","struggle","channel","trouble",
  "liked","asked","kicked","washed","hoped","pleased","cared","cooked","poured",
  "helped","remembered","praised","frightened","order",
  "by","buy","for","four","plain","not","knot","heal","he'll",
  "electricity","circuit","purpose","design","invention",
  "sign","sword","wrong","write","know","knock","wreck","knife","knowledge","written",
  "function","current","conductor","insulator","creativity",
  "teacher","editor","worker","driver","darker","builder","collector","painter",
  "supporter","climber","commander","manager","elevator","attacker","educator",
  "why","photo","what","phone","when","graph","which","ghost","where","wheat",
  "whisper","phase","wheel","photograph","physical",
  "tried","copies","worried","cried","flies","studied","bullies","marries","replied",
  "empties","satisfied","supplies","identified","occupies","purified",
  "laugh","enough","caught","bought","cough","thought","rough","daughter","naughty",
  "throughout","thorough","distraught","draught",
  "gym","rice","orange","pencil","circle","large","danger","city","huge","since",
  "garbage","sentence","general","emergency","cylinder",
  "wrote","slept","began","broke","told","thrown","knew","learnt","found","heard",
  "forgave","built","understood","withdrew","forbade",
  "diary","summary","memory","library","factory","delivery","grocery","glossary",
  "necessary","vocabulary","navigation","culture","global","heritage",
  "painful","helpful","careless","skillful","endless","thankful","powerful",
  "forgetful","successful","homeless","landmark","geography","location",
  "compass","symbol",
  "listen","often","guard","build","castle","fasten","guest","autumn","guess",
  "wrestle","column","whistle","disguise","hustle",
  "homework","afternoon","rainbow","airport","baseball","footprint","eyesight",
  "grandmother","toothbrush","shoelace","somewhere","supermarket","everyone",
  "lifeguard","skateboard",
  "school","sphere","square","squat","squad","sphinx","squeeze","squirrel","scheme",
  "squeaky","scholar","atmosphere","hemisphere","squeamish","spherical",
  "easy","funny","scary","spicy","sleepy","cloudy","smoky","healthy","tricky",
  "stormy","sustainability","agriculture","resources","ecosystem","material",
  "don't","can't","i'm","it's","i'll","should've","they're","o'clock","they'll",
  "doesn't","recycling","alternative","development","natural","biodegradable",
  "selling","asking","eating","moving","dreaming","smiling","carrying","painting",
  "trying","whining","equality","diversity","courage","resilience",
  "children","bread","women","mice","lives","leaves","wolves","music","chefs",
  "trousers","beliefs","equipment","furniture","shelves","knives",
  "slowly","happily","perfectly","exactly","properly","extremely","quickly",
  "busily","surely","angrily","definitely","regularly","certainly","immediately",
  "successfully",
  "year","fear","gear","clear","dear","earth","learn","swear","heart","search",
  "heard","beard","appear","nearby",
  "disagree","dislike","uncover","unable","unfair","unhealthy","unhappy",
  "disappear","misbehave","unpleasant","dishonest","disapprove","unnecessary",
  "unfamiliar","misunderstanding",
  "once","does","minute","clothes","friends","really","darkness",
  "greatness","forgiveness","beautiful","island","because","surprise","loneliness"
].map(w => w.toLowerCase());

// Dedupe and filter out words with non-alpha characters (apostrophes, etc.)
const WORD_SET = [...new Set(WORDS)].filter(w => /^[a-z]+$/.test(w));

// Group by length
const groups = {};
WORD_SET.forEach(w => {
  const len = w.length;
  if (!groups[len]) groups[len] = [];
  groups[len].push(w);
});

// State
let currentLength = null;
let answer = "";
let maxRows = 6;
let currentRow = 0;
let currentCol = 0;
let gameOver = false;
let hintUsed = false;
let guessedWords = []; // track guessed words for word bank highlighting
const keyStates = {}; // letter -> best state

// Stats (session)
let stats = { played: 0, won: 0, streak: 0 };

const grid = document.getElementById("grid");
const message = document.getElementById("message");
const lengthButtons = document.getElementById("lengthButtons");
const wordBank = document.getElementById("wordBank");
const keyboard = document.getElementById("keyboard");
const newBtn = document.getElementById("newBtn");
const hintBtn = document.getElementById("hintBtn");

// Build length buttons
Object.keys(groups).sort((a,b) => a - b).forEach(len => {
  const btn = document.createElement("button");
  btn.textContent = len;
  btn.className = "len-btn";
  btn.onclick = () => selectLength(Number(len), btn);
  lengthButtons.appendChild(btn);
});

// Build keyboard
const KB_ROWS = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['enter','z','x','c','v','b','n','m','⌫']
];

KB_ROWS.forEach(row => {
  const rowDiv = document.createElement("div");
  rowDiv.className = "kb-row";
  row.forEach(k => {
    const btn = document.createElement("button");
    btn.className = "key" + (k.length > 1 ? " wide" : "");
    btn.textContent = k;
    btn.dataset.key = k;
    btn.addEventListener("click", () => handleKeyPress(k));
    rowDiv.appendChild(btn);
  });
  keyboard.appendChild(rowDiv);
});

function selectLength(len, btn) {
  currentLength = len;
  document.querySelectorAll(".len-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  updateWordBank();
  pickNewWord();
}

function updateWordBank() {
  if (!currentLength) return;
  wordBank.innerHTML = "";
  groups[currentLength].forEach(w => {
    const span = document.createElement("span");
    span.className = "wb-word";
    span.textContent = w;
    span.dataset.word = w;
    wordBank.appendChild(span);
  });
}

function highlightWordBank(word, won) {
  const el = wordBank.querySelector(`[data-word="${word}"]`);
  if (el) {
    el.classList.add(won ? "used-correct" : "used-wrong");
  }
}

function pickNewWord() {
  if (!currentLength) return;
  const list = groups[currentLength];
  answer = list[Math.floor(Math.random() * list.length)];
  currentRow = 0;
  currentCol = 0;
  gameOver = false;
  hintUsed = false;
  guessedWords = [];
  message.textContent = "";
  message.className = "";
  Object.keys(keyStates).forEach(k => delete keyStates[k]);
  resetKeyboardColors();
  buildEmptyGrid();
  updateWordBank(); // reset highlights
}

function buildEmptyGrid() {
  grid.innerHTML = "";
  const cols = answer.length;
  grid.style.gridTemplateColumns = `repeat(${cols}, 42px)`;
  for (let r = 0; r < maxRows; r++) {
    for (let c = 0; c < cols; c++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.dataset.row = r;
      tile.dataset.col = c;
      grid.appendChild(tile);
    }
  }
}

function getTile(row, col) {
  return grid.querySelector(`[data-row="${row}"][data-col="${col}"]`);
}

function getRowTiles(row) {
  return [...grid.querySelectorAll(`[data-row="${row}"]`)];
}

function setMessage(text, type = "") {
  message.textContent = text;
  message.className = type;
}

function handleKeyPress(key) {
  if (gameOver || !currentLength) return;

  if (key === "enter") {
    submitGuess();
  } else if (key === "⌫" || key === "backspace") {
    if (currentCol > 0) {
      currentCol--;
      const tile = getTile(currentRow, currentCol);
      tile.textContent = "";
      tile.classList.remove("filled");
    }
  } else if (key.length === 1 && /^[a-z]$/i.test(key)) {
    if (currentCol < answer.length) {
      const tile = getTile(currentRow, currentCol);
      tile.textContent = key.toUpperCase();
      tile.classList.add("filled", "pop");
      setTimeout(() => tile.classList.remove("pop"), 120);
      currentCol++;
    }
  }
}

function submitGuess() {
  if (currentCol < answer.length) {
    shakeRow(currentRow);
    setMessage(`Need ${answer.length} letters`, "fail");
    return;
  }

  const tiles = getRowTiles(currentRow);
  const guess = tiles.map(t => t.textContent.toLowerCase()).join("");

  if (!groups[currentLength].includes(guess)) {
    shakeRow(currentRow);
    setMessage("Not in word list", "fail");
    return;
  }

  guessedWords.push(guess);

  // Compute colors with proper duplicate handling
  const colors = Array(answer.length).fill("absent");
  const answerArr = answer.split("");
  const guessArr = guess.split("");
  const used = Array(answer.length).fill(false);

  // First pass: correct
  for (let i = 0; i < guessArr.length; i++) {
    if (guessArr[i] === answerArr[i]) {
      colors[i] = "correct";
      used[i] = true;
    }
  }
  // Second pass: present
  for (let i = 0; i < guessArr.length; i++) {
    if (colors[i] === "correct") continue;
    for (let j = 0; j < answerArr.length; j++) {
      if (!used[j] && guessArr[i] === answerArr[j]) {
        colors[i] = "present";
        used[j] = true;
        break;
      }
    }
  }

  // Animate reveals
  tiles.forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add("reveal");
      setTimeout(() => {
        tile.classList.add(colors[i]);
        // Update keyboard
        updateKeyState(guessArr[i], colors[i]);
      }, 220);
    }, i * 100);
  });

  const revealTime = tiles.length * 100 + 400;

  setTimeout(() => {
    if (guess === answer) {
      stats.played++;
      stats.won++;
      stats.streak++;
      updateStatsUI();
      const msgs = ["Brilliant! ✨", "Amazing! 🎉", "Well done! 🏆", "Perfect! 💫", "Nailed it! 🔥"];
      setMessage(msgs[Math.min(currentRow, msgs.length - 1)], "success");
      gameOver = true;
      highlightWordBank(answer, true);
      // Win bounce
      tiles.forEach((tile, i) => {
        setTimeout(() => tile.classList.add("win-bounce"), i * 80);
      });
    } else {
      currentRow++;
      currentCol = 0;
      if (currentRow >= maxRows) {
        stats.played++;
        stats.streak = 0;
        updateStatsUI();
        setMessage(`The word was ${answer.toUpperCase()}`, "fail");
        gameOver = true;
        highlightWordBank(answer, false);
      } else {
        setMessage(`${maxRows - currentRow} guesses left`);
      }
    }
  }, revealTime);
}

function shakeRow(row) {
  const tiles = getRowTiles(row);
  const wrapper = document.createElement("div");
  wrapper.style.display = "contents";
  wrapper.className = "shake-row";
  // We can't easily wrap grid children, so shake each tile
  tiles.forEach(t => {
    t.style.animation = "shake 0.4s ease";
    setTimeout(() => t.style.animation = "", 400);
  });
}

function updateKeyState(letter, state) {
  const priority = { correct: 3, present: 2, absent: 1 };
  const current = keyStates[letter];
  if (!current || priority[state] > priority[current]) {
    keyStates[letter] = state;
  }
  applyKeyColor(letter);
}

function applyKeyColor(letter) {
  const btn = keyboard.querySelector(`[data-key="${letter}"]`);
  if (btn) {
    btn.classList.remove("correct", "present", "absent");
    if (keyStates[letter]) btn.classList.add(keyStates[letter]);
  }
}

function resetKeyboardColors() {
  keyboard.querySelectorAll(".key").forEach(k => {
    k.classList.remove("correct", "present", "absent");
  });
}

function updateStatsUI() {
  document.getElementById("statPlayed").textContent = stats.played;
  document.getElementById("statWon").textContent = stats.won;
  document.getElementById("statStreak").textContent = stats.streak;
}

// Hint: reveal one correct letter
hintBtn.addEventListener("click", () => {
  if (gameOver || !currentLength || hintUsed) return;
  hintUsed = true;
  // Find an unrevealed position
  const unrevealedIndices = [];
  for (let i = 0; i < answer.length; i++) {
    const tile = getTile(currentRow, i);
    if (!tile.textContent) unrevealedIndices.push(i);
  }
  if (unrevealedIndices.length === 0) return;
  const idx = unrevealedIndices[Math.floor(Math.random() * unrevealedIndices.length)];

  // Clear current input and place hint
  for (let c = 0; c < answer.length; c++) {
    const tile = getTile(currentRow, c);
    tile.textContent = "";
    tile.classList.remove("filled");
  }
  const hintTile = getTile(currentRow, idx);
  hintTile.textContent = answer[idx].toUpperCase();
  hintTile.classList.add("filled");
  hintTile.style.borderColor = "var(--present)";
  currentCol = 0; // user re-types around the hint

  // Actually, simpler: just show a toast
  hintTile.style.borderColor = "";
  for (let c = 0; c < answer.length; c++) {
    const tile = getTile(currentRow, c);
    tile.textContent = "";
    tile.classList.remove("filled");
  }
  currentCol = 0;
  setMessage(`Hint: position ${idx + 1} is "${answer[idx].toUpperCase()}"`, "");
  hintBtn.style.opacity = "0.4";
  hintBtn.style.pointerEvents = "none";
});

newBtn.addEventListener("click", () => {
  pickNewWord();
  hintBtn.style.opacity = "1";
  hintBtn.style.pointerEvents = "auto";
});

// Physical keyboard
document.addEventListener("keydown", e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === "Enter") handleKeyPress("enter");
  else if (e.key === "Backspace") handleKeyPress("⌫");
  else if (/^[a-zA-Z]$/.test(e.key)) handleKeyPress(e.key.toLowerCase());
});

// Auto-select 5-letter words if available (run immediately — script is at end of body)
(function() {
  const preferred = [5, 6, 4, 7];
  for (const len of preferred) {
    if (groups[len]) {
      const btn = [...document.querySelectorAll(".len-btn")].find(b => b.textContent == len);
      if (btn) { selectLength(len, btn); break; }
    }
  }
})();
</script>
