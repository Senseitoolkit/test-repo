<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelling Wordle — UK Curriculum</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --correct: #2ecc71;
      --present: #f39c12;
      --absent: #4a4e69;
      --text: #e8e8e8;
      --text-dim: #8892a8;
      --accent: #e94560;
      --tile-border: #2a2a4a;
      --tile-bg: #22224a;
      --key-bg: #2a2a5a;
      --key-hover: #3a3a6a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(233,69,96,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(46,204,113,0.05) 0%, transparent 50%);
      animation: bgDrift 20s ease-in-out infinite alternate;
      z-index: -1;
    }
    @keyframes bgDrift {
      0% { transform: translate(0,0) rotate(0deg); }
      100% { transform: translate(-3%,2%) rotate(3deg); }
    }

    header {
      padding: 16px 20px 0;
      text-align: center;
      width: 100%;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #e94560, #f39c12);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--text-dim);
      font-size: 0.82rem;
      margin-top: 4px;
    }
    .stats-bar {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    .stats-bar .stat-val {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      display: block;
    }

    /* ===== Selector area ===== */
    .selectors {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px 20px 0;
    }
    .selector-block { margin-bottom: 10px; }
    .selector-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      text-align: center;
    }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }
    .pill {
      padding: 5px 14px;
      border: 1.5px solid var(--tile-border);
      background: var(--surface);
      color: var(--text-dim);
      border-radius: 20px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(233,69,96,0.3);
    }
    /* Pattern dropdown styled as select */
    .pattern-select {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      display: block;
      padding: 8px 14px;
      border: 1.5px solid var(--tile-border);
      background: var(--surface);
      color: var(--text);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
    }
    .pattern-select:focus { outline: none; border-color: var(--accent); }
    .len-row .pill { min-width: 38px; text-align: center; padding: 5px 12px; }

    /* ===== MAIN LAYOUT ===== */
    .main-layout {
      display: flex;
      gap: 20px;
      padding: 12px 20px 16px;
      max-width: 960px;
      margin: 0 auto;
      align-items: flex-start;
    }
    .game-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }
    .bank-col {
      flex: 1;
      min-width: 180px;
      max-width: 300px;
    }
    .bank-header {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      padding-left: 4px;
    }
    .bank-header span { color: var(--accent); }
    .word-bank-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 10px;
      background: var(--surface);
      border-radius: 10px;
      max-height: 420px;
      overflow-y: auto;
      border: 1px solid var(--tile-border);
    }
    .word-bank-grid::-webkit-scrollbar { width: 4px; }
    .word-bank-grid::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
    .wb-word {
      padding: 3px 9px;
      background: var(--tile-bg);
      border-radius: 14px;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-dim);
      border: 1px solid var(--tile-border);
      transition: all 0.2s;
    }
    .wb-word.used-correct {
      background: rgba(46,204,113,0.15);
      border-color: var(--correct);
      color: var(--correct);
    }
    .wb-word.used-wrong {
      background: rgba(233,69,96,0.1);
      border-color: var(--accent);
      color: var(--accent);
      text-decoration: line-through;
    }
    .wb-empty {
      color: var(--text-dim);
      font-size: 0.74rem;
      font-style: italic;
      padding: 8px;
    }

    #grid {
      display: grid;
      gap: 5px;
      justify-content: center;
      padding: 4px 0;
      min-height: 60px;
    }
    .tile {
      width: 42px; height: 42px;
      border: 2px solid var(--tile-border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 1.05rem;
      text-transform: uppercase;
      background: var(--tile-bg);
      color: var(--text);
      transition: transform 0.15s, border-color 0.15s;
    }
    .tile.pop { animation: popIn 0.12s ease; }
    @keyframes popIn {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .tile.filled { border-color: var(--text-dim); }
    .tile.reveal { animation: flipReveal 0.45s ease forwards; }
    @keyframes flipReveal {
      0% { transform: scaleY(1); }
      50% { transform: scaleY(0); }
      100% { transform: scaleY(1); }
    }
    .tile.correct { background: var(--correct); border-color: var(--correct); color: #fff; }
    .tile.present { background: var(--present); border-color: var(--present); color: #fff; }
    .tile.absent  { background: var(--absent);  border-color: var(--absent);  color: #bbb; }
    .tile.win-bounce { animation: winBounce 0.5s ease; }
    @keyframes winBounce {
      0%,100% { transform: translateY(0); }
      40% { transform: translateY(-14px); }
      60% { transform: translateY(-5px); }
    }

    #message {
      min-height: 24px;
      padding: 4px 0;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
    }
    #message.success { color: var(--correct); }
    #message.fail { color: var(--accent); }

    .action-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 6px 0;
    }
    .action-btn {
      padding: 7px 16px;
      border: 1.5px solid var(--tile-border);
      background: var(--surface);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .action-btn:hover { border-color: var(--accent); background: var(--surface2); }
    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .action-btn.primary:hover { background: #d63a54; }

    .keyboard {
      width: 100%;
      max-width: 480px;
      padding: 0;
      margin-top: 4px;
    }
    .kb-row {
      display: flex;
      justify-content: center;
      gap: 3px;
      margin-bottom: 3px;
    }
    .key {
      height: 40px;
      min-width: 26px;
      padding: 0 6px;
      border: none;
      border-radius: 5px;
      background: var(--key-bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s;
      flex: 1;
      max-width: 38px;
      display: flex; align-items: center; justify-content: center;
    }
    .key:hover { background: var(--key-hover); }
    .key:active { transform: scale(0.93); }
    .key.wide { max-width: 58px; font-size: 0.68rem; letter-spacing: 0.03em; }
    .key.correct { background: var(--correct); color: #fff; }
    .key.present { background: var(--present); color: #fff; }
    .key.absent  { background: #2a2a3a; color: #555; }

    .game-footer {
      margin-top: 6px;
      font-size: 0.68rem;
      color: var(--text-dim);
      opacity: 0.5;
      text-align: center;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @media (max-width: 640px) {
      .main-layout { flex-direction: column; align-items: center; }
      .bank-col { max-width: 100%; width: 100%; }
      .word-bank-grid { max-height: 160px; }
      .tile { width: 38px; height: 38px; font-size: 0.95rem; }
      .key { height: 38px; font-size: 0.75rem; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Spelling Wordle</h1>
  <p>UK National Curriculum spelling lists · Pick a year, a pattern &amp; a word length · Guess the hidden word</p>
  <div class="stats-bar">
    <div><span class="stat-val" id="statPlayed">0</span> played</div>
    <div><span class="stat-val" id="statWon">0</span> won</div>
    <div><span class="stat-val" id="statStreak">0</span> streak</div>
  </div>
</header>

<div class="selectors">
  <div class="selector-block">
    <div class="selector-label">Year group</div>
    <div class="pill-row" id="yearButtons"></div>
  </div>
  <div class="selector-block">
    <div class="selector-label">Spelling pattern</div>
    <select class="pattern-select" id="patternSelect"></select>
  </div>
  <div class="selector-block">
    <div class="selector-label">Word length</div>
    <div class="pill-row len-row" id="lengthButtons"></div>
  </div>
</div>

<div class="main-layout">
  <div class="game-col">
    <div id="grid"></div>
    <div id="message"></div>
    <div class="action-row">
      <button class="action-btn primary" id="newBtn">New Word</button>
      <button class="action-btn" id="hintBtn">💡 Hint</button>
    </div>
    <div class="keyboard" id="keyboard"></div>
    <div class="game-footer">Green = correct · Yellow = wrong spot · Grey = not in word</div>
  </div>
  <div class="bank-col">
    <div class="bank-header">Word Bank <span id="bankCount"></span></div>
    <div class="word-bank-grid" id="wordBank"></div>
  </div>
</div>

<script>

    { pattern: "/ay/ spelt ei, eigh, ey", words: ["vein","weigh","eight","neighbour","they","obey"] },
    { pattern: "Homophones", words: ["accept","except","affect","effect","ball","bawl","berry","bury","brake","break","fair","fare","grate","great","groan","grown","heel","heal","knot","mail","male","main","mane","meat","meet","medal","meddle","missed","mist","peace","piece","plain","plane","rain","rein","reign","scene","seen","weather","whether","whose"] },
    { pattern: "★ Statutory word list (Years 3 & 4)", words: ["accident","actual","address","answer","appear","arrive","believe","bicycle","breath","breathe","build","busy","business","calendar","caught","centre","century","certain","circle","complete","consider","continue","decide","describe","different","difficult","disappear","early","earth","eight","eighth","enough","exercise","experience","experiment","extreme","famous","favourite","february","forward","fruit","grammar","group","guard","guide","heard","heart","height","history","imagine","increase","important","interest","island","knowledge","learn","length","library","material","medicine","mention","minute","natural","naughty","notice","occasion","often","opposite","ordinary","particular","peculiar","perhaps","popular","position","possible","potatoes","pressure","probably","promise","purpose","quarter","question","recent","regular","reign","remember","sentence","separate","special","straight","strange","strength","suppose","surprise","therefore","thought","through","various","weight","woman","women"] }
  ],
  "Years 5 & 6": [
    { pattern: "Endings -cious and -tious", words: ["vicious","precious","conscious","delicious","malicious","suspicious","ambitious","cautious","fictitious","infectious","nutritious"] },
    { pattern: "Endings -cial and -tial", words: ["official","special","artificial","partial","confidential","essential","initial","financial","commercial","provincial"] },
    { pattern: "Endings -ant, -ance, -ancy", words: ["observant","observance","expectant","hesitant","hesitancy","tolerant","tolerance","substance"] },
    { pattern: "Endings -ent, -ence, -ency", words: ["innocent","innocence","decent","decency","frequent","frequency","confident","confidence"] },
    { pattern: "Endings -able and -ably", words: ["adorable","applicable","considerable","tolerable","changeable","noticeable","dependable","comfortable","understandable","reasonable","enjoyable","reliable"] },
    { pattern: "Endings -ible and -ibly", words: ["forcible","legible","possible","horrible","terrible","visible","incredible","sensible"] },
    { pattern: "Suffixes on words ending -fer", words: ["referring","referred","referral","preferring","preferred","transferring","transferred","reference","referee","preference","transference"] },
    { pattern: "/ee/ spelt ei after c", words: ["deceive","conceive","receive","perceive","ceiling"] },
    { pattern: "The letter-string ough", words: ["ought","bought","thought","nought","brought","fought","rough","tough","enough","cough","though","although","dough","through","thorough","borough","plough","bough"] },
    { pattern: "Silent letters", words: ["doubt","island","lamb","solemn","thistle","knight"] },
    { pattern: "Homophones & confused words", words: ["advice","advise","device","devise","licence","license","practice","practise","prophecy","prophesy","aisle","isle","aloud","allowed","altar","alter","ascent","assent","bridal","bridle","cereal","serial","compliment","complement","descent","dissent","desert","dessert","draft","draught","farther","father","guessed","guest","heard","herd","led","lead","morning","mourning","past","passed","precede","proceed","principal","principle","profit","prophet","stationary","stationery","steal","steel","wary","weary","whose"] },
    { pattern: "★ Statutory word list (Years 5 & 6)", words: ["accommodate","accompany","according","achieve","aggressive","amateur","ancient","apparent","appreciate","attached","available","average","awkward","bargain","bruise","category","cemetery","committee","communicate","community","competition","conscience","conscious","controversy","convenience","correspond","criticise","curiosity","definite","desperate","determined","develop","dictionary","disastrous","embarrass","environment","equip","especially","exaggerate","excellent","existence","explanation","familiar","foreign","forty","frequently","government","guarantee","harass","hindrance","identity","immediate","individual","interfere","interrupt","language","leisure","lightning","marvellous","mischievous","muscle","necessary","neighbour","nuisance","occupy","occur","opportunity","parliament","persuade","physical","prejudice","privilege","profession","programme","pronunciation","queue","recognise","recommend","relevant","restaurant","rhyme","rhythm","sacrifice","secretary","shoulder","signature","sincerely","soldier","stomach","sufficient","suggest","symbol","system","temperature","thorough","twelfth","variety","vegetable","vehicle","yacht"] }
  ]
};

const YEARS = Object.keys(YEAR_DATA);

/* ============================================================
   STATE
   ============================================================ */
let currentYear = null;
let currentPatternIndex = -1;   // -1 = "All patterns"
let currentLength = null;
let activeWords = [];           // words available for current filters (the playable pool)
let lengthGroups = {};          // {len: [words]} within the active selection
let answer = "";
let maxRows = 6;
let currentRow = 0;
let currentCol = 0;
let gameOver = false;
let hintUsed = false;
const keyStates = {};
let stats = { played: 0, won: 0, streak: 0 };

const grid = document.getElementById("grid");
const message = document.getElementById("message");
const yearButtons = document.getElementById("yearButtons");
const patternSelect = document.getElementById("patternSelect");
const lengthButtons = document.getElementById("lengthButtons");
const wordBank = document.getElementById("wordBank");
const bankCount = document.getElementById("bankCount");
const keyboard = document.getElementById("keyboard");
const newBtn = document.getElementById("newBtn");
const hintBtn = document.getElementById("hintBtn");

/* ============================================================
   BUILD SELECTORS
   ============================================================ */
// Year pills
YEARS.forEach(year => {
  const btn = document.createElement("button");
  btn.className = "pill";
  btn.textContent = year;
  btn.onclick = () => selectYear(year, btn);
  yearButtons.appendChild(btn);
});

// Keyboard
const KB_ROWS = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['enter','z','x','c','v','b','n','m','⌫']
];
KB_ROWS.forEach(row => {
  const rowDiv = document.createElement("div");
  rowDiv.className = "kb-row";
  row.forEach(k => {
    const btn = document.createElement("button");
    btn.className = "key" + (k.length > 1 ? " wide" : "");
    btn.textContent = k;
    btn.dataset.key = k;
    btn.addEventListener("click", () => handleKeyPress(k));
    rowDiv.appendChild(btn);
  });
  keyboard.appendChild(rowDiv);
});

/* ============================================================
   SELECTION LOGIC
   ============================================================ */
function selectYear(year, btn) {
  currentYear = year;
  currentPatternIndex = -1;
  document.querySelectorAll("#yearButtons .pill").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  buildPatternSelect();
  rebuildPool();
}

function buildPatternSelect() {
  patternSelect.innerHTML = "";
  const allOpt = document.createElement("option");
  allOpt.value = "-1";
  allOpt.textContent = "All patterns (whole year group)";
  patternSelect.appendChild(allOpt);
  YEAR_DATA[currentYear].forEach((grp, i) => {
    const opt = document.createElement("option");
    opt.value = String(i);
    const count = grp.words.filter(w => /^[a-z]+$/.test(w)).length;
    opt.textContent = `${grp.pattern}  (${count})`;
    patternSelect.appendChild(opt);
  });
  patternSelect.value = "-1";
}

patternSelect.addEventListener("change", () => {
  currentPatternIndex = Number(patternSelect.value);
  rebuildPool();
});

// Builds the available word pool from year + pattern, then the length groups.
function rebuildPool() {
  if (!currentYear) return;
  let words = [];
  if (currentPatternIndex === -1) {
    YEAR_DATA[currentYear].forEach(grp => words.push(...grp.words));
  } else {
    words.push(...YEAR_DATA[currentYear][currentPatternIndex].words);
  }
  // Clean: alphabetic only, lowercase, deduped
  words = [...new Set(words.map(w => w.toLowerCase()).filter(w => /^[a-z]+$/.test(w)))];
  activeWords = words;

  // Group by length
  lengthGroups = {};
  words.forEach(w => {
    (lengthGroups[w.length] ||= []).push(w);
  });

  buildLengthButtons();
}

function buildLengthButtons() {
  lengthButtons.innerHTML = "";
  const lengths = Object.keys(lengthGroups).map(Number).sort((a,b) => a - b);
  if (lengths.length === 0) {
    const note = document.createElement("span");
    note.className = "wb-empty";
    note.textContent = "No words for this selection.";
    lengthButtons.appendChild(note);
    currentLength = null;
    answer = "";
    grid.innerHTML = "";
    updateWordBank();
    return;
  }
  lengths.forEach(len => {
    const btn = document.createElement("button");
    btn.className = "pill";
    btn.textContent = `${len} (${lengthGroups[len].length})`;
    btn.dataset.len = len;
    btn.onclick = () => selectLength(len, btn);
    lengthButtons.appendChild(btn);
  });

  // Auto-select a sensible default length (prefer 4-6, else first available)
  let pick = [5,4,6,3,7].find(l => lengthGroups[l]) ?? lengths[0];
  const defBtn = [...lengthButtons.querySelectorAll(".pill")].find(b => Number(b.dataset.len) === pick);
  selectLength(pick, defBtn);
}

function selectLength(len, btn) {
  currentLength = len;
  document.querySelectorAll("#lengthButtons .pill").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  updateWordBank();
  pickNewWord();
}

/* ============================================================
   WORD BANK
   ============================================================ */
function updateWordBank() {
  wordBank.innerHTML = "";
  if (!currentLength || !lengthGroups[currentLength]) {
    bankCount.textContent = "";
    const note = document.createElement("span");
    note.className = "wb-empty";
    note.textContent = "Pick a year group to begin.";
    wordBank.appendChild(note);
    return;
  }
  const list = [...lengthGroups[currentLength]].sort();
  bankCount.textContent = `(${list.length})`;
  list.forEach(w => {
    const span = document.createElement("span");
    span.className = "wb-word";
    span.textContent = w;
    span.dataset.word = w;
    wordBank.appendChild(span);
  });
}

function highlightWordBank(word, won) {
  const el = wordBank.querySelector(`[data-word="${word}"]`);
  if (el) el.classList.add(won ? "used-correct" : "used-wrong");
}

/* ============================================================
   GAME LOGIC
   ============================================================ */
function currentList() {
  return (currentLength && lengthGroups[currentLength]) ? lengthGroups[currentLength] : [];
}

function pickNewWord() {
  const list = currentList();
  if (list.length === 0) return;
  answer = list[Math.floor(Math.random() * list.length)];
  currentRow = 0;
  currentCol = 0;
  gameOver = false;
  hintUsed = false;
  message.textContent = "";
  message.className = "";
  Object.keys(keyStates).forEach(k => delete keyStates[k]);
  resetKeyboardColors();
  buildEmptyGrid();
  updateWordBank();
  hintBtn.style.opacity = "1";
  hintBtn.style.pointerEvents = "auto";
}

function buildEmptyGrid() {
  grid.innerHTML = "";
  const cols = answer.length;
  grid.style.gridTemplateColumns = `repeat(${cols}, 42px)`;
  for (let r = 0; r < maxRows; r++) {
    for (let c = 0; c < cols; c++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.dataset.row = r;
      tile.dataset.col = c;
      grid.appendChild(tile);
    }
  }
}

function getTile(row, col) {
  return grid.querySelector(`[data-row="${row}"][data-col="${col}"]`);
}
function getRowTiles(row) {
  return [...grid.querySelectorAll(`[data-row="${row}"]`)];
}
function setMessage(text, type = "") {
  message.textContent = text;
  message.className = type;
}

function handleKeyPress(key) {
  if (gameOver || !currentLength || !answer) return;
  if (key === "enter") {
    submitGuess();
  } else if (key === "⌫" || key === "backspace") {
    if (currentCol > 0) {
      currentCol--;
      const tile = getTile(currentRow, currentCol);
      tile.textContent = "";
      tile.classList.remove("filled");
    }
  } else if (key.length === 1 && /^[a-z]$/i.test(key)) {
    if (currentCol < answer.length) {
      const tile = getTile(currentRow, currentCol);
      tile.textContent = key.toUpperCase();
      tile.classList.add("filled", "pop");
      setTimeout(() => tile.classList.remove("pop"), 120);
      currentCol++;
    }
  }
}

function submitGuess() {
  if (currentCol < answer.length) {
    shakeRow(currentRow);
    setMessage(`Need ${answer.length} letters`, "fail");
    return;
  }
  const tiles = getRowTiles(currentRow);
  const guess = tiles.map(t => t.textContent.toLowerCase()).join("");

  if (!currentList().includes(guess)) {
    shakeRow(currentRow);
    setMessage("Not in this word bank", "fail");
    return;
  }

  const colors = Array(answer.length).fill("absent");
  const answerArr = answer.split("");
  const guessArr = guess.split("");
  const used = Array(answer.length).fill(false);

  for (let i = 0; i < guessArr.length; i++) {
    if (guessArr[i] === answerArr[i]) { colors[i] = "correct"; used[i] = true; }
  }
  for (let i = 0; i < guessArr.length; i++) {
    if (colors[i] === "correct") continue;
    for (let j = 0; j < answerArr.length; j++) {
      if (!used[j] && guessArr[i] === answerArr[j]) { colors[i] = "present"; used[j] = true; break; }
    }
  }

  tiles.forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add("reveal");
      setTimeout(() => {
        tile.classList.add(colors[i]);
        updateKeyState(guessArr[i], colors[i]);
      }, 220);
    }, i * 100);
  });

  const revealTime = tiles.length * 100 + 400;
  setTimeout(() => {
    if (guess === answer) {
      stats.played++; stats.won++; stats.streak++;
      updateStatsUI();
      const msgs = ["Brilliant! ✨","Amazing! 🎉","Well done! 🏆","Perfect! 💫","Nailed it! 🔥"];
      setMessage(msgs[Math.min(currentRow, msgs.length - 1)], "success");
      gameOver = true;
      highlightWordBank(answer, true);
      tiles.forEach((tile, i) => setTimeout(() => tile.classList.add("win-bounce"), i * 80));
    } else {
      currentRow++; currentCol = 0;
      if (currentRow >= maxRows) {
        stats.played++; stats.streak = 0;
        updateStatsUI();
        setMessage(`The word was ${answer.toUpperCase()}`, "fail");
        gameOver = true;
        highlightWordBank(answer, false);
      } else {
        setMessage(`${maxRows - currentRow} guesses left`);
      }
    }
  }, revealTime);
}

function shakeRow(row) {
  getRowTiles(row).forEach(t => {
    t.style.animation = "shake 0.4s ease";
    setTimeout(() => t.style.animation = "", 400);
  });
}

function updateKeyState(letter, state) {
  const priority = { correct: 3, present: 2, absent: 1 };
  const current = keyStates[letter];
  if (!current || priority[state] > priority[current]) keyStates[letter] = state;
  applyKeyColor(letter);
}
function applyKeyColor(letter) {
  const btn = keyboard.querySelector(`[data-key="${letter}"]`);
  if (btn) {
    btn.classList.remove("correct","present","absent");
    if (keyStates[letter]) btn.classList.add(keyStates[letter]);
  }
}
function resetKeyboardColors() {
  keyboard.querySelectorAll(".key").forEach(k => k.classList.remove("correct","present","absent"));
}
function updateStatsUI() {
  document.getElementById("statPlayed").textContent = stats.played;
  document.getElementById("statWon").textContent = stats.won;
  document.getElementById("statStreak").textContent = stats.streak;
}

hintBtn.addEventListener("click", () => {
  if (gameOver || !currentLength || !answer || hintUsed) return;
  hintUsed = true;
  const idx = Math.floor(Math.random() * answer.length);
  setMessage(`Hint: position ${idx + 1} is "${answer[idx].toUpperCase()}"`, "");
  hintBtn.style.opacity = "0.4";
  hintBtn.style.pointerEvents = "none";
});

newBtn.addEventListener("click", () => pickNewWord());

document.addEventListener("keydown", e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === "Enter") handleKeyPress("enter");
  else if (e.key === "Backspace") handleKeyPress("⌫");
  else if (/^[a-zA-Z]$/.test(e.key)) handleKeyPress(e.key.toLowerCase());
});

/* ============================================================
   INIT — auto-select first year group
   ============================================================ */
(function() {
  const firstBtn = yearButtons.querySelector(".pill");
  selectYear(YEARS[0], firstBtn);
})();
</script>
</body>
