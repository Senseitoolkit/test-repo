<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts of Speech</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F1EB;
    --card: #FFFFFF;
    --text: #2C2C2C;
    --text-muted: #8A8780;
    --accent: #E8653A;
    --accent-glow: #E8653A22;
    --green: #2D936C;
    --green-bg: #2D936C18;
    --red: #D64545;
    --red-bg: #D6454518;
    --border: #E0DDD6;
    --shadow: 0 2px 12px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 30px rgba(0,0,0,.1);
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  .container { max-width: 780px; margin: 0 auto; }

  header {
    text-align: center;
    margin-bottom: 20px;
    animation: fadeDown .5s ease;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -.02em;
    margin-bottom: 4px;
  }

  header p { color: var(--text-muted); font-size: .95rem; }

  /* YEAR SELECTOR */
  .year-selector {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 16px 0 8px;
    flex-wrap: wrap;
  }

  .year-btn {
    padding: 8px 16px;
    border: 2px solid var(--border);
    border-radius: 100px;
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    color: var(--text-muted);
  }

  .year-btn:hover { border-color: var(--accent); color: var(--accent); }

  .year-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 2px 10px rgba(232,101,58,.25);
  }

  .year-info {
    text-align: center;
    font-size: .8rem;
    color: var(--text-muted);
    margin-bottom: 18px;
    min-height: 1.2em;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 10px;
    margin-bottom: 4px;
    font-size: .85rem;
    color: var(--text-muted);
  }

  .stats-bar span { display: flex; align-items: center; gap: 6px; }
  .stats-bar .num { font-weight: 700; font-size: 1.05rem; color: var(--text); }

  /* MATCH AREA */
  .match-area {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    gap: 20px;
  }

  .column {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    max-width: 260px;
  }

  .column.right { align-items: flex-end; }

  .lines-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .lines-layer line {
    stroke: var(--accent);
    stroke-width: 2.5;
    stroke-linecap: round;
    opacity: .6;
    transition: stroke .3s, opacity .3s;
  }

  .lines-layer line.correct-line { stroke: var(--green); opacity: .8; }
  .lines-layer line.wrong-line { stroke: var(--red); opacity: .8; }

  /* CARDS */
  .word-card, .label-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all .2s;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
    z-index: 2;
    text-align: center;
    width: 100%;
    animation: fadeUp .4s ease both;
  }

  .word-card {
    padding: 14px 18px;
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
  }

  .label-card {
    padding: 14px 18px;
    font-size: .85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .word-card:nth-child(1), .label-card:nth-child(1) { animation-delay: .05s; }
  .word-card:nth-child(2), .label-card:nth-child(2) { animation-delay: .1s; }
  .word-card:nth-child(3), .label-card:nth-child(3) { animation-delay: .15s; }
  .word-card:nth-child(4), .label-card:nth-child(4) { animation-delay: .2s; }
  .word-card:nth-child(5), .label-card:nth-child(5) { animation-delay: .25s; }
  .word-card:nth-child(6), .label-card:nth-child(6) { animation-delay: .3s; }
  .word-card:nth-child(7), .label-card:nth-child(7) { animation-delay: .35s; }
  .word-card:nth-child(8), .label-card:nth-child(8) { animation-delay: .4s; }

  .word-card:hover, .label-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-lg); }

  .word-card.selected, .label-card.selected {
    border-color: var(--accent); background: var(--accent); color: #fff;
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  .word-card.matched, .label-card.matched {
    border-color: var(--accent); background: var(--accent-glow); color: var(--accent);
  }

  .word-card.correct, .label-card.correct {
    border-color: var(--green); background: var(--green-bg); color: var(--green);
  }

  .word-card.wrong, .label-card.wrong {
    border-color: var(--red); background: var(--red-bg); color: var(--red);
    animation: shake .4s ease;
  }

  .word-card.disabled, .label-card.disabled { pointer-events: none; }

  .word-card .dot, .label-card .dot {
    position: absolute; width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); top: 50%; transform: translateY(-50%); display: none;
  }

  .word-card .dot { right: -5px; }
  .label-card .dot { left: -5px; }

  .word-card.matched .dot, .label-card.matched .dot { display: block; background: var(--accent); }
  .word-card.correct .dot, .label-card.correct .dot { display: block; background: var(--green); }
  .word-card.wrong .dot, .label-card.wrong .dot { display: block; background: var(--red); }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; }

  .btn {
    flex: 1; padding: 14px 20px; border: none; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 700;
    cursor: pointer; transition: all .2s;
  }

  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 16px rgba(232,101,58,.3);
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,101,58,.4); }
  .btn-primary:disabled { opacity: .5; cursor: default; transform: none; }

  .btn-secondary { background: var(--card); color: var(--text); border: 2px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text); }

  .hint {
    text-align: center; font-size: .8rem; color: var(--text-muted);
    margin-top: 8px; opacity: .7;
  }

  .result-banner {
    margin-top: 20px; padding: 16px 20px; border-radius: var(--radius);
    font-weight: 700; font-size: 1.05rem; text-align: center;
    animation: fadeUp .3s ease; display: none;
  }

  .result-banner.show { display: block; }
  .result-banner.perfect { background: var(--green-bg); color: var(--green); border: 2px solid var(--green); }
  .result-banner.partial { background: var(--red-bg); color: var(--red); border: 2px solid var(--red); }
  .result-banner .sub { font-weight: 400; font-size: .85rem; margin-top: 4px; opacity: .8; }

  .answer-key {
    margin-top: 12px; display: none; gap: 4px;
    flex-direction: column; font-size: .85rem; color: var(--text-muted);
  }

  .answer-key.show { display: flex; }
  .answer-key span { display: flex; gap: 8px; }
  .answer-key .correct-answer { color: var(--green); font-weight: 600; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

  @media (max-width: 560px) {
    body { padding: 16px 10px 80px; }
    header h1 { font-size: 1.5rem; }
    .match-area { gap: 10px; }
    .column { max-width: none; }
    .word-card { padding: 10px 12px; font-size: 1rem; }
    .label-card { padding: 10px 12px; font-size: .75rem; }
    .year-btn { padding: 6px 12px; font-size: .78rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Parts of Speech</h1>
    <p>Match each word to its part of speech</p>

    <div class="year-selector" id="yearSelector"></div>
    <div class="year-info" id="yearInfo"></div>

    <div class="stats-bar">
      <span>Streak: <span class="num" id="streak">0</span></span>
      <span>Best: <span class="num" id="best">0</span></span>
      <span>Rounds: <span class="num" id="rounds">0</span></span>
    </div>
  </header>

  <div class="match-area" id="matchArea">
    <div class="column left" id="wordCol"></div>
    <svg class="lines-layer" id="linesLayer"></svg>
    <div class="column right" id="labelCol"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="checkBtn" onclick="checkAll()" disabled>Check Answers</button>
    <button class="btn btn-secondary" onclick="newSet()">New Set</button>
  </div>
  <div class="hint">Click a word then a label to match — or drag. Press <strong>Enter</strong> to check.</div>

  <div class="result-banner" id="result"></div>
  <div class="answer-key" id="answerKey"></div>
</div>

<script>
// ── YEAR DATA ──────────────────────────────────────────────
const yearData = {
  1: {
    focus: "Recognising basic word types",
    categories: {
      noun: ["mum","dad","teacher","boy","girl","school","home","park","shop","book","chair","ball","toy","dog","cat","bird","fish"],
      verb: ["run","jump","eat","play","go","look","sit","walk"],
      adjective: ["big","small","happy","sad","red","blue","fast","slow"],
      pronoun: ["I","me","you","he","she","it","we","they"],
      determiner: ["a","an","the","my","your"]
    }
  },
  2: {
    focus: "Building simple sentences",
    categories: {
      noun: ["dog","house","car","friend","school","Sam","Tokyo","Monday","Christmas"],
      verb: ["go","play","eat","have","see","went","played","ate","had","saw","is","am","are","was","were"],
      adjective: ["big","small","happy","sad","hot","cold","good","bad","tall","short"],
      pronoun: ["I","me","you","he","him","she","her","it","we","us","they","them"],
      determiner: ["a","an","the","my","your","his","her","this","that","some"],
      conjunction: ["and","but","so","because"],
      adverb: ["quickly","slowly","very","well","always"]
    }
  },
  3: {
    focus: "Adding detail and clarity",
    categories: {
      noun: ["teacher","city","river","book","friend","fun","happiness","idea","hope","fear"],
      verb: ["play","jump","look","go","see","take","come","make","think","know","get"],
      adjective: ["bright","dark","loud","quiet","brave","kind","old","young","beautiful","ugly"],
      adverb: ["quickly","slowly","carefully","now","later","yesterday","always","often","never"],
      pronoun: ["he","him","she","her","they","them","we","us","it"],
      conjunction: ["and","but","so","because","when","if"],
      preposition: ["in","on","under","behind","next to","between"]
    }
  },
  4: {
    focus: "Strengthening grammar control",
    categories: {
      noun: ["dogs","children","books","cities","family","team","garden","teacher"],
      verb: ["walk","walked","eat","ate","see","saw","build","bring","choose","leave"],
      adjective: ["bigger","smaller","faster","happiest","interesting","exciting","difficult","easy"],
      adverb: ["carefully","loudly","quietly","quickly","often","usually","sometimes","rarely","very","quite"],
      pronoun: ["he","she","they","him","her","them","we","us","it"],
      conjunction: ["and","but","or","so","because","although","when"],
      preposition: ["in","on","under","behind","near","at"],
      determiner: ["some","many","few","this","that","these","those","my","your","their"]
    }
  },
  5: {
    focus: "Expanding complexity and precision",
    categories: {
      noun: ["freedom","courage","danger","success","knowledge","team","group","class","family","crowd","environment","community","government"],
      verb: ["could","should","would","might","must","believe","decide","explain","improve","create"],
      adjective: ["enormous","tiny","furious","delighted","ancient","modern","dangerous","safe","unusual","typical"],
      adverb: ["very","extremely","quite","almost","nearly","really","clearly","suddenly","immediately"],
      pronoun: ["he","she","they","them","us","who","which","that"],
      conjunction: ["because","although","if","when","while"],
      preposition: ["before","after","during","through","across","towards"],
      determiner: ["each","every","several","many","few","either","neither","my","their","our"]
    }
  },
  6: {
    focus: "Precision, cohesion, and formality",
    categories: {
      noun: ["justice","responsibility","achievement","equality","influence","climate","energy","democracy","industry","education","evidence","argument","conclusion"],
      verb: ["must","should","could","might","ought","has eaten","had finished","was built","were chosen","is known"],
      adjective: ["significant","minor","effective","ineffective","important","essential","complex","simple","positive","negative"],
      adverb: ["clearly","obviously","possibly","perhaps","certainly","definitely","unfortunately","fortunately","effectively","successfully"],
      pronoun: ["they","them","we","us","who","which","that","everyone","someone","anything"],
      conjunction: ["although","because","if","while","whereas","therefore"],
      preposition: ["in addition to","in contrast to","according to","because of","despite","instead of"]
    }
  }
};

// ── STATE ──────────────────────────────────────────────────
let currentYear = 1;
let currentSet = [];
let currentCategories = [];
let labelOrder = [];
let matches = {};
let selectedWord = null;
let selectedLabelIdx = null;
let streak = 0;
let best = 0;
let rounds = 0;
let checked = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── YEAR SELECTOR ──────────────────────────────────────────
function buildYearSelector() {
  const sel = document.getElementById("yearSelector");
  sel.innerHTML = "";
  [1,2,3,4,5,6].forEach(y => {
    const btn = document.createElement("button");
    btn.className = "year-btn" + (y === currentYear ? " active" : "");
    btn.textContent = "Year " + y;
    btn.onclick = () => {
      if (y === currentYear) return;
      currentYear = y;
      streak = 0; rounds = 0;
      document.getElementById("streak").textContent = 0;
      document.getElementById("rounds").textContent = 0;
      buildYearSelector();
      newSet();
    };
    sel.appendChild(btn);
  });

  document.getElementById("yearInfo").textContent = yearData[currentYear].focus;
}

// ── GAME LOGIC ─────────────────────────────────────────────
function newSet() {
  checked = false;
  selectedWord = null;
  selectedLabelIdx = null;
  matches = {};

  document.getElementById("result").className = "result-banner";
  document.getElementById("answerKey").className = "answer-key";
  document.getElementById("checkBtn").disabled = true;

  const data = yearData[currentYear];
  currentCategories = Object.keys(data.categories);

  // Pick one random word per category
  currentSet = shuffle(currentCategories.map(type => {
    const list = data.categories[type];
    return { word: list[Math.floor(Math.random() * list.length)], type };
  }));

  labelOrder = shuffle(currentCategories.map((_, i) => i));

  renderAll();
}

function renderAll() {
  const wordCol = document.getElementById("wordCol");
  const labelCol = document.getElementById("labelCol");
  wordCol.innerHTML = "";
  labelCol.innerHTML = "";

  const count = currentSet.length;

  currentSet.forEach((item, i) => {
    const card = document.createElement("div");
    card.className = "word-card";
    card.dataset.wordIndex = i;
    card.innerHTML = `${item.word}<div class="dot"></div>`;
    card.onclick = () => clickWord(i);

    card.ondragover = e => { e.preventDefault(); card.style.borderColor = 'var(--accent)'; };
    card.ondragleave = () => { if (!card.classList.contains('selected') && !card.classList.contains('matched')) card.style.borderColor = ''; };
    card.ondrop = e => {
      e.preventDefault(); card.style.borderColor = '';
      const li = parseInt(e.dataTransfer.getData("text/plain"));
      if (!isNaN(li)) makeMatch(i, li);
    };

    wordCol.appendChild(card);
  });

  labelOrder.forEach((origIdx, displayIdx) => {
    const type = currentSet[origIdx].type;
    const card = document.createElement("div");
    card.className = "label-card";
    card.dataset.labelIndex = displayIdx;
    card.dataset.origIndex = origIdx;
    card.dataset.type = type;
    card.draggable = true;
    card.innerHTML = `<div class="dot"></div>${type}`;
    card.onclick = () => clickLabel(displayIdx);
    card.ondragstart = e => {
      e.dataTransfer.setData("text/plain", displayIdx.toString());
      e.dataTransfer.effectAllowed = "move";
    };
    labelCol.appendChild(card);
  });

  drawLines();
}

function clickWord(idx) {
  if (checked) return;
  if (matches[idx] !== undefined) {
    delete matches[idx];
    refreshCardStates(); drawLines(); updateCheckBtn();
    selectedWord = idx; selectedLabelIdx = null;
    refreshCardStates(); return;
  }
  if (selectedLabelIdx !== null) { makeMatch(idx, selectedLabelIdx); return; }
  selectedWord = selectedWord === idx ? null : idx;
  selectedLabelIdx = null;
  refreshCardStates();
}

function clickLabel(idx) {
  if (checked) return;
  const mw = Object.keys(matches).find(k => matches[k] === idx);
  if (mw !== undefined) {
    delete matches[mw];
    refreshCardStates(); drawLines(); updateCheckBtn();
    selectedLabelIdx = idx; selectedWord = null;
    refreshCardStates(); return;
  }
  if (selectedWord !== null) { makeMatch(selectedWord, idx); return; }
  selectedLabelIdx = selectedLabelIdx === idx ? null : idx;
  selectedWord = null;
  refreshCardStates();
}

function makeMatch(wordIdx, labelIdx) {
  if (checked) return;
  Object.keys(matches).forEach(k => {
    if (parseInt(k) === wordIdx || matches[k] === labelIdx) delete matches[k];
  });
  matches[wordIdx] = labelIdx;
  selectedWord = null; selectedLabelIdx = null;
  refreshCardStates(); drawLines(); updateCheckBtn();
}

function refreshCardStates() {
  const matchedLabels = new Set(Object.values(matches));
  document.querySelectorAll('.word-card').forEach(c => {
    const i = parseInt(c.dataset.wordIndex);
    c.classList.remove('selected','matched','correct','wrong','disabled');
    if (matches[i] !== undefined) c.classList.add('matched');
    else if (selectedWord === i) c.classList.add('selected');
  });
  document.querySelectorAll('.label-card').forEach(c => {
    const li = parseInt(c.dataset.labelIndex);
    c.classList.remove('selected','matched','correct','wrong','disabled');
    if (matchedLabels.has(li)) c.classList.add('matched');
    else if (selectedLabelIdx === li) c.classList.add('selected');
  });
}

function drawLines() {
  const svg = document.getElementById("linesLayer");
  const area = document.getElementById("matchArea");
  const r = area.getBoundingClientRect();
  svg.innerHTML = "";
  svg.setAttribute("width", r.width);
  svg.setAttribute("height", r.height);

  Object.keys(matches).forEach(wi => {
    const li = matches[wi];
    const wc = document.querySelector(`.word-card[data-word-index="${wi}"]`);
    const lc = document.querySelector(`.label-card[data-label-index="${li}"]`);
    if (!wc || !lc) return;
    const wr = wc.getBoundingClientRect();
    const lr = lc.getBoundingClientRect();
    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1", wr.right - r.left);
    line.setAttribute("y1", wr.top + wr.height/2 - r.top);
    line.setAttribute("x2", lr.left - r.left);
    line.setAttribute("y2", lr.top + lr.height/2 - r.top);
    line.dataset.wordIndex = wi;
    svg.appendChild(line);
  });
}

function updateCheckBtn() {
  const needed = currentSet.length;
  document.getElementById("checkBtn").disabled = Object.keys(matches).length < needed;
}

function checkAll() {
  if (checked) return;
  checked = true;
  let correct = 0;
  const total = currentSet.length;

  Object.keys(matches).forEach(wi => {
    const i = parseInt(wi);
    const li = matches[i];
    const lc = document.querySelector(`.label-card[data-label-index="${li}"]`);
    const wc = document.querySelector(`.word-card[data-word-index="${i}"]`);
    const line = document.querySelector(`#linesLayer line[data-word-index="${i}"]`);
    const ok = lc.dataset.type === currentSet[i].type;

    wc.classList.remove('matched');
    lc.classList.remove('matched');
    wc.classList.add(ok ? 'correct' : 'wrong', 'disabled');
    lc.classList.add(ok ? 'correct' : 'wrong', 'disabled');
    if (line) line.classList.add(ok ? 'correct-line' : 'wrong-line');
    if (ok) correct++;
  });

  rounds++;

  if (correct === total) {
    streak++;
    if (streak > best) best = streak;
  } else {
    streak = 0;
    const keyEl = document.getElementById("answerKey");
    keyEl.innerHTML = "<strong>Corrections:</strong>" +
      currentSet.map((item, i) => {
        const li = matches[i];
        if (li === undefined) return "";
        const lc = document.querySelector(`.label-card[data-label-index="${li}"]`);
        return lc.dataset.type !== item.type
          ? `<span>${item.word}: <span class="correct-answer">${item.type}</span></span>`
          : "";
      }).filter(Boolean).join("");
    keyEl.classList.add('show');
  }

  document.getElementById("streak").textContent = streak;
  document.getElementById("best").textContent = best;
  document.getElementById("rounds").textContent = rounds;

  const res = document.getElementById("result");
  if (correct === total) {
    res.className = "result-banner show perfect";
    res.innerHTML = `✓ Perfect! ${total}/${total}<div class="sub">${streak > 1 ? streak + ' in a row!' : 'Keep going!'}</div>`;
  } else {
    res.className = "result-banner show partial";
    res.innerHTML = `${correct}/${total} correct<div class="sub">Review the corrections below</div>`;
  }

  document.getElementById("checkBtn").disabled = true;
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    const needed = currentSet.length;
    if (!checked && Object.keys(matches).length >= needed) checkAll();
  }
});

window.addEventListener("resize", drawLines);
