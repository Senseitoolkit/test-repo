<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts of Speech</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F1EB;
    --card: #FFFFFF;
    --text: #2C2C2C;
    --text-muted: #8A8780;
    --accent: #E8653A;
    --accent-glow: #E8653A22;
    --green: #2D936C;
    --green-bg: #2D936C18;
    --red: #D64545;
    --red-bg: #D6454518;
    --border: #E0DDD6;
    --shadow: 0 2px 12px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 30px rgba(0,0,0,.1);
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown .5s ease;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -.02em;
    margin-bottom: 4px;
  }

  header p {
    color: var(--text-muted);
    font-size: .95rem;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 14px;
    font-size: .85rem;
    color: var(--text-muted);
  }

  .stats-bar span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stats-bar .num {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--text);
  }

  /* WORD ROWS */
  .word-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .word-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    box-shadow: var(--shadow);
    transition: border-color .3s, box-shadow .3s, transform .15s;
    animation: fadeUp .4s ease both;
  }

  .word-row:nth-child(1) { animation-delay: .05s; }
  .word-row:nth-child(2) { animation-delay: .1s; }
  .word-row:nth-child(3) { animation-delay: .15s; }
  .word-row:nth-child(4) { animation-delay: .2s; }
  .word-row:nth-child(5) { animation-delay: .25s; }
  .word-row:nth-child(6) { animation-delay: .3s; }
  .word-row:nth-child(7) { animation-delay: .35s; }

  .word-row.correct {
    border-color: var(--green);
    background: var(--green-bg);
  }

  .word-row.wrong {
    border-color: var(--red);
    background: var(--red-bg);
    animation: shake .4s ease;
  }

  .word-row .index {
    font-size: .75rem;
    font-weight: 700;
    color: var(--text-muted);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }

  .word-row .word {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    flex: 1;
    min-width: 0;
  }

  .drop-zone {
    min-width: 130px;
    height: 42px;
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .8rem;
    font-weight: 600;
    color: var(--text-muted);
    transition: all .2s;
    flex-shrink: 0;
    cursor: pointer;
    position: relative;
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .drop-zone.active {
    border-color: var(--accent);
    background: var(--accent-glow);
    color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .drop-zone.filled {
    border-style: solid;
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
    font-weight: 700;
  }

  .drop-zone.correct-fill {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-bg);
  }

  .drop-zone.wrong-fill {
    border-color: var(--red);
    color: var(--red);
    background: var(--red-bg);
  }

  .drop-zone .clear-btn {
    position: absolute;
    right: -8px;
    top: -8px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--text);
    color: #fff;
    font-size: 11px;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .drop-zone.filled .clear-btn {
    display: flex;
  }

  /* LABEL BANK */
  .bank-section {
    margin-bottom: 24px;
  }

  .bank-section h3 {
    font-size: .8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .label-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .label {
    padding: 10px 16px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: grab;
    font-size: .82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    transition: all .2s;
    user-select: none;
    -webkit-user-select: none;
    box-shadow: var(--shadow);
  }

  .label:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }

  .label:active {
    cursor: grabbing;
    transform: scale(.95);
  }

  .label.used {
    opacity: .3;
    pointer-events: none;
    transform: scale(.95);
  }

  .label.selected {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  /* BUTTONS */
  .btn-row {
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 14px 20px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(232,101,58,.3);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(232,101,58,.4);
  }

  .btn-primary:disabled {
    opacity: .5;
    cursor: default;
    transform: none;
  }

  .btn-secondary {
    background: var(--card);
    color: var(--text);
    border: 2px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--text);
  }

  /* RESULT */
  .result-banner {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: var(--radius);
    font-weight: 700;
    font-size: 1.05rem;
    text-align: center;
    animation: fadeUp .3s ease;
    display: none;
  }

  .result-banner.show { display: block; }

  .result-banner.perfect {
    background: var(--green-bg);
    color: var(--green);
    border: 2px solid var(--green);
  }

  .result-banner.partial {
    background: var(--red-bg);
    color: var(--red);
    border: 2px solid var(--red);
  }

  .result-banner .sub {
    font-weight: 400;
    font-size: .85rem;
    margin-top: 4px;
    opacity: .8;
  }

  /* ANSWER KEY */
  .answer-key {
    margin-top: 12px;
    display: none;
    gap: 4px;
    flex-direction: column;
    font-size: .85rem;
    color: var(--text-muted);
  }

  .answer-key.show { display: flex; }

  .answer-key span { display: flex; gap: 8px; }
  .answer-key .correct-answer { color: var(--green); font-weight: 600; }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    body { padding: 16px 12px 80px; }
    header h1 { font-size: 1.6rem; }
    .word-row { padding: 10px 12px; gap: 8px; }
    .word-row .word { font-size: 1.1rem; }
    .drop-zone { min-width: 105px; height: 38px; font-size: .72rem; }
    .label { padding: 8px 12px; font-size: .75rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Parts of Speech</h1>
    <p>Match each word to its part of speech</p>
    <div class="stats-bar">
      <span>Streak: <span class="num" id="streak">0</span></span>
      <span>Best: <span class="num" id="best">0</span></span>
      <span>Rounds: <span class="num" id="rounds">0</span></span>
    </div>
  </header>

  <div class="word-list" id="wordArea"></div>

  <div class="bank-section">
    <h3>Parts of Speech</h3>
    <div class="label-bank" id="labelBank"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="checkBtn" onclick="checkAll()" disabled>Check Answers</button>
    <button class="btn btn-secondary" onclick="newSet()">New Set</button>
  </div>

  <div class="result-banner" id="result"></div>
  <div class="answer-key" id="answerKey"></div>
</div>

<script>
const words = {
  verb: ["Run","Think","Create","Build","Write","Speak","Learn","Teach","Travel","Sleep","Grow","Buy","Repair","Observe","Decide","Explore","Discuss","Improve","Imagine","Celebrate"],
  adverb: ["Quickly","Slowly","Carefully","Loudly","Quietly","Rarely","Often","Almost","Completely","Suddenly","Easily","Honestly","Regularly","Gently","Eagerly"],
  pronoun: ["I","You","He","She","It","We","They","Me","Him","Her","Us","Them","Mine","Yours","Ours"],
  noun: ["Teacher","Mountain","Computer","River","Family","Book","City","Apple","Student","Garden","Idea","Music","Vehicle","Language","Freedom","Ocean","Library","Memory","Courage","Horizon"],
  adjective: ["Strong","Intelligent","Small","Ancient","Bright","Honest","Difficult","Comfortable","Expensive","Creative","Reliable","Friendly","Cold","Fast","Patient","Elegant","Fearless","Vivid"],
  conjunction: ["And","But","Or","Because","Although","Since","Unless","While","So","Yet","Before","After","Whether","Nor","Whereas"],
  preposition: ["In","On","At","Under","Between","Through","Across","Behind","Near","During","Without","Above","Around","Inside","Against"]
};

const categories = ["verb","adverb","pronoun","noun","adjective","conjunction","preposition"];
const categoryColors = {
  verb: "#E8653A",
  adverb: "#9B59B6",
  pronoun: "#3498DB",
  noun: "#2D936C",
  adjective: "#E67E22",
  conjunction: "#1ABC9C",
  preposition: "#E74C3C"
};

let currentSet = [];
let selectedLabel = null;
let streak = 0;
let best = 0;
let rounds = 0;
let checked = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function newSet() {
  checked = false;
  selectedLabel = null;
  document.getElementById("result").className = "result-banner";
  document.getElementById("answerKey").className = "answer-key";
  document.getElementById("checkBtn").disabled = true;

  currentSet = shuffle(categories.map(type => {
    const list = words[type];
    return { word: list[Math.floor(Math.random() * list.length)], type };
  }));

  renderRows();
  renderBank();
}

function renderRows() {
  const area = document.getElementById("wordArea");
  area.innerHTML = "";

  currentSet.forEach((item, i) => {
    const row = document.createElement("div");
    row.className = "word-row";
    row.innerHTML = `
      <span class="index">${i + 1}</span>
      <span class="word">${item.word}</span>
      <div class="drop-zone" data-index="${i}" onclick="onDropZoneClick(this)">
        <span class="dz-text">—</span>
        <button class="clear-btn" onclick="event.stopPropagation(); clearZone(this.parentElement)">✕</button>
      </div>
    `;

    const dz = row.querySelector('.drop-zone');
    dz.ondragover = e => { e.preventDefault(); dz.classList.add('active'); };
    dz.ondragleave = () => dz.classList.remove('active');
    dz.ondrop = e => {
      e.preventDefault();
      dz.classList.remove('active');
      const type = e.dataTransfer.getData("text");
      assignLabel(dz, type);
    };

    area.appendChild(row);
  });
}

function renderBank() {
  const bank = document.getElementById("labelBank");
  bank.innerHTML = "";

  shuffle([...categories]).forEach(cat => {
    const div = document.createElement("div");
    div.className = "label";
    div.textContent = cat;
    div.dataset.type = cat;
    div.draggable = true;

    div.ondragstart = e => {
      e.dataTransfer.setData("text", cat);
      setTimeout(() => div.classList.add('used'), 0);
    };
    div.ondragend = () => {
      // If not actually placed, restore
      const placed = document.querySelector(`.drop-zone[data-answer="${cat}"]`);
      if (!placed) div.classList.remove('used');
    };

    div.onclick = () => {
      if (checked) return;
      if (div.classList.contains('used')) return;

      // Toggle selection
      if (selectedLabel === cat) {
        div.classList.remove('selected');
        selectedLabel = null;
        return;
      }

      document.querySelectorAll('.label.selected').forEach(l => l.classList.remove('selected'));
      div.classList.add('selected');
      selectedLabel = cat;
    };

    // Touch support
    div.addEventListener('touchstart', e => {
      if (checked) return;
      if (div.classList.contains('used')) return;
      e.preventDefault();
      document.querySelectorAll('.label.selected').forEach(l => l.classList.remove('selected'));
      div.classList.add('selected');
      selectedLabel = cat;
    }, { passive: false });

    bank.appendChild(div);
  });
}

function onDropZoneClick(dz) {
  if (checked) return;
  if (!selectedLabel) return;

  assignLabel(dz, selectedLabel);
  selectedLabel = null;
}

function assignLabel(dz, type) {
  if (checked) return;

  // If this zone had a previous answer, free it
  const prev = dz.dataset.answer;
  if (prev) {
    const prevLabel = document.querySelector(`.label[data-type="${prev}"]`);
    if (prevLabel) prevLabel.classList.remove('used', 'selected');
  }

  // If this type was used elsewhere, free that zone
  const existingZone = document.querySelector(`.drop-zone[data-answer="${type}"]`);
  if (existingZone && existingZone !== dz) {
    existingZone.dataset.answer = "";
    existingZone.querySelector('.dz-text').textContent = "—";
    existingZone.classList.remove('filled');
  }

  dz.dataset.answer = type;
  dz.querySelector('.dz-text').textContent = type;
  dz.classList.add('filled');

  const label = document.querySelector(`.label[data-type="${type}"]`);
  if (label) {
    label.classList.add('used');
    label.classList.remove('selected');
  }

  selectedLabel = null;
  document.querySelectorAll('.label.selected').forEach(l => l.classList.remove('selected'));

  updateCheckBtn();
}

function clearZone(dz) {
  if (checked) return;
  const type = dz.dataset.answer;
  if (type) {
    const label = document.querySelector(`.label[data-type="${type}"]`);
    if (label) label.classList.remove('used', 'selected');
  }
  dz.dataset.answer = "";
  dz.querySelector('.dz-text').textContent = "—";
  dz.classList.remove('filled');
  updateCheckBtn();
}

function updateCheckBtn() {
  const allFilled = [...document.querySelectorAll('.drop-zone')].every(z => z.dataset.answer);
  document.getElementById("checkBtn").disabled = !allFilled;
}

function checkAll() {
  if (checked) return;
  checked = true;
  let correct = 0;

  document.querySelectorAll(".drop-zone").forEach((zone, i) => {
    const actualIndex = parseInt(zone.dataset.index);
    const chosen = zone.dataset.answer;
    const correctType = currentSet[actualIndex].type;
    const row = zone.closest('.word-row');

    if (chosen === correctType) {
      row.classList.add('correct');
      zone.classList.add('correct-fill');
      correct++;
    } else {
      row.classList.add('wrong');
      zone.classList.add('wrong-fill');
    }
  });

  rounds++;

  if (correct === 7) {
    streak++;
    if (streak > best) best = streak;
  } else {
    streak = 0;
    // Show answer key
    const keyEl = document.getElementById("answerKey");
    keyEl.innerHTML = "<strong>Corrections:</strong>" +
      currentSet.map((item, i) => {
        const zone = document.querySelector(`.drop-zone[data-index="${i}"]`);
        const chosen = zone.dataset.answer;
        if (chosen !== item.type) {
          return `<span>${item.word}: <span class="correct-answer">${item.type}</span></span>`;
        }
        return "";
      }).filter(Boolean).join("");
    keyEl.classList.add('show');
  }

  document.getElementById("streak").textContent = streak;
  document.getElementById("best").textContent = best;
  document.getElementById("rounds").textContent = rounds;

  const result = document.getElementById("result");
  if (correct === 7) {
    result.className = "result-banner show perfect";
    result.innerHTML = `✓ Perfect! 7/7<div class="sub">${streak > 1 ? streak + ' in a row!' : 'Keep going!'}</div>`;
  } else {
    result.className = "result-banner show partial";
    result.innerHTML = `${correct}/7 correct<div class="sub">Review the corrections below</div>`;
  }

  document.getElementById("checkBtn").disabled = true;
}

newSet();
</script>

</body>
</html>
