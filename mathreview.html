<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths★Lab — Tricky Concepts by Year</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1724;
            --surface: #1a2540;
            --surface2: #1f2d4a;
            --accent: #ff6b35;
            --accent2: #ffd166;
            --green: #06d6a0;
            --red: #ef476f;
            --purple: #b388ff;
            --text: #e8edf5;
            --muted: #7a8aaa;
            --font-display: 'Fredoka One', cursive;
            --font-body: 'Nunito', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(255,107,53,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 90%, rgba(255,209,102,0.06) 0%, transparent 50%);
            font-family: var(--font-body);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 48px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 540px;
            margin-bottom: 20px;
        }

        .title {
            font-family: var(--font-display);
            font-size: 2rem;
            color: white;
            line-height: 1;
        }

        .title span { color: var(--accent); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .streak {
            background: rgba(255,209,102,0.15);
            border: 1.5px solid rgba(255,209,102,0.4);
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: 700;
            color: var(--accent2);
            display: none;
            align-items: center;
            gap: 5px;
            animation: popIn 0.3s ease;
        }

        .streak.visible { display: flex; }

        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* ─── Year chip ─── */
        .year-chip {
            display: none;
            align-items: center;
            gap: 6px;
            background: rgba(179,136,255,0.14);
            border: 1.5px solid rgba(179,136,255,0.45);
            color: var(--purple);
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.18s;
        }
        .year-chip.visible { display: inline-flex; }
        .year-chip:hover { background: rgba(179,136,255,0.25); }

        /* ─── Start screen ─── */
        .start {
            width: 100%;
            max-width: 540px;
            animation: slideIn 0.3s ease;
        }
        .start-lead {
            font-size: 1.05rem;
            color: var(--muted);
            font-weight: 700;
            margin-bottom: 18px;
            line-height: 1.5;
        }
        .start-lead b { color: var(--accent2); }
        .year-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .year-tile {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 18px 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.18s ease;
            color: var(--text);
            font-family: var(--font-body);
        }
        .year-tile:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }
        .year-tile:active { transform: scale(0.98); }
        .year-name {
            font-family: var(--font-display);
            font-size: 1.25rem;
            color: white;
            line-height: 1;
            margin-bottom: 8px;
        }
        .year-name .yr-emoji { margin-right: 6px; }
        .year-theme {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 700;
            line-height: 1.4;
        }

        .card {
            width: 100%;
            max-width: 540px;
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.07);
            padding: 28px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: slideIn 0.3s ease;
            display: none;
        }
        .card.visible { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 18px;
        }

        .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }

        .type-badge {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.03em;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .strand-badge {
            background: rgba(179,136,255,0.16);
            border: 1px solid rgba(179,136,255,0.35);
            color: var(--purple);
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.05em;
        }
        .tricky-badge {
            background: rgba(255,107,53,0.16);
            border: 1px solid rgba(255,107,53,0.4);
            color: var(--accent);
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 800;
            line-height: 1.4;
            color: white;
            margin-top: 10px;
        }

        .visual-box {
            background: var(--surface2);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.9rem;
            font-family: var(--font-display);
            color: var(--accent2);
            margin-bottom: 18px;
            min-height: 70px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .dot-grid { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .dot-row { display: flex; gap: 8px; }
        .dot {
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 2px 6px rgba(255,107,53,0.4);
        }

        .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

        .option-btn {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.1);
            background: var(--surface2);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
            transition: all 0.18s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .option-btn:not(.disabled):hover {
            border-color: var(--accent);
            background: rgba(255,107,53,0.08);
            transform: translateX(4px);
        }
        .option-btn:not(.disabled):active { transform: scale(0.98); }
        .option-btn.disabled { cursor: default; }
        .option-btn.correct {
            border-color: var(--green);
            background: rgba(6,214,160,0.12);
            color: var(--green);
        }
        .option-btn.wrong {
            border-color: var(--red);
            background: rgba(239,71,111,0.1);
            color: var(--red);
            text-decoration: line-through;
            opacity: 0.7;
        }
        .option-letter {
            width: 28px; height: 28px; border-radius: 8px;
            background: rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 900; flex-shrink: 0;
        }
        .option-result { margin-left: auto; font-weight: 900; }

        .feedback-box {
            background: var(--surface2);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid rgba(255,255,255,0.07);
            margin-top: 4px;
            animation: slideIn 0.25s ease;
            display: none;
        }
        .feedback-box.visible { display: block; }
        .feedback-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 6px; }
        .feedback-title.correct { color: var(--green); }
        .feedback-title.wrong { color: var(--red); }
        .feedback-answer { color: var(--accent2); font-size: 0.9rem; margin-bottom: 8px; font-weight: 800; }
        .feedback-explanation { color: var(--text); font-size: 0.95rem; line-height: 1.5; margin-bottom: 8px; }
        .feedback-trap {
            color: var(--accent);
            font-size: 0.88rem;
            line-height: 1.45;
            font-weight: 700;
            background: rgba(255,107,53,0.08);
            border-left: 3px solid var(--accent);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 14px;
            display: none;
        }
        .feedback-trap.visible { display: block; }

        .next-btn {
            background: var(--accent);
            color: white; border: none; border-radius: 12px;
            padding: 12px 24px;
            font-family: var(--font-body);
            font-size: 1rem; font-weight: 800; cursor: pointer;
            transition: all 0.18s; letter-spacing: 0.03em;
        }
        .next-btn:hover {
            background: #ff8255; transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255,107,53,0.4);
        }

        .progress-bar-wrap {
            width: 100%; max-width: 540px; height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 999px; margin-top: 20px; overflow: hidden;
            display: none;
        }
        .progress-bar-wrap.visible { display: block; }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 999px; transition: width 0.5s ease; width: 0%;
        }

        .stats-row { width: 100%; max-width: 540px; display: none; gap: 10px; margin-top: 16px; }
        .stats-row.visible { display: flex; }
        .stat-chip {
            flex: 1; background: var(--surface);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px; padding: 12px; text-align: center;
        }
        .stat-num { font-family: var(--font-display); font-size: 1.7rem; color: white; line-height: 1; }
        .stat-label {
            font-size: 0.72rem; color: var(--muted); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px;
        }

        .ring-text { fill: white; font-size: 13px; font-weight: 700; font-family: var(--font-body); }

        @media (max-width: 500px) {
            .title { font-size: 1.5rem; }
            .question-text { font-size: 1.12rem; }
            .visual-box { font-size: 1.4rem; }
            .stat-num { font-size: 1.35rem; }
            .year-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1 class="title">Maths<span>★</span>Lab</h1>
        <div class="header-right">
            <div class="year-chip" id="yearChip" onclick="goHome()">📚 <span id="yearChipLabel"></span> ↺</div>
            <div class="streak" id="streak">🔥 <span id="streakCount">0</span> streak</div>
            <svg width="76" height="76" viewBox="0 0 80 80" id="progressRing" style="display:none">
                <circle cx="40" cy="40" r="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6" />
                <circle cx="40" cy="40" r="30" fill="none" stroke="var(--accent)" stroke-width="6"
                    stroke-dasharray="0 188.5" stroke-linecap="round" transform="rotate(-90 40 40)"
                    id="ringProgress" style="transition: stroke-dasharray 0.5s ease" />
                <text x="40" y="44" text-anchor="middle" class="ring-text" id="ringText">0/0</text>
            </svg>
        </div>
    </div>

    <!-- Start screen -->
    <div class="start" id="startScreen">
        <p class="start-lead">Pick a year group. Each set drills the concepts children most often <b>trip up on</b> at that stage — with the common trap explained every time.</p>
        <div class="year-grid" id="yearGrid"></div>
    </div>

    <!-- Quiz card -->
    <div class="card" id="card">
        <div class="card-top">
            <div style="min-width:0">
                <div class="badges" id="badges"></div>
                <p class="question-text" id="questionText"></p>
            </div>
        </div>
        <div class="visual-box" id="visualBox" style="display:none;"></div>
        <div class="options" id="options"></div>
        <div class="feedback-box" id="feedback">
            <p class="feedback-title" id="feedbackTitle"></p>
            <p class="feedback-answer" id="feedbackAnswer"></p>
            <p class="feedback-explanation" id="feedbackExplanation"></p>
            <p class="feedback-trap" id="feedbackTrap"></p>
            <button class="next-btn" onclick="nextQuestion()">Next Question →</button>
        </div>
    </div>

    <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar-fill" id="progressBar"></div>
    </div>

    <div class="stats-row" id="statsRow">
        <div class="stat-chip"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Attempted</div></div>
        <div class="stat-chip"><div class="stat-num" style="color:var(--green)" id="statCorrect">0</div><div class="stat-label">Correct</div></div>
        <div class="stat-chip"><div class="stat-num" style="color:var(--accent2)" id="statPct">0%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-chip"><div class="stat-num" style="color:var(--accent)" id="statStreak">0</div><div class="stat-label">Streak</div></div>
    </div>

    <script>
        /* ─── Utilities ─── */
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
        const pick = (arr) => arr[rand(0, arr.length - 1)];

        // Build a 4-option MCQ: answer + distractors, de-duplicated, padded if needed.
        function opts(answer, distractors, padFn) {
            const seen = new Set([String(answer)]);
            const out = [String(answer)];
            for (const d of distractors) {
                const s = String(d);
                if (!seen.has(s)) { seen.add(s); out.push(s); }
                if (out.length === 4) break;
            }
            let guard = 0;
            while (out.length < 4 && guard++ < 50) {
                const s = String(padFn ? padFn() : rand(0, 99));
                if (!seen.has(s)) { seen.add(s); out.push(s); }
            }
            return shuffle(out);
        }

        // Build a 4-option MCQ from explicit string candidates; de-dupes, keeps answer.
        function mcStr(answer, cands) {
            const a = String(answer), seen = new Set([a]), out = [a];
            for (const c of cands) {
                const s = String(c);
                if (!seen.has(s)) { seen.add(s); out.push(s); }
                if (out.length === 4) break;
            }
            let k = 1;
            while (out.length < 4) { const s = a + " " + "•".repeat(k); if (!seen.has(s)) { seen.add(s); out.push(s); } k++; }
            return shuffle(out);
        }

        /* ════════════════════════════════════════════════════
           QUESTION BANKS — tricky concepts per year group.
           Each generator returns:
           { strand, type, emoji, question, visual?, options, answer, explanation, trap }
           Distractors are built from the actual misconceptions.
           ════════════════════════════════════════════════════ */

        const BANKS = {

        /* ─────────── RECEPTION ─────────── */
        "Reception": [
            function teenIsTenAndMore() {
                const n = rand(11, 19), more = n - 10;
                return {
                    strand: "Counting", type: "Teen Numbers", emoji: "🔟",
                    question: `${n} is ten and how many more?`,
                    options: opts(more, [n, 10, 1], () => rand(2, 9)),
                    answer: String(more),
                    explanation: `A teen number is one ten and some ones. ${n} = 10 + ${more}.`,
                    trap: `Tricky bit: a teen number isn't just its digits — ${n} means a whole ten and ${more} more, not "1 and ${more}".`,
                };
            },
            function oneLess() {
                const n = rand(2, 20), ans = n - 1;
                return {
                    strand: "Counting", type: "One Less", emoji: "⬅️",
                    question: `What is one less than ${n}?`,
                    options: opts(ans, [n + 1, n, 0], () => rand(1, 20)),
                    answer: String(ans),
                    explanation: `One less means count back one: ${n} → ${ans}.`,
                    trap: `Tricky bit: "less" means go back, not forward. ${n + 1} would be one MORE.`,
                };
            },
            function oddEven() {
                const n = rand(1, 10), even = n % 2 === 0;
                return {
                    strand: "Counting", type: "Odd or Even", emoji: "⚖️",
                    question: `Is ${n} odd or even?`,
                    options: shuffle(["Odd", "Even", "Both", "Neither"]),
                    answer: even ? "Even" : "Odd",
                    explanation: `${n} is ${even ? "even" : "odd"} — ${even ? "it splits into two equal groups" : "it leaves one left over"}.`,
                    trap: `Tip: even numbers (2,4,6,8,10) pair up perfectly; odd numbers always have one left over.`,
                };
            },
            function compareLarger() {
                let a = rand(3, 9), b = rand(11, 19);
                return {
                    strand: "Counting", type: "Compare Numbers", emoji: "🔢",
                    question: `Which number is larger?`,
                    visual: `${a}   vs   ${b}`,
                    options: shuffle([String(a), String(b), "They are equal", "You can't tell"]),
                    answer: String(b),
                    explanation: `${b} is larger — it has a whole ten in it, ${a} does not.`,
                    trap: `Tricky bit: a single-digit number is never bigger than a teen number, even if the digit looks big.`,
                };
            },
            function doubleToTen() {
                const n = rand(1, 5), ans = n * 2;
                return {
                    strand: "Add/Subtract", type: "Doubles", emoji: "➕",
                    question: `Double ${n} is...?`,
                    options: opts(ans, [n + 2, n, ans + 2], () => rand(2, 12)),
                    answer: String(ans),
                    explanation: `Double means add the number to itself: ${n} + ${n} = ${ans}.`,
                    trap: `Tricky bit: "double" is ${n}+${n}, not ${n}+2.`,
                };
            },
            function partition() {
                const whole = pick([5, 6, 10]), part = rand(1, whole - 1), ans = whole - part;
                return {
                    strand: "Add/Subtract", type: "Number Pairs", emoji: "🧩",
                    question: `${whole} = ${part} + ?`,
                    options: opts(ans, [whole, part, ans + 1], () => rand(0, whole)),
                    answer: String(ans),
                    explanation: `${part} and ${ans} make ${whole}.`,
                    trap: `Tip: find the missing part by counting up from ${part} to ${whole}.`,
                };
            },
            function countInTwos() {
                const start = pick([0, 2, 4]);
                const seq = [start, start + 2, start + 4, start + 6];
                const ans = start + 8;
                return {
                    strand: "Mult/Div", type: "Counting in 2s", emoji: "👣",
                    question: `What comes next?`,
                    visual: `${seq.join(", ")}, ?`,
                    options: opts(ans, [ans - 1, ans + 1, ans + 2], () => rand(8, 16)),
                    answer: String(ans),
                    explanation: `Counting in 2s, you add 2 each time: ${seq[3]} + 2 = ${ans}.`,
                    trap: `Tricky bit: jumps of 2, not 1 — the next number isn't ${seq[3] + 1}.`,
                };
            },
        ],

        /* ─────────── YEAR 1 ─────────── */
        "Year 1": [
            function bondToSub() {
                const a = rand(2, 8), b = 10 - a;
                return {
                    strand: "AS", type: "Bonds & Subtraction", emoji: "🔗",
                    question: `If ${a} + ${b} = 10, what is 10 − ${b}?`,
                    options: opts(a, [b, 10, a + 1], () => rand(1, 9)),
                    answer: String(a),
                    explanation: `Subtraction is the reverse of addition. Since ${a} + ${b} = 10, then 10 − ${b} = ${a}.`,
                    trap: `Tricky bit: you can use the bond you already know — no need to count back from 10.`,
                };
            },
            function oneMoreOverTen() {
                const n = pick([9, 19, 29, 39, 49]), ans = n + 1;
                return {
                    strand: "NPV", type: "Crossing a Ten", emoji: "🚪",
                    question: `What is one more than ${n}?`,
                    options: opts(ans, [n, n - 1, n + 10], () => rand(n - 5, n + 5)),
                    answer: String(ans),
                    explanation: `${n} + 1 = ${ans}. The ones roll over to a new ten.`,
                    trap: `Tricky bit: this is where the tens digit changes — ${n} → ${ans}, not ${n}.`,
                };
            },
            function teenPlaceValue() {
                const n = rand(11, 19), ones = n - 10;
                return {
                    strand: "NPV", type: "Place Value", emoji: "🏠",
                    question: `${n} = 10 + ?`,
                    options: opts(ones, [n, 1, ones * 10], () => rand(1, 9)),
                    answer: String(ones),
                    explanation: `${n} is one ten and ${ones} ones, so ${n} = 10 + ${ones}.`,
                    trap: `Tricky bit: the "1" in ${n} stands for a whole ten, not one.`,
                };
            },
            function bridgeTen() {
                const a = rand(6, 9), b = rand(3, 9), ans = a + b;
                return {
                    strand: "AS", type: "Bridging 10", emoji: "🌉",
                    question: `${a} + ${b} = ?`,
                    visual: `${a} + ${10 - a} → 10, then + ${b - (10 - a)}`,
                    options: opts(ans, [ans - 1, ans + 1, ans - 2], () => rand(11, 18)),
                    answer: String(ans),
                    explanation: `Make 10 first: ${a} + ${10 - a} = 10, then add the rest to get ${ans}.`,
                    trap: `Tip: jumping to 10 first makes crossing the tens boundary much easier.`,
                };
            },
            function halveOdd() {
                const n = pick([3, 5, 7, 9]), whole = (n - 1) / 2;
                const ans = whole + "½";
                return {
                    strand: "FDRP", type: "Halving Odd Numbers", emoji: "✂️",
                    question: `Half of ${n} is...?`,
                    options: shuffle([ans, String(whole), String(whole + 1), String(n)]),
                    answer: ans,
                    explanation: `${n} doesn't split evenly, so half is ${ans} (a half left over).`,
                    trap: `Tricky bit: half of an odd number isn't a whole number — it ends in ½.`,
                };
            },
            function relatedHalf() {
                const n = rand(2, 10), d = n * 2;
                return {

                    options: shuffle([ans, `${n * w}/${d * w}`, `${n}/${d * w}`, `${n * w}/${d + w}`]),
                    answer: ans,
                    explanation: `Multiply the top by ${w}: ${n}×${w} = ${top}, over ${d} = ${ans}.`,
                    trap: `Tricky bit: only the numerator gets multiplied — the denominator stays ${d}.`,
                };
            },
        ],

        /* ─────────── YEAR 6 ─────────── */
        "Year 6": [
            function orderOps() {
                const a = rand(2, 6), b = rand(2, 5), c = rand(2, 4), ans = a + b * c;
                return {
                    strand: "AS", type: "Order of Operations", emoji: "🧮",
                    question: `${a} + ${b} × ${c} = ?`,
                    options: mcStr(String(ans), [String((a + b) * c), String(a * b * c), String(a + b + c), String(b * c), String(ans + 1), String(ans - 1), String(a + b)]),
                    answer: String(ans),
                    explanation: `Multiply before adding: ${b}×${c}=${b * c}, then +${a} = ${ans}.`,
                    trap: `Tricky bit: don't just go left to right — × comes before +, so it's not ${(a + b) * c}.`,
                };
            },
            function brackets() {
                const a = rand(2, 6), b = rand(2, 5), c = rand(2, 4), ans = (a + b) * c;
                return {
                    strand: "ALG", type: "Brackets First", emoji: "( )",
                    question: `(${a} + ${b}) × ${c} = ?`,
                    options: mcStr(String(ans), [String(a + b * c), String(a * b * c), String(a + b + c), String(ans - c), String(ans + c), String(b * c), String(a + b)]),
                    answer: String(ans),
                    explanation: `Brackets first: ${a}+${b}=${a + b}, then ×${c} = ${ans}.`,
                    trap: `Tricky bit: brackets override the usual order — do what's inside them first.`,
                };
            },
            function solveUnknown() {
                const a = rand(2, 9), x = rand(2, 9), prod = a * x;
                return {
                    strand: "ALG", type: "Find the Unknown", emoji: "🔤",
                    question: `If ${a}a = ${prod}, what is a?`,
                    options: opts(x, [prod, prod - a, a + x], () => rand(2, 12)),
                    answer: String(x),
                    explanation: `${a}a means ${a} × a. So a = ${prod} ÷ ${a} = ${x}.`,
                    trap: `Tricky bit: ${a}a means "${a} times a" — divide to undo it, don't subtract.`,
                };
            },
            function formula() {
                const m = rand(2, 4), c = rand(1, 5), x = rand(2, 6), y = m * x + c;
                return {
                    strand: "ALG", type: "Using Formulae", emoji: "📐",
                    question: `If y = ${m}x + ${c} and x = ${x}, what is y?`,
                    options: opts(y, [m + x + c, (m + c) * x, m * x], () => rand(5, 30)),
                    answer: String(y),
                    explanation: `Substitute x=${x}: ${m}×${x} + ${c} = ${m * x} + ${c} = ${y}.`,
                    trap: `Tricky bit: do the × part (${m}×${x}) before adding ${c}.`,
                };
            },
            function addUnlikeFractions() {
                const sets = [["1/2", "1/3", "5/6", "2/5"], ["1/2", "1/4", "3/4", "2/6"], ["1/3", "1/4", "7/12", "2/7"], ["2/3", "1/6", "5/6", "3/9"]];
                const [f1, f2, ans, naive] = pick(sets);
                return {
                    strand: "FDRP", type: "Unlike Denominators", emoji: "➕",
                    question: `${f1} + ${f2} = ?`,
                    options: mcStr(ans, [naive, "1/2", "1/5", "1", "2/3"]),
                    answer: ans,
                    explanation: `Find a common denominator first, then add. ${f1} + ${f2} = ${ans}.`,
                    trap: `Tricky bit: you can't just add tops and bottoms (that gives ${naive}) — make the denominators match first.`,
                };
            },
            function multiplyFractions() {
                const sets = [["1/2", "1/3", "1/6"], ["1/2", "1/4", "1/8"], ["1/3", "1/3", "1/9"], ["2/3", "1/2", "1/3"], ["1/4", "1/2", "1/8"]];
                const [f1, f2, ans] = pick(sets);
                return {
                    strand: "FDRP", type: "Multiplying Fractions", emoji: "✖️",
                    question: `${f1} × ${f2} = ?`,
                    options: shuffle([ans, "2/5", "5/6", "1/2"]),
                    answer: ans,
                    explanation: `Multiply tops and multiply bottoms, then simplify: ${f1} × ${f2} = ${ans}.`,
                    trap: `Surprising bit: multiplying two fractions below 1 gives an even SMALLER answer.`,
                };
            },
            function ratio() {
                const total = pick([20, 24, 32, 40]), parts = 4, big = total / parts * 3;
                return {
                    strand: "FDRP", type: "Ratio", emoji: "🟰",
                    question: `Share £${total} in the ratio 1 : 3. How much is the larger share?`,
                    options: opts("£" + big, ["£" + total / 4, "£" + total / 2, "£" + total / 3], () => "£" + rand(5, total)),
                    answer: "£" + big,
                    explanation: `1+3 = 4 parts. One part = £${total / 4}, so the larger (3 parts) = £${big}.`,
                    trap: `Tricky bit: 1:3 makes FOUR parts in total, not three — divide by 4 first.`,
                };
            },
            function percentOf() {
                const pct = pick([10, 15, 20, 25, 5]), n = pick([200, 80, 60, 120, 40]);
                const ans = pct / 100 * n;
                return {
                    strand: "FDRP", type: "Percentage of Amount", emoji: "％",
                    question: `What is ${pct}% of ${n}?`,
                    options: opts(ans, [pct, n - ans, ans * 10], () => rand(5, n)),
                    answer: String(ans),
                    explanation: `${pct}% of ${n} = ${pct}/100 × ${n} = ${ans}.`,
                    trap: `Tip: find 10% (${n / 10}) first, then build up to ${pct}%.`,
                };
            },
            function mean() {
                const nums = [rand(2, 8), rand(2, 8), rand(2, 8), rand(2, 8)];
                const sum = nums.reduce((a, b) => a + b, 0), ans = sum / 4;
                return {
                    strand: "STA", type: "Mean Average", emoji: "📊",
                    question: `Find the mean of ${nums.join(", ")}.`,
                    options: opts(ans, [sum, ans + 1, Math.max(...nums)], () => rand(2, 10)),
                    answer: String(ans),
                    explanation: `Add them (${sum}) then divide by how many (4): ${sum} ÷ 4 = ${ans}.`,
                    trap: `Tricky bit: the mean is add-then-divide-by-the-count — don't forget the dividing step.`,
                };
            },
            function diameter() {
                const r = rand(3, 12), ans = r * 2;
                return {
                    strand: "GEO", type: "Circle Parts", emoji: "⭕",
                    question: `A circle has a radius of ${r} cm. What is its diameter?`,
                    options: opts(ans + " cm", [(r / 2) + " cm", r + " cm", (r * r) + " cm"], () => rand(5, 30) + " cm"),
                    answer: ans + " cm",
                    explanation: `The diameter is twice the radius: ${r} × 2 = ${ans} cm.`,
                    trap: `Tricky bit: diameter = 2 × radius (it crosses the whole circle, not half).`,
                };
            },
            function intervalAcrossZero() {
                const lo = -rand(1, 5), hi = rand(1, 5), ans = hi - lo;
                return {
                    strand: "NPV", type: "Across Zero", emoji: "🌡️",
                    question: `How many degrees from ${lo}°C up to ${hi}°C?`,
                    options: opts(ans + "°", [(hi + lo) + "°", (hi - Math.abs(lo)) + "°", (Math.abs(lo)) + "°"], () => rand(2, 12) + "°"),
                    answer: ans + "°",
                    explanation: `Count up through zero: ${Math.abs(lo)} to reach 0, then ${hi} more = ${ans}°.`,
                    trap: `Tricky bit: you cross zero, so add the two distances (${Math.abs(lo)} + ${hi}), don't subtract.`,
                };
            },
        ],

        };

        /* ─── Year metadata (start screen) ─── */
        const YEAR_META = [
            ["Reception", "🧸", "Teen numbers, one less, doubles, odd & even"],
            ["Year 1", "🌱", "Number bonds, bridging 10, crossing tens, halving odds"],
            ["Year 2", "🚀", "Inverses, commutativity, equivalent halves, quarter-to"],
            ["Year 3", "🎓", "Tenths, comparing fractions, remainders, rounding"],
            ["Year 4", "🛰️", "Decimals, ×/÷ by 10, negatives, simplifying, 7×8"],
            ["Year 5", "🔬", "Primes, squares & cubes, %, improper fractions, angles"],
            ["Year 6", "🏆", "Order of operations, algebra, ratio, mean, circles"],
        ];

        /* ─── State ─── */
        let currentYear = null, pool = [], score = 0, total = 0, streak = 0, currentQuestion = null, answered = false;

        /* ─── Start screen ─── */
        function buildStart() {
            const grid = document.getElementById("yearGrid");
            grid.innerHTML = "";
            YEAR_META.forEach(([name, emoji, theme]) => {
                const tile = document.createElement("button");
                tile.className = "year-tile";
                tile.innerHTML = `<div class="year-name"><span class="yr-emoji">${emoji}</span>${name}</div>` +
                                 `<div class="year-theme">${theme}</div>`;
                tile.addEventListener("click", () => startYear(name));
                grid.appendChild(tile);
            });
        }

        function startYear(name) {
            currentYear = name;
            pool = BANKS[name];
            score = 0; total = 0; streak = 0;
            document.getElementById("startScreen").style.display = "none";
            document.getElementById("card").classList.add("visible");
            document.getElementById("progressWrap").classList.add("visible");
            document.getElementById("yearChip").classList.add("visible");
            document.getElementById("progressRing").style.display = "block";
            document.getElementById("yearChipLabel").textContent = name;
            document.getElementById("statsRow").classList.remove("visible");
            document.getElementById("streak").classList.remove("visible");
            updateUI();
            renderQuestion();
        }

        function goHome() {
            document.getElementById("startScreen").style.display = "block";
            document.getElementById("card").classList.remove("visible");
            document.getElementById("progressWrap").classList.remove("visible");
            document.getElementById("statsRow").classList.remove("visible");
            document.getElementById("yearChip").classList.remove("visible");
            document.getElementById("streak").classList.remove("visible");
            document.getElementById("progressRing").style.display = "none";
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        /* ─── Rendering ─── */
        function renderQuestion() {
            currentQuestion = pool[rand(0, pool.length - 1)]();
            answered = false;

            const q = currentQuestion;
            document.getElementById("badges").innerHTML =
                `<span class="type-badge">${q.emoji} ${q.type}</span>` +
                (q.strand ? `<span class="strand-badge">${q.strand}</span>` : "") +
                `<span class="tricky-badge">⚠ Tricky</span>`;

            document.getElementById("questionText").textContent = q.question;

            const visualBox = document.getElementById("visualBox");
            if (q.visual) {
                visualBox.style.display = "flex";
                if (typeof q.visual === "object" && q.visual.type === "dots") {
                    let html = '<div class="dot-grid">';
                    for (let r = 0; r < q.visual.rows; r++) {
                        html += '<div class="dot-row">';
                        for (let c = 0; c < q.visual.cols; c++) html += '<div class="dot"></div>';
                        html += '</div>';
                    }
                    visualBox.innerHTML = html + '</div>';
                } else {
                    visualBox.innerHTML = '<span>' + q.visual + '</span>';
                }
            } else {
                visualBox.style.display = "none";
            }

            const letters = ["A", "B", "C", "D"];
            const optionsEl = document.getElementById("options");
            optionsEl.innerHTML = "";
            q.options.forEach((option, i) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span class="option-text">${option}</span>`;
                btn.addEventListener("click", () => submitAnswer(option, btn));
                optionsEl.appendChild(btn);
            });

            document.getElementById("feedback").classList.remove("visible");

            const card = document.getElementById("card");
            card.style.animation = "none";
            card.offsetHeight;
            card.style.animation = "slideIn 0.3s ease";
        }

        function submitAnswer(option, btnEl) {
            if (answered) return;
            answered = true;
            const isCorrect = option === currentQuestion.answer;
            if (isCorrect) { score++; streak++; } else { streak = 0; }
            total++;

            document.querySelectorAll(".option-btn").forEach((btn) => {
                btn.classList.add("disabled");
                const text = btn.querySelector(".option-text").textContent;
                if (text === currentQuestion.answer) {
                    btn.classList.add("correct");
                    btn.innerHTML += '<span class="option-result">✓</span>';
                } else if (btn === btnEl && !isCorrect) {
                    btn.classList.add("wrong");
                    btn.innerHTML += '<span class="option-result">✗</span>';
                }
            });

            const title = document.getElementById("feedbackTitle");
            title.textContent = isCorrect ? "🎉 Correct!" : "💡 Not quite — here's the idea";
            title.className = "feedback-title " + (isCorrect ? "correct" : "wrong");
            document.getElementById("feedbackAnswer").textContent = "Answer: " + currentQuestion.answer;
            document.getElementById("feedbackExplanation").textContent = currentQuestion.explanation;

            const trapEl = document.getElementById("feedbackTrap");
            if (currentQuestion.trap && !isCorrect) {
                trapEl.textContent = currentQuestion.trap;
                trapEl.classList.add("visible");
            } else {
                trapEl.classList.remove("visible");
            }

            document.getElementById("feedback").classList.add("visible");
            updateUI();
        }

        function nextQuestion() { renderQuestion(); }

        function updateUI() {
            const pct = total === 0 ? 0 : Math.round((score / total) * 100);
            const circ = 2 * Math.PI * 30;
            document.getElementById("ringProgress").setAttribute("stroke-dasharray", ((score / Math.max(total, 1)) * circ) + " " + circ);
            document.getElementById("ringText").textContent = score + "/" + total;

            const streakEl = document.getElementById("streak");
            if (streak >= 2) {
                streakEl.classList.add("visible");
                document.getElementById("streakCount").textContent = streak;
            } else {
                streakEl.classList.remove("visible");
            }

            document.getElementById("progressBar").style.width = pct + "%";

            if (total > 0) {
                document.getElementById("statsRow").classList.add("visible");
                document.getElementById("statTotal").textContent = total;
                document.getElementById("statCorrect").textContent = score;
                document.getElementById("statPct").textContent = pct + "%";
                document.getElementById("statStreak").textContent = streak;
            }
        }

        /* ─── Start ─── */
        buildStart();
    </script>
</body>
</html>
